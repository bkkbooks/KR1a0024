body:
  text: 漢王易傳叢説宋朱震撰甲壬得戌亥者均謂之乾不一其甲子壬子也乙癸得申未者均謂之坤不一其乙未癸未也故論乾則甲子與壬子同甲寅與壬寅同甲辰與壬辰同壬午與甲午同壬申與甲申同壬戌與甲戌同論坤則乙未與癸未同乙已與癸已同乙卯與癸卯同乙丑與癸丑同乙亥與癸亥同乙酉與癸酉同乾陽物也得于乾者皆陽物也乾道成男是也坤隂物也得于坤者皆隂物也坤道成女是也隂陽家八卦變五鬼絶命天醫生氣絶體逰魂福德其卦乾坤坎離震巽艮兑相對而變亦先天之序也疾者隂陽偏勝而不得其正也故卦以隂居陽陽居隂者謂之疾所得之偏者亦然三疾是也或曰偏乎隂者資之以陽偏乎陽者資之以隂謂隂處隂則誤也隂陽各得其正非疾也説卦以坎為心病坎者乾之二五交乎坤也二陽不當位疾也五陽當位通也故坎又為心亨先儒槩以坎為病則誤也曰心病曰心亨者二五中也離為飛鳥鳳謂之朱鳥離也又謂之朱雀故雀入大水為蛤離極成坎也變坎七變艮二即五也初自下爻三變即前參以變也次自中爻下而二變次自中爻上而二變即前伍以變也參去伍伍去參皆不能變此三所以為極數五所以為小衍也若一若二即未變也故曰天地定位易行乎其中巽為號又有嗃嗃者何交乎離也巽為風離為火大且急者風火之聲怒聲也天下之大聲有四曰雷曰風曰水曰火傳曰衆怒如水火或用一卦或用一爻或不可用則曰勿用天下之時無不可用者顧用之如何耳一索再索三索先論揲蓍次論䇿數中便有八卦次論畫卦中坎離互有四卦歸藏之乾有乾大赤乾為天為君為父又為辟為卿為馬為禾又為血卦歸藏小畜曰其丈人乃知丈人之言三代有之臨川解睽六五噬膚曰膚六三之象以柔為物之間可噬而合此卦自二至上有噬嗑象此互體也後説之弧一作壺爻有坤坎離艮而無震足當作弧明夷之離為小過之飛鳥無妄之坤為睽之掣牛離畜牝牛離中之隂即坤之隂也坎為馬脊坎中之陽即乾之陽也莧陸澤草也生於三月四月莧蕢也葉柔根堅而赤陸大於莧葉柔根堅堅者兑之剛也堅而赤赤者乾之色也困九月霜降氣也故曰株木曰蒺藜蒺藜者秋成也大過十月小雪氣也故曰枯楊生稊枯陽生華姤五月夏至氣也故曰以杞苞瓜生瓜生於四月中氣故也夬三月清明氣也故曰莧陸夬夬莧陸三月四月生也關子明曰接物者言接之而已非同之也故濯物心無所瀆汙謂之洗心言洗濯其接物之心無所瀆汙故謂之洗心而注者誤以為洗濯萬物之心郭璞洞林得豫之小過曰五月晦日羣魚來入州城寺舍注以乙未為魚星非也豫艮為門闕震為大塗六三變九三互有巽體巽為魚豫五月卦坤為晦日兑為妾變為巽巽為近市利則倚市門矣故洞林咸之漸兑成巽曰妾為倡王弼謂頤初九不能使物由已養誤也夫使物由已養有命存焉初九在下未能養人而當自養以正故以朵頤戒之易之有説卦猶詩之有詁訓也天命聖人以祐下民微隂浸長民將內潰聖人􅍭章不耀中正自處委任賢佐厚下安宅盡人謀以聽天雖有隕越自天隕之吾志不動也不舍天之所命也周公曰我弗敢知孔子曰天生德於豫桓魋其如豫何王洙曰木之始紐引孚甲觸地而出能破硜確無所不通巽之上剛是也根柢散之自固其植巽之下柔是也以至華實成落而不反其故處雜卦曰升不來也震亦為王者五行更王始於震也震乾之一索也其王之始基乎故大王文王與武王之南狩皆用此象升之三不用此象者決燥也分隂者六八也分陽者七九也迭用柔剛者互變也人疑繫辭非孔子作乃門人所作不然子曰何也此大不然答問者所以起意也如困之上六困于葛藟于臲卼曰動悔有悔征吉此爻言人曰動必有悔雖有悔也征則吉可不動乎鮒子夏作蝦蟇此五月卦也初竒二偶三竒四偶五竒六偶卦有取於竒偶為象者如乾九四曰淵淵重坎也自四至上有重坎象五兵之有戈上鋭將有兵者刀劎有光離也郭璞筮升之比升二三五變也五變坎曰和氣氤氲感潛鴻坎下伏離離為飛鳥鵝鳧同象郭璞為東海世子母病筮得明夷之既濟坤變坎曰不宜封國列土以致患母子不並貴坤為國邑坎折之坤母坎子土克水也又曰當有牛生一子而兩頭一子謂坤變坎此説卦所謂子母牛也兩頭者坎離相應離中爻有田璞得大有之泰云七月中有蛇在屋間出食雞雛案離為飛鳥變坤互中有震震為大木者梁也已在上爻故云屋此大過云本未弱取棟橈象也洞林以巽為大雞酉為小雞者酉巽之九三爻也以此推之午為馬乾之九四也丑為牛坤之六四也寅為虎艮之上九也辰為龍震之九三也未為羊兊之上六也八卦兼用五行乃盡其象管輅郭璞共用此術巽為風蠱蠱以風化故為蠱又筮遇節之噬嗑曰簮非簮叉非叉此以內卦兑言也兑為金大抵斷卦當先自內又曰在下頭斷髭鬚所謂頭者坎中之乾也須者在首下而裔也柔坎也顧士犀母病得歸妹七日亡者歸妹女之終也卦有取前卦以為象者有取後卦以為象者有一爻而取兩象者有一象而兼二爻者有一爻變動而二爻共取以為象者其言可謂曲矣然而盡萬物之理不如是無以致曲焉不如是其言亦不能以中矣乾䇿三十六陽也坤策二十四隂也陽合於隂而生震坎艮者二十八策隂合於陽而生巽離兑者三十二策乾坤六爻其策六十澤中有火非火居澤下也如以剛限之故火不見滅是水在鼎中火巽鼎下之象非革象也蓋水火之性寒熱燥濕皆有常然澤中有火則水火之性革其常矣息止也火炎上而水息之水潤下而火息之有二女同居其志不相得之象故曰水火相息若以剛限之則無同居之象郭璞言有溫泉而無寒焰璞其知革睽之象歟兩儀生四象孔氏謂金木水火稟天地而有土則分王四季且金木水火有形之物安得為象哉孔氏失之逺矣莊氏之實象假象義象用象於釋卦中破之何氏謂神物變化垂象圖書此易外别有易有四象所以示也此象謂爻卦之象七八九六乃少隂少陽老隂老陽之位生八卦之四象也天一地二天三地四兼天五之變化上下交易四象備其成數而後能生八卦于是坎離震兑居四象正位各以本位數存三以生餘數則分乾坤艮巽之卦四象既列五居四位此河圗五十有五居四位之數劉氏曰八純卦兼兩儀四象而盡五十五數謂先布五十五位後除天地四方數餘以竒耦數排之便見八卦之位此説不通所謂乾者天也坤地也所謂坎者北方也離南方也兑西方也震東方也今除天九地六四方四數而分布八卦即八卦所用止三十六而十九數為贅矣夫八卦皆本於乾坤而坤之數乾兼有之故八卦不出於三十六夫三十六數六九也九老陽之數也此小成之卦也若大成之卦三十二䇿也二十八䇿也二十四䇿也而三十六䇿皆兼有之蓋天地之數五十有五自一衍而五大衍為五十五十則五十五在其中其用四十有九則一在其中更不論五十五也若除天地四方之數又於四象二儀之外而有八卦矣故曰其論不通劉氏曰內十五天地之用九六之數也兼五行之數四十合而為五十有五備天地之極數也曰九與六合為十五水一六火二七木三八金四九土五十凡四十數配合論之則不通虞翻曰甲乾乙坤相得合木丙艮丁兑相得合火戊坎已離相得合土庚震辛巽相得合金天壬地癸相得合水翻謂天地者言乾坤也十日之數甲一乙二丙三丁四戊五已六庚七辛八壬九癸十故乾納甲壬配一九坤納乙癸配二十震納庚配七巽納辛配八坎納戊配五離納已配六艮納丙配三兑納丁配四此天地分五十五數也水一火二木三金四土五五行之生數也水六火七木八金九土十五行之成數也一三五七九竒數二十五二四六八十偶數三十竒耦之數五十有五此五行分天地五十有五之數也太玄三八為木四九為金二七為火一六為水五五為土五五者十也洛書之數也劉牧曰十五天地之用九六之數也兼五行之數四十合而為五十有五備天地之極數者誤也言五行之成數則九六在其中矣韓氏曰衍天地之數所賴者五十其用四十有九則其一不用也不用而用以之通非數而數以之成斯易之太極也此言是也四十九數總而為一者太極也散而為四十九即太極在其中矣故分而為二以象兩揲之以四以象四時四時者坎離震兑此六七八九之數也又曰夫無不可以無明必因於有固常於有物之極必明其所由宗此言未盡也四十九因於太極而太極非無也一氣混淪而未判之時也天地之中在焉故謂之太極極中也京房云五十者謂十日十二辰二十八宿也凡五十其一不用者天之生氣將欲以虛來實故用四十九焉此言五十數之見於天者其成象如此謂其一不用為天之生氣則非也馬融云易有太極謂北辰也太極生兩儀兩儀生日月日月生四時四時生五行五行生十二月十二月生二十四氣北辰居位不動其餘四十九運轉而用也季長之論不若京房蓋兩儀乃天地之象而北辰不能生天地也故邵雍曰萬物皆有太極兩儀四象之象荀爽曰卦各有六爻六八四十八加乾坤二用凡五十初九潛龍勿用故用四十九也乾用九坤用六皆在八卦爻數之內潛龍勿用如勿用娶女之類鄭康成云天地之數以五行氣通凡五行減五大衍又減一故用四十有九康成所謂五行氣通者蓋謂十日十二律二十八宿三者五行之氣通焉為五十五減五行之數為五十大衍又減一為四十九其説本於乾鑿度與京房為一説而五行氣通其説尤善但後學一例抵之不詳觀耳董遇云天地之數五十有五者其六以象六畫之數故減而用四十九非也董謂五十有五減卦之六畫為四十九不知五十有五天地之極數大衍之數五十其一太極不動而四十九運而為八卦重而六十四若去六畫即説不通矣顧歡云立此五十數以數神神雖非數因數以顯故虛其一數以明其不可言之義所謂神雖非數因數以顯是也然其説大而無當不及韓説劉氏謂韓注虛一為太極即未詳其所出之宗而顧之未詳又可知矣劉謂天一居尊而不動則與馬季長言北辰不動何異若謂不動則筮者當置一䇿以象天一不動不當言其用四十有九也動靜一源顯微無間知四十有九為一之用即知一為四十有九之體矣劉曰天一者在數為天一在日為甲在象為六之中位在純卦為坎之中爻在重乾為初九在復為陽爻在辰為建子在五行為水在律為黃鍾劉所謂一者言一之定位也不知五十去一則一在四十九中使四十九去一則一又在四十八凡有數則未嘗無一而一之所在無往而不為萬物之祖得此而不失是謂執天地之機又曰一用天德天德者九也乾用九者謂天德不可為首也用之如何見羣龍無首吉也此存乎其人也坤用六者利永貞是也非謂一用九也又曰乾道包坤陽得兼隂此論用之於八卦小成其三十六爻皆出於乾可也若謂乾三兼坤之六成陽之九幹運五行成數而通變化則誤也劉前論天地之數十五四方之數四九十有九通八卦之爻三十六為五十五今論七九六八之策又曰先分天地數為二十後兼四時為二十四何其紛紛耶少陽七者謂天五駕地二為七前言地以二上交於天五而生七七為少陽之數也陽以進故進二之九為老陽之數此一進也若以四位合之則少陽數七四七二十八也又四位進二見八二十八進八故老陽數三十六也又以天地四時數因之天地分二少陽數七二七則一十四也四七則二十八也成一百六十有八數陽生自復至乾凡六卦每卦進八故老陽數二百一十有六若天五駕地二為七二進之為老陽四位合之四七二十八又四位進二見八二十八進八為三十六四位者指四時之位也天地四時之數二十四以天地四時數因之天地分二少陽數七二七則一十四四七則二十八二七十四又四七二十八凡四十二又四因之成一百六十有八數陽生自復至乾凡六卦復臨泰大壯夬乾每卦進八故老陽數一百一十六謂於一百六十有八之上又進六八四十八成二百一十六為老陽之數謂之老陽者皆乾爻也少隂數八者謂天五駕天三為地八隂以退故退二之六六為老隂之數此一退也若以四位合之則少隂數八四八三十二也又四位每位退二見八則一十六四八則三十二也成一百九十二隂生自姤至坤凡六卦每卦退八故老隂數一百四十有四也劉氏論咸恆二卦不繫之於離其論過於韓注至言天地之數五十有五循十日而周一元三周而萬物之數足則為可疑也夫劉氏配五行生成之數五十居中水火居右木金居左始於丙丁終於庚辛周而復始六十日之納音盡矣此一律含五音而成六十律之説也而配於易之上經三十卦則不合矣雖甲子始於乾而癸亥終於離則不合也乾當甲金而二十九卦豈盡然哉繫辭言二篇之策當萬物之數而謂三周五十五數一百八十爻為萬物之數足則未之聞也易有以一策當一日者乾坤之策是也有以一爻當一日者七日來復是也有以策數七八九六言日者勿逐七日得是也易之取象豈一端而盡六十卦直日兩卦相去皆七日其實則六日七分猶書稱期三百有六旬有六日其實三百六十五日四分日之一禮言三年之喪其實二十七月詩言一之日二之日其實十一月十二月之日何於此六日七分而疑之乎先儒以此候氣占風效證寒溫而劉氏易之以五卦各主五日則吾不知其説也劉氏曰鄭氏雖以四正卦之爻減二十四之數與當期之日相契則又與聖人之辭不同也四正之卦四六二十四爻主二十四氣此先儒舊傳非鄭氏配合也劉氏用六十卦主期之日則四正之卦主二十四氣不廢也故曰策數當日而不取爻數則一爻一日五卦一月何謂也遁臨卦義不同何氏從建子陽生至建未為八月褚氏自建寅至酉為八月孔氏以建丑至否卦八月劉氏云若從建子則卦辭當在復卦之下否之六三當消泰之九三又更臨卦之九二不應今以遁之六二消臨之九二則於我為得則是劉氏取何氏之説而條達之也又曰臨彖曰浸而長遁彖亦曰浸而長二卦之爻相偶而彖辭皆有隂陽消長之義又王氏卦略云臨剛長則柔微柔長故剛遁故伊川亦用此説周公作爻辭多文王後事則知文王之旨周公述而成之故以周正言易有三名夏曰連山商曰歸藏周曰周易連山神農氏之别號也歸藏軒轅氏之别號也並是代號所以易題周以别餘代猶周書周禮之謂也周公不得不以周之正朔定其月也劉氏以天地五十五數布之五行自丙丁至甲乙為一周其辰子丑午未自甲乙至壬癸為一周其辰寅卯申酉自壬癸至庚辛為一周其辰辰已戌亥故上經三十卦三周而成六十卦六十卦當期之日其策一萬一千五百二十子雲子午九丑未八寅申七卯酉六辰戌五已亥四以六辰相配成十二支之數蓋有得於納音之説也其於十日亦然鄭康成言四象曰布六於北方以象水布八於東方以象木布九於西方以象金布七於南方以象火備為一爻而正謂四營而成乾鑿度曰三百六十五日四分日之一以周事一卦六爻一爻一日凡六日用事一曰諸侯二曰大夫三曰卿四曰三公五曰辟六曰宗廟爻辭善則善凶則凶流演曰諸侯在初大夫次尊王官也又曰三畫以下為地四畫已上為天又曰易氣從下生故動於地之下則應於天之下動於地之中則應於天之中動於地之上則應於天之上故初以四二以五三以六此之謂應十日十二辰二十八宿凡五十大衍之數也又曰厯以三百六十五日四分之一為一嵗易以三百六十析當期之日此律厯數也兑乾金也而乾為大赤故兑金從火革坎生於坤本乎地也故潤下離生於乾本乎天也故炎上占法以八卦絶鄉為墓金生已故乾兑墓在艮木生亥故震巽墓在申水生申故坎墓在巽火生寅故離墓在乾土生申故坤艮墓在巽此合河圗洛書而言之也七為少陽九為老陽八為少隂六為老隂一五九老隂變老陽二五六少陽變老隂三五七少隂變少陽四五八老陽變少隂反復數之其變無窮我仇有疾王弼以六五為九二仇伊川以初六為九二仇鄭虞以九四為九二仇按先儒説我據四之應四承我之應故曰我仇四為毁折之象故曰有疾而子夏傳亦曰四以近權惡我専任四之覆餗正無幾矣豈輒謀我哉怨偶曰仇當以四為仇安定胡先生以陸作逵案虞氏所傳之象上之三成既濟三陸也夫上之所生者進也所反亦進也兹所以動而不窮歟漸至九五極矣進至上九亢矣是以上反而之三然後安處考之鴻象坎象既退自南而北嚮之時也宜以陸為正或曰鴻漸至此千里之舉也曰不然鴻飛冥冥潔身而去之象也非漸也漸卦虞氏之象以否坤之三上之四乾之四下之三而初上二爻不正故所變之爻止於初三上三爻而已餘二四五爻不動六四否坤之三也故卦以為婦孕不育以為寇小人之爻也九三乾之四也故戒以夫征不復順以相保不中之爻也中孚王洙曰柔在內而巽説合和之性也剛得中而上下信化育之道也中孚天理之端叶於教化之義若鳥之孚卵柔渾於內而剛鷇於外嫗伏化羽不違其期自然之信也此與小過旁通自中孚而變故小過有飛鳥之象焉小過虞曰離為飛鳥震為音艮為止晉上之三晉變小過離去震在若飛鳴而音止故飛鳥遺之音上隂乘陽故不宜上下隂順陽故宜下大吉俗説或以卦象二陽在內四隂在外有似飛鳥舒翼之象妄矣先儒論重卦者六家王弼虞翻曰伏羲鄭康成曰神農孫盛曰夏禹司馬遷揚雄曰文王而孔頴達陸德明陸希聲則以弼論為是臣曰皆是也繫辭曰古者庖羲氏之王天下也仰則觀象於天俯則觀法於地觀鳥獸之文與地之宜近取諸身逺取諸物於是始作八卦以通神明之德以類萬物之情則伏羲氏所畫者八卦而已然結繩而為網罟以佃以漁則已取重離之象何則離麗也離為目巽為繩以巽變離結繩而為網罟之象也罟綱目也離為雉巽為魚以佃以漁之象也下繫曰八卦成列象在其中矣因而重之爻在其中矣謂之在其中者蓋既畫八卦因而重之雖未為六十四卦而三百八十四爻之變固已具然存乎其中矣是以神農氏黃帝氏堯舜氏因其所重八卦觸類而長取於益取於噬嗑取於乾坤取於渙取於隨取於豫取於小過取於睽不特四聖人然也自伏羲氏沒其間聖人取重卦以利天下者多矣是以取大壯取大過取夬謂之後世聖人則夏后氏商人亦在其中矣伏羲氏畫卦因而重之者襲其氣之母也羣聖人重之者用其子孫也莊生曰伏羲得之以襲氣母是也考之歸藏之書其初經者庖羲氏之本旨也卦有初乾初坤也初艮初兑初坎也初離初釐震也初巽八卦其卦皆六畫周禮大卜掌三易之法一曰連山二曰歸藏三曰周易其經卦皆八其别皆六十四所謂經卦則初經之卦也又山海經伏羲氏得河圗夏后氏因之曰連山黃帝氏得河圗商人因之曰歸藏列山氏得河圗周人因之曰周易列山氏世譜所謂神農氏也以此觀之則弼翻所論舉其大要康成孫盛遷雄之言各舉其一而遷雄又指周易言之也然三易之卦其次各異首艮者連山也首坤者歸藏也首乾者周易也即周禮所謂其别各六十四者也故説卦之文敘天地山澤雷風水火健順動入陷麗止決之性八卦之象則先經卦而以文王八卦震巽離坤兑乾坎艮次之而序卦所次皆文王所重之卦也聖人猶慮後世未知三易之變故於雜卦一篇雜糅衆卦錯綜其義以示變易之無窮虞氏曰聖人之興因時而作隨其事宜不必因襲當有損益之意其知三易之説歟漢書藝文志易經十二篇論彖大象小象文言班固以文王作上下篇孔氏為之彖象繫辭文言序卦之屬十篇先儒自鄭康成王弼孔頴達尊是説其後諸儒疑之正義補闕曰夫子因文王彖而有彖王昭素胡且亦云范諤昌著易證墜簡曰諸卦彖象爻辭小象乾坤文言並周公作自文言以下孔子述也臣以經傳考之明夷之彖曰內文明而外柔順以蒙大難文王以之利艱貞晦其明也內難而能正其志箕子以之則彖非文王作斷可知矣案司馬遷曰孔子晚喜易序彖繫象説卦文言信斯言也則彖象説卦文言古有之矣孔子序之繫之説之文之而已所謂述而不作也昔者子貢問於孔子曰夫子聖矣乎孔子曰聖則吾不能夫聖孔子不居而繫辭之言及於卦象彖爻必抑揚其辭以聖人稱之曰聖人設卦觀象繫辭焉而明吉凶此所謂繫辭者指卦下之辭而言之也又曰彖也者言乎其象也爻也者言乎其變也夫爻辭言一爻之變彖辭言一卦之象則文王卦下之辭又謂之彖矣孔子序述其彖之意而已故名其篇曰彖使文王卦下之辭不謂之彖孔子何為言知者觀其彖辭則思過半矣夫子自謂如此非遜以出之之義也蓋彖者孔子贊易十篇之一先儒附其辭於卦辭之下故加彖以明之諤昌以乾彖釋元亨利貞文言又從而釋之疑其重復謂非孔子之言且引穆薑之言證之此又不然文言者文其言也猶序彖説卦之類古有是言或文王或周公之辭孔子因其言而文之以垂後世傳曰言之不文行之不逺故以文言名其篇左氏成公十六年穆薑往東宫筮之襄公二十二年孔子生上距穆薑二十四年穆薑之時雖已誦隨繇之辭因就乾卦文言然其言與今易稍異穆薑之言曰元體之長也亨嘉之會也利義之和也貞事之幹也體仁足以長人嘉德足以合禮利物足以和義貞固足以幹事以今易考之刪改者二增益者六則古有是言孔子文之為信然矣諤昌遂以六十四卦之彖皆出於周公則誤也或曰彖非周公則孔子繫乾何謂舉其全文而釋之如曰時乘六龍以御天也雲行雨施天下平也曰臣固曰古有是言也古有是言又舉而釋之與乾坤六爻屢稱而明之其意一也諤昌又謂乾卦答問以下為孔子贊易之辭非文言也此亦誤也孔子作十篇以贊易彖也大象也小象也繫辭上下也乾文言也坤文言也説卦也序卦也雜卦也若以答問以下為非文言則先儒未以文言附於乾坤之下其辭當列於何篇耶蓋文言之後又有此言贊乾坤六爻之義故通謂之文言如繫辭之中廣述困解否豫復五卦之爻是也聖人以易之藴盡在乾坤而六十二卦由此而出故詳言爻義以例諸卦耳諤昌又謂大象小象皆出於周公亦誤也且八卦成列象在其中矣因而重之爻在其中矣聖人有以見天下之賾擬諸其形容象其物宜是故謂之象有卦之象焉有爻之象焉彖也者言乎其象者也言卦之象也爻象動乎內言爻之象也方設卦變爻之時其象已具乎卦爻之中故史墨對趙簡子曰在易卦雷乘乾曰大壯觀此則雷在天上大壯之類有卦則有此象矣如曰君子以非禮勿履則孔子所繫之大象也何以明之且以復卦大象言之曰雷在地中復先王以至日閉關商旅不行后不省方考之夏小正十一月萬物不通則至日閉關后不省方夏之制也周制以十一月北巡狩至于北嶽矣是以知繫大象之辭非周公作也崔杼欲娶東郭偃之姊筮之遇困之大過陳文子曰不可娶也且其繇曰困于石據于蒺藜入于其宫不見其妻凶其繇與今困卦六三爻辭正同是特小象之作故文子曰困于石往不濟也據于蒺藜所恃傷也入于其宫不見其妻凶無所歸也使小象亦周公作則文子必稽之矣故曰諤昌誤也由是論之遷之言蓋不誣矣先儒數十篇之次其説不一獨胡旦為不失其指故今從之崔憬陸震謂文王作爻辭馬融陸績謂周公所作考之爻辭馬融陸績為是明夷九三明夷于南狩得其大首六五箕子之明夷隨上六王用亨于西山升六四王用享于岐山蓋南狩伐商之事西岐王業所興武王數紂曰囚奴正士而追王西伯在翦商之後則爻辭為周公作審矣韓宣子適魯見易象春秋曰周禮盡在魯矣吾乃今知周公之德也孔頴達嘗正此義今申其説以證崔陸之誤然琴書有言曰文王在羑里演易作鬱厄之辭困于石據于蒺藜蓋爻辭亦有文王之辭豈周公述而成之歟文王作卦辭周公作爻辭通謂之繫辭仲尼贊二聖人繫辭之意成上下篇名曰繫辭猶序文王之彖而名其篇曰彖也凡繫辭所稱繫辭焉者或指卦辭或指爻辭而言如聖人設卦觀象繫辭焉而明吉凶指卦辭為繫辭也如聖人有以見天下之動而觀其會通以行其典禮繫辭焉以斷其吉凶是故謂之爻指爻辭為繫辭也古文周易上下二篇上篇三十卦下篇三十四卦孔子作彖象繫辭文言説卦序卦雜卦别為十篇以贊易道與周易異卷如詩書之序不與詩書同卷前漢費直傳古文周易以彖象繫辭文言十篇解説上下經是也費氏之易至馬融始作傳融傳鄭康成康成始以彖象連經文所謂經文者卦辭爻辭通言之也即費傳所謂上下經也魏王弼又以文言附於乾坤二卦故自康成而後其本加彖曰象曰自王弼而後加文言曰至於文辭連屬不可取以附六十四卦之爻則仍其舊篇今繫辭上下説卦序卦雜卦是也魏髙貴鄉公問博士淳于俊曰今彖象不連經文而注連之何也俊對曰鄭康成合彖象於經者欲便學者尋省易了孔子恐其與文王相亂是以不合則鄭未注易經之前彖象不連經文矣揚子雲作太玄九卷準易首一卷贊三卷測一卷衝錯攡瑩一卷數一卷文棿一卷圗告一卷范望注解合贊於首散測於九贊之下而學者自贊為經辭此亦凖文王卦辭周公爻辭通謂之經也隋書經籍志漢費直注周易四卷鄭康成注周易九卷魏王弼注周易六卷韓康伯注繫辭三卷鄭王二家之易本於費氏康伯之學卒於輔嗣則費氏之後易經上下離為六卷繫辭而下五篇合為三卷矣是以二家所注皆九卷也今易乾卦自乾至用九見羣龍無首吉即古易之本文坤卦而下鄭王之所附也范諤昌不知卦爻之辭同謂之經文同謂之繫辭故謂周公作爻辭彖象文言别次兩卷目曰繫辭孔子於卷末贊成其義上卷明彖下卷明爻後儒附經留繫辭之目以冠孔子之述何其誤耶胡且又謂經有上下理合自分卦有彖象必非别出其誤與諤昌何異説卦脫誤比於諸篇特多荀氏易本乾後有四象坤後有八震後有三巽後有二坎後有八而又一揉為撓離後有一艮後有三兑後有二虞氏易本以龍為駹及為陂専為敷寡為宣科為折羊為羔鄭本以廣為黃乾為幹黔為黚京氏本以馵為未螺為螺果蓏為果墮其餘陸績王肅姚信王廙偏傍點畫亦或不同蓋焚書之後周易雖存至漢已失説卦三篇後河內女子得而上之故三篇之文容有差誤今隨文辨正歸於至當疑則闕之陸氏易傳削去爻象自謂彌縫其闕是乎曰仲尼繫三百八十四爻之象文皆中律是謂少而法多而類世罕知者故陸氏作傳諧音以發其辭體正如子雲作太玄俾學者為進易之梯階至於陸氏言義則自有中否周易論變故古人言易雖不筮必以變言其義史墨論乾之初九曰在乾之姤九二曰其同人九五曰其大有上九曰其夬用九曰其坤坤之上六曰其剝以史墨之言推之則乾九三當曰其履九四曰其小畜伯廖舉豐上六曰其在周易豐之離知莊子舉師初六曰在師之臨至今占亦然崔武子遇困之大過六三變也莊叔遇明夷之謙初九變也孔成子遇屯之比初九變也南蒯遇坤之比六五變也陽虎遇泰之需六五變也敬叔得觀之否賈逵曰觀爻在六四變而之否三國時關公敗孫權使虞翻筮之得兑下坎上節五爻變之臨凡所謂之某卦者皆變而之他卦也繫辭曰變動不居周流六虛上下無常剛柔相易不可為典要唯變所適信斯言也則易之為書無非變也商瞿而下傳易者多矣而論卦變者可指數也考之於經其説皆有所合説卦震曰其究為健案消息卦坤一變震二變兑三變乾乾健也乾一變巽二變艮三變坤剝易曰柔變剛也序卦曰物不可以終盡剝窮上反下故受之以復剝之上九窮而反初乃成復卦此京房八卦相生變而成六十四卦之説也巽曰其究為躁卦乾鑿度曰物有始有壯有究故三畫而成乾究言巽之九三上九也虞翻曰動上成震巽三變成震震三變成巽舉巽一卦則知乾三變成坤坤三變成乾離三變成坎艮三變成兑説卦曰天地定位山澤通氣雷風相薄水火不相射六子皆以乾坤相易而成艮兑以終相易坎離以中相易震巽以初相易終則有始往來不窮不窮所謂通也此虞翻蔡景君伏曼容旁通之説也説卦曰乾天也故稱乎父坤地也故稱乎母震一索而得男故謂之長男巽一索而得女故謂之長女坎再索而得男故謂之中男離再索而得女故謂之中女艮三索而得男故謂之少男兑三索而得女故謂之少女此陸績所謂陽在初稱初九去之二稱九二則初復七隂在初稱初六去初之二稱六二則初復八矣卦畫七八經書九六七八為象九六為爻四者玄明此左氏所記卜筮之言曰之某卦之説也離卦曰既濟定也既濟六爻隂陽得位是以定也乾文言曰雲行雨施又曰大明終始雲雨坎也大明離也乾卦而舉坎離者言其變也隂陽失位則變得位則否九二九四上九陽居隂位故動而有坎離之象此虞氏所論動爻之説也訟彖曰剛柔而得中隨彖曰剛來而下柔蠱彖曰剛上而柔下噬嗑彖曰剛柔分動而明賁彖曰柔來而文剛分剛上而文柔無妄彖曰剛自外來而為主於內大畜彖曰剛上而尚賢咸彖曰柔上而剛下損彖曰損下益上又曰損剛益柔益彖曰損上益下又曰自上下下渙彖曰剛來而不窮柔得位乎外而上同節彖曰剛柔分而剛得中剛者陽爻也柔者隂爻也剛柔之爻或謂之來或謂之分或謂之上下所謂惟變所適也此虞氏蔡景君伏曼容蜀才李之才所謂自某卦來之説也夫質之於經而合考之義而通則王弼折之亦可謂誤矣先儒以魚為巽其多白眼乎巽為風蠱類之大者唯魚與蛇故魚有吞舟蛇或吞象如蠡魚亦云厲蛇所化北方層磎鼠在冰下西域火鼠毛可為布坎離之相易也運斗樞曰玉衡散而為鼠玉衡斗星亦言乎坎也易無非象也象著而形乃謂之器如坎有弓象非木非繩則其器不備巽變為坎然後弦木為弧乃有器之名矣自離至夬十三卦序聖人備物致用立成器以為天下利者皆取重卦之象故其制器取法皆有內外之象其用亦然網罟耒耜市貨衣裳舟楫牛馬門柝杵臼弧矢棟宇棺槨書契兩象也佃漁耒耨交易垂衣裳濟不通引重致逺待暴客濟萬民威天下待風雨治百官察萬民封木喪期亦兩象也罔舉綱紀通言之罟止言其紀而已傳言斷罟又言罟目是也巽為繩變為離離為目結繩為目罟也重目為綱自二爻至四爻有巽體巽為魚多白眼也自三至五有兑體兑為澤網罟入澤而魚麗之以漁也離為雉以佃也觀乎此庖羲氏既重六爻矣天地能變化成萬物者必水火雷風山澤合一焉所謂隂陽合德剛柔有體也隂陽者在天成象也剛柔者在地成形也萬物既成各得其一故健順動入陷麗止説其性各不同能備萬物而兼有之者人也故下舉八畜八體而終之以男女帝乘萬物出入終始所可見者萬物之迹而其用蓋妙乎萬物不可得而見焉故曰神也者妙萬物而為言易之乾坤分隂分陽迭用柔剛上下不居周流六虛蓋象乎帝也故曰陰陽不測之謂神聖人用易立法制器變通不倦故曰利用出入民咸用之謂之神水雷山乾也火風澤坤也雷風相薄山澤通氣水火不相射乾坤不相離也天地之撰物者如此而萬物皆有乾坤六子之象觀乎物則神明之德見矣故易之六爻變化必陰陽合德而剛柔有體其立法制器亦然王弼曰爻苟合順何必坤乃為牛義苛應健何必乾乃為馬不知凡健順者皆乾坤之象爻有變化雜而成文如不以健順論乾坤之性則説卦為贅矣輔嗣自繫辭而下不釋其義蓋於象數窮矣周以子為正而孔子彖象皆用建寅故以復為十一月姤為五月故曰行夏之時虞氏已有此論烏其乾巽乎四月純乾也黑者乾也占風者巽也巽變則離故其目赤又為日中之烏史言流火為烏又有赤烏白烏亦離乾巽之變乎貴賤剛柔吉凶變化四者皆天地之固有首言乾坤者六子皆本於乾坤也乾坤之道觀乎天地萬物之變化其道較然著見矣然反觀吾身乾坤安在哉蓋善端初起者乾也身行之而作成其事者坤也人皆有善端不亦易知乎行其所知不亦簡能乎飢而食渴而飲晝作而夜止豈不簡且易哉蓋以此推天下未有不知而不從者也我知之人亦知之故有親我行之人皆行之故有功有親則俟百世而不惑有功則放諸四海而準可久者謂之德可大者謂之業賢人之德業至於配天地成位乎兩間可謂久且大矣然不過健順而已而健順者在乎反求諸身而已豈不至易至簡哉知此則天尊地卑八卦相蕩在乎其中矣古之傳此者唯曾子子思孟子則然易之為道天地之道耶人之道耶易兼明之矣繫辭焉而明吉凶明人道也剛柔相推而生變化明天地之道也象非見天下之賾者不足以明之故聖人設卦觀象所謂吉凶剛柔變化無非象也得失之初微於毫髮及其有吉有凶則得失之象見矣憂慮虞度躊躇而不決者得失未判之時也及其有悔有吝而憂虞之象見矣凡此者明乎人之道也陰陽進退於子午孰知其然哉萬物蕃鮮而搖落則進退之象見矣所謂變化者不盡於是也此特其凡耳糾錯相紛死生相纒無非其變化也故曰變化者進退之象也日之升降於大空之中本無晝夜猶地而上觀之則出乎地為晝入乎地為夜然南極大暑北極大寒東西出入之際晝夜長短與中國自不同故剛柔之象亦然自六位觀之初為剛二為柔三為剛四為柔五為剛六為柔自陰陽之數觀之七九為剛六八為柔老陽之剛變為陰柔老陰之柔變為陽剛故曰剛柔者晝夜之象也凡此者明乎天地之道也吉凶也悔吝也變化也剛柔也四象之見動于六爻之中而六爻之動不過乎三三者極之道也蓋有天地斯有萬物是以卦之變不過乎三六位者重三也九數者三三也邵康節曰易有貞數三是也為是故君子所居而安者易之序也其安於髙卑貴賤之位乎所樂而玩者爻之辭也其玩於吉凶悔吝之辭乎若夫有為有行動而之焉則觀乎剛柔變化而吉凶悔吝之來可以前知矣夫髙卑貴賤吉凶悔吝剛柔變化無非天地也吾之動靜不離乎此則福自已求命自我作天地其不祐乎屯卦本坎二之初九二陽也初六陰也陽貴陰賤故曰以貴下賤大得民也動乎險中者非善下不能得衆非剛強不能濟弱故屯卦之用在此一爻坤雖臣道五實君位故為之戒云黃裳元吉黃中色裳下服言守中居下則元吉蓋伊尹周公之事也或曰安知非妻道也曰妻道之美盡於六三爻賁自泰來泰上之乾二乾二之坤上剛柔相文故曰賁天玄地黃玄黃者天地之雜也夫子筮賁愀然其色不平曰以其離乎所謂離者即乾上坤下相文之爻也王弼云卦變不足推致五行然釋中孚六三曰三四居陰金木異性木金云者五行也五行乾兑為金坤艮為土震巽為木唯坎水離火不二中不可以有二故也天積氣而為金者以位言也兑位西乾位西北自東言之震木生離火離火生坤上坤土生兑乾金兑乾金生坎水艮止也土也萬物之終始也蘇氏以復卦為始興之象故於彖論違天不祥於六四言自託於六五言陰之方盛而自度不足以抗初九於上六言乘極盛之末而用之不已不知初九又已復又曰盛必驟勝故敗在其終也伊川訓拂經為違常其説本於王肅頤虞氏謂晉四之初李挺之謂臨九二之上虞以頤初九為晉離離為龜案頤肖離頤通大過大過肖坎坎離交故亦有龜象郭璞得大壯之頤曰柔內剛外則畜緇易象難知者當以卜筮決之如郭璞以頤為龜是也既濟虞曰泰五之二李曰泰二之五其實一也二升而之五然後五降而之二當從李圗伊川解既濟九五曰中實孚也與虞氏孚實之象同又曰中虛誠也與郭璞筮得中孚之需曰虛中象道若虛舟同以此見伊川其於象蓋講之矣既濟之九三以剛處剛而用濟者故用二五爻象以發此爻用剛濟物之義乾君也坤為國為昏亂為鬼二之五成坎互成離有兵戈之象故髙宗伐鬼方克之三年者三爻也坎為勞卦故曰憊也必於九三言之者蘇子曰三之為五用也九三剛正處諸侯之位古者諸侯入為六卿出總六師未濟虞曰否二之五圗亦然未濟九四動而正故吉悔亡象曰貞吉悔亡志行也九四之剛其大臣沈勇而能斷大事者乎言不能盡意須觀象乃默然而自喻伏羲畫卦無文字文王作易乃有彖周公作爻辭至仲尼作彖象文言繫辭説卦觀其所遭之時考其言之詳略則可知矣同人蜀才曰夬九二升上上六降二圗姤初六升二九二降初當從圗郭璞曰魚者震之廢氣也巽王則震廢故虞以巽為魚坎虞曰乾二五之坤圗作臨初九升五六五降初今從圗坎五虞曰乾為嵗五從乾來案三男之卦無不自乾來者又坎自臨初之五蓋上六一爻動不以正而體重險動則陷于險中不得出矣失道然也故聖人取象専以失道言之動不以正失道也上六動則成巽巽繩也乾為嵗首亦以觀巽言之也易傳謂十為數極又十年不克征為終不可行而坎之上六三嵗為終不得出若以始終言之上六終也若以三嵗言之三非極數內外者卦之位進退者爻之時震巽皆為木者何巽之初草之根也震之初木之根也巽之二三木之在上也震之二三草之在上者也木有柔者木之草也草有剛者草之木也説卦舉一隅爾皇甫謐謂互體不可取而論明夷曰明久傷則坎體復而師象立矣得非武王以之乎不知明夷九三互有坎體師象已見乃成南狩易曰剛柔相摩八卦相蕩先儒謂陰陽之氣旋轉摩薄乾以二五摩坤成震坎艮坤以二五摩乾成巽離兑故剛柔相摩則乾坤成坎離所謂卦變也八卦相蕩則坎離卦中互有震艮巽兑之象所謂互體也王弼譏互體卦變然注睽六二曰始雖受困終獲剛助睽自初至五成困此用互體也注損九二曰柔不可全益剛不可全削下不可以無正初九已損剛以順柔九二履中而復損已以益柔則剝道成焉此卦變也故王昭素難弼曰若九二損已便成剝道則初九損剛九二弗損合成蒙卦三者易之極數也小成之卦三大成之卦六六即三也故雜卦反對陽生者六隂生者六而卦變本於隂陽所生十二卦他卦之變本於十二卦往來升降而成所謂旁行而不流或者復以八卦所生變六十四卦解之不知其變具於十二卦中師道不立有不知而作者也劉曰乾爻辭易睽爻辭怪坎爻辭僻所謂辭易辭怪辭僻所謂辭有險易也漸虞曰否三之四圗亦然漸之成卦在六四一爻漸者否三之四柔進得位往承五而有功虞以四為婦漸巽上艮下有男下女之象故其卦以夫婦明相交之義虞謂三動離毁上之三成既濟誤也九五婦三嵗不孕者天地不交之時六四柔進得位往有功則既交矣六四婦貞九五之所願得也如明夷上六初登于天離明出地上以明後入于地此之謂曲而當九五言陵亦借否象言之艮為山巽為髙大阜之象上九極矣而言陸者明進退也虞氏論象太密則失之於牽合而牽合之弊或至於無説此可刪也説卦不論進退往來上下內外則不足以明周流六虛矣漸有進退之象故諸爻以鴻明之豐虞曰從泰二之四又曰從噬嗑上來之三今圗從泰豐彖不取二之四為義而以兩體明之曰明以動故豐星月之光皆離之陽也故坎離以中相易而賁分剛上而文柔輔嗣以初九配在四初四俱陽爻故曰均輔嗣以九三應在上六志在于陰亦未足免於暗也橫渠云欲絶去上六亦此意也輔嗣以九四陽居陰得初以發夷主吉諸儒皆不以得初發夷主蘇氏用之輔嗣以六五以陰之質來適尊陽之位能自光大輔嗣以上六以陰處極而最在外不履於位深自幽隱絶迹深藏者也蘇氏曰六五上六處上而暗者也初九六二九三九四處下而明者也案豐本泰卦二之四成豐所謂九四即乾之九二往而成離者也故皆有明象五六本坤陰故皆有暗象初九配四與上同然以初因適五五亦求陽為均則不同蘇氏言五求陽然一陰納二陽不得為均四適五五為夷主謂九四當位則明照天下似通乎象矣六五來章為虛已以來二陽謂之來者我來彼也勝於輔嗣肱輔上體者也此象越諸儒之表蘇氏曰來二陽則陰陽交錯而成章亦論象矣橫渠凡言往者皆進而上知此象者也涑水以六二蔀覆幽塞不見知於人張弼以巽為蔀案震巽為草莽上與坤交亦有蔀之象然則豐其蔀其斾其蔀其屋皆就本爻言之輔嗣曰蔀覆曖鄣光明之物又略例曰大暗之謂蔀鄭康成作菩云小席也陸希聲曰茂盛周匝之義也案坤為冥暗震巽為草莽豐之離在震巽之下而交於坤是明為草莽周匝蔽蔀之象天文東方三十星為蒼龍南方六十一星為朱鳥西方五十星為白虎北方二十三星為玄武蒼龍白虎朱鳥玄武相望而跱勾陳六星在紫宫中螣蛇二十二星在營室北營室天子之宫皆中宫經星也二十八舍星隨天右行一嵗三百六十五度北斗魁杓隨月而建左行以正月言之蒼龍在寅白虎在申朱鳥在已玄武在亥勾陳在丑螣蛇在辰斗杓隨月是以蒼龍在寅二在卯三在辰其餘五位隨天而改孟喜京房之學其書槩見於一行所集大要皆自子夏傳而出鄭氏傳馬融之學多論互體陸績之學始論動爻胡旦論豐上六曰乾極則悔泰極則隍豫極則冥萃極則歎履考祥而元吉賁白色而無咎井勿幕而有孚艮敦艮而厚終人道之美可不念哉如明夷之飛為小過之鳥井之乾為初九之禽豐之乾為上六之翔皆取離卦一爻為象儀禮少牢饋食資黍注云今文咨作齎今易文齎注作咨解則齎咨古通用也説文卦筮也徐鉉曰從挂省章察曰挂之牆壁以觀其兆案筮宅儀主人北面命筮者在主人之右筮者東面抽韇執之南面受命既命筮人許諾北面而筮卦者在左畫爻卒筮執卦以示命筮者命筮者受主人視反之東面旅占卒進告于命筮者與主人則畫爻挂之旅占其從否當從挂省矣巽為繩汲水為繘九二汔至此未及泉也自二至四有反巽之象故又為亦未繘井言未收繘而至井也荀爽解中孚曰兩巽對合外實中虛則古人取象有用反卦為象者於此可見井初六井泥不食舊井無禽者乾之初九去而坤之六五來也九二井谷射鮒甕敝漏者動而求則乖也九三井泄不食者正可任也為我心惻可用汲者上六病也王明並受其福者九三進也九四井甃無咎者陰守正也九五井冽寒泉食者乾之初九位中正也上六井收勿幕者上六安位可戒也有孚元吉者上六下而汲九三引而上則功乃大也乾為美又為嘉嘉美之至也乾坤合德乃有是象坎北方也其色玄者赤黑也赤者乾陽也黑者坤隂也其在藏為腎腎有二左腎藏精陽也右腎藏血隂也其在卦為坎兑坎陽也兑隂也乾金也兑又為金坎水也兑又為澤艮土也坤又為土震木也巽又為木離火也火藏於水以此見無一物不具隂陽者爻有一爻而取兩象者丁寧重復而非繁也鼎之初六取顛趾出否又取得妾以其子皆喻得人亨有就卦體言之不論應與者震亨兑亨是也虞曰陽爻三十六陰爻二十四三爻一百二十曰三百者舉大槩也易傳曰乾坤之變為巽艮巽艮重而為漸在漸體而言中二爻交也由二爻之交然後男女各得正位觀此則伊川亦用卦變矣剛柔相推推移也剛柔之爻相推移則變化生或曰坤為民者謂全坤也曰不然也陽卦一君而二民陰卦二君而一民君乾也民坤也豈謂全坤全乾哉一元之氣變為四時人自嬰兒少壯老耄死亡亦止於四變荀爽九家集解坎為狐子夏傳曰坎稱小狐孟素曰坎六也狐穴居王肅曰坎為水為險為隱伏物之在狐穴居隱伏往來水間者狐也乾為馬坤陰變之為牝馬此通一卦之象言也乾六龍而於卦象不言者乾散為三百八十四爻之象也乾卦取象自坤變積坎成乾又逐爻變初變巽二變離三變兑四變巽五變離上變兑坤卦取象自乾變姤積而成坤又逐爻變初震積而成乾言乾坤無首尾也正字足以盡貞乎曰不足以盡之貞有堅固守正之意有以守柔為正者有以守剛為正者有雖柔也當堅守乎其剛所謂用六也元亨利貞四者皆周流圓轉以盡易之用故非知變不足以盡之或厲或悔或吝不善用之者也聖人既畫卦如畫陽三爻也命之曰乾乾健也健一字足以盡三畫之義而乾之中又包元亨利貞四德此四字亦聖人圓融會合以形容其用如明道要忠恕合為一字終不能也聖人以仁字合而言之王肅曰西南陰類故得朋東北陽類故喪朋荀曰隂起午至申得坤之一體陽起子至寅喪坤之一體京曰女既嫁降父之服臣既仕先公後私斗六星二十六度天廟也危二星十度冢宰之官主邑居廟堂祭祀之事又曰北方入冥而天形也為祠為廟北方鬼神之府幽暗之方乾坤之變同生於震何也乾自震變坤亦自震變此迎之莫見其首隨之莫見其尾也先天坤生震震生離離生兑兑生乾乾生巽巽生坎坎生艮艮生坤坤復生震此大易之祖也故於乾坤象之乾一變復坤一變姤獨乾又一變巽再變離三變兑與坤不同何也三五之變八卦皆同而始於乾故於乾盡之尊卑等也明夷傷也傷者必有所過故明夷變小過訟者不信也信則無訟故訟變中孚乾貞於子而左行今占家自子至戌順行六位坤貞於未而右行今占家自未至已逆行六位有因前爻之動以為象者如咸九五咸在脢明夷之二夷于左股離為日坎為月離乾體也而坤索之坎坤體也而乾索之乾天也日月得乎天之理是以久照乾陽也坤陰也陰陽之精互藏其宅是以不息日行天之一度者坤體也月行天之十三度有竒者乾體也日月十二會會必於二十八舍者乾坤之合也同道則食相望則薄精不可以二也既午則昃已望則食中不可以過乎乾坤三變而成六卦乾一陰下生三變而成六卦坤一陰下生三變而成六卦乾卦二陰下生者六變成十二卦坤卦二陽下生六變成十二卦六變亦三也乾卦三陽下生者六變成十二卦坤卦三陽下生六變成十二卦大抵皆三以變也五隂一陽自復來一爻五變成五卦五陽一隂自始來一爻五變成五卦四陰二陽自臨來五復五變成十四卦四陽二陰自遁來五復五變成十四卦三陰三陽自泰來三復三變成九卦三陽三隂自否來三復三變成九卦大抵皆五以變三以變也卦以剛柔升降通內外之變遂成天地之文也九極陽也六極陰也九六相變陰陽迭用遂定天下之象此制器者所以尚象也易無思也無為也寂然不動太極未分時也感而遂通天下之故兩儀四象八卦生吉凶也仁者見其靜則謂之仁智者見其動則謂之智君子之道則合仁與智䇿以十六合十二則二十八者少隂之䇿也二十四合三十六五十也二十八合三十二亦五十也非大衍五十而其用四十有九乎剝五陰潰於內猶魚爛也復一陽自外來而復於內則亂極而反正也玄曰陰不極則陽不芽王弼注賁曰坤之上六來居二位柔來文剛之義也乾之九二分居上位分剛上而文柔之義也此即卦變也而弼力詆卦變是終日數十而不知二五也至隱之中萬象具焉見而有形是為萬物人見其無形也以為未始有物焉而不知所謂物者實根於此今有形之初本於胞胎胞胎之初源於一氣而一氣而動絪緼相感可謂至隱矣故聖人畫卦以示之一畫之微太極兩儀四象八卦無所不備謂之四象則五行在其中矣太極者陰陽之本也兩儀者陰陽之分也四象者金木水火土也八卦者陰陽五行布於四時而生萬物也故不知八卦則不知五行不知五行則不知隂陽不知隂陽則不知太極人孰知太極之不相離乎不知太極則不可以語易矣故曰易有太極乾納甲壬甲子甲寅甲辰而闕甲午甲申甲戌於壬亦然坤納乙癸乙未乙已乙卯而闕乙丑乙亥乙酉於癸亦然者何此納甲也非納音也納音則十日十二辰合而成聲納甲則八卦納十干而十二辰各從其一亥子水辰戌丑未土寅卯木已午火申酉金不以納音論也甲壬得戌亥者均謂之乾不以其甲子壬子也乙癸得未申均謂之坤不以其乙未癸未也故論乾則甲子壬子同甲寅壬寅同甲辰壬辰同甲午壬午同甲申壬申同甲戌壬戌同論坤則乙未癸未同乙已癸已同乙卯癸卯同乙丑癸丑同乙亥癸亥同乙酉癸酉同或曰參伍以變者乾一變姤二變遁三變否四變觀五變剝此伍以變也五變極矣故四變晉下體復乾為大有又乾一變巽二變離三變震三變極矣故四變兑五變坤六變坎復三變又七變艮是乎曰非也三五不相離也五者參天兩地而倚數三極數也而具五行小衍也三在其中以重卦論之乾三變坤姤巽也遁艮也否坤也參以變也四變觀亦巽也五變剝亦艮也伍以變也伍以變則復以三變故艮變離下體坤復變為乾亦三變也以小有卦論之乾一變巽二變離三變震三以變也次自中二爻變而下故四變兑五變坤次自中爻變而上故六變坎七變艮二即五也初自下爻三變即前參以變也次自中爻下而二變次自中爻上而二變即前伍以變也參去伍伍去參皆不能變此三所以為極數五所以為小衍也天地之運也陰陽三五一五而變為七十二候二五而變為三十六旬三五而變為二十四氣凡三百六十五周而復始日月軌度積於餘分或以參綜伍或以伍綜參交錯而行者也長女東南中女正南少女正西母西南長幼相次三女夾母而處親之也父西北中男正北少男東北長子正東長子代父二子隨行而立尊之也親之故同養尊之故異宫父母位嚴男女異長天地萬物之理則然矣劉牧畫圗為乾者四為坤者四乾天左旋坤地右轉乾坤上下自然相交而成六子則非數策之義也氣聚為精精聚為物形始化曰魄氣能動曰魂傳曰心之精爽是為魂魄子産曰人生始化曰魄既生魄陽曰魂及其散也形散而魄散氣散而魂散故季札曰魂氣則無不之也魄陰也魂陽也陰陽轉續觸類成形聚者不能無散散者不能無聚屈伸相感陰陽之變也神申也其氣聚而日息鬼歸也其氣散而日消物其形也散其情也然則氣何從生乎曰太虛者氣之本體人容也動則聚而為氣靜則散為太虛動靜聚散有形無形其鬼神之情狀乎太史公曰儒者不言鬼神而言有物何也曰人之死也各反其根體魄陰也故降而在下魂氣陽也故升而在上升則無不之矣今也魄降而氣不化非物而何所以不化者物欲蔽之也子産曰其用物也洪矣其取精也多矣故聖人死曰神賢人死曰鬼衆人死曰物聖人清明在躬志氣如神故五帝配上帝傅説上比列星賢人得其所歸衆人則知富貴生而已其思慮不出於口腹之間衽席之上夸張於世以自利焉物欲蔽之不能自反其初故謂之物然物之乘間而出豈離乎五行哉五行即陰陽二端也故管輅論杜伯如意宋無忌皆以五行推之今人行氣中或聞鬼哭或聞鬼呼其人逢之愕然忤視俄且化矣謂誠有是也而不知氣也非氣之不化者乎觀此則知鬼之與物矣謂鬼為物察之而未至也蓍四十九總而為一參天也分而為二兩地也挂一者參天也揲之四者兩地也歸竒於扐者兩地而又參天也四者七九六八也七者少陽九者老陽八者少陰六者老陰三變而成爻十有八變而成卦三變者參天也十有八變者兩地也故曰觀變於隂陽而立卦三變者參天也五變者參天而又兩地也變而上三變而兩變而下兩變而三上下無常變動不居故曰發揮於剛柔而生爻曰發揮曰生者言變動也隂陽天剛地柔也立卦之前象未著故曰隂陽以立天道也立卦之後象乃見故曰剛柔以立地道也隂陽用也剛柔體也用之謂道體之謂德體用無間和會為一順而行之則動靜語默皆得其宜故曰和順道德而理於義天地萬物共由一理其理順而不妄深明其源乃能一天人合內外體用無間矣此之謂盡性盡性則通晝夜之道而知其於窮達夀夭以正受之不二其心矣此之謂立人道道德有義性命有理義也理也同出於一太極者中之至也天地之大本也所以生天地者也天地分太極萬物分天地人資天地之中以生觀乎人則天地之體見矣故曰惟皇上帝降衷于民而人之心者又人之中也寂然不動太極􅍭三也感而遂通則天地位矣萬物育矣自一嵗言之冬至也自一日言之夜半也此大玄八十一首所以起於中歟小過者明夷初之四二卦相因而成明夷初九曰明夷于飛小過彖曰飛鳥遺之音震為出巽為入者以陽為主也自坤出震成乾自乾入巽成坤消盈虛與時偕行出者升也入者降也鬼神無形者也而曰乾為神坤為鬼何也曰鬼神者天地之用二氣之良能不可以形求者也聖人仰觀俯察四時之運日月之行寒暑晝夜一幽一明萬物由之以死由之以生故寓之於乾坤萬物資始於乾資生於坤莫不有天地之體而各有所本本於天者動物也故以呼吸為聚散之漸本於地者植物也故以隂陽升降為聚散之漸聚之謂生精氣為物也散之謂死逰魂為變也其始生也氣日至而滋息至之謂神以其申也及其既盈氣日反而逰散反之謂鬼以其歸也天曰神地曰示人曰鬼神示者歸之始也人鬼者來之終也寒來則暑往夜盡則晝明屈伸相感生生不窮而亦未嘗死未嘗生聖人以此觀天地以此知死生以此知鬼神天地也人也鬼神也一而已矣管仲曰流行於天地之間謂之鬼神藏於胸中謂之聖人坎北方卦也冬至坎始用事陰氣方難水凝地拆而物生亦難陽陷乎陰中也故坎為險難又為勞卦者坎用事則水歸其澤物歸其根勞也故坎水上行亦謂之勞井勞民勸相是也至者何往者以外為至來者以內為至伊川易傳損六三曰三陽同行則損九三以益上三隂同行則損上以為三三人行則損一人也上以柔易剛而謂之損但言其減一耳上與三雖本相應由二爻升降而一卦皆成兩相與也初二二陽四五二隂同德相比三與上應皆兩相與則其志專皆為得其友也傳言損三益上損上為三以柔易剛二爻升降此正論卦變也橫渠易解損九三上九曰六三本為上六上九本為九三解益曰否卦九四下而為初九故曰天施地生又曰損上益下又曰自上下下則橫渠言卦變矣蘇氏解需光亨曰光者物之神也此關子明之説也或問神曰日月在上其明在地夫日月之形其大如盤盂光之所燭被乎萬物非神乎蓋神難言也故以光形容之君子動而有光廣大無所不及故易言未光未光大者皆狹且陋也訟反需者也需四之五剛往而得位二陰避之故曰亨訟三之二剛來而失位二陰塞之故曰窒需有孚而亨於外故物需之訟有孚而窒於內故已訟之或曰乾當在上處乎下則必升坤當在下處乎上則必降此言否泰可也於訟無妄不通矣訟四剛來而得中無妄曰剛自外來而為主於內二卦陽爻皆四畫蓋訟者遁三之二無妄者遁三之初凡言來者皆自外來初二視三則外矣小畜以陰畜陽惟九三一爻受畜所畜者寡矣履以柔履剛六三不有其位履之而不處也王弼謂比九五為比之主而有應任二顯比者也比而顯之則所親狹矣則以不變論易於初六言處比之首應不在一心無私吝則莫不比之故於九五應二則言其狹也天地之間陰必比陽未有無應而相比者初六不變則缶虛而不汲失有孚盈缶之象矣三驅之禮禽逆來趣已則舍之背已則射之顯比也雖有愛惡而愛惡出於彼之來去吾豈容心哉三苗逆命禹乃徂征不比也七旬來格舜則捨之顯其比也比之與否舜禹非私也用中之道也若曰顯比非大人之吉此可以為言所使使之者誰歟舜命禹征亦使之也嘻人胡旦云嘻當作􅻱音垤齧堅聲也古字與嘻通用漢上易傳叢説
