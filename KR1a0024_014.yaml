body:
  text: 漢上易傳卦圖宋朱震撰右圖納甲繫辭曰懸象著明莫大於日月虞曰謂日月懸天成八卦象三日暮震象月出庚八日兌象月見丁十五日乾象月盈甲壬十六日旦巽象月退辛二十三日艮象月消丙三十日坤象月滅乙晦夕朔旦則坎象水流戊日中則離離象火就已土位象見於中日月相推而明生焉坤彖曰西南得朋東北喪朋虞曰陽喪滅坤坤終復生此指説易道陰陽之大要也又曰消乙入坤滅藏於癸右圖坎坤體離乾體乾坤壬癸會于北方乾以陽交坤而成坎所謂流戊也坤以陰交乾而生離所謂就已也戊陽土也乾之中畫也已陰土也坤之中畫也陽為實故月中有物陰為虛而白故自正中則成白晝日月十二會不會則光明息矣右圖蠱彖曰先甲三日後甲三日終則有始天行也虞曰謂初變成乾乾為甲至二成離離為日乾三爻在前故故先甲三日賁時也變三至四體離至五成乾乾三爻在後故後甲三日無妄時也易出震消息厯乾坤象乾為始坤為終故終則有始乾為天震為行故天行也右圖巽九五貞吉悔亡無不利無初有終先庚三日後庚三日吉虞曰震庚也謂變初至二成離至三成震震主庚離為日震三爻在前故先庚三日謂益時也動四至五成離終上成震震三爻在後故後庚三日也巽初失正終變成震得位故無初有終吉震究為蕃鮮白為巽也巽究為躁卦謂震也又曰乾成於甲坤成於庚陰陽天地之終始故經舉甲庚於蠱彖巽五也右圖月三日成震震納庚十五日成乾乾納甲三十日成坤滅藏於癸而復出震右圖春分旦出於甲秋分暮入於庚右圖乾六爻震為龍而乾之六爻為龍何也曰奮乎重陰之下者震之動也潛升以時其用不窮者乾之健也乾者息震而成也天文東方之宿蒼龍之象其角在辰其尾在寅震者卯也乾始於子成於己故陽復於十一月者乾之初九也亦震也説卦震曰其究為健元之中冬至之氣象中孚也其次三木也東方也故曰龍出于中首尾信可以為庸元文曰龍出乎中何為也曰龍德始著者也陰不極則陽不生亂不極則德不形所謂陰極生陽則乾之初九也右圖坤初六乾為寒為冰何也曰坤坎之交乎乾也露者坤土之氣也至於九月坤交乎乾白露為霜故霜降為九月之候冰寒水也乾交乎坎也乾位在亥坎位在子大雪者十一月之節玄之難大雪也其辭曰陰氣方難水凝地坼陽弱於淵夫坤之初六五月之氣姤卦也是時豈唯無冰而露亦未凝何以言履霜堅冰至曰一陰之生始凝於下驗之於物井中之泉己寒矣積而不已至于坤之上六則露結為霜水寒成冰是以君子觀其所履之微陰而知冰霜之漸乾為金也故霜肅殺而冰堅強右圖消息之卦坤始於午至亥而成陰之極也道之窮也乾西北方之卦也乾坤合居陰凝於陽為其兼於陽也故稱龍焉古文周易曰為其兼於陽也木剛則利水凝則堅陰凝於陽則必戰侯果謂陰盛似龍非也震為玄黃何也曰以坤滅乾坤終生陽震陽也天地玄黃何也曰乾言其始坤言其終也坎為黑乾之初九始於坎息而至已午為火大赤也坎黑也赤黑為玄坤之初六始於離離之中爻坤也息而至亥成坤故十一月陽氣潛萌於黃宮黃宮者乾始於坤也坤之上六陰陽交戰坤終而乾始故曰玄黃震者乾始也太元謂十月之氣曰深合黃純廣含羣生又曰冬至及夜半以後者近玄之象也冬至夜半子也坎也乾之始也青赤謂之文乾坤相錯也赤白謂之章坤終乾也纁者坤始於離也右九六者陰陽之變也陽至九而變陰至六而變九變則六六變則九陰陽合德九六相用乾坤未始離也天之運行自復九十日至於泰之上六自大壯九十日至於乾之上九自姤九十日至於否之上九自觀九十日至於坤之上六成三百六十日為陽候者三十有六者九也為陰候者三十有六者六也積十有二月而七十二候九六之變循環無窮是以乾用九其策亦九坤用六其䇿亦六太玄明乾坤之用者也故天玄三曰中羡從地玄三曰更晬廓人玄三曰減沈成首各有九九九八十一始於冬至終於大雪陰陽相合周流九變右圖坎離天地之中乾坤鬼神也坎離日月水火也艮兌山澤也震巽風雷也坎離震兌四時也坎離天地之中也聖人得天地之中則能與天地日月四時鬼神合先天而天弗違聖人即天地也後天而奉天時天地即聖人也聖人與天地為一是以作而萬物覩同聲相應震巽是也同氣相求艮兌是也水流濕火就燥坎離是也雲從龍風從虎有生有形各從其類自然而已右先儒論八月不同孔頴達從建丑至建申褚氏從建寅至建酉何氏王昭素胡旦從建子至建未考陰陽消息之理二陽生則剛長二陰生則柔長剛長則君子之道息小人之道削柔長則君子之道消小人之道息易舉消息之理以明吉凶之道以建子至建未為正論臨至於八月有凶鄭康成虞翻以八月為遁荀爽蜀才以八月為否當從鄭虞文王繫卦辭周月始建子臨丑月卦也自子數之為二月至於未為八月遁未月卦也劉牧曰遁之六二消臨之九二又卦略曰臨剛長則柔微柔長故遁易傳亦然右圖七日來復子夏曰極六位而反於坤之復其數七日其物陽也京房曰六爻反復之稱陸績曰六陽涉六陰又下七爻在初故稱七日日亦陽也虞翻曰消乾六爻為六日剛來反初蓋先儒舊傳自子夏京房陸績虞翻皆以陽涉六陰極而反初為七日至王昭素乃始暢其説曰乾有六陽坤有六陰一陰自五月而生屬坤隂道始進陽道漸消九月一陽在上衆陰剝物至十月則六陰數極十一月一陽復生自剝至十一月隔坤之六陰陰數既六過六而七則位屬陽以此知過坤六位即六日之象也至於復為七日之象是以安定曰凡厯七爻以一爻為一日故謂之七日伊川四七變而為復故云七日蘇子曰坤與初九為七其實皆源於子午夫陽生於子陰生於午自午至子七而必復乾坤消息之理也故以一日言之自午時至夜半復得子時以一年言之自五月至十一月復得子月以一月言之自午日凡七日復得子日以一紀言之自午歲凡七歲復得子歲天道運行其數自爾合之為一紀分之為一歲一月一日莫不皆然故六十卦當三百六十日而兩卦相去皆以七日且卦有以爻為歲者有以爻為月者有以爻為日者以復言七日來復者明卦氣也陸希聲謂聖人言七日來復為厯數之微明是也以消息言之自立冬十月節至大雪十一月節坤至復卦凡厯七爻以卦氣言之自冬至十一月中氣卦起中孚至復卦凡厯七日聖人觀天道之行反復不過七日故曰七日來復彖曰七日來復天行也王輔嗣曰復不可逺也夫天道如是復道豈可逺乎豈惟不可逺亦不能逺矣諸儒七日來復義七日來復彖曰七日來復天行也王輔嗣云陽氣剝盡至來復時凡七日以天之行反復不過七日復之不可逺也孔頴達曰陽氣始剝盡謂陽氣始於剝盡之後至於反復凡經七日案易稽覽圖云卦氣起中孚故坎離震兌各主一方其餘六十卦卦有六爻别主一日凡主三百六十日餘有五日四分日之一者每日分為八十分五日分為四百分日之一又分為二十分是四百二十分六十卦分之六七四十二卦别各得七分每卦得六日七分也剝卦陽氣之盡在於九月之末十月當純坤用事坤卦有六日七分坤卦之盡則復卦陽來是從剝盡至陽氣來復隔坤之一卦六日七分舉成數言之故輔嗣言凡七日也兩漢諸儒傳經皆用六日七分之説故孔穎達述而明之輔嗣論其大意而已至國朝王昭素王沿宋咸始著論駮之胡旦明其不然今録其語而彌縫其闕云王昭素曰注疏並違夫子之義序卦云物不可以終盡剝窮上反下故受之以復以此知不剝盡也況剝上九有一陽取碩果之象碩果則不剝盡矣坤為十月卦十月純隂用事猶有陽氣在內故薺麥先生直至坤卦之末尚有龍戰之象龍亦陽也假使運有剝喪之時則商王受剝喪元良賊虐諫輔乃億兆夷人離心離德當此之時豈無西伯之聖德箕子之賢良乎則知陽氣必無剝盡之理況陰陽者剛柔迭用變化日新生生所資永無盡矣胡旦難昭素曰夫積陽則萎凝水則載男老則弱女壯則雄故靡草死於始夏薺麥生於孟冬數已盡而氣存時已極而物反天地之常理陰陽之本性陰之極有龍戰之災故剝盡則復窮上反下皆正理也言窮者剝之盡也言反者復之初也何知西伯箕子非剝喪之人哉昭素未之辨也臣曰陰剝陽盡而成坤陰極陽反而成復天之行也以時言之九月剝十月坤十一月復以理言之陽無剝盡之理故坤之上六龍戰于野為其嫌於無陽也上六則十月也説卦曰乾西北方之卦也西北方亦十月也序卦曰物不可以終盡剝窮上反下故受之以復非特此也五月一陰生其卦為姤積而成坤故坤下有伏乾十一月一陽生其卦為復積而成乾故乾下有伏坤反復相明以見生生無窮之意蓋書不盡言言不盡意天地陰陽不可以一言盡故也王胡達序卦之義而未盡夫説卦變卦之妙是以其論如此然各有所長不可掩也王昭素曰注云至來復時凡七日注用凡字取七日之義即約酌而已然未見指歸也疏引易緯六日七分以十月純陰用事有六日七分坤卦之盡則復卦陽來疏文此説未甚雅當其六日七分是六十四卦分配一歲之中時日之數今復卦是乾坤二卦陰陽反復之義疏若實用六日七分以為坤卦之盡復卦陽來則十月之節終則一陽便來也不得到冬至之日矣據其節終尚去冬至十五日則知七日之義難用易緯之數矣今論七日者不離乾坤二卦天地陰陽之理乾坤者造化之本乾有六陽坤有六陰自建子而一陽生至已統屬於乾自建午而一陰生至亥統屬於坤胡旦難昭素曰西漢京房以卦氣言事皆有效驗東漢郎顗明六日七分之學最為精妙夫卦之爻則實數也歲之日則虛數也歲月不盡之數積而為閏則加算焉六日七分實數也三百六十五日有餘焉故算而為閏昭素言從十月終至冬至尚有十五日未明歲月之積閏術數之精妙也惜乎緯文喪失京郎已亡學者難知但慿臆説後生穿鑿罕得師資是以紛然而致論也臣曰昭素知九月剝十月坤十一月復而不知此言其大綱耳坎離震兌各主一方六十卦分主一歲卦有六爻爻主一日凡三百六十日餘五日四分日之一又分於六十卦每卦六日七分氣之進退推蕩而成如九月剝也有艮有既濟有噬嗑有大過凡五卦而後成坤十月坤也有未濟有蹇有頤有中孚凡五卦而後成復説卦言坎北方之卦也震東方之卦也離南方之卦也兌正秋也於三卦言方則知坎離震兌各主一方矣於兌言正秋者秋分也兌言秋分則震春分坎冬至離夏至為四正矣復大象曰先王以至日閉關所謂至日者冬至也於復言冬至日則姤為夏至而十二月消息之卦可知矣復彖曰七日來復則六十卦分主一歲卦有六爻爻主一日可知矣繫辭曰三百八十四爻當期之日蓋六十卦當三百六十日四卦主十二節十二中氣所餘五日則積分成閏也大綱而言則剝九月坤十月復十一月故京房曰剝復相去三十日别而言之復主冬至冬至中氣起於中孚自中孚之後七日而復故曰七日來復譬如辰為天樞而不動之處猶在極星之下聖人之言居其所者曰北辰而占天者必曰極星之下詳略異也厯代先儒唯玄能得其旨故玄一中二羡三從四更五晬六廓七減八沉九成中者象中孚之卦冬至之節日起牛宿一度斗建子律中黃鍾夏后氏之十一月也其入牛宿之五度為周周者象復卦冬至之後周復也宋衷陸績曰易七日來復是也夫京房學於焦贛其説則源於易矣自揚子雲馬融鄭康成宋衷虞翻陸績范望並傳此學而昭素非之奈何王洙曰孔穎達雖據稽覽圖以釋王傳而易緯消息之術月有五卦卦有大小有諸侯有大夫有卿有公有辟五卦分爻迭主一日周而復始終月而既不連主七日則是剝盡至復全隔一月恐王傳之旨不在此義也當以七為陽數陰陽消復不過七日天道之常也凡消息據陽而言之陽尊陰卑也臣難王洙曰輔嗣之意謂陽為陰剝其氣始盡至於陽氣來復之時凡七日而已何故如是以天道之行反復不過七日復之不可逺也蓋本於天矣穎達以易消息之術考之月有五卦五卦分爻迭主一日周而復始終月而既以成一歲其六十卦之相去不過七日陰陽消復天道之常則輔嗣所謂復之不可逺也其言驗矣孰謂王傳之旨不在此哉宋咸曰卦氣起中孚如何曰京房郎顗關子明輩假易之名以行其壬遁卜祝陰陽術數之學聖人之旨則無有焉嗚呼好怪之甚也文王周公仲尼悉以陰陽剛柔進退消長得失存亡之象為之教云爾又何以是卦直是月是爻直是月云云之為乎夫卦氣何不起於他卦而獨起於中孚乎臣難咸曰六壬推日月行度參以時日得易之坎離者也遁甲九宮八門得易之河圖者也壬遁得易之一端而不盡易之道散而為陰陽術數之學易亦何往而非陰陽哉故曰易以道陰陽又曰立天之道陰與陽立地之道柔與剛聖人推陰陽剛柔進退消長之理為得失存亡之象其道一歸於仁義而未始不原於天地咸信進退消長而不信消息之卦是終日數十而不知二五也又謂諸儒假壬遁言易學以籠天下不知壬遁實出於易言易者亦何假壬遁哉咸謂易書所不及者為聖人之旨無有焉且如河圖洛書見於繫辭而河圖四十五洛書五十之數傳於異人安得以為聖人之旨無有哉中孚十一月之卦也以歲言之陽始於冬至以厯日言之日始於牽牛以日言之晝始於夜半以人言之慮始於心思咸謂何不起於他卦真不知者也且不信直卦則陽生為復陰生為姤臨至于八月有凶八月不知果何月也夫善味者别淄澠之水善聽者知要妙之音善視者察秋毫之未咸讀易疏惡易緯之學而并廢消息之卦豈得為善觀書者乎劉遵曰天行躔次有十二陰行其六陽行其六當於陰六陽失位至於七則陽復本位此周天十二次環轉反復其數如此施之於年月日時並同故一日之中七時而復一月之中七日而復一年之中七月而復一紀之中七歲而復今云七日者取其中而言則時月年從可知也胡旦難劉遵曰一日之中從夜半至日中一年之中從建子至建午言其復也亦以陰陽之數也若一月之中七日一紀之中七年則未知陰陽之復如何也若天之十二次環轉反復周而無窮則未聞從玄枵至星紀何者為陰何者為陽以寅卯子丑言之則天之十二辰也其以子為陽丑為陽耶左轉之也與天戾矣劉遵之論妄也臣曰遵論陰陽運行之數得天道之行七日必復之理但不本於乾坤二卦消息之象以論之是以其言近乎漫漶要之亦有所長未可斥之以為妄也夫陽生於子陰生於午自午至子七而必復以一日言之自午時至夜半而復得子時自一年言之自五月至十二月而復得子月以一月言之自午日凡七日而復得子日以一紀言之自午歲凡七歲而復得子歲天道運行其數如此合之為一紀分之為一歲一月一日莫不皆然故六十卦當三百六十日而兩卦相去皆以七日聖人所以存其七日來復於復卦者明卦氣也陸希聲謂聖人言七日來復為厯數之微明是也王洙曰凡陰息則陽消自五月至十一月其日之厯行天七舍而陽氣乃復故云七日來復復初體震震居少陽其數七復則君子道長因慶之也慶在乎始其言速故稱日取乎日行一舍也陳難王洙曰周天三百六十五度二十八舍日行一度為一日行一舍與月合朔為一月洙取日行一舍故稱日蓋用禇氏莊氏變月言日者欲見陽長欲速大同而小異要之日行七舍自是七月安冇變月言日之理且如詩言一之日二之日止是省文蓋言十一月之日十二月之日也王昭素曰乾有六陽坤有六陰一陰自五月而生屬坤陰道始進陽道漸消九月雖有一陽在上無奈衆陰之剝物也至十月則六陰數極十一月一陽復生自剝至十一月隔坤之六陰六陰盛時一陽自然息迹陰數既六過六而七則位屬陽以此知過坤六位即六日之象至於復為七日之象矣胡旦難昭素曰易緯以剝卦陽氣之盡在九月之末十月純坤用事隔坤一卦六日七分陽氣來復昭素以五月一陰生至九月雖有一陽無奈衆陰之剝物至十月六陰數極十一月一陽復生此則謂昆為兄竊禇莊之美為已力者也臣曰昭素雖掠禇莊之美其論乾坤消息陰陽六位周而復始得易之象虞翻陸績推六十卦以解太元八十一首於中言象中孚於周言象復是於六日七分卦氣之學既篤信之矣而翻注七日來復曰消乾六爻為六日剛來反初七日來復天行也績注京房易傳曰六陽涉六陰反下七爻在初故稱七日日亦陽也豈唯虞陸之學如此論六十卦者京房也而房作復傳曰七日來復六爻反復之稱蓋天地之間有是理則有是象有是象則有是術其致一也故子夏曰極六位而反於坤之復其數七日其物陽也安定曰凡厯七爻以一爻為一日故謂之七日伊川曰七變而為復故云七日蘇氏曰坤與初九為七皆言七日之象也易之為術深逺矣故鼎祚於此請俟來哲若陸希聲劉牧王洙龍昌期以七為少陽之數則無取焉一曰策數二曰爻數三曰卦數四曰五行數五曰十日數六曰十二辰數七曰五聲十二律數八曰納甲數少陽七二十八策老陽九三十六策少陰八三十二策老陰六二十四策右策數者四象分太極數也震勿逐七日得仲翔曰少陽七即此二十八策也訟九二不克訟歸而逋其邑人三百户無眚曰乾為百坤為户三爻故三百户乾一爻三十六策三陽一百八策震彖曰震驚百里曰陽爻三十六陰爻二十四震初九九四二陽二陰為百二十舉其大數也陸希聲疏矣右圖爻數自初數之至上為六或以一爻為一歲一年同人三歲不興坎三歲不得凶豐三歲不覿既濟三年克之未濟三年有賞于大國或以一爻為一月臨至于八月有凶或以一爻為一日復七日來復或以一爻為一人需不速之客三人來損三人行則損一人一人行則得其友或以一爻為一物訟鞶帶三禠晉晝日三接師王三錫命比王用三驅睽載鬼一車解田獲三狐損二簋可用亨萃一握為笑革言三就旅一矢亡巽田獲三品右圖十日數者八卦五行分天地五十五之數也虞翻曰甲乾乙坤相得合木丙艮丁兌相得合火戊坎已離相得合土庚震辛巽相得合金天壬地癸相得合水故五位相得而各有合崔憬曰天三配艮天五配坎天七配震天九配乾地二配兌地十配離地八配巽地六配坤不取天一地四者此數八卦之外臣曰以三配艮五配坎七配震八配巽是也餘論非也遁甲九天九地之數乾納甲壬坤納乙癸自甲至壬其數九故曰九天自乙至癸其數九故曰九地甲一乙二丙三丁四戊五已六庚七辛八壬九癸十故乾納甲壬配一九坤納乙癸配二十震納庚配七巽納辛配八坎納戊配五離納已配六艮納丙配三兌納丁配四此天地五十五之數也關子明曰蓍不止法天地而已必以五行運其中焉右圖十二辰數者十二卦消息數也陽生於子陰生於午子十一月午五月郭璞以卯爻變未為未之月此論十二辰也十二辰即月數月數即消息數或用之為日數則京房之積算也右圖五聲十二律數者太玄曰子午之數九丑未八寅申七卯酉六辰戌五已亥四故律四十二九五七而倍之故四十二呂三十六八六四而倍之故三十六并律呂之數或還或否并律呂而數之得七十八也八則丑未所謂還得呂而不得律故或還或否凡七十有八黃鍾之數立焉其以為度也皆生黃鍾黃鍾之管長九寸圍九分秬黍中者九十枚則其長數也實管以上籥合度量甲已之數九乙庚八丙辛七丁壬六戊癸五聲生於日律生於辰聲以情質律以和聲律相協而八音生大衍數四因九得三十六是謂乾一爻之策數四因六得二十四是謂坤一爻之策數太極不用所用者四象故以四因九六九者陽數六者陰數也陽用極數故九陰用中數故六九而四之得三十六為乾一爻之策六而四之得二十四為坤一爻之策六因三十六得二百一十有六是謂乾一卦之策數六者一卦有六爻乾一爻之策三十有六以三十六而六之則二百一十有六為乾一卦之策也六因二十四得百四十有四是謂坤一卦之策數六者一卦有六爻坤一爻之策二十有四以二十四而六之則百四十有四為坤一卦之策也乾坤之策凡三百有六十二百一十有六合百四十有四則三百六十也三十二因二百一十有六得六千九百一十二是謂三十二陽卦之策數陽卦有三十二卦以二百一十有六而三十二之則六千九百一十二為三十二陽卦之策數也三十二因百四十有四得四千六百八是謂三十二陰卦之策數陰卦有三十二卦以百四十有四而三十二之則四千六百八為三十二陰卦之策數也二篇之䇿萬有一千五百二十三十二陽卦之策六千九百一十二三十二陰卦之策四千六百八合而為萬有一千五百二十所謂二篇之策也右大衍數邵康節傳其子伯溫漢上易傳卦圖卷下
