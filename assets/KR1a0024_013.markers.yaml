  - {type: line-break, offset: 0, content: '', id: KR1a0024_WYG_013-1a01}
  - {type: variant, offset: 0, length: 2209, content: 欽定四庫全書漢上易傳卦圖宋朱震撰右李溉卦氣圖其說源於易緯在𩔖是謀曰冬至日在坎春分日在震夏至日在離秋分日在兌四正之卦卦有六爻爻主一氣餘六十卦卦主六日七分八十分日之七歲十二月三百六十五日四分日之一六十而一周孔穎達易疏解七日來復云易稽覧圖卦氣起中孚故離坎震兌各主一方其餘六十卦卦有六爻别主一日凡主三百六十日餘有五日四分日之一每日分為八十分五日分為四百分日之一又分為二十分是四百二十分六十卦分之六七四十二卦别各得七分每卦得六日七分也司馬温公曰冬至卦氣起於中孚次復次屯次謙次睽凡一卦御六日二百四十分日之二十一五卦合三十日二百四十分日之二百五北冬至距大寒之數也故入冬至凡涉七日而復之氣應也在易通卦驗曰冬至四十五日以次周天三百六十五日復當故卦乾西北也主立冬坎北方也主冬至艮東北也主立春震東方也主春分巽東南也主立夏離南方也主夏至坤西南也主立秋兌西方也主秋分鄭康成曰春三月候卦氣者泰也大壯也夬也皆九三上六坎九五上六泰震𥘉九六二大壯震六三夬夏三月候卦氣者乾也姤也遯也皆九三上六震九四九五乾震上六離初九姤離六三九三遯秋三月候卦氣者否也觀也剝也皆六三上九離九四六五否離上九兌初九觀兌九二六三剝冬三月候卦氣者坤也復也臨也皆六三上六兌九四九五坤兌上六坎初六復坎九二六三臨又曰冬至坎始用事而主六氣初六爻也小寒於坎直九二大寒於坎直六三立春於坎直六四雨水於坎直九五驚蟄於坎直上六春分於震直初九清明於震直六二榖雨於震直六三立夏於震直九四小滿於震直六五芒種於震直上六夏至於離直初九小暑於離直六二大暑於離直九三立秋於離直九四處暑於離直六五白露於離直上九秋分於兌直初九寒露於兌直九二霜降於兌直六三立冬於兌直九四小雪於兌直九五大雪於兌直上六先儒舊有此圖故康成論乾坤屯蒙否泰六卦之貞曰餘不見為圖者備列之所謂備列之者謂此備列四正六十卦也李鼎祚論剝畫隔坤復來成震七日來復之義曰先儒已論雖各指於日月先儒禇氏莊氏云五月一陰生至十一月一陽生凡七月而云七日不云月者欲見陽長須速故變月言日後學尋討猶未測其端倪略陳梗槩以俟來哲王昭素難孔穎達六日七分謂坤卦之盡復卦陽來則十月節終一陽便來不得冬至之日據其節終尚去冬至一十五日二家之學蓋未見此圖是以其論紛然鼎祚闕疑請俟來哲昭素已臆斷之矣鼎祚於此其優乎乾鑿度曰厯以三百六十五日四分日之一為一歲易三百六十祈當朞之日此律厯數也五歲再閏故扐而後卦以應律厯之數鄭康成曰厯以記時律以候氣氣章六十日一轉與厯相應則三百六十日粗為終也厯之數有餘者四分之一差不齊故閏定四時成歲令相應也蘇洵曰震離坎兌各守其方而六十卦之分散於三百六十日聖人不以五日四分之一者害其為易而以七分者加焉此非有所法乎日月星辰之度天地五行之數也以為上之不可以八下之不可以六故以七分者加之使文易者亦不為元用於厯而已矣百皇甫謐曰天地之數三百有六十所以當朞凡歳三五十有四日不充爻者餘則歸閏爻以存虚虚所以待甲癸之變甲癸者舉十日之終始也胡旦亦曰卦之爻則實數也歳之日則虚數也歳月不盡之日則加算焉六日七分實數也三百六十五日有餘焉故算而為閏二十四氣七十二候見於周公之時訓呂不韋取以為月令焉其上則見於夏小正夏小正者夏后氏之書孔孔子得之於杞者也夏建寅故其書始於正月周建子而授民時巡狩承享皆用夏正故其書始於立春夏小正具十二月而無中氣有候應而無日數至於時訓乃五日為候三候為氣六十日為節二書詳略雖異其大要則同豈時訓因小正而加詳歟左氏傳曰先王之正時也履端於始舉正於中歸餘於終中謂中氣也漢詔曰昔者黄帝合而不死名察庶驗定清濁起五部建氣物分數氣謂二十四氣也則中氣其來尚矣仲尼贊易時已有時訓觀七月一篇則有取於時訓可知易通卦驗易家傳先師之言所記氣候比之時訓晚者二十有四早者三當以時訓為定故子雲大𤣥二十四氣關子明論七十二候皆以時訓右律厯之元始於冬至卦氣起於中孚其書本於夏后氏之連山而連山則首艮所以首艮者八風始於不周實居西北之方七宿之次是為東壁營室東壁者辟生氣而東之營室者營陽氣而産之於辰為亥於律為應鍾於時為立冬此顓頊之厯所以首十月也漢巴郡落下閎運算轉厯推步晷刻以太初元年十一月甲子夜半朔冬至而名節會察寒暑定清濁起五部違氣初分數然後陰陽離合之道行焉然落下閎能知厯法而止揚子雲通敏叡達極陰陽之數不唯知其法而又知其意故太𤣥之作與太初相應而兼該乎顓頊之厯𤼵明連山之㫖以準周易為八十一卦凡九分共二卦一五隔一四細分之則四分半當一日準六十卦一日卦六日七分也中中孚也周復也礥閑屯也少謙也戾睽也上于升也􅕳羡臨也此冬至以至大寒之氣也差小過也童蒙也增益也銳漸也達交泰也耎傒需也從進隨也釋解也格夷大壯也樂豫也爭訟也務事蠱也更革也斷毅夬也此立春以至穀雨之氣也裝旅也衆師也密親比也斂小畜也彊睟乾也盛大有也居家人也法井也應離也迎咸也遇姤也竈鼎也大廓豐也文渙也禮履也逃唐遯也常恒也此立夏以至大暑之氣也永恒也度節也昆同人也減損也唫守否也翕巽也聚萃也積大畜也飾賁也疑震也視觀也沈兌也内歸妹也去旡妄也晦瞢明夷也窮困也割剝也此立秋以至霜降之氣也止堅艮也成既濟也闕噬嗑也失劇大過也馴坤也將未濟也難蹇也勤養坎也此立冬以至大雪之氣也日月之行有離合陰陽之數有盈虚踦盈二贊有其辭而無其卦而附之於養者以閏為虚也踦火也日也嬴水也月也日月起於天元之初歸其餘也蓋定四時成歲者以其閏月再扐而後卦者由於歸竒六日七分必加算焉以三百六十五日四分之不齊也坎離震兌四正之卦也二十四爻周流四時𤣥則準之日右斗左秉巡六甲東西南北經緯交錯以成八十一首也一月五卦也侯也大夫也卿也公也辟也辟居於五謂之君卦四者, SBCK: ''}
