  - {type: variant, offset: 2204, length: 3967, content: 卦也𤣥則準之故一𤣥象辟三方象三公九州象九卿二十七部象大夫八十一首象元士其大要則厯數也律在其中也體有所循而文不虚生也陸績謂自甲子至甲辰自甲辰至甲申自甲申至甲子凡四千六百一十七歲為一元元有三統統有三會會有二十七章九會二百四十三章皆無餘分其鉤深致逺與神合符有如此也善乎邵康節之言曰太𤣥其見天地之心乎天地之心者坤極生乾始於冬至之時也此之謂律厯之元論太𤣥當附於太𤣥八十一首準易圖後或曰太初之厯不作子雲無以草𤣥乎曰不然逸周書曰維十有一月既南至昏昴畢日短極其踐長微陽動于黄泉降慘于萬物是月斗柄建子始昏北指陽氣虧草木萌動日月俱起于牽牛之初右㢠廻而行月周天起一次而與日合宿日行月一次而周天厯會于十有二辰終則復始是謂日月權輿又曰天地之正四時之極不易之道夏數得天百王所同書所謂日月俱起于牽牛之初即太初厯十一月朔旦冬至日月如合璧五星如連珠也昔劉向藏三代之書其子歆有所不知以問子雲子雲之於律厯之元固已博極羣書而知之矣是以落下閎得其厯之法而子雲獨得其意云右圖乾陽也坤陰也並如而交錯行乾貞於十一月子左行陽時六貞正也𥘉爻以此為正次爻左右者各從次數之珅貞於六月未乾坤陰陽之主也陰退一辰故貞於夬右行陰時六以順成其歲歲終次從於屯蒙歲終則從其次屯蒙需訟也屯為陽貞十二月丑其爻左行以間時而治六辰蒙為陰貞正月寅其爻右行亦間時而治六辰歲終則從其次卦陽卦以次其辰以丑為貞左行間辰而治六辰陰卦與陽卦其位同謂與日若在衡也陰則退一辰謂左右交錯相避否泰之卦獨各貞其辰言不用卦次泰當貞於戌否當貞於亥戌乾體所在亥又乾消息之月泰否乾坤體氣相亂故避而各貞其辰謂泰貞正月否貞七月六爻者泰得否之乾否得泰之坤否貞申右行則三陰在西三陽在北泰貞寅左行則三陽在東三陰在南是則陰陽相比共復乾坤之體也其共北辰左行相隨也北辰左行謂泰從正月至六月此月陽爻否從七月至十二月此月陰爻否泰各自相隨中孚為陽貞於十一月子小過為陰貞於六月未法於乾坤中孚於十一月子小過正月之卦也宜貞於寅二月卯而貞於六月非其次故言象法乾坤其餘卦則各貞於其辰同位乃相避三十二歲朞而周六十四卦三百八十四爻一千五百二十復貞此乾坤交錯成六十四卦陳純臣所謂六十四卦推盪訣是也其說見於乾鑿度而鄭康成及先儒𤼵明之京房論推盪曰以陰盪陽以陽盪陰陰陽二氣盪而成象又曰盪陰入陽盪陽入陰陽交互内外適變八卦囘巡至極則反此正解繫辭八卦相盪之義如六十卦圖本於乾坤並如陰陽交錯而行故傳圖者亦謂之推盪易天下之至變者也六位遞遷四時運動五行相推不可執一者也右圖鄭康成注周禮太師云黄鍾初九也下生林鍾之初六林鍾又上生太簇之九二太簇又下生南呂之六二南呂又上生姑洗之九三姑洗又下生夾鍾之六三夾鍾又上生蕤賔之九四蕤賔又下生大呂之六四大呂又上生夷則之九五夷則又下生應鍾之六五應鍾上生無射之上九無射下生仲呂之上六臣謂不取諸卦而取乾坤者萬物之父母右圖周官大師掌六律六同以合陰陽之聲鄭康成曰聲陰陽各有合黄鍾子之氣也十一月建焉而辰在星紀丑也大呂丑之氣也十二月建焉而辰在𤣥枵子也太簇寅之氣也正月建焉而辰在娵訾亥也應鍾亥之氣也十月建焉而辰在析木寅也姑洗辰之氣也三月建焉而辰在大梁酉也南呂酉之氣也八月建焉而辰在壽星卯也蕤賔午之氣也五月建焉而辰在鶉首未也林鍾未之氣也六月建焉而辰在鶉火午也夷則申之氣也七月建焉而辰在鶉尾已也仲呂已之氣也四月建焉而辰在實沈申也無射戌之氣也九月建焉而辰在大火卯也夾鍾卯之氣也二月建焉而辰在降婁與建交錯貿處如表裏然是其合也右圖太𤣥曰黄鍾生林鍾林鍾生太簇太簇生南呂南呂生姑洗姑洗生應鍾應鍾生蕤賔蕤賔生大呂大呂生夷則夷則生夾鍾夾鍾生無射無射生仲呂說者謂陽下生陰陰上生陽獨陸績注太𤣥云黄鍾下生林鍾林鍾上生太簇太簇下生南呂南呂上生姑洗姑洗下生應鍾應鍾上生蕤賔蕤賔又上生大呂大呂下生夷則夷則上生夾鍾夾鍾下生無射無射上生仲呂其說謂陽生於子陰生於午從子至已陽生陰退故律生呂言下生呂生律言上生從午至亥陰升陽退故律生呂言上生呂生律言下生至午而變故蕤賔重上生而績論律呂分寸與司馬遷律書特異然黄鍾至蕤賔律生呂者自左而右呂生律者自右而左蕤賔至仲呂律生呂者自右而左呂生律者自左而右云夫六十卦乾貞於子而左行坤貞於未而右行屯貞於丑間時而左行蒙貞於寅間時而右行泰貞於寅而左行否貞於申而右行小過貞於未而右行七卦錯行律實效之黄鍾乾初九也大呂坤六四也太簇乾九二也應鍾坤六五也無射乾上九也夾鍾坤六三也夷則乾九五也仲呂坤六二也蕤賔乾九四也林鍾坤初六也初應四二應五三應上故子丑寅亥卯戌辰酉已申午未謂之合聲司馬遷曰氣始於冬至周而復生此所謂律數右圖太𤣥曰聲生日律生辰乾鑿度曰日十者五音也辰十二者六律也星二十八者七宿也凡五十所以閡物而出之者鄭康成曰甲乙角也丙丁徵也戊已宮也庚辛商也壬癸羽也六律益六呂十二辰四七二十八而周天觀康成所論五音本於日十二律生於辰其學源於太𤣥而子雲則觀大衍之數五十而知之夫卦有十二消息升降於前後五日而成六十卦律有十一一律舍五聲五聲之變成六十律冬至之卦復也其實起於中孚七日而後復應冬至之律黄鍾也其實生於執始而執始乃在冬至之前此律厯之元也唯子雲知之今北辰不動紐為天樞而不動之處其實在紐星之末一度有餘非善觀天者孰能知之哉右圖司馬遷律書論律厯天所以通五行八正之氣其略曰不周風居西北東壁居不周風東至於營室至於危十月也律中應鍾其於十二子為亥廣莫風居北方東至於虚東至於須女十一月也律中黄鍾其於十二子為子其於十母為壬癸十日為母則十二辰為子十日為幹則十二辰為夫東至牽牛東至於建星建星六星在南斗北十二月也律中大呂條風居東北南至於箕正月也律中太簇其於十二子為寅南至於尾南至於心南至於房明庶風居東方二月也律呂夾鍾其於十二子為卯其於十母為甲乙南至於氐南至於亢南至於角三月也律中姑洗其於十二子為辰清明風居東南維西之軫西至於翼四月也律中仲呂其於十二子為已西至於七星西至於張西至于注栁八星一曰天相一曰天庫一曰注五月也律中蕤賓景風居南方其於十二子為午其於十母為丙丁西至於弧參罰東有大星曰狼下有四星曰弧涼風居西南維六月也律中林鍾其於十二子為未北至于罰參為白虎三星貞是也為衡石下有三星兌曰罰北至于參七月也律中夷則其於十二子為申北至于濁北至于留律呂南呂其於十二子為酉閶闔風居西方其於十母為庚辛北至於胃北至於婁北至於奎徐廣曰一作圭九月也律中無射其於十二子為戌太史公所論即乾鑿度所謂五音六律七變由此而作故大衍之數五十七變言七宿四七二十八而周天甲乙丙丁庚辛壬癸四方而戊已當軒轅之宮京房論大衍五十謂十日十二辰二十八宿為五十其一不用者天之生氣鄭康成謂天地之數五十冇五以五行氣通凡五行減五大衍又減一其說皆本於此右圖徐氏云天文也上脫剛柔交錯四字故彖總而釋之剛柔交錯天文也文明以止人文也王昭素胡安定皆用此義石徂徠不然之曰彖解亨小利有攸往中閒更無異文即言天文者言剛柔也者天之文也天之文即剛柔二義也二氣交錯成天之文柔來文剛分剛上而文柔者天文也臣曰日為陽月為陰歲熒惑鎮為陽太白辰為陰斗魁為陽尾為陰天南為陽北為陰東為陽西為陰日月東行天西轉日自牽牛至東井分剛上而文柔也月自角至壁柔來而文剛也五星東行有遲有速北斗西行昏明迭建二十八宿分配五行各有陰陽四時隱見至於中外之宮無名之星河漢之精皆𤼵乎陰陽者也則二氣交錯成天之文信矣右圖孔穎達曰四月純陽用事陰在其中故靡草死十月純陰用事陽在其中故薺菜生以此為剛柔交錯四時之變石徂徠謂政道失於下陰陽之氣差忒於上則天文乖錯臣曰二者皆是也故採虞陸二家之學以兼明之斗建乾坤終始圖大𤣥日斗之南也左行而右旋右圖楚丘曰明夷日也日之數十故有十時亦當十位自王已下其二為公其三為卿日上其中食日為二旦日為三杜預曰日中當王食時當公平旦為卿雞鳴為士夜半為皁人定為輿黄昏為隷日入為僚晡時為僕日昳為臺隅中日出闕不在第尊王公也夫日右行經天成十二位子者乾之始也而終於已午者坤之始也而終於亥故曰大明終始六位時成卜楚丘所推十日蓋如一月五卦辟卦當五以初為諸侯二為大夫三為卿四為公也又卦有六位一元士二大夫三諸侯四卿五天子六宗廟易之用於卜筮其術多矣右圖斗左行建十二次日右行周二十八舍則乾坤終而復始子寅辰午申戌陽也乾之六位未已卯丑亥酉陰也坤之六位位之升降不違其時故曰大明終始六位時成太𤣥之序曰盛哉日乎炳明離章五色淳光夜則測陰晝則測陽晝夜之測或否或臧陽推五福以𩔖升陰幽六極以𩔖降升降相關大貞乃通經則有南有北緯則有西有東巡承六甲與斗相逢厯以記歲而百穀時雍所謂晝夜升降經緯六甲則大明終始六位時成也甲子甲寅甲辰甲午甲申甲戌謂之六甲大貞乃通者亨也太𤣥明厯故舉六甲右九宮數者乾鑿度曰太一取其數從行九宮四正四維皆於十五鄭康成曰太一北辰之神也居其所曰太常行於八卦日辰之間曰太一或曰太一出入所由息紫宮之外其星因以為名太一下行九宮猶天子巡狩省方之事每四乃還於中央中央者天地之所太一以陽出以陰入陽起於子陰起於午是以太一下行九宮從坎始坎中男也自此而從於坤宮坤母也又自此而從於震宮震長男也又自此而從於巽宮巽長女也所行半矣還自息於中央既又自此而從乾宮乾父也自此而從兌宮兌少女也又自此而從於艮宮艮少男也又自此而從於離宮離中女也行則周於上下所由息於太一天一之星而紫宮始於坎終於離且出從中男入從中女亦因陰陽男女之偶為終始云臣曰所謂太一取其數從行九宮者七九六八之數也一與八為九一與六為七三與四為七七與二為九陽變七為九陰變八之六七與八為十五九與六為十五故曰四正四維皆於十五乾坤六位圖右圖京氏曰降五行頒六位陸績曰十二辰分六位升降以時消息吉凶又曰天六地六氣六象六天乾交坤而生震坎艮故自子順行震自子至戌六位長子代父也坎自寅至子六位中男也艮自辰至寅六位少男也坤交乾而生巽離兌故自丑逆行巽自丑至卯六位配長男也離自卯至已六位配中男也兌自己至未六位配少男也女從人者也故其位不起於未易於乾卦言大明終始六位時成則七卦可以𩔖推右圖剝之象曰柔變剛也純乾之卦而柔變之一變為姤二變為遯三變為否四變為觀五變為剝此變卦見於易者也陰陽升降變而為六十四漢上易傳卦圖卷中, SBCK: ''}
