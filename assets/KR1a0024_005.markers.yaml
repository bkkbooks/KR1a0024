  - {type: variant, offset: 0, length: 176, content: 欽定四庫全書漢上易傳卷五宋朱震撰下經乾下兊上夬揚于王庭孚號有厲告自邑不利即戎利有攸往彖曰夬決也剛決柔也健而說決而和揚于王庭柔乗五剛也孚號有厲乗危乃光也告自邑不利即戎所尚乃窮也利有攸往剛長乃終也五陽長於下一隂消於上五陽合力而決一隂故曰夬決也剛決柔也此以五剛言夬之時也健者乾也決而和說者兊也健而說諸理決而不失其和非亢暴忿疾以力勝之決之至善者也古之人退人以禮, SBCK: ''}
