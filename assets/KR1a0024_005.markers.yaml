  - {type: page-break, offset: 24785, content: '', id: KR1a0024_SBCK_006-2b}
  - {type: variant, offset: 24787, length: 0, content: '', SBCK: 君子在上之事也故爲明罰飭法豐用明在下君子在下之事也故爲折獄致刑初九遇其配主雖旬无咎徃有尚象曰雖旬无咎過旬災也泰九二之四成豐故九四爲豐之主配者隂陽相匹孟氏鄭氏本作妃嘉耦曰妃妃嫓也亦匹配之意初九九四陽也六五隂也初與四不應六五亦无應四雖不應初可因四爲主而配五隂陽相配故九四爲配主遇者不期而㑹四不應初而初九主之不期於㑹而㑹故曰遇其配主旬均也􅀄九九四均也然明動相􅓵致豐之道非明則動无所之非動則明无所用是以均而无咎无咎者初九以正相資也初九遇四徃而相易以致用則􅀄得尚于五而豐之道上行矣尚亦配也與尚于中行之尚同故曰徃有尚也夫初九遇九四所以得尚于五者以正相資而成豐譬之共難則仇怨恊力􅀔使之然􅀂妄動不正過四而有其位明動不相爲用過旬也過旬則失其配主徃而无所尚與坎險相㑹災至矣豐道亡所以災也故曰過旬災也初動有小過象故曰過旬謂之均者六甲周行乗八節其數四百八十而成鈞鈞勻也初九離納巳九四震納庚自巳至庚凢十日十日周而復始故訓勻六二豐其蔀日中見斗徃得疑疾有孚發􅀂吉象曰有孚發􅀂信以發志也震巽爲草二在草中有周匝掩蔽之意故曰蔀陸震曰歷法凢十九年閠分盡爲一章四章凢七十六年爲一蔀五蔀周六甲凢三百八十年而曆象小成豐蔀之名盖寓此意離目爲見豐爲日中五兊伏艮艮離爲天文賁之象也震少陽其䇿七震爲動有星在上動於中而其數七斗之象也二有至明中正之才以豐時遇闇弱不正之君猶當晝而夜至於見斗其昬甚矣坤爲􅁳晦闇之象五旣不能下賢二自徃見反得疑疾自徃者亦取疑之道巽爲不果六五隂失位疾也然二五相應之地有孚之理二積中正不巳盡其誠信以感發其志則五動而應之乃吉}
  - {type: page-break, offset: 24787, content: '', id: KR1a0024_SBCK_006-3a}
  - {type: page-break, offset: 24787, content: '', id: KR1a0024_SBCK_006-3b}
  - {type: page-break, offset: 24787, content: '', id: KR1a0024_SBCK_006-4a}
  - {type: variant, offset: 24789, length: 1, content: 卷, SBCK: 曰苟誠意能動雖昬蒙可開也雖柔弱可輔也雖不正可正也古之人事庸君常主而克行其道者巳之誠上逹而君見信之篤耳九三豐其沛日中見沬折其右肱无咎象曰豐其沛不可大事也折其右肱終不可用也沛古本作斾正弼以爲幡幔震爲玄黃兊金斷之斾也幡幔圍蔽於内故豐其斾沬斗後小星微昧之光子夏傳及字林作昧三之上成艮艮離爲天文星在斗之後隨斗而動者昧也三明極而剛正處豐之昧上六闇極矣猶日中當明而反見斗後之星其闇尤甚巽爲事陽爲大伏坎爲可豐尚大也豐其斾往見則不明故退而守正以不可大事故也兊爲右伏艮爲肱兊折之折右肱也上六闇極不可用之以有爲從之必罹其咎故自折其右肱示終不可用則无咎九四豐其蔀日中見斗遯其夷主吉象曰豐其蔀位不當也日中見斗幽不明也遇其夷主吉行也四動成坎離光明也不動成震巽震巽爲草掩蔽周匝蔀也四在蔀中處不當位自蔽其光明故曰豐其蔀兊有伏艮四應離􅀄艮離爲天文震動也其䇿七有星動於上而其數七之象離目爲見四處不常位又不能變􅀂動而交􅀄則幽者明矣坎爲隱伏故也以此處豐猶日中之時而反見斗處幽暗而巳不明故曰幽不明也九四不正其不明自取之異於二三矣夷主者謂􅀄也九四與􅀄九均爲陽而上下不敵四忘其􅀔下夷於􅀄四者􅀄之所主也故曰夷主􅀄正正則吉􅀄九助四而上行以資其明吉行也易傳曰居大臣之位得在下之賢同德相輔其助豈小也哉六}
