  - {type: variant, offset: 24785, length: 1, content: 漢, SBCK: 周易下經夬傳第五之也王假之者尚大也四海之廣萬物之衆无一物不得其所无一夫不􅀗自盡非小道之所能至故曰王假之尚大也此以九四言乎豐之才也二四失位爲憂離下有伏坎爲加憂離見坎伏勿憂也然明以動勿憂其至於大也進而至於五則得位矣故曰勿憂此以九二之四言乎豐之才也離日震動日當五爲中曰動於下升于東方明動不巳九四進五何憂乎不至于中而无所不照哉日之大明萬物咸覩冝照天下也乾爲天五離應二照天下也太玄曰日正于天何爲也曰君子乗位爲車爲馬車軨馬􅧊可以周天下故利其爲主也冝日中則正于天利其爲主之謂也故曰勿憂冝日中冝照天下也此以九二進而至五言乎豐之才也五復降四坎離象變離成兊日在西日中則􅉴也坎成兊巽兊爲口月闕於巽辛月􅄹則食也四乾陽長於震二坤隂生於離陽長􅄹也息也隂生則􅄹者虚消者息矣有天地然後有人有􅀑神􅀑神徃來於天地之間者也豐大之時所冝憂者不在乎未中而常在乎日之旣中也何則日中俄且􅉴矣月􅄹俄且食矣􅄹者必虚息者必消天地之所不能違者時也而況天地之間聚而爲人散而爲􅀑神乎明動不巳未有能保其大者也保此道者其唯中乎故曰日中則􅉴月􅄹則食天地􅄹虚與時消息而況於人乎況於􅀑神乎此復以坎離升降明豐之戒也在卦氣爲六月故太玄凖之以大廓象曰雷電皆至豐君子以折獄致刑雷電皆至萬物豐大之時豐則生訟故君子法其威明並用以治刑獄電明照也所以折獄雷威怒也所以致刑折獄者以正折其不正􅀄二三正也而二有伏坎爲獄不明則枉者不伸致刑者刑其不正而巳四五不正也兊爲刑殺不威則小人不懼噬嗑其明在}
  - {type: page-break, offset: 24785, content: '', id: KR1a0024_SBCK_005-66b}
  - {type: page-break, offset: 24785, content: '', id: KR1a0024_SBCK_006-1a}
