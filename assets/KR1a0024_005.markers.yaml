  - {type: variant, offset: 24791, length: 0, content: '', SBCK: 來章有慶譽吉象曰六五之吉有慶也六五屈體來下於四與之共天位九四之明上行之五相錯成離坤離爲文章者文之成也九四上行則􅀄應四二應五三應上六爻並用成豐大之慶五屈巳下賢四志行乎上人自譽之兊爲口譽之者也五得正吉也上六豐其屋蔀其家闚其戸􅞔其无人三歳不覿凶象曰豐其屋天際翔也闚其戸􅞔其无人自藏也自二至上體大壯棟宇之象上六動隂變陽爲大豐其屋言自處髙大也二爲家震巽爲草豐盛周匝以掩蔽之蔀其家言所居不明也自處髙大所居不明以髙亢自絶於人如飛鳥務上翔於天際豈復能降哉上動成離離爲飛鳥乾爲天在外卦之際天際也豐之時九四忘其敵巳下資􅀄九三與上六正應也其能忘乎故三自下徃庶幾發其昏暗知處豐之道九三離目爲見徃闚之坤戸闔而不應􅞔寂乎其无人聲太玄所謂外大抗中无人也三於是退而自藏於坎中乾爲歳三自四歷三爻三歳不覿也豐其屋蔀其家自絶於人也三歳不覿人絶之也上六動不正凶也不直曰凶者有應焉猶兾乎下交也至于三歳不覿人亦厭之而凶至矣闚小見也覿私見也自上六言之謂之窺隂爲小也自九三之上言之謂之覿私見也私不正也􅭯艮下離上旅小亨旅貞吉􅂏曰旅小亨柔得中乎外而順乎剛止而麗乎明是以小亨旅貞吉也旅之時義大矣哉旅否之變也剛當居上柔當居下六居五失其所居而在外旅也然六居五柔得中矣得中則其柔不過得爲旅之中道易傳曰中非一揆旅有旅之中也柔得中則能順乎上下之剛不爲剛所揜而小者亨順乎剛而柔失中旅道窮矣坤順也君子入國問禁㒷之日從新國之法順乎剛也故曰柔得中而順乎剛此以六五言旅小亨也九居三未爲失其所居也然剛自五而反居於下猶爲旅也居三成艮屈其剛而止於下自謙屈之道也雖止乎下矣然九三正止而不失其正上麗乎離之明君子之居是􅀖也事其大夫之賢者友其士之仁者麗乎明也正然後能麗乎明不正人將拒我矣正則吉故曰止而麗乎明此以九三言旅貞吉也旅難處也旅如六五柔得中乎外而順乎剛在我者不失巳矣乃可以小亨旅如九三止而麗乎明在彼者亦不失人矣乃可以貞吉是以旅一也而再言之易傳曰旅困之時非陽剛中正有助於下則不能致大亨如卦之才則可以小亨得旅貞而吉也四方固男子之事居者必有旅也頋處之如何耳夫子歷國應聘甞去父母之􅀖矣去他國矣欲浮于海居九夷矣盖得旅之時義也旅之時不一而義者時措之冝知其時而不知其冝不可也非大人孰能盡之故曰旅之時義大矣哉在卦氣爲四月故太玄凖之以裝象曰山上有火旅君子以明慎用刑而不留獄山上有火明而止止而不處旅也君子之用刑也雖明而止故明而慎於用刑雖止而不處故亦不留獄明者或不慎慎者或留獄失旅之象也離有伏坎爲獄兊爲刑殺艮止慎也􅀄六旅􅃈􅃈斯其所取災象曰旅􅃈􅃈志窮災也鄭曰􅃈􅃈小也艮爲小動而之四復成艮小之又小􅃈􅃈也􅀄六小人之旅卑柔而不中正恃應而求於四者䙝其細巳甚故曰旅􅃈􅃈四巽極而燥火性炎上不能容􅀄艮止也厭止妄動徃而復止人亦厭之志窮也坎險災也志窮遇險斯其所取災也艮爲手有求取之象楚申侯是巳曰斯曰其者􅀄四上下皆艮手取災之象故指兩爻言之六二旅即次懷其資得童僕貞象曰得童僕貞終无􅀹也艮止也二得位止而得位即次舎也離兊爲蠃貨貝資財之象二巽爲入懷其資也童僕一本作僮僕艮爲少男􅀄卑隂賤二在上畜之童僕也􅀄於二得童僕貞也童僕貞則二親信之而不疑旅在下柔而中正即次所遇而安也懷其資得三四五之助也又得童僕貞貞而下承之旅如是多助矣故動而之外終无􅀹之之者五兊爲口􅀹之者也􅀄六不正而曰貞者貞於二也貞於主人二巽東南主人位也歸妹九二利幽人之貞貞於五也童僕貞然後次舎可止資貨可有夫子曰審其所以從之之謂貞也九三旅焚其次喪其童僕貞厲象曰旅焚其次亦以傷矣矣以旅與下其義䘮也艮止也五得位止而得位次舎也巽木離火焚其次也九三在旅而過剛四五之所不與則失其所止有焚其次之象兊爲毀傷也旅失其所止亦可傷也􅀄艮爲童僕九三旣失其所止以旅之故乃巽而與下失尊卑之冝􅀄三易位􅀄失其正喪其童僕貞也所以喪者爲旅之義剛柔皆失中旅如是寡助危矣六居三不正危之道九四旅于處得其資斧我心不快象曰旅于處未得位也得其資斧心未快也二三止而得位爲次舎四巽爲入而未得位行者處而巳入對出言之爲處九四非安處也故曰旅于處離兊爲蠃具資也離爲兵巽木貫之斧也得其資以爲利得其斧以爲断上得乎五下得乎三之助矣九剛明之才而處四履謙能下善處乎旅故得上下之利有資貨焉有器用焉雖不􅀂六二亦曰得其所矣然未得位也上不足以發五之志下不足以致九二之賢雖得資斧未免爲旅人故我心不快兊爲决中爲心四進而上道行于五而二應則快矣孟子曰乆於齊非我志也六五射雉一矢亡終以譽命象曰終以譽命上逮也五在旅卦不取君象君不可旅也離爲雉雉文明之物文明人文也聖人止亂而不以威武者也離爲兵伏坎爲弓伏艮爲手兵加之弓上矢也矢者射雉之器五動弓矢發離坎毀而雉亡一矢亡之也一矢亡雉者五得中道動而心中乎理之象然六五未當位雖有文明之德未可以動上九屈體逮之則令譽升聞而爵命之矣兊口在下與之譽也巽爲命上卦之終由譽而後命之始也未當位終也譽命故曰終以譽命五進上其在賔師之位乾西北賔之位也上九鳥焚其巢旅人先􅀏後號咷喪牛于易凶象曰以旅在上其義焚也喪牛于易終莫之聞也上九離爲飛鳥九動變六成震巽巽爲木震爲竹葦鳥隱其中巢也上九極剛以髙亢居上非旅人之冝巽木離火鳥焚其巢失其所也離目動震有聲􅀏也楽其未焚之前柔順謙下時也兊澤流於目巽號出於口哀於旣焚之後悔其先之時也上與三相應之地上六變而正成坤坤爲牛九三應而上降三二成坎坎爲耳上九髙亢不變坤象隱喪牛也易輕易也火性剽疾上九極剛輕易也故曰喪牛于易九喪柔順三不徃應坎耳伏矣輕易者自塞其耳而聦不明也陸機覉旅處群士之上而不聞牽秀孟􅅼之毀其以髙亢輕易而致禍乎􅪷巽下巽上巽小亨利有攸徃利見大人􅂏曰重巽以申命剛巽乎中正而志行柔皆順乎剛是以小亨利有攸徃利見大人柔在下而承二剛巽也巽爲風風者天之號令命者天之令也故巽爲命内巽者命之始外巽者巽而逹乎外申前之命也重巽之象唯可施之於申命先儒謂上下皆巽不違其令命乃行也􅀂施之於佗則巽已甚矣故曰重巽以申命此以兩體而言巽也巽自遯來訟之變六三之四上下皆巽九二之剛巽乎中也九五之剛巽乎中正也巽乎中正則其剛不過而所施當乎人心是以志行乎上下故曰剛中正而志行此以三四相易而言九二九五之巽也九二之剛巽乎正則􅀄六之柔順之九五之剛巽乎中正則六四之柔順之上下之柔皆順乎剛則物无違者而也二九五之志行故曰柔皆順乎剛此以初六六四言大者巽則小者无不順也柔皆順乎剛雖无違者然順乎中正乃善不然失所從矣六四離目爲見大人者九五剛而巽乎中正者也剛巽乎中正而柔順之則柔者亦得其正而小者亨矣豈非小者之利乎故曰利見大人此以九五言巽之利也小者亨矣故六四利有攸徃利見大人而其道上行故曰是以小亨利有攸徃利見大人徐氏王昭素考王弼注有命乃行也四字當在重巽以申命之下疑象或脫文理􅀂有之在卦氣爲七月故大玄凖之以翕象曰隨風巽君子以申命行事巽爲風風巽而入者也前後相隨而至則歳事行矣故巽又有事之象傳言八風之至各以四十五日而成一歳是也君子申命諄諄者行事也行事莫如巽巽則易入􅀄六進退科武人之貞象曰進退志疑也利武人之貞志治也巽􅀄行事之始也居卑體柔不能自立過於巽者也退則不安進則无應又二剛據之莫知所從巽爲不果故曰進退志疑也六變九巽成乾應兊乾爲徤兊爲決疑志去矣徤決者武人之貞天道尚右故兊爲武人志疑者不先治其志也君子自治其動以正行之以徤決礭乎不可移雖千萬人必徃孰能奪其志哉故曰利武人之貞志治也巽爲工有治之意易傳曰治謂脩立也九二巽在牀下用史巫紛􅀂吉无咎象曰紛􅀂之吉得中也巽􅀄坤變乾也巽爲木坤西南方乾爲人設木於西南之奥而人即安焉者牀也巽股變艮股見手伏蒲伏于牀下之象九二不正卑巽如此冝有咎然九二剛中其動也正卑巽者非爲利也將以誠意感動九五而巳故用史巫紛􅀂吉吉者正也九二之動上之五成震震爲聲五之二成兊兊爲言上九宗廟兊口出聲祝史道人之意以逹于􅀑神之象六降于二巫以􅀑神之意告于人之象史巫皆尚口而巽故也四巽離爲絲二五升降史巫紛􅀂則卑巽之意逹于上下巽在牀下何咎之有此子㳺重服立諸臣之位以感悟文子之道也二五中也九五未應則巽在牀下用史巫紛􅀂乃爲得中九三頻巽吝象曰頻巽之吝志窮也頻水厓與復九三頻復之頻同兊水澤三水澤之際九三重剛不中在下體之上巽極而決躁不能巽者也將遂其剛亢歟則上臨之以巽四以柔相親九二之剛近而不相得將變而爲柔歟則安其所處憚於改過有吝之意然志已窮不得已而巽猶人行至于水之厓欲前得乎故曰頻巽之吝志窮也易傳曰雖欲不巽得乎哉六四悔亡田􅀗三品象曰田􅀗三品有功也四无應乗承皆剛冝有悔四本遯之六二自二之四一變訟二變巽二田也艮爲手柔}
