  - {type: variant, offset: 1622, length: 4, content: 易𫝊表右, SBCK: 先生履歷除春秋博士告詞敕迪功郎朱震孔子曰吾志在春秋又曰知我者其惟春秋乎是經之不用於丗果遵何􅀃哉朕比詔立學官用以取士命汝往處師席爾其推明三家之同異與諸生切磨以求合於聖人之意罔俾漢儒專以名家則稱朕㫖可特授依前官守太學春秋博士靖康元年五月九日除太學春秋博士告詞敕宣教郎朱震孔子作春秋而亂}
  - {type: 'kr:newline', offset: 1625, content: '

      ', id: KR1a0024_krp_000-bkkkrnewl104}
  - {type: line-break, offset: 1625, content: '', id: KR1a0024_WYG_000-8a02}
  - {type: variant, offset: 1627, length: 3, content: 伏奉四, SBCK: 賊子懼豈特當時爲然使千百載之後猶凛然畏之此經所以乆􅉱而不明也朕比命列子博士訓迪諸生爾以脩潔該洽而膺是選必能明聖人作經之㫖使學者有攷焉勉稱厥職予則汝嘉可特授依前宣教郎太學春秋博士填見闕靖康元年十}
  - {type: page-break, offset: 1627, content: '', id: KR1a0024_SBCK_000-4b}
  - {type: variant, offset: 1633, length: 0, content: '', SBCK: 日除祕書郎告詞敕宣教郎太學博士朱震中祕讎書極天下豪俊之選異時貴臣用事至參用醫􅁲之流牛驥同羣可爲太息肆朕初載遴柬儒術之英爾以文藝有聞首寘兹選進與羣髦之列益觀未見之書三篋巳亡且詢安丗勉思􅈓厲將有試焉可特授依前宣教郎祕書省校書郎靖康元年十一月六日除祠部貟外郎告詞敕左宣教郎朱震朕旁求俊乂列寘文昌非徒使之分職率屬允􅁵庶事而衆正在位則朝廷自尊爾渉道精淳存心樂易強學力行白首不衰聞望之休溢於予聽嘉其敷奏之美喜見德人之容郎選甚髙祠曹務簡往共乃職體朕眷私可特授依前官守尚書祠部貟外郎紹興四年十月五日除祕書少􅁥告詞敕左奉議郎守尚書祠部貟外郎朱震朕惟否泰二卦論君子小人消長之理甚明或者謂消長繫乎時數此大不然上下交而其志同於時爲泰故君子以其彚征上下不交而天下無􅀖於時爲否故君子以儉德避難而巳爾學古通經特立守正粹然君子人也固窮郷閭累經除召今者惠然肯來就我榮禄朕以爾之避就􅁲時否泰其庶幾焉蓬山寳藏乃今日養才之地也用爾爲貳蓋不徒然朕知爾舊矣奚俟深訓可特授依前官試祕書少􅁥紹興五年二月十六日除祕書少監兼侍講告詞左奉議郎試祕書少監朱震可特授依前左奉議郎試祕書少監兼侍講左朝奉大夫守宗正少卿兼直史館范冲等學之爲王者事其巳乆矣雖二帝三王蓋甞汲汲於此朕於國家多艱之際不廢祖宗故事爰命儒學之臣環侍便坐講經史敷求政禮以廣聦明爾等操履端方學問該洽通今古逹於治亂之原其必有禆吾不逮冝自卿監之聮兼陪經幄之職益思報稱以副旁求可依前件紹興五年閏二月五日轉承議郎告詞敕左奉議郎試祕書少監兼侍講朱震朕纂極之初推曠蕩之澤士大夫京秩而上例進一等蓋祖宗舊制也爾方投閑在逺積有歳年而恩未霑及恬退之風有足嘉者序進厥官往其祗服可特授左承議郎依前祕書少監兼侍講紹興五年三月}
