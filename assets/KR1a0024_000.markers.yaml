  - {type: variant, offset: 1657, length: 5, content: 者臣聞商瞿, SBCK: 部侍郎兼詳定一司􅎁令晏敦復左朝散大夫試尚書户部侍郎兼詳定一司􅎁今李彌遜左中大夫試尚書禮部侍郎曽開左朝請郎試尚書兵部侍郎張燾左朝奉大夫新除尚書兵部侍郎兼資善堂翊善兼侍講吳圭左朝奉大夫試給事中兼侍講張致逺左朝奉大夫試給事中兼史館修撰勾濤左朝奉郎試中書舎人兼直}
  - {type: variant, offset: 1663, length: 0, content: '', SBCK: 士院兼侍講吕本中左朝請郎試中書舎人樓炤左朝請郎試中書舎人勾龍如淵左朝請郎權尚書吏部侍郎魏玒左奉議郎權禮部侍郎張九成謹以清酌庶羞之奠致祭于故侍讀内翰翊善朱公之靈惟公老}
  - {type: page-break, offset: 1663, content: '', id: KR1a0024_SBCK_000-15b}
  - {type: variant, offset: 1664, length: 2, content: 夫子, SBCK: 田􅅿困於州縣白首窮經意則不倦視彼世人奚貴奚賤不義而得吾亦不願一昨召來遇知明主金馬玉堂四渉寒暑以經決事隨事有􅀘位髙職卑亦莫公侮不傳之要}
