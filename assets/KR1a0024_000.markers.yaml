  - {type: variant, offset: 1635, length: 0, content: '', SBCK: 除起居郎告詞敕左承議郎祕書少監兼侍講朱震孔子稱天下歸仁曰非禮勿言非禮勿動人君託于王公之上一言一動則必記之是欲克巳復禮俾天下之歸也設官之意其深矣乎以爾習於春秋明乎褒貶經筵勸講開益爲多命爾立螭記予言動官分左右職固不殊朕知戒非禮之爲爾其謹必書之職可特授依前左承議郎守起居郎兼侍講紹興五年五月三日除兼資善堂贊讀告詞敕左承議郎守起居郎兼侍講賜緋魚袋朱震朕惟蒙之象曰山下出泉蒙君子以果行育德蓋泉之初未有所之如人之蒙未知所適泉决之東西蒙導之邪正亦惟其人而巳矣以爾純白内備博見洽聞羲易麟經尤所精貫華光勸講宏益滋多方開學於南宫乆注心於舊德贊讀資善汝往惟諧旣正朕之不難宜誨蒙之無倦兼職雖衆應用莫窮勿嫌拜賜之頻實繄稽古之力其益懋哉可特授依前官兼侍講兼資善堂贊讀紹興五年六月三日除中書舎人兼資善堂翊善告詞敕昔者周穆繼南征之後無討賊之心逮乎平王爲東遷之君無興復之志觀其告命泰然與成康之丗無異君子是以知周德之衰矣烏乎有能宣吾惻怛難喻之情如建武奉天詔書以助中興之功者乎左朝奉郎守起居郎兼侍講兼資善堂贊讀賜緋魚袋朱震學博而造深行和而志正以道獻替簡于朕心陞擢綸誥之司仍卒金華之業尚賢西學諭教如初夫士以得君爲難而朕之知汝者厚矣論思潤色尚往欽哉必無媿於古人乃有辭於永丗可特授依前官試中書舎人兼侍講兼資善堂翊善紹興五年八月十七日轉朝散郎告詞敕典謨訓誥皆上古之書筆削春秋著先王之志其文雖史垂丗爲經朕仰奉孫謀恭繩祖武覽􅁉陵之實録悼私史之謗言譬夫氛祲之興或掩昭回之象乃詔羣彦同次舊文左朝奉郎試中書舎人兼侍講兼資善堂翊善賜紫金魚袋朱震學貫九流趨皇極㑹歸之要識深五傳窮古人述作之原頃預編摩克嚴去取兹閱奏篇之上彌嘉汗簡之勞十九年之勲德旣昭千萬丗之楷模斯在祖宗有慶非出朕私爵秩所加式爲爾寵名附不刋之典實彰有永之辭可特授左朝散郎依前試中書舎人紹興五年十月七日轉左朝請郎告詞敕朕惟帝王之治求端於天是以察璿璣者協時月正日陳洪範者省歳月日時本天理而時措之後王用智力而持丗曲學判天人爲兩途凡曆象授民之妙散爲術家至於閏餘失次攝提無紀以爲是固然而不知其拂天害民亂之大者也左朝散郎試中書舎人兼侍講兼資善堂翊善賜紫金魚袋朱震學深象數智潜幽􅆌㑹於道要得其本原屬曆法之有差視筭家而參正成書來上七政以齊雖史遷之起太初子雲之明三統不得專美予用嘉之序進一官少旌勞績是謂德賞往其欽承可特授左朝請郎餘依前紹興五年十月二十二日除給事中告詞敕自昔有事殿内之臣不過侍左右掌顧問而巳然猶遴擇名儒以充此選矧今萬務出入皆屬東臺時當艱危動關興廢其或行事不協于中任官不厭于衆雖有君命皆得駮而正之其職可謂重矣肆求聞人今以命汝左朝請郎試中書舎人兼侍講兼資善堂翊善賜紫金魚袋朱震學際天人識窮理亂年德俱懋望實素隆演誥西垣榮問益暢進司􅃈闥公議允諧夫糾其乖違俾庶政孚于羣聽審其奏述使下情得而上通則朕爲得人而汝爲稱職豈不休哉可特授依前左朝請郎試給事中餘如故紹興六年正月十六日轉左朝奉大夫告詞敕朕深惟國本茂建宗支朝夕端士之親冀性習於爲善博約前言之識俾學富於多聞聿就終篇可無褒律翰林學士左朝請郎知制誥兼侍讀兼資善堂翊善賜紫金魚袋朱心潜六藝文貫九流廷論􅀝如蓍􅀛正人頼爲領袖雍容視草何獨潤色之工宻勿告猷備罄論思之益屬宗藩之諭教嘉術業之嚮成疇稽古之勤旣車服之是錫懋増秩之渥抑典故之具存尚堅調護之功用究師儒之効睠予􅂄艾奚假訓詞可特授左朝奉大夫依前翰林學士知制誥餘如故紹興六年十一月三日乞宫觀差遣不允詔敕朱省劄子奏乞除一在外宫勸差遣事具悉朕以王教存乎篇籍方儒學之是咨老成重於典刑實朝廷之所頼故詳延於􅉞碩以參劘於古今卿道術深明文辭英妙􅂄名髙義足以爲羣士之羽儀博物洽聞足以備一時之訪問禁林遞直歳律載周侍經幄之燕間謹宗藩之訓導國僑潤色非有官職之甚勞陸䞇腹心尚􅀝神明之克壯奉身而退匪朕所聞其體睠懐母重來請所請冝不允仍不得再有陳請故兹詔示想冝知悉再乞宫觀不允詔卿文足以逹意學足以明理行足以正人兼是三者故處以視草橫經之地且使從吾嗣子之逰旣有年矣遽覽奏章引疾丏外辝意甚切朕爲之動心焉夫德齒俱懋固平日之所尊氣體失平亦老者之常事姑務休養以期清明使朝廷之所寳惟賢則四方必仰朕之德豈小補哉所請冝不允故兹詔示想冝知悉辝免翰林學士不允詔敕朱省所奏辝免翰林學士知制誥恩命事具悉昔陸䞇爲學士國有大政參裁可否興元戡難之功實多文懐之助卿學造壼域識通繫表文章典雅無愧昔人議論堅明有補當丗越朕初載杖䇿軍門誼先國家節貫華皓老成在服厥有典刑俾代予言以紓素緼豈特資其討論潤色之益亦將託以腹心耳目之􅀉焉尚執謙撝殆非所望亟共乃服母復費辝所請冝不允故兹詔示想冝知悉再乞宫觀不允詔敕朱乞除在外宫觀事具悉卿學髙諸儒名映一代從朕艱難之際實惟舊人藹然德義之風信於多士契闊累歳登崇近班大􅉺髙文佐時戡難博物彊記益朕多聞國有老成衆無異論朕方知九德之行灼見三俊之心庶無遺材用齊多故雖山林隱居之士尚當結綬而來顧朝廷領袖之賢乃欲奉身而去况神明之克壯何疾病之可言覽觀來章殊咈朕眷勉安厥位母復有云所請冝不允故兹詔示想冝知悉辭免建國公聽讀尚書終篇恩命不允詔􅎁朱所奏辭免轉一官恩命事具悉朕擇本支以隆國勢修勸導而備官司其有成勞可無褒命卿經術深懿獨髙諸儒德性純明自傾多士爲時􅂄舊適副簡求日陳道義之言助子詩禮之訓肆稽故事以寵畢章朕方擢先王厲世之規通天下赴功之志雖踈逺之吏摽末之庸並録不遺以勸爲善况如卿者其可辭乎何爲上書遽求反令固難曲徇其趣欽承所請冝不允再辭不允詔朕以卿道藝深明行能髙妙傳授經業訓迪宗藩俾通上古之書冝從增秩之賞而乃屢陳悃愊力避􅃂榮夫尊賢顯功蓋人主馭臣之柄而難進易避亦師儒厲俗之規使勤勞而見知者尚或固辭則虚僞而幸進者庶幾有恥豆惟勉從於爾志抑亦少勸於士風載亮沖懷不忘嘉歎乞宫觀不允詔朕寤懷英賢共圖康濟雖山林隱逸之士尚不倦於招徠矧朝廷耆艾之儒豈忍使其輕去卿學窮}
