  - {type: variant, offset: 1797, length: 368, content: 文辭不復推原大傳天人之道自是分裂而不合者七百餘年矣國家龍興異人間出􅗛上陳摶以先天圖傳种放放傳穆修修傳李之才之才傳邵雍放以河圖洛書傳李漑漑傳許堅堅傳范諤昌諤昌傳劉牧修以太極圖傳周敦頤敦頤傳程頤程顥是時張載講學於二程邵雍之間故雍著皇極經世之書牧陳天地五十有五之數敦頤作通書程頤述易傳載造太和三兩等篇或明其象或論其數或傳其辭或兼而明之更唱迭和相為表裏有所未盡以待後學臣頃者遊宦西洛𫉬觀遺書問疑請益徧訪師門而後粗窺一二造次不捨十有八年起政和丙申終紹興甲寅成周易集傳九卷周易圖三卷周易叢説一卷以易𫝊為宗和㑹雍載之論上採漢魏吳晉元魏下逮有唐及今包括異同𥙷苴罅漏庶㡬道離而復合不敢傳諸博雅姑以自備遺忘豈期清問俯及芻蕘昔虞翻講明祕說辨正流俗依經以立註嘗曰使天下一人知已足以不恨而臣親逢陛下曲訪淺陋則臣之所遇過扵昔人逺矣其書繕寫一十三冊謹隨狀上進以聞謹進, SBCK: 饗}
