  - {type: variant, offset: 1636, length: 1, content: 㫖, SBCK: 域行允廷僉論必據經文推華國揚歷禁塗之久備觀辰告之忠不獨朕知卿之旣深亦惟卿守義之甚固老成在列多士朋來胡爲抗章遽欲引退與其潔身而辭位希廉士之風熟􅀂盡道以致君卒賢人之業勉體至意母重有陳所請冝不允贈官告詞􅎁死生之道通乎晝夜達者以爲當然君臣之義篤於始終有國以爲}
  - {type: page-break, offset: 1636, content: '', id: KR1a0024_SBCK_000-14a}
  - {type: variant, offset: 1638, length: 2, content: 臣進, SBCK: 典逮此告終之問敢忘哀贈之恩故翰林學士左朝奉大夫致仕長林縣開國男食邑三百戸賜紫金魚袋朱蚤以詞華亟躋膴仕晚由學術荐更禁塗驚怛化之無常悵徽音之如在子有憗遺之感人懷殄瘁之悲攷於故常申此贈典百身可贖興懷不朽之規一鑑云亡徒有無從之涕精爽不昧冝歆此恩可特贈左中大夫餘如故紹興八年七月三日回朱八行子發啓胡文定公安國薦章交剡公議甚孚凡屬俊游共欣榮問學正八行賦才雄驁受業精通手披萬卷之書要歸卓約筆掃千軍之陣恥尚浮華有言必務於躬行}
  - {type: page-break, offset: 1638, content: '', id: KR1a0024_SBCK_000-14b}
  - {type: variant, offset: 1641, length: 2, content: 撰周, SBCK: 得多繇於心了家庭素履豈求聞達之方郡國諸侯樂任賔興之職夜鶴不驚於佩帳大鵬正假於扶揺言念迃愚久敦情好論交莫逆固蘄美譽之彰懲沸誤吹初絶游談之助盍相忘於微􅀏尚伸貺於長牋過形引重之詞彌服推先之義然賢者名髙而責備物情利及而爭歸聖門之實學難窮人境之虛榮}
  - {type: variant, offset: 1644, length: 6, content: 集傳等書仍命, SBCK: 惑平居把􅃑最欽松桂之姿得路彯纓更礪氷霜之節證明吾道􅀝仗英摽祭文維紹興八年歳次戊午七月庚申朔十七日辛丑左朝散郎試}
