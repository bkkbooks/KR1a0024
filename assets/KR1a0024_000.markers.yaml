  - {type: variant, offset: 71, length: 496, content: 是書題曰漢上盖因所居以為名前有震進書表稱起政和丙申終紹興甲寅凡十八年而成其説以象數為宗推本源流包括異同以救莊老虛無之失陳善捫蝨新話詆其妄引説卦分伏羲文王之易將必有據雜卦反對造孔子易圖者晁公武讀書志以為多采先儒之説然頗舛謬馮椅厚齋易學述毛伯玉之言亦譏其卦變互體伏卦反卦之失然朱子曰王弼破互體朱子𤼵用互體自左氏已言亦有道理只是今推不合處多魏了翁曰漢上易太煩却不可廢胡一桂曰變互伏反納甲之屬皆不可廢豈可盡以為失而詆之觀其取𧰼亦甚有好處但牽合處多且文詞繁雜使讀者茫然㸔來只是不善作文爾是得失互陳先儒已有公論矣惟所叙圖書授受謂陳摶以先天圖𫝊种放更三𫝊而至邵雍放以河圖洛書𫝊李溉更三𫝊而至劉牧穆修以太極圖𫝊周敦頥再𫝊至程顥程頥厥後雍得之以著皇極經世牧得之以著易數鈎𨼆圖敦頥得之以著太極圖説通書頥得之以述易𫝊其説頗為後人所疑又宋世皆以九數為洛書十數為河圖獨劉牧以十數為洛書九數為河圖震此書亦用牧説與諸儒互異然古有河圖洛書不云十數九數太衍有十數見於繫辭太乙九宫見於乾鑿度不云河圖洛書黒白竒偶八卦五行自後來推演之學楚失齊得正亦不足深詰也乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀漢上易傳原, SBCK: ''}
