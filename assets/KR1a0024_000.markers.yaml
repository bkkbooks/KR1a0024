  - {type: variant, offset: 1759, length: 37, content: 同要之去𧰼數之源猶未逺也獨魏王弼與鍾會同學盡去舊説雜之以莊老之言於是儒者專, SBCK: 亡識公日淺相知則深公病不起孰不痛心涼風應時白露日侵薄酒寓哀公或肯臨}
