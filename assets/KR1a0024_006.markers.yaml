  - {type: variant, offset: 1000, length: 228, content: 曰往有尚也夫初九遇九四所以得尚于五者以正相資而成豐譬之共難則仇怨協力勢使之然若妄動不正過四而有其位明動不相為用過旬也過旬則失其配主往而无所尚與坎險相㑹災至矣豐道亡所以災也故曰過旬災也初動有小過象故曰過旬謂之均者六甲周行乘八節其數四百八十而成鈞鈞勻也初九離納已九四震納庚自已至庚凡十日十日周而復始故訓勻六二豐其蔀日中見斗往得疑疾有孚發若吉象曰有孚發若信以發志也震巽為草二在草中有周匝掩蔽之意故曰蔀陸震曰厯法凡十九年閏分盡為一章四章凡七十六年為一蔀五蔀周六甲凡, SBCK: 田􅀗}
