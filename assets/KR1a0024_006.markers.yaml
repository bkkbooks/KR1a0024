  - {type: variant, offset: 1530, length: 3769, content: 之上成艮艮離為天文星在斗之後隨斗而動者昧也三明極而剛正處豐之昧上六闇極矣猶日中當明而反見斗後之星其闇尤甚巽為事陽為大伏坎為可豐尚大也豐其斾往見則不明故退而守正以不可大事故也兊為右伏艮為肱兊折之折右肱也上六闇極不可用之以有為從之必罹其咎故自折其右肱示終不可用則无咎九四豐其蔀日中見斗遇其夷主吉象曰豐其蔀位不當也日中見斗幽不明也遇其夷主吉行也四動成坎離光明也不動成震巽震巽為草掩蔽周匝蔀也四在蔀中處不當位自蔽其光明故曰豐其蔀兊有伏艮四應離初艮離為天文震動也其策七有星動於上而其數七斗之象離目為見四處不當位又不能變若動而交初則幽者明矣坎為隱伏故也以此處豐猶日中之時而反見斗處幽暗而已不明故曰幽不明也九四不正其不明自取之異於二三矣夷主者謂初也九四與初九均為陽而上下不敵四忘其勢下夷於初四者初之所主也故曰夷主初正正則吉初九助四而上行以資其明吉行也易𫝊曰居大臣之位得在下之賢同徳相輔其助豈小也哉六五來章有慶譽吉象曰六五之吉有慶也六五屈體來下於四與之共天位九四之明上行之五相錯成離坤離為文章者文之成也九四上行則初應四二應五三應上六爻並用成豐大之慶五屈已下賢四志行乎上人自譽之兊為口譽之者也五得正吉也上六豐其屋蔀其家闚其户闃其无人三歲不覿凶象曰豐其屋天際翔也闚其户闃其无人自藏也自二至上體大壯棟宇之象上六動隂變陽為大豐其屋言自處高大也二為家震巽為草豐盛周匝以掩蔽之蔀其家言所居不明也自處高大所居不明以高亢自絶於人如飛鳥務上翔於天際豈復能降哉上動成離離為飛鳥乾為天在外卦之際天際也豐之時九三忘其敵已下資初九三與上六正應也其能忘乎故三自下往庶幾發其昏暗知處豐之道九三離目為見往闚之坤户闔而不應闃寂乎其无人聲太𤣥所謂外大抗中无人也三於是退而自藏於坎中乾為歲三自四歴三爻三歲不覿也豐其屋蔀其家自絶於人也三歲不覿人絶之也上六動不正凶也不直曰凶者有應焉猶冀乎下交也至于三歲不覿人亦厭之而凶至矣闚小見也覿私見也自上六言之謂之窺隂為小也自九三之上言之謂之覿私見也私不正也艮下離上旅小亨旅貞吉彖曰旅小亨柔得中乎外而順乎剛止而麗乎明是以小亨旅貞吉也旅之時義大矣哉旅否之變也剛當居上柔當居下六居五失其所居而在外旅也然六居五柔得中矣得中則其柔不過得為旅之中道易傳曰中非一揆旅有旅之中也柔得中則能順乎上下之剛不為剛所揜而小者亨順乎剛而柔失中旅道窮矣坤順也君子入國問禁興之日從新國之法順乎剛也故曰柔得中而順乎剛此以六五言旅小亨也九居三未為失其所居也然則自五而反居於下猶為旅也居三成艮屈其剛而止於下自謙屈之道也雖止乎下矣然九三正止而不失其正上麗乎離之明君子之居是邦也事其大夫之賢者友其士之仁者麗乎明也正然後能麗乎明不正又將拒我矣正則吉故曰止而麗乎明此以九三言旅貞吉也旅難處也旅如六五柔得中乎外而順乎剛在我者不失已矣乃可以小亨旅如九三止而麗乎明在彼者亦不失人矣乃可以貞吉是以旅一也而再言之易傳曰旅困之時非陽剛中正有助於下則不能致大亨如卦之才則可以小亨得旅貞而吉也四方固男子之事居者必有旅也顧處之如何耳夫子厯國應聘嘗去父母之邦矣去他國矣欲浮于海居九夷矣盖得旅之時義也旅之時不一而義者時措之宜知其時而不知其宜不可也非大人孰能盡之故曰旅之時義大矣哉在卦氣為四月故太𤣥凖之以裝象曰山上有火旅君子以明慎用刑而不留獄山上有火明而止止而不處旅也君子之用刑也雖明而止故明而慎於用刑雖止而不處故亦不留獄明者或不慎慎者或留獄失旅之象也離有伏坎為獄兊為刑殺艮止慎也初六旅瑣瑣斯其所取災象曰旅瑣瑣志窮災也鄭曰瑣瑣小也艮為小動而之四復成艮小之又小瑣瑣也初六小人之旅卑柔而不中正恃應而求於四者煩褻其細已甚故曰旅瑣瑣四巽極而躁火性炎上不能容初艮止也厭止妄動往而復止人亦厭之志窮也坎險災也志窮遇險斯其所取災也艮為手有求取之象楚申侯是已曰斯曰其者初四上下皆有艮手取災之象故指兩爻言之六二旅即次懐其資得童僕貞象曰得童僕貞終无尤也艮止也二得位止而得位即次舍也離兊為蠃貨貝資財之象二巽為入懷其資也童僕一本作僮僕艮為少男初卑隂賤二在上畜之童僕也初於二得童僕貞也童僕貞則二親信之而不疑旅在下柔而中正即次所遇而安也懷其資得三四五之助也又得童僕貞而下承之旅如是多助矣故動而之外終无尤之者五兊為口尤之者也初六不正而曰貞者貞於二也貞於主人二巽東南主人位也歸妹九二利幽人之貞貞於五也童僕貞然後次舍可止貨資可有夫子曰審其所以從之之謂貞也九三旅焚其次喪其童僕貞厲象曰旅焚其次亦以傷矣以旅與下其義喪也艮止也三得位止而得位次舍也巽木離火焚其次也九三在旅而過剛四五之所不與則失其所止有焚其次之象兊為毁傷也旅失其所止亦可傷也初艮為童僕九三既失其所止以旅之故乃巽而與下失尊卑之宜初三易位初失其正喪其童僕貞也所以喪者為旅之義剛柔皆失中旅如是寡助也矣六居三不正危之道九四旅于處得其資斧我心不快象曰旅于處未得位也得其資斧心未快也二三止而得位為次舍四巽為入而未得位行者處而已入對出言之為處九四非安處也故曰旅于處離兊為蠃貝資也離為兵巽木貫之斧也得其資以為利得其斧以為斷上得乎五下得乎三之助矣九剛明之才而處四履謙能下善處乎旅故得上下之利有資貨焉有器用焉雖不若六二亦曰得其所矣然未得位也上不足以發五之志下不足以致九二之賢雖得資斧未免為旅人故我心不快兊為決中為心四進而上道行于五而二應則快矣孟子曰久於齊非我志也六五射雉一矢亡終以譽命象曰終以譽命上逮也五在旅卦不取君象君不可旅也離為雉雉文明之物文明人文也聖人止亂而不以威武者也離為兵伏坎為弓伏艮為手兵加之弓上矢也矢者射雉之器五動弓矢發離坎毁而雉亡一矢亡之也一矢亡雉者五得中道動而必中乎理之象然六五未當位雖有文明之徳未可以動上九屈體逮之則令譽升聞而爵命之矣兊口在下與之譽也巽為命上卦之終由譽而後命之始也未當位終也譽命故曰終以譽命五進上其在賔師之位乾西北賔之位也上九鳥焚其巢旅人先笑後號咷喪牛于易凶象曰以旅在上其義焚也喪牛于易終莫之聞也上九離為飛鳥九動變六成震巽巽為木震為竹葦鳥隠其中巢也上九極剛以髙亢居上非旅人之宜巽木離火鳥焚其巢失其所也離目動震有聲笑也樂其未焚之前柔順謙下時也兊澤流於目巽號出於口哀於既焚之後悔其先之時也上與三相應之地上六變而正成坤坤為牛九三應而上降三正成坎坎為耳上九髙亢不變坤象隠喪牛也易輕易也火性剽疾上九極剛輕易也故曰喪牛于易九喪柔順三不往應坎耳伏矣輕易者自塞其耳而聰不明也陸機覉旅處羣士之上而不聞牽秀孟玖之毁其以髙亢輕易而致禍乎巽下巽上巽小亨利有攸往利見大人彖曰重巽以申命剛巽乎中正而志行柔皆順乎剛是以小亨利有攸往利見大人柔在下而承二剛巽也巽為風風者天之號令命者天之令也故巽為命内巽者命之始外巽者巽而達乎外申前之命也重巽之象唯可施之於申命先儒謂上下皆巽不違其令命乃行也若施之於佗則巽已甚矣故曰重巽以申命此以兩體而言巽也巽自遯來訟之變六三之四上下皆巽九二之剛巽乎中也九五之剛巽乎中正也巽乎中正則其剛不過而所施當乎人心是以志行乎上下故曰剛中正而志行此以三四相易而言九二九五之巽也九二之柔巽乎正則初六之柔順之九五之剛巽乎中正則六四之柔順之上下之柔皆順乎剛則物无違者而九二九五之志行故曰柔皆順乎剛此以初六六四言大者巽則小者无不順也柔皆順乎剛雖无違者然順乎中正乃善不然失所從矣六四離目為見大人者九五剛而巽乎中正者也剛巽乎中正而柔順之則柔者亦得其正而小者亨矣豈非小者之利乎故曰利見大人此以九五言巽之利也小者亨矣故六四利有攸往利見大人而其道上行故曰是以小亨利有攸往利見大人徐氏王昭素考王弼注有命乃行也四字當在重巽以申命之下疑彖或脱文理若有之在卦氣為七月故太𤣥凖之以翕象曰隨風巽君子以申命行事巽為風風巽而入者也前後相隨而至則歲事行矣故巽又有事之象傳言八風之至各以四十五日而成一歲是也君子申命諄諄者行事也行事莫如巽巽則易入初六進退利武人之貞象曰進退志疑也利武人之貞志治也巽初行事之始也居卑體柔不能自立過於巽者也退則不安進則无應又二剛據之莫知所從巽為不果故曰進退志疑也六變九巽成乾應兊乾為健兊為決疑志去矣健決者武人之貞天道尚右故兊為武人志疑者不先治其志也君子自治其動以正行之以健決確乎不可移雖千萬人必往孰能奪其志哉故曰利武人之貞志治也巽為工有治之意易傳曰治謂修立也九二巽在牀下用史巫紛若吉无咎象曰紛若之吉得中也巽初坤變乾也巽為木坤西南方乾為人設木於西南之奥而人即安焉者牀也巽股變艮股見手伏蒲伏于牀下之象九二不正卑巽如此宜有咎然九二剛中其動也正卑巽者非為利也將以誠意感動九五而已故用史巫紛若吉吉者正也九二之動上之五成震震為聲五之二成兊兊為言上九宗廟兊口出聲祝史道人之意以達于鬼神之象六降于二巫以鬼神之意告乎人之象史巫皆尚口而巽故也四巽離為絲二五升降史巫紛若則卑巽之意達於上則柔者亦得其正而小者亨矣豈非小者之利乎故曰利見大人此以九五言巽之利也小者亨矣故六四利有攸往利見大人而其道上行故曰是以小亨利有攸往利見大人徐氏王昭素考王弼注有命乃行也四字當在重巽以申命之下疑彖或脱文理若有之在卦氣為七月故太𤣥凖之以翕象曰隨風巽君子以申命行事巽為風風巽而入者也前後相隨而至則歲事行矣故巽又有事之象傳言八風之至各以四十五日而成一歲是也君子申命諄諄者行事也行事莫如巽巽則易入初六進退利武人之貞象曰進退志疑也利武人之貞志治也巽初行事之始也居卑體柔不能自立過於巽者也退則不安進則无應又二剛據之莫知所從巽為不果故曰進退志疑也六變九巽成乾應兊乾為健兊, SBCK: 品}
