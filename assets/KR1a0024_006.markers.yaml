  - {type: variant, offset: 1229, length: 192, content: 百八十年而厯象小成豐蔀之名盖寓此意離目為見豐為日中五兊伏艮艮離為天文賁之象也震少陽其策七震為動有星在上動於中而其數七斗之象也二有至明中正之才以豐時遇闇弱不正之君猶當晝而夜至於見斗其昬甚坤為冥晦闇之象五既不能下賢二自往見反得疑疾自往者亦取疑之道巽為不果六五隂失位疾也然二五相應之地有孚之理二積中正不巳盡其誠信以感發其志則五動而應之而吉易傳曰苟誠意能動雖昬蒙可開也雖柔弱可輔也雖不正可正也, SBCK: 品}
