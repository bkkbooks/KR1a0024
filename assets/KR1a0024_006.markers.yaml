  - {type: variant, offset: 0, length: 989, content: 欽定四庫全書漢上易傳卷六宋朱震撰下經離下震上豐亨王假之勿憂宜日中彖曰豐大也明以動故豐王假之尚大也勿憂宜日中宜照天下也日中則昃月盈則食天地盈虚與時消息而况於人乎况於鬼神乎豐泰九二之四也乾變離明坤易震動明以動則亨亨則大豐大也故曰豐亨彖曰豐大也明以動故豐此合兩體言致豐之道也假至也乾在上之象王者明以動其道亨乃能至於豐大九二上行至四王假之也王假之者尚大也四海之廣萬物之衆无一物不得其所无一夫不獲自盡非小道之所能至故曰王假之尚大也此以九四言乎豐之才也二四失位為憂離下有伏坎為加憂離見坎伏勿憂也然明以動勿憂其至於大也進而至於五則得位矣故曰勿憂此以九二之四言乎豐之才也離日震動日當五為中日動於下升于東方明動不已九四進五何憂乎不至於中而无所不照哉日之大明萬物咸覩宜照天下也乾為天五離應二照天下也太𤣥曰日正於天何為也曰君子乘位為車為馬車軨馬􅧊可以周天下故利其為主也宜日中則正於天利其為主之謂也故曰勿憂宜日中宜照天下也此以九二進而至五言乎豐之才也五復降四坎離象變離成兊日在西日中則昃也坎成兊巽兊為口月闕於巽辛月盈則食也四乾陽長於震二坤隂生於離陽長盈也息也隂生則盈者虚消者息矣有天地然後有人有鬼神鬼神往來於天地之間者也豐大之時所宜憂者不在乎未中而常在乎日之既中也何則日中俄且昃矣月盈俄且食矣盈者必虚息者必消天地之所不能違者時也而况天地之間聚而為人㪚而為鬼神乎明動不己未有能保其大者也保此道者其唯中乎故曰日中則昃月盈則食天地盈虚與時消息而况於人乎況於鬼神乎此復以坎離升降明豐之戒也在卦氣為六月故太𤣥凖之以大廓象曰雷電皆至豐君子以折獄致刑雷電皆至萬物豐大之時豐則生訟故君子法其威明並用以治刑獄電明照也所以折獄雷威怒也所以致刑折獄者以正折其不正初二三正也而二有伏坎為獄不明則枉者不伸致刑者刑其不正而己四五不正也兊為刑殺不威則小人不懼噬嗑其明在上君子在上之事也故為明罰敕法豐用明在下君子在下之事也故為折獄致刑初九遇其配主雖旬无咎往有尚象曰雖旬无咎過旬災也泰九二之四成豐故九四為豐之主配者隂陽相匹孟氏鄭氏本作妃嘉耦曰妃妃嫓也亦匹配之意初九九四陽也六五隂也初與四不應六五亦无應四雖不應初可因四為主而配五隂陽相配故九四為配主遇者不期而會四不應初而初九主之不期於會而會故曰遇其配主旬均也初九九四均也然明動相資致豐之道非明則動无所之非動則明无所用是以均而无咎无咎者初九以正相資也初九遇四往而相易以致用則初得尚于五而豐之, SBCK: ''}
