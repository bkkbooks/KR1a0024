  - {type: variant, offset: 0, length: 175, content: 欽定四庫全書漢上易傳卷四宋朱震撰下經艮下兊上咸亨利貞取女吉彖曰咸感也柔上而剛下二氣感應以相與止而說男下女是以亨利貞取女吉也天地感而萬物化生聖人感人心而天下和平觀其所感而天地萬物之情可見矣咸感也不曰感者交相感也咸自否變乾天也坤地也六三之柔上上九之剛下天地之氣感應而上下相與則亨矣故辭曰咸亨彖曰咸感也柔上而剛下感應以相與此以三上交感六爻相應言咸所以亨也闗, SBCK: ''}
