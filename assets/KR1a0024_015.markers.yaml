  - {type: variant, offset: 18463, length: 250, content: 變矣蘇氏解需光亨曰光者物之神也此闗子明之説也或問神曰日月在上其明在地夫日月之形其大如盤盂光之所燭被乎萬物非神乎盖神難言也故以光形容之君子動而有光廣大无所不及故易言未光未光大者皆狹且陋也訟反需者也需四之五剛往而得位二陰避之故曰亨訟三之二剛來而失位二陰塞之故曰窒需有孚而亨於外故物需之訟有孚而窒於内故已訟之或曰乾當在上處乎下則必升坤當在下處乎上則必降此言否泰可也於訟无妄不通矣訟四剛來而得中无妄曰剛自外來而為主於内二卦陽爻皆四畫盖訟者遯三之二无妄者遯三之初凡言來者皆自外來初二視三則外矣小畜以陰畜陽惟九三, SBCK: 傳第十}
