  - {type: variant, offset: 262, length: 407, content: 隂陽各得其正非疾也説卦以坎為心病坎者乾之二五交乎坤也二陽不當位疾也五陽當位通也故坎又為心亨先儒槩以坎為病則誤也曰心病曰心亨者二五中也離為飛鳥鳳謂之朱鳥離也又謂之朱雀故雀入大水為蛤離極成坎也變坎七變艮二即五也初自下爻三變即前參以變也次自中爻下而二變次自中爻上而二變即前伍以變也參去伍伍去參皆不能變此三所以為極數五所以為小衍也若一若二即未變也故曰天地定位易行乎其中巽為號又有嗃嗃者何交乎離也巽為風離為火大且急者風火之聲怒聲也天下之大聲有四曰雷曰風曰水曰火𫝊曰衆怒如水火或用一卦或用一爻或不可用則曰勿用天下之時无不可用者顧用之如何耳一索再索三索先論揲蓍次論䇿數中便有八卦次論畫卦中坎離互有四卦歸藏之乾有乾大赤乾為天為君為父又為辟為卿為馬為禾又為血卦歸藏小畜曰其丈人乃知丈人之言三代有之臨川解睽六五噬膚曰膚六三之象以柔為物之間可噬而合此卦自二至上有噬嗑象此互體也後説之弧一作壺爻有坤坎離艮而无震足當作弧明夷之離為小過之飛鳥, SBCK: ''}
