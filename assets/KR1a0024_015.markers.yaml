  - {type: variant, offset: 10076, length: 3117, content: 柔者隂爻也剛柔之爻或謂之來或謂之分或謂之上下所謂惟變所適也此虞氏蔡景君伏曼容蜀才李之才所謂自某卦來之説也夫質之於經而合考之義而通則王弼折之亦可謂誤矣先儒以魚為巽其多白眼乎巽為風蠱𩔖之大者唯魚與蛇故魚有吞舟蛇或吞象如蠡魚亦云厲蛇所化北方層磎鼠在冰下西域火鼠毛可為布坎離之相易也運斗樞曰玉衡散而為鼠玉衡斗星亦言乎坎也易无非象也象著而形乃謂之器如坎有弓象非木非繩則其器不備巽變為坎然後弦木為弧乃有器之名矣自離至夬十三卦序聖人備物致用立成器以為天下利者皆取重卦之象故其制器取法皆有内外之象其用亦然網罟耒耜市貨衣裳舟楫牛馬門柝杵臼弧矢棟宇棺槨書契兩象也佃漁耒耨交易垂衣裳濟不通引重致逺待暴客濟萬民威天下待風雨治百官察萬民封木喪期亦兩象也㒺舉綱紀通言之罟止言其紀而已𫝊言斷罟又言罟目是也巽為繩變為離離為目結繩為目罟也重目為綱自二爻至四爻有巽體巽為魚多白眼也自三至五有兑體兑為澤網罟入澤而魚麗之以漁也離為雉以佃也觀乎此庖羲氏既重六爻矣天地能變化成萬物者必水火雷風山澤合一焉所謂隂陽合徳剛柔有體也隂陽者在天成象也剛柔者在地成形也萬物既成各得其一故健順動入陷麗止説其性各不同能備萬物而兼有之者人也故下舉八畜八體而終之以男女帝乗萬物出入終始所可見者萬物之迹而其用盖妙乎萬物不可得而見焉故曰神也者妙萬物而為言易之乾坤分隂分陽迭用柔剛上下不居周流六虚盖象乎帝也故曰陰陽不測之謂神聖人用易立法制器變通不倦故曰利用出入民咸用之謂之神水雷山乾也火風澤坤也雷風相薄山澤通氣水火不相射乾坤不相離也天地之撰物者如此而萬物皆有乾坤六子之象觀乎物則神明之徳見矣故易之六爻變化必陰陽合徳而剛柔有體其立法制器亦然王弼曰爻苟合順何必坤乃為牛義苛應健何必乾乃為馬不知凡健順者皆乾坤之象爻有變化雜而成文如不以健順論乾坤之性則説卦為贅矣輔嗣自繫辭而下不釋其義盖於象數窮矣周以子為正而孔子彖象皆用建寅故以復為十一月姤為五月故曰行夏之時虞氏已有此論烏其乾巽乎四月純乾也黑者乾也占風者巽也巽變則離故其目赤又為日中之烏史言流火為烏又有赤烏白烏亦離乾巽之變乎貴賤剛柔吉凶變化四者皆天地之固有首言乾坤者六子皆本於乾坤也乾坤之道觀乎天地萬物之變化其道較然著見矣然反觀吾身乾坤安在哉盖善端初起者乾也身行之而作成其事者坤也人皆有善端不亦易知乎行其所知不亦簡能乎飢而食渇而飲晝作而夜止豈不簡且易哉盖以此推天下未有不知而不從者也我知之人亦知之故有親我行之人皆行之故有功有親則俟百世而不惑有功則放諸四海而準可久者謂之徳可大者謂之業賢人之徳業至於配天地成位乎兩間可謂久且大矣然不過健順而已而健順者在乎反求諸身而已豈不至易至簡哉知此則天尊地卑八卦相盪在乎其中矣古之𫝊此者唯曾子子思孟子則然易之為道天地之道耶人之道耶易兼明之矣繫辭焉而明吉凶明人道也剛柔相推而生變化明天地之道也象非見天下之賾者不足以明之故聖人設卦觀象所謂吉凶剛柔變化无非象也得失之初微於毫髮及其有吉有凶則得失之象見矣憂慮虞度躊躇而不决者得失未判之時也及其有悔有吝而憂虞之象見矣凡此者明乎人之道也陰陽進退於子午孰知其然哉萬物蕃鮮而搖落則進退之象見矣所謂變化者不盡於是也此特其凡耳糾錯相紛死生相纒無非其變化也故曰變化者進退之象也日之升降於大空之中本無晝夜猶地而上觀之則出乎地為晝入乎地為夜然南極大暑北極大寒東西出入之際晝夜長短與中國自不同故剛柔之象亦然自六位觀之初為剛二為柔三為剛四為柔五為剛六為柔自陰陽之數觀之七九為剛六八為柔老陽之剛變為陰柔老陰之柔變為陽剛故曰剛柔者晝夜之象也凡此者明乎天地之道也吉凶也悔吝也變化也剛柔也四象之見動于六爻之中而六爻之動不過乎三三者極之道也盖有天地斯有萬物是以卦之變不過乎三六位者重三也九數者三三也邵康節曰易有貞數三是也為是故君子所居而安者易之序也其安於髙卑貴賤之位乎所樂而玩者爻之辭也其玩於吉凶悔吝之辭乎若夫有為有行動而之焉則觀乎剛柔變化而吉凶悔吝之來可以前知矣夫髙卑貴賤吉凶悔吝剛柔變化無非天地也吾之動静不離乎此則福自已求命自我作天地其不祐乎屯卦本坎二之初九二陽也初六陰也陽貴陰賤故曰以貴下賤大得民也動乎險中者非善下不能得衆非剛强不能濟弱故屯卦之用在此一爻坤雖臣道五實君位故為之戒云黄裳元吉黄中色裳下服言守中居下則元吉盖伊尹周公之事也或曰安知非妻道也曰妻道之美盡於六三爻賁自泰來泰上之乾二乾二之坤上剛柔相文故曰賁天𤣥地黄𤣥黄者天地之雜也夫子筮賁愀然其色不平曰以其離乎所謂離者即乾上坤下相文之爻也王弼云卦變不足推致五行然釋中孚六三曰三四居陰金木異性木金云者五行也五行乾兑為金坤艮為土震巽為木唯坎水離火不二中不可以有二故也天積氣而為金者以位言也兑位西乾位西北自東言之震木生離火離火生坤上坤土生兑乾金兑乾金生坎水艮止也土也萬物之終始也蘇氏以復卦為始興之象故於彖論違天不祥於六四言自託於六五言陰之方盛而自度不足以抗初九於上六言乗極盛之末而用之不已不知初九又已復又曰盛必驟勝故敗在其終也伊川訓拂經為違常其説本於王肅頤虞氏謂晉四之初李挺之謂臨九二之上虞以頤初九為晉離離為龜案頤肖離頤通大過大過肖坎坎離交故亦有龜𧰼郭璞得大壯之頤曰柔内剛外則畜緇易象難知者當以卜筮決之如郭璞以頤為龜是也既濟虞曰泰五之二李曰泰二之五其實一也二升而之五然後五降而之二當從李圗伊川解既濟九五曰中實孚也與虞氏孚實之象同又曰中虚誠也與郭璞筮得中孚之需曰虚中象道若虚舟同以此見伊川其於象盖講之矣既濟之九三以剛處剛而用濟者故用二五爻象以發此爻用剛濟物之義乾君也坤為國為昏亂為鬼二之五成坎互成離有兵戈之象故髙宗伐鬼方克之三年者三爻也坎為勞卦故曰憊也必於九三言之者蘇子曰三之為五用也九三剛正處諸侯之位古者諸侯入為六卿出總六師未濟虞曰否二之五圗亦然未濟九四動而正故吉悔亡象曰貞吉悔亡志行也九四之剛其大臣沈勇而能斷大事者乎言不能盡意須觀象乃黙然而自喻伏羲畫卦無文字文王作易乃有彖周公作爻辭至仲尼作彖象文言繫辭説卦觀其所遭之時考其言之詳畧則可知矣同人蜀才曰夬九二升上上六降二圗姤初六升二九二降初當從圗郭璞曰魚者震之廢氣也巽王則震廢故虞以巽為魚坎虞曰乾二五之坤圗作臨初九升五六五降初今從圗坎五虞曰乾為嵗五從乾來案三男之卦無不自乾來者又坎自臨初之五盖上六一爻動不以正而體重險動則陷于險中不得出矣失道然也故聖人取象専以失道言之動不以正失道也上六動則成巽巽繩也乾為嵗首亦以觀巽言之也易傳謂十為數極又十年不克征為終不可行而坎之上六三嵗為終不得出若以始終言之上六終也若以三嵗言之三非極數内外者卦之位進退者爻之時震巽皆為木者何巽之初草之根也震之初木之根也巽之二三木之在上也震之二三草之在上者也木有柔者木之草也草有剛者草之木也説卦舉一隅爾皇甫謐謂互體不可取而論明夷曰明久傷則坎體復而師象立矣得非武王以之乎不知明夷九三互有坎體師象已見乃成南狩易曰剛柔相摩八卦相盪先儒謂陰陽之氣旋轉摩薄乾以二五摩坤成震坎艮坤以二五摩乾成巽離兑故剛柔相摩則乾坤成坎離所謂卦變也八卦相盪則坎離卦中互有震艮巽兑之象所謂互體也王弼譏互體卦變然注睽六二曰始雖受困終𫉬剛助睽自初至五成困此用互體也注損九二曰柔不可全益剛不可全削下不可以无正初九已損剛以順柔九二履中而復損已以益柔則剥道成焉此卦變也故王昭素難弼曰若九二損已便成剥道則初九損剛九二弗損合成蒙卦三者易之極數也小成之卦三大成之卦六六即三也故雜卦反對陽生者六隂生者六而卦變本於隂陽所生十二卦他卦之變本於十二卦往來升降而成所謂旁行而不流或者復以八卦所生變六十四卦解之不知其變具於十二卦中師道不立有不知而作者也劉曰乾爻辭易睽爻辭怪坎爻辭僻所謂辭易辭怪辭僻所謂辭有險易也漸虞曰否三之四圗亦然漸之成卦在六四一爻漸者否三之四柔進得位往承五而有功虞以四為婦漸巽上艮下有男下女之象, SBCK: ''}
