  - {type: variant, offset: 1778, length: 4, content: 言可謂曲, SBCK: 所冝也非災之者也萃二陽萃於上升二陽升於下升者往也升往則不來}
  - {type: variant, offset: 1783, length: 0, content: '', SBCK: 不來者必聚於上也氣之方升誰能遏之故曰萃聚而升不來也謙自上降三豫自􅀄升四謙故降也輕豫故怠而止故曰謙䡖而豫怠也噬嗑除間者也四爲頥中有物故曰噬嗑食也賁自泰來本无色也剛柔交錯}
  - {type: variant, offset: 1784, length: 0, content: '', SBCK: 後有文故曰賁无色也隂隨陽升􅀃}
  - {type: variant, offset: 1785, length: 37, content: 盡萬物之理不如是無以致曲焉不如是其言亦不能以中矣乾䇿三十六陽也坤策二十四隂, SBCK: 見乎外故曰兊見}
