  - {type: variant, offset: 17564, length: 715, content: 著故曰隂陽以立天道也立卦之後象乃見故曰剛柔以立地道也隂陽用也剛柔體也用之謂道體之謂徳體用無間和會為一順而行之則動静語黙皆得其宜故曰和順道徳而理於義天地萬物共由一理其理順而不妄深明其源乃能一天人合内外體用无間矣此之謂盡性盡性則通晝夜之道而知其於窮達夀夭以正受之不貳其心矣此之謂立人道道徳有義性命有理義也理也同出於一太極者中之至也天地之大本也所以生天地者也天地分太極萬物分天地人資天地之中以生觀乎人則天地之體見矣故曰惟皇上帝降衷于民而人之心者又人之中也寂然不動太極􅍭三也感而遂通則天地位矣萬物育矣自一嵗言之冬至也自一日言之夜半也此大𤣥八十一首所以起於中歟小過者明夷初之四二卦相因而成明夷初九曰明夷于飛小過彖曰飛鳥遺之音震為出巽為入者以陽為主也自坤出震成乾自乾入巽成坤消盈虚與時偕行出者升也入者降也鬼神无形者也而曰乾為神坤為鬼何也曰鬼神者天地之用二氣之良能不可以形求者也聖人仰觀俯察四時之運日月之行寒暑晝夜一幽一明萬物由之以死由之以生故寓之於乾坤萬物資始於乾資生於坤莫不有天地之體而各有所本本於天者動物也故以呼吸為聚散之漸本於地者植物也故以隂陽升降為聚散之漸聚之謂生精氣為物也散之謂死逰魂為變也其始生也氣日至而滋息至之謂神以其申也及其既盈氣日反而逰散反之謂鬼以其歸也天曰神地曰示人曰鬼神示者歸之始也人鬼者來之終也寒來則暑往夜盡則晝明屈伸相感生生不窮而亦未嘗死未嘗生聖人以此觀天地以此知死生以此知鬼神天地也人也鬼神也一而已矣管仲曰流行於天地之間謂之鬼神藏於胸中謂之聖人坎北方卦也冬至坎始用事陰氣方難水凝地拆而物生亦難陽陷乎陰中也故坎為險難又為勞卦者坎用事則水歸其澤物歸其根勞也故坎水上行亦謂之勞井勞民勸相是也至者何往者以外為至來者以内為至, SBCK: 濟}
