  - {type: variant, offset: 13197, length: 0, content: '', SBCK: 下養上爲顛大過一隂在上四陽无所託顛也故其卦􅀄隂承陽无失位之凶隂冝在下也姤以一柔而遇五剛故曰姤遇也柔遇剛也夬以五剛而決一柔故曰夬決也剛決柔也姤小人道長君子道􅁨也故繫于金柅夬君子道長小人道憂也故无號之凶女以外爲歸乾男下而迎三然後坤女行而歸故曰漸歸待男行也歸妹以三易四男行而女從}
  - {type: page-break, offset: 13197, content: '', id: KR1a0024_SBCK_011-5a}
  - {type: variant, offset: 13199, length: 3, content: 明相交, SBCK: ''}
  - {type: variant, offset: 13203, length: 1284, content: 義虞謂三動離毁上之三成既濟誤也九五婦三嵗不孕者天地不交之時六四柔進得位往有功則既交矣六四婦貞九五之所願得也如明夷上六初登于天離明出地上以明後入于地此之謂曲而當九五言陵亦借否象言之艮為山巽為髙大阜之象上九極矣而言陸者明進退也虞氏論象太密則失之於牽合而牽合之弊或至於无説此可刪也説卦不論進退往來上下内外則不足以明周流六虚矣漸有進退之象故諸爻以鴻明之豐虞曰從泰二之四又曰從噬嗑上來之三今圗從泰豐彖不取二之四為義而以兩體明之曰明以動故豐星月之光皆離之陽也故坎離以中相易而賁分剛上而文柔輔嗣以初九配在四初四俱陽爻故曰均輔嗣以九三應在上六志在于陰亦未足免於闇也横渠云欲絶去上六亦此意也輔嗣以九四陽居陰得初以發夷主吉諸儒皆不以得初發夷主蘇氏用之輔嗣以六五以陰之質來適尊陽之位能自光大輔嗣以上六以陰處極而最在外不履於位深自幽𨼆絶跡深藏者也蘇氏曰六五上六處上而闇者也初九六二九三九四處下而明者也案豐本泰卦二之四成豐所謂九四即乾之九二往而成離者也故皆有明象五六本坤陰故皆有闇象初九配四與上同然以初因適五五亦求陽為均則不同蘇氏言五求陽然一陰納二陽不得為均四適五五為夷主謂九四當位則明照天下似通乎象矣六五來章為虚已以來二陽謂之來者我來彼也勝於輔嗣肱輔上體者也此象越諸儒之表蘇氏曰來二陽則陰陽交錯而成章亦論象矣横渠凡言往者皆進而上知此象者也涑水以六二蔀覆幽塞不見知於人張弼以巽為蔀案震巽為草莽上與坤交亦有蔀之象然則豐其蔀其斾其蔀其屋皆就本爻言之輔嗣曰蔀覆曖鄣光明之物又略例曰大闇之謂蔀鄭康成作菩云小席也陸希聲曰茂盛周匝之義也案坤為冥闇震巽為草莽豐之離在震巽之下而交於坤是明為草莽周匝蔽蔀之象天文東方三十星為蒼龍南方六十一星為朱鳥西方五十星為白虎北方二十三星為𤣥武蒼龍白虎朱鳥𤣥武相望而跱勾陳六星在紫宫中螣蛇二十二星在營室北營室天子之宫皆中宫經星也二十八舍星隨天右行一嵗三百六十五度北斗魁杓隨月而建左行以正月言之蒼龍在寅白虎在申朱鳥在已𤣥武在亥勾陳在丑螣蛇在辰斗杓隨月是以蒼龍在寅二在夘三在辰其餘五位隨天而改孟喜京房之學其書槩見於一行所集大要皆自子夏𫝊而出鄭氏𫝊馬融之學多論互體陸績之學始論動爻胡旦論豐上六曰乾極則悔泰極則隍豫極則冥萃極則歎履考祥而元吉賁白色而无咎井勿幕而有孚艮敦艮而厚終人道之美可不念哉如明夷之飛為小過之鳥井之乾為初九之禽豐之乾為上六之翔皆取離卦一爻為象儀禮少牢饋食資黍注云今文咨作齎今易文齎注作咨解則齎咨古通用也説文卦筮也徐鉉曰從掛省章詧曰掛之牆壁以觀其兆案筮宅儀主人北面命筮者在主人之右筮者東面抽韇執之南面受命既命筮人許諾北面而筮卦者在左畫爻卒筮執卦以示命筮者命筮者受主人視反之東面旅占卒進告于命筮者與主人則畫爻掛之旅占其從否當從掛省矣巽為繩汲水為繘九二汔至此未及泉也自二至四有反巽之象故又為亦未繘井言未收繘而至井也荀爽解中孚曰兩巽對合外實中虚則古人取象有用反卦為象者於此可見井初六井泥不食舊井无禽者乾之初九去而坤之六五來也九二井谷射鮒甕敝漏者動而求則乖也九三井渫不食者正可任也為我心惻可用汲者上六病也王明並受其福者九三進也九四井甃无咎者陰守正也九五井冽寒泉食者乾之初九位中, SBCK: ''}
