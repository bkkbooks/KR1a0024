  - {type: variant, offset: 15161, length: 857, content: 能也聖人以仁字合而言之王肅曰西南陰𩔖故得朋東北陽類故喪朋荀曰隂起午至申得坤之一體陽起子至寅喪坤之一體京曰女既嫁降父之服臣既仕先公後私斗六星二十六度天廟也危二星十度冢宰之官主邑居廟堂祭祀之事又曰北方入冥而天形也為祠為廟北方鬼神之府幽暗之方乾坤之變同生於震何也乾自震變坤亦自震變此迎之莫見其首隨之莫見其尾也先天坤生震震生離離生兑兑生乾乾生巽巽生坎坎生艮艮生坤坤復生震此大易之祖也故於乾坤象之乾一變復坤一變姤獨乾又一變巽再變離三變兑與坤不同何也三五之變八卦皆同而始於乾故於乾盡之尊卑等也明夷傷也傷者必有所過故明夷變小過訟者不信也信則无訟故訟變中孚乾貞於子而左行今占家自子至戌順行六位坤貞於未而右行今占家自未至已逆行六位有因前爻之動以為象者如咸九五咸在脢明夷之二夷于左股離為日坎為月離乾體也而坤索之坎坤體也而乾索之乾天也日月得乎天之理是以久照乾陽也坤陰也陰陽之精互藏其宅是以不息日行天之一度者坤體也月行天之十三度有竒者乾體也日月十二會會必於二十八舍者乾坤之合也同道則食相望則薄精不可以貳也既午則昃已望則食中不可以過乎乾坤三變而成六卦乾一陰下生三變而成六卦坤一陰下生三變而成六卦乾卦二陰下生者六變成十二卦坤卦二陽下生六變成十二卦六變亦三也乾卦三陽下生者六變成十二卦坤卦三陽下生六變成十二卦大抵皆三以變也五隂一陽自復來一爻五變成五卦五陽一隂自始來一爻五變成五卦四陰二陽自臨來五復五變成十四卦四陽二陰自遯來五復五變成十四卦三陰三陽自泰來三復三變成九卦三陽三隂自否來三復三變成九卦大抵皆五以變三以變也卦以剛柔升降通内外之變遂成天地之文也九極陽也六極陰也九六相變陰陽迭用遂定天下之象此制器者所以尚象也易无思也无為也寂然不動太極未分時也感而遂通天下之故兩儀四象八卦生吉凶也仁者見其静則謂之仁智者見其動則謂之智君子之道則合仁與智䇿以十六合十二則二十八者少隂之䇿也二十四合三十六五十也二十八合三十二亦五十也非大衍五十而其用四十有九乎剥五陰潰於内猶魚爛也復一陽自外來而復於内則亂極而反正也𤣥曰陰不極則陽不芽王弼注賁曰坤之上六來居二位柔來文剛, SBCK: 改}
