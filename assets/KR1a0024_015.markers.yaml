  - {type: variant, offset: 18714, length: 256, content: 爻受畜所畜者寡矣履以柔履剛六三不有其位履之而不處也王弼謂比九五為比之主而有應任二顯比者也比而顯之則所親狹矣則以不變論易於初六言處比之首應不在一心无私吝則莫不比之故於九五應二則言其狹也天地之間陰必比陽未有无應而相比者初六不變則缶虚而不汲失有孚盈缶之象矣三驅之禮禽逆來趣已則舍之背已則射之顯比也雖有愛惡而愛惡出於彼之來去吾豈容心哉三苗逆命禹乃徂征不比也七旬來格舜則捨之顯其比也比之與否舜禹非私也用中之道也若曰顯比非大人之吉此可以為言所使使之者誰歟舜命禹征亦使之也咥人胡旦云咥當作􅻱音垤齧堅聲也古字與咥通用漢上易傳叢説, SBCK: ''}
