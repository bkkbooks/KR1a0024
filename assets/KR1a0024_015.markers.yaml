  - {type: variant, offset: 1980, length: 542, content: 睽之象歟兩儀生四象孔氏謂金木水火禀天地而有土則分王四季且金木水火有形之物安得為象哉孔氏失之逺矣莊氏之實象假象義象用象於釋卦中破之何氏謂神物變化垂象圖書此易外别有易有四象所以示也此象謂爻卦之象七八九六乃少隂少陽老隂老陽之位生八卦之四象也天一地二天三地四兼天五之變化上下交易四象備其成數而後能生八卦于是坎離震兑居四象正位各以本位數存三以生餘數則分乾坤艮巽之卦四象既列五居四位此河圗五十有五居四位之數劉氏曰八純卦兼兩儀四象而盡五十五數謂先布五十五位後除天地四方數餘以竒耦數排之便見八卦之位此説不通所謂乾者天也坤地也所謂坎者北方也離南方也兑西方也震東方也今除天九地六四方四數而分布八卦即八卦所用止三十六而十九數為贅矣夫八卦皆本於乾坤而坤之數乾兼有之故八卦不出於三十六夫三十六數六九也九老陽之數也此小成之卦也若大成之卦三十二䇿也二十八䇿也二十四䇿也而三十六䇿皆兼有之盖天地之數五十有五自一衍而五大衍為五十五十則五十五在其中其用四十有九則一在其中更不論五十五也若除天地四方之數又於四象二儀之外而有八卦矣故曰其論不通劉氏曰内十五天地之用九六之數也兼五行之數四十合而為五十有五備天地之極數也曰九與六合為十五水一六火二七木三八金四九土五十凡四十數配合論之則不通虞翻曰甲乾乙坤相得合木丙艮丁兑相得合火戊坎, SBCK: 革}
