  - {type: line-break, offset: 1730, content: '', id: KR1a0024_WYG_015-7a08}
  - {type: variant, offset: 1730, length: 0, content: '', SBCK: 未濟男之窮也夬決也剛決柔也君子道長小人道憂也乾坤易之門凢剛皆乾也凢柔皆坤也剛柔相雜乃成諸}
  - {type: variant, offset: 1731, length: 0, content: '', SBCK: 故曰乾剛坤柔比得位而衆比之故樂師犯難而衆從之故憂憂樂以天下也臨之九二在下四隂與之故能以大臨小觀之九五在上四隂求之故能以上觀下或與或求乃成臨觀之義屯自震變四之五雖見於屯也而不失其所居所以大亨歟蒙自坎變五之上隂陽相雜雖雜也而九自著見隂豈能蒙之所以蒙亨歟陽起於坤而出震則靜者動陽止於艮而入坤則動者靜故起莫如震止莫如艮也損以九三爲上由泰而損始衰者也益以九四益􅀄由否而益始盛者也故損益盛衰之始也大畜以四五之柔而畜三陽時也无妄九五六二中正而三四上爻爲无妄之疾災也関子明曰无妄而災者災也}
  - {type: page-break, offset: 1731, content: '', id: KR1a0024_SBCK_011-2a}
