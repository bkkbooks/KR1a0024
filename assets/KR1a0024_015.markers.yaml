  - {type: variant, offset: 723, length: 447, content: 赤陸大於莧葉柔根堅堅者兑之剛也堅而赤赤者乾之色也困九月霜降氣也故曰株木曰蒺藜蒺藜者秋成也大過十月小雪氣也故曰枯楊生稊枯陽生華姤五月夏至氣也故曰以杞苞𤓰生𤓰生於四月中氣故也夬三月清明氣也故曰莧陸夬夬莧陸三月四月生也闗子明曰接物者言接之而已非同之也故濯物心无所瀆汙謂之洗心言洗濯其接物之心无所瀆汙故謂之洗心而注者誤以為洗濯萬物之心郭璞洞林得豫之小過曰五月晦日羣魚來入州城寺舍注以乙未為魚星非也豫艮為門闕震為大塗六三變九三互有巽體巽為魚豫五月卦坤為晦日兑為妾變為巽巽為近市利則倚市門矣故洞林咸之漸兑成巽曰妾為倡王弼謂頤初九不能使物由已養誤也夫使物由已養有命存焉初九在下未能養人而當自養以正故以朶頤戒之易之有説卦猶詩之有詁訓也天命聖人以祐下民微隂浸長民將内潰聖人􅍭章不耀中正自處委任賢佐厚下安宅盡人謀以聴天雖有隕越自天隕之吾志不動也不舍天之所命也周公曰我弗敢知孔子曰天生徳於予桓魋其如予何王洙曰木之始紐引孚甲觸地而出能破䃘确无所不通巽之上剛是也根柢散之自固其植巽之下柔是也以至華實成落而不反其故處雜卦曰, SBCK: ''}
