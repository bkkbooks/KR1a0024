  - {type: indent, offset: 4750, content: 　, id: KR1a0024_krp_015-bkkind202}
  - {type: variant, offset: 4761, length: 369, content: 建丑至否卦八月劉氏云若從建子則卦辭當在復卦之下否之六三當消泰之九三又更臨卦之九二不應今以遯之六二消臨之九二則於我為得則是劉氏取何氏之説而條達之也又曰臨彖曰浸而長遯彖亦曰浸而長二卦之爻相偶而彖辭皆有隂陽消長之義又王氏卦略云臨剛長則柔微柔長故剛遯故伊川亦用此説周公作爻辭多文王後事則知文王之㫖周公述而成之故以周正言易有三名夏曰連山商曰歸藏周曰周易連山神農氏之别號也歸藏軒轅氏之别號也並是代號所以易題周以别餘代猶周書周禮之謂也周公不得不以周之正朔定其月也劉氏以天地五十五數布之五行自丙丁至甲乙為一周其辰子丑午未自甲乙至壬癸為一周其辰寅卯申酉自壬癸至庚辛為一周其辰辰已戌亥故上經三十卦三周而成六十卦六十卦當期之日其策一萬一千五百二十子雲子午九丑未八寅申七卯酉六辰戌五已亥四以六辰相配成十二支之數盖有得於納音之説也其於十日亦然鄭康成言四象曰布六於北, SBCK: 木巽火火}
