  - {type: variant, offset: 7829, length: 1952, content: 月萬物不通則至日閉闗后不省方夏之制也周制以十一月北巡狩至于北嶽矣是以知繫大象之辭非周公作也崔杼欲娶東郭偃之姊筮之遇困之大過陳文子曰不可娶也且其繇曰困于石據于蒺藜入于其宫不見其妻凶其繇與今困卦六三爻辭正同是特小象之作故文子曰困于石往不濟也據于蒺藜所恃傷也入于其宫不見其妻凶无所歸也使小象亦周公作則文子必稽之矣故曰諤昌誤也由是論之遷之言盖不誣矣先儒數十篇之次其説不一獨胡旦為不失其指故今從之崔憬陸震謂文王作爻辭馬融陸績謂周公所作考之爻辭馬融陸績為是明夷九三明夷于南狩得其大首六五箕子之明夷隨上六王用亨于西山升六四王用享于岐山盖南狩伐商之事西岐王業所興武王數紂曰囚奴正士而追王西伯在翦商之後則爻辭為周公作審矣韓宣子適魯見易象春秋曰周禮盡在魯矣吾乃今知周公之徳也孔頴達嘗正此義今申其説以證崔陸之誤然琴書有言曰文王在羑里演易作鬱厄之辭困于石據于蒺藜盖爻辭亦有文王之辭豈周公述而成之歟文王作卦辭周公作爻辭通謂之繫辭仲尼賛二聖人繫辭之意成上下篇名曰繫辭猶序文王之彖而名其篇曰彖也凡繫辭所稱繫辭焉者或指卦辭或指爻辭而言如聖人設卦觀象繫辭焉而明吉凶指卦辭為繫辭也如聖人有以見天下之動而觀其會通以行其典禮繫辭焉以斷其吉凶是故謂之爻指爻辭為繫辭也古文周易上下二篇上篇三十卦下篇三十四卦孔子作彖象繫辭文言説卦序卦雜卦别為十篇以賛易道與周易異卷如詩書之序不與詩書同卷前漢費直𫝊古文周易以彖象繫辭文言十篇解説上下經是也費氏之易至馬融始作𫝊融𫝊鄭康成康成始以彖象連經文所謂經文者卦辭爻辭通言之也即費𫝊所謂上下經也魏王弼又以文言附於乾坤二卦故自康成而後其本加彖曰象曰自王弼而後加文言曰至於文辭連属不可取以附六十四卦之爻則仍其舊篇今繫辭上下説卦序卦雜卦是也魏髙貴鄉公問博士淳于俊曰今彖象不連經文而注連之何也俊對曰鄭康成合彖象於經者欲便學者尋省易了孔子恐其與文王相亂是以不合則鄭未注易經之前彖象不連經文矣揚子雲作太𤣥九卷準易首一卷賛三卷測一卷衝錯攡瑩一卷數一卷文棿一卷圗告一卷范望注解合賛於首散測於九賛之下而學者自賛為經辭此亦凖文王卦辭周公爻辭通謂之經也隋書經籍志漢費直注周易四卷鄭康成注周易九卷魏王弼注周易六卷韓康伯注繫辭三卷鄭王二家之易本於費氏康伯之學卒於輔嗣則費氏之後易經上下離為六卷繫辭而下五篇合為三卷矣是以二家所注皆九卷也今易乾卦自乾至用九見羣龍无首吉即古易之本文坤卦而下鄭王之所附也范諤昌不知卦爻之辭同謂之經文同謂之繫辭故謂周公作爻辭彖象文言别次兩卷目曰繫辭孔子於卷末賛成其義上卷明彖下卷明爻後儒附經留繫辭之目以冠孔子之述何其誤耶胡且又謂經有上下理合自分卦有彖象必非别出其誤與諤昌何異説卦脱誤比於諸篇特多荀氏易本乾後有四象坤後有八震後有三巽後有二坎後有八而又一揉為撓離後有一艮後有三兑後有二虞氏易本以龍為駹及為陂専為旉寡為宣科為折羊為羔鄭本以廣為黄乾為幹黔為黚京氏本以馵為未蠃為螺果蓏為果墮其餘陸績王肅姚信王廙偏傍㸃畫亦或不同盖焚書之後周易雖存至漢已失説卦三篇後河内女子得而上之故三篇之文容有差誤今隨文辨正歸於至當疑則闕之陸氏易傳削去爻象自謂彌縫其闕是乎曰仲尼繫三百八十四爻之象文皆中律是謂少而法多而𩔖世罕知者故陸氏作傳諧音以發其辭體正如子雲作太𤣥俾學者為進易之梯階至於陸氏言義則自有中否周易論變故古人言易雖不筮必以變言其義史墨論乾之初九曰在乾之姤九二曰其同人九五曰其大有上九曰其夬用九曰其坤坤之上六曰其剥以史墨之言推之則乾九三當曰其履九四曰其小畜伯廖舉豐上六曰其在周易豐之離知莊子舉師初六曰在師之臨至今占亦然崔武子遇困之大過六三變也莊叔遇明夷之謙初九變也孔成子遇屯之比初九變也南蒯遇坤之比六五變也陽虎遇泰之需六五變也敬叔得觀之否賈逵曰觀爻在六四變而之否三國時闗公敗孫權使虞翻筮之得兑下坎上節五爻變之臨凡所謂之某卦者皆變而之他卦也繫辭曰變動不居周流六虚上下无常剛柔相易不可為典要唯變所適信斯言也則易之為書无非變也商瞿而下傳易者多矣而論卦變者可指數也考之於經其説皆有所合説卦震曰其究為健案消息卦坤一變震二變兑三變乾乾健也乾一變巽二變艮三變坤剝易曰柔變剛也序卦曰物不可以終盡剥窮上反下故受之以復剥之上九窮而反初乃成復卦此京房八卦相生變而成六十四卦之説也巽曰其究為躁卦乾鑿度曰物有始有壯有究故三畫而成乾究言巽之九三上九也虞翻曰動上成震巽三變成震震三變成巽舉巽一卦則知乾三變成坤坤三變成乾離三變成坎艮三變成兑説卦曰天地定位山澤通氣雷風相薄水火不相射六子皆以乾坤相易而成艮兑以終相易坎離以中相易震巽以初相易終則有始往來不窮不窮所謂通也此虞翻蔡景君伏曼容旁通之説也説卦曰乾天也故稱乎父坤地也故稱乎母震一索而得男故謂之長男巽一索而得女故謂之長女坎再索而得男故謂之中男離再索而得女故謂之中女艮三索而得男故謂之少男兑三索而得女故謂之少女此陸績所謂, SBCK: ''}
