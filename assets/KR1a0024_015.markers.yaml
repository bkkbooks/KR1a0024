  - {type: variant, offset: 2523, length: 2181, content: 離相得合土庚震辛巽相得合金天壬地癸相得合水翻謂天地者言乾坤也十日之數甲一乙二丙三丁四戊五已六庚七辛八壬九癸十故乾納甲壬配一九坤納乙癸配二十震納庚配七巽納辛配八坎納戊配五離納已配六艮納丙配三兑納丁配四此天地分五十五數也水一火二木三金四土五五行之生數也水六火七木八金九土十五行之成數也一三五七九竒數二十五二四六八十偶數三十竒耦之數五十有五此五行分天地五十有五之數也太𤣥三八為木四九為金二七為火一六為水五五為土五五者十也洛書之數也劉牧曰十五天地之用九六之數也兼五行之數四十合而為五十有五備天地之極數者誤也言五行之成數則九六在其中矣韓氏曰衍天地之數所賴者五十其用四十有九則其一不用也不用而用以之通非數而數以之成斯易之太極也此言是也四十九數總而為一者太極也散而為四十九即太極在其中矣故分而為二以象兩揲之以四以象四時四時者坎離震兑此六七八九之數也又曰夫无不可以無明必因於有固常於有物之極必明其所由宗此言未盡也四十九因於太極而太極非无也一氣混淪而未判之時也天地之中在焉故謂之太極極中也京房云五十者謂十日十二辰二十八宿也凡五十其一不用者天之生氣將欲以虚來實故用四十九焉此言五十數之見於天者其成象如此謂其一不用為天之生氣則非也馬融云易有太極謂北辰也太極生兩儀兩儀生日月日月生四時四時生五行五行生十二月十二月生二十四氣北辰居位不動其餘四十九運轉而用也季長之論不若京房盖兩儀乃天地之象而北辰不能生天地也故邵雍曰萬物皆有太極兩儀四象之象荀爽曰卦各有六爻六八四十八加乾坤二用凡五十初九潛龍勿用故用四十九也乾用九坤用六皆在八卦爻數之内潛龍勿用如勿用娶女之𩔖鄭康成云天地之數以五行氣通凡五行減五大衍又减一故用四十有九康成所謂五行氣通者盖謂十日十二律二十八宿三者五行之氣通焉為五十五減五行之數為五十大衍又減一為四十九其説本於乾鑿度與京房為一説而五行氣通其説尤善但後學一例抵之不詳觀耳董遇云天地之數五十有五者其六以象六畫之數故減而用四十九非也董謂五十有五減卦之六畫為四十九不知五十有五天地之極數大衍之數五十其一太極不動而四十九運而為八卦重而六十四若去六畫即説不通矣顧懽云立此五十數以數神神雖非數因數以顯故虚其一數以明其不可言之義所謂神雖非數因數以顯是也然其説大而無當不及韓説劉氏謂韓注虚一為太極即未詳其所出之宗而顧之未詳又可知矣劉謂天一居尊而不動則與馬季長言北辰不動何異若謂不動則筮者當置一䇿以象天一不動不當言其用四十有九也動静一源顯微無間知四十有九為一之用即知一為四十有九之體矣劉曰天一者在數為天一在日為甲在象為六之中位在純卦為坎之中爻在重乾為初九在復為陽爻在辰為建子在五行為水在律為黄鍾劉所謂一者言一之定位也不知五十去一則一在四十九中使四十九去一則一又在四十八凡有數則未嘗无一而一之所在無往而不為萬物之祖得此而不失是謂執天地之機又曰一用天徳天徳者九也乾用九者謂天徳不可為首也用之如何見羣龍無首吉也此存乎其人也坤用六者利永貞是也非謂一用九也又曰乾道包坤陽得兼隂此論用之於八卦小成其三十六爻皆出於乾可也若謂乾三兼坤之六成陽之九幹運五行成數而通變化則誤也劉前論天地之數十五四方之數四九十有九通八卦之爻三十六為五十五今論七九六八之策又曰先分天地數為二十後兼四時為二十四何其紛紛耶少陽七者謂天五駕地二為七前言地以二上交於天五而生七七為少陽之數也陽以進故進二之九為老陽之數此一進也若以四位合之則少陽數七四七二十八也又四位進二見八二十八進八故老陽數三十六也又以天地四時數因之天地分二少陽數七二七則一十四也四七則二十八也成一百六十有八數陽生自復至乾凡六卦每卦進八故老陽數二百一十有六若天五駕地二為七二進之為老陽四位合之四七二十八又四位進二見八二十八進八為三十六四位者指四時之位也天地四時之數二十四以天地四時數因之天地分二少陽數七二七則一十四四七則二十八二七十四又四七二十八凡四十二又四因之成一百六十有八數陽生自復至乾凡六卦復臨泰大壯夬乾每卦進八故老陽數一百一十六謂於一百六十有八之上又進六八四十八成二百一十六為老陽之數謂之老陽者皆乾爻也少隂數八者謂天五駕天三為地八隂以退故退二之六六為老隂之數此一退也若以四位合之則少隂數八四八三十二也又四位每位退二見八則一十六四八則三十二也成一百九十二隂生自姤至坤凡六卦每卦退八故老隂數一百四十有四也劉氏論咸恒二卦不繫之於離其論過於韓注至言天地之數五十有五循十日而周一元三周而萬物之數足則為可疑也夫劉氏配五行生成之數五十居中水火居右木金居左始於丙丁終於庚辛周而復始六十日之納音盡矣此一律含五音而成六十律之説也而配於易之上經三十卦則不合矣雖甲子始於乾而癸亥終於離則不合也乾當甲金而二十九卦豈盡然哉繫辭言二篇之策當萬物之數而謂三周五十五數一百八十爻為萬物之數足則未之聞也易有以一策當一日者乾坤之策是也有以一爻當一日者七日來復是也有以策數七八九六言日者勿逐七日得是也易之取象豈一端而盡六十卦直日兩卦相去皆七日其實則六日七分猶書稱期三百有六旬有六日其實三百六十五日四分日之一禮言三年之喪其實二十七月詩言一之日二之日其實十一月十二月之日何於此六日七分而疑之乎先儒以此候氣占風效證寒温而劉氏易之以五卦各主五日則吾不知其説也劉氏曰鄭氏雖以四正卦之爻減二十四之數與當期之日相契則又與聖人之辭不同也四正之卦四六二十四爻主二十四氣此先儒舊𫝊非鄭氏配合也劉氏用六十卦主期之日則四正之卦主二十四氣不, SBCK: ''}
