  - {type: variant, offset: 1872, length: 1, content: 限, SBCK: 下柔其感必速故曰咸感也剛上柔下可以持乆故曰􅁪乆也渙三陽渙離故曰渙離也節三陽止而不去故曰節止也陽離則三隂散陽止則三隂來陽者隂之表也蹇二往五渉難也故曰蹇難也解五來二復􅁻也故曰解緩也來者爲緩則往者當夙故曰有攸往夙吉􅀜子明曰明乎外者物自聧故曰聧外也明乎内者家自斉故曰家人内也君子泰則小人否小人泰則君子否故曰否泰反其􅀋也四陽並進六五以和易待之可以止而仕也故曰大壯則止四陽偕往二隂在内而执其柄可以退而去也故曰遯則退也同人六二得中得位而同乎人同乎人則人亦親}
  - {type: page-break, offset: 1872, content: '', id: KR1a0024_SBCK_011-3b}
  - {type: variant, offset: 1875, length: 13, content: 火不見滅是水在鼎中火巽鼎下, SBCK: 曰同人親也大有六五柔得尊位而有其衆有其衆則衆亦歸}
