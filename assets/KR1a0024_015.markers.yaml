  - {type: variant, offset: 16890, length: 592, content: 嚴男女異長天地萬物之理則然矣劉牧畫圗為乾者四為坤者四乾天左旋坤地右轉乾坤上下自然相交而成六子則非數策之義也氣聚為精精聚為物形始化曰魄氣能動曰魂𫝊曰心之精爽是為魂魄子産曰人生始化曰魄既生魄陽曰魂及其散也形散而魄散氣散而魂散故季札曰魂氣則无不之也魄陰也魂陽也陰陽轉續觸𩔖成形聚者不能無散散者不能無聚屈伸相感陰陽之變也神申也其氣聚而日息鬼歸也其氣散而日消物其形也散其情也然則氣何從生乎曰太虚者氣之本體人容也動則聚而為氣静則散為太虚動静聚散有形無形其鬼神之情狀乎太史公曰儒者不言鬼神而言有物何也曰人之死也各反其根體魄陰也故降而在下魂氣陽也故升而在上升則無不之矣今也魄降而氣不化非物而何所以不化者物欲蔽之也子産曰其用物也洪矣其取精也多矣故聖人死曰神賢人死曰鬼衆人死曰物聖人清明在躬志氣如神故五帝配上帝傅説上比列星賢人得其所歸衆人則知富貴生而已其思慮不出於口腹之間衽席之上夸張於世以自利焉物欲蔽之不能自反其初故謂之物然物之乗間而出豈離乎五行哉五行即陰陽二端也故管輅論杜伯如意宋無忌皆以五行推之今人行氣中或聞鬼哭或聞鬼呼其人逢之愕然忤視俄且化矣謂誠有是也而不知氣也非氣之不化者乎觀此則知鬼之與物矣謂鬼為物察之而未至也蓍四十九總而為一參天也分而為二兩地也掛一者參天也揲之四者兩地也歸竒於扐者兩地而又參天也四者七九六八也七者少陽九者老陽八者少陰六者老陰三變而成爻十有八變而成卦三變者參天也十有八變者兩地, SBCK: 定}
