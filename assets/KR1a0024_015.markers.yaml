  - {type: variant, offset: 16370, length: 519, content: 戌亥者均謂之乾不以其甲子壬子也乙癸得未申均謂之坤不以其乙未癸未也故論乾則甲子壬子同甲寅壬寅同甲辰壬辰同甲午壬午同甲申壬申同甲戌壬戌同論坤則乙未癸未同乙已癸已同乙夘癸夘同乙丑癸丑同乙亥癸亥同乙酉癸酉同或曰參伍以變者乾一變姤二變遯三變否四變觀五變剥此伍以變也五變極矣故四變晉下體復乾為大有又乾一變巽二變離三變震三變極矣故四變兑五變坤六變坎復三變又七變艮是乎曰非也三五不相離也五者參天兩地而倚數三極數也而具五行小衍也三在其中以重卦論之乾三變坤姤巽也遯艮也否坤也參以變也四變觀亦巽也五變剥亦艮也伍以變也伍以變則復以三變故艮變離下體坤復變為乾亦三變也以小有卦論之乾一變巽二變離三變震三以變也次自中二爻變而下故四變兑五變坤次自中爻變而上故六變坎七變艮二即五也初自下爻三變即前參以變也次自中爻下而二變次自中爻上而二變即前伍以變也參去伍伍去參皆不能變此三所以為極數五所以為小衍也天地之運也陰陽三五一五而變為七十二候二五而變為三十六旬三五而變為二十四氣凡三百六十五周而復始日月軌度積於餘分或以參綜伍或以伍綜參交錯而行者也長女東南中女正南少女正西母西南長幼相次三女夾母而處親之也父西北中男正北少男東北長子正東長子代父二子隨行而立尊之也親之故同養尊之故異宫父母, SBCK: ''}
