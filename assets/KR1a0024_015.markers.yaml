  - {type: variant, offset: 6785, length: 714, content: 義補闕曰夫子因文王彖而有彖王昭素胡且亦云范諤昌著易證墜簡曰諸卦彖象爻辭小象乾坤文言並周公作自文言以下孔子述也臣以經傳考之明夷之彖曰内文明而外柔順以蒙大難文王以之利艱貞晦其明也内難而能正其志箕子以之則彖非文王作斷可知矣案司馬遷曰孔子晚喜易序彖繫象説卦文言信斯言也則彖象説卦文言古有之矣孔子序之繫之説之文之而已所謂述而不作也昔者子貢問於孔子曰夫子聖矣乎孔子曰聖則吾不能夫聖孔子不居而繫辭之言及於卦象彖爻必抑揚其辭以聖人稱之曰聖人設卦觀象繫辭焉而明吉凶此所謂繫辭者指卦下之辭而言之也又曰彖也者言乎其象也爻也者言乎其變也夫爻辭言一爻之變彖辭言一卦之象則文王卦下之辭又謂之彖矣孔子序述其彖之意而已故名其篇曰彖使文王卦下之辭不謂之彖孔子何為言知者觀其彖辭則思過半矣夫子自謂如此非遜以出之之義也盖彖者孔子賛易十篇之一先儒附其辭於卦辭之下故加彖以明之諤昌以乾彖釋元亨利貞文言又從而釋之疑其重複謂非孔子之言且引穆姜之言證之此又不然文言者文其言也猶序彖説卦之類古有是言或文王或周公之辭孔子因其言而文之以垂後世𫝊曰言之不文行之不逺故以文言名其篇左氏成公十六年穆姜往東宫筮之襄公二十二年孔子生上距穆姜二十四年穆姜之時雖已誦隨繇之辭因就乾卦文言然其言與今易稍異穆姜之言曰元體之長也亨嘉之會也利義之和也貞事之幹也體仁足以長人嘉徳足以合禮利物足以和義貞固足以幹事以今易考之刪改者二增益者六則古有是言孔子文之為信然矣諤昌遂以六十四卦之彖皆出於周公則誤也或曰彖非周公則孔子繫乾何謂舉其全文而釋之如曰時乗六龍以御天也雲行雨施天下平也曰臣固曰古有是言也古有是言又舉而釋之與乾坤六爻屢稱而明之其意一也諤昌又謂乾卦荅問以下為孔子賛易之辭非文言也此亦誤也孔子作十篇以賛易彖, SBCK: ''}
