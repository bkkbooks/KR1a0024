body:
  text: 漢上易傳卷五宋朱震撰下經乾下兊上夬揚于王庭孚號有厲告自邑不利即戎利有攸往彖曰夬決也剛決柔也健而說決而和揚于王庭柔乘五剛也孚號有厲乘危乃光也告自邑不利即戎所尚乃窮也利有攸往剛長乃終也五陽長於下一隂消於上五陽合力而決一隂故曰夬決也剛決柔也此以五剛言夬之時也健者乾也決而和說者兊也健而說諸理決而不失其和非亢暴忿疾以力勝之決之至善者也古之人退人以禮其用刑至於殺之而不怨所以異於刑名家也彼嚴而少恩敢於殺以失人之情豈知健決有和說之義故曰健而說決而和此合二體言夬之才也五王位伏艮為庭王庭者孤卿大夫諸侯三公羣士羣吏之位大詢于衆之地五得尊位體兊兊為口訟言於王庭與衆君子共去之而無忌以上六小人得位一柔乘五剛則其害未易去也故曰揚于王庭一柔而乘五剛也此以九五言處夬之道也或曰何以知艮為庭曰艮行于庭春秋左氏傳周史有以周易見陳侯者陳侯使筮之遇觀之否曰庭實旅百杜氏曰艮為門庭上六下與九三相應成巽離巽為號巽風者天之號令故號令也號呼也命也皆取巽象相應孚也揚于王庭發大號以信于下使知危者安其位不可易也一柔乘五剛而未去有危之道厲者危也其危猶曰其亡則決小人之道光矣離為光所謂與衆弃之舜去四凶而天下服是已若隱其誅如唐去李輔國則不光矣故曰孚號有厲其危乃光也此以上六應九三言處夬之道也夬自姤變一變同人二變履三變小畜四變大有五變夬姤巽為命同人二坤為邑履兊為口告邑也于小畜大有皆有告命之象告自邑者告戒自我私邑言自治也君子將治小人必先自治自治則以我之善去彼不善小人所以服也傳曰無瑕者乃能戮人舜修文德文王無畔援歆羡自治也故曰告自邑戎戈兵也離之象自同人之離五變離成兊兊為刑殺而近君不利即戎也決小人不能揚于王庭孚大號于下藉戎兵以清君側猶鑿木去蠧熏社逐鼠豈夬之尚哉所貴其夬者謂其乘時去害動而不窮也交兵幸一日之勝則窮矣自古用兵去小人如漢唐之季召外兵以去近習其禍至於覆宗聖人之戒不其深乎故曰不利即戎所尚也窮也此二者推言卦變以言夬之所當戒也君子之道有始必有終夬始於復其剛浸長一柔尚存君子之道有未盡也剛長成乾其道乃終不能終則必有悔彥範之不誅武三思卒為世患剛長不終也故曰利有攸往剛長乃終也此復以二剛終言處夬之道也在卦氣為三月故太𤣥凖之以斷毅象曰澤上於天夬君子以施祿及下居德則忌雨澤上於天其勢不居必決而下流君子體夬之象故施祿澤以及下兊為口食下應三有施祿及下之象古者上有大澤則民夫人待于下流知惠之必將至也君子之於德也寬以居之然後仁以行之若決而散則不可以畜矣故以此施祿則可以此居德則忌上六居位而安有伏艮居德象也初九壯于前趾往不勝為咎象曰不勝而往咎也大壯震為足初九在下體之下應足之動趾也夬自大壯積之在大壯時四剛已壯長而至於五剛則初九壯于前大壯之趾也大壯所以征凶者初九無應不可動而先動也今震足毁折又無應動而往不正不正不足以勝九四恃其剛壯不計彼之不可勝而往決之過也不正故有咎不曰凶者隂將盡也易傳曰凡行而有咎者皆決之過九二惕號莫夜有戎勿恤象曰有戎勿恤得中道也二動成離目巽為多白眼惕懼之象巽風為號應兊口為號呼故曰惕號離日在西之下莫也巽為入日入于地莫夜也離為戈兵戎也坎為憂離見坎伏勿恤也一爻又具此三者故曰有戎勿恤上九剛長欲極之時處中體柔不為過剛中動而正可以決小人矣而猶不忘乎戒懼求應自處之至善者也小人知將亡其徒必乘人之疑以相恐動夫暮至於夜隂氣將盡陽氣欲生雖有戎兵窮寇也勿憂可也我得中道行之以正雖千萬人往矣何恤乎小人况窮寇乎九三壯于頄有凶君子夬夬獨行遇雨若濡有愠無咎象曰君子夬夬終無咎也易傳曰爻辭差錯當云壯于頄有凶獨行遇雨君子夬夬若濡有愠無咎以象考之傳為是三健之極與上六小人相應乾為首兊見於外為頰九三往應之頰柔而增剛壯于頄頄頰間骨鄭氏本作頯衆陽決小人而已違衆應之有凶之道不正也四爻不應三獨上行而遇之兊澤下流遇雨也言說小人而與之和也兊和說也君子當此則弃去情纍外決小人而絶之內自健決決之又決以上六兊三動復成兊夬夬也乾為衣坤為裳而遇兊澤霑濡也巽多白眼上視而不恱愠也若惡小人之浼已如遇雨霑濡其衣又疾視之有愠怒則無咎故曰終無咎也或曰君子亦有愠乎曰君子如怒亂庶遄沮當怒而怒也九四臀無膚其行次且牽羊悔亡聞言不信象曰其行次且位不當也聞言不信聰不明也一隂在上衆陽爭趨之九四居上卦之後動有伏艮為臀艮柔為膚三陽自下侵之不足於柔也故臀無膚無膚則不可以處矣四本大壯震震為足欲前而九五礙之又柔而少決則却而不前故其行次且次且一本作趦趄次且不可前矣處則乘剛行則不前以九處四也故曰其行次且位不當也然則為九四者如何避位居初讓三陽使先行斯可無悔矣四動成兊兊為羊羊性很牽挽則抵觸不行却行而使之先則行張載曰牽羊者讓而先之如是悔亡正故也雖有是言也九四未必聞其言而信之不足於剛決也兊為口坎耳受之信也九四動乃有坎耳離目聰明之象不動則耳塞目毁聰不明矣兊口雖告莫之聽焉故曰聞言不信聰不明也九五莧陸夬夬中行無咎象曰中行無咎中未光也大壯震為蕃鮮兊為澤莧蕢澤草也葉柔根小堅且赤乾為大赤上六之象陸商陸亦澤草也葉大而柔根猥大而深有赤白二種五動震為蕃鮮伏巽為白商陸也莧陸小人之近君者莧柔脆根淺易決商陸根大而深為難決九五得尊位大中為決之主當五陽並進決小人之時而反比之中道未光也五兊乾健決也動而往決上六復成兊故曰夬夬決之又決震巽象毁成離則莧與陸去而中道光矣離為光動則不正宜若有咎然夬之時剛長乃有終動而往決而後中道行張載曰陽比於隂不能無纍故必正其行然後無咎易傳曰五心有比於中道未得為光也蓋人心有所欲則離道矣此示人之意深矣上六無號終有凶象曰無號之凶終不可長也上六之三成巽巽為號上六小人知非而去有號呼求免之象陽長隂消之時安其位而不去無自悔之實陽長則隂失位終必有凶巽為長女位巽毁終不可長也聖人明此開小人自悔之路巽下乾上姤女壯勿用取女彖曰姤遇也柔遇剛也勿用取女不可與長也天地相遇品物咸章也剛遇中正天下大行也姤之時義大矣哉姤遇也柔出而遇剛若邂逅然故曰姤遇也柔遇剛也此以一柔遇五剛言姤之義也女德柔順而剛健女壯也故曰女壯隂息剝陽以柔變剛女壯男弱不可與久處故曰勿用取女不可與長也詩以蛇虺為女子之祥熊羆為男子之祥剛柔反易必有女禍此以初六言姤之戒也陽生於子至巳成乾巳者巽也轉而至午陽極隂生午者離也荀爽曰坤出於離與乾相遇故萬物皆相見相見也咸章也皆謂出於離也萬物别而言之曰品物品物咸章則相見者著矣故曰天地相遇品物咸章此再以初六言姤之時也姤五月卦也太𤣥凖之以遇易於復言七日來復冬至也於姤言品物咸章夏至也舉二至則律厯見矣九二剛中臣也九五剛中而正君也姤比遁為有臣比剝為有君以剛中之臣遇中正之君有其位有其時君臣相過亦猶天地之相遇故曰剛遇中正姤者夬之反夬一隂自上而下五變成姤乾為天天下行也君臣相遇道行乎天下故曰剛遇中正天下大行也此以二五兩爻卦之反復言姤之用也天地也君臣也非其時也亦莫之遇莫之遇則天地閉賢人隱萬物幾乎息矣故曰姤之時義大矣哉象曰天下有風姤后以施命誥西方天下有風乃與萬物相遇后以施命誥詔四方君與萬民相遇之道也風者天之號令以時而動明庶東也景風南也閶闔西也廣莫北也周流天下無所不遍故后體之隂陽家有風律之占源於此姤自夬變離離有伏坎變兊有伏震四方也巽為命自上而下兊為口施命誥四方之象易傳曰諸象或稱先王或稱后或稱君子大人先王者先王立法制建國作樂省方敕法閉關育物享帝是也后者後王之所為裁成天地之道施命誥四方是也君子則上下之通稱大人者王公之通稱初六繫于金柅貞吉有攸往見凶羸豕孚蹢躅象曰繫于金柅柔道牽也姤初六五月離卦之一隂也離巽之柔為絲乾變為金堅重也柅絡絲趺也許慎作檷謂九二也初六隂柔不正與九二相遇如絲紛然繫之以堅重之器乃可經理故曰繫于金柅初六變而正則吉人亦何常君子小人在正不正之間耳故初六繫于金柅貞則吉勉初六也初二相易成離目見也隂有攸往九二降初剝剛而進凶也凶戒九二也言初隂辨之不早必見凶害乾初爻甲子子坎位為豕初九變六陽變隂羸豕也羸豕牝豕也伏震為躁巽為股為進退初隂應四孚也牝豕感陽志欲往前為二所制進退蹢躅而躁動不安其意未始不在于陽九二可不繫于金柅乎繫于金柅則柔道有所牽矣易言牽者皆艮巽之動艮手也巽股也手挽之而股動夫君子小人相為消長雖初隂其心未嘗一日不欲害君子一隂雖弱方來也五陽雖强既往也其可忽諸自古禍亂或始於牀第之近給使之賤夷裔荒服之逺易而忽之馴致大亂反求其故必本於剛正不足若柔道有牽君子小人各當其分禍亂何由而作或曰巽離為絲何也曰巽為木為風巽變離木中含火火生風風化蠱蠶為龍馬之精龍大火馬畜蠶以火出出而浴畜馬者禁原蠶故太𤣥以火為絲賈逵以離為絲郭璞曰巽為風蠱屬龍馬絲出中九二包有魚無咎不利賓象曰包有魚義不及賓也魚謂初也初六易四成兊為澤巽于澤下者魚也民之象初者二四之所欲初本應四九二據之宜有咎然隂出遇陽二近而包有之於遇道為得故無咎若二不能包四又逺民初將散亂而不可制矣賓謂四也四在外動而易初初成乾西北方賓之位二體巽東南方主人位初六之民為二所有非九四之利而九四所不能包者逺於民也一民不可有二君亦義之所不及也古者有分土無分民得道則歸往失道則擕持而去無逺近內外之間顧遇民之道何如耳此二所以無咎易傳曰遇道當一二則離矣故義不可及賓也九三臀無膚其行次且厲無大咎象曰其行次且行未牽也姤者夬之反姤之九二即夬之九四故二爻同象艮在下體之上為臀其柔膚也二不動而侵三艮成巽柔不足也故臀無膚臀無膚則不能處矣隂陽之情必求相遇初隂在下亦三陽之所欲遇者也二比於初已包有之三非義求遇亦何所得哉亦必有咎而遇情未忘故其行次且次且者且進且退不能遽行巽究為躁為進退故也處則為二所侵行則有求而不去可謂危厲然九三剛正處巽知義不可而舍之初隂不能牽其後故無大咎牽者手挽股動初為二所制艮隱巽見故曰柔未牽也不曰凶者初非三之所宜有四失初則凶矣九四包無魚起凶象曰無魚之凶逺民也二有其魚四失所遇失其民也起動也動成離戈兵之象三動初愈不應故起凶無魚之凶以九四不中正自逺其民故九二得以中近之民無常心撫我則后此九四所以凶歟易傳曰遇之道君臣民主夫婦朋友皆在焉四以下睽故主民而言也九五以杞包瓜含章有隕自天象曰九五含章中正也有隕自天志不舍命也二巽木也變乾為大木此爻自兊變巽兊為澤澤木而大把也杞似樗葉大而䕃張載曰杞周於下者也艮在草為蓏蓏瓜屬艮為巽包瓜也瓜譬則民瓜雖可欲而潰必自內始九五當隂長之時含章不耀中正在上遇九二之賢而用之以剛中守道防民之潰故曰以杞包瓜九五動則成離離為文章不動含章而中正唯含章不耀中正自處是以能用九二以盡其才故辭曰含章象曰九五含章中正也一隂浸長陽爻消剝者天也九五含章用九二以防民之潰者人也盡人謀則有時而勝天然或不勝至于隕越者亦天也九五之志知盡人謀而已以謂天之所命以祐下民者在我有隕越者自天隕之吾終不舍天之命也故曰有隕自天象曰志不舍命也二陽為隂剝五自乾而隕有隕自天也五隕於二復成巽巽為命志不舍命也張載曰以杞包瓜文王事紂之道也厚下以防中潰盡人謀而聽天命者歟上九姤其角吝無咎象曰姤其角上窮吝也上九姤之極有弗遇焉前剛角也姤道上窮不動則不和不和則無所遇動則吝是以窮也易傳曰上九高亢而剛極人誰與之以此求遇將安歸咎乎坤下兊上萃亨王假有廟利見大人亨利貞用大牲吉利有攸往彖曰萃聚也順以說剛中而應故聚也王假有廟致孝享也利見大人亨聚以正也用大牲吉利有攸往順天命也觀其所聚而天地萬物之情可見矣坤順兊說也上順民心以說之民亦順上以說其政令上下皆順以說上以是聚下以是從此合二體而言萃也九五剛得位以剛中為萃之主下有六二柔中之臣應之君臣聚會以聚天下此合二五而言萃也具是四者然後能聚不然民不可得而聚矣故曰萃聚也順以說剛中而應故聚也萃自臨來小過三之五艮為門闕巽為髙上為宗廟四本震爻長子也三自門闕升髙至宗廟有長子奉祀之象民之所聚必建邦設都宗廟為先宫室次之王者萃天下之道至於有廟則萃道至矣假至也謂五也王格祖考則諸侯大夫士各致其孝報本反始教民不忘其親易傳曰萃合人心總攝衆志之道非一其至大莫過宗廟故曰王假有廟致孝享也此以九五言萃之道也天下既聚未見大人其聚未必正凡有血氣必有爭心萃不以正適所以致爭奪安得亨乎九五示之以大人之德六二以正而往聚之則人倫正民志定物情相交而亨九六聚成離離目為見故曰利見大人亨利貞聚以正也此以九五六二相易而言萃之道也聖人隨時而已萃聚之世物之所聚者大故所用不可不大用大牲則鬼神福之禮以時為大坤為牛兊為刑殺殺牛以奉宗廟用大牲也物聚則力贍動而有成何往不利哉謂三之五也舉宗廟之禮則百禮無不洽矣所謂隨時者順天理而行天理即天命也巽為命故曰用大牲吉利有攸往順天命也此以九三之五言萃之道也天地之氣聚而有物散而無形散者必聚鬼神耗荒至幽也而各享其類萬物散殊至衆也而各從其類故曰觀其所聚而天地萬物之情可見矣此以小過九三萃於上六五萃于下推廣萃之義也在卦氣為八月故太𤣥準之以聚象曰澤上于地萃君子以除戎器戒不虞萃自小過變澤上於地萬物萃聚之時虞翻謂三四之正小過明夷變也明夷離為甲胄戈兵坎為弓變小過巽為繩為工艮為石巽納辛繕甲兵修弓矢去弊惡而之新之象也小過變萃聚所除之器也明夷坎為寇兊為口上六既安之時聚而相告消寇於未形戒不虞也萃則多故君子過為之防是以萃而無患非用明於至微者不能也故此象以三卦言之原始要終以遏禍亂聖人之憂患後世深矣乎秦銷鋒鏑唐銷兵率至大亂豈知戒不虞哉初六有孚不終乃亂乃萃若號一握為笑勿恤往無咎象曰乃亂乃萃其志亂也初六柔不中正進則疑六三之間已退不能專一以待應乃亂者退而亂於三隂之中乃萃者欲進而與四相萃也其志惑亂不決是以有孚不終故曰乃亂乃萃象曰其志亂也初應四巽為進退故也若號謂四也兊為口巽為號若四在上號召之三隂不正惡初之往合於四一握其手笑以喻意微動之也艮為手三往易四一握手也兊為口為說離喜說動而出聲笑也為笑者獻笑也巽為工有造為之象故曰一握為笑萃聚之世上下相求以隂從陽動而得正何恤乎小人之笑而不往哉往而相應何咎之有否則與小人為徒非萃之正也故曰勿恤往無咎自古不知堅守其節從應以動捨君子之正義畏小人之非笑相率陷於非義皆不知萃之道六二引吉無咎孚乃利用禴象曰引吉無咎中未變也萃聚之時初三同體之隂皆萃於四已於其間得位守中不變其志須五牽引之而後應不急於萃者也然隂從陽靜而待唱引而後往其聚也有吉無咎矣巽為繩艮手持繩相應引也故曰引吉無咎象曰引吉無咎中未變也不變之中有孚相應孚者萃之本其誠素著不假外飾譬之祭也精意承之雖薄可以薦也禴夏祭以聲為主祭之薄者上六宗廟六二與五相易離為夏五本小過震震為聲為長子有長子用禴祭之象故曰孚乃利用禴夫君臣以道相感精迎誠致不言而動蛟潛于淵陵卵自化至于既孚二五相易乃利用禴矣易傳曰萃之時能自守不變逺須正應剛立者能之二隂柔之才以其有中正之德猶冀其未至於變耳故象含其意以存戒也六三萃如嗟如無攸利往無咎小吝象曰往無咎上巽也六三履非其位欲萃於四四應初欲萃於二二應五莫知所萃故萃如巽為號兊為口嗟也故嗟如上下不與雖嗟之無所利故無攸利上六無與據髙慮危孤立求助六三動而往則正正則無咎然三欲萃於四二之間故小吝隂為小三往從上上來應三成巽巽則不亢三宜往而萃也小吝過矣九四大吉無咎象曰大吉無咎位不當也九四上比於五君臣聚也下據三隂民所聚也然九四處位不當疑於上下之聚理有未正九四動則得正上承於五下納三隂上下皆正是謂大吉大吉則無不當位之咎陽為大大者吉也易傳曰非理枉道而得君得民者蓋亦有焉齊之陳恆魯之季氏是也得為大吉乎得為無咎乎九五萃有位無咎匪孚元永貞悔亡象曰萃有位志未光也九五得尊位天下皆萃而歸之於是觀其所孚可以知其志而專於六二係應至狹所萃者有定位得近遺逺聚道不全能無悔乎才足以自守免咎而已於人君恢宏廣博無所不萃之志未有光大匪所謂孚也故曰萃有位無咎匪孚象曰萃有位志未光也蓋初可萃四二可萃五三可萃上獨五不可專萃於二萃則陋矣五萃二有坎離坎離為光而曰未光者于無所不萃之志未光也九五剛中而正當有君德而永貞元者善之長大人體此以仁覆天下永久也貞正也體仁在上久正而不變唯九五不動而應二乃具此三者如是則無偏無黨其悔乃亡若五以萃二為光失是道矣故曰元永貞悔亡橫渠曰居得盛位不能見大人之德係應於二故曰有位一本作未光大也無志字上六齎咨涕洟無咎象曰齎咨涕洟未安上也上六以柔乘剛處上獨立當萃之極六三柔不正不足以為援齎持也咨歎息也艮為手上三相持歎息憂其所宜憂也上之三成巽巽為多白眼艮為鼻兊澤下流在目曰涕在鼻曰洟出涕洟也然乘剛必危處上獨立則無助萃之極以柔居之則不堪兼是數者其可久安上位乎亦必至於求萃而之三動而憂則無咎故曰齎咨涕洟未安上也巽下坤上升元亨用見大人勿恤南征吉彖曰柔以時升巽而順剛中而應是以大亨用見大人勿恤有慶也南征吉志行也升者萃之反柔在下者也以時而升乎上上巽乎下者坤可升之時也故曰柔以時升此以坤體在上言升之時也卑巽在下而順乎理剛中自守而應乎上其升以時不為富貴利達動其心則得位而大亨矣故曰巽而順剛中而應是以大亨此合兩體以二五相易明升之才也大人者九二之五也二之五成離離目為見二升於五剛中正得位以此見大人其升必矣故曰用見大人恤憂也九二失位為憂之五得位雖有坎險勿恤也所謂恤者二陽欲升隂道凝盛未可遽進以人事言之小人猶在上也然九二六五應也巽下順上升之時也雖坤陰在上何憂乎不遂遂往而升有慶及物矣陽為慶也夫日之初升隂固未退及其清風戒旦則羣隂解駮盡矣夫何憂哉故曰勿恤有慶也大則虞舜升聞在上小則文子同升諸公與學以聚之自下而上逹而升之道皆趨乎明也離南方也征以正而行正則吉二之五之謂也二動於中以正而行以見大人往而有慶則其志上行故曰南征吉志行也此復以九二之五勉其升也在卦氣為小寒故太𤣥凖之以上干象曰地中生木升君子以順德積小以髙大木根於地中乃升而上者順也君子以順為德不棄小善積卑成髙積小成大其德日躋亦以根于心者順也否則無本安能積之以成髙大乎揚子雲所謂木漸是也易傳曰萬物長進皆以順道初六允升大吉象曰允升大吉上合志也允施氏易作􅣡進也四坤為衆為順二三四兊為口衆口順之允也初六巽之主以一柔承二剛能巽者也在升時九二九三俱升六四當位合衆之欲志在于初而初未應六四順而正初動則正從九三九三進而升於四與上合志允升也是以大吉荀爽曰一體相從允然俱升九二孚乃利用禴無咎象曰九二之孚有喜也升萃之反也升之九二即萃之九五故升萃二爻反復同象明二五之孚也凡人從上或出於勢位則雖恭巽未免有咎况望行道乎誠不足也二剛上應五柔納之剛柔相與而孚其為巽也盡誠敬而已非外飾也是以道行於上澤被於下此九二所以喜歟喜發於中心形於面目者也陽得位為喜故曰九二之孚有喜也禴夏祭五納二成離離為夏震為聲為長子上為宗廟艮為門闕二升五有長子升自門闕奉祭之象禴薄祭以聲為主用誠敬也二五相孚乃利用誠敬無咎乃難辭九三升虛邑象曰升虛邑無所疑也九三升上六六坤之三坤在下為邑隂為虛升虛邑也九三上六相應以正下巽而上順如升無人之邑孰禦哉巽為不果三升上巽無所疑也六四王用亨于岐山吉無咎象曰王用亨于岐山順事也六四柔順謙恭而正上順六五柔暗之君下順九三剛正之賢升之於五以事其君亦恭也巳則不出乎諸侯之位者正也三者皆順事也文王可謂至德也已故能用此以亨于岐山三升五乾為王兊為西方艮為山四以諸侯居于西山之下岐山也正則吉且無咎坤為順巽為事三分天下有其二以服事殷順事也毛公言文王率諸侯以朝聘于紂則升九三可知崔憬謂此大王避狄徙岐之爻誤矣六五貞吉升階象曰貞吉升階大得志也六五虛中降位而接九二九二階之以升則五正而吉不正則信賢不篤用賢不終其能吉乎五正而吉者以二升階也五正二升君臣道行由是而致治故五大得志也坤土自上際下巽為髙升階之象上六冥升利于不息之貞象曰冥升在上消不富也坤為冥晦隂虛為不富上六利已極矣猶升而不息不知升極當降長極當消消則不富矣豈復更有增益之理四時之進退萬物之盛衰皆然上六不知冥於升也不息之貞者仁義忠信樂善不倦是也惟施於此為利若施于公卿大夫可已而不已不利易傳曰以小人貪求無巳之心移之於進德則何利如之坎下兊上困亨貞大人吉有言不信彖曰困剛掩也險以說困而不失其所亨其唯君子乎貞大人吉以剛中也有言不信尚口乃窮也四五之剛為三上所掩二剛為初三所掩又陷焉陷亦掩也陽剛君子隂柔小人陽剛為隂柔掩蔽而不伸君子窮困窒塞之時故曰困剛掩也此以一卦之爻言困也困自否來二之上坎險兊說也上九之二處乎險難之中樂天安義困而自說不失其所亨者心亨也亨通也困而亨則不窮矣古人塵視富貴夢視生死唯不失其所困也唯君子能之夫子曰人不知而不愠不亦君子乎故曰險以說困而不失其所亨其唯君子乎此合二體兼九二言處困之才也大人君子通稱對而言之君子通乎大賢小賢而大人德配天地者也在困處之裕然不失其正吉且無咎非大人不能以剛中也剛或不足則困以智免而失其正者有之剛或不中則正或致凶於道皆有咎剛中而正文王周公孔子是已故曰貞大人吉以剛中也此以九五言大人處困之才也剛見掩者天也非人之所能為無怨尤可也已困而言人誰信之若崇尚口才以言說處困適所以增窮矣上六窮困兊為口有言也下無應有言不信也此聖人因上六以戒不善處困者也范諤昌曰彖文貞大人吉下脫無咎二字理或然也在卦氣為霜降故太𤣥凖之以窮象曰澤無水困君子以致命遂志澤所以說萬物者水也澤無水則澤道困矣然水在澤下未嘗不通也君子處困窒之時澤不及物矣推致其所以然者命也巽為命命者消息盈虛之理君子聽命固窮自遂其剛大之志夫居下而無憂者則思不遠處身而常逸者則志不廣君子憤激自厲增益其所不能無若困之為速也易傳曰雖厄窮而不動其心行吾義而已所以遂其為善之志也初六臀困于株木入于幽谷三歲不覿象曰入于幽谷幽不明也四否艮在上體之下為臀巽木兊金傷之為株木困寒露節也與大過枯楊同象大過小雪之氣也四陽居隂不安其居臀困于株木者也初六柔而不正困于坎底妄動求濟於四不知四剛不中不安其居臀困于株木豈能濟人之困哉初既失援迷謬自四反二二又深陷猶入于幽谷也艮為山坎為水水注山溪間為谷坤為冥晦入于幽谷也入于幽谷窮困益甚無自出之勢故三歲不覿於四乾為歲初覿四歷三爻三歲也私見曰覿見之不正也三離目不正覿也初出不知四之困入不知谷之幽晦而不明乎處困之道也初在坎下不明之象何謂處困之道安靜自守而已九二困于酒食朱紱方來利用享祀征凶無咎象曰困于酒食中有慶也五動成震為稼二坎水往之為酒兊為口食也五不動二未可往困于酒食也酒食者人之所欲以施惠也朱紱亦謂九五也巽為股膝以上也乾為大赤坤為黃赤黃為朱乾為衣蔽乎膝上朱紱也九二剛中雖困于酒食而無所動其心則九五中正同德之君方來而相求共濟天下之困故曰朱紱方來九五來然後誠意通于上下故利用享祀上六宗廟五動二往震為長子艮為門闕有升自門闕長子奉宗廟之象享獻也祀者祭上下之通稱兼下言也若二動求五雖以正行亦凶凶自取之無所咎也故曰征凶無咎困于酒食者唯無所動其心則中中則進退遲速審而後動往有慶矣慶者朱紱方來得其所欲之謂也陽為慶征凶戒之也有慶勉之也易傳曰諸卦二五以隂陽相應而吉惟小畜與困乃厄於隂故同道相求小畜陽為隂所畜困陽為隂所掩也隂陽相應者自然相應也如夫婦骨肉分定也五與二皆陽爻以剛中之德同而相應求而後合如君臣朋友義合也六三困于石據于蒺藜入于其宫不見其妻凶象曰據于蒺藜乘剛也入于其宫不見其妻不祥也六三險而不正不善處困者也艮坎為石謂三石之堅不可以處者也巽交坎離為蒺藜中堅外鋭蒺藜之象謂乘二也蒺藜傷人不可以據者也三非其位非所困而困不度德也乘二之剛非所據而據不量力也不度德故名辱不量力故身危名辱身危死期將至故入于其宫不見其妻艮坤為宫坎為夫離為妻為目為見三困非其位而乘二剛凌人者也凌人者人亦凌之故二往乘三兩爻相易三入于其宫坎離象毁不見其妻矣又曰凶者不見其妻乃死亡將至之期所謂亡之兆非吉祥之兆坤為死故曰不祥也九四來徐徐困于金車吝有終象曰來徐徐志在下也雖不當位有與也九四尚柔九二剛得中柔不足以濟困剛得中乃可濟初六近比九二逺於九四四與初應而九二礙之既疑其險矣又疑初捨已而從二故來徐徐徐徐者疑懼之辭巽為不果故志在下也乾變為金坤為輿坎為輪二剛而能載故曰困于金車四履不當位欲行則懼二處困有應而不能相濟吝道也然以陽居隂能說而巽明於處困不與二爭雖不當位終有與之者以困之時上下急於相求故也是以吝而有終九五劓刖困于赤紱乃徐有說利用祭祀象曰劓刖志未得也乃徐有說以中直也利用祭祀受福也九四君側强臣之象二五同德相求而四間之四動艮為鼻震為足四不動兊金刑之劓刖也劓則醜刖則不行五為四傷亨困之志未得行於二也故曰劓刖志未得也二坎為赤乾為衣往應五巽蔽膝之象赤紱諸臣之紱也二躊躇不往以征為凶五以無助而困困于赤紱也巽為不果徐也兊為說九五剛中而正動以直行中則思慮精審直則其行不撓如是則君臣相說之志久而必亨九四豈能間之始也不果今則來說故曰乃徐有說以中直也上六宗廟五王假有廟祭祀者人君所以遍及百神自上格下二五相易之象人君得九二之賢利用誠意感格之如祭祀然上下並受其福矣亨困之道莫利于用此尚何困于赤紱哉艮為手下援九二受福也陽為福故曰利用祭祀受福也上六困于葛藟于臲卼曰動悔有悔征吉象曰困于葛藟未當也動悔有悔吉行也上六困極而當動者也巽為草葛藟藤蔓葉艾白子赤六三乾巽之象上六困極求助六三柔而不正以巽乎上為說不能相濟又纒繞之故困于葛藟言求六三為未當也上六動則安其位不動則困于六三困于葛藟又困于臲卼之地也曰發聲兊口象上六自謀曰動則失正失正則悔故安於困然不動乃有悔不知征則吉征以正行也以正而行吉且無悔矣是行而後吉也故曰吉行也范雎困于鄭安平虞卿困于魏齊猶能解相印以全其軀况體易君子乎巽下坎上井改邑不改井無喪無得往來井井汔至亦未繘井羸其瓶凶彖曰巽乎水而上水井井養而不窮也改邑不改井乃以剛中也汔至亦未繘井未有功也羸其瓶是以凶也此卦彖文脫錯當曰巽乎水而上水井改邑不改井乃以剛中也無喪無得往來井井井養而不窮也汔至亦未繘井未有功也羸其瓶是以凶也巽木也入也木入于水舉水而上之井也故曰巽乎水而上水曰井此合二卦言井也泰之初五成井古者八家為井四井為邑邑改而井不改井德之不遷也坤在內為邑坎為水水者所以為井也易其中畫非坎也而坤則可易矣坎之中畫其剛中乎乃難辭也君子窮居不損大行不加窮亦樂通亦樂非剛中不變能之乎故曰改邑不改井乃以剛中也初往之五汲之象若有喪而實無所喪以其不失位不曰取之而不竭乎五來之初不汲之象若有得而實無所得以其失位不曰存之而不盈乎言井之體一也往者上也來者下也往亦井來亦井上下無常其用通矣所以為井者一也體用一也定而應應而常定井之養物所以無窮歟故曰無喪無得往來井井井養而不窮也此以九五升降言井之德也汔幾也自二至四體兊兊為澤初本泰震震動也來動於澤之下泉之象荀爽曰隂來在下亦為井是也巽為繩在井中繘也繘汲繩也二幾及初反巽而上有垂繘而汲幾及井泉之象焉亦有既汲而反未能引繘以出乎井之象兩者雖有濟物之用皆未及乎物也何由有功故曰汔至亦未繘井未有功也坤為腹兊為口井中之器有腹有口瓶也在井之口水實其中汲水而上之象也自四至初成反兊兊為口為毁折巽繩反上而毁折之汲水至于井口羸掛其瓶瓶口在下覆其瓶也井之用喪矣凶言初二不正不正則凶故曰羸其瓶是以凶也汔至亦未繘井者半途而廢也羸其瓶凶不善其終也君子免是二者其唯剛中乎此以互體言井之戒也在卦為芒種故太𤣥凖之以法范諤昌曰巽乎水當作巽乎木一本曰井羸其瓶凶或曰反巽兊也何以猶有繩之象曰象有相因而成者震陽動於下為大塗艮陽止於上為徑路離外實內虛為目巽實者反在上為多白眼相因也故臨之兊為觀之盥損之兊為益之說大過巽與兊同為棟橈巽為繩反復成巽者或為維繫糾固之象其在井為反繘而上之象象之相因其生無窮也象曰木上有水井君子以勞民勸相坎為水勞卦也水在地中自下而升達乎木上可謂勞矣其於水也有出之道故曰井坤為民泰震為左兊為右相之兊為口勸之也君子施澤於民既以言勸其不能又以道相其不足雖勞而不憚不如是井道不足以及民矣雅鴻鴈勞來還定安集之詩其辭曰知我者謂我劬勞又曰雖則劬勞其究安宅勞民勸相者固自勞也初六井泥不食舊井無禽象曰井泥不食下也舊井無禽時舍也井泰初之五初在井下坤土汩之泥也兊口在上不食也言初六之柔自處卑穢無髙人之行故曰井泥不食下也乾之初九往而為坎水去泥存舊井也離為飛鳥四不應初無禽也猶舊井之澤已盡而禽亦無也無禽則人不食可知行為人惡四往而不顧時舍之也九二井谷射鮒甕敝漏象曰井谷射鮒無與也井以不遷為德非有求於人九五不應無與之者二冝剛中自守養德俟時動而求五失所以為井矣谷注溪者也二動坎水注于艮山之間谷也鮒蛙也兊巽為魚初井泥又伏震為足在下魚類生於井泥而滅跗者鮒也坎弓離矢射也動則谷水注下而射鮒言動則其道愈下入于汙濁矣甕汲瓶也說文作罋兊為口離為大腹器在井中有口有腹且大者甕也二動兊毁口壞見腹坎水下流甕敝漏也言動則不能上行以濟物矣嗚呼無與而動動則終莫之與曷若自守哉九三井泄不食為我心惻可用汲王明並受其福象曰井泄不食行惻也求王明受福也陽為清潔九三以陽居陽清潔也巽為股為入股入坎下而水清潔治井之象泄也兊口在上不食也九三君子修德潔巳可用而未用猶井泄不食也我者九三自謂上六正應在髙位為我道不行憂之其心惻然坎為加憂為心病故為我心惻上六有是心矣可用是心以汲引之坎在井上坎為輪井車汲引之象上汲引之則三往上來其惻然之心見矣失位為憂故也往來行也故曰井泄不食行惻也乾五為王離為明三往應上九五成艮手王受福也三上同象亦受福故並受其福王明五也求王明者三也故求王明受福也司馬遷曰王之不明豈足福哉陽為福求亦艮也上六有憂惻之心不用之以汲引乃士之尊賢也上六就三三往求五乃能盡上下相與之情故夫子增一求字以發其義六四井甃無咎象曰井甃無咎修井也坎水坤土合而火之甄也有巽工焉自下壘而上至于井口甃也古者甃井為瓦裏自下達上六四正位近五下無應近君而無汲引之用守正自修免咎而已故曰井甃無咎修井也易傳曰無咎者僅能免咎而已若陽剛自不如是如是則可咎矣九五井冽寒泉食象曰寒泉之食中正也九五以陽居陽坎又為陽清潔之至故為冽說文云冽清也乾在坎為寒九五即泰初九甲子爻子坎位井五月卦隂氣自下而上井寒矣故五坎有寒泉之象兊口承之食也九五中正贍給萬物而不費往者食者無偏係也故曰寒泉之食以中正也易傳曰不言出者井以上出為成功未至於上未及用也故至上而後元吉上六井收勿幕有孚元吉象曰元吉在上大成也幕于氏本作坰坰亡狄切覆也玉篇曰以巾覆物今為則今易作幕音莫者傳寫誤也當作在古文當作坰坎為輪在井之上下應巽繩收也虞翻曰收謂以鹿盧收繘也勿者上六又當守正之象上汲三往艮坎成蒙蒙有覆之意井道大成若專於應三則不正所養狹矣猶井有收而之有發其而得汲者有欲汲之而不得發其者三發其汲之而又者也故於此戒之勿則上下有孚而得元吉元吉在上以井道大成故元吉歸於上也離下兊上革己日乃孚元亨利貞悔亡彖曰革水火相息二女同居其志不相得曰革巳日乃孚革而信之文明以說大亨以正革而當其悔乃亡天地革而四時成湯武革命順乎天而應乎人革之時大矣哉兊澤離火而彖曰水火何也曰坎兊一也澤者水所鍾無水則無澤矣坎上為雲下為雨上為雲者澤之氣也下為雨則澤萬物也故屯需之坎為雲小畜之兊亦為雲坎為川大畜之兊亦為川坎為水革兊亦為水又兊為金金者水之母此水所以周流而不窮乎坎陽兊隂隂陽二端其理則一知此始可言象矣故曰曲而中水得火而竭火得水而滅水火相止息則變少女志處乎內而在外中女志適乎外而在內二女同居其志不相得則變之所由生不可不革也故曰革水火相息二女同居其志不相得曰革此以兩體言革也革變也非常之事方革之初人豈能遽信哉傳曰非常之元黎民懼焉已日先儒讀作已事之已當讀作戊已之已十日至庚而更更革也自庚至已十日浹矣已日者浹日也革自遁來無妄變也二變家人三變離四變革無妄之震納庚革之離納已故有此象二應五三應上孚也湯之伐桀猶曰舍我穡事而割正夏故革即日不孚浹日乃孚乃難詞也故曰已日乃孚革而信之此以兊離二五三上言革之難也坤離為文明兊為說天下之事至於壞而不振者文亂而不理事暗而不察民怨而上不恤也故萬物否隔人道失正所以當革文明則事理說則民心和故曰文明以說此以兩體言革之道也五上相易各當其位相易亨也各當其位正也文明以說然後大亨而大亨之道利在於正正則不正者正矣故曰元亨利貞彖曰大亨以正此復以五上言革之道也革而當者六五之上也上五革而各得其正者當也文明以說大亨以正革而當三者具其悔乃亡革之非其道或不當革而革或革之而無甚益其於新舊皆有悔是本欲去悔復入於悔矣秦革封建子弟無立錐之地漢革郡縣而七國叛唐革府兵而兵農分不當故耳故曰革而當其悔乃亡此再以上五言革之戒也乾始於坎而終於離坤始於離而終於坎乾終而坤革之地革天也陽極生隂乃為寒坤終而乾革之天革地也隂極生陽乃為暑天地相革寒暑相成是亦水火相息也坎冬離夏震春兊秋四時也故曰天地革而四時成兊革離而成乾巽乾為天坤為順巽為命六二順五順乎天也九五應二應乎人也湯武改物創制革天之命亦順天應人而已猶寒暑之相代天道變於上民物改於下因其可革而革之故曰湯武革命順乎天而應乎人革之時大矣哉此復以五上升降推廣革之道也在卦氣為三月故太𤣥凖之以更象曰澤中有火革君子以治厯明時水火相會其氣必革澤中有火革之時也其在地則溫泉是巳君子觀澤中有火則知日月坎離有交會之道日火也月水也冬至日起牽牛一度右行而周十二次盡斗二十六度則復還牽牛之一度而厯更端矣牽牛者星紀也水之位也日月交會于此澤中有火之象也厯更端者革也昔者黃帝迎日推策始作調厯閲世十一歷年五千而更七厯至漢造厯歲在甲子乃十一月冬至甲子朔為入厯之始是時日月如合璧復會于牽牛距上元太初十四萬三千一百二十七歲蓋日月盈縮與天錯行積久閏差君子必修治其厯以明四時之正所謂四時之正者冬至日月必會于牽牛之一度而弦望晦朔分至啓閉皆得其正矣日月不會者司厯之過也震嘗問厯於郭忠孝曰古厯起於牽牛一度沈括謂今宿於斗六度謂之歲差何也曰久則必差差久必復於牽牛牽牛一度者乃上元太初起厯之元也初九鞏用黃牛之革象曰鞏用黃牛不可以有為也初九革之始在下而九四不應離體務上速於革者也鞏固也坤離為黃牛初動艮為皮革日熯之不可動鞏固也黃牛者中順也鞏固用黃牛之革堅韌不動以中順守之可也初動艮又為手為指莊子曰指窮於為初不可動不可有為也易傳曰革事之大也必有其時有其位有其才審慮慎動而後可以無悔六二已日乃革之征吉無咎象曰已日革之行有嘉也六二得位得時上應九五有可革之才然不可遽為必俟人情既浹上下既信之日乃可革之十日之次自庚至已浹焉離納已已日者浹日也故曰已日乃革之九五中正二應上行而又其難其慎如此革道之美無以復加乾為美六上行則二有嘉美故辭曰征吉無咎象曰行有嘉也夫變動貴乎適時趨舍存乎機會二當可革濡滯而不行於革道安得無咎征吉無咎者以行有嘉也二巽體不果故勉之易傳曰以六居二柔順得中正又文明之主上有剛陽之君同德相應中正則無偏蔽文明則盡事理應上則得權勢體順則無違悖時可矣位得矣才足矣處革之至善者也九三征凶貞厲革言三就有孚象曰革言三就又何之矣九三剛正而明處下之極革之而當不可復動往而不已有凶成則必虧以正守之猶厲故曰征凶貞厲然守之者其在懼乎初不可有為也二已日乃革之三革之而就稽之於衆其言亦曰三就故曰革言三就三極數也月之盈虧氣候之變皆以三五三則就矣往而不已人必有言兊為口革言也上六應九三孚也革於此信於彼有孚也民情既孚革道已就欲往何之違民妄作則有凶咎九三離體務上革而過中聖人戒之故辭曰革言三就有孚象曰又何之矣九四悔亡有孚改命吉象曰改命之吉信志也九居四宜有悔然當水火相革之際有其時矣其才也以柔濟剛其動也革而當是以悔亡革五爻皆正四動初應則上下靡不信不動有悔故曰有孚動而正近與五相得逺與初相應故抗君之命反君之事解國之大難除國之大害無招權擅事之凶巽為命四動改命也故曰改命之吉信志也易傳曰四非中正而至善何也曰唯其處柔也故剛而不過近而不逼順承中正之君而上下信其志矣九五大人虎變未占有孚象曰大人虎變其文炳也乾為大人兊為虎虎生而具天地之文然未著也既變則其文炳然易見京房謂虎文疏而著是也六二離變兊為文明虎變也九五剛健中正而得尊位大人之革也其舉事無悔其應曲當文理彰著天下曉然知之猶虎變也豈俟於既革而後孚哉蓋未革之先在窔奧之間簟席之上其文章固已斂然而具矣不假占決質之鬼神其下既孚二五未易而應未占有孚也二離為龜兊乾為決兊乾變離決龜也決謂之占非天下之至誠不言而信能如是乎文王之不長夏以革而虞芮質厥成是已上六君子豹變小人革面征凶居貞吉象曰君子豹變其文蔚也小人革面順以從君也陸績曰兊之陽爻稱虎隂爻稱豹考之天文尾為虎火也箕為豹水也而同位於寅虎豹同象而異爻也離二文之中也故二交五其文炳明離三文已過故三交上其文蔚茂繁縟文之過也三交上成九九君子豹變也乾為首兊為說乾首而說見於外面也上交三成六小人革面也向也君子韜光逺害小人自狥其面今也君子豹變其文蔚然小人革面嚮順從其上革面非謂面從也旋其面目也如是則革道大成坤順也兊口順之從也成則不可復動故三征凶上居貞吉下三爻革弊弊去當守以懼上三爻革命命定當復其常故曰征凶上六革道大成柔戒於不守故曰居貞吉上有伏艮居之象也巽下離上鼎元吉亨彖曰鼎象也以木巽火亨飪也聖人亨以享上帝而大亨以養聖賢巽而耳目聰明柔進而上行得中而應乎剛是以元亨以全卦言之初六足也二三四腹也腹而中實受物也六五耳也上九鉉也有鼎之象以二體言之虛者在上其足在下而承之亦鼎之象有是象而又以木巽火木入而火出亨飪之象在他卦雖有木火而無鼎象不為亨飪矣於此言象則他卦以爻畫為象者可以類推故曰鼎象也以木巽火亨飪也此以六爻兩體言乎鼎也聖人在上尊之則亨以享上帝大之則亨以養聖賢天帝一也以其宰制萬物而為之主則謂之帝聖人者賢人之極得天之道而能盡天之聰明者也乾為天在上為帝指上九也在下為聖賢指二三四爻也以享上帝之心推之以養聖賢人有不樂盡其心者乎鼎器也極其用則道也故曰聖人亨以享上帝大亨以養聖賢此復以六爻言鼎之用也觀乾之象則知天帝聖賢一也聖賢之任即天帝之任其任豈不重乎鼎自遁三變而成一變訟坎為耳在下聽卑聰也再變巽離為目在四三變鼎離目在五其視愈逺明也所以聰明者聖人卑巽下人兼天下之耳以為聽故其耳聰兼天下之目以為視故其目明六二之柔進而上行至於五居尊位而得中下應九二之剛柔履尊位則無亢滿之纍得中則無過與不及之咎應乎剛則君臣道合萬物皆得其養具此四者是以元亨坤柔之亨始於六二之正元吉亨也故不曰大亨曰巽而耳目聰明柔進而上行得中而應乎剛是以元亨言元亨則吉在其中矣此以卦爻三變言鼎之才也在卦氣為六月故太𤣥凖之以竈象曰木上有火鼎君子以正位凝命鄭三月鑄鼎士文伯曰火見鄭其火乎火未出而作火以鑄刑器周三月夏之正月也火以三月昏見於辰上故司爟以季春出火月令季春之月命工師令百工而金䥫在焉則古者鑄鼎以火出而作火矣辰東方木也火在木上其鑄鼎之時乎兊乾為金而又火在木上亦鑄鼎之象也鼎有趾腹耳鉉其位不可易故正位尊卑上下用之各有數故凝命離南面正位也巽為命九三獨正凝命也定命之謂凝木火鑄金巽風入之有凝之象正位凝命所以趨鼎之時初六鼎顛趾利出否得妾以其子無咎象曰鼎顛趾未悖也利出否以從貴也初六在下體之下動而應足趾也乾為首四來下初首在下顛也初往四成震為足顛趾也否者不善初不正否之象初四得正未悖也古者鼎足空潔鼎者顛趾出否則能致新雖曰顛倒於鼎之用未為悖亂也乾為君兊為妾震為子妾不以正合以其有子故無咎無咎者正也妾奔女在女體之不善者穢也利出否者出穢納新以賤從貴而後得子也公羊謂妾以子貴非也嫡妾之分豈可亂哉以君臣言之以貴下人卑有時而踰尊矣得賤臣者苟利於宗廟社稷則或出於屠販奴𨽻夷裔俘虜不問其素可也九二鼎有實我仇有疾不我能即吉象曰鼎有實慎所之也我仇有疾終無尤也陽為實九二剛實得中其可為鼎用二之五鼎有實也怨耦曰仇子夏曰仇謂四也九二九四匹敵也九二據初九四比五二四失其應故相與為仇四近君與我為仇二之五其可不慎所之乎二動成艮艮止也欲動而止慎之象九居四陽失位仇有疾也我仇有疾不能之初則不能即我二之五鼎得實而吉不喪其實終無尤也四兊為口尤之者也五往兊毁故終無尤也九三鼎耳革其行塞雉膏不食方雨虧悔終吉象曰鼎耳革失其義也三動成離坎坎為耳鼎耳也三應上九鉉也耳虛受鉉則舉鼎而行九三當剛柔相應之時剛正自守以動為不正且有悔故上來之三而不受是鼎耳距鉉所以行鼎者塞絶而不亨矣離兊革之象鼎耳革失其為鼎耳之義也其能成亨飪之功乎離為雉兊澤為膏雉膏食之美者兊口在上不食也九三自守雖有美而不食五安知其㫖哉夫君子不為巳甚與其獨善其身曷若兼善天下然剛正自守人必有知者上感而動坎水上兊澤流方雨而其悔虧矣坎變兊兊為毁虧悔也始不正而正終吉也九四鼎折足覆公餗其形渥凶象曰覆公餗信如何也四近君九處不當位既不堪其任矣下信初六之小人又無助德與智力皆不足安能謀大事任重寄哉故動則傾敗覆其所有矣四動之初成震兊震為足兊折之鼎折足也餗鼎實也李鼎祚曰雉之屬虞仲翔曰八珍之具鼎祚指五離言雉雉八珍之一也三公位初之四乾首在下三見離毁覆公餗也其形渥凶鄭康成虞仲翔本作其刑剭凶王㳂曰古之大刑有剭誅之法周官掌戮凡爵者殺之于甸師氏子夏傳作握蓋傳之久字誤而音存也王輔嗣作其形渥易傳從輔嗣既曰其刑剭則凶可知矣如離之九四焚如死如弃如不言凶也離為目震動也乾首在下俯也目動首俯羞赧之象兊為澤兊乾為面巽為股澤流被面霑濡其體其形渥也如是者必害于家凶于國豈唯戮辱之凶哉四不智信任小人禍至於覆公餗信任如何也如何兊口發聲與大畜何天之衢亨同象六五鼎黃耳金鉉利貞象曰鼎黃耳中以為實也離坤為黃黃者坤之中言有中德也伏坎為耳耳虛而納者也二自遁九五變乾為金金剛德也二應五舉鼎耳而行為金鉉故曰鼎黃耳金鉉五之二巽變艮艮手為也六五有中德虛中而納九二九二剛中而實舉五而行以中為鼎之實也鼎之行在耳剛中為耳之實則剛柔得中而鼎道行矣故曰鼎黃耳中以為實也中以為實釋金鉉也五雖虛納二應之不以正失耳之實君正相合不正其可乎故利貞九二之五正也言中以為實則正在其中矣上九鼎玉鉉大吉無不利象曰玉鉉在上剛柔節也上九遁乾之不變者也故為玉三動坎為耳上來應三舉鼎耳而上行玉鉉也蓋上九不變則九三之剛正應之其道上行矣故曰鼎玉鉉上九之三坎變成兊水澤節也九居三而正大者吉也言上九為三而屈則大者吉小者無往不利上下之道行矣故曰大吉無不利鼎道既成九三復位玉鉉在上而處成功夫上九動而下三知柔也靜而在上知剛也動靜適宜剛柔有節是以動則吉無不利斯所以能保其成功歟震下震上震亨震來虩虩笑言啞啞震驚百里不喪匕鬯彖曰震亨震來虩虩恐致福也笑言啞啞後有則也震驚百里驚逺而懼邇也出可以守宗廟社稷以為祭主也自臨來二之四也震動於積隂之下奮擊而出亨也天威震動畏而恐懼乃所以致亨故曰震亨此以重震言亨也震來者九四來也虩許慎曰蠅虎也易傳曰蠅虎謂之虩者周旋顧慮不自寧也四動於坎中動而止止而復動離目內顧未嘗寧息虩之象震動之來恐懼如此初九守正所以致福福者陽之類謂九四來也故曰震來虩虩恐致福也此以震四之初言震亨也四來之三成離離目動笑也之二成兊兊口動言也自二之三笑且言矣之四聲達于外啞啞也惟震動恐懼必有笑言啞啞理之所不能違也故曰笑言啞啞後有則也此再以九四往來言震亨也傳曰千里不同風百里不共雷雷震於百里之逺宜若不聞而猶恐懼於邇者驚於逺懼於邇所謂恐懼於其所不聞也自初之四乾坤之策百有二十百里舉大數也驚逺四也懼邇初也故曰震驚百里驚逺而懼邇也此以初二三四言震也坤為肉坎為棘艮為手以棘載肉而升之者匕也坎震為酒離為黃酒黃鬱鬯也驚逺懼邇乃能不喪匕鬯則出可以守宗廟社稷以為祭主故曰不喪匕鬯徐氏謂彖文脫不喪匕鬯一句是也六宗廟也艮為門闕坤土在上為社震為榖稷者百榖之長宗廟社稷之象古者諸侯出而朝覲㑹同世子監國以奉宗廟社稷之粢盛匕牲體酌鬱鬯二者皆親之長子主器也不喪匕鬯則不失職矣四者諸侯位長子居之監國之象艮為手不喪匕鬯也臨二之四出也橫渠曰此卦純以君出子在為言則震之體全而用顯故曰出可以守宗廟社稷不雜君父共國時也在卦氣為春分故太𤣥凖之以釋象曰洊雷震君子以恐懼修省上下皆震洊雷也震動為恐懼坎為加憂亦恐懼也初九正震為行得一善而行之之象故曰修九四不正有過而思改之象故曰省初九震來虩虩後笑言啞啞吉象曰震來虩虩恐致福也笑言啞啞後有則也初九先畫之爻九四後也於爻言後笑言啞啞與卦辭互發之六二震來厲億喪貝躋于九陵勿逐七日得象曰震來厲乘剛也九四震自上來而下乘初九之剛此六二所以危厲不安二動成兊離兊為口億也億虞氏本作噫於其反虞翻曰惜也兊離為螺螺貝也貝貨貝也古者貨貝而寶龜貝者二之所利九四艮山在大塗之下陵也九陽之極數七之變太𤣥曰九也者禍之窮也二惜其所利避初之五震足升于四之上躋于九陵逐利而往然離毁貝喪復乘四剛其禍愈大何所避哉震為作足之馬初之四四亦為馬逐之象也六二不逐所喪中正自守則所喪不逐而自得矣自二數至上又自初數至二其數七二復成兊離得貝之象離為日勿逐七日得也易傳曰守其中正而不自失過則復其常矣六三震蘇蘇震行無眚象曰震蘇蘇位不當也六三在坎陷中處不當位震懼自失故震蘇蘇震為反生三震之極震極反生蘇也春秋外傳殺秦諜三日而蘇若太𤣥謂震于利顛仆死則不復蘇矣易傳曰蘇蘇神氣緩散自失之狀處不當位震懼自失而不知動其禍自取也故曰眚若因震懼而行出險就正何眚之有易傳曰三行至四正也九四震遂泥象曰震遂泥未光也坎水坤土泥也震足陷於泥中滯泥也陽有可震之剛動則有光而四自二進遂行而不反四失位陷於泥中處則莫能守動則莫能奮震道未光也知其不可遂反而處三震懼得正俟時而動則光矣坎離正光也二三兩爻相易取義夫初九九四均震也六二喪貝六五無喪當位不當位之異也荀本作隧或云遂隧古通用六五震往來厲億無喪有事象曰震往來厲危行也其事在中大無喪也五往而上則柔不可居動之極來而下則乘剛往來皆危行也億虞氏作噫五動成兊巽兊口噫也惜之辭巽為事五之所有事在中而已五剛大乃能無喪有事柔則危剛大守中雖甚危之時可以致亨五無喪有事則二往助之矣易傳曰諸卦雖不當位多以中為美三四雖當位或以不中為過蓋中則不違於正正不必中也天下之理莫善于中於二五見之矣上六震索索視矍矍征凶震不于其躬于其鄰無咎婚媾有言象曰震索索中未得也雖凶無咎畏鄰戒也上六過中處震之極窮而氣索將下交於三三亦過中而窮莫助之者是以恐懼失守窮之又窮故曰震索索中未得也使得中自持不至於窮索矣懼而動成離離為目動而不正則否或動或否目不安定視矍矍也視矍矍者以震索索也恐懼如此當守其正征則凶征者以正行亦動也坤為身四折之為躬鄰謂五五有乘剛之危所以無喪者得中也上六未嘗乘剛而畏之苟知鄰之無喪者在於得中能自戒懼不動則雖處凶地而無咎矣無咎者得正也五震而動兊為口戒也上六六五隂也九四陽也六九相配有婚媾之義上六不得乎三或來交四則五必有言四五相比上安得而配之上既不可以交三又不可以交四以此見上六終不可動故曰征凶橫渠曰五既附四已乃與焉則招悔而有言矣能以鄰為戒則無咎易傳曰聖人於震終示人知懼能改之義為勸深矣艮下艮上艮其背不獲其身行其庭不見其人無咎彖曰艮止也時止則止時行則行動靜不失其時其道光明艮其止止其所也上下敵應不相與也是以不獲其身行其庭不見其人無咎也以三畫卦言之陽止於二隂之上止也以重卦言之上下內外各得其止故曰艮止也止非一定之止也行止相為用所以明道也猶寒暑之成歲晝夜之成日時焉而巳矣艮者震之反艮止也靜也震動也行也艮直坤之初六可止之時也震直大壯之九四可行之時也不可止而止猶不可行而行其失道一也是以一動一靜震艮相反而不失其時則其道光明矣坎月在東光明之時也夫子可以仕則仕可以止則止又曰無可無不可者此也彼入而不出往而不反者豈知道之大全哉故曰時止則止時行則行其道光明此以震艮反復言乎艮也艮之所以能止者止之於其所也背止之象韓愈曰艮為背夫動生於欲欲生於見背止於其所不見也上下兩體爻不相應譬則兩人震之初九越五而之上一人背而往也九四去四而之三一人背而來也五四中爻體艮中在門闕之中庭也庭交際之地兩人背行於庭雖往來於交際之地然背行則不與物交無所見也且自顧其後不獲其身矣安能見人乎不獲其身忘我也不見其人忘物也所以能各止其止也以人倫言之君止於仁臣止於敬父止於慈子止於孝以至萬物庶事各有所止古人繡􅌧於裳兩已相背其艮之象乎故曰艮其止止其所也上下敵應不相與也是以不獲其身行其庭不見其人無咎也上下敵應不相與可止之時故無咎若施之於他卦則有咎矣此以震艮相反推明艮其背也在卦氣為十月故太𤣥凖之以堅象曰兼山艮君子以思不出其位兩山相兼而峙然各止其所焉位者所處之分君子據正循分亦各止其所而已周公之忠大舜之孝皆分當然也橫渠曰如素夷狄行乎夷狄素患難行乎患難也二四坤爻在中而正思不出位也夫易言思者皆坤也故太𤣥以五五土為思或曰心火也脾土也心乃有思以為土何也曰心火也有所思則係之於土猶悲主肺怒主肝悲怒有不由於心者乎故曰心居中而治五官初六艮其趾無咎利永貞象曰艮其趾未失正也初在下體之下動而應足者趾也四震為足艮其趾者止其動之初也六居初不正宜有咎事止之於初其止早矣未失正也可動而動則正矣利永貞者非永止也動而正也正則行止一也不能止則亦不能行矣初四相易成巽巽為長永貞也初六隂柔患不能久故戒之以利永貞六二艮其腓不拯其隨其心不快象曰不拯其隨未退聽也二動成巽巽為股二艮之柔膚也膚在下應股腓也腓膊腸也二不能動三剛而失中止之於上不獲往應於五艮其腓也九三止矣六二亦隨而止則所謂其隨者隨九三也三震二動成兊澤雷之象故曰隨拯一作拯音承馬融曰舉也三震起也三若之五成艮為手有舉之象二未能使三退處於二而聽從於已不能上行一舉手以濟五之柔不拯其隨也其隨猶言其事當隨也三坎為耳退處於二退聽也易傳曰退聽下從也故曰未退聽也二又不能自動應五故其心不快二動成兊兊為決其心快也二不能動坎為心病不快也六二止於下制於九三之彊而拳拳然不忘納忠於君非中正君子孰能如是乎孟子出弔王歡輔行之時乎易傳曰言不聽道不行也故其心不快不得行其志也士之處髙位則有拯無隨在下位則有當拯者有當隨者有拯之不得而後其隨者也九三艮其限列其夤厲薰心象曰艮其限危薰心也薰子夏傳王弼本同孟喜京房馬融王肅作熏馬王曰熏灼其心虞翻本作閽虞曰艮為閽閽守門人坎盜動門故厲閽心古閽作熏字又曰馬君言熏灼其心未聞易道以坎水熏灼人也荀爽曰以熏為勳或誤作動蓋古本當作動心動心二字傳者誤併作勳字耳再傳者又脫其偏傍作熏而後來者又加草遂成薰字故荀以熏為薰虞亦曰古閽作熏字今以象考之宜作動心三在上下體之際限也限腰也帶之所限三止之極止而不動艮其限也夤膐也一作䏖馬融曰夾脊肉鄭氏本作􅘡古之人不動其心者善養吾浩然之氣而巳進退綽然有餘裕故其心不動九三知止之止而不知無止之止堅强固止與物睽絶無安裕之理譬之一身下體欲靜上體動而爭之則上下不相屬列絶其􅀈危厲動其心宜矣坎為心病故曰厲動心觀此知孟子之不動心非體易者不能也六四艮其身無咎象曰艮其身止諸躬也坤為身三坎折之為躬四在大臣之位而六五柔中不足於剛健故不能止天下之當止惟止其身自止於正故無咎若責以天下則安得無咎夫身有大身萬物與我同體者是也六四下不能止天下之當止上不能正其君局局然自止其身不亦小哉故夫子易身為躬王弼謂自止其躬不分全體輔嗣其知之歟易𫝊曰僅能善其身豈足稱大臣之任乎六五艮其輔言有序悔亡象曰艮其輔以中正也三至上體頤五動成巽五應二五成兊艮在首下動而上止為輔兊為口舌言之象五巽而出之與二相應答艮其輔言有序也六五不正宜有悔施止道於其輔頰言必中正斯可以止天下之動矣是以悔亡上九敦艮吉象曰敦艮之吉以厚終也艮為山篤實也動成坤厚也篤實而厚敦之象上艮之極止極者有不止焉九以剛居上動而必正能厚其終知止於至善之道正故吉非篤實之君子能之乎易傳曰人之止難於久故節或移於晚守或失於終事變於久人之所同患也艮下巽上漸女歸吉利貞彖曰漸之進也女歸吉也進得位往有功也進以正可以正邦也其位剛得中也止而巽動不窮也漸否一變三之四成卦九四之剛下柔六三之柔上進漸柔之進也故曰漸之進也此以否六三之四言漸也女謂嫁曰歸自內之外也三坤之四成巽女往也四乾之三成艮男下女也艮男下女然後巽女往而進艮陽居三巽隂居四男女各得其正矣夫漸之進不一也臣之進於君人之進於事學者之進於道君子之進於德未有犯分躐等而能進者而漸專以女歸為義者禮義亷恥之重天下國家之本無若女之歸也故娶妻者非媒則不得非卜筮則不從納采問名納吉納徵請期親迎莫不以漸女子之嫁也母醮之房中父命之阼階諸母戒之兩階之間三月廟見而後成婦亦必以漸如是而歸則正正則吉故曰漸女歸吉利貞彖曰女歸吉也言女歸之所以吉者利於貞也此以三四易位各得其正言漸之進也易傳曰在漸體而言中二爻交也橫渠亦曰九三六四易位而居蓋後之傳易者自伊川橫渠二先生漸以卦變言之矣漸之進其德有四進得位往有功也進而正可以正邦也其位剛得中也止而巽動不窮也四者隂之位六往居之得位也位者待才用之宅進而不得其位則無所施位過其才則力不勝進而得位往必有功故曰進得位往有功也四者諸侯之位坤土在上為邦君子之進正已而巳已不正未有能正人者其始不正終必不正三以正進四以正交則四爻皆正邦國正也猶女得所歸男女既正家道不期於正而自正故曰進以正可以正邦也此兩者以六居四言漸也或曰剛得中謂九五誤也在九五當曰剛中而應如無妄萃是也當曰中正而應如同人是也此謂九三也剛陽德也其位在六爻為一三五一始進也五進已極三得中也已極則不復進矣太𤣥曰月闕其膊不如開明於西剛得中其進未極漸如是可進矣故曰其位剛得中也此以九三言漸也內艮止也外巽巽也易傳曰人之進也以欲心之動躁而不得其漸則有困窮矣在漸之義內止靜而外巽順其動不窮也故曰止而巽動不窮也動言三四動動而正所以不窮此以兩體二爻言漸也在卦氣為正月故太𤣥凖之以鋭象曰山上有木漸君子以居賢德善俗山上有木止於下漸於上也君子進德以漸善俗亦以漸九五易而可久賢人之德也居賢德則安之而不動矣居亦止也坤為民坎險也民險者惡俗之象然二三四正正為善艮止也君子在上進德以漸安其德而不動則惡俗自善險者漸止矣善俗之道也王肅本作善風俗初六鴻漸于干小子厲有言無咎象曰小子之厲義無咎也初動離為飛鳥坎為水之二巽為進退水鳥而能進退者鴻也二坎水之崖干也三艮為少男小子也初之二艮變兊兊為口小子有言也初在下柔而無應自小子見之以為危厲者也不知在下所以有進之漸君子之柔其動也剛離隱處卑非援乎上也於義無咎夫明夷之初君子于行則主人有言漸之初鴻漸于干則小子厲有言進退之初非深識逺照不能處之而不疑豈常情之能窺測哉故曰君子所為衆人固不識也六二鴻漸于磐飲食衎衎吉象曰飲食衎衎不素飽也自二至五有巽離坎鴻之象二之五坎變巽為艮艮坎為石巽為髙坤為平石髙且平磐也磐大石也五之二坎變兊坎為水飲也兊為口食也兊為和說衎衎而樂也二五以中正相應進而安裕飲食衎衎而樂詩鹿鳴是也巽為白離為大腹二之五巽離毁不素飽也素飽者無功食祿徒飽也君子之進豈飲食而已哉上則道行于君下則澤加于民不徒飽也九三鴻漸于陸夫征不復婦孕不育凶利禦寇象曰夫征不復離羣醜也婦孕不育失其道也利用禦寇順相保也三至二有坎離巽鴻之象三艮為山四變三為坤坤為平地髙者平矣陸之象鴻離于水漸進于陸三若守正待時而不妄動則得漸之道三四無應隂陽相比而易合守正者戒之橫渠曰漸至九三六四易位而居坎為夫離為婦為大腹征以正行也三不守正而合四夫征不復也夫征不復者以離羣醜也三隂爻為羣隂為醜言不正則離乎羣衆而往不能反也四不守正而合三則離毁矣婦孕不育也婦孕不育者不以正合而失其交之道也夫人所以致非道之交者罔不自已求之我無隙以乘之彼何自來乎故三不動則四坤不來矣君子自守其正不唯君子無失已之纍而小人亦不陷於非義是以順相保利用禦冦之道坎為盜離為戈兵寇也象以三為君子又以坎為冦者反以戒三也坤為順各得其正順相保也六四鴻漸于木或得其桷無咎象曰或得其桷順以巽也六四之柔進而介于二剛之間猶鴻漸于木也鴻足蹼不能握木漸于木非所安之地四離飛鳥而有坎巽鴻之象巽為木漸于木也然上承五以巽事之下得三以順接之得所止焉惟順以巽故介于二剛之間得位而無咎猶或得其桷也桷椽之方者巽為長木艮為小木離為麗坤為方木小而方可麗於長者木之材中乎椽桷者也易傳曰橫平之柯也九五鴻漸于陵婦三歲不孕終莫之勝吉象曰終莫之勝吉得所願也二至五有坎離巽鴻之象五巽為髙二艮為山二之五自山而進於髙復有山焉陵也大阜曰陵二進於五得尊位也鴻水鳥進至于陵其位髙矣然非所樂君子之樂王天下不與存焉故曰鴻漸于陵巽為婦離為大腹乾為歲二五相易三至五厯三爻離毁巽見婦三歲不孕漸之時道不可遽行其功未見于上下之間以三四相比而勝之也二艮為土三四為震木勝之五巽為木三四為兊金勝之勝之則四比五三比二而君臣離矣然二五相應中正之德同其合乃中心之所願欲豈三四所能間哉其行有漸功成而復其所則孕矣故終莫之勝吉吉正也上九鴻漸于陸其羽可用為儀吉象曰其羽可用為儀吉不可亂也鴻漸于陵已髙矣又升而至于上窮而不知反則亢是以君子不居焉進九三之賢升之于上已變而退之三艮為山上動之三成坤艮山變坤為平地陸也自下進上漸也上反三亦曰漸者進退相為用無退則無進之漸一進一退其動不窮矣離巽飛類也剛羽翰也柔其毛也九三之上成巽羽剛爻也所貴乎君子者謂其進退不失其時上九進退有序不失其時可用為儀也三隂爻羣也上九變而正退處而順不亂羣也亦可用為儀吉兊下震上歸妹征凶無攸利彖曰歸妹天地之大義也天地不交而萬物不興歸妹人之終始也說以動所歸妹也征凶位不當也無攸利柔乘剛也諸卦先釋卦名此彖先言天地之大義人之終始者明夫婦之道原於天地重人倫之本也歸妹自泰來三之四為震四之三為兊天地相交而成坎離坎離者天地之用也天地以坎離交隂陽隂陽之義配日月乾天也乾納甲壬坤地也坤納乙癸離日也坎月也故觀月知日觀日月而知天地以一月論之日遲月速東西相望震兊也月至于晦則自東而北乃與日㑹東乙也北癸也消乙入癸會于乾壬壬癸北方氣之所歸十有二會萬物畢昌而月復見于震兊矣故曰歸妹者天地之大義也天地不交則萬物不興天地交而後有震震者天地之始交萬物興之時也夫坤終乙癸則乾始震庚終者乾終於坤也前者以是終也始者坤終而乾始也後者以是始也夫婦始終之際也父命子而醮之代父之道終之也壻受女於主人人道之始始之也終始相續化生無窮是乃月晦生自震而兊之象故曰夫婦者人之終始也此以三四相易言歸妹之義也九三六四正也三四相易而天地各得其宜義也故曰天地之大義也諸儒以爻位不當謂所歸之妹為姪娣誤也爻變矣乃有姪娣之象古者男三十而娶女二十而嫁故所歸以妹言之妹少女也男說女以動者以其所歸者妹也說少女者人之情慕少女也乾上交坤坤下交乾震兊相交以說而動與咸同意故曰說以動所歸妹也言歸則兊女在內從震夫之外矣此合兩體而言歸妹之義也婚姻之禮隂陽交際天地之大義也故三四皆不當位退而各復其所乃吉六之四九之三征也征而不已必凶古者昏禮冕而親迎壻御婦車男下女也壻乘其車待於門外女從男也男下女則天地之義明女從男則天地之位定是以位雖不當而無征凶斯道之並行所以不偏廢歟若以說而動所履不正其凶必矣氓是也故曰征凶位不當也六三六五柔也九二九四剛也以柔乘剛則其柔日長剛為柔所乘則其剛日消夫弱婦强不能正室必至於夫妻反目其道不可以推行矣三不利於內四不利於外故曰無攸利此以中爻言說以動之戒也在卦氣為霜降故太𤣥凖之以內象曰澤上有雷歸妹君子以永終知敝震雷也為東方兊澤也為西方天運八月東方如西方澤上有雷也為男下女之象二月西方如東方澤中有雷也為女從男之象始於下女終於從男天地之正未始有敝也故嫁娶者法之然人之於夫婦不能如震兊相從久而不息者何哉不能正其初也說少而動衰則弃之其能永終乎君子知其然必謹於夫婦之際下之者有義率之者有禮而其初正其初正則其末必正故永終而無敝歸妹初九上六之義也坎離合為知知敝者其唯君子乎初九歸妹以娣跛能履征吉象曰歸妹以娣以恆也跛能履吉相承也三兊者震所歸之妹也初在三後無應三以巽下之初九自卑而進說以從之歸妹以娣也三下初成巽初九應震有雷風相與之象恆也嫡巽而娣說動故能歸妹以娣如有嫡不以其媵備數豈能以娣哉初九正進之從三又正能恆者也故曰歸妹以娣以恆也震為足兊折其左跛也跛者不足以行而從三則有應可行跛能履也跛能履故征吉征以正行也正則吉所以吉者以從三而承四四震夫道也三成四初又從三相與以承內事相承也是以吉九二眇能視利幽人之貞象曰利幽人之貞未變常也九二離為目兊毁其右眇也眇者不足以明然二有應之五能視也女待男而行六五未下二二以剛中自持處內而不動不足以明也有眇之象初動而二不動在坎中坎為隱伏二貞於五處內而說為幽人幽人者女在窈窕幽間之中五下之則二行復成兊女自若也故利幽人之貞利幽人之貞者五下之而後兊變坤為常此爻無娣象此以女子守常為義六三歸妹以須反歸以娣象曰歸妹以須未當也初至五體需需須也須待也初從三得應二與五應三獨無應須也天官書須女四星賤妾之稱織女三星天女也陸震曰天文織女貴須女賤則須為賤女可知蓋二應五已行矣三往無應而猶須之女之强顔而不見售者也故曰歸妹以須夫女之可貴者為其正也順也動以理也六三居不當位德不正也柔而上剛行不順也為說之主以說而歸動非理也上無應無受之者也如是其賤矣故曰未當也易傳曰未當者言其處其德其求歸之理皆未當故無取之反歸以娣何也女謂嫁曰歸自內之外也三本泰之四爻三無所適反歸於四則得正其應在初初正也娣之位也諸娣從婦同行者也故應初乃有以娣之意魯春姜之女三往三逐春姜召其女留之三年乃復嫁之卒知為人婦之道春姜知反歸以娣之義也六四既曰所歸之妹又曰須何也自變卦言泰四之三成兊兊者震所歸之妹也自爻位言之二往歸五矣三無所歸須也故曰曲而當九四歸妹愆期遲歸有時象曰愆期之志有待而行也離為中女九四居上體女貴髙之象九剛明而守柔靜女之賢者也六五歸妹九二往從之而九四不行成兊兊正秋是以愆期女歸以仲春為期秋不行愆期也四本泰之九三六四以坎男下之而後三之四成震女以外為歸震仲春也遲歸以時也觀九四待坎男下之得仲春而後行則愆期之志有待而行也六五帝乙歸妹其君之袂不如其娣之袂良月幾望吉象曰帝乙歸妹不如其娣之袂良也其位在中以貴行也女以外為歸五君位九二兊女歸五乾天為帝兊少女自長男觀之為妹帝乙歸妹也歸妹自泰變故六五同象子夏曰湯之嫁妹也五坤居君位嫡夫人小君位也袂衣袖手飾也所以為禮容二乾為衣離為文章二之五離毁變坎成兊坎為水兊有伏艮為手小君之袂無文而加浣濯之象初九娣之位乾兊伏艮為衣袂而初九不動君之袂不如其娣之袂良也為小君如是善矣良至善也乾美為良貴女之歸惟以謙降從禮為尊髙之德不以容飾為說故曰帝乙歸妹不如其娣之袂良也九二下也何以為帝女之象以其所歸之位在五而二以貴行也五位在中二亦中也貴者陽也古者王姬嫁於諸侯車服不繫其夫下王后一等以貴行也不謙降從禮則亢而失中不稱其位矣譬之天道月幾望矣其可盈乎坎月在震東離日在兊西日月相望隂之盈也二之五坎離象毁月幾望也月幾望而不盈則不亢其夫故吉不然凶之道也夫消長之理陽消則隂生故日下而月西見隂盛則敵陽故既望則月東出婦道巳盛聖人於此深慮之後世猶有以列侯奉事舅姑通問盈滿之禍可勝言哉上六女承筐無實士刲羊無血無攸利象曰上六無實承虛筐也震為竹上六坤動為方竹器而方筐也六三兊女之上隂虛無實承虛筐也三兊為羊四坎為血上動之三坎毁兊見兊為刑殺士刲羊無血也祭祀之禮主人割牲而主婦佐之房中牲體在俎乃設兩鉶而芼之女承虛筐者以士刲羊無血無以為筐之實也故史蘇曰士刲羊亦無􅎺也女承筐亦無貺也無血則無以貺女矣何以奉祭祀哉震兊夫婦也而曰士女言夫婦之道不成也女不得其所承矣退而歸三三亦失位無攸利也上六女歸而無終者也故其象如此子夏傳曰血謂四士刲羊三而無血是則自子夏以來傳易者以互體言矣漢上易傳卷五
