body:
  text: 漢上易傳卷八宋朱震撰繫辭下傳八卦成列象在其中矣因而重之爻在其中矣剛柔相推變在其中矣繫辭焉而命之動在其中矣吉凶悔吝者生乎動者也剛柔者立本者也變通者趣時者也吉凶者貞勝者也天地之道貞觀者也日月之道貞明者也天下之動貞夫一者也夫乾確然示人易矣夫坤隤然示人簡矣爻也者效此者也象也者像此者也爻象動乎內吉凶見乎外功業見乎變聖人之情見乎辭伏羲始畫八卦八卦成列而乾坤定位震巽一交也坎離艮兌二交也兌以一陽與艮坎以一隂奉離震巽以二相易六十四卦之象在其中矣三畫天地人也伏羲因而重之六位成章兼三才而兩之則三百八十四爻在其中矣歸藏初經八卦六爻則知因而重之者伏羲也姚信曰連山氏得河圗夏人因之曰連山歸藏氏得河圗商人因之曰歸藏伏羲氏得河圗周人因之曰周易連山神農氏也歸藏黃帝氏也其經卦皆八本伏羲也其别卦皆六十有四因八卦也六爻剛柔互相推蕩六十四卦之變在其中矣鄭康成曰虙羲作十言之教曰乾坤震巽坎離艮兌消息無文字謂之易乃知周易繫辭於卦下者文王也文王繫辭指其象而命之以名則周公之爻辭所以鼓天下之動者在其中矣彖辭曰吉凶而巳吉凶悔吝者爻辭也是亦生乎卦之動也爻動靜當則吉當靜而動當動而靜則凶悔吝矣言吉凶悔吝生乎動者主動爻言之也自神農氏而下演為三易贊為十翼非聖人能為是也引而伸之不外是也爻有剛柔不有兩則一不立所以立本也剛柔相變通其變以盡利者趣時也趣時者時中也故曰乾坤毁則無以見易矣剛柔相錯有當有否則吉凶生又曰吉凶者貞勝也何謂邪此於動中明乎不動者也韓康伯謂不纍乎吉凶是已張載曰有義命當吉當凶當否當亨者聖人不使避凶趨吉一以貞勝而不顧如大人否亨有隕自天過涉滅頂凶無咎損益龜不克違及其命亂也之類天地之道有升降然上下之觀不動也故曰天地之道貞觀也日月之道有往來然晝夜之明不動也故曰日月之道貞明也天下之動吉凶之變多矣而君子安其義命一以貞勝吉凶不能動何纍之有故曰天下之動貞夫一也一者貞也貞所以一天下之動此彖辭爻辭所以貴夫貞也吉凶以貞勝故能立天下之本趨天下之時八卦本乾坤者也夫乾陽至剛確然不易示人為君為父為夫之道不亦易乎夫坤隂至柔隤然而順示人為子為臣為婦之道不亦簡乎乾剛坤柔以立本者也爻也者效乾坤之動者也天道下濟地道上行剛柔相推變通以趣時者也象者像乾坤之象者也爻有變動象亦像之爻象動乎內者有當有否則人事之見於外者有吉有凶人與乾坤一也吉凶之變有術通之凶者反之吉則功業不期於見而見矣觀此則乾坤示人足矣聖人必以彖言乎象爻言乎變繫辭以言吉凶者聖人之情愛人無巳也恐其陷於凶咎是以指其所之故考乎其辭則聖人之情見矣天地之大德曰生聖人之大寶曰位何以守位曰仁何以聚人曰財理財正辭禁民為非曰義古者包犧氏之王天下也仰則觀象於天俯則觀法於地觀鳥獸之文與地之宜近取諸身逺取諸物於是始作八卦以通神明之德以類萬物之情作結繩而為網罟以佃以漁蓋取諸離包犧氏沒神農氏作斫木為耜揉木為耒耒耨之利以教天下蓋取諸益日中為市致天下之民聚天下之貨交易而退各得其所蓋取諸噬嗑神農氏沒黃帝堯舜氏作通其變使民不倦神而化之使民宜之易窮則變變則通通則久是以自天祐之吉無不利黃帝堯舜垂衣裳而天下治蓋取諸乾坤刳木為舟剡木為楫舟楫之利以濟不通致逺以利天下蓋取諸渙服牛乘馬引重致逺以利天下蓋取諸隨重門擊柝以待暴客蓋取諸豫斷木為杵掘地為臼臼杵之利萬民以濟蓋取諸小過弦木為弧剡木為矢弧矢之利以威天下蓋取諸睽上古穴居而野處後世聖人易之以宫室上棟下宇以待風雨蓋取諸大壯古之葬者厚衣之以薪葬之中野不封不樹喪期無數後世聖人易之以棺槨蓋取諸大過上古結繩而治後世聖人易之以書契百官以治萬民以察蓋取諸夬是故易者象也象也者像也彖者材也爻也者效天下之動者也是故吉凶生而悔吝著也胡旦分天地之大德曰生為一章陽卦多隂為一章考之文義當從旦龔原本亦然乾大生也坤廣生也乾坤合而成德生物而巳故曰天地之大德曰生聖人之情見乎辭者亦天地之德也聖人成位乎兩間有其德無其位不能兼善天下於其位也慎之重之在卦則尊位也故曰聖人之大寶曰位天地之大德曰生者仁也聖人成位乎兩間者仁而巳矣不仁不足以參天地聖人者聰明睿知神武而不殺不殺者好生也故曰何以守位曰仁仁被萬物取財於天地則財不可勝用其民養生喪死無憾可以保四海守宗廟社稷故曰何以聚人曰財理財者節之以制度也節之類是也正辭者正邪說也六辭是也禁民為非者禁其非歸之於是也如是乃得其宜故曰義義所以為仁非二本也故曰立人之道仁與義莫非義也義至於禁民為非盡矣自此以下明備物致用立成器以為天下利者無非有取於易皆仁也曰王天下者明守位也所謂崇髙莫大乎富貴也鳥獸之文即天文太𤣥曰察龍虎之文觀鳥龜之理舉鳥獸則龜見矣仰觀龍虎鳥龜之文其形成於地俯觀山川原隰之宜其象見於天凡在地者皆法天者也近取諸身則八卦具於百骸而身無非物逺取諸物則八卦具於萬物而物無非我故神明之德雖異而可通萬物之情雖衆而可類其道至於一以貫之此包犧氏所以作易一者何仁也上古茹毛飲血故教之以佃漁蓋取諸重離巽繩離目網目謂之罟兩目相連結繩為之罔罟也離為雉佃也兌巽為魚漁也觀此則伏羲畫八卦因而重之明矣神農氏時民厭鮮食而食草木之實聖人因是以達其不忍之心故教以耒耜之利蓋取諸益益否乾之初也乾金斫巽木斫木也四之三成坎坎為揉之初成震揉木也入坤土而巽於前斫木為耜也動於後揉木為耒也耒耜之利其益無方矣是時民甘其食美其服至死不相往來故教之以交易蓋取諸噬嗑噬嗑否五之初也離日在上為日中坤衆在下為市衆為民離有伏兌為螺貝坤往之乾致天下之民聚天下之貨也以坤交乾交易也乾五退初而得位各得其所也佃漁不言利於耒耜言利佃漁非聖人本心也佃有猛虎之害漁有蛟龍之害不若耒耜之利為市不言利者聚天下之貨利在其中矣唐虞氏時洪水之患庶民鮮食然後教民稼穡懋遷有無化居其道萬世一揆神農氏沒民情巳厭黃帝堯舜作因其可變變而通之使民日用其道而不倦而又微妙入神化而無迹天下各得其宜蓋易道陽極變隂隂極變陽變則不窮不窮則可久而不息善乎變通以趨時也是以自天祐之吉無不利聖人先後天故也神農氏時與民並耕而食饔飱而治至是尊卑定位君逸臣勞乾坤無為六子自用垂衣裳而天下治蓋取諸乾坤乾在上為衣坤在下為裳上古山無蹊澤無梁至是舟楫之利以濟不通蓋取諸渙渙否四之二也乾金刳巽木浮於坎上刳木為舟也離火上鋭剡木為楫也否塞者渙散濟不通也上古牛未穿馬未絡至是服牛乘馬引重致逺以利天下蓋取諸隨隨否上九之初也坤牛而震足驅之服牛也震作足馬而巽股據之乘馬也坤輿震輹上六引之引重也內卦近外卦逺上六在外卦之外致逺也牛馬隨人而動否不通也上之初濟不通也上古外户不閉禦風氣而巳至是重門擊柝以待暴客蓋取諸豫豫謙之反也謙艮為門九三之四又為門重門也艮為手坎為堅木震為聲手擊堅木而有聲擊柝也坤為闔户而坎盜逼之暴客也知耒耜而不知杵臼之利則利天下者有未盡故教之以杵臼之利蓋取諸小過小過明夷初之四也兌金斷巽木斷木為杵也巽木入坤土掘地為臼也坎陷也臼之象杵動於上臼止於下四應初三應上上下相應杵臼之利也坎變巽股萬民濟也知門柝而不知弧矢之利則威天下者有未盡故教之以弧矢之利蓋取諸睽睽家人反也家人巽為木巽離為絲坎為弓弦木為弓也兌金剡木而鋭之剡木為矢也兌決乾剛威天下也聖人以百姓之心為心民之所欲不以强去民之所惡不以强留然變而通之者亦因其典禮以損益之而巳且上古穴居而野處後世聖人易之以宫室自黃帝而來夏后氏之世室商人之重屋周人之明堂宫室之制有不同而上棟下宇以待風雨取諸大壯者同也大壯自遁來三復三變也一變中孚艮為居兌為口穴之象穴居也再變大畜乾在上天際也野之象巽入變艮而止野處也三變大壯震木在上棟也乾天在下宇也巽風隱兌澤流待風雨也大壯則不撓矣古之葬者厚衣之以薪葬之中野不封不樹喪期無數後世聖人易之以棺槨自堯舜以來有虞氏之瓦棺夏后氏之堲周商人之梓棺槨之制有不同而取諸大過者同也大過自遁四變一變訟乾見坤隱不封也再變巽木而兌金毁之不樹也三變鼎離為目兌澤流喪也上九變而應三坎兌為節不變喪期無數也木在澤下中有乾人棺槨也葬則棺周於身槨周於棺土周於槨大過也上古結繩而治後世聖人易之以書契象形㑹意轉注處事假借諧聲書契之制有不同而百官以治萬民以察取諸夬者同也夬自姤五變一變同人二變履三變小畜四變大有姤巽為繩結繩也巽變成離坤離為文書也兌金刻木契也乾為君坤為臣民坤居二四上百官以治也離明上達萬民以察也以是决天下疑者夬也以是推之後世畋獵捕魚之器雖不同而取於離則同也井牧溝洫之事雖不同而取於益則同也朝市夕市雖不同而取於噬嗑則同也餘卦可以類推矣蓋動於人情見於風氣有是時必有是象易者象也易之有象擬諸其形容而已猶繪畫之事雕刻之工一毫損益則不相似矣象之辭又謂之彖者言乎其才也卦有剛柔才也有是時有是象必有是才以濟之才與時㑹斯足以成務矣然天下之動其微難知有同是一時同處一事所當之位有不同焉則趨舍進退殊途矣故曰爻者效天下之動也是以卦同爻異趣時之變不得而同然所歸則若合符節故自伏羲神農黃帝堯舜凡六萬一千四百有餘歲而行十三卦而巳夫爻動則有吉凶悔吝吉凶者所以生大業也吉凶生而悔吝著其動可不慎乎陽卦多隂隂卦多陽其故何也陽卦竒隂卦耦其德行何也陽一君而二民君子之道也隂二君而一民小人之道也易曰憧憧往來朋從爾思子曰天下何思何慮天下同歸而殊塗一致而百慮天下何思何慮日往則月來月往則日來日月相推而明生焉寒往則暑來暑往則寒來寒暑相推而歲成焉往者屈也來者信也屈信相感而利生焉尺蠖之屈以求信也龍蛇之蟄以存身也精義入神以致用也利用安身以崇德也過此以往未之或知也窮神知化德之盛也易曰因于石據于蒺藜入于其宫不見其妻凶子曰非所困而困焉名必辱非所據而據焉身必危既辱且危死期將至妻其可得見邪易曰公用射隼于髙墉之上獲之無不利子曰隼者禽也弓矢者器也射之者人也君子藏器於身待時而動何不利之有動而不括是以出而有獲語成器而動者也子曰小人不恥不仁不畏不義不見利不勸不威不懲小懲而大誡此小人之福也易曰屨校滅趾無咎此之謂也善不積不足以成名惡不積不足以滅身小人以小善為無益而弗為也以小惡為無傷而弗去也故惡積而不可掩罪大而不可解易曰何校滅耳凶子曰危者安其位者也亡者保其存者也亂者有其治者也是故君子安而不忘危存而不忘亡治而不忘亂是以身安而國家可保也易曰其亡其亡繫于苞桑子曰德薄而位尊知小而謀大力小而任重鮮不及矣易曰鼎折足覆公餗其形渥凶言不勝其任也子曰知幾其神乎君子上交不諂下交不瀆其知幾乎幾者動之微吉之先見者也君子見幾而作不俟終日易曰介于石不終日貞吉介如石焉寧用終日斷可識矣君子知微知彰知柔知剛萬夫之望子曰顔氏之子其殆庶幾乎有不善未嘗不知知之未嘗復行也易曰不逺復無祗悔元吉天地絪緼萬物化醇男女構精萬物化生易曰三人行則損一人一人行則得其友言致一也子曰君子安其身而後動易其心而後語定其交而後求君子修此三者故全也危以動則民不與也懼以語則民不應也無交而求則民不與也莫之與則傷之者至矣易曰莫益之或擊之立心勿恆凶凡得乎乾者為陽卦震坎艮是也凡得乎坤者為隂卦巽離兌是也陽卦以竒為本故多隂隂卦以耦為本故多陽本不可二也隂陽二卦其德行不同何也陽一君而遍體二民二民共事一君一也故為君子之道隂卦一民共事二君二君共爭一民二也故為小人之道陽貴隂賤晝人多福夜人多禍故君子貴夫一也咸九四曰憧憧往來朋從爾思者勞神明以為一也夫思之所及朋則從之思之所不及其誰從乎雖憧憧於往來之間其從亦狹矣不知天下何思何慮萬物即一一即萬物同歸而有殊塗一致而具百慮其一既通萬物自應豈思慮營營之所至哉且日月寒暑一往一來自異者觀之兩也相推而生明相推而成歲自同者觀之一也自往自來其誰使之往者屈也來者信也一屈一信默然相感而利生焉尺蠖不屈則不能信龍蛇不蟄則不能存消息循環相待而為用夫致用在於精義義則無決擇無取舍唯其宜而巳精一於義則進而入於不可知之神故感而後動其動也天其用利矣遊乎人間物莫之傷其身安矣利用安身日進無疆德不期於崇而自崇矣此吾之所知也過此以往則化矣如日月有明容光必照寒暑相代萬物自生日月寒暑所不能知也故曰聖人有所不知焉聖人有所不能焉然則所謂化者終不可知歟曰窮神之所為則知化矣德盛者自至焉道至於此萬物與我一也故曰一則神兩則化窮神則知變化之道人孰不欲安其身或困于石而不知休據于蒺藜而不知避名既汚辱身既危殆日近於死亡雖欲安得乎哉妻且不得見也況朋從乎藏可用之器待可為之時動無結閡出則有獲唯乘屈信之理而其用利者能之小人不恥不仁故不畏不義陷於死亡辱及其先恥孰大焉雖愚也而就利避害與人同故見利而後勸威之而後懲小懲大誡猶為小人之福況真知義乎精於義者豈一日積哉彼積不善以滅其身者不知小善者大善之積也夫身者國家之本存亡治亂之所繫身雖安矣猶不可恃也故安其位者危保其存者亡有其治者亂君子兢兢業業不恃其有故身安而國家可保國家保而德崇矣位欲當德謀欲量知任欲稱力三者各當其實則用利而身安小人志在於得而巳以人之國僥幸萬一鮮不及禍自古一敗塗地殺身不足以塞其責者本於不知義而巳神難言也精義入神以致用其唯知幾乎知幾其神矣幾者動之微吉之先見警如陽生而井溫雨降而雲出衆人不識而君子見之其於行義也不亦有餘裕乎夫安危存亡之幾在於始交之際君子上交不諂下交不瀆義之與比無悔吝藏於其中知幾故也是以君子見微已去小人遇禍不知見與不見相去逺矣進此道者存乎介而巳確然守正不轉如石者乃能見之其心定其智則默識而善斷故不俟終日也守身如此無一朝之患矣知彰易知微難知剛易知柔而剛難君子見幾故知微知彰知柔知剛一龍一蛇或弛或張唯義是適則萬夫望之而取法焉所從者豈特其朋從之彼勞思慮者亦末矣夫智周萬物者或暗於自知雄入九軍者或憚於改過克己為難也顔子有不善未嘗不知知之未嘗復行故曰顔氏之子其殆庶幾乎孰謂小善為無益而可以弗為小惡為無傷而可以弗去乎復者剛反動之卦也善者天地之性而人得之性之本也不善非性也習也不逺而復者修為之功也故曰不善未嘗弗知知之未嘗復行知之者覺也自性也或曰鮒椒之惡豈習乎曰知修為之功則復其本矣由其習之不巳迷而不復矣人之生有氣之質有性之本剛柔不齊者氣也性之本則一而已矣故曰天地貞觀也日月貞明也氣豈能變哉天地萬物其本一也天地升降其氣絪緼萬物化矣醇而未雜序卦曰有天地然後有萬物劉牧曰乾道自然而成男坤道自然而成女序卦言萬物則男女在其中矣曰萬物化醇者言其一未始離也天地既生萬物萬物各有隂陽精氣相交化生無窮序卦曰有萬物然後有男女劉牧曰咸卦不繫之於離坎以離坎而上男女自然而生咸卦而下男女偶合而生曰男女曰化生者言有兩則有一也損之六三曰三人行則損一人一人行則得其友言致一也致一則殊塗而同歸一致而百慮矣老氏論天地王侯得一又曰天地相合而降甘露老氏之所謂得一相合即夫子所謂致一也其在卦則六爻相應合而致用是也所謂全者合我與人而為一也動而與之者安其身而後動也語之而應者平其心而後慮也求而與之者定其交而後求也三者得故能以天下為一家中國為一人故曰君子修此三者故全也離而為二物物成敵莫或與之擊之者至矣故曰立心勿恆凶勿恆者不一之謂也張載曰下文當云易曰自天祐之吉無不利子曰天之所助者順也人之所助者信也履信思乎順又以尚賢也是以自天祐之吉無不利也考之義或然也順乎天者天助之應乎人者人助之致一之效乎此章以咸困解噬嗑否鼎復損恆九卦十爻盡其意蓋書之於言有不能盡也子曰乾坤其易之門邪乾陽物也坤隂物也隂陽合德而剛柔有體以體天地之撰以通神明之德其稱名也雜而不越於稽其類其衰世之意邪夫易彰往而察來而微顯闡幽開而當名辨物正言斷辭則備矣其稱名也小其取類也大其㫖逺其辭文其言曲而中其事肆而隱因二以濟民行以明失得之報乾坤其易之門邪乾坤毁則易無自而入矣乾剛者陽之物老陽之䇿也其德則健坤柔者隂之物老隂之䇿也其德則順隂陽氣也剛柔形也氣變而有形形具而有體是故總䇿成爻健順合德而剛柔之體見矣聖人以此體天地之撰體形容之也撰定也形容天地之所定者體造物也即剛柔有體是已天神也地明也通神明之德者示幽顯一源也即隂陽合德是巳隂陽相蕩剛柔相推自乾坤而變八卦自八卦而變六十四卦三百八十四爻其稱名也雜然不齊枝葉至扶疏矣而亦不越乎隂陽二端而已乾坤其易之門邪伏羲始畫八卦文王監于二代而作周易周公因于文王而作爻辭卦有象爻有變動繫辭焉而命之日益詳矣蓋時有隆汙道有升降世既下衰不如是不足以盡天下之情僞何以知其然哉於此稽考其類則知之矣夫易之為書以八卦言之自震至乾彰往也自巽至坤察來也一往一來周旋無窮是謂環中以重卦言之前卦為往後卦為來自內之外為往自外之內為來彰往故微顯察來故闡幽顯莫如既往而有微而難知之理幽莫如方來而有顯而易見之象開釋爻卦各當其名無隱也辨隂陽之物正吉凶之辭無遺也斷之以卦辭爻辭則備矣觀乎此宜若坦然明白使人易曉矣然而其稱名也小則百物不廢其取類也大則達之于天下意有餘故其㫖逺物相雜故其辭文其言致曲而後中於道其事閎肆而實本於隱非天下至神至精至變有不能與也而又因其疑二不決恐懼易入之時以濟民行告之以吉凶悔吝之辭以明失得之必報蓋有逺害防患之心非衰世之意乎易之興也其於中古乎作易者其有憂患乎是故履德之基也謙德之柄也復德之本也恆德之固也損德之修也益德之裕也困德之辨也井德之地也巽德之制也履和而至謙尊而光復小而辨於物恆雜而不厭損先難而後易益長裕而不設困窮而通井居其所而遷巽稱而隱履以和行謙以制禮復以自知恆以一德損以逺害益以興利困以寡怨井以辨義巽以行權作易者上古也興易者中古也何以知易興於中古邪觀九卦之象聖人有憂患後世之心得失滋彰矣然則上古作易何以知有憂患乎曰聖人隨時者也佃漁不厭則耒耜之利不興結繩未弊則書契之文不作而所以憂患後世者固巳具於八卦之中至於文王而易道興矣履說而應乎乾履乎和者也故為德之基謙執之而有終者也故為德之柄復剛反動而復其初德自此始者也故為德之本恆久而不已終則有始者也故為德之固損損其可損而致一者也故為德之修益益其可益而日進者也故為德之裕困剛見掩而不失其所亨者也故為德之辨井剛中而不變者也故為德之地巽以剛下柔不失乎中者也故為德之制履和而至於禮不至則流而狥於物矣謙卑而人尊之其道光也復小而辨於物者以初九也人之所以異於萬物者以其存心也剝之剛陽反動於初則善心生於冥昧難知之時不俟乎大而後與物辨也斯非德之本歟恆泰之變也初九正也動而之三雷風並作萬物繁興之時三守正不動酬酢而不厭天地所不能旋日月所不能眩可以言德之固矣損先難而後易何也情欲者强陽之氣也初損之必有吝心剛健決斷乃能行之故先難也及其既損考諸理而順反諸心而悅其孰禦我哉故後易也夫一介不以取諸人然後繫千駟之馬而弗視祿之以天下而弗顧故曰仁亦在熟之而巳益長裕而不設何也益否之變也九四下益於初初九正也益物以誠也益物以誠即是自益以誠故四與初以益而正誠自成也受益者不贅益之者不虧與時偕行如天地之裕萬物非張設之也困窮而通何也否之上九陷而之二上下柔掩之窮也處險而說在窮而心亨通也通者不窮之謂豈必富貴利達而後為通哉故曰學不能行謂之病病則窮矣井居其所而遷何也泰初之五為井初九正也九五亦正也初遷之五往者正也五遷之初來者正也五居其所而往來皆正能遷也巽稱而隱何也遁二之四為巽稱者輕重均之謂也二隂方進六二從四九四君子屈已以下之則君子小人勢均矣人見其屈已以為巽而不知六二亦巽乎剛故曰稱而隱履以和行何也和者禮之用節者禮之體節而不和禮不行矣謙以制禮何也禮自卑而尊人自後而先人不能乎謙安能行禮復以自知何也有善必自知之不善必自知之修其善去其不善則復矣恆以一德何也雜而不厭非徇物也久而不變也久則其德無二三矣損以逺害何也自損以修德則物無害之者故曰恭寡過情可信儉易容也以此失之者鮮矣益以興利何也因其所利而利之也困以寡怨何也雖困而通在窮而悅樂天者也我不尤人人復何怨井以辨義何也井自守以正與人必以正處已處人各得其宜者也巽以行權何也權者稱之所以輕重也與時推移湣然無際如行權稱物人見其適平而巳其序則履和執謙復本恆久損已益人然後可以處困不窮能遷然後可以行權九卦履出于乾謙復出于坤恆出于震損出于艮益出于巽困井出于坎獨不取離何也離萬物皆相見之卦包犧氏取之文王內文明外柔順以蒙大難明在地中時也易之為書也不可逺為道也屢遷變動不居周流六虛上下無常剛柔相易不可為典要唯變所適其出入以度外內使知懼又明於憂患與故無有師保如臨父母初率其辭而揆其方既有典常苟非其人道不虛行龔原曰易之為書也三章當從龔此章言易有變動出入易之為書明天地之用其用不過乎六爻不可逺也逺此而求之則違道逺矣其道也屢遷有變有動不居其所升降往來循環流轉於六位之中位謂之虛者虛其位以待變動也故太𤣥九位亦曰九虛或自上而降或自下而升上下無常也剛來則柔往柔來則剛往剛柔相易也無常則不可為典相易則不可為要流行散徙唯變所適然亦不過乎六爻不過者以不可逺也其出入云者以一卦內外言之兩體也出者自內之外往也入者自外之內來也以是度外內之際而觀消息盈虛之變出處進退之理使知戒懼當出而入與當入而出其患一也故大觀在上窺觀者醜三陽方壯牽羊悔亡出入內外本於相形比四從二亦曰外離五用九亦曰出唯精於義者能知之知義則知懼矣又此書明於已之所當憂患與所以致憂患之故安不忘危存不忘亡治不忘亂無有師保教訓而嚴憚之明失得之報也如有父母親臨而愛敬之見聖人之情也初率其吉凶之辭揆其八卦之方則既有典常可守矣蓋不可逺者易之體也而有用焉為道也屢遷者易之用也而有體焉能知卦象合一體用同源者乎斯可以言易之書矣書載道者也待人而後行苟非其人道不徒行易之為書也原始要終以為質也六爻相雜唯其時物也其初難知其上易知本末也初辭擬之卒成之終若夫雜物撰德辨是與非則非其中爻不備噫亦要存亡吉凶則居可知矣知者觀其彖辭則思過半矣此章言重卦六爻之義易之為書也原始於初爻要終於上爻成六位以為體質者也八卦八物也六爻六時也六爻相雜時異而物異八卦本象也時物别象也其本甚微故難知其末巳著故易知初辭擬而後言不亦難知乎卒成之其事終矣不亦易知乎上下之位以時言之初終也以道言之本末也以事言之始卒也其實一也時變則事變事變則道與之俱未有違時造事而能成者三畫非無本末也聖人何為重卦曰理具乎中其事則未也若夫糅雜八卦之物撰定六爻之德辨得失是非則非中爻不備中爻崔憬所謂二三四五京房所謂互體是也蓋物無常是亦無常非施於彼者或不可施於此用於古者或不可行於今蒙以九二納婦而六三取女則不利節以初九不出而九二不出則失時得失是非不可不辨也噫重卦六爻之意亦要諸吉凶存亡之辭而巳有同位而異物同物而異象同象而異辭要諸辭則四者不同居然易見可指掌而知矣六爻者變動相錯而有吉凶存亡者也彖辭者合內外二體以一爻相變而有者也知者明於理則觀諸彖辭而爻義巳知其過半矣二與四同功而異位其善不同二多譽四多懼近也柔之為道不利逺者其要無咎其用柔中也三與五同功而異位三多凶五多功貴賤之等也其柔危其剛勝邪龔氏合易之為書也為一章誤矣今從故本此章再明中爻之義二四耦也同為隂之功內外異位有不同焉二多譽四多懼何也四近五五尊位近尊位則多懼月望日則食禮近君則屈然柔之為道不利逺者坤從乾也二逺於五所以多譽者其要在於雖柔而無咎以其用柔中也用柔而失中其能無咎乎三五竒也同為陽之功內外異位有不同焉三多凶五多功何也五貴三賤其等不同也三處下位之極其柔居之則危不勝任矣其剛居之將以為勝邪以剛居剛有時乎過剛矣危則疾顛過則易敗此三所以多凶也若五不然以剛居之得尊位大中宜處貴者也以柔居之有處謙執柔以貴下賤之美二為五用矣此五所以多功也夫二五中也二三四五皆曰中爻何也曰以三數之自一至三以二為中自四至上以五為中以五數之自二至上以四為中以四數之自二至五以三四為中復之九四曰中行獨復中孚以二柔在內名卦卦言德爻言善者積善成德也易之為書也廣大悉備有天道焉有人道焉有地道焉兼三才而兩之故六六者非它也三才之道也道有變動故曰爻爻有等故曰物物相雜故曰文文不當故吉凶生焉易之興也其當殷之末世周之盛德邪當文王與紂之事邪是故其辭危危者使平易者使傾其道甚大百物不廢懼以始終其要無咎此之謂易之道也此章再明六爻雜物之義易之為書廣大而無外語天地之間則無乎不備矣有天道焉隂與陽也有人道焉仁與義也有地道焉柔與剛也此三者一物而兩體隂陽也而謂之天仁義也而謂之人剛柔也而謂之地故曰三才兼三才而兩之故六兼之者天之道兼隂與陽也人之道兼仁與義也地之道兼柔與剛也六者非它即三才之道也是故三畫而有重卦六即三也三即一也道有變易有流動爻則效之故曰爻天地相函精氣所聚其等有六曰物八物相錯而成文故曰文文當其位則吉文不當其位則凶故吉凶生焉易之興也當殷之末世周之盛德邪何繫之辭而告其吉凶者如是乎又紂與文王之事邪何君子處小人之間而其辭危乎是故危懼者使知可平慢易者使知必傾所以長君子消小人也其道甚大君子小人無所不容不容則不足以準天地百物不廢者所以形容其道所謂悉備也初辭擬之卒成之終使知善不善之積成名滅身非一朝夕之漸故原始要終而懼焉其大要歸之無咎而巳此之謂易之道易之道立人道以貫天地而為一者也夫乾天下之至健也德行恆易以知險夫坤天下之至順也德行恆簡以知阻能說諸心能研諸侯之慮定天下之吉凶成天下之亹亹者是故變化云為吉事有祥象事知器占事知來天地設位聖人成能人謀鬼謀百姓與能八卦以象告爻彖以情言剛柔雜居而吉凶可見矣變動以利言吉凶以情遷是故愛惡相攻而吉凶生逺近相取而悔吝生情僞相感而利害生凡易之情近而不相得則凶或害之悔且吝將叛者其辭慙中心疑者其辭枝吉人之辭寡躁人之辭多誣善之人其辭游失其守者其辭屈此章論六爻而歸之於簡易乾健而為萬物先莫或禦之故其德行恆易坤順以從乾無二適也故其德行恆簡以易也故知險之為難以簡也故知阻之可疑簡生於易阻生於險簡易也故能說諸心知險阻也故能研諸慮簡易者我心之所固有反而得之能無說乎以我所有慮其不然反復不捨能無研乎曰研諸侯之慮者衍侯之二字王弼略例曰能研諸慮則衍文可知天下之吉凶藏於無形至難定也天下之亹亹來而不已至難成也定之成之者簡易而巳乾坤變化有云有為云者言也為者動也吉事有祥祥者吉之先見有祥必先知之兼言動也制器者尚象知器則知成器之為天下利而可動也卜筮者尚占知來則知來物而言動審矣是以能定天下之吉凶成天下之亹亹非知險知阻者能之乎天尊地卑乾坤設位聖人配天地而立合乾坤之德以成能事能說諸心能研諸慮者明以盡人謀也定天下之吉凶成天下之亹亹者幽以盡鬼謀也人謀鬼謀幽顯合一天下樂推而不厭百姓之愚與之以能矣成能故也伏羲氏始畫八卦不言而告之以象者至簡易也後世聖人演之為六十四卦有爻有彖以人情變動言之於辭知險阻也且八卦成列剛柔雜居吉凶已可見矣然道有變動變則通通則其用不窮所以盡利者不可不言也故變動以利言吉凶以情而遷巧厯之所不能計也聖人唯恐遷之而失其正矣故爻彖以情言變動者何情僞之所為也人之情僞難知矣以情相感則利生以僞相感則害生近不必取逺不必捨則悔吝生愛惡不一起而相攻則吉凶生吉凶生而悔吝著情僞其能掩乎是則情僞相感也逺近相取也愛惡相攻也爻有變動也有利害斯有悔吝有悔吝斯有吉凶吉凶以情遷也悔吝者何凡易之情隂陽相求內外相應近而不相得則僞不可久物或害之害之則凶將至矣悔吝者利害吉凶之界乎害之而悔則吉且利矣吝而不悔則凶聖人不得不以利言之而使之逺害也故曰聖人之情見乎辭然則何以知情僞邪考其辭可矣將叛者其心慙負故其辭愧中心疑者其心惑亂故其辭枝吉人守約故其辭寡躁人欲速故其辭多誣善之人妄故其辭游失其守者窮故其辭屈吉人辭寡以簡易知也五者反是以知險知阻而知也簡易則吉險阻則凶其辭則六其别則二情僞而已矣上繫言易簡而天下之理得下繫終之以易簡而知險阻故曰殊塗而同歸一致而百慮漢上易傳卷八
