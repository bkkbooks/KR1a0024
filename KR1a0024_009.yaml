body:
  text: 漢上易傳卷九宋朱震撰說卦傳昔者聖人之作易也幽贊於神明而生蓍參天兩地而倚數觀變於隂陽而立卦發揮於剛柔而生爻和順於道德而理於義窮理盡性以至於命昔者聖人之作易也幽贊於神明而生蓍參天兩地而倚數說䇿數也觀變於隂陽而立卦說揲蓍分卦也發揮於剛柔而生爻說爻有變動也和順於道德而理於義窮理盡性以至於命說所繫爻彖之辭也神明天地也聖人贊天地以立人道於是生蓍之法以起數其用起於一及其究也上下與天地同流而無迹故曰幽贊太𤣥曰昆侖天地而産蓍一者何氣之始也參天者一太極兩儀也兩地者分隂陽剛柔也參天兩地五也五小衍也天地五十有五之數具而河圗洛書大衍之數實倚其中一與五為六二與五為七三與五為八四與五為九九與一為十五十者河圗數也五十有五者洛書數也五十有五即五十數五十即大衍四十有九數倚言數立其中而未動也馬融曰倚立也蓍四十有九總而為一參天也分而為二兩地也掛一者參天也揲之四者兩地也歸竒於扐者兩地而又參天也四者六七八九七者少陽九者老陽八者少隂六者老隂三變成爻十有八變而卦立三變者參天也五變者參天而又兩地也變而上者參變而兩變而下者兩變而參凡八卦之位六十四卦之名皆以隂陽之變定之而不離乎參伍之神王洙曰發越揮散也隂陽有變故九六七八以立卦剛柔有體故發越揮散以生爻變剛生柔變柔生剛四象迭相為用生生而不窮故曰生隂陽氣也剛柔者氣聚而有體也由推行言之謂之道由得於道言之謂之德性者萬物之一源命者剛柔不齊稟於有氣之初者也理者通乎道德性命而一之者也義者道德所施之宜也生蓍倚數立卦生爻凡以為道德而巳聖人繫之以辭和之使不乖順之使不違通天地人而貫之以一理施之各得其宜焉窮易之理則知萬物一源兼體而不偏滯及其至也通極乎一氣之外所不可變者唯生死壽夭爾故順受吉凶之正不回以求福不幸以免禍此作易之本㫖也昔者聖人之作易也將以順性命之理是以立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義兼三才而兩之故易六畫而成卦分隂分陽迭用柔剛故易六位而成章說位畫有六而後有變動也易有太極太虛也隂陽者太虛聚而有氣也柔剛者氣聚而有體也仁義根於太虛見於氣體而動於知覺者也自萬物一源觀之謂之性自稟賦觀之謂之命自通天地人觀之謂之理三者一也聖人將以順性命之理故分一而為三曰隂陽曰柔剛曰仁義以立天地人之道蓋互見也易兼三才而兩之六畫而成卦成卦則三才合而為一知隂陽柔剛仁義同源於太虛則知性知天道曰隂陽地道曰柔剛人道曰仁義則知命知仁義即天之隂陽地之柔剛則知性命之理不順乎性命之理而行之將何所逃於天地之間乎然道有變動故分隂分陽迭用柔剛以位分之一三五陽也二四六隂也以卦分之乾震坎艮陽也坤巽離兌隂也以十日分之甲丙戊庚壬陽也乙丁己辛癸隂也所謂分隂分陽也八卦相蕩五行更生上下無常周流六虛所謂迭用柔剛也分隂陽用柔剛者仁義也以人而用天地也誠知乎此則德勝於氣性命於德氣之昏明不足以蔽之至於盡性而配天地矣太𤣥曰立天之經曰隂與陽形地之緯曰從與橫表人之行曰晦與明準卦之三才六畫也天地定位山澤通氣雷風相薄水火不相射八卦相錯數往者順知來者逆是故易逆數也天地定位乾上坤下也山澤通氣艮兌以三相易也雷風相薄震巽以初相易也日月不相射坎離以中相易也虞翻曰射厭也坎離水火不相厭坎戊離己月三十日一㑹於壬故不相厭也伏羲氏之畫卦也乾坤定上下之位坎離列左右之門震與巽為偶艮與兌相配震離兌乾天之四象也巽坎艮坤地之四象也八卦相錯乾坤相易生六十四卦乾自震而左行坤自巽而右行數往者以順而數知來者以逆而知邵雍曰數往者順順天而行左旋也皆已生之卦也知來者逆逆天而行右行也皆未生之卦也夫易之數由逆而成矣逆者猶逆四時之比蓋聖人將言易故先說易之本易逆數也故六爻自下而起太𤣥曰南北定位東西通氣萬物錯乎其中準八卦也雷以動之風以散之雨以潤之日以烜之艮以止之兌以說之乾以君之坤以藏之帝出乎震齊乎巽相見乎離致役乎坤說言乎兌戰乎乾勞乎坎成言乎艮萬物出乎震震東方也齊乎巽巽東南也齊也者言萬物之潔齊也離也者明也萬物皆相見南方之卦也聖人南面而聽天下嚮明而治蓋取諸此也坤也者地也萬物皆致養焉故曰致役乎坤兌正秋也萬物之所說也故曰說言乎兌戰乎乾乾西北之卦也言隂陽相薄也坎者水也正北方之卦也勞卦也萬物之所歸也故曰勞乎坎艮東北之卦也萬物之所成終而所成始也故曰成言乎艮神也者妙萬物而為言者也動萬物者莫疾乎雷撓萬物者莫疾乎風燥萬物者莫熯乎火說萬物者莫說乎澤潤萬物者莫潤乎水終萬物始萬物者莫盛乎艮故水火相逮雷風不相悖山澤通氣然後能變化既成萬物也陽聚而動動極則散之散則復聚隂積而潤潤極則烜之烜則復潤此雷霆風雨日月寒暑所以屈信相感而成萬物也艮則動者靜而止入于坤也兌則止者說而行出乎乾也乾以君之則萬物覩坤以藏之則天地閉前說乾坤而至六子無形者聚而有形也此說六子而歸乾坤有形者散而入於無形也終始循環不見首尾易之道也此以下言文王之八卦連山首艮歸藏首坤艮震巽離坤兌乾坎連山之序也而易兼用之此太𤣥所以作歟𤣥謂神戰于𤣥龍出于中雷風炫煥與物時行天根還向成氣收精皆準乾坤震巽也鄭康成曰萬物出于震雷發聲以生之也齊於巽相見於離風搖長以齊之潔猶新萬物皆相見日照之使光大萬物皆致養焉地氣含養使有秀實萬物之所說草木皆老猶以澤氣說成之戰言隂陽相薄西北隂也而以乾純陽臨之猶君臣對合也坎勞卦也水性勞而不倦萬物之所歸也萬物自春出生於地冬氣閉藏還皆入地萬物之所成終而所成始言萬物隂氣終陽氣始皆艮之用事坤不言方坤之養物不專此時也兌不言方而言正秋者臣曰兌言正秋秋分也於兌言秋分則震為春分坎為冬至離為夏至乾為立冬艮為立春巽為立夏坤為立秋可知言正秋者正時也離言聖人南面而聽天下嚮明而治則餘卦亦可以類推矣戰乎乾言隂陽相薄而乾勝也上說天地定位六子致用此說六子合而為乾坤乾坤合而生神妙萬物而為言者物物自妙也鄭康成曰共成萬物物不可得而分故合謂之神張載曰一則神兩則化妙萬物者一則神也且動撓燥說潤終始萬物者孰若六子然不能以獨化故必相逮也不相悖也通氣也然後能變化既成萬物合則化化則神康成之學進於是矣乾健也坤順也震動也巽入也坎陷也離麗也艮止也兌說也上說坎兌合以致用今復以八卦别而言之動陷止皆健之屬也入麗說皆順之屬也不離乎乾坤也乾為馬坤為牛震為龍巽為雞坎為豕離為雉艮為狗兌為羊說八卦本象也乾為馬健也乾變震為龍純乾為馬故馬或龍種而馬八尺以上為龍九則變也房為天駟為蒼龍之次七星為馬於辰為午故馬又為火畜乾為金午為火馬生角金勝也故于五行為兵蠶馬首龍星之精故馬蠶同氣也大畜中孚之震屯賁晉明夷睽之坎皆乾也或曰鳥飛龍行不健于馬乎曰鳥飛極而息龍升降有時健者惟馬而巳坤順也牡者坤之陽牝者坤之隂老其究也故離為牝牛而既濟初九變艮京房以為博牛坤極生乾故角剛而善觸牽牛在丑丑土也土亦坤也離六二已丑土也牛有黃者離之六二也離為飛鳥為蟹為鱉為龜卵皆有黃震動于重隂之下而善變者龍也震東方卦直春分以後辰亦為龍蒼龍之次也動極必反故龍以春分升以秋分降升者豫也降者歸妹也盛夏疾雷木拔而龍起震為木也王充曰龍雷同類其知震之為乎震位在卯其日甲乙其數三八故𤣥之中以次三為龍占家以甲乙寅卯為龍或曰龍之類多矣皆震乎曰氣之散也天文角為蛟亢為龍翼為蚓軫為蛇角亢辰也翼軫巳也東方朔占守宫蜥蜴以龍蛇推之金匱書以飴治蛟龍病出蜥蜴而愈皆龍類也自春分至芒種震治也而辰巳為巽故曰氣之散也巽入也為風風主號令故雞號知時先儒以雞為火之精者巽木含火火生風火炎上故雄雞有冠乃鳴南越志曰雞冠如華其聲清徹巽位在巳金所生也王於酉上直於昴故雞又為金畜洞林曰巽為大雞酉為小雞素問以雞為木畜者巽也離者巽之再變兌者離之變故雞雉皆耿介而雞將號動股擊羽翰而後有聲又曰玉衡星散為雞者坎至四月成乾其方為巽玉衡斗也坎之位坎陷也水畜也美脊剛鬛坎中陽也垂耳俯首而尾不足本末隂也卑而處穢隂也突蕩難制陽也豚者豕之初也故訟初之四為中孚之豚豶者劇猪也故大畜之三兌金制之為豶坎再變成艮故豕用鼻壯豕有牙者乾之剛也象亦豕類故運斗樞曰瑶光散而為象坎離相納故象齒有文又為羸豕者隂也豕豭强而牝弱亥為豕者直室也坎之所自生也傳言斗星散精為彘斗星坎也又曰瑶光不明彘生鹿張宿為鹿坎離反也離附麗也美麗也鶉雉之屬飛必附草附麗也五色成章離日也雉方伏時東西風則復南北風則去而不復坎勝離也坤方之雉嘔文如繡離變而兌乎小寒雉始雊臨之六三離變兌也兌交震故雉不雊則雷不發聲陳倉之聲隱然如雷野雉皆雊星有墜而雉雊者震兌相感也蛇化雉者巽成離也竹化蛇者震巽易也雉入大水為蜃而老鶩為蝙蝠雀類為蛤離成坎也八卦獨巽離為飛鳥者何也曰南方七宿朱鳥也午為鶉火之次未為鶉首巳為鶉尾其咮在栁其翼在翼栁午也離也翼巳也巽也卜楚丘論明夷之謙曰當鳥所謂鳥者朱鳥也故曰明夷于飛歸藏初巽曰有鳥將來而垂其翼薛貞曰巽值鶉尾故稱飛鳥離火日巽木風也木中有火風者火氣之動也得乎風者為飛之類得乎火者得乎風離為目動巽為多白眼觀眼目之變可以知風火矣故驚飈奮發火勢熾然雷行電照草木怒張火木同類乎或曰騰蛇無翼而飛何也曰亦已巽也八荒之外有以首飛者背飛者尾飛者觸象成形豈特騰蛇乎或曰海水羣飛無情而飛何也曰坎極成離也火光起於洲灘烈焰生於積油坎極故也或曰飛類決起朝發而暮棲何也曰離在天為日在地為火日為晝火生風故飛者屬乎晝化乎風晝翔而暝息風鶱而木飛艮止也搏噬者前剛也戌為狗者直婁也火墓於戌生於寅寅為虎而其子亦曰狗考異郵曰斗運生狗者星艮離也斗止而動亦狗也兌說也羊內很者二陽伏於一隂之下也羝者交乎震震為反生也兌極成艮故羚羊以角息艮反成兌故羵羊為土怪夫子曰地反物為妖或曰史言開皇大厯羝或鬭於雲中羖或墜於雷震何也曰乾變坤則陽附隂而為走坤變乾則隂附陽而為飛其震兌之交乎或曰號物者有萬八物能盡之乎曰其變不可勝言也張載有言曰遊氣紛擾合而成質者生人物之萬殊其隂陽兩端循環不巳者立天地之大義乾為首坤為腹震為足巽為股坎為耳離為目艮為手兌為口說八卦合而成體也鄭本此章在乾為馬之前乾為天尊而在上為首在下亦為首如木根草荄之類乾無往而不為萬物先也乾首出庶物者震交乾也觀有孚顒若者乾首肅也明夷九三得其大首乾三之上也三本臨乾故曰大首既濟上六之濡首者上六反三乾也未濟上九之濡首者上九反三乾也乾又為頂者首之上也大過上六過涉滅頂是也又為輔者在首而止於上也咸之上六艮之六五是也輔上頷也與頤卦上體同象又為面者在首而說見於外也革上六是也又為頰者止於上而有面之象也咸上六是也又為頄者面之上益之以剛也夬九三之壯于頄是也頄面顴也骨剛而肉柔𤣥九體八為面九為顙八九上體也京房以上爻為頭目亦止體也腹虛而有容也又為釡者腹器也有水火爻則為釡故郭璞筮豫之解曰有釡之象瓶甕缶皆腹器也太𤣥土為腹器又為尊壺者交乎震坎也坎震為酒震為足艮為鼻腹器有足有鼻有酒尊壺也禮少儀曰尊壺者面其鼻又為簋者交震艮也有尊壺象而無酒焉者也禮少牢敦皆南首首者敦器之蓋飾首有面面有鼻坤又為身身亦謂之中又為躬折其身也震動也一陽動於二隂之下也艮為止者動極而止也一陽止於二隂之上也人之經脈十有二其六動於足其六動於手動於足者震之陽故自下而生動於手者艮之陽故自上而止震艮相反故行者必止止者必行疾走者掉臂束手者緩行震又為趾者通乎物言之也足趾下體之下也手上體之下也故太𤣥九體一為手足言其位也甲剛乾陽也在足者艮交震在手者震交艮震交艮則動者止艮交震則止者動震艮又為􅡑者足之指也拇手大指也手足所以能動也故動乎下體之下而應乎足者􅡑也指在下而動者亦􅡑也艮又為肱者自手觀之拇陽也餘指隂也指節三隂中之陽拇節二陽中之隂指動而掌止止者在上動者在下止者運動者止艮也自臂觀之手也臂也肱也三也肱屬乎上而止臂指用乎下而動止者役動動者從之艮也肱臂竒而指數偶亦艮也手之有肱亦猶股之有腓故股在上則二為腓巽為股隨足巽也雷風相與也坎為耳陽陷乎隂也輪偶者隂也竅竒者坎中之陽也精脫者聵水竭則槁耳目通竅者水火相逮也離隂麗乎陽也實者陽也陽中有隂故肉白虛者隂也隂中有陽故睛黑目白其坎離之交乎精竭者目盲離火無所麗也離為日寐者神棲於心其日昃乎寤者神見於目其日出乎故寐者形閉坤之闔也寤者形開乾之闢也一闔一闢目瞑耳聽坎離相代晝夜之道唯善用者能達耳目於外唯善養者能反耳目於內太𤣥以一六為耳二七為目一六水也二七火也兌為口說也鄭康成曰上開似口艮為鼻口鼻通氣山澤通也乾天也故稱乎父坤地也故稱乎母震一索而得男故謂之長男巽一索而得女故謂之長女坎再索而得男故謂之中男離再索而得女故謂之中女艮三索而得男故謂之少男兌三索而得女故謂之少女將說天地生萬物而言人者天地之性人為貴萬物皆備於人也乾天也為隂之父坤地也為陽之母揲蓍者一爻三揲三爻而八卦具故搜於坤䇿一索而得陽者謂之長男再索而得陽者謂之中男三索而得陽者謂之少男搜於乾䇿一索而得隂者謂之長女再索而得隂者謂之中女三索而得隂者謂之少女萬物分天地也男女分萬物也察乎此則天地與我並生萬物與我同體是故聖人親其親長其長而天下平伐一草木殺一禽獸非其時謂之不孝納甲之說乾納甲壬始於子坤納乙癸始於未震納庚子子代父也坎納戊寅艮納丙辰左行以順父循父道也巽納辛丑離納己卯兌納丁巳右行以向母從母教也三女配男夫婦之義天地之性人之大倫實告之矣太𤣥準之以一摹二摹三摹摹亦搜也乾為天為圜為君為父為玉為金為寒為冰為大赤為良馬為老馬為瘠馬為駮馬為木果說重卦别象也六爻變化其象豈能盡摹哉此凡例也智者觸類而長矣易言天者皆乾也天位者中正也又曰帝位天德者剛也天道者其行以正也天之神者隂陽合一也天則者不可過也天行者終則有始也反復其道也消息盈虛也三者一也天文者艮離也天命者乾巽也天衢者艮反震也天寵者君澤加也天險者坎在上也天祐者天助也天下者乾下也或乾爻降於下也曰在曰統曰御曰先後曰奉曰承曰順曰應曰麗各以其卦爻變化言之天或謂之帝言主宰也推而上謂之上帝乾又為大人聖人賢人君子大人者盡天之體也誠者天之道聖人至誠以盡天誠則化化則莫知其然謂之神故觀之九五天之神道聖人以神道設教同象君子通言之也或問天有形乎曰天積陽也氣也易曰日月麗乎天百穀草木麗乎土日月附麗乎天亦若百穀草木之麗乎土天果有質歟日月之行或遲或速奔星上下前後或卑或髙不得自如莊周曰天之蒼蒼其正色邪其視下也亦若是而巳列禦寇曰日月星辰積氣中之有光耀者郤萌曰天了無質鄭康成曰天清明無形或曰星隕石何也曰光耀既散氣凝為石如人之精神既散形亦剛彊矣故曰在天成象在地成形成形者皆地也為圜者渾淪無端周而復始也曾子曰天道曰圎地道曰方故得乎天者皆圜既濟之初九未濟之九二坎變乾為輪是也不特其形也晝夜不窮死生無際非天道之行乎五者君之位得位居中發號令於天下曰大君在家人父母位曰嚴君在歸妹帝女之位曰小君自娣言之則君也乾為六子父乾爻往矣為考考之上為祖配為妣異體别家分而同焉為宗乾居九五之位則為君而父也考也祖也宗也通上下言之自天子至於庶人一也一𤣥孫二曾孫三仍孫四子五已身六父七祖八曾祖父九髙祖父亦以世數言之乾剛之不變者為玉變者為金益之三以上九為圭鼎之上以九三為玉言其不變也蒙之金夫臨初之上也亦屯之初也訟之鞶帶上九之二也噬嗑金矢四之五也六五黃金五之上也姤之金柅二之初也鼎之金鉉五之二也言其變也乾艮同類故石攻玉則解乾離同體故金火守則流京房以乾兌配金兌正秋亦九五爻也太𤣥以二八為金為環珮為重寶為扣器以一六為水為玉者六即乾也玉有水玉水得乾氣乎為寒者坤交乾也隂至亥成坤戌亥乾位九月寒露十月立冬小寒十一月大寒露坤氣也雲徂雨流而露無所不至坤也黃帝書曰陽不足隂氣上入陽中則灑淅惡寒此寒之驗也邵雍曰月為寒二隂一陽陽不足也坎為水為月故水寒或曰井五月卦九五寒泉洌何也曰井之九五即泰乾初九甲子爻也子坎位也坎交泰坤也陽溫隂寒乾陽而寒者隂陽相薄十一月陽氣生於下以其隂不足也故井泉溫五月隂氣生於下以其陽不足也故井泉寒又為冰者坎交乾也乾西北方之卦十月水始冰地始凍水不冰則為隂負陽勝十月乾陽宜不足也乾剛金也故水凝而堅則隂勝坤初六一隂生至上六十月亥位坎交乾邵雍曰水遇寒則結遇火則竭從所勝也赤陽色也陽始於子坎中之陽故坎為赤極於已純乾也故乾為大赤乾者日在嵎中月在望歲在四月時也困九二坎為赤二交巽五為赤紱又為朱者朱赤黃色詩朱芾斯皇毛公曰黃朱染絳者一入謂之縓再入謂之赬三入謂之纁四入謂之赤纁黃赤也小爾雅曰彤􅀈緼朱也然則縓纁朱皆赤而朱比赤為黃比縓纁為異耳故困九五下交二坎離易巽為朱紱離坤黃也乾陽得位為良馬隂消陽為老馬為瘠馬鄭康成曰凡骨為陽肉為隂孔穎達曰骨多也駮馬𤣥黃也乾變離也駮食虎者兌變乾也郭璞筮遇乾之離曰驊騮緑耳遂𤣥黃於坎離艮曰其於木者交巽木也於乾曰為木果者巽艮之陽皆乾也艮為果者木之陽止於果果成則降降而反生震者艮之反震陽亦乾也秦漢之際易亡說卦孝宣帝時河內女子發老屋得說卦古文老子至後漢荀爽集解又得八卦逸象三十有一案集解坎為狐子夏傳曰坎稱小狐孟喜曰坎穴也狐穴居王肅曰坎為水為險為隱伏物之在險穴居隱伏往來水間者狐也子夏時坎為狐孟喜王肅止隨傳解釋不見全書蓋秦漢之際亡之矣今考之六十四卦其說若印圈鑰合非後儒所能增也故校證其誤而併釋之以俟後之知者為龍乾體坤自震息之成乾故乾為龍坤體乾剝乾成坤隂極生陽為復震也故坤上六龍戰于野其血𤣥黃坎為血震為𤣥黃為直乾其動也直巽為繩直者亦乾之直也為衣乾在上為衣坤在下為裳太𤣥曰垂綃為衣襞幅為裳垂綃竒也襞幅偶也訟之帶歸妹之袂既濟之衣袽皆乾也困之紱既濟之繻皆坤也古者衣裳相連乾坤相依君臣上下同體也至秦始取女之衣裳離之為言者震聲兌口聲出於口也所以能言者出於乾陽也坤為地為母為布為釡為吝嗇為均為子母牛為大輿為文為衆為柄其於地也為黑易凡言地者皆坤也乾坤皆言天地者隂陽相根動靜相資形氣相應有一則有二有乾則冇坤邵雍曰天依形地附氣其形有涯其氣無涯張載曰地在氣中黃帝書曰地在太虛之中大氣舉之天地未始相離也明夷日在地中則地在氣中可知或曰師地中有水而渤海之東有歸墟焉其下無底水豈氣乎曰黃帝書天在地外水在天外表裏皆水兩儀運轉乘氣而浮載水而行考之天西河中九星曰鈎星鈎星伸則地動者以水動也辰星色黃而小則地大動土勝水也鈎鈐者天之管籥鈎鈐坼則地動者天之管籥動也以此三者觀之水土動則地動地動則天動地非乘氣載水乎氣無涯水亦無涯水亦氣也坤又為邑為邦國天子建邦諸侯有國大夫受邑分土也邑內也故以下卦言之諸侯四也下兼卿大夫士邦對國則邦為王國五王位諸侯承之通言之邦國一也坤又為城為墉牆謂之墉城墉之大者震足艮手築之巽繩縮之掘地為澤土自下升者城也積土在內外之際設險可入者墉也又為泥為甃坎水坤土汨之為泥土水合而火之為甓以甓修井為甃乾為父則坤為母乾為祖則坤為妣坤得尊位母也五動成乾為王母王母尊祖王妣也五尊位在家人乾父居五則坤母居四尊無二上也麻紵葛曰布巽為草以坤隂不變者為布巽離為絲以坤隂變陽者為帛賁六五束帛戔戔上九變五巽離也坤隂變陽也坤為帛束帛五兩天九地十之數布帛兩兩相偶五尺謂之量倍量謂之丈倍丈謂之端倍端謂之匹釡有範金者有合土者其象有腹有耳無足皆自坤變坤為土為腹家人者遁四之初變艮坤六二有坤腹坎耳坎水離火巽木以釡亨飪之象離為中女故曰在中饋郭璞筮豫之解六二變坤有坎離曰釡之象遇大有之旅初九九二變乾成艮坤兌為金為澤有離火而無耳曰金之祥非釡也或曰鼎何以取於坤曰鼎自遁五之二巽變艮坤器之有腹者也而又有足耳鉉以木巽火坎水亨之故曰鼎象也易言吝者十二卦十三爻陽爻居三咸之九三從上六故往吝恆之九三趨上六故可貞而吝姤之上九居隂故吝其餘可往而不往可動而不動可變而不變坤隂也亦有知其不可以往為吝者屯六三是也然則坤之吝嗇顧用之如何耳故曰憂悔吝者存乎介乾獨陽也坤隂均之寒均暑夜均晝君子而有小人然後上下內外適得其平故小者亨則曰既濟而小大相過皆謂之過為子母牛者坤交離也坤為牛為腹離為大腹京房既濟之初九變曰博牛言以㹀牛博犢也洞林明夷之既濟曰當有牛生一子蓋坤變坎坎為子三至五互有離四者坤之丑爻丑亦牛也離畜牝牛者母也大畜艮坤之初為童牛者子也太𤣥以土為犢地方而載輿也坎內陽外隂陽實而直隂虛而曲內實轂也外虛穿也內直輻也外曲牙也一實一虛周流無窮輪也有輿有輪而乘其上曰車賁初九是也自上視之有輪有輿而居其中亦曰車睽上九視六三困九四視九二是也或曰乘解六三是也有輿無輪止曰輿大畜九二九三是也有輿有輪而爻當輿睽六三是也坤爻變乾陽為大則曰大輿有輿有輪或爻在輪下或當輪上曰輪既濟初九未濟九二是也曰輹者坤震也震之陽爻在坤下為輿下之橫木大畜九二是也震之陽爻變坤之中爻為大輿之輹中者心之位輹在輿下鈎心夾軸四往之五為坎變輿成輪大壯九四是也曰茀者有輪輿矣震為竹葦蔽之茀也一剛一柔相錯成文有天而後有地一不獨立二則為文天一地二也季春之月夬九三爻也陽氣充塞氣成虹霓有剛然後文柔之也仲冬之月坤六四爻也雖霽而日虹霓伏藏陽不足也以此見無一則無二矣離者乾坤以中相易者也離為日為火為雉日五色火煙隨而變雉五色具焉謂之文明者以離言也或曰極南之方冬虹不藏見則怒風發屋雷動則風止何也曰離南方巽之再變也巽動於下離變於上巽極成震是以風止中國陽緩隂散雖有虹霓而非風候又為章何也曰文合而成章荀子曰文理成章詩聲變成文積句成章噬嗑初五相易震離合一故曰雷電合而章坤六三姤九五動則成文不動則含章衆者對寡之名師以一陽主五隂故曰用衆曰畜衆明夷以二陽臨四隂故曰蒞衆解以初九之坤四故曰得衆民者有君之名也師曰衆又曰民何也曰復初九之二坤隂自下從之故曰民坤之隂即坎之二隂也坎之二與上坤之三隂合故又為衆坤又為醜者陽美隂醜也又為輿者通於車輿之輿車成於衆工始於輿邵雍曰君子以萬物為輿馬又曰羣者通隂陽言之乾之九四以三陽為羣否之六二以三隂為羣睽之上九以六三坎坤兌三疑為羣巽為魚亦曰民者巽之坤也與坎水兌澤之坤為民同為柄者巽之坤順其鑿而入焉者也斧柯劍夾殳戈矛之柲耜之耒柄也旅九四得斧巽上九喪斧或得其柄或失其柄黑者坤之極也以日言之日在虞淵也以月言之晦也以歲言之十月也故日冬則行黑道月死成魄火之末澤之汚下草木之朽腐人之黧老極也坤極成乾故明生於晦陽兆於北死為生之故而增肥之澤黑墳之土皆地之美者易言冥言晦皆坤也坤為地又曰其於地也者坤為黑其於地乃其一也坤變乾為牝馬離變坤為牝牛隂陽之中復有隂陽此萬物所以無窮也姤初六坤變乾初九甲子坎豕不曰牝豕者初隂未壯也為迷者坤冥晦待陽而後明先陽而動與逺於陽而不復皆迷之道為方者坤靜而德方方不可易也為囊者坤虛有容與腹同而囊手可括也為裳為黃者黃地之中色得乎陽之美不偏於隂者也為帛為漿者帛當在為布之下坎震為酒故作酒以麴糵麥東方穀也而東風至則酒湧漿者酒之初故坤為漿不足於陽也震為雷為龍為𤣥黃為敷為大塗為長子為決躁為蒼筤竹為萑葦其於馬也為善鳴為馵足為作足為的顙其於稼也為反生其究為健為蕃鮮張載曰隂氣凝聚陽在內者不得出則奮擊而為雷霆陽在外者不得入則周旋不舍而為風其聚有逺近虛實故風雷有小大暴緩鄭康成讀龍為尨取日出時色雜也虞翻曰駹蒼色震東方故為駹舊作龍上已為龍非也臣曰讀當作鬭字龍當作􅔀蒼龍尾也國語日月㑹于龍􅔀孟春日月㑹于諏訾斗建寅旦見尾中播種之時無妄益乾變震之象乎若蒼色則上巳曰蒼筤竹矣坤於地為黑又曰天𤣥而地黃者坤之中爻為黃黃者地之中色得陽之美者也中為坤宫太𤣥以五五為土其色黃五五中也中首曰陽氣潛萌於黃宫坤上六十月也言龍戰于野坤黑也乾赤也謂之其血𤣥可也而曰其血𤣥黃又曰震為𤣥黃者何也曰此天地鬼神之奧聖人之微意也坤之上六閉塞成冬隂極疑陽而戰陽於此不爭而自勝於是冬至而坎之初六受之故曰天𤣥而太𤣥亦曰夜半近𤣥極坤生震陽自外來而為主於內於卦為復以坎言之則𤣥也以復震言之則𤣥黃也然十月未可以言黃故古人謂冬為𤣥冬震所以為𤣥黃者初九春分六二清明六三穀雨九四立夏六五小滿上六芒種初九乾坤之初交以赤交黑所謂𤣥也六二六五坤之中爻所謂黃也十月又謂之陽月言未嘗一日無陽而陽亦未嘗一日不勝也故曰神戰于𤣥邪正兩行龍出于中法度文明龍出于中則震也又曰天炫炫出於無畛熿熿出於無垠出者亦震也隂極陽生亂極德形君子於是修德以俟時否之九五與二相易巽木𤣥黃而在田上桑也觀之六四與五相易坎為𤣥坤之中爻為黃而在朝廷幣也豐之九三𤣥黃在車上而金斷之斾也賁之六五三坎為𤣥巽乾為大赤離坤為黃纁也纁黃之變染者自黃而入赤纁三入之赤也為敷者隂體凝滯震陽敷之延叔堅曰敷大布也王洙曰字從寸甫聲布也泰初之四否四之初草之敷也大過二變之五木之敷也五變之二敷者斂矣解自升變草木之敷也鄭康成曰國中三道曰塗震上值房心塗而大者取房有三塗焉王洙曰卯為日門險極成易大川之上必有大路故大途之象必出於坎兌之外或曰道或曰衢履九二動成震動而正故曰道大畜自大壯來上九畜極艮反成震大途而在天上無所不達天衢也故曰衢賁又為徒行者初九之四艮應足動足指履乎大途徒行也泰九三為陂者大途變而為山澤易極成險故曰無平不陂為長子師六五動成艮艮少男視二震為長震視艮為弟坤為母視之為子故曰長子九二用衆處險持律五任之本復乾也自震坎視之丈也故曰丈人隨初九否乾自坤視之為夫自艮視之為丈故曰丈夫小畜九三離婦乘震故曰夫大過乾二變之五巽成震巽為白自兌妻視之震為夫夫而白首故曰老夫恆六五自二巽視之為夫自泰乾視之為子故曰夫子無妄六三即遁之初六遁初上行之三成震故曰行人明夷初之四震成巽巽位東南故曰主人震四諸侯之位臨二之四有不喪匕鬯奉宗廟之象故曰祭主震變兌為決變巽為躁竹中虛節實重震之象蒼筤青也震之色孔穎達曰春生之美也竹草類而有木氣震於五行為木故蒼筤竹乃盡震象他竹震之變也太𤣥以甲乙為竹亦震也列禦寇言久竹生青寧青寧世無識者昔人鍾山伐竹竹中得青蝦蟇其青寧乎蝦蟇巽兌之氣震極而變也萑葦震之廢氣也故竹堅而萑葦脆竹久而萑葦易枯鄭康成曰竹類搜神記言朽葦為蛬震成巽為風乎夫橘成蛾葦成蛬麥成􅺄陵舄得鬱棲為烏足葉為蝴蝶皆震巽也歸妹上六既濟九二之五為竹葦既濟十月卦亦震之廢氣也二卦皆震巽交乾為馬善鳴者震也易凡有震聲曰鳴謙六二上六是也兌口震聲在人曰言需九二以四為言訟初六往四為言明夷初九往四為言夬九四不動為聞言不信革九三往上為言震臨二之四為言上六交四則五為言艮五動易二為言漸初六動而之二為言皆震兌也在飛鳥曰音中孚上動反三小過初九之四是也或曰音有五善鳴者何獨震乎曰震動也凡聲激而後有雷以陽激隂風以隂激陽水火之聲無非激也不動何由有聲為馵足者伏爻也震為足於左在下卦為後震下有伏巽巽為白此震爻發於下之象乾為首上發震爻則為的顙的顙詩所謂白顛傳所謂的顱也為作足者乾馬變也震下爻動屯初九是也大畜九三乾變震三陽並進故曰良馬逐中孚六四震作足馬四易初成坎坎為美脊震坎類也四絶類上行坎亡震存故曰馬匹亡其於稼也為反生宋衷曰隂在上陽在下故為反生謂枲豆之屬戴甲而出鄭康成曰生而反出也反其生者有生有不生夫一陽自下升而息五隂自上降而消其卦為復彖曰剛反動太𤣥曰反乎始故人與草木反生心膽之陽倒懸豈特枲豆而巳哉於稼言反生舉一隅也大過二變之五兌成震為枯楊生稊反生也五變二往震成兌為枯楊生華亦反生也屯三震交艮黔喙之屬而角反生鹿也大壯四震交兌羊角反生羝也震三四相易死者反生蘇也虞翻曰震相薄變而至三則下象究與四成乾故其究為健巽究為躁卦雷風無形故卦特變耳為蕃鮮者泰頤恆萃歸妹言萬物解言百果草木甲拆者震也咸四月卦言萬物化生姤五月卦言品物咸章者震變巽也震為蕃變巽為鮮故又曰潔齊太𤣥曰物咸重光保厥昭陽言離明也或曰離言百穀草木者何曰離有震巽也解言百果草木者何曰有震巽而又自艮變也睽無震巽曰萬物者何曰睽大壯之震三之上成睽萬物睽也乾曰雲行雨施品物流形者何曰乾自震息也動爻巽也為王當在乾為天之下錯文也五為上之位乾為君君宜正位宅中故九五為王比隨觀家人蹇夬萃井渙是也離九四與五相易五曰離王公上九與五相易曰王用出征師二進至五曰王王自五之二曰王三錫命蠱上九自泰初歷四五之上曰不事王侯晉二動易五曰受兹介福于王母豐二至四曰王假之坤六二之動訟九三從上九皆曰從王事而已大象曰先王者比觀渙以九五噬嗑復無妄以初九皆以前卦變而言之故曰先王大冇九三不言王曰天子者何曰九三交於六五六五下交九三乾變離兌有天子施澤降心于九三之象故曰天子先儒以震為諸侯是乎曰非也長子主器謂長子為諸侯也四諸侯位豫九四天子建諸侯也晉九四天子接諸侯也四近君位古者諸侯入為三公三公出為諸侯故其位四與三通曰公侯之位鵠古鶴字震離為鶴中孚九二是也訟初之四坎變巽離變震兌震為善鳴為足巽為白兌為澤繁露曰鶴水鳥也夜半水感其生氣益喜而鳴京房論中孚曰九二處和體震則震為鶴房本有之房在孝宣後故也鼓象雷中孚九三或鼓或歌震交巽為木艮為手手執桴擊之鼓也又為鼓缶之鼓離九三變坤震坤為器震為鼓巽木艮手鼓缶也巽為木為風為長女為繩直為工為白為長為髙為進退為不果為臭其於人也為寡髮為廣顙為多白眼為近利市三倍其究為躁卦震巽皆木也說卦巽為木言蕃鮮之時震之九四爻也乾艮坎離皆有木象何也曰水火土石地兼體之金生於石木備此四者而後有故木果乾也堅多節艮也堅多心坎也科上槁離也其實乾坤而已或為苞桑或為枯楊或為枯木或為把何也曰否之九五二為田木在田上上𤣥下黃桑也二五相易剛柔相包苞桑也其卦氣則七月桑落之時大過巽木兌澤楊澤木也兌正秋枯楊也其卦氣則十月小雪亦枯楊時也困初六視九四為臀困于株木巽木而兌金克之枯株也其卦氣則九月霜降亦枯株也姤九三因四動者兌澤巽木變乾為大澤木之大把也其卦氣則五月夏至把木盛時故能包瓜或為牀或為棟或為桷或為木或為舟楫或為耒耜何也曰剝初六六二六四巽九二九四皆以坤變乾成巽坤為西南乾為人設木於西南之奧而人藉其上牀也大過巽為木木反在上棟也漸九四乾動成巽坤三變也乾動為直坤為衆木而平直者桷也益自否變漸變渙巽木在坎上至益而成故渙曰乘木有功益曰木道行也中孚巽木兌金刳之故曰乘木舟虛渙巽有艮手斷木剡木為楫也益自否變九四之二斫木為耜也之二則揉木為耒風者火氣之動隂麗於陽則為火隂入于陽之下則為風巽之所入即所麗之隂也火非動不見而動則屬乎風黃帝書曰在天為風在地為木舉一隅也西方書曰暖氣歸火轉動歸風風化蟲故郭璞曰風蠱也為長女者女在下男在上或男未下女或男下女而未歸或女歸而有漸或男行而不動或女與女同居則三女皆謂之女春秋傳曰女者謂其逺於人也古之嫁者三月廟見而後行夫婦之道未廟見而死則歸葬於父母故咸下女漸女歸猶謂之女三女從三男五有乾坤舅姑之象子夏曰婦人學於舅姑者也或曰蒙六五納九二成巽大過九五變而之二成巽恆六五從九二成兌謂之婦者從夫也家人九三漸九三曰婦何也曰家人本遁變九四之初則初六從而成離離女從坎男也坎視乾為子離乾為舅故曰婦子漸九三本否九四也之三成坎六三從之成離故謂坎曰夫謂離曰婦曰小畜上九巽為婦何所從乎曰九三動則成震震者巽之夫也不動者為上九所畜也小畜九三大過九二困六三又曰夫妻何也曰小畜九三離震同象大過九二動之五震兌同象困六三坎離同象故曰妻魯敬姜曰婦人事夫有五平旦纚笄而朝有君臣之嚴沃盥饋食有父子之敬報反而行有兄弟之道受期必誠有朋友之信寢席之交而後有夫婦之道謂之妻者寢席之交乎故曰妻齊也女或為娣何也曰所歸之妹其爻在上則下為娣歸妹九二是也為繩直者巽一柔為二剛所紏有股而合繩也其剛爻為直繩所以直者以剛紏柔剛乾也又為徽纆者坎上六動坤坎成巽坤坎為黑巽為繩徽黑索也巽為股兩股謂之纆上之三成巽離三股謂之徽又為繘者井自二反上成巽坎車相應繘也汲綆謂之繘係者或以此係彼或以彼係此引者持繩相應牽者手挽而股動繫者繫動於此無妄之牛自遁初之三四巽繫之故曰或繫之姤初之二二巽繫之乾金在焉故曰繫于金柅維者反復成巽繩反復維之也為白者坎變巽也坤至北為黑坎中之畫乾赤也赤黑為𤣥坎水一也或為白露或為霜雪為冰者皆寒氣巽入之也春秋傳曰冰以風壯詩曰北風其涼雨雪其雱易曰履霜堅冰至隂始凝也白虎通曰露者霜之始也坎為月遡日而白離之光巽入也坎為髮為血髮者血之華少而美踰壯則黑而不𤣥過此則乾消坤見坎降離升而黃既老則坎變巽坤黑盡矣然凡有益於血者皆能黑或曰素履何以言坎曰四變之初巽變坎初之四坎變巽也大過初六白茅何坎也曰遁一變訟二變巽三變鼎四變大過則大過初六自訟坎變巽故為白而初六九二九五同取此象五色皆本於白草木既槁則白鬚髮既老則白豕鬛埋之則白金可變而白丹可鍊而白白者隂也陽之基也隂陽相賁而後有文陽盡則隂質見矣物有生而白者氣自芒芴之間固已變矣巽又為墨者巽變坎也白復成黑墨者黑與水合太𤣥飾曰隂白陽黑分行其職天地變化萬物者以巽而莫見其變化之迹故巽為工訟之鞶帶比坎之缶泰之城隍解之墉同人隨之門節之門户豫之門柝小畜大畜之輿輹大有賁困之車既濟之輪井之收噬嗑旅解之矢睽之弧矢旅巽之斧賁之帛困之紱既濟之衣袽剝巽之牀渙之機大過之棟宇漸之桷困之宫小畜之室大壯之宫室豐之屋旅之次剝之廬坎之樽簋井之瓶甕鼎之耳鉉中孚之舟楫益之圭歸妹之筐既濟之茀離之罔罟益之耒耜小過之杵臼大過之棺槨夬之書契恆之浚井之泄甃皆巽工為之也或曰大畜九二坎六四恆初六歸妹上六節初九九二既濟六二損二簋豫門柝何取於巽乎曰大畜三有伏巽坎自臨三變而成一變升二變解三變坎自升至坎巽工為之乃有樽簋缶之象恆初六本泰之六四自四之初入于兌澤之下成巽所入深矣故曰浚猶浚井也歸妹漸之反也損益之反也節渙之反也既濟六二應五困初九應四也豫伏巽也巽東南主人之位內有主故有客巽為風草木風之類皆長巽離為絲絲亦長姤初變兌為履之虎尾亦長施之於事久長是也易言不長不可長何可長皆巽變也訟初往訟二四應初巽坎變兌震曰訟不可長也屯上無助妄動之三離見巽變曰泣血漣如何可長也否四應初巽體猶存五應二巽變矣上應二巽體盡而成泰故曰否終則傾何可長也姤一隂方長五陽下之巽體既盡剝極成坤故曰勿用取女不可長也中孚上九登久而降巽變成離故曰何可長也小過九四以往厲為戒久則四五相易小不勝大故曰往厲必戒何可長也臨六三處位不當憂而退避二三相易成坎坎為加憂二至四有伏巽二三相易巽變坎故曰既憂之咎不長也或曰豫上六大壯上六何取於巽曰豫上六震動反三成巽大壯上六震者巽之反也為髙者風髙至者也飛鳥之類有背負蒼天皆風所為也或曰乾天不為髙何也曰天運往而不來升而不降亦不能為髙來也降也所謂巽也同人九三動與五爭應成巽艮故曰髙陵解上六動之三坤體連巽故曰髙墉蠱上九自巽往外而處卦上故曰髙尚其事為進退者坤生震之一陽則退者進乾生巽之一隂則進者退易稱進退者巽也觀九三是巳屯初九曰盤桓者進而之四成巽四不能安故盤桓萃初六退而亂進而與四相萃故曰乃亂乃萃皆進退也或曰大壯上六何也曰上六震震者巽之反不能退不能遂則進退不可矣巽兌之覆也兌為決覆之為不果稱疑者皆不果也乾九四或躍賁六四當位豐六二之往既濟六四之戒困九四九五之徐鼎九二未濟大象之慎皆不果也豫九四勿疑兌初九未疑者巽毁也遁上九升九三無所疑者巽或不反或毁也或曰坤上六隂疑於陽睽上九羣疑亡損六三三則疑何也曰乾五月一隂生巽隂始疑也至於十月隂疑於陽蓋其疑自一隂始生則疑之故君子於姤之初繫之以金柅也睽上九之三成兌震兌巽之覆震巽之反損自泰變九三上行上六下之九六相遇得其友也三陽並進成巽故三則疑也為臭者張載曰聚而有間則風行風行而聲聞臭達繫辭曰同心之言其臭如蘭先儒謂同人六二也二巽為草二易五為芬芳其臭如蘭也坎為髮髮者血之華坎血耗減頂露於上寡髮也大過九二老夫九五老婦離九三大耋兼取此象乾為首析而言之初畫為頤中畫為面上畫為顙震得初畫為頤者動於下也兌得中畫為面者悅見於外也巽得上畫為廣顙者上大下小也張載曰躁人之象傳曰上方者觸人亦躁也睽六三其人天且劓馬融曰刻鑿其額易傳曰髠其首是乎曰睽九二即無妄之九五巽變乾為廣顙兌毁之髠其首也刑鼻曰劓髠曰天互見也為多白眼者離為目虛者隂也實者陽也虛者其體陽實者其體隂故虛者為眸子實者為白肉離變巽則白肉在上眸子在下故為多白眼見於易者為惕為反目乾九三危而惕也訟九二窒而惕也小畜九四畜君乘剛而惕也與上合志則有孚惕出矣九二受畜於四妻上夫下反目而怒視也虞翻曰巽為魚何也曰魚多白眼而巽乎澤者也不曰巽乎川者積水成淵而後魚鱉生焉川壅成澤也剝自姤變至遁否觀有伏兌巽為魚五艮持繩貫魚也姤初巽二動成艮有伏兌九二不動包有魚也九四逺初無魚也中孚坎變為巽乾變坎成兌魚也郭璞得豫之小過曰五月羣魚入寺艮為門闕六三變九體有兌巽豫五月卦也或曰魚水蟲也何以言巽曰坎離乾坤之變交而生物離乾卦坎為水故陸多走類水多飛類魚浮游於水有飛越江湖者巽也故巽在陸為雞在水為魚雞暝而魚不暝離不足也傳曰魚與鳥同類其知巽之所為乎嶺南黃魚或化為鸚鵡巽變離也泡魚而刺者或化為㺄巽變坎也震巽相易者也故魚或為龍魚而斑者或化為鹿畜魚以二月上庚亦震也隨陽者震也潛化者巽也孕魚依草子如其實月體虧於上魚腦減於下月盈成乾其虧成巽為近利市三倍者噬嗑六三變也日中為市巽變兌離為螺為貨利市也巽變離兌三倍也舉此一爻以例諸卦其究為躁卦者巽三變成震舉震巽二卦以例餘卦天地萬物無有獨立者極則相反終不相離以其不可離也司馬遷律書曰冬至則一隂下藏一陽上舒京房論八卦飛伏虞翻論伏爻郭璞又論伏爻納甲其說皆源於此為揚者巽為風風輕揚中孚九二鳴鶴在隂其子和之上九翰音登于天用此象為鸛者别於鶴也震為鶴陽鳥也巽為鸛隂鳥也鶴感於陽故知夜半鸛感於隂故知風雨世傳鸛或生鶴巽極成震乎坎為水為溝瀆為隱伏為矯輮為弓輪其於人也為加憂為心病為耳痛為血卦為赤其於馬也為美脊為亟心為下首為薄蹄為曳其於輿也為多眚為通為月為盜其於木也為堅多心一陽陷於二隂之中為坎坎陷也盈天地之間皆水曰水者舉其凡也坎之隂為陽所得上而為雲故屯曰雲雷需曰雲上於天坎之陽為隂所得下而為雨故屯解曰雷雨坎水之通流為川訟之坎由遁乾三之二漸之坎由否乾四之三渙之坎由否乾四之二益之坎由渙二之初故曰大川或曰小過彖夬九三中孚下體兌也或為雲為雨為大川何也曰坎兌一也革兌上離下彖曰水火相息兌亦水也自陽為隂所陷言之謂之坎自澤物言之謂之兌澤無水則亦無以澤物矣故澤無水謂之困上浮而為雲下墜而為雨非澤氣之升降乎川澤者坎兌之相變也需之川自大壯之兌變而為坎澤決而為川也中孚之川自訟之坎變而為兌川壅而為澤也澤或決而通川或壅而塞豈有常哉曰涉大川何也曰需之利涉震足蹈川也益之利涉巽股蹈川也訟之涉坎變兌巽股入于下而澤滅其頂不利涉而入于淵也坎或為淵何也曰乾九四或躍在淵者坎之下復有澤也訟曰入于淵者訟變巽睽大過三坎成兌川壅成澤澤蓄成淵與乾九四一也坎又為泉何也艮兌變坎山澤通氣山下之澤出而流動則為泉泉有源之水澤其源也蒙自臨來兌變坎艮與井自泰初之五乾變兌坤變坎初自兌下往而成坎則初為泉源同象坎又為膏者亦坎兌也澤之肥者陽之美也為隱伏者坎為水水善隱伏沇濟沱潛之水潛行千有餘里五緯唯辰星難見而血之流行於肌肉之際者至幽也乾之初九甲子坎之位也九變而六則為潛為隱坤之六四言賢人隱以乾之初九為賢也在履九二歸妹九二因初九之動皆謂之幽隱伏也而謂之幽坎離相形也豐九四處不當位則曰幽不明在訟九二為逋竄在同人九三為伏戎在需小過為穴需上六降三小過六五三取二坎兌交可隱伏者穴也需六四坎交兌三陽自下進故曰出穴在困為幽谷在井為井谷谷與穴異者澤決水流注於山間艮山也谷注溪者也輮宋衷王廙作揉今從二家矯者矯曲為直揉者揉直為曲噬嗑九四之五解九二之五旅六五逮四皆巽為木艮手矯之正曲為直加以鋭金故曰矢曰金矢者乾也曰黃矢者離也否四之初三變成益一變漸巽變乾直者曲也二變渙而曲其柄耒也渙巽變乾曲而有足肱據其上機也皆有坎揉之象古矢幹用蒲栁故曰剡木為天小過為弋者四本明夷之初離巽為絲以絲繫矢射之弋也為弓輪者揉直為曲坎木為之坎兩端柔其中剛剛柔往來弛張也輪一虛一實內實外虛睽自無妄來五之二巽木變離為絲繩變坎則弓有弦既濟初九之四未濟九二之五巽木艮手揉木曲之其成則圜者輪也乾為圜矢取巽離弓取巽坎又有工矯揉之豈人為哉枉矢熒惑之變火也㺄豕激豪短狐射影無非坎離之變其於人也為心病者虞翻以坤為心坎二折坤為心病以類言之心火也坎水也坎心病也以位言之坤土中也中者心之位周景王鑄大鐘聲過其中為心病先儒以皇極不建為瞀亂之疾五聲以宫為君太𤣥以五五為心其中不平者心病也明夷六四應初比三四入而初出坎變兌心病去而說獲心意也井九三未用上六其心病故惻然傷之艮六三靜與動爭夤裂而心病故厲動心艮六二隨三不能動而應五旅九四不能進而上道行于五故其心病皆不快為加憂者卦以隂陽失位失應為憂憂之中又見險加憂也在屯上六為泣血漣如在離六五為出涕沱若在晉六二為愁如在震九四為虩虩或曰屯上六失位乎曰失應也上六動成巽反三成離而巽毁故曰何可長也人所以知疾痛搔癢者由血流行也坎為血卦為耳血流行而物傷之為耳痛舉此則百體之痛一也在噬嗑上六為何校滅耳在夬九四為聞言不信為血卦者坎為水為血赤者坎中之陽靜則陽消故鹽白而大鹵之色正赤穆天子傳有黑羊白血今嶺南産鍾乳之山黑羊食其草則血白鍾乳金石兌隂之氣也故凡血停久不動亦白隂變陽也黃帝書腎主血心藏血腎坎水也心離火也離中坤隂而藏血坎離交也其實皆乾陽之動屯上六臨乾變坎也歸妹上六渙上九泰乾變坎也為赤者乾為大赤坎中之陽乾中畫也其於馬也為美脊者乾為馬上畫為顙故震交之為的顙中畫為脊故坎得之為美脊下畫為足故震得之為作足良馬者純乾也屯上六以五為馬賁六四以三為馬晉以四為馬睽初九以四為馬中孚以訟二為馬皆美脊之馬也為下首為亟心為薄蹄者屯上六之班如賁六四之翰如睽初九之所喪馬皆以亟心坎在中也乾為首坎隂在上交之為下首震為足坎隂在下交之為薄蹄中之位為心坎陽交之偏於陽矣為亟心乾為馬三男皆乾索也言震坎而不言艮者顙在上即艮之乾也猶乾為木果而艮又為果是巳為曳者坎離交也坎水欲下離火欲上曳也坎為豕坎極成離故豕亦俯首薄蹄亟心卑而率有曳之象其於輿也為多眚者坤為大輿為衆多多坎陷者輿之病行則必敗唯無眚者乃可行災以坎言者險也眚自取不正災天降之雖正猶不免訟九二訟五無妄三四上不正震六三不當位自取也故曰眚需九三剝六四大畜初九正也故曰災或曰復上六正災也而曰眚無妄上九不正眚也而曰災遁初六不正宜眚也亦曰災何也曰復上六迷復用衆以其國君凶自取之也然上六窮矣雖正亦凶災也故曰有災眚無妄上九之窮雖行而正亦災也遁初六退藏自晦其正也為通者坎水決為江河升為雨露血之在人者周流無窮也乾曰六爻發揮旁通情者坎離升降遍被諸爻乾之情也坤六五曰黃中通理者五動成坎也節九二知通者動而應五坎也知塞者坤土塞其行也需自大壯四之五成坎乾九四變漸渙之坎而成益通也故曰大川中孚之川由訟坎而訟自遁三變之坎亦通也豫九四曰朋盍簪者上下通也或曰泰言天地交而萬物通否言天地不交而萬物不通何取於坎乎曰坎初六冬至九二小寒六四立春九五雨水上六驚蟄而泰當坎之九五水氣上行自坎為泰萬物通矣否者泰之反也坎降離升震伏兌見自離成兌而否當離之六五萬物不通矣為月當在坎為水之下錯文也坎坤體也坎中之乾二五也乾陽流於坤隂故月以速為退月體不明待日而明明者乾也橫渠曰日月之精互藏其宅是也乾言日月合其明者坎離互用也豫言日月不過者坎為月伏離為日日月㑹于北方也恆言日月得天者乾九四之五變離坎也小畜上九中孚六四歸妹六五月幾望者小畜四有伏坎巽有伏震月在東日在西望也中孚訟坎變震月在東亦望也歸妹六五月在東日在西亦望也然曰幾望者小畜中孚坎在四也歸妹六五爻在五坎在四若五則中矣是故日掩月則月食月掩日則日食坎離之交勝也或曰坎水也離火也火麗乎水何也曰離非水則明無自而託坎非離則明無自而生故水聚則精聚精聚則神生今焚薪為炭枯枿成灰朽木夜明濕盡光暗血為走燐見於暮夜隂雨之時故曰離者麗也坎水盡則離亦無所麗矣水潛行伺隙而動故為盜太𤣥以水為盜隂陽家以𤣥武為盜𤣥武水也屯六五以五為寇盜用衆也蒙上九以二為寇盜用師也需九三以五為寇賁六四以三為寇解六三睽上九以四為寇寇用兵也兵戎也故需曰寇象曰戎夬九二動離有伏坎亦曰戎以有戎兵其實盜也坤衆為多坎陽卦其剛在中堅心也重坎者堅多心也曰其於木也者與木爻交也震巽為木堅多心松柏之類周官所謂陽木洞林家人之蒙巽震交坎為長松其在震九四為棘棘在渙九二為機為宫者復初九即乾初九甲子爻子者坎之位於律為黃鍾太𤣥曰陽氣漸萌於黃宫為律者法度之始太𤣥以水為法為准水可動而動可止而止故為可有以位言者有以爻及變言者乾六位三五坎為可初上四皆曰不可言可者九三也大過九五何可久也亦可醜也亦三五也坤六三可貞者三動也師可以王二之五也謙上六可用行師者上應三也蠱上九志可則者三動應上九無妄九四可貞者五動也大壯天地之情可見者四之五也解六三可醜者負四也損可貞者九三上行也九四可喜者四初相易也井九三可用汲者上六用九三也震出可以守宗廟社稷者四也小過可以小事者六二也明夷變也不可大事者九三九四也坎變巽也否上九何可長者三爻自上降也謙卑而不可踰者艮變坎也蠱九二不可貞者不動也剝上九終不可用者坤不復也無妄九五不可試者五不動也大過九三不可輔者三上不易也坎天險不可升者二五不易也離九三何可久者坎毁成巽也遁九三不可大事者三不動也明夷九三不可疾貞者三之上也豐九三不可大事終不可用者三不往而退也節苦節不可貞者上窮也中孚上九何可長者反三也小過六二不可過者坎變巽也六四終不可長者四之五也既濟上六何可長者上反三也為棟者木就濕避燥去髙取卑有棟之象或曰火不避濕而就燥乎曰火豈擇於髙卑哉在屯六三為君子舍之在訟九二為不克訟在比九五為舍逆取順在賁初九為舍車而徒在離九三為不鼓缶而歌則大耋之嗟凶在節六三為不節若則嗟若為叢棘者其於木也為堅多心交離為棘離火鋭上而不可觸刺也堅多心之木而有刺棘屬也坎上六動為巽曰置于叢棘是也古者獄後種九棘周官王之外朝左九棘右三槐司寇公卿議獄其下坎言叢棘者獄也天文天牢六星在斗魁下貴人之牢也貫索九星在招搖前庶人之牢也占家天獄視斗繫曰本斗北方坎也未濟坎自否巽變為狐坎隱伏巽不果虞翻以艮為狐干寶以坎為狐互發也天文以心為狐說卦以艮為黔喙猶天文以辰為龍說卦以震為龍聖人觀鳥獸之文又觀地之宜參考之也巽交坎離為蒺藜象與棘同巽為草木剛爻木也柔爻草也為桎梏者艮手震足交於坎木桎梏也桎足械也梏手械也坎有獄象故以桎梏言之蒙坎自升巽以木爻變也離為火為日為電為中女為甲胄為戈兵其於人也為大腹為乾卦為鱉為蟹為螺為蚌為龜其於木也為科上槁一隂麗乎二陽也乾離同體離巽為風故天與火同風自火出乾位六爻坎離互用故以水火言之若大有賁革鼎既濟未濟舉大凡也故皆曰火離九四旅九三離火巽木故曰焚或曰何以隂麗陽乎曰束藴而吹煙氣鬱然及其外明煙即是火火動而薪止火滅而燼留非隂麗陽乎然坎離不相離也坎中有離故有溫泉有火井離中有坎故有火鼠有火龜離在地為火在天為日乾體也其中畫乃坤之二五橫渠所謂隂陽之精互藏其宅歟行遲者隂麗乎陽也晉曰晝者日出地上進而中也豐曰宜日中者九四之五也離九三豐彖曰日昃者日中而又西也乾九三既濟六四曰終日者日在下也豫六二曰不終日者二動之五成離日在上也夬九二曰暮夜者動成離日在西方之下日薄于虞淵之時也或曰夕日入為夕大畜曰日新者大壯一變需坎月離日合照也再變大畜艮終復始日新也益曰日進者初九自下而進也卜楚丘論十日其說源於易之晝夜又為大明者懸象著明莫大於日月而月受明於日陽為大隂為小故曰大明乾大明終始晉進而麗乎大明皆日也又為明者日月相推而生明屯九五求四四往之五訟初往四皆坎月在東月之明也大有九四離動井九五旅上體日在上日之明也困初六豐九四曰幽不明者日在西而隱伏也大有賁同人明夷曰文明者離居二五也坤為文又為光者日月之光無所不及也孟子曰日月有明容光必照管輅曰日中為光易凡言光者皆明之所及也坤之化光者含坎離也觀之觀光者四五交也頤之光者四施初也夬之光者離自下升也未濟之光者二五易也需光亨者大壯四之五日西月東四五得位也凡言未光者皆未能行也屯九五未之二也噬嗑九四噬六五而後光也晉上九反三自治而後光也夬九五中行上決而後光也萃九五之二而後光也凡言光明者兼體用也老子曰用其光復歸于明體用合一光明無盡履剛中正而不倚故離日下升光明不疚言無私照也謙以剛濟柔故坎自上降萬物化光言皆相見也艮行止動靜不失其時故坎離下濟其道光明言久不息也凡言光大者其象與光明同曰大者指陽爻也坤曰光大者初三五也渙六四曰光大者二從四也咸九四可以光大者九也四來初往則離坎成四往初來則離坎毁未光大也益自否之九四三變離坎而成益大者光也言光輝者日月之光揮散也言暉者主離日也管輅曰朝日為暉或曰星辰何象也曰艮離也邵雍曰離為星賁艮上離下彖曰柔來文剛又曰分剛上而文柔天文也班固曰隂陽之精其本在地張衡曰地有山嶽精鍾為星蓋星辰者地之精氣上發乎天而有光耀者也星日之餘也辰月之餘也月生於日之所照也衆星被耀因水轉光三辰同形隂陽相配其體則艮也河洛篇曰天中極星崑崙之墟天門明堂太山之精中挺三台也五靈諸侯也岍岐荆山壺口雷首太嶽砥柱東方之宿也析城王屋太行恆山碣石西傾朱圉北方之宿也鳥鼠太華熊耳外方桐柏嶓冢陪尾西方之宿也荆山內方大别岷山衡山九江敷淺原南方之宿也九隘之險九河之曲漾水三危汶江九折上為列星諸賢之論不詭於經矣故精斁氣歇坎極離見乃有隕星其光燭地者離也隕而成石或為阜堆塵沙者艮也電陽光雷陽聲陽自子息而至春分四陽成大壯雷乃發聲後五日始電隂自午消而至秋分四隂成觀雷乃收聲電亦不作震動也不動則聲光何由而發笑者目動怒者目光櫛髮而鳴者有光振衣有聲者有光離震交也噬嗑豐離震合也戛竹鑽木兩石相擊其火必出動極也子雲曰觀雷觀火為盈為實天收其聲地藏其熱盈實者陽息也震與兌交離與坎交故雷電而雨降為中女為甲胄者離外實中虛有甲之象在上為胄在下為甲先儒謂巽為繩繕甲也為戈兵者乾為金離火煅之火鋭上戈兵也兵有五言兵則五兵具矣同人解夬萃曰戎者戈兵戎器也噬嗑旅言矢乾金火煅鋭上為鏃巽木為幹加於坎弓之上矢也旅巽言斧者兌為決斷也歸妹言刲者交兌金為刀兵也小過言戕者外殺也謙既濟未濟言伐者自上伐下入其險阻也謙又言侵伐者侵削其地而後伐也或曰萃無離也何以除戎器曰原其始也臨變明夷小過萃自小過離變坎兌巽坎為棟有簡治弊惡修繕戎兵之象或曰制器者尚象蚩尤鑄兵亦知取象乎曰蚩尤不能也夫子曰蚩尤惛欲無厭者也何器之能作蜂蠆挾螫而生見害而挍以衛厥身者也人生有喜怒故兵之作與民俱生為大腹者坤為腹有容也坤二五易乾成離陽為大故為大腹內虛外堅實大腹之象大有九四動非大腹也曰匪其彭明夷九四之三震為左曰左腹井九二坤腹器有兌口離大腹曰罋漸九三坎夫離婦與四相易坎往離毁曰婦孕不育離燥故為乾卦於日為烜於木為槁漸初六艮動成離之二坎水之傍乾而可止崖也崖謂之干震其究為乾故曰其究為健巽其究為震故曰其究為燥卦卦變也觀此二卦則知乾坤坎離艮兌其究皆變乾健獨不言卦者無非乾也為鱉為蟹為螺為蚌為龜五者皆大腹離也為鱉者離交巽也巽位巳已為蛇故蛇或化鱉蛇鳴而鱉應為黿者交乾也郭璞筮遇需之復曰鼉也為蟹者巽交離也蟹連兩目重離也託於蛇鱓之穴亦巽也鱉蟹其中皆黃坤之二五乎璞筮遇咸之井曰東方當有蟹食稼咸巽井離坎兌變震也為螺者兌交離也附螺生於池澤蝸生於暑雨螺生於月旋震六二旅六二九四巽上九兌九四噬嗑六二變皆兌交離也為蚌者離交坎也千歲之燕為蛤雀為蛤伏翼為蛤雉為蜃鵰為蠣方諸泣月蚌胎含珠離坎也為龜者坎交離也北方𤣥枵之次為龜蛇故龜游山澤出入水火含神負智得坎離之正乎頤損益三卦皆然其於木也為科上槁康節論木曰枝幹土石也故歲不易葉花水火也故歲易橫渠曰離為乾卦其於木也為科上槁附而燥也然則橫渠所謂附而燥即康節所謂葉花也鄭康成曰科上者隂在內為疾虞翻曰巽蟲食心故上槁宋衷孔穎達以科為空中然則諸儒又以科上蟲病為槁矣為牧牛者坤為牛艮為小子艮坤變離牧牛也謙初六變九是已坤變離柔麗中正畜之以剛二畜牛也離六二六五是已牧者以柔養剛畜者以剛制柔王洙本作牝牛艮為山為徑路為小石為門闕為果蓏為閽寺為指為狗為鼠為黔喙之屬其於木也為堅多節艮積於下止於上二隂含陽土石聚焉蒙賁剝大畜咸遁蹇漸旅皆曰山以三畫卦言也為丘為陵為陸者以重卦言也髙平曰陸大陸曰阜大阜曰陵而丘有一成再成三成如昆侖亦曰丘故重艮以三為陸四為陵五為丘上為山太𤣥九地七為下山八為中山九為上山準易也漸九三艮漸坤髙者平矣髙平曰陸上九動成六六降九升亦髙者平也同人九三動以四為陵震六二以四為陵漸五應二而歷四三亦曰陵賁六五頤六二拂五渙四以五皆曰丘隨上六升六四以九三升而之上皆曰山坎五艮言丘陵足矣又曰山川丘陵者坎變則蒙極其險言之五行以艮為土太𤣥以山為金者山土石也石者土之實故為土石金類也故又為金震為大塗動而行莫之止也交艮為徑路止而行行而止也艮者震之反山徑之蹊則行者改步矣又為巷者通乎家以達內外二為蒙山土石也水流山則土去而石見故艮坎為石為小石豫六二以四為石是也困六二否艮交坎故困于石漸六二曰磐者二五相易坎變巽艮艮為石也闢乾為門闔坤為户艮土東北當啓閉之際門闕也艮為宗廟者六也一六坎也坎者鬼之所歸太𤣥以一六為廟故艮為門闕在宗廟之位為廟萃震渙損是也為宫者止於中也太一出陽入隂息于中宫坎艮坤為宫在旅為次在野為廬又為牖者宫之户坎其傍以通明也故艮坤坎離為牖巽為草木艮陽止也止於上為果止於下為蓏蓏瓜瓠之屬乾為圜為閽寺者閽守門者也寺守巷者也郭璞筮遇豫之小過曰當有羣魚入州城寺舍言小過艮也艮為手又為指者在上體為手指止者動也在下體為足指動者止也震動艮止相反也曰趾者趾在下體之下鼎足亦謂之趾噬嗑初九賁初九鼎初六艮初六三爻以初應四皆艮止震動而在下體之下故曰趾或曰大壯夬初九何取於艮曰大壯遁之反也遁艮為指反而成震為足指夬即大壯積而成剛故曰壯于前趾前趾謂大壯也趾又謂之􅡑者􅡑足大指也拇手大指也陽為大咸初六感九四解九四應初六皆以隂變陽而解者蹇之反解震即蹇艮也為狗上言艮為狗者狗馬之狗也此言為狗者熊虎子字當作豿爾雅曰熊虎醜其子狗蓋虎子未有文猶狗也虞翻馬融郭璞以兌艮為虎艮者寅位也艮究成兌故艮為虎子又為黔喙之屬成兌則坤交乾而有文矣為鼠者艮交坎也天文虛為鼠玉衡之星為鼠其艮之九三爻乎晉九四是也郭璞筮遇咸之井曰東方當有蟹鼠為災亦艮坎也坎虛在子故子為鼠晝止者艮也夜動者坎也穴土者艮也隱伏而竊者坎也蟹或化鼠焚蟹致鼠坎離交也艮反為震故有緣木之鼠坎極成離故有飛鼠火鼠豹文之鼠鳥鼠同穴者坎離之合乎鼷鼠食牛者水土相傷乎傳曰曾磎之鼠水下出焉是亦艮坎而已為黔喙之屬者坎為𤣥坎變艮則𤣥在前故鄭康成曰取其為山獸寅為虎貍亦是也寅即艮也屯六三艮震為鹿角者艮之陽蹄者震之陽躁者震也止而伏者艮也隂生而鹿角解震反巽也陽生而麋角解巽反震也麋鹿類也故麋與鹿游龍震也故鹿與龍游劉牧曰鹿性決躁其角反生震象也頤九四革九五兌艮為虎上六為豹解九二未濟艮坎為狐或曰艮兌一也革上六何以為豹曰上六隂爻離九三文之過也天文箕為豹尾為虎同在艮履何取於艮乎曰伏艮也其於木也為堅多節者坤為衆多堅節乾剛也三索故多節否九五堅多節之木在田上上𤣥下黃桑也郭璞筮遇家人之蒙巽變艮為髙松松堅多節也為鼻者傳曰鼻者面之山兌為口山澤通氣故鼻口相為用噬嗑六二動故噬膚滅鼻睽六三艮成兌刑其鼻也故其人天且劓或為膚為皮革者皮兼肌言之曰膚肌其隂也肉為隂充其膚者陽氣也馬融曰柔脆肥美曰膚皮者捨肉而言革則堅矣通鳥獸言之艮之陽也為虎為狐兌為澤為少女為巫為口舌為毁折為附決其於地也為剛鹵為妾為羊澤者水之聚二陽沈於下一隂見於上乾陽為美陽沈於下鍾美矣太𤣥之沈曰隂懷于陽陽懷于隂志在𤣥宫然坎兌一也故坎壅成澤澤決成川為少女為巫者兌變巽兌為口尚口而巽進且退者巫也巽九二是也或為史升而為史降而為巫尚口則一也為口者說見於外也為舌者動於內也口為言太𤣥四八為金於五事為言為辭者言成文也乾三動成兌離是也笑者目動而聲出於口故兌離又為笑為嘻嘻者笑無節也嗟者憂而發於聲也笑者得位得應喜而後笑也嗟者失位失應憂而後嗟也號者大聲出於口也故兌巽為號巽為風風者天之號令風鳴竅穴有號呼之象號咷者號哭之聲號呼而又有哭象也告者決之也或取決於彼戒者告戒也問者有所疑也允者口順從也訴者恐懼而訴也食者口就之也不食者口不應也明夷初六可食而不食者義不食也頤為求口實者兌變臨也咸九五曰脢者口之下心之上也為毁折者隂見則陽毁隂升則陽折物極而窮噬嗑六二上九為減離九四為弃毁也豐大象九三離上九之五鼎四之初為折泰兌變賁之離坎艮為無敢折獄又為刑殺者兌正秋也變坎為刑自決有罪言之坎為獄自屠畜言之坎為血故蒙初六曰刑人豐曰致刑歸妹曰刲既濟曰殺萃獨曰用大牲者有殺牛之象無坎血也為附者兌反艮也為決者兌也隂盛陽微則陽附隂陽盛隂微則陽決隂剝一陽五隂故曰山附於地夬一隂五陽故曰剛決柔也或附或決時也其於地也為剛鹵者水動而往剛留于澤為鹵剛而柔為沙需之九二是也水畜于澤下為鹹鹹無水亦鹵困之大象是也主父偃所謂地固澤鹹鹵不生五穀鹹亦謂之鹵鹹生鹵也鹹澤之下成𤣥精洞穴中水凝為鍾乳黃帝書曰濕化生金石虞翻曰乾二陽在下故剛澤水潤下故鹹沙水中之陽陽動而水泉動水動生沙剛其陽也柔者散而未聚也沙聚成石沙石生金兌反為艮艮兌之陽皆乾醫書寒入水府為沙石寒亦乾也為妾者遁九三兌女伏於下與艮同位艮小子坤為臣臣僕也故以伏兌為妾六四兌來奔初為妾自初言之得妾也傳曰聘則為妻奔則為妾巽離女也兌獨為妾者娶論年德而得妾者以其子故常少為羊鄭康成本作陽虞翻本作羔今從鄭鄭曰此陽謂為養無家女行賃炊爨今時有之賤於妾也案爾雅陽豫也郭璞引魯詩曰陽如之何又曰今巴濮之人自呼阿陽璞筮遇咸之漸曰兌為賤女戲倒隂陽蓋咸兌變巽隂陽顛倒遁九三鼎初六之四爻位皆正咸漸之變爻位不正故為賤妾陽妾之賤者也歸妹六三兌女不正為須須賤女陽之象乎為常先儒謂西方之神誤也當在坤後簡編錯亂耳且坤為常以隂從陽常也地從天子從父臣從君婦從夫少從長卑從尊故坤順得常又曰後得主而有常屯六二二五相易十年乃字為反常需初九需于郊不犯難行須六四下文而後行師六四隂從陽當順九二知其不可變而反次皆曰未失常為輔頰乾艮為輔乾為首艮止於上輔也又為輔頰者連兌也而悅於首頰面頰也漢上易傳卷九
