body:
  text: 漢上易傳卷二宋朱震撰上經乾下坤上泰小徃大來吉亨彖曰泰小徃大來吉亨則是天地交而萬物通也上下交而其志同也内陽而外隂内健而外順内君子而外小人君子道長小人道消也小者自内而徃大者自外而來隂陽之氣徃來相交故亨交以正故吉吉亨者吉以亨也以天地言之乾坤交而成震震萬物通也天地之泰也以上下言之上下交而二五不失中其志同也君臣之泰也不交則不通不同則不交此再言泰小徃大來所以吉亨也以氣言之内陽而外隂則通以徳言之内健而外順則通以天下言之内君子而外小人則通泰者通而治也是故君子内則其道日長小人外則其道日消如是則能存泰而不入於否矣關子明曰乾來内坤徃外則君子闢小人闔故名之曰泰反是名之曰否作易者其闢君子而通小人之闔也故以君子名其卦在卦氣為正月故太𤣥準之以達交象曰天地交泰后以財成天地之道輔相天地之宜以左右民泰者天地交也財成輔相者以人道交天地也兊刻制坤成物因天地之道而財成之也則物不屈於欲震左兊右輔相也因天地之宜而輔相之則人不失其利左右亦震兊也坤為民財成輔相以左右民者立人道也財裁古通用初九㧞茅茹以其彚征吉象曰拔茅征吉志在外也茅上柔下剛而潔白君子之象也拔其一則其根牽引連茹而起君子引𩔖之象也茹根也三陽同志外有應初九上應四四來援之成巽初徃成震震為蕃鮮巽為白茹者初九之剛也𥘉徃則二三同𩔖牽連而進伏艮而手拔茅連茹以其彚征也征正行也利於正行故吉君子在上必引其𩔖将以合君子之𩔖併天下之力以濟其道於泰不然小人以朋比而強君子以寡助而弱亦何由泰哉九二包荒用馮河不遐遺朋亡得尚于中行象曰包荒得尚于中行以光大也兊為澤震為萑陂澤荒穢之象二之五以陽包隂包荒也坎為大川出乾流坤行於地中河之象也震足蹈川徒渉也徒渉曰馮馮河也勇於蹈難而不顧者也二近五逺不遐遺也陽與陽為朋二絶其𩔖而去朋亡也人狃於泰政緩法弛之時當有包含荒穢之量以安人情用馮河越險之勇以去弊事民𨼆忽於荒逺人材失於廢滯故戒以不遐遺近已者愛之逺已者惡之大公至正或奪於私昵故戒以朋亡四者具乃得配六五而行中道所以然者光明廣大不狹且陋也六五柔中以下九二二剛中而配五坎離日月充滿六合而无私照其道光大如是則无一物不泰矣易言道大无所不容者曰光大思慮褊狹者未光大陋之謂也時已泰矣苟淺中不能容之則輕人才忽逺事植朋黨好惡不中不足以厭服人心天下復入於否六五曰中以行願也九二曰中行中道者所以存泰也横渠曰舜文之治不過是矣九三无平不陂无徃不復艱貞无咎勿恤其孚于食有福象曰无往不復天地際也𥘉二上徃四五復位坤平衍也化為山澤平者陂矣若九三不守其位而又徃上六坤復泰将成否故戒之觀无平不陂則知无徃不復矣九三在天地之際徃者當復泰者當否時将大變唯艱難守貞確然不動乃无咎三與上六有孚者也隂陽失位為憂憂恤也三上相易恤其孚也天地反復之際外之小人必因内之君子有危懼之心乘隙而動著信於我君子應之則大事去矣禍至於覆其宗艱貞勿恤其孚不以利􅊣之心移其守以拒險詖之勢以塞反復之路自信而已于食有福矣兊為口三陽為福君子之干祿也修身俟命人之信否无以為也故能永享安榮與有泰之福或曰時運已徃艱貞其如何曰天人有交勝之理闗子明曰象生有定數吉凶有前期變而能通故治亂有可易之理大哉人謨其與天地終始乎六四翩翩不富以其鄰不戒以孚象曰翩翩不富皆失實也不戒以孚中心願也陽實為富隂虗為貧以用也鄰五與上也陽必求隂隂必求陽隂陽之情也三陽在下上與三隂相應故隂得其主而安於上君子在内小人安於外之象也三陽相率而往三隂失實各復其所故翩翩然下之𥘉六成巽巽為雞而五與上亦從之而復不富而用其鄰也不富者失實也翩翩者回翔而後下之意譬如葉墜井中翩翩而下以井氣扶之也君子𥘉去位小人猶有顧忌君子盡去然後飛揚矣君子有益於世如此可使一日去位乎兊口戒也上下相應孚也君子往則小人來兊象毁不戒以孚也不正之間獨行正者君子之願也衆正之間而行不正者小人之願也願皆出於中心而分君子小人者正不正之間耳是以君子艱貞聖人言此眀天地将閉上下各復其所雖有聖智莫能止也易傳曰理當然者天也衆所同也泰既過中則變矣六五帝乙歸妹以祉元吉象曰以祉元吉中以行願也史謂湯為天乙又有帝祖乙有帝乙陽虎謂帝乙為㣲子之父而子夏謂帝乙歸妹湯之歸妹也湯一曰天乙亰房載湯歸妹之辭曰无以天子之尊而乘諸侯无以天子之富而驕諸侯隂之從陽女之順夫本天地之義也徃事而夫必以禮義則帝乙湯也五君位乾九二居之帝也帝天徳也女以嫁為歸震為長男兊為少女由長男言之妹也六五降其尊位下交九二帝乙歸妹之象也五以柔中下交九二剛眀之賢而順從之九二復以剛中上交於五而其道上行五以是成治泰之功則以中道致福而獲元吉也故曰以祉元吉祉福也元吉者吉之至善也夫上交於五者豈唯九二之願亦六五之願二五道行君臣並吉非其願乎故曰中以行願也上六城復于隍勿用師自邑告命貞吝象曰城復于隍其命亂也上六治極而亂以一卦言之闕土為隍積而成城泰兊之象城髙而墜復歸於隍泰反為否也師衆也坤為衆城復于隍則天地閉塞君失其民故勿用師邑二也巽為命泰兊口為告坤為亂四之𥘉成巽告命也五之二自邑告命也上之三成坤其命亂也當是時雖九五正其道不行於下貞吝也雖自邑人人而告諭之其命曰亂不可正矣盖泰之方中君臣同心乃可以治泰過此則變必至於大亂而後己坤下乾上否之匪人不利君子貞大徃小來彖曰否之匪人不利君子貞大徃小來則是天地不交而萬物不通也上下不交而天下无邦也内隂而外陽内柔而外剛内小人而外君子小人道長君子道消也天地相交是生萬物其卦為泰人於其中為天地萬物之主觀之人則天地相交萬物咸備故三偶在上三竒在下鼻口居天地之中交泰也天地當交而否之匪人道也聖人位乎兩間以立人道否之則人道絶滅矣故曰否之匪人泰𥘉三四上得位二五以正相易正者衆君子多也否初三四上不正二五獨正正者少不正者衆小人多也泰多君子否多小人豈降之才有殊哉否時君子消小人長自中人以下化之為不正雖有君子寡徒少偶難乎免於衰世於是有善人載尸哲人之愚括囊无咎无譽故曰不利君子貞大者自内而徃小者自外而來乾坤不交震反成艮艮者萬物之終也故曰萬物不通也坤在上為邦在下為邑治天下之道自庶人達於大夫大夫逹於諸侯諸侯逹於天子上下不交坤反於下則民困而主不恤下怨而上不知俗已敗而政不修雖有邦國内外塞矣故曰天下无邦也以氣言之内隂而外陽乾闔而坤也以形言之内柔而外剛氣反而死也一隂自姤長而為遯為否小人之道日長君子之道日消其禍至於空國而无君子極坤疑乾君臣相傷故聖人於此終言之象曰天地不交否君子以儉徳辟難不可榮以祿天地不交上下否塞也泰坤吝嗇儉也兊澤險難也震蕃鮮榮也否反泰乃有君子當天地不交之時以儉徳避難不食而遯去雖有厚禄不可榮之之象𥘉六㧞茅茹以其彚貞吉亨象曰㧞茅貞吉志在君也𥘉六自下引九四以退有艮巽九四應初巽成震艮為手㧞也巽為白震為蕃鮮上柔下剛而潔白者茅也茹九四之剛也三陽同𩔖以其彚也四應𥘉正也能與其𩔖退而守正得處否之吉身雖退伏其道亨矣五為君四近君志中也屈伸進退相為用也君子之退以小人得志故安於下以俟其復未甞一日忘君也君子所以屈而能伸退而能進此否所以為泰之本歟故曰㧞茅貞吉志在君也六二包承小人吉大人否亨象曰大人否亨不亂羣也五包二二承之包承也順以承上小人之正也六二在否之時得位在内小人也故曰小人吉九五中正在外包小人而容之雖包小人而亦不亂於小人之羣坤為亂三隂小人羣也包則和不亂羣則不流此大人處否而亨歟不曰君子者處否而亨非大人不能若同流合汙則否而已焉得亨天地相函隂陽相包否六二六三姤九三皆以陽包隂大者宜包小也六三包羞象曰包羞位不當也六三得時進而處上九四辭尊退居於下見六三則包容之而六三始有處不當位之羞何以知其羞乎體巽而自動是以知其羞也管仲謂齊侯恭而氣下言則徐見臣有慙色是也六二六三小人之致否者也君子與之力争則否結而不觧矣自古君子不忍於小人以及禍害者常多故易為君子謀必包容之使下者知所承上者知所愧庶幾有泰之漸也三四相易巽成離離為目羞愧之象與恒九五或承之羞同九四有命无咎疇離祉象曰有命无咎志行也九四否道已革故於此言濟否之道四為朝廷五為君巽為命疇𩔖也祉福也九四剛而履位有濟否之才而近君能下君命於朝廷五錫以六二之祉福則陽徳亨矣否可以濟矣人誰咎之哉四應初三應上君子之𩔖附麗其祉以進九四之志行乎下矣五錫二成離離麗也志者中也荀諝謂志行乎羣隂也易傳曰君道方否據逼近之地所惡在居功取忌若動必出於君命威福一歸於上則无咎而其志行矣九五休否大人吉其亡其亡繫于苞桑象曰大人之吉位正當也休息也九四否道已革九五息否之時二五相易隂息於五故曰休否言九五之動也大人居尊位正也中正而健徳當乎位也位者聖人之大寳雖有其徳无其位不可也有其位无其時不可也息天下之否者其惟有其位有其徳又有其時乎故曰大人之吉位正當也言九五之不動也然未離乎否也故又戒之九五不動不能與二相易則安其位者也保其存者也有其治者也安其位者必危保其存者必亡有其治者必亂故曰其亡其亡此又因九五不動以眀戒也苞桑其葉叢生者也巽為木上𤣥下黄三陽積羙而根於坤土其根深固苞桑也巽為繩繫也維也慮其危亡且亂當繫之維之使其根深固以防否之復故曰繫於苞桑如是則大人吉非位正徳當能无凶乎易傳曰漢之王允唐之李徳裕不知此所以致禍敗也上九傾否先否後喜象曰否終則傾何可長也上九否之終天運極矣人情厭矣君子動於上六三應於下否毁兊成如決積水而傾之莫之能禦也始也否塞先否也終也傾否後喜也兊為説隂陽得位為喜巽為長理極必反否終則傾何可長也易傳曰反危為安易亂為治必有剛陽之才故否之上九則能傾否屯之上六則不能變屯離下乾上同人于野亨利渉大川利君子貞彖曰同人柔得位得中而應乎乾曰同人同人曰同人于野亨利渉大川乾行也文眀以健中正而應君子正也唯君子為能通天下之志姤隂自𥘉進至二成卦以隂居隂得位也二得中也乾九五位正徳當二以柔順應之各得其正而其徳同故曰同人人道父子君臣夫婦朋友長幼其位不同而相與㑹於大同者中也過與不及睽異而不同矣人受天地之中以生未始不同得其所同然則心同心同則徳同故曰柔得位得中而應乎乾曰同人此以二五釋同人之義也乾天也曰同人何也三畫以𥘉為地以二為人三為天重卦四即𥘉也五即二也上即三也六二應乎九五同人也以其同人故曰同人曰同人上九天際也故曰野野者曠逺无適莫之地常人之情其所同者不過乎暱比之私而同人之道不以繫應達于曠逺无適无莫其道乃亨有一不同為未亨也同人至于上九則逺近内外无不同者故曰同人于野亨二自下至上皆成兊澤決為大川險阻艱危之象乾健也能與天下同之其行健矣則險阻艱危何徃不濟故曰利渉大川乾行也乾行自子至已坤行自午至亥二柔上進乾爻下行不曰坤行者同人坤變乾𥘉九子上至已聖人因以寓乾坤之行焉坤為文坤變離為文眀文理也萬物𣪚殊各有其理而理則一聖人視四海之逺百世之後如跬歩如旦暮者通於理而已惟燭理眀則能眀乎同人之義然非克已行之以健不蔽於欲者不能盡其道克己則物我一矣文眀以健然後中正无私靡所不應天下之志通而為一夫同人之義以四言該之文眀也健也中也正也以一言盡之正而已矣不正則燭理必不眀行已必不剛施諸人必無相應之理反求於心不能自得其能通天下之志乎故曰文眀以健中正而應君子正也唯君子為能通天下之志此合二五兩體以言同人之才也易傳曰小人惟用其私意故所惡者雖是而異所比者雖非亦同其所同者則阿黨蓋其心不正也故同人之道利在君子貞以卦氣言之為七月故太𤣥準之以昆象曰天與火同人君子以𩔖族辨物天體在上而火炎上二五相與天與火也同人之道同而无間如天與火然故曰天與火同人離麗也一隂麗於二陽陽本乎天炎上者𩔖也故君子以𩔖族然乾陽物也離隂物也其物各異故君子以辨物𩔖族者合異為同辨物者㪚同為異𥘉九同人于門无咎象曰出門同人又誰咎也𥘉九動艮為門人道同乎人者也同人於門内不若同人於門外之為廣也故曰同人於門𥘉九動失正宜有咎四來同之初四各得其正盖善者人之所同然其誰咎我哉故曰出門同人又誰咎也六二同人于宗吝象曰同人于宗吝道也二徃同五復成離五來同二復成乾徃來相同乾離各反其本宗同人于宗所同狹矣吝道也易傳曰同人不取君義私比非人君之道六三伏戎于莽升其髙陵三嵗不興象曰伏戎于莽敵剛也三嵗不興安行也離為甲胄為戈兵三動有震巽艮之象震巽草木莽也艮為山在下體之上陵也震為足巽為髙升于髙陵也三不動則伏戎于莽言九三剛而不中不能同人與五争應二者五之所同九三貪其所比據而有之故伏戎于莽將以攻五慮其不勝又升髙陵而望焉然五陽剛居尊位二本同五非三之所當有於義屈矣故望其敵知其不可犯也反於中知義不可行也乃退而守下比於二二亦自若然則非道而同乎人者動而争之不可得也不動而比之不可得也奚益矣終其能行哉故曰伏戎於莽敵剛也三歳不興安行也乾為歳三歳三爻也九四乘其墉弗克攻吉象曰乘其墉義弗克也其吉則困而反則也九三動而争二成坤土在内外之際墉也九四乃欲擣虚自上乘之故曰乗其墉四動入坎險有弓矢相攻之象故曰攻三非犯已二非已應雖乘墉入險豈其宜哉故曰乗其墉義弗克也三動四乘之成坎四動上復乘之成兊兊坎困象也故曰困弗克攻則已矣何謂吉吉者正也謂其乘墉入險力已盡而二不應困而知反反而不失其則也是以吉則者理之正天地萬物之所不能違者豈𫝑力所能奪哉古易本云反則得則得則吉也一本云反則得得則吉也定本作其吉則困而反則也九五同人先號咷而後笑大師克相遇象曰同人之先以中直也大師相遇言相克也三伏戎於莽四乘其墉動而争二五成巽震坤坤為喪巽為號震為聲號咷也二非三四之所能有三四不動二自徃同於五離目動為笑理之所同非争之所能得非不争之所能亡故曰九五同人先號咷而後笑當三四動時九五若動而争之非用大師不能克三四之強而與二相遇坤為衆自上入險而克三三亦自下而克五有師之象言用力如是其難始克相遇遇非㑹之正也故曰用大師克相遇言相克也三五相克而與二遇豈㑹之正哉王弼謂執剛用直不能使物自歸是也然同人之先號咷何邪曰以中直也直者乾之動也理之所在也理直矣三四抑之望人者深故號咷也觀乎所同物情見矣是故不得其所同則怨怨而无告則號咷隨之豈惟人哉鳥雀亡其𩔖則啁啾而鳴犬獸亡其羣則躑躅而悲未有失其所同不如同人之先者也易傳曰九五君位而爻不取人君同人之義者盖人君當與天下大同而五專以私暱應於二失其中正之徳非君道也又先隔則號咷後遇則笑乃私暱之情非大同之體也二之在下尚以同於宗而為吝况人君乎上九同人于郊无悔象曰同人于郊志未得也上九在外逺於二未得志也動而得正内同九三雖未得二不為无所同也故動而无悔九三乾天際而在内外之交有郊之象同人於剛健之爻三伏戎四乘墉五用大師上九逺於二處不争之地動而无悔九三自至同人之義其在於不與物争而物情自歸乎乾下離上大有元亨彖曰大有柔得尊位大中而上下應之曰大有其徳剛健而文眀應乎天而時行是以元亨小畜柔得位而上下應之六四也六四畜之以巽是以小畜大有柔得尊位則有利𫝑得大中之道則得人心而又執柔履謙有而不恃故上下五陽皆應能有其大六五而言大中五者大中之位柔得之也故曰大有不言有大者大不可有也此以六五一爻言有其大夫天下至大也有其大者未必能元亨致元亨者由乎其才内乾剛健也外離文眀也剛健則不息文眀則能順萬物之理而眀有是徳矣推而行之不失其時者隨天而行也盖六五自同人之二固始以正矣以時而行是以元亨此合兩體推原六五言大有之才也才者能為是徳者也同人曰文眀以健大有曰剛健而文眀何也同人九五健矣不言剛者剛天徳不可為首不言剛抑之也大有六五柔得尊位嫌於剛不足故曰剛健或曰大有師賔之道也曰大有尚賢自六五言上九乃有師賔之象彖言尚賢者唯大畜也象曰火在天上大有君子以遏惡揚善順天休命大有自垢一隂四變皆有惡與善之象惡者不正也善者正也乾陽休善也巽命也至于五變成離離為火在天上眀盛大有之時惡者遏絶善者顯揚此豈人力之所能為哉順天休命而已故古者進賢退不肖之命謂之休命或謂之眀命𥘉九无交害匪咎艱則无咎象曰大有𥘉九无交害也𥘉九守正无交在他卦未有害大有柔得尊位大中上下應之而𥘉九无交則害也正匪可咎艱以守正擇可而後交則无咎交道難不可苟合也四來下𥘉巳乃可動此王丹自重之爻乎九二大車以載有攸徃无咎象曰大車以載積中不敗也六五不有其大屈體下交九二而倚任之猶大車也坤為輿乾變坤為大車九二剛中而居柔剛則不勝中則不過居柔則謙順具此三者徃之五以任天下之重猶車載大有物歸者衆富有之時六五中而未極故有攸徃无咎徃之得正也盛極則不可徃矣陽為重五中也積重其中而剛不傾撓積中不敗也大車以載者貴夫積中不敗也大有六五而任小才不勝其任矣九三公用亨于天子小人弗克象曰公用亨于天子小人害也二者君之位春秋傳晉文公將納王使卜偃筮之遇大有之睽曰吉遇公用亨于天子之卦戰克而王亨吉孰大焉杜預曰大有九三爻辭也則卜偃時讀易作公用享于天子杜預亦然京房曰享獻也干寶曰享燕也姚信作享祀義雖小異然讀為享則同今從舊讀三五相交三乾變離兊乾為天離為日兊為澤卜偃謂天為澤以當日天子降心以逆公是也夫天子施澤於下降心而説有粲然之文者莫如公之享於天子也天子饗諸侯之禮必於祖廟六五承上九宗廟饗於祖廟之象也上六備九獻之禮乃以圭鬯祼賔客設大牢體薦之爼備金石之樂升歌下管於獻酬之時王以琥璜繡黼束帛送爵坤離為文眀三五相際之象九三剛健而正與五同功故用此爻當天子之饗則无驕亢矣若小人處之柔弗勝其任處之不當必有滿盈之害豈特害於而家哉三五既交易剛為柔聖人因柔以著戒焉九四匪其彭无咎象曰匪其彭无咎明辨晳也彭子夏傳讀作旁旁盛滿貌離大腹象也大有至四盛矣昧者處之盈滿而不知變安得无咎九四不安其位震見離毁懼而守正抑損不至於滿匪其彭故无咎所以然者以其眀而辨於盈虚之理甚白也離為眀兊口為辯晳荀氏作晣六五厥孚交如威如吉象曰厥孚交如信以𤼵志也威如之吉易而无備也五執柔守中以誠信交於下而其孚在二孚信之應也二交於五體異志同厥孚交如也二以誠信交五發五之剛志謂之發者五本有剛因二而發之信以發志積誠不巳至於不怒而威則吉威剛嚴也六柔變九而在上威之象也大有之時人心安易若專尚柔順則下无戒備凌慢生矣二乾為易交五離變乾二復成離離為戈兵下有戒備之象易傳曰夫以柔孚接下衆志悦從又有威嚴使之有畏善處大有者也上九自天祐之吉无不利象曰大有上吉自天祐也繫辭曰天之所助者順也人之所助者信也履信思乎順又以尚賢也是以自天祐之吉无不利此特曰大有上吉自天祐也上九大有之極盛極則衰凶將至矣而上吉者以自天祐也六五履信思順尚賢而人助之人助之則天助之吉无不利上五相易乾成兊兊為言而正信也坤順也乾為天兊為右右助之也上九動而正正則吉故曰大有上吉艮下坤上謙亨君子有終彖曰謙亨天道下濟而光眀地道卑而上行天道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙謙尊而光卑而不可踰君子之終也復三變剥四變皆成謙彖辭以剥上九言之者在上而降下者謙也處下而能卑者常也未足以盡謙之義上九降三六三升乎上此謙所以亨也尊卑相去其位不同於是情睽𫝑隔上下不通尊者既屈卑者𫉬伸然後上下交而功勲成矣以天地言之天道下濟地道上行萬物化生其道光眀而所以光明者陽濟乎隂也非謙亨乎曰濟曰光眀坎象也此以剥之上九六三升降言謙亨也天陽地隂鬼神者天地之大用人也者參天地而行鬼神者也天地也鬼神也人也以分言之則殊以理言之則一故觀日月之進退則知天地之虧益矣觀山川之髙庳則知地道之變流矣觀人事之得喪則知鬼神之禍福矣觀物論之取捨則知人情之愛惡矣變禍為害者言不利也是數者无不以盈為去以謙為尚九在上盈也三徃損之則為虧盈為變盈為禍盈為惡盈三在下謙也九來益之為益謙為流謙為福謙為好謙流之者坎也益之福之好之者陽也此再以上九六三論盈虚之理眀謙也九三自上位降而言之則尊而光天道下濟是也自九三卑位言之則卑而不可踰山在地中是也謙之為徳其至矣乎所處尊矣道則彌光也所執卑矣而徳則彌尊也君子觀諸天地驗諸幽眀故處卑而不争居尊而能降愈久而不厭乃能有終故曰君子有終此再以九三言君子體謙而終也上者外卦之終三者内卦之終也以卦氣言之小寒也故太𤣥準之以少象曰地中有山謙君子以裒多益寡稱物平施裒鄭荀諸儒讀作捊取也字書作掊山在地中則髙者降而下卑者升而上髙卑適平劉表曰謙之為道降已而升人者也以象考之上三隂多也下二隂寡也艮為手掊也故君子取有餘益不足以貴下人則貴賤平矣以財分人則貧富平矣以徳分人則賢不肖平矣然物之不齊物之情也所謂平者非漫无尊卑上下差等也稱物而施適平而止平者施之則也坎為水天下之平施者无水若也初六謙謙君子用渉大川吉象曰謙謙君子卑以自牧也𥘉六本復之六三以柔退居謙之下謙之又謙者也謙謙故能得衆用之以犯大難况居平易乎三坎為大川𥘉動之四成巽股渉大川也自牧者自養也牧畜者擾之得其宜一童子自後鞭之足以制其剛夫然後其剛可用也坤為牛艮為少男𥘉處柔在内其動剛卑以自牧也君子卑以自牧則能謙謙則能得衆此爻施之於自牧則可施之於他則卑已甚矣六二鳴謙貞吉象曰鳴謙貞吉中心得也謙自𥘉六卑以自牧積其徳至於六二柔順而中正其樂𤼵於聲音而不自知故鳴謙動成兊兊為口為説雖鳴也而非求應以正為吉吉自有也是以求福不回守正而已非中心自得無待於外者能之乎何以知其自得以鳴謙也九三勞謙君子有終吉象曰勞謙君子萬民服也坎勞卦三與五同功九三勞而有功以陽下隂安於卑下艮見兊伏勞而不伐有功而不徳君子致恭以存其位之道也内卦以三為終故曰勞謙君子有終吉夫有血氣者必有争心故有能而矜之有功則伐之未有不争争則危矣九三致恭上下五隂宗之萬民服矣其誰争之所以能存其位存其位所以有終吉也萬盈數合乾坤隂陽之䇿乃盈是數唯天地之元始生萬物足以當之易言萬國萬民萬夫大之辭也易傳曰古人有當之者周公是也六四无不利撝謙象曰无不利撝謙不違則也六四坤體柔順而正上以奉六五之君下以下九三勞謙之臣上下皆得其宜故曰无不利撝謙艮為手止也震起也手止而復起有揮㪚之象六四揮㪚其謙之道布於上下撝謙也所以奉上下下无不利者非事是君為容悦也非持禄養交也不違其則而已人之大倫天下之正理也理之所至天地萬物之所不能違故謂之則不違其則无徃不得其宜則无徃不利矣子夏曰撝謙化謙也言上下化其謙也京房曰上下皆通曰揮謙是也謂三撝之四化之誤矣六五不富以其鄰利用侵伐无不利象曰利用侵伐征不服也陽實富也隂虚貧也鄰謂四與上也以用也能左右之也富而能以其鄰者常也不富而能以其鄰者以六五處尊位而謙虚也能以其鄰則能得衆得衆故利用侵伐无不利五動成離坎上與四變有弓矢甲胄之象以其鄰也動之二入坎險侵伐也征者上伐下以正而行也司馬法曰負固不服則侵之聖人慮後世觀此爻有戈兵妄動不省厥躬者故𤼵之曰征不服也六五謙虚六二恃險不應乃可以侵伐禹征有苖是也若我不謙虚彼不肯服自其宜也上六鳴謙利用行師征邑國象曰鳴謙志未得也可用行師征邑國也六五征不服上六又曰征邑國者征邑國非侵伐也克已之謂也君子自克人欲盡而天理得則誠誠則化物无不應有不應焉誠未至也上六極謙至柔九三當應止於下而不來故鳴隂陽相求天地萬物之情坤為牛應三震有鳴之象故曰鳴謙鳴而求應志未得也然則如之何反求諸已而已其在勝已之私乎克已則无我物我誠一則物亦以誠應之矣坤在侯位為國在大夫位為邑上至二體師上以正行之三正也三之上坎險平征邑國也故曰可用行師征邑國也易傳曰邑國已之私有也征邑國謂自治其私也坤下震上豫利建侯行師彖曰豫剛應而志行順以動豫豫順以動故天地如之而况建侯行師乎天地以順動故日月不過而四時不忒聖人以順動則刑罰清而民服豫之時義大矣哉豫謙之反謙九三反而之四四動羣隂應之其志上行以順理而動也我動彼應豈不豫乎豫和豫也休逸閒暇之謂也故曰豫剛應而志行順以動豫此以九四合坤震二體而言豫也謙九三在三公之位自二以上有師體反之則三升四四為諸侯三公出封之象故利建侯師動而徃行師之象故利行師二者皆順以動周之大封湯武之征伐无非順民欲也順民欲則民説之説豫也豫順以動雖天地之大猶不能違故天地如其理而動而况建侯行師乎乾坤天地也坎有伏離日月也二至也天之動始於坎厯艮與震而左行地之動始於離厯坤與兊而右行是以日月㑹為牽牛萬物成於艮故曰天地以順動故日月不過而四時不忒此以九四互體論坤震之義也坎為律刑罰也坤為衆民也艮止也聖人之動必順乎萬物之理法之所取必民之所欲也法之所去必民之所惡也故法律止於上刑罰清簡也衆止於下民服從也故曰聖人以順動則刑罰清而民服此以互體之坎變艮推廣坤震以盡豫之義也然意味淵長言之有不能盡故夫子賛之曰豫之時義大矣哉易傳曰豫遯姤言時義坎睽蹇言時用頤大過解萃言時各以其大者也以卦氣言之春分也太𤣥準之以樂或問互體之變有幾曰體有六變春秋傳畢萬筮仕於晉遇屯之比辛廖占之曰震為土車從馬足居之兄長之母覆之衆歸之六體不易廖以震坤合而言六體也且以豫卦九四論之自四以上震也四以下艮也合上下視之坎也震有伏巽艮有伏兊坎有伏離六體也變而化之則无窮矣故曰雜物撰徳其微顯闡幽之道乎象曰雷出地奮豫先王以作樂崇徳殷薦之上帝以配祖考雷之出地奮然而作萬物豫之時也九四具天地日月雷霆風雨萬物化生作樂起於冬至黄鍾之象郊野者天際也在内外之際為郊坤為牛坎為血陽為徳豫自復三變初九升四作樂崇徳也殺牛於郊薦上帝也上帝乾在上之象殷盛也自四至上震變坤坤為衆故曰殷禮有殷奠殷祭言盛也五變比乾為考六變剥乾為祖以配祖考者報本反始也初六鳴豫凶象曰初六鳴豫志窮凶也四者豫之主初六不中正而順從逸豫者也初四相易成震震為聲有相應而鳴之象從逸豫而發於聲音者也故鳴初六豫之始於其始也鳴豫至於末流則志窮而凶中為志謂四也初復動而之四則止而不行其志窮矣太康后羿之事乎六二介于石不終日貞吉象曰不終日貞吉以中正也四艮為石初三不正二介於不正之間上交於三而不諂下交於初而不瀆確然如石不可轉也夫始交者安危之幾不諂不瀆則不過乎中故曰介于石三為内卦之終二動離為日不終日也所謂幾者始動之微吉之端可見而未著者也離目為見見之是以不終日而作作則動也豫之時上下逸豫失正諸爻之才多與時合二以中正自守不溺於豫可謂見幾矣備豫之道也不俟終日而作以貞故吉貞者守正之謂也心不動則中正中也故見不中正也故見不正中正故知微知柔不罹於咎故曰介于石焉用終日六三盱豫悔遲有悔象曰盱豫有悔位不當也三四處位不當同而不和者也睢盱上視而不正也向秀曰小人喜悦佞媚之貌四豫之主三以柔順承之動成巽巽為多白眼睢盱上視佞媚以求豫而四不動則悔其動故盱豫悔三不能去且静而待之四又動故遲有悔悔其不動四艮體止於上三動巽為進退故動静皆有悔三猶豫如是无他位不當也小人悦於豫寧悔而終不以所處為不當而去之柔不正故也九四由豫大有得勿疑朋盍簪象曰由豫大有得志大行也四為豫之主五隂順從由已以致豫故曰由豫以一陽而從五隂大者有得也故曰大有得然不免於疑者在近君危疑之地无同徳之助衆隂不從五而從已也疑謂伏巽巽為不果坎見巽伏故勿疑盍合也五交四也言積誠不已下情通於上也坎為髪為通四剛在上下衆柔之際交而通之猶簪也髪非簪則㪚亂不理安有髪之柔順而不從簪乎夫朋歸巳而致疑於五者有二招權也專功也下情通於上上下既交以誠何疑於招權不有其功歸美於上其中洞然何疑於專功四五相易伏巽象毁則四剛中之志上行率天下而從五何疑於朋之衆乎五不疑四四不疑五君臣上下各守其正為由豫也大矣先儒以坎為髪何也曰以巽為寡髪而知也乾為首柔其毛也故湏象亦然六五貞疾恒不死象曰六五貞疾乘剛也恒不死中未亡也四以剛動為豫之主衆之所歸權之所主也五以柔溺沈㝠於逸豫而乘其上豈能制四哉六五受制於四而不可動亦不復安豫矣故此爻獨不言豫不可動則於正為有害故曰貞疾恒震巽也天地可久之道也六五動則有震巽恒久之象人君中正然後六二為之用九四同徳也何乘剛之有五不可動以失正也故九四為腹心之疾然主祭祀守位號而猶存者正雖亡而中未亡也中者人心也中盡亡則滅矣故曰貞疾恒不死言貞雖有疾其中固在能動以正則可久矣恒未嘗死也坤為死震為反生未亡之象周室東遷齊晉二伯託公義以令諸侯中未亡也失天下者多矣必曰豫者威權之失必自逸豫也䛕臣進女謁行大臣專主威則社稷移矣易傳曰若五不失君道而四主於豫乃任得其人安享其功如太甲成王也上六㝠豫成有渝无咎象曰㝠豫在上何可長也上六豫之中沉冥於豫成而不變者也坤為冥昧古之逸豫之人固有不恤名聲之醜性命之危而樂之者不知因佚樂之過變前之為乃善補過也何咎之有故曰成有渝无咎聖人發此義以勉夫困而學者焉上六動之三成巽巽為長四坎為可冥豫在上而不變未有不反何可言也震下兊上隨元亨利貞无咎彖曰隨剛來而下柔動而說隨大亨貞无咎而天下隨時隨時之義大矣哉隨自否來上九之初剛人之所隨柔隨人者也上九過剛而不反君子小人相絶非道也剛來下於柔柔徃而隨之下動而上説動而可説所以隨也自初九言之君子之道為衆所隨人君屈已以從善者也自初六上六言之臣下之奉命學者之徙義臨事之從長无非隨也故曰隨此以剛柔相易合兩體而言隨也上九之初大者亨也其亨以貞也上九過剛嘗有咎矣无咎者善補過也大者亨以貞利於正也又善補過至於无咎天下豈不動而説以隨之乎故曰元亨利貞无咎此以初九一爻言隨之道也易傳曰隨之道利在於正隨得其正然後能大亨而无咎失其正則有咎矣豈能亨乎春秋傳穆姜徃東宫筮之遇艮之八史曰是謂艮之隨姜曰是於周易曰隨元亨利貞无咎有四徳者隨而无咎盖穆姜時以元亨利貞為隨之四徳夫子作彖辭然後眀元亨利貞者大亨正非若乾之四徳也夫天下之隨君子者隨其正也君子之動者隨其時也時无常是以正為是君子得其正天下是之是之斯隨之矣天下之物静而在下莫如澤也驚蟄既至雷動於澤中澤氣隨之下者上静者動誰為之哉時也故曰大亨貞无咎而天下隨時然隨時之義非達權知變者不能盡或因或革或損或益人之所說不以強去人所不説不以強留如天地之隨時乃无咎矣故曰隨時之義大矣哉天下隨時王昭素曰舊本多不連時字王弼亦曰得時則天下隨之矣隨之所施唯在於時也胡旦曰王肅本作隨之篆字之為㞢時為峕轉隷者増日為時胡説為長在卦氣為驚蟄二月中故太𤣥準之以從象曰澤中有雷隨君子以嚮晦入宴息雷降於兊息於坤坤晦也澤中有雷嚮晦也天地之動静隂陽之眀晦自大觀言之晝夜之道也君子隨時之道著而易見者莫若隨晝夜也晝則嚮眀而動作夜則嚮晦而宴息自有天地以來未之能違者知此則知用天地隂陽矣君子日用而知小人日用而不知初九官有渝貞吉出門交有功象曰官有渝從正吉也出門交有功不失也五乾為君巽為命四受命於君以帥其屬官之象也初應四動其屬也初隨四四隨事事有變動剛而不知變不足以隨事渝變也故曰官有渝變有正否變而不正惟官是隨非交修不逮也不知大亨正无咎也九四變而正以剛下柔其道足以使人隨之初九隨之者隨其正也不隨其不正也正則吉故曰從正吉也人之情隨同而背異隨親昵而背疎逺故朋友責善或牽於妾婦附耳之語溺於私也初在内安之又比於二二初相易皆失正私昵之為害也故戒之以出門交有功四艮為門初捨二出交於四出門也出門交之不失其正何徃而无功故曰不失其正也易傳曰隨當而有功六二係小子失丈夫象曰係小子弗兼與也四艮為少男有乾父坤母小子也初震為長男有巽婦夫也隨利於正初九正也九四不正也二與四同功以情言之柔必隨剛隂必隨陽初九九四皆陽剛也其能兼與之乎四雖在上不正也初雖在已之下正也六二係情於四比初不專雖與之相比而情不親雖有中正之徳而所隨非其人其失在於不能權輕重也故曰係小子失丈夫弗兼與也臨事擇義於六二六三見之六三係丈夫失小子隨有求得利居貞象曰係丈夫志舎下也先儒舊讀舎音捨張弼讀舎與乾九二時舎也之舎同辭曰利居貞象曰志舎下也以舎訓居弼讀為長三四相比近也四三无應宜相親也以隂承陽以下隨上順也三寧失其親比而順者而係情於初以初正四不正也故曰係丈夫失小子三柔不能自立而隨初是去昏而隨眀背非而隨是違不善而從善得隨之宜也初亦以三同體而又下之故三之隨初有求而得艮為手求也初三相易得正也三苟知隨而巳不知自處以正人將拒我其能久乎蓋隨人宜以柔處巳當以正六三之隨利居貞也此三所以係初歟巽為繩係也九四隨有獲貞凶有孚在道以眀何咎象曰隨有獲其義凶也有孚在道眀功也三不隨四四據而有之獲也獲難辭也二與三當隨五為四所隔下而從初四在大臣之位處可懼之地與五争三能无凶乎三四易位正也雖正亦凶義不可有三故曰貞凶象曰其義凶也然四終不可以有三乎曰非不可有也動而有孚於道无意於有三而三自隨之可也初九其行以正所謂道也道之所在故初九為隨之主四動正與初相應有孚在道也四正而誠孚於道則三亦唯正之隨豈惟有三而二亦隨初是率天下以隨五而成隨之功也三四易位成離離為眀以眀則无獲三之咎无咎則无凶可知故有孚在道者眀之功也易傳曰孚誠積中動必合道故下信而上不疑古人有行之者伊尹周公孔眀是也九五孚于嘉吉象曰孚于嘉吉位正中也陽為美九五位正中美无以加於是矣故曰孚于嘉吉者誠信孚於二也二正中也五不有其美隨六二之中道則得物之誠二樂告以善故能不過而止於至善觀乎位正中則知孚於二而吉矣道之中天地萬物所不能違有之則生无之則死故謂之至善謂之至美雖子路之勇禹之智大舜之眀徳不能加毫毛矣易傳曰自人君至於庶人隨道之吉惟在隨善而已下應六二之正中隨善之義也或問午亦有美矣何謂陽為美曰隂舎陽以為美者也至兊而隂見陽伏至坤而萬物虚陽美盡則午之美亦盡故嘉之㑹者謂乾亨也坤品物咸亨者含𢎞光大也坤豈能專之是以坤三含美以從王天保歸美以報上上六拘係之乃從維之王用亨于西山象曰拘係之上窮也上六隨之窮也窮則變變則不隨然而隨者非禮義拘係之又從而維持之不能也三上相應三有艮巽艮手拘之也巽繩係之也上窮反三復成巽乃從而繫維之也拘之使不動係之使相屬繫維之使不得去三坤也坤為衆衆之悦隨上六固結有如此者昔周之太王用此爻以亨於西山杖䇿而去隨之者如歸市非得民之隨豈能使已窮而更隨至於不可解乎兊西也艮為山乾五為王三上徃來不窮亨也先儒以此為文王之爻誤矣故易傳正之曰周之王業盖興於此巽下艮上蠱元亨利渉大川先甲三日後甲三日彖曰蠱剛上而柔下巽而止蠱蠱元亨而天下治也利渉大川徃有事也先甲三日後甲三日終則有始天行也春秋傳秦醫曰於文皿蟲為蠱榖之飛亦為蠱在周易女惑男風落山謂之蠱尚書大傳曰乃命五史以書五帝之蠱事雜卦曰蠱則飭也則蠱非訓事事至蠱壊乃有事也泰初九之剛上而為艮上六之柔下而為巽剛上柔下各得其所事已治矣下巽而已莫予違也上亦因是止而不復有為則禍亂之萌乃伏於已治之中遂頽靡而不振亦何異於皿蟲榖飛男惑山落之類哉故曰剛上柔下巽而止蠱此以泰變合二體而言蠱也然而治蠱之道不逺在乎上下之志交而元亨則天下復治矣泰初九始也始而動剛柔相易而亨元亨也元亨而天下治始而亨者也兊為澤決之為川初九越兊成艮艮為指利渉大川也初九犯難顧望而不為蠱不可得而治矣上下志交動以濟大難徃事乎蠱也巽為事故曰元亨利渉大川徃有事也此因初上之交言治蠱之道也天道之行終則有始无非事者聖人於蠱巽二卦明之蠱東方卦也巽西方卦也甲者事之始庚者事之終始則有終終則更始徃來不窮以日言之春分旦出於甲秋分暮入於庚以月言之三日成震震納庚十五成乾乾納甲三十日成坤滅藏於癸復為震甲庚者天地之終始也蠱事之壊也巽行事也變更之始當慮其終事久而蠱當圖其始先甲三日圖其始也蠱一變大畜乾納甲再變賁離為日乾三爻在先先甲三日也三變頥四變噬嗑離為日五變无妄乾納甲乾三爻在後後甲三日也先甲者先其事而究其所以然後甲者後其事而慮其將然究其所以然則知救之之道慮其將然則知偹之之方一日二日至於三日慮之深推之逺故能革前弊彌後患久而可行圖始者至矣漢嘗削諸侯之地矣唐嘗討弑君之賊矣令下而兵起言出而禍隨昧治蠱之道也不曰乾行者周而復始也納甲之説乾納甲子甲寅甲辰而壬在其中納壬午壬申壬戌而甲在其中坤納乙癸亦然易傳曰後之治蠱者不眀乎聖人先甲後甲之戒慮淺而事近故勞於革亂而亂不革功未及成而弊已生矣夫蠱言先甲後甲於彖巽言先庚後庚於九五一爻何也曰蠱者巽九五之變也上剛下柔巽而止所以為蠱也巽則九五位乎中正事有過中而當變更則更之以適於中蠱何由生乎明此九五之功也以卦氣言之三月卦故太𤣥準之以務事象曰山下有風蠱君子以振民育徳風木之氣山百物之所阜生木氣動摇於土石之下陽升風鼓草木敷榮飭蠱之象黄帝書曰東方生風風生木傳言景霽山昏蒼埃際合崖谷若一巖岫之風也君子體之於民也振作之使不倦將振作之則自育其徳徳日進則民徳生矣震動在外振民也兊澤在内育徳也育徳者振民之本史言風落山取女說男蠱之象此言飭蠱之象故取象異初六幹父之蠱有子考无咎厲終吉象曰幹父之蠱意承考也乾為父泰初九之上父徃矣考也坤子來居父之位父徃而其事不正咎也有子幹之考可以无咎矣厲危也子居父位以事之不正為危厲之道則變而之正於考為无咎於已為終吉堪任其事者也故曰有子然變其事而之正母乃改父之道乎曰柔巽者子承考之意也變其事而之正致其考於无咎者子幹父之蠱也巽柔而已陷父於有咎而不恤焉豈考之意哉故以我之意逆父之意而承之則變其事可也變其事者時有損益不可盡承所以從道也孝子生也諭父母於道及其没也以意承考事死如事生之道也貞事之幹也幹父之蠱則初六變而正矣意者中心之所欲也坤為中巽柔坤也故曰意九二幹母之蠱不可貞象曰幹母之蠱得中道也坤居尊位母道也以隂居陽處之不當事之蠱也九二巽為子應五而處内幹母之蠱者也坤隂柔為難輔處之不當則當正然正之則剛或至於傷㤙不正之則致母於有咎故不可貞言巽而動優柔不迫得中道則善矣事柔弱之君亦然易傳曰以周公之聖輔成王成王非甚柔弱也然能使之為成王而已不失其道則可矣固不能使之為羲黄堯舜之事也九三幹父之蠱小有悔无大咎象曰幹父之蠱終无咎也上九處位不當父之蠱也九三重剛幹父之蠱而剛過中者也剛過動則小有悔然无大咎者雖過而正也三下卦之終故又曰終无咎夫无大咎未免小有咎聖人以謂終无咎以其體巽也易解曰不應上子之能争而不從其父令者也六四裕父之蠱徃見吝象曰裕父之蠱徃未得也六四柔而止不能去上九之蠱寛裕自守而已裕父之蠱者諸爻以剛為幹蠱之道九二九三初六六五五之動曰幹六四曰裕者不剛也不能動也吝者安其位而不能徃動成離離目為見故徃見吝初六應之牽於下亦不得徃矣故曰徃未得也漢之元帝是已六五幹父之蠱用譽象曰幹父用譽承以徳也六五居尊位尚柔下應九二二與之體兊兊為口譽之象也二易五柔成剛其徳中正上承上九幹父之蠱用譽也以徳承父下之服從者衆以是去蠱用力不勞則幹父之蠱莫善於用譽矣蠱之患非一世譬如人嗜酒色餌金石傳氣於子孫者潰為癰疽死與不死在治之如何耳秦皇漢武窮兵黷武一也秦亡而漢存者始皇无子而武帝有子以幹之也必曰承以徳者譽謂徳譽非虚譽也隋煬以儉聞以奢敗虚譽也上九不事王侯髙尚其事象曰不事王侯志可則也蠱之終有不事者上九自巽徃於外處蠱之上而不當位巽為事為髙尚上也五王四侯三公位上執剛不屈不事王侯髙尚其事夫自臺輿至王公无非事者不事王侯何以貴之謂其志於三三无應則去之不累於物其志為可則也易傳曰伊尹太公望之始曾子子思之徒是也所謂志可則者進退合道也兊下坤上臨元亨利貞至于八月有凶彖曰臨剛浸而長説而順剛中而應大亨以正天之道也至于八月有凶消不久也剛自復浸浸以長大而後有臨一氣不頓進兊為澤三四五進而不已浸長也臨以大臨小其進非一日而大大則小者自順此臨之時也故曰臨兊説坤順説而順其民也九二剛中六五應乎外則説而順者非苟説之順乎理也臨之道成而大亨矣然其端始於復之初九剛反動於初正也浸長而之九二大者亨以正故亨造端不正其能大亨乎此臨之道也夫天之道剛始於子進而至臨又進而至泰然後萬物通亦以正也故曰元亨利貞彖曰説而順剛中而應大亨以正天之道也天之道言乾也至于八月有凶戒進之不已也隂陽消長循環无窮自子至未八月而二隂長隂長陽衰其卦為遯小人道長君子道消不可以久不直曰凶者有凶之道聖人闔小人闢君子凶未必至范長生以八月為否誤也周正建子劉牧曰遯之六二消臨之九二卦略曰臨剛長則柔微柔長故剛遯是也臨在復泰之中方長而戒之不俟乎極也故堯舜禹三聖人相戒必於臨民之初過此則无及已在卦氣為十二月故太𤣥準之以􅕳象曰澤上有地臨君子以教思无窮容保民无疆水天下之至柔也以土制水宜若易者然迫之以險隘奔潰四出壊之而後已居之以寛大則畜而為澤矣君子之於民也亦然臨之以勢勢有盡也親之以教教无窮也是以忘有盡之勢思无窮之教教思无窮則待之非一日也故包容之保有之而无疆无疆者坤徳也厚之至也三代之民不忘乎先王之澤者教之也三代而下一決則横流而不可復者臨之以勢也説卦以坎為盗兊為少女大象以澤為民何也曰善保之則吾民也坎非坤衆能為盗乎易傳曰无窮至誠无斁也初九咸臨貞吉象曰咸臨貞吉志行正也以大臨小者臨之道以上臨下者臨之位故諸爻位以上為臨五者臨之尊位也初九六五非應也初處下而説五自應之初兊體之五成艮山澤相感之象咸徧感也无心相感也故曰咸臨初九正正其始也初與四為正應然之四不正五感之動而上行則正位以臨其民而萬物正矣舜徳升聞豈有心乎有心則凶不正亦凶故曰貞吉初九其始正者非一日正也古之人正其心及感之而動舉斯心以加諸彼志行正也九二咸臨吉无不利象曰咸臨吉无不利未順命也二有剛中之徳而應五動而正吉无不利无心於臨五自感之二之五成艮澤山象也故亦曰咸臨九居二有不利然處下而說曰吉无不利者以未順命也九二待時者也二至四有伏巽巽為命坤順也易傳曰未者非遽然之辭孟子或問勸齊伐燕有諸曰未也亦非遽然之辭也夫初九有應而不應九二有應而未順君子之樂王天下有不與存焉臨非君子之所樂也六三甘臨无攸利旣憂之无咎象曰甘臨位不當也既憂之咎不長也六三有臨下之位而无臨下之徳柔不當位以口説人甘臨也若當位則不言而信何俟於説人乎子朝之文辭新室之姦言内不足也處則不當之上則不應无攸利也雖甘臨能无咎乎陽浸長自下進宜憂也六三知處不當位能下九二之賢降尊接卑二三相易成坎坎為加憂隂陽失位既憂之又加憂則正正則无咎夫咎豈長哉在我而已二至四有伏巽巽為長二三相易巽變坎故曰旣憂之咎不長也六四至臨无咎象曰至臨无咎位當也臨以大臨小四居下之上為五所任而比於下得君而近民者也臨道尚近臨之至也以隂處四為得正體坤為處順與初相應為下賢得君近民而又兼此三者所以无咎此无他位正徳當也故曰至臨无咎位當也六五知臨大君之宜吉象曰大君之宜行中之謂也兼天下之明而不自用者知也五處尊位虚中而納二五二相易成坎坎為水内景知也兼九二之眀而不自用其明陽為大此大君用天下之明以臨天下於臨之義為宜相易而正正則吉故曰知臨大君之冝吉所謂大君之宜者行中之謂也二以剛中上行五以柔中下行上下相交五兼二而用之上下行中道也不交則明何由生義何由明故曰大君之宜行中之謂也王弼曰聰明者竭其視聽智力者盡其謀能上六敦臨吉无咎象曰敦臨之吉志在内也上六臨之極極則窮變而通之其敦臨乎上與二非正應而隂必求陽志在乎内者處臨之極非内有賢人之助不能資其臨下之道尊賢取善以剛益柔厚之至也故曰敦臨坤厚也二之上成艮為篤實厚而篤實敦之象天正則吉无咎上二相易而曰吉曰无咎者得九二之助然後上安其位臨道不窮安其位所謂吉不窮所謂无咎故曰敦臨之吉志在内也易𫝊曰臨隂柔在上非能臨者宜有咎以其厚於順剛則无咎坤下巽上觀盥而不薦有孚顒若彖曰大觀在上順而巽中正以觀天下觀盥而不薦有孚顒若下觀而化也觀天之神道而四時不忒聖人以神道設教而天下服矣觀成卦之義在於九五九五剛大履至尊之位四隂觀之大者在上而下為小者之所觀坤為衆巽為多白眼有觀上之象故曰大觀在上此以九五釋觀也下順上巽順物之理巽而施之也九五无偏黨反側建極立表天下注目故曰順而巽中正以觀天下此合坤巽言九五大觀在上之道也觀臨之覆臨兊為澤艮為手上為宗廟巽入也入宗廟而澤手盥也與内則沃盥之盥同坤為牛兊為刑殺殺於下手薦之於上薦也孚者九五之誠信孚於下也乾為首兊變之肅然在上莊而不惰有敬順之貌顒若也觀之道至簡而不煩其要在誠而已无待於物也故眀之以宗廟之禮焉宗廟之禮所以致誠敬也㪚齋七日致齋三日祭之初迎尸尸入廟天子涗手而後酌酒涗謂之盥酌酒獻尸尸得之灌地而祭謂之祼祼之後三獻而薦腥五獻而薦熟謂之薦故獻之屬莫重於祼而盥者未祼之時精神專一誠意未散不言之信發而為敬順之貌者顒顒如也故下觀而化金聲而玉色莫不有敬順之心及其薦獻禮文繁縟人之精一不若始盥之時雖強有力者猶有時倦惰矣以此見下之觀上在誠而不在物其道豈不至簡而不煩乎是以觀盥而不觀薦也巽眼視艮而兊伏觀盥而不觀薦之象也巽巽也坤順也二應於五化為巽順故曰觀盥而不薦有孚顒若下觀而化也聖人嘗觀諸天也四時本於隂陽隂陽合而為一一則神神者天之道也故隂陽自行四時自運人見其始於艮終於艮无有差忒而已孰為此者一也聖人觀天設教亦一而已矣一則誠誠則明明則變變則化不假強聒人自服從亦豈知所謂一哉惟天下至誠為能化故曰觀天之神道而四時不忒聖人以神道設教而天下服此推原觀卦之始要其終而言之以明大觀在上其道止於誠誠則順而巽中正以觀天下矣以卦氣言之八月節也故太𤣥準之以視象曰風行地上觀先王以省方觀民設教風行地上无所不周觀也先王以廵省四方象風之行觀民設教象風行於地上巽而順萬物也巽為多白眼觀也坤為民易傳曰觀民設教如奢者示之以儉儉者示之以禮省方觀民也設教為民觀也初六童觀小人无咎君子吝象曰初六童觀小人道也初六坤冥不正而徃觀五小人之觀君子也烏覩所謂正哉不足咎小人不足以知君子猶童稚之觀成人也艮為少男故曰童觀初九動則正以正而徃觀者君子之觀君子也然不動焉吝也故曰小人无咎君子吝六二闚觀利女貞象曰闚觀女貞亦可醜也大觀在上六二不徃闔户而觀之所見狹矣故曰闚觀禮女不踰閾守正不動女之貞也故曰利女貞二離為女為目坤為闔户女處乎内而闚外之象九五以中正觀天下六二守闚觀而為女貞亦可醜也隂為醜此爻女子居之則利君子為之則醜六三觀我生進退象曰觀我生進退未失道也卦以九五為主我謂九五也生動也五之三震為動動謂之生者陽剛反動天地之生五之三三則進而上五不動三則退而止進退動止觀九五而已巽為進退三不當位在上下之際故其象如此六三不能自必其進退者在九五不在六三也九五中正其動必正故六三雖不當位未為失觀之道六四觀國之光利用賔于王象曰觀國之光尚賔也四觀五也四侯位坤為國五王位六四上賔於五五降而接之成坎離光也故曰觀國之光四為朝廷艮為門闕乾五為玉動之四為金坤為布帛乾坤𤣥黄幣帛之文升自門闕陳於庭王降而接賔賔下升於西北賔於王也尚者主人以賔為上尚之也古者諸侯入見於王王以賔禮之士而未受禄亦賔之九五中正在上六四體巽而正觀國之光知尚賔忘勢矣尚賔者國之光也禮主人尊賔故坐賔於西北主人接人以仁厚之氣故坐於東南易言賔位者乾也西北方也主人位者巽也東南也九五觀我生君子无咎象曰觀我生觀民也五自觀也五君也坤為民五動之二坤變震為動動謂之生天動則地應觀天道之得失觀諸地可也天為君地為民君者民之所觀而時之治亂風俗之美惡繫之觀其民則知君君之自觀其得失者亦觀諸民而已中庸曰君子之道本諸身徴諸庶民故君道得其民君子也於已為无咎君道失其民小人也必有失道之咎有堯舜之君必有堯舜之民矣五之二陽為君子故曰君子无咎成湯曰萬方有罪在予一人先王省方命太師陳詩觀民風乃所以自觀也上九觀其生君子无咎象曰觀其生志未平也上觀五也上來之三仰觀九五觀其動之所自出故曰觀其生三動於中志也坎險不平也三觀於五有難焉其志不能平乃徃於外三動正也君子也正則无咎上九過剛也過則有咎自古觀其君而去者以未平之志為忿世疾邪之事多失之於矯激太過豈能无咎夫聰明深察而近於死者好譏議人也辯博閎逺而危其身者好發人之過者也梁鴻作五噫以顯宗之賢猶不能堪之非失之過乎夫子不合者多矣進退无咎者君子之道也巽究為躁故以君子戒之易解曰知微知彰知柔知剛然後能觀其生而不失進退之幾焉漢上易傳卷二
