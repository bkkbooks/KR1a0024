body:
  text: 漢上易傳卷一宋朱震撰乾下乾上乾元亨利貞乾健也元始也亨通也升降往來周流六虛而不窮者也利者得其宜也貞者正也初九九三九五正也九二九四上九變動亦正也故九二曰龍德而正中者也乾具此四德故為諸卦之祖程皓曰一德不具不足為之乾伏羲初畫八卦乾坤坎離震巽兊艮因而重之歸藏之初經是也商人作歸藏首坤次乾夏后氏作連山首艮而乾在七其經卦皆六十有四至於文王首乾次坤以乾坤坎離為上篇震巽艮兊為下篇繫以卦下之辭周公繼之乃有爻辭初九潛龍勿用九二見龍在田利見大人九三君子終日乾乾夕惕若厲無咎九四或躍在淵無咎九五飛龍在天利見大人上九亢龍有悔用九見羣龍無首吉易有四象六七八九七八不變者也六九變者也歸藏連山用七八易用六九而七八在其中變者以不變者為基不變者以變者為用陸績曰陽在初稱初九去初之二稱九二則初復七隂在初則稱初六去初之二稱六二則初復八矣卦畫七八經書九六七八為彖九六為爻四者互明聖人之妙意也乾為馬六爻皆以龍言之何也乾體本坤陽以隂為基也自震變而為乾震變乾則乾為龍乾變震則震為馬故震其究為健彖曰大哉乾元萬物資始乃統天雲行雨施品物流形大明終始六位時成時乘六龍以御天乾道變化各正性命保合太和乃利貞首出庶物萬國咸寧夫子作上彖下彖上象下象文言上繫下繫説卦序卦雜卦十篇以贊易道其篇不相附近不居聖也至陳元鄭衆傳費氏易馬融作傳鄭康成傳之康成之後注連經文王輔嗣始分象辭附於爻下乾存古文也一者數之始乾之元也陽生於子萬物資之而有氣一變而七七變而九四之為三十六六之為二百一十有六而乾之策備矣乾天也萬物資始於天天之道始於一故曰乃統天此贊元也六爻天地相函坎離錯居坎離者天地之用也雲行雨施坎之升降也大明終始離之往來也所謂亨也萬物殊品流動分形隂陽異位以時而成乾自子至戌坤自未至酉男卦從乾而順女卦從坤而逆所謂時也六位循環萬物生生而不窮者乎此贊亨也聖人時乘六龍潛見躍飛御天而行體元亨也乾坤相交是生變化萬物散殊各正性命性源同而分異命稟異而歸同太和者相感絪緼之氣天地之所以亨也各正性命保之而存合之而聚不貞則不利故曰乃利貞不曰乾坤而曰乾道者乾行坤從天之道也此贊利貞也乾為首震生萬物坤為衆變震為蕃庶積震成乾首出乎庶物之上五辟四諸侯三公二太夫初元士各正其位萬國咸寧體利貞也乾君道體元亨利貞而後盡大君之道象曰天行健君子以自強不息易者象也有卦象有爻象彖也者言乎象者也言卦象也爻動乎內言爻象也夫子之大象别以八卦取義錯綜而成之有取兩體者有取互體者有取變卦者大槩彖有未盡者於大象申之天所以為天者健也萬里一息其行不已君子以是自強不息不敢橫私其身也夫不息則久久則徴徴則悠逺悠逺則博厚博厚則髙明博厚配地髙明配天乾言不息配天也坤言厚德配地也兩者誠而已矣獨於乾言誠者誠天之道也潛龍勿用陽在下也見龍在田德施普也終日乾乾反復道也或躍在淵進無咎也飛龍在天大人造也亢龍有悔盈不可久也用九天德不可為首也夫子小象辭也晉太史蔡墨曰在乾之姤曰潛龍勿用在乾之同人曰見龍在田此繫辭所謂乾一索再索三索陸績所謂初九九二也初九變坤下有伏震潛龍也陽氣潛藏在下之時玄曰昆侖旁薄幽也二居地表田也坤變為離離為文文章炳明見龍也龍德而見如日下照施及於物者普矣玄曰龍出乎中龍德始著也三變離兊日在下終日也初九九二乾乾也初九始正也九三終正也終則有始反復乾乾動息不離於道者也三則極極則反反則復非終日乾乾能之乎玄曰首尾可以為庸程皓曰終日乾乾對越在天蓋上天之載無聲臭也初二三有伏震震為龍為足五為坎九四變離兊兊為澤澤淵也足進乎五或躍也伏震為龍退而在淵也九居四履非其位宜有咎進則無咎堯老而舜攝舜老而禹徂征之時乎玄曰東動青龍光離于淵程頤易傳曰量可而進其適時則無咎九五坎變離離為飛乾為天離淵而飛飛龍在天也離為目見也九五動九二大人應而往造之利見大人也玄曰龍幹於天長類無疆上九變兊兊為毁折亢滿之纍也盈極則虗不可久也玄曰南征不利九陽剛之極乾天德在萬物之先復用陽剛之極則剛過矣人所不能堪也九六隂陽之變也九變則六六變則九九六相用剛柔相濟然後適乎中關子明曰以六用九易傳曰以剛為天下先凶之道也伏爻何也曰京房所傳飛伏也乾坤坎離震巽兊艮兊相伏者也見者為飛不見者為伏飛方來也伏既往也説卦巽其究為躁卦例飛伏也太史公律書曰冬至一隂下藏一陽上舒此論復卦初爻之伏巽也文言曰元者善之長也亨者嘉之會也利者義之和也貞者事之幹也君子體仁足以長人嘉會足以合禮利物足以和義貞固足以幹事君子行此四德者故曰乾元亨利貞文言者錯雜四德六爻反復成文設為問答往來相錯亦文也故太玄凖之以玄文天地之大德曰生元者生物之始善之長也其在人則仁也亨者天地之極通衆美之期會也利由屈信相感而生或屈或信各得其宜義者宜也語義則利在其中矣貞正也在物則成也玄所謂水包貞也有德乃有事德不正則事不立立事之謂幹唯仁者宜在髙位故君子體仁足以長人凡長於人皆長也物不可以苟合必致飾焉故嘉會足以合禮嘉會如嘉魂魄是也利順物理而行之各得其所欲者也故利物足以和義守正堅固不為萬物之所撓奪乃能建立庶事故貞固足以幹事君子剛健不息行此四德故曰乾元亨利貞張載曰天下之理得元也亨會而通也説諸心利也一天下之動貞也初九曰潛龍勿用何謂也子曰龍德而隱者也不易乎世不成乎名遁世無悶不見是而無悶樂則行之憂則違之確乎其不可拔潛龍也九二曰見龍在田利見大人何謂也子曰龍德而正中者也庸言之信庸行之謹間邪存其誠善世而不伐德博而化易曰見龍在田利見大人君德也九三曰君子終日乾乾夕惕若厲無咎何謂也子曰君子進德修業忠信所以進德也修辭立其誠所以居業也知至至之可與幾也知終終之可與存義也是故居上位而不驕在下位而不憂故乾乾因其時而惕雖危無咎矣九四曰或躍在淵無咎何謂也子曰上下無常非為邪也進退無恆非離羣也君子進德修業欲及時也故無咎九五曰飛龍在天利見大人何謂也子曰同聲相應同氣相求水流濕火就燥雲從龍風從虎聖人作而萬物覩本乎天者親上本乎地者親下則各從其類也上九曰亢龍有悔何謂也子曰貴而無位髙而無民賢人在下位而無輔是以動而有悔也乾之變化龍德也初九變坤謂之潛龍龍德而隱者也初之四變九為六易世也初九隱伏不易乎世也易如天下有道吾不與易也之易厯有元會運世世者辰也初九子之四易午故曰易世震為聲巽見震伏不成乎名也二為中二動為庸初九依乎中庸初之四成兊説遁世而無悶也初九變不正不見是而無悶也不見是而無悶者舉世非之而不加損也之四行也兊説樂也樂則行之也退而失位為憂憂則退違之也巽為木在下確乎其不可拔潛龍也初九一爻之四或曰遁或曰行何也曰自依乎中庸言之二隂遁也自初九之四言之行也此所謂曲而中也九二之動龍德而正中者也庸者中之用也二之五兊為口為言上行為行言行也言中庸而應庸言之信也行中庸而正庸行之謹也言行變化不失其中故謂之庸初九九三上下正間邪也九二動正中存誠也誠自成也非外鑠也間邪則誠自存猶之煙盡火明波澄水靜間之者誰歟莫非誠也言信行謹間邪存誠其德正中自二之五善涉乎世矣然且不自伐以正中而逰人間者也兊隱矣二不行矣不聞其言不見其行不伐也德施而光普博也文明而巽化也唯至誠為能化其德如是宜之五為君也是以利見九五之大人故曰君德五君位也顔子擇乎中庸而弗失之夫子告之以為邦九二君德故也乾剛之德自初至三進德也九二動成巽巽為事業者事之成動而巽修業也兊為口正以動忠信也忠信所以進德也巽言不離於忠信修辭也二正誠也巽為股立也修辭以立誠誠立而其業定修辭所以居業也初九知中之可至則行而至之初可與乎幾也九三知中之不可過則動而終之三可與存乎義也義者時措之宜也玄曰諸一則始諸三則終二者其得中乎是故九三動而弗處居上位而不驕也初九遁而無悶在下位而不憂也是則乾乾者進德修業立誠以居之而已非安夫上位而不去也故乾乾因其時而惕雖危無咎巽為多白眼惕也九三之動危厲也離日在上為朝在五為晝在三四為日昃為夕為終日在二為暮夜為明入地中日在三故曰夕惕九四動之五進而上也復之四退而下也故曰或躍或疑辭也謂非必也九四動正也之五不正疑為邪四臣位五君位出乎臣之類離羣也三陽為羣然上下進退無常者乃九三進德修業至是欲及時爾故進則無咎不然四近君多懼安得無咎易傳曰聖人之動無不時也五變之二成巽下有伏震巽風震雷同聲相應也二動之五成兊下有伏坎兊澤坎水同氣相求也五之二兊澤流坎水流濕也二之五離火見離燥卦火就燥也五變來之二二有伏震雲從龍也二巽往之五五兊成虎風從虎也九五中正而居天位聖人作也二震為萬物離目為覩萬物覩也九五變六六本乎地故親下而見二九二應五九本乎天故親上而見五易傳曰乾之二五則聖人既出上下相見共成其事所利者見大人也九居上處極貴而失尊位無位也王弼謂初上無位誤也三變成坤坤為衆民也三不變髙而無民也賢人九三剛正也不變以應之賢人在下位而上無輔也故動則有悔貴髙而盈亢則窮也爻辭曰大人文言曰聖人聖人有大之極而不為其大大而化也潛龍勿用下也見龍在田時舍也終日乾乾行事也或躍在淵自試也飛龍在天上治也亢龍有悔窮之災也乾元用九天下治也易傳曰言乾之時也潛龍勿用時在下也見龍在田時可止也舍止也井初六為九五捨之與此象異二陽方進而未泰故可舍止音茇舍之舍九二變遁艮有止意終日乾乾進而行事之時非乾乾不能堪其事巽行事也或躍在淵上下進退無常自試時也飛龍在天在上而致治時地亢龍有悔陽窮于九隂窮於六位窮於上窮則變變則通通則久上九窮不知變窮之災也天災曰災數極時也玄有三統九會陽以九終極數也然天人有交勝之理故有悔天德不可為首用九不見其首則不過不過中也六位得中天下治也潛龍勿用陽氣潛藏見龍在田天下文明終日乾乾與時偕行或躍在淵乾道乃革飛龍在天乃位乎天德亢龍有悔與時偕極乾元用九乃見天則易傳曰言乾之義也乾伏坤見陽氣濳藏故曰潛龍勿用坤文離明德施之普光於天下人文明也故曰見龍在田三陽方行亦與之行故終日乾乾行不息也周公繼日待旦之時乎四人位五天位離人之天水火相息乾道革矣故曰或躍在淵天不可階而升也不曰位乎君位而曰位乎天德者成性躋聖也張載曰受命首出則所性不存焉故曰飛龍在天亢龍有悔上極也消息盈虛與時偕行則無悔偕極則窮故有悔也六九相變天地之道不可違之則也乾元始也於其始也用九其終不過矣以其不可過也故曰天則見天則則知中道乃固然之理非人能為之也乾元者始而亨者也利貞者性情也乾始能以美利利天下不言所利大矣哉大哉乾乎剛健中正純粹精也六爻發揮旁通情也時乘六龍以御天也雲行雨施天下平也元者乾之始剛反而動亨在其中矣利貞者乾之性情也性情猶言資質也動而生物利也不有其功常久而不已貞也貞正也始則亨亨則利利則貞在其中諸卦言利者指事而言之利於此或不利於彼乾始萬物資之天下至大無不蒙其利者不言所利則其利大矣故謂之元元又訓大故也夫子欲言乾道之大其辭有不能盡者故曰大哉乾乎乾總言之則剛不撓也健不息也健者積剛而成也悉數之則中正而不倚也純全而粹美也一三五正也二五中也中而正者其九五乎八卦皆純也純而粹者其重乾乎故玄準之以睟其首辭曰陽氣袀睟清明道至於純粹無以復加而六者皆原於一一者何乾始也天地之本萬物之一源精之又精剛健中正純粹自此而出故曰剛健中正純粹精也易傳曰精謂六者之精極也以一言􅔜之曰正正者乾之性也六爻發越揮散旁通於諸卦被於三百八十四爻無往而不利者乾之情也情變動也性不變者也時乘六龍者以御天而行也雲行雨施者天下平均也二者體元亨也元亨則利貞在其中矣蓋雲行雨施品物流形則萬物各正其性命矣鄭康成本作性情君子以成德為行日可見之行也潛之為言也隱而未見行而未成是以君子弗用也君子學以聚之問以辨之寬以居之仁以行之易曰見龍在田利見大人君德也九三重剛而不中上不在天下不在田故乾乾因其時而惕雖危無咎矣九四重剛而不中上不在天下不在田中不在人故或之或之者疑之也故無咎夫大人者與天地合其德與日月合其明與四時合其序與鬼神合其吉凶先天而天弗違後天而奉天時天且弗違而况於人乎况於鬼神乎亢之為言也知進而不知退知存而不知亡知得而不知喪其唯聖人乎知進退存亡而不失其正者其唯聖人乎君子積善成德以其成德行之為行日可見於外而不可掩者行也九二是也隱之為言隱伏而未見於世行而其德未成是以弗用張載曰未至於聖皆行而未成之地初九正其始二益之而説學以聚之也聚者升而上也兊為口問以辨之也二動中虗虗則有容寬以居之也動而以巽行仁以行之也學聚問辨寬居仁行二與五應有君德也是以言行如上云九三九四以剛乘剛而不中過乎剛也二為田九三居下位之上雖上不在天而下已離田動則危且有咎故乾乾不息因其可危之時而惕則雖危無咎矣中二爻人也四上不在天下不在田或進而之五則中不在人可懼之地也故疑而未決上下進退不必於處是以無咎九三之惕九四之疑可謂能用九矣雖重剛不中何患於過乎道者循萬物之理而行其所無事者也天地之覆載日月之照臨四時之消長鬼神之吉凶豈有意為之哉大人其道與天地日月四時鬼神合故順至理而推行之先後天而不違天且不違而况於人乎况於鬼神乎鬼神者流行於天地之間者也是以九五利見大人也亢者處極而不知反者也萬物之理進必有退存必有亡得必有喪亢知一而不知二故道窮而致災人固有知進退存亡者矣其道詭於聖人則未必得其正不得其正則與天地不相似知進退存亡而不失其正者其唯聖人乎故兩言之前曰大人此曰聖人知進退存亡不失其正則德合隂陽與天地同流而無不通矣此大而化之者也坤下坤上坤元亨利牝馬之貞君子有攸往先迷後得主利西南得朋東北喪朋安貞吉彖曰至哉坤元萬物資生乃順承天坤厚載物德合無疆含𢎞光大品物咸亨牝馬地類行地無疆柔順利貞君子攸行先迷失道後順得常西南得朋乃與類行東北喪朋乃終有慶安貞之吉應地無疆萬物資乾以始而有氣資坤以生而有形乾始而亨無所待也是以能大坤待乾而行乃能至於大有氣而後有形也故乾元曰大哉坤元曰至哉天健也坤順而承之故曰坤天先地後而生萬物坤為大輿自下載之積厚也天無疆者也坤所以配之者載物之德合乎無疆故地配天坤合乾乾坤之始皆謂之元光者坎離也大者乾陽也靜翕含之也以育其根動闢𢎞之也以成其形一靜一動品物咸亨故曰亨品物咸亨者離之時也乾為馬坤變之為牝馬牝馬地類也無疆者乾之行也坤依乾而行以柔承剛以順承健乃能行地無疆故曰利牝馬之貞利牝馬之貞則非不言所利此坤之利所以異於乾之利歟君子乾之象柔順坤之德一三五天也二四六地也陽以竒為正隂以偶為正陽先隂後柔順承乾乃得坤正則柔順者利於承乾以為正也是以君子體坤而行行者攸往也故曰君子攸往猶乾言時乘六龍首出庶物也一三五不得其正先迷也失坤道也牝雞無晨西雲不雨故曰先迷二順一四順三六順五順乾得主坤道有常有常者坤之利也臣待君唱女須男行故曰後得主利子夏傳曰先迷後得主也二進至三坤體成西南坤也止而不進成艮東北艮也坤隂生於午至申三隂成矣自申抵戌羣隂得朋宜若有得也而至亥成坤萬物皆虛故曰西南得朋乃與類行乾陽生於子至寅三陽成矣自寅抵辰隂類浸亡宜若有喪也而至已成乾萬物皆盈故曰東北喪朋乃終有慶是以得君者臣之慶得親者子之慶得夫者婦之慶三者未有不離其朋類而得者也故曰東北喪朋乃終有慶坤以順為正而地之順天而無疆者順夫正也臣有獻替婦有警戒子有幾諌各安其正乃能悠久而無窮安貞之吉應乎地之所以無疆也故曰安貞吉張載曰東北喪朋雖得主有慶而不可懷也虞翻以月之生死論之曰從震至乾與時偕行消乙入坤滅藏於癸坤終復生隂陽之義配日月其大致則同象曰地勢坤君子以厚德載物天髙西北地傾東南以順之故水潦有所歸而萬物各得其所君子積順德而至博厚故能容載萬物初六履霜堅冰至象曰履霜堅冰隂始凝也馴至其道至堅冰也隂者小人之道也一隂生於午剝乾之初也五隂而霜降六隂而堅冰初六之動柔成剛隂始凝也莫之禦焉駸駸然馴致乎盛隂而小人之道極矣故觀其所踐履則一隂始凝知其必至於履霜堅冰也震為足自下而進履也或曰坤之初六五月也何以有履霜堅冰之象曰所謂見微者也寒露者剝之初六也霜降者剝之六五也剝之初六即坤之初六也剝之六五即坤之六五也剝窮成坤上六也露者坤之氣寒氣入之故露為霜立冬水始冰亦坤之初六也於斗建為亥乾金之氣為冰故坤之初六一爻自姤卦言之為五月自剝卦言之為九月至五隂而霜降自坤卦言之為十月為亥至於六隂而成冬玄所謂水凝地坼非見不見之形者其能知小人之禍於甚微之時乎六二直方大不習無不利象曰六二之動直以方也不習無不利地道光也六二中正而動中故直正故方直者遂也方者不易其宜也易曰乾其靜也專其動也直是以大生焉又曰坤至柔而動也剛至靜而德方而説卦乾為直坤為方方亦剛也故曰六二之動直以方也重坎為習二動成坎不習也動而之五得正不習無不利也坎為光光大也易傳曰二為坤之主中正在下盡地之道故以直方大三者形容其德由直方大故不習而無不利不習謂自然也在坤道則莫之為而為也在聖人則從容中道六三含章可貞或從王事無成有終象曰含章可貞以時發也或從王事知光大也坤離為文明三文之成為章坤見離伏含章也人臣當含章不耀以其美歸之君六三不正非容恱者也可正也六三動則正惟含章也故當可動而動以時發也坤德含𢎞光大含章者坤之靜也以時發者坤動也靜而含動而𢎞坤之所以承天歟乾為王伏巽為事三內卦之上為成上為外卦之終或從王事者三之上也坤作成物無以成功自居有終其事而已為臣而終其事職當然也六三以是從王事得恭順之道知光大矣坎離合為知知如日月之光明大也邵雍曰陽知其始而享其成隂效其法而終其勞六四括囊無咎無譽象曰括囊無咎愼不害也坤為囊六四動成艮艮為手括囊也六四正動則不正四有伏兊兊為口不正無譽可也無咎何邪六四當天地否塞賢人遁藏之時不利君子正故止其口而不出者愼也愼以全身故於義不害若立人之本朝道不行矣而括囊緘默罪也安得無咎故此爻不以位言之六五黃裳元吉象曰黃裳元吉文在中也五尊位六居之人臣當此唯守中居下乃得元吉否則必凶黃地之中色文者地道之美見於山川動植者也裳下體之飾曰黃則守中有地道之美而不過故曰文在中也曰裳則居下雖處尊位而不失坤之常惟守中不過斯能居下矣以是而動動則得二元吉也元吉者言其始本自吉非變而吉也故元吉在吉為至善上六龍戰于野其血玄黃象曰龍戰于野其道窮也上六坤之窮十月也其位在亥乾之位十一月復震震變乾為龍上六變乾乾為天卦外天際也野之象野莫知所適之地坤道已窮動而不已臣疑於君乾坤交戰君臣相傷不知變通故也用六利永貞象曰用六永貞以大終也六隂柔之極不濟之以陽剛則邪佞之道故以九用六乃能永久不失其正杜欽曰地道貴斂陽始之隂終之未始離陽故曰以大終也交言曰坤至柔而動也剛至靜而德方後得主而有常含萬物而化光坤道其順乎承天而時行積善之家必有餘慶積不善之家必有餘殃臣弒其君子弒其父非一朝一夕之故其所由來者漸矣由辨之不早辨也易曰履霜堅冰至蓋言順也直其正也方其義也君子敬以直內義以方外敬義立而德不孤直方大不習無不利則不疑其所行也隂雖有美含之以從王事弗敢成也地道也妻道也臣道也地道無成而代有終也天地變化草木蕃天地閉賢人隱易曰括囊無咎無譽蓋言謹也君子黃中通理正位居體美在其中而暢於四支發於事業美之至也隂疑於陽必戰為其嫌於無陽也故稱龍焉猶未離其類也故稱血焉夫玄黃者天地之雜也天玄而地黃至柔至靜者坤之體也動而剛方者坤之用也方亦剛也以其不可易言之謂之方其體則坤用則隨乾觀其所動而坤之順德見矣含萬物而生者隂含陽也玄曰天鬱化精地隱魄榮隱所謂含萬物也及其化生品物咸章保厥昭陽坤道乃光坤之光即乾之光大也玄曰天炫炫出於無畛熿熿出於無垠炫炫熿熿所謂化光也坤道至矣一言可盡其順矣乎天動地隨其行有時故承天而時行善不善之報必有餘者馴而不已積之既久則末流必多乾坤是也家言臣子也坤積至五子弒父臣弒君離日坎月自下而進非一朝一夕之故其所由來者漸矣辨之不早其禍至此矧不辨乎先儒嘗以乾坤論之謂君子之道有時而消於是有坤化陽滅者矣然而復出為震者餘慶之不亡也小人之道有時而消於是有陽息隂盡者矣然而極姤生巽者餘殃猶在也觀諸天道月之生死晦盡而生明既滿而成虧先儒餘慶餘殃之論為不誣矣是故有虞之子不肖而陳齊永祚商辛之後有國而祿父再亡敬者操持其誠心而弗敢失也二動以直敬以直內也直內言內省不疚其理直也方者義之不可易也有所不為有所不行也二往之五義以方外也誠者合內外之道內直外方敬義立矣敬義立則相應相與其德不孤放諸四海而凖以直方大也爻動為行巽為不果二動震見巽伏不習無不利則不疑其所行也上曰中則直此言直其正何也曰正而不中者有矣中則正矣天地之間萬物粲然而陳者皆陽麗於隂託之以為美也陽盡則隂之惡畢見不能自美矣然隂雖有陽之美當含蓄之以從王事待時而發不有已也豈敢當其成功哉乾巽從王事也地道無成順天而行乾知大始坤代有終自然之道也故臣終君之事妻終夫之事不言子者臣子一也泰之時天地變化草木亦蕃而况人乎否之時天地閉塞賢人亦隱而况草木乎三才一理也是故併言之括囊無咎非閉其言而不出蓋言謹也謹者莊子所謂慎為善也隂進至三成否否泰反其類故其言如此坤五黃中動而成坎傳所謂坤之比也坎為通有美在中而通於理理者中正也天地萬物之所共由者也通於理則大美具矣美在其中矣五君位六變九正位也正位而居坤體不失為臣之道黃裳也九五艮艮為手二五相易成震震為足暢於四支也巽為事業者事之成發於事業也誠則形形則不可掩故美在其中暢於四支發於事業通於理者無往而不通其伊尹周公共伯和之事乎月盛則掩日臣強則疑君隂疑於陽必戰十月純坤用事而稱龍者天地未嘗一日而無陽亦未嘗一日而無君子為其純隂嫌於無陽也故稱龍焉乾在故也上六之動坤成乾其體剝剝者復之反震變也十一月復復初九庚子子坎之位坎為血震為玄黃血幽隂也上六疑陽未離隂類故稱血焉震者天地之一交天玄而地黃玄者坎中之陽黃者離中之隂天地之雜也其血玄黃者君臣相傷也雖欲力勝莫之助也故聖人於初六戒之上六則無及矣鄭本作為其兼於陽也故稱龍焉或問初之四二之五三之上六爻反復相應何也曰京房所傳世應三畫之卦一二三重為六爻四即初五即二上即三各以其類相應邵雍曰有變必有應也變乎內者應乎外變乎外者應乎內變乎下者應乎上變乎上者應乎下本乎天者親上本乎地者親下變之與應常反對也故卦一世者四應二世者五應三世者上應四世者初應五世者二應六世者三應在易言應者一十有九卦昔之言應如子太叔論迷復凶是也至虞翻始傳其袐然未盡善繫辭曰變動不居周流六虛上下無常剛柔相易世應者相易之一也故曰兩則化一則神震下坎上屯元亨利貞勿用有攸往利建侯彖曰屯剛柔始交而難生動乎險中大亨貞雷雨之動滿盈天造草昧宜建侯而不寧自屯彖而下乃以卦變為象屯臨之變自震來四之五震者乾交於坤一索得之剛柔始交也四之五成坎坎險難剛柔始交而難生也易傳曰始交而未暢為屯在時則天下未亨之時此以震坎釋屯之義也安乎險而不動與動乎險中不以正皆非濟屯之道初九正也四之五得位大者亨以正而利也以天地觀之剛柔始交鬱而未暢雷升雨降其動以正則萬物滿盈乎天地之間有不大亨乎此以初九九五釋元亨利貞也震雷也坎雨也兊澤上而成坎故為雨初九屯之主也初往之五行必犯難益屯而不能亨矣君子宜守正待時故勿用有攸往此言初九也天造之始草創冥昧人思其主能乘時衆建諸侯使人人各歸以事主雖有強暴誰與之為亂哉四為諸侯九五在上六四正位分民而治建侯也雖則建侯而未始忘乎險難震為草乾之始也坤為冥昧坎為勞卦故曰天造草昧宜建侯而不寧此再言初九九五也以卦氣言之十月卦也太玄準之以礥或曰聖人既重卦矣又有卦變何也曰因體以明用也易無非用用無非變以乾坤為體則以八卦為用以八卦為體則以六十四卦為用以六十四卦為體則以卦變為用以卦變為體則以交爻相變為用體用相資其變無窮而乾坤不變變者易也不變者易之祖也所謂天下之動貞夫一也故曰剛柔相推變在其中矣繫辭焉而命之動在其中矣又曰辭也者各指其所之考其所命之辭尋其辭之所指則於變也若辨白黑矣夫易之屢遷將以明道而卦之所變舉一隅也推而行之觸類而長之存乎卜筮之所尚者豈有既哉故在春秋傳曰某卦之某卦者言其變也若伯廖舉豐之上六曰在豐之離知莊子舉師之初六曰在師之臨其見於卜筮者若崔子遇困之大過者六三變也莊叔遇明夷之謙者初九變也孔成子遇屯之比者初九變也南蒯遇坤之比者六五變也陽虎遇泰之需者六五變也陳仲遇觀之否者六四變也周官太卜掌三易之法其經卦皆八其别皆六十有四八卦謂之經則六十四卦為卦變可知故曰卦之所變舉一隅也王弼盡斥卦變以救易學之失救之是也盡斥之非也象曰雲雷屯君子以經綸坎在上為雲雷動於下雲蓄雨而未降屯也屯者結而未解之時雨則屯解矣彖言雷雨之動滿盈者要終而言也解絲棼者綸之經之經綸者經而又綸終則有始屯自臨變離為絲坎為輪綸也離南坎北為經經綸也君子經綸以解屯難凡事有未決反復思念亦此象也初九磐桓利居貞利建侯象曰雖磐桓志行正也以貴下賤大得民也初九剛正屯難之始上有正應震動體進則犯難成巽為進退九居四不安故磐桓子夏傳曰磐桓猶桓旋也磐桓不進利於守正不進非必於退也志在行其正也初九不忘上行之謂志志剛中也志行正也可不磐桓以待時乎初動濟屯四諸侯位建國命侯資以輔五屯難未解衆隂不能自存有剛正之才使之有國則衆從之陽貴隂賤坤衆為民九退復初以貴下賤大得民也故曰利建侯夫子時楚有四縣趙簡子命下大夫受郡必言利建侯者建侯萬世之利也或問震又成巽何也曰所謂雜物撰德也撰數也且以屯論之坎陽物也震動也四比於九五自三柔爻數之至於九五巽也震陽物也巽隂物也剛者陽之德柔者隂之德剛柔雜揉不相踰越故曰雜而不越先儒傳此謂之互體在易噬嗑彖曰頤中有物曰噬嗑離震相合中復有艮明夷彖曰內文明而外柔順以蒙大難又曰內難而能正其志坎難也離坤相合中復有坎在繫辭曰八卦相蕩先儒謂坎離卦中互有震艮巽兊在春秋傳見於卜筮如周太史説觀之否曰坤土也巽風也乾天也風為天於土上山也有山之材而照之以天光於是乎居土上自三至四有艮互體也王弼謂互體不足遂及卦變鍾會著論力排互體蓋未詳所謂易道甚大矣六二屯如邅如乘馬班如匪寇婚媾女子貞不字十年乃字象曰六二之難乘剛也十年乃字反常也九五屯之主六二中正而應共濟乎屯者也故曰屯如二乘初九欲往應五迫於剛強邅回而不能去故邅如乾變震為作足之馬震為足乘馬也初不應五二欲應之與馬别矣故乘馬班如春秋傳曰有班馬之聲杜氏曰班别也五坎為盜盜據山險寇也男曰婚女曰姻媾男女别也九五應六二婚媾也五自初九視之有險難之象寇也自六二視之匪寇也婚媾也特以乘剛故耳初九六二正也而致六二之難者剛乘柔則順柔乘剛則逆妻不亢夫臣不敵君天地之道故曰六二之難乘剛也二五相易五之二成兊兊女子也二之五成坤坤為母女子而為母字育也坤見坎毁剛柔以中正相濟屯解之象坤為年其數十六二守正不苟合於初而貞於五是以不字屯難之極至於十年二五合剛柔濟兊女乃字屯本臨二之五合則九反二六反五坤為常故曰反常也王弼曰屯難之世其勢不過十年孰謂弼不知天乎坤為年何也曰嵗陽也陽生子為復息為臨為泰乾之三爻也夏后氏建寅商人建丑周人建子無非乾也古之候嵗者必謹候嵗始冬至日臘明日正月旦日立春日謂之四始四始亦乾之三爻也坤十月隂也禾熟時也故詩十月納禾稼春秋書有年大有年喪禮三年者二十七月也六三即鹿無虞惟入于林中君子幾不如舍往吝象曰即鹿無虞以從禽也君子舍之往吝窮也六三柔不當位不安於屯妄動以求五五君位艮為黔喙震為決躁鹿也言有求於君也若上六變而應三艮變巽離有結繩為罔罟之象艮為手虞人指蹤而設罔罟者也上六在君之側而不應譬之即鹿無虞人以導其前豈惟不得鹿乎往而徒反退之三陷于林莽中矣艮為山震為木林也三四為中林中也六三有從禽之欲不知事有不可貪求妄動是以陷于林中而不恤故曰即鹿無虞以從禽也君子初九也知不可往往無所獲且有後患故見幾而舍之舍止也艮也君子安於屯不若六三徒往而窮自取疵吝六四乘馬班如求婚媾往吉無不利象曰求而往明也六四柔而正上承九五坎為美脊之馬艮為手乘馬也四自應初五自應二其情異乘馬而班别者也故曰乘馬班如六四雖正有濟屯之志五不求而往豈能行其志哉五求四男下女隂陽相合斯可往矣往之上得位故吉無不利艮為手求也坎為月震東方明之時也九五有明德故求故求而往吉無不利否則志不應有凶易言出入往來何也曰出入以度內外也卦有內外自內之外曰出自外之內曰入出者往也入者來也往者屈也來者伸也出入往來屈伸相感而無窮天道東面望之來也西面望之往也故晉之出為明夷之入蹇之往為解之來九五屯其膏小貞吉大貞凶象曰屯其膏施未光也坤為民兊為澤五之二成兊有膏澤下于民之象膏澤下則五之所施光矣坎為月有光之象故也屯之時九五得尊位六三不正處內卦之極震體而有坤權臣挾震主之威有其民者也六三壅之九五之膏澤不下故曰屯其膏言人君之屯也九五中正守位六二六四上六自正隂為小故小貞吉五動而正三以君討臣則三復乘五蓋膏澤不下五之施未光民不知主禍將不測矣故大貞凶易傳曰膏澤不下威權已去而欲驟正之求凶之道也魯昭公髙貴鄉公之事是也若盤庚周宣修德用賢復先王之政諸侯復朝以道馴致為之不暴又非恬然不為若唐之僖昭也不為則常屯以至於亡矣上六乘馬班如泣血漣如象曰泣血漣如何可長也上六屯之極也五坎為美脊之馬動而乘之上應三五自應二雖欲用五濟屯其情異矣乘馬而班别也上動成巽巽為號上反三成離為目坎為血泣血也上不得乎君以濟屯難極矣無如之何是以泣盡繼之以血連而不已上之三連兩離爻故曰漣如然屯極矣極則必變何可長也巽為長坎下艮上蒙亨匪我求童蒙童蒙求我初筮告再三瀆瀆則不告利貞彖曰蒙山下有險險而止蒙蒙亨以亨行時中也匪我求童蒙童蒙求我志應也初筮告以剛中也再三瀆瀆則不告瀆蒙也蒙以飬正聖功也止於外不可進也險在內不可止也險而止莫知所適蒙也此以艮坎二體言蒙也蒙者屯之反屯者物之稚故蒙而未亨有屯塞之義九二引而逹之屯塞者亨矣屯九五大者亨五反為二以亨道行也蒙有可亨之理當其可亨之時而亨之使不失其中者時中也學者禁於未發發而後禁則過時而弗勝故曰蒙亨以亨行時中也此以九二言亨也艮為少男童蒙也我者二自謂也二在下不動有剛中之德以自守匪我求童蒙也二柔順與五相應艮為手求之象童蒙求我也童蒙求我然後二以志應五志謂剛中也二為衆隂之主四隂皆求於二而志應者應五也震為草以手持草筮也筮占決也五動二應初筮告也初筮告者以剛中也不問而告與問一而告二皆非剛中夫不憤不啓不悱不發蒙塞極矣於是求達焉則一發而通通則不復塞矣此初筮所以告也六三六四不與二相應再三瀆瀆則不告也不待其欲逹隨其屢問而告之決之不一不知所從則必燕辟廢學褻其師訓瀆與黷同此以二三四爻言亨蒙之道也蒙自二至上體頤頤飬也九二一爻自發蒙者言之剛中也然而未正故戒之以利貞自蒙者言之純一之德未發童蒙飬之至於成德躋位乎中正則聖功成矣蓋學未至於聖未足謂之成德故夫子十五志干學至於七十而從心所欲不踰矩則蒙以飬正作聖之功也虞翻曰二志應五變得正而蒙亡此以二五言利貞也在卦氣為正月故太玄凖之以童象曰山下出泉蒙君子以果行育德坎水在山下有源之水泉也山下出泉未有所之蒙也泉積盈科其進莫之能禦故君子果其行必育其德德者行之源育德者飬源也果行則發而必至震為行乾剛為德坎水上為雲下為雨在山下為泉象其物宜也初六發蒙利用刑人用説桎梏以往吝象曰利用刑人以正法也初六之動發蒙也蒙蔽之民不善其始至死於桎梏而不悔初六發蒙利用此刑人刑人非惡之也以正法也於其始也正法以示之蒙蔽者知戒終不陷於刑辟用説桎梏之道也艮手震足交於坎木桎梏之象坎為律法也初六動而正正法也兊為刑殺兊見坎毁説桎梏也治蒙之初威之以刑然後漸知善道過此以往則吝矣卦言童蒙爻言刑人刑所以輔教也易傳曰立法制行乃所以教也後之論刑者不復知教化在其中矣九二包蒙吉納婦吉子克家象曰子克家剛柔接也六五柔也九二剛也五以柔接剛為二所包含章有美而效之君臣道之正也二之吉也故曰包蒙吉二以剛接柔為五所納艮男為夫巽女為婦婦有相成之道虛其中以納之君道之正五之吉也故曰納婦吉二在內為家坎為乾之子父有子而至於納婦子克荷其家者也九二而致其君虛中納之非其道廣其施博積誠以包蒙能若是乎譬之子克家者也二不能包則五不肯納上柔不接家道廢矣故曰子克家剛柔接也二為家何也曰二內也大夫之位大夫有家雜卦曰家人內也六三勿用取女見金夫不有躬無攸利象曰勿用取女行不順也六三蒙而不正之隂坎有伏離離目為見上九不正下接六三成兊兊為少女取女也艮少男夫也乾變為金見金夫也坤為身兊折之為躬三之上不有躬坤為順三不正行不順無攸利故戒以勿用取女取女貴正女正則家人吉六三見利而恱不能自有其躬上九説之以利於德為不正於理為不順取是女而欲正家是亦蒙矣六四困蒙吝象曰困蒙之吝獨逺實也陽為實九二剛實發蒙之主二與五應三動而近二四獨逺之若動而應初則與二相近四懷居不動獨逺於二介於不正無以發其蒙困而知學吝自取也二坎三動成兊澤無水困也故曰困蒙之吝獨逺實也陽為實何也曰隂消為虛陽息為實消息盈虛相為去來消則降息則升實則滿虛則耗升者貴也降者賤也滿者富也耗者貧也隂陽相循禍福更纒故又為貴賤貧富禍福之象太玄曰盛則入衰窮則更生有實有虛流止無常又曰消與息糾貴與賤交禍至而福逃六五童蒙吉象曰童蒙之吉順以巽也艮少男童也五求於二成坤坤順也二往資五成巽巽巽也順則易從巽則易入順則樂告之以善道巽則優柔以開導之以此治蒙優於天下矣童蒙之吉也五君位成王求助之爻乎上九擊蒙不利為寇利禦寇象曰利用禦寇上下順也為寇者九二也擊蒙禦寇者上九也坎為盜體師盜用師寇也艮為手擊也為寇者利於蒙暗昏亂之時蒙極而解則是非定蒙暗明故曰不利為寇上九乘其蒙解之時自上之三擊之坎毁成兊民恱而從之上下之情順也孟子謂取之而燕民恱也坤為順故曰利用禦寇上下順也易傳曰若舜征三苗周公誅三監禦寇也蒙屯之反何也曰姤變者六復變者六遁變者十有二臨變者十有二否變者十有二泰變者十有二反復相變聖人所以酬酢也陸震亦曰卦有反合爻有升降所以明天人之際見盛衰之理焉乾下坎上需有孚光亨貞吉利涉大川彖曰需須也險在前也剛健而不陷其義不困窮矣需有孚光亨貞吉位乎天位以正中也利涉大川往有功也需須也須待也剛健上行遇險未動待時者也故曰需須也險在前也坎險也陽陷於隂中陷也困者水在澤下也需自二而上有困反之象三陽剛而健能須以進動而不屈不陷於險善用剛健者也故曰剛健而不陷其義不困窮矣此以兩體言乎需也須以進者需有孚而後進也孚者已也孚之者人也豈能遽孚之哉需自大壯變大壯四陽同德四與五孚未進之時雖未得天位其德固已剛健有孚特道未彰爾及其自四而進則位乎天位乃光亨也光坎離之象光亨者以貞吉也九五正中待物之須而不匱者惟正中乎故曰貞吉需道至於光亨位乎天位為須之主萬物需之貞吉也二者夫子之待價也五者天下之望成湯也此以二五言需之才也坎為大川自四之五往也乾剛須時而往何難不濟故曰利涉大川往有功也於卦氣為二月故太玄準之以耎傒象曰雲上於天需君子以飲食燕樂雲上於天蓄膏澤而未降須也君子蓄其才德未施於用亦須也飲食以飬其氣體燕樂以養其心志居易俟命待時而動蓋需有飲食之道膏澤所以養萬物也坎為水兊為口為和説初九需于郊利用恆無咎象曰需于郊不犯難行也利用恆無咎未失常也三乾天際也四在內外之交曰郊五坎為險難初九正應六四而險難在前當守正不動以需其應不先時而動不犯難而上行故曰需于郊不犯難行地風雷相與不失其正天地可久之道曰恆謂五變四動而交乎下也九五虛中以需六四屈已以下之如是應時之需則上下相與可久而無咎隂之從陽地道之常也初九陽在下需六四之應而以巽行以上下言之未失常也九五剛健中正而曰犯難者非其應而往無因而至前志未通也或問利用恆也順以巽也乾道乃革也何取於卦也曰卦變也所謂之某卦也需利用恆者需之恆也蒙六五順以巽者蒙之觀也乾九四乾道乃革者乾之小畜也小畜之中又有離兊故曰革是謂天下之至變九二需于沙小有言終吉象曰需于沙衍在中也雖小有言終吉也五坎為水二三兊為澤水往矣而其剛留於澤者剛鹵也二在澤中剛而柔沙之象沙近於險者也五不應二故二需之九二得中剛而能柔待時而動其動必以正積誠既久二五相合坎化為坤險難易而為平衍矣需于沙而不妄動則平衍固在其中矣故曰需於沙衍在中也六四與五近而相得四見二不應而需之與五異趨小有言宜矣兊口為言也君子自守亦何傷哉夫子不進猶不免於有言矧餘人乎二非終不進也動則正正則吉而兊毁雖小有言終無凶也故終吉象言以吉終者二之五以吉行故有終勉之也九三需于泥致冦至象曰需于泥災在外也自我致冦敬慎不敗也坎水坤土水澤之際為泥九三剛健之極進逼於險已將陷矣需于泥也上六坎在外為災故曰需于泥災在外也九三守正可也動則上六乘之坎為盜盜有戎兵冦也冦雖險我動不正而迫之已甚則至故曰致冦至上乘三成坤為輿坎為車多眚則敗也九三正而明能抑其剛健持之以敬慎而不動誰能敗哉敬者持其正也三四下有伏艮艮止也慎之象故曰自我致冦敬慎不敗也六四需于血出自穴象曰需于血順以聽也乾變坎為血九五大壯乾變故曰血坎為隱伏兊為口穴也六四處險者也據坎兊之際三陽自下而進故曰出自穴六四安其位以一隂礙之有險在前進退不可則隂陽必至於相傷小人安險不傷不已故曰需于血為六四者不競而順以聽之則善故曰需于血順以聽也惟順以聽是以三陽出自穴而無違焉六四坤順也坎耳聽也九五需于酒食貞吉象曰酒食貞吉以中正也需至于五隂已退聽難已獲濟位乎天位應天下之須坎震為酒兊口在下酒食之象酒食所以養人者也故曰需于酒食九五為需之主應之以中正而已天下之需於五者無須不獲各足其量而止如飲酒者止於醉食者止於飽需者無窮應者不動故貞吉貞吉者以中而正也中則飬之者不過過則應之有時而窮故曰酒食貞吉以中正也坎震為酒何也曰震為禾稼麥為麴蘖東方榖也故東風至而酒湧上六入于穴有不速之客三人來敬之終吉象曰不速之客來敬之終吉雖不當位未大失也需者訟之反三陽自外而入坎兊為穴故曰入于穴客在外主人以辭速之曰吾子入矣主人須矣九五需之主也三陽乾兊居西北之位客也自外而入主人未應不速之客也三人者三爻也故曰不速之客三人來敬者持其正也上六九三當位而應九二初九不當位而不應君子固有至於是邦無上下之交者豈可以不速之客而不敬乎三陽同類也敬其一不敬其二則需之者所失大矣爻辭言不速之客三人來敬之終吉而象辭去其三人止曰不速之客來者為上六也上六於二於初為不當位也當位而應則得一人不當位而兼應之則得三人自不當位言之則失也自得三人言之則雖不當位未大失也終吉者不失其正故吉卦體需也有所失人則失需之義矣卦四陽君子二隂小人於六四戒之以順聽於上六戒之以敬客君子得位則小人得其所故為小人謀者如此坎下乾上訟有孚窒惕中吉終凶利見大人不利涉大川彖曰訟上剛下險險而健訟訟有孚窒惕中吉剛來而得中也終凶訟不可成也利見大人尚中正也不利涉大川入于淵也乾健也坎險也兩者相敵所以訟也無險則無訟無健則不能訟險而健故訟此以兩體言訟也訟自遁來九三之二二有孚于五剛來掩於二隂之中剛實有孚信而見窒於人不窒則無所事於訟矣雖有孚也然剛失位見窒於二隂邪正是非上未辨也能惕懼處柔訟而不過乎中則免矣離為目巽為多白眼惕之象故曰有孚窒惕中吉剛來而得中也此以訟三之二言九二之才也訟剛太過而不反終成其訟必凶故曰終凶訟不可成也此以成卦上九言訟之終也九五大人聽訟者也中正在上無所偏係君子小人各得其平故九二利見之以中正為尚也離為目見也有善聽者然後孚信懼而得中吉故曰利見大人尚中正也此以九五言訟之主也訟一變巽二變鼎三變大過坎水變兊川壅為澤乾首沒于澤中入于淵也天下之難未有不起於爭剛險不相下君子小人不相容難始作矣聖人見其訟也戒之中正戒之不可成若濟之以爭是以亂益亂相激而為深矣漢唐之亂始於小人為險君子疾之已甚其弊至於君子小人淪胥以敗而國從亡故曰不利涉大川入于淵也此以卦變終言一卦之義也在卦氣為清明三月節故太玄準之以爭卦一變二變何説也曰在賁之彖曰柔來而文剛分剛上而文柔在無妄之彖曰剛自外來而為主於內此舉一隅也剛柔相變上下往來明利􅊣吉凶之無常也是故一卦變六十有三此焦延壽易林之説也象曰天與水違行訟君子以作事謀始天西行水東行違行也行相違乃有訟巽為事乾陽始於坎作事而謀始則訟不作窒訟之源也初六不永所事小有言終吉象曰不永所事訟不可長也雖小有言其辨明也初與四應九二間之此初六所以訟也初往訟二四來應初坎毁巽降兊見坎險也兊説也巽為事坎又為可不永所訟之事也訟事之險者不永所事以訟不可長也永其訟者未有不及禍者也兊為言隂為小小有言也初六往而直已九四體離而明四剛初柔各得其正故雖小有言而其辨易明明故終吉初以四為終也易傳曰在訟之義同位而相應相與者也故初與四為獲其辨明同位而不相得相訟者也故二與五為對敵也九二不克訟歸而逋其邑人三百戶無眚象曰不克訟歸逋竄也自下訟上患至掇也二五本相應以兩剛不相下此二所以訟五也然五君也其德中正以不正而訟中正不可也况以臣訟君乎不克訟者義不克也故退歸而逋則其邑人三百戶得以無眚不然五來討二禍及邑人矣歸者二自五而反逋者失位而竄坎為隱伏坤為衆坎動入於衆中竄也故曰不克訟歸逋竄也自下訟上於勢為逆於義為非禍患至於逋竄自取之猶掇拾也二去成艮手掇拾之象乾䇿三十有六坤䇿二十有四九二變則二三坤䇿四五乾䇿合而言之三百也坤為戶二在大夫位為邑自三至五歷三爻坎在內為眚二動去位則無眚故曰其邑人三百戶無眚太玄曰兩虎相牙掣者全也歸而逋之謂乎古者諸侯建國大夫受邑諸侯之下士視上農夫食九人中士倍下士上士倍中士大夫倍上士卿四大夫君十卿祿天子之大夫視子男大國之卿當小國之君然則諸侯之卿當天子之大夫也食二百八十有八人三百戶舉全數也六三食舊德貞厲終吉或從王事無成象曰食舊德從上吉也乾為剛德上九陽極而老舊也三之上成兊為口食舊德也食舊者食其素分猶言不失舊物也古者分田制祿公卿以下必有圭田以德而食其來舊矣公卿以下所食如周官家邑小都大都之田是也三公位乾上九郊之象六三當爭勝之時不喪其舊以不訟四而從上也三從上而四間之宜有訟三柔而明柔則不能訟明則知不可訟而止是以從上而食舊德六三介九二九四兩剛之間而失位厲也往從上九則上屈其剛就之無所事訟得位而食終吉也三之從上非苟從也或從王事以成功歸之已終其事不以無事而食是以食舊德也非從上之吉乎乾五為王巽為事三內卦之成上外卦之終故或從王事以無成有終竇嬰訟田蚡上下相激至亡其身不知六三之吉也易傳曰訟者剛健之事故初則不永三則從上二爻皆以處柔不終而得吉四亦不克而渝得吉訟以能止為善也九四不克訟復即命渝安貞吉象曰復即命渝安貞不失也訟生於仇敵故有忿爭不安其命者焉九四上承五下乘三而初為應五君也不可訟也三從上初從四無與為敵者故不克訟乃克其剛強欲訟之心而與初相應相應則情義相得各復其所何訟之有各復其所者復即命也命者正理也復即命則變前之失安於正理矣訟者始於剛強而不明九四處柔體離巽柔巽故無狠怒明則知可否斯九四所以能復者歟巽為命何也曰巽為風風者天之號令在人則命也受之於天也故先儒以巽為命為號令為事巽象曰申命行事正與否則繫乎爻位之得失陸績曰訟之復乾變而巽九五訟元吉象曰訟元吉以中正也九五聽訟之主未能使人無訟何謂元吉大人得尊位以中正在上無所偏係邪枉之道不行故吉元吉者其始本吉吉之至善者也此臯陶淑問召伯聽訟之爻上九或錫之鞶帶終朝三褫之象曰以訟受服亦不足敬也三限乎上下之際腰之象也上九之三或錫之乾變為金腰以金飾鞶帶也三離日之上為終朝兊為毁折伏艮為手為受服三復位鞶帶毀有褫之象也故曰或錫之鞶帶終朝三褫之自五之三歷三爻三褫也敬者人以其正足憚故敬之上九成訟而居上位受服不以正知其雖有是物亦不足取敬於人內自愧恥不安其服是以終朝三褫之爭訟逆德非人之本心故不克訟則歸而逋竄以訟受服則愧而三褫坎下坤上師貞丈人吉無咎彖曰師衆也貞正也能以衆正可以王矣剛中而應行險而順以此毒天下而民從之吉又何咎矣坤衆也五隂而一陽為之主利於用衆二有震體震動也聚衆而動之亦用衆也周官自五人為伍積之至於二千五百人為師亦衆也故曰師衆也用師之道以正為本九二動之五正也苟動不以正出於忿􅋧驕矜雖迫之以威非得其心也惟一本於正使衆人皆得其正天下之民將歸往之王者之道也師自復來初之二者也一變師二變謙三變豫四變比至比而得尊位可以王矣要終而言也故曰貞正也能以衆正可以王矣丈人者尊嚴可信長者之稱身在險中服其勤勞則衆應之能以衆正者也震為長之象言九二也武王之於尚父宣王之於方叔是已子夏傳本作大人將帥之道不剛則慢而不肅剛而不中則暴而無親剛中矣而上無柔中之主以應之則睽孤內顧動輒見疑已且不暇恤其能成功乎古者人君之用將既得其人跪而推轂付之斧鉞進止賞罰皆決於外不從中制是以出則有功語天下之至險者無若師也師動以義而民從之雖至險而行之以順也坎自初之二進而上行行險而順也凡藥石攻疾謂之毒師之所興傷財害物施之天下至慘也聖人不得已而用之以去民之害猶用毒藥以攻疾雖曰毒之其實生之以此毒天下而民安有不從者哉兼是五者唯九二乎是以吉而無喪敗合於義而無咎也坎為險又為毒者險難之所伏也醫師毒藥以攻疾所以濟險難也故又為藥故曰剛中而應行險而順以此毒天下而民從之吉又何咎矣在卦氣為立夏四月故太玄準之以衆象曰地中有水師君子以容民畜衆物之在天地間至多者無若水也地中能有之師之象也故土雖緻密而含通流泉河海之大不能出其涯涘君子寬以容民又有度量上下維持以畜衆繫辭曰陽一君而二民隂二君而一民民謂隂爻也有陽爻則隂爻為民所謂容民者言內卦也坤為衆所謂畜衆者言外卦也或曰隱至險於大順伏師旅於民衆井田之法也初六師出以律否臧凶象曰師出以律失律凶也坎坤為律律謂之法者度量衡之法起於黃鍾之九寸黃鍾坎位也爾雅曰坎律銓也兵法地生度度生量量生數數生稱稱生勝師出以律則教道素明兵卒有制勝敵之道也初六不正動則坤坎毁師失律之象地否臧失律也否讀為可否之否劉遵曰否字古之不字也失律者為不善否臧則不善杜預亦曰否不也故辭曰否臧象曰失律失律則凶矣或曰師出無名而以律可謂臧乎曰司馬掌九伐之法不正而動是亦失律安得不凶執事順成為臧逆為否衆散為弱川壅為澤有律以如已也故曰否臧其律竭也盈而以竭大且不整所以凶也曰師之臨者初六動而成兊也坤為衆坎為律為川坤毁則衆散坎毁則川壅而律竭九二在師中吉無咎王三錫命象曰在師中吉承天寵也王三錫命懷萬邦也卦五隂聽於一陽在下而專制其事者也人臣惟在師可以專制然專制疑於擅權不專制無成功之理得中道乃吉而於義無咎九二剛居柔威和並用得中者也故能承天寵天寵者龍光也乾在上為天五坎為光二震為龍二之專制以五寵之譬之地道含萬物而化光非天地之施乎惟在師得中乃能承天寵不然怙寵而驕必有凶咎莫敖自用得臣剛而無禮安能承天寵哉坤在上為邦四諸侯三公五乾為王九自四歷三爻二有伏巽為命王三錫命懷萬邦也古者諸侯入為天子之卿天子之卿為六軍之將王錫命之至於三極數也然亦不過乎中萬邦所以懷歟過則濫賞有功者不恱非所以懷來之九自五之二懷來也六三師或輿尸凶象曰師或輿尸大無功也九二以剛中之才行師上下當順以聽坎耳坤順也六三在下卦之上又動而主之則尸其事者衆也故曰師或輿尸坤為輿輿又訓衆三動得位尸之也坎變兊毁其師也故大者無功而凶荀卿論兵曰權出一者強權出二者弱易傳曰軍旅之任不專一覆敗必矣六四師左次無咎象曰左次無咎未失常也六四之動震為左日在地下暮夜之時師宿為次坎阻水也險難在下救者當倍道赴之動而左次阻水以自固豈用師之常哉宜有咎然六四柔能自正而下無應知其不可行量敵慮勝臨事而懼未失坤之常也於義為無咎春秋書齊師宋師次于聶北救邢按兵待事卒能救邢何咎於次哉易傳曰度不能進而完師以退愈於覆敗逺矣可進而退乃為咎也易發此義以示後世其仁深矣六五田有禽利執言無咎長子帥師弟子輿尸貞凶象曰長子帥師以中行也弟子輿尸使不當也五應二二為田震為稼坎為豕田豕害稼四時之田皆為去害二往之五成艮手為執伏兊為言執言者奉辭罰罪也六五柔中以任將帥二執言而行去民之害不得已而用師譬如田獵田既有禽然後取之田有禽則非無名興師執言則我有辭於義無咎矣故曰田有禽利執言無咎然六五柔於用人不可不戒九二震為長子帥衆而衆從之者以剛居柔威克厥愛以中道行師也若五動成艮於震為弟於乾為子之三則坎毁既使二主師又使三主之輿尸也所任不一雖正亦凶九五正也艮手有上使之意上使不當也輿尸之凶聖人再言之者任將不可不重也易傳曰自古任將不專而致覆敗者如晉荀林父邲之戰唐郭子儀相州之敗是也上六大君有命開國承家小人勿用象曰大君有命以正功也小人勿用必亂邦也上六動乾在五上五君位大君也大君者號令之所自出也故履之上九臨之六五皆曰大君上之三成巽巽為命大君有命也有命以正有功也有大功者開國使建國有小功者承家使受邑也四諸侯位震為長子主宗廟社稷開國者也二大夫為家初隂在下承之承家者也巽三在二四之中有開國承家之象上師之成宗廟之位古者賞人必於祖廟示不敢專故上六併言之六三不正為小人三之上小人用於上成坤必亂邦也行師之時貪愚皆在所使未必皆君子及其成功而行賞則君子當使之開國承家小人厚之以金帛優之以祿位不害其為賞功也蓋胙之土萬世之利尊有德所以示訓若小人無厭有民人社稷其害必至於亂邦周頌賚大封于廟言錫豫善人也光武中興臧宫馬武之徒奉朝請而已得此道也然寇鄧諸賢無尺寸之土亦過矣易傳曰小人易致驕盈况挾功乎漢之英彭所以亡也或問坤為土為國邑古亦有言之者乎曰周太史為陳侯之子筮之遇觀之否觀六四諸侯之位也坤為土變而為乾乾父坤母繼父母之國者也故曰其代陳有國乎內卦坤為土風行地上不處者也故曰風行而著於土其在異國乎此皆以坤土為國也畢萬將仕於晉遇屯之比初九變也辛廖占之曰震為土車從馬公侯之卦又曰公侯之子孫必復其始二大夫位也言大夫復為諸侯以坤土動於下也坤下坎上比吉原筮元永貞無咎不寧方來後夫凶彖曰比吉也比輔也下順從也原筮元永貞無咎以剛中也不寧方來上下應也後夫凶其道窮也比吉者比而吉也凡物孤則危羣則強父子夫婦朋友未有孤危而不凶者人君為甚故比而吉謂九五也比輔也一陽在上四隂在下順從之比所以吉也故曰比吉也比輔也此合兩體言比也然比當慎不可以不與善不可以不長久不可以不正有是三者乃可以無咎以其當愼也故原筮以決其所從原再也如原𧖟原廟之原比自復來一變師二變謙三變豫自謙至豫有艮手持震草占筮之象故曰原筮原筮則其愼至矣復初九始於正四變成比不離於貞元永貞也元君德也善之長也乾剛之始也蓋比道之難既原筮以審之其始也相比以善其終也永貞則無咎矣不然慮之不審其始比之不善或貞而不永豈能無咎原筮元永貞者九五也九五之剛乾元也故曰元位乎中正故永貞故曰以剛中也坎往則坤來坎勞卦不寧也坤為方不寧方來也比之時下雖比輔不敢自寧則上下相應多方來矣故曰不寧方來上下應也謙坤三四五爻先來比之上六獨安其位而不來欲來則已後不來則履險而逼道窮而不知變故凶上六之所以凶者後夫三爻也故曰後夫凶比道貴先故也象曰地上有水比先王以建萬國親諸侯地上有水相比而無間乾五王也四諸侯位坤土在上國也坤為衆萬國諸侯衆多也比師之反九二為五有先王建萬國親諸侯之象建萬國者衆建也建萬國則民比其國君親諸侯則國君比于天子封建自上古聖人至於三代不廢享國久長秦罷侯置守二世而亡此封建不可廢之驗也患封建不得其道耳得其道者建萬國是已夏承唐虞執玉帛者萬國成湯之時七千七百七十三國成周千八百國而夫子必曰建萬國者衆建諸侯而少其力也衆建則多助少其力則易制觀此則周官諸侯之制疑若非周公之意也初六有孚比之無咎有孚盈缶終來有它吉象曰比之初六有它吉也初六不正未能信者也比道以信為本中心不信人誰親之以是比人宜有咎四與初本相應初動而正往比之則有孚信矣孚者信之應也春秋傳曰小信未孚故有孚比之無咎初六坤土坤為腹動之四成兊兊為口巽為繩土器有腹有口而繩引之坎水盈其中盈缶也缶所以汲質素之器誠之象水盈其中亦誠信充實而無間之象有孚之謂也比之有孚何咎之有故曰有孚盈缶初始也四終也初自四復位終來也四非正應謂之它子夏曰非應稱它初比之以誠信其終也來有它之吉矣若始比不以誠其能終有它乎故曰比之初六有它吉也陸績曰變而得正故吉是也六二比之自內貞吉象曰比之自內不自失也六二九五中正相比剛柔正而位當聖人猶曰比之自內者六二柔也恐其自失也二處乎內待上之求然後應之比之自內者也故貞吉正則吉也不能自重汲汲以求比動而自失其正道亦不可以行矣枉尺直尋未有能直人者也故曰比之自內不自失也易傳曰士之修己乃求上之道降志辱身非自重之道也故伊尹武侯救天下之心非不切必待禮至而後出也六三比之匪人象曰比之匪人不亦傷乎比之匪人與否之匪人同義子夏曰處非其位非人道也三四處中人位也人道相比以正六三柔而不正處非其位逺比于上六以非道而不應近比乎六四六二以不正而不受天地之間未有不相親比而能自存者也比之而人莫與不亦可傷乎虞翻曰體剝傷象彌子瑕曰孔子主我衛卿可得也孔子曰有命魯桓公求會於衛至桃丘衛侯弗與之見求比而不得不亦可傷乎可傷則悔吝不必言也六四外比之貞吉象曰外比於賢以從上也四以五為外內外相形而後有者也六四當位不內比於初絶其繫應外比於五守正不動則相比以誠矣故貞吉五以德言之剛健中正賢也以位言之君上也以正比賢以臣比君外比之所以吉歟易曰東北喪朋安貞吉六四之謂乎九五顯比王用三驅失前禽邑人不誡吉象曰顯比之吉位正中也舍逆取順失前禽也邑人不誡上使中也九五比之主坎為明顯明比道者也故曰顯比五位乎正中比者因以比之不規規以求比於物比之以正中之道所以吉也故曰顯比之吉位正中也乾五為王自四至二歷三爻坤為輿為衆坎為輪田獵之象王用三驅也艮為黔喙坎為豕震為決躁內卦為後外卦為前嚮上為逆順下為順故曰失前禽也顯比之道譬之從禽王者之於田也三面驅之闕其一面逆而嚮我則舍之背而順我之射則取之舍之者明比也取之者明不比也所謂正中也旋於征伐叛伐之服者舍之故曰舍逆取順失前禽也坤在下為邑謂二也邑人者二乾也二之五艮見兊伏兊為口邑人不誡也王者之比天下無逺邇無內外無親踈不以邑人近則告誡而親之不以僻陋之國逺則不誡而踈之使人人以中道相比無適無莫則吉若顯比矣其道猶狹未吉也故曰邑人不誡上使中也或曰安知捨逆之為嚮我取順之為射取之曰觀其所殺而知也射者從禽左而射之由左逹右詩曰公曰左之舍拔則獲故田有三殺自左膘達於右腢為上殺射右耳本為中殺射左髀達於右為下殺靣傷不獻翦毛不獻鄭康成曰禽在前來不逆而射之也去又不射也唯其走者順而射之王弼亦曰趣已則舍之背已而走則射之上六比之無首凶象曰比之無首無所終也六三動而比上上比乎三成乾乾為首三者上之始上者比三之終三不知比上則比之無首上不知比三則比之無終比之無首無所終矣正者宜吉然上六不免於凶者正而不用也道與人同者也不相親比與比之而無首雖正亦凶乾下巽上小畜亨密雲不雨自我西郊彖曰小畜柔得位而上下應之曰小畜健而巽剛中而志行乃亨密雲不雨尚往也自我西郊施未行也柔自姤進而上行至四得位上下五剛説而應之説則見畜矣一柔畜五剛小畜大臣畜君也爻非所應亦曰應之隂者陽之所求也故曰柔得位而上下應之曰小畜此以六四言小畜之義也下乾健也上巽巽也九二九五剛中也健而濟之以巽則易入剛不過乎中則志行於上下兩者得則柔道亨而陽為隂所畜矣故曰健而巽剛中而志行乃亨此以兩體二五言小畜之才也兊盛隂也密雲者兊澤之氣上行也雨者陽為隂所得相持而下者也六四志在畜君以往為尚畜君者好君也不得於君其能畜乎故曰密雲不雨尚往也此再以六四言小畜也乾天也在內外之交而見天際郊之象兊西也我者內為主柔自下升天地之理陽唱則隂和西郊隂也密雲不雨隂先唱也以臣畜君雖尚往也然不待唱而先之則其施未行施者膏澤下流也柔得位待唱而往則君施行矣故曰自我西郊施未行也聖人言此示臣強之戒且曰隂畜陽小畜大終不可以成大事乾天下之至健至難畜者非剛健篤實輝光日新其德豈能畜之在卦氣為四月故太玄準之以斂象曰風行天上小畜君子以懿文德天剛德文柔德風行天上剛為柔所畜小者畜也君子以是懿文德傳言太虛無礙大氣舉之初九復自道何其咎吉象曰復自道其義吉也聖人欲明陽不受畜於隂之義故以履小畜二卦反復明之小畜履之反初本在上二本在五三本在四故初二皆以復言之三受畜而不得復者也初者九之位正也正者君子之道初九不受畜而復四猶未為得所宜有咎然由正道而復四亦以柔道下之何其咎哉於義吉也九二牽復吉象曰牽復在中亦不自失也小畜以一隂畜五陽五本二之位五動則二應同志者也二乾體剛健五巽體柔巽二進而欲復其所五以同志牽挽而復之巽為繩為股艮為手牽復也二牽挽而後復者畜之已深不若初九自道而復為易然在小畜之時五能下之引類自助為得中道二復而在中亦不自失其正而吉兩得之也易傳曰同患相憂二五志同故相牽連而復二陽並進則隂不能勝得遂其復矣九三輿説輻夫妻反目象曰夫妻反目不能正室也子夏傳虞翻本輻作輹當作輹上九九三本相應若動而成震坤其輿也陽畫輿下橫木也為輹九三見畜不可動兊為毁折輿説輹矣其能進乎震為夫離為妻為目巽為多白眼九三剛而不中見畜而怒故反目相視妻制其夫男女失位不能正室也三四巽離有家人象故以室言之妻齊也敵夫之辭震離同象故曰夫妻初二畜於巽而復獨九三畜於六四而不復者九三失道比於四而恱之也陽無失道隂豈能畜之聖人詳言此者為陽畜於隂之戒易傳曰未有夫不失道而妻能制之也春秋傳晉獻公筮嫁伯姬於秦遇歸妹之睽史蘇占之曰車脫其輹歸妹外卦震也上六變離震毁車脫其輹與此爻及大畜九二同象六四有孚血去惕出無咎象曰有孚惕出上合志也五君位體巽四近而相得以正相比臣畜君者也四不繫於初誠信孚於上有孚也三陽務進而上四以一隂乘之若畜之以力隂陽相傷可不惕懼乎唯誠信孚於上而與上之志合則物莫之傷而惕懼逺矣伏坎為血為加憂巽為多白眼惕也血去惕出者四五相易合志之象象辭不言血去蓋惕出則血去可知九五之剛六四在下止畜其欲非誠信感之上下志合是嬰龍鱗也豈能畜哉惟其有孚志合守正而見信故以此處上下之際而無咎自古人臣得位上畜乎君下畜乎衆君子不如六四之有孚未有不傷霍光之於魏相蕭望之卒見傷也九五有孚攣如富以其鄰象曰有孚攣如不獨富也五近四相得無應以分其志有孚也易言交如者異體交也言攣如者同體合也四五同巽體君臣合志攣如也小畜一隂畜五陽常恐力不足而見傷五於畜時雖得尊位而不能畜以其富也委之於鄰併力而畜之有孚攣如則衆陽皆為我用矣陽實為富隂虛為貧四虛五實而五與之共位食祿四得盡其心能以富用其鄰也以如師能左右之曰以相比為鄰巽離亦鄰也富以其鄰不獨富謂富善人也上九既雨既處尚德載婦貞厲月幾望君子征凶象曰既雨既處德積載也君子征凶有所疑也大畜畜之以止畜極則散小畜畜之以巽極則畜道成矣上成動而畜三九三止而見畜坎見兊澤流既雨也既雨則陽與隂和矣九三不往而還其所既處也既處則不進矣陽剛健既雨既處豈一日畜之哉柔巽易入陽説而受制則剛者退避柔者尚之積之甚微至於載之而有不知也坎為輪乾陽德也而在下巽隂德也而在上陽反載之矣巽為婦當以柔巽從夫為德隂而畜陽柔而畜剛非德之正以是為正守而不變危厲之道譬之月也望則隂道盛滿即復虧而成巽巽畜乾豈婦德哉坎為月離日在兊西月望之時也六四未中幾望也君子上九也隂盛陽消君子有害動而去之則正征以正行也然不可動動則凶故不得已而處有所疑也巽為不果疑也可動者其唯小畜之初乎兊下乾上履虎尾不嘻人亨彖曰履柔履剛也説而應乎乾是以履虎尾不嘻人亨剛中正履帝位而不疚光明也履踐也言踐履之道一柔而履二剛上為乾剛所履不言剛履柔者三柔履之主也以柔履剛踐履之難處之得其道履之至善也故曰柔履剛此以六三一爻言履之義也卦後為尾兊為虎為口虎口嘻人者也乾健也上九極乾六三以柔履其後上九與三相易上復成兊是履猛虎之尾怒而見嘻者也三兊體下説乎人情上應乎乾上極健而我應之以和雖剛而不忤和而不流柔而不犯推是道以行蹈吕梁之險可也故處乎五剛之間柔而能亨關子明曰履而不處其周公乎故曰説而應乎剛是以履虎尾不嘻人亨此合兩體言履至尾而亨也九五以天德臨下剛不中正有所偏繫則君子畏禍將去之小人以柔邪而進陽為隂所病矣九五中正踐帝位立乎萬物之上無所纍其心舜禹之有天下也履道至此光明格於上下矣離為明疚病也隂陽失位為病六三不正五不應之不疚也故夫子贊之曰剛中正履帝位而不疚光明也今之王古之帝也獨於履言帝位者易君德而當君位者五卦否無妄同人遁乾體也而無履之時有是德有是時而履是位者唯履而已上下履位物物循理之時也在卦氣為六月太玄準之以禮象曰上天下澤履君子以辨上下定民志天澤相際目力之所極則視之一也而上下實異體不可不辨禮者人所履表微者也坤為民巽為不果疑也故君子以禮辨上下定民志古之治天下者思去民之疑志以定之爾初九素履往無咎象曰素履之往獨行願也初在履之下而正安於下不援乎上者也四動而求之斯可往矣往以正不失其素履往成巽巽為白亦素也故往無咎履九五中正君位也四爻不正初九獨正往之四者將以正夫衆不正獨行願也非厭貧賤也非利富貴也是以往無咎易傳曰夫人不能自安於貧賤之素則其進也乃貪躁而動求去乎貧賤爾非欲有為也既得其進驕佚必矣故往則有咎九二履道坦坦幽人貞吉象曰幽人貞吉中不自亂也二動成震震為大途坤為平衍履道坦坦也道中正也初動二成坎坎為隱伏初未往二伏於坎中幽人也幽人言靜而無求及初復位動而不失其正幽人之貞也正則吉初之應四動而往靜而來上下無常也而在幽人守正所履坦坦者自若其中不自亂也坤為亂二正得中不自亂也久幽而不改其操者其唯九二乎易傳曰九二陽志上進故有幽人之戒六三眇能視跛能履履虎尾嘻人凶武人為于大君象曰眇能視不足以有明也跛能履不足以與行也嘻人之凶位不當也武人為于大君志剛也六三離為目兊毁之眇也眇者不能視逺言其智不足以有明也巽為股兊折之跛也跛者不能行逺言其才雖有上九之應不足以相與而行也卦一隂介五陽剛健之中才智不足處非其位柔不勝剛必有凶禍故曰嘻人之凶位不當也卦後為尾兊為虎為口履乾之後三往乎上成兊虎口嚙之嘻人之象六三位不當一也在卦言不嘻人亨爻言嘻人凶者卦體説而應乎乾應則柔應剛以説應健如列禦冦所謂達其怒心也爻則才知不足而有為于大君妄動也是不知宋王之猛者也乾五為君上九大君也兊西方肅殺之氣武也天右行故天事武三居中志也六柔居三志剛也六三往之上九武人有為于大君志剛則決不慮其才知不足而決於有為致嘻之道盆成括是已觀六三妄動而凶則知初九之往為吉矣九四履虎尾訴訴終吉象曰訴訴終吉志行也九四履三陽之後下有兊虎履虎尾也五剛四近君多懼然以陽居隂謙而不處動成震震為恐懼訴訴也恐懼則敬愼敬愼則動無非正始也履虎尾終也恐懼不失其正而志上行于君終吉也中為志動則行九五夬履貞厲象曰夬履貞厲位正當也六三履虎尾嘻人凶者位不當也九五其位正其德當而貞厲者剛天德不可為首也九五履乎正位當用六三之柔濟乎剛健而説決而和斯可以履天下之籍矣人君擅生殺之柄不患乎無威患乎剛過不能以柔濟則臣下恐懼而不進人君守此不變危厲之道兊為決三五相易成夬故曰夬履或曰六三不正何以用之義取柔濟剛也易傳曰古之聖人居天下之尊明足以照剛足以決勢足以專然未嘗不盡天下之議上九視履考祥其旋元吉象曰元吉在上大有慶也祥者吉之先見生於所履者也視我之所履則吉之來可考而知之矣天下之理未有出而不返者也上九所履不邪其旋反者必元吉也陽為大為慶上動以正乃致大有吉慶之道故曰元吉在上三在內為離目視履也上動而三有慶其旋元吉也上履之終故其祥可考焉漢上易傳卷一
