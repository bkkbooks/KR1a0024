front:
  text: 周易集傳序聖人觀隂陽之變而立卦效天下之動而生爻變動之别其傳有五曰動爻曰卦變曰互體曰五行曰納甲而卦變之中又有變焉一三五陽也二四六隂也天地相函坎離相交謂之位七八者隂陽之稚六九者隂陽之究稚不變也究則變焉謂之䇿七八九六或得或失雜而成文謂之爻昔周人掌三易之灋一曰連山二曰歸藏三曰周易七八者連山歸藏也六九者周易也經實備之䇿三變而成爻爻六變而成位變者以不變爲體不變者以變者爲用四􅁚並行八卦交錯而天地萬物之情可見矣其在繫辭曰爻􅁚動乎内吉凶見乎外又曰道有變動故曰爻此見於動爻者也乾生三男坤生三女乾交乎坤自姤至剥坤交乎乾自復至夬十有二卦謂之辟卦坎離震兊謂之四正四正之卦分主四時十有二卦各主其月乾貞於子而左行坤貞於未而右行左右交錯六十卦周天而復隂陽之升降四時之消息天地之盈虛萬物之盛衰咸繫焉其在易之復曰七日來復􅁚曰至日在革曰先王以治歴明時在􅀃卦曰震東方也巽東南也離南方之卦也兊正秋也乾西北之卦也坎正北方之卦也艮東北之卦也此見於卦變者也乾生者四卦坤生者四卦八卦變復生六十二坎離肖乾坤者也大過小過頥中孚肖坎離者也故乾坤不動而坎離四卦亦莫之動其略陳於雜卦其詳具於六十四卦之􅂏所謂辨是與非者也此卦變之中又有變焉者也一卦含四卦四卦之中復有變動上下相揉百物成象其在易則離震合而有頥坤離具而生坎在繫辭則罔罟取離耒耨取益爲市取噬嗑舟楫取渙服乘取隨門柝取豫杵臼取小過弧矢取睽棟宇取大壯棺槨取大過書契取夬又曰八卦相盪又曰六爻相雜唯其時物也又曰雜物撰德此見於互體者也一生水而成六二生火而成七三生木而成八四生金而成九五生土而成十生於陽者成於隂三天兩地也生於隂者成於陽兩地而三天也天以三兼二地以二兼三五位相得合而爲五十其在繫辭曰天一地二天三地四天五地六天七地八天九地十在􅀃卦曰巽爲木坎爲水離爲火此見於五行者也乾納甲壬坤納乙癸震納庚巽納辛坎納戊離納己艮納丙兊納丁庚戊丙三者得於乾者也辛己丁三者得於坤者也始於甲乙终於壬癸而天地五十五數具焉其在易之蠱曰先甲三日後甲三日在巽曰先庚三日後庚三日在離曰己日乃孚在繫辭曰懸象著明莫大於日月此見於納甲者也凡此五者之變自一二三四言之謂之數自有形無形言之謂之象自推考􅁚數言之謂之占聖人無不該也無不徧也隨其變而言之謂之辭辭也者所以明道也故辭之所指變也象數也占也無不具焉是故可以動可以言可以制器可以卜筮蓋不如是不足以明道之變動而盡夫時中也故曰繫辭焉而命之動在其中矣夫易廣矣大矣其逺不可禦矣然不越乎隂陽二端其究則一而巳矣一者天地之根本也萬物之權輿也隂陽動靜之源也故謂之太極學至於此止矣卦可遺也爻可忘也五者之變反於一也是故聖人之辭因是而止矣漢上先生履歷
