  text: 序卦傳第十
  hash: sha256:51e5a2121cde88855584b4933b8f04a6bdce6a8908629e82681ece4509720004
body:
  text: 文王作易以乾坤坎離爲上篇之用以艮兊震巽爲下篇之用上篇終於坎離下篇終於旣濟未濟頤大過小過中孚爲二篇之正乾坤者易之本坎離者乾坤之用離肖乾坎肖坤中孚肖乾小過肖坤頥肖離大過肖坎旣濟坎離之交未濟坎離之合坎離所以爲乾坤用者得天地之中也斯聖人酬酢不􅀝千變萬化不離乎其中歟康節曰至哉文王之作易也其得天地之用乎至夫子序卦然後明生生不窮而天地之藴盡矣故太玄準之以玄圗有天地然後萬物生焉􅄹天地之間者唯萬物故受之以屯屯者􅄹也屯者物之始生也物生必蒙故受之以蒙蒙者蒙也物之穉也物穉不可不養也故受之以需需者飲食之道也飲食必有訟故受之以訟訟必有衆起故受之以師師者衆也衆必有所比故受之以比比者比也比必有所畜故受之以小畜物畜然後有禮故受之以履履而泰然後安故受之以泰泰者通也物不可以終通故受之以否物不可以終否故受之以同人與人同者物必歸焉故受之以大有有大者不可以􅄹故受之以謙有大而能謙必豫故受之以豫豫必有隨故受之以隨以喜隨人者必有事故受之以蠱蠱者事也有事而後可大故受之以臨臨者大也物大然後可􅀚故受之以􅀚可􅀚而後有所合故受之以噬嗑嗑者合也物不可以苟合而巳故受之以賁賁者飾也致飾然後亨則盡矣故受之以剥剥者剥也物不可以終盡剥窮上反下故受之以復復則不妄矣故受之以无妄有无妄然後可畜故受之以大畜物畜然後可養故受之以頥頥者養也不養則不可動故受之以大過物不可以終過故受之以坎坎者䧟也䧟必有所䴡故受之以離離者麗也上篇以乾坤坎離爲用天地之生萬物也而有艮兊震巽焉天地万物具而人道俻矣下篇以艮兊震巽爲用有萬物而後男女夫婦也而有乾坤坎離焉人道備而天地萬物備矣故曰三才同科厚薄相劘韓康伯不領此㫖謂豈有天道人事偏於上下哉讀序卦而不察者也雲行雷動動必滿􅄹故曰屯者􅄹也震者物之始生坎者難也故曰屯者物之始生也蒙􅁳昧也物生者必始於􅁳昧勾萌胎夘是也故次之以蒙蒙童蒙也物如此穉也物穉而无以養之則夭閼不遂蓄德養才者亦然故次之以需震坎爲酒兊爲口有飲食之道飲食所以養也飲食必有訟乾餱以愆豕酒生禍有血氣者必有爭心故次之以訟訟者兩辭必以衆起故次之以師師衆也衆不能以治衆治衆者至寡也衆之所以比執一以御之則衆治矣故以次之以比比相親比也彼來比我我必蓄之故次之以小畜物畜聚然後有上下尊卑之等上下尊卑所謂禮也故次之以履禮者履而行之者也所履者君子大道則其心泰然而安故次之以泰泰者萬物通也物終通則无節故次之以否否塞也物終否則乖異不相爲用故次之以同人同人者與人同也與人同者物必歸焉舜大王是巳故次之以大有認物之歸爲已有者必驕驕則亢滿大復爲累矣有大者不可􅄹也故次之以謙物歸之矣又持之以謙猶冨而守之以儉豈不有餘􅁉哉有大而能謙者必暇豫也故次之以豫事豫立則動而不跲衆必隨之故次之以隨好上人者人之情也以喜隨人必有所事臣事君子事父婦事夫弟子事師非楽於所事者其肯隨乎故次之以蠱蠱者事壞而後有事者也韓康伯曰可大之業由事以生臨者以大臨小也故次之以臨觀者自下觀上物大然後可觀是以王尚大故次之以􅀚在上而无可􅀚則在下引而去矣非可􅀚其能有合乎故次之以噬嗑噬嗑者噬而合者也物不可以苟合苟合者其終則離必致飾焉故次之以賁賁隂陽相飾也致飾然後物亨亨則盡矣无以復加故次之以剥剥者剥也此商周之末所以不勝其弊文之末流也物窮則反不可終盡剥陽窮於上而終反於下故次之以復復天理則无妄无妄則其動也天故次之以无妄然後物物循理乃可大畜故次之以大畜前曰比必有所畜者比而後畜其畜也小故次之以小畜物能畜止然後可養雖養虎不外是也故次之以頤頤者􅀚人之養也求口實以自養也聖人養賢賢人養德不養之則不能動大過者動而大過乎物也故次之以大過而大過六爻皆以居安不動爲忌君子之所以過者時也過而不巳則失中失中則䧟没坎䧟也䧟必有所附麗乃能出險故次之以離離麗也一本云麗必有所感故次之以咸咸感也有天地然後有万物有万物然後有男女有男女然後有夫婦有夫婦然後有父子有父子然後有君臣有君臣然後有上下有上下然後禮義有所錯夫婦之道不可以不乆也故受之以􅁪􅁪者乆也物不可以乆居其所故受之以遯遯者退也故受之以大壯物不可以終壯故受之以􅀳􅀳者進也進必有所傷故受之以明夷夷者傷也傷於外者必反於家故受之以家人家道窮必乖故受之以睽聧者乖也乖必有難故受之以蹇蹇者難也物不可以終難故受之以解解者緩也緩必有所失故受之以損損而不已必益故受之以益益而不巳必決故受之以夬夬者決也決必有遇故受之以姤姤者遇也物相遇而後聚故受之以萃萃者聚也聚而上者謂之升故受之以升升而不巳必困故受之以困困乎上者必反下故受之以井井道不可不革故受之以革革物者莫􅀂鼎故受之以鼎主器者莫􅀂長子故受之以震震者動也物不可以終動止之故受之以艮艮者止也物不可以終止故受之以漸漸者進也進必有所帰故受之以帰妹得其所帰者必大故受之以豐豐者大也窮大者必失其居故受之以旅旅而无所容故受之以巽巽者入也入而後􅀃之故受之以兊兊者􅀃也􅀃而後散之故受之以渙渙者離也物不可以終離故受之以節節而信之故受之以中孚有其信者必行之故受之以小過有過物者必濟故受之以旣濟物不可窮也故受之以未濟終焉君子之道造端乎夫婦乆於其道而後化故次之以􅁪􅁪乆也進退升降與時消息不可乆居其所而不去故次之以遯君子萬物之主終遯而不反天地閉塞故次之以大壯大者壯則小者羸可進之時也故次之以􅀳􅀳日出地而進於晝也進而不巳傷之者至故次之以明夷明夷日在地中明有所傷也物无不反其本者疾痛則呼其父母傷於外者未有不反於内故次之以家人家人内也治家者剛柔有節過剛則厲過柔則瀆无節則道窮而親族乖離故次之以聧聧者水火乖也乖離則情不通而難生故次之以蹇蹇者行有難也難極必解无終難之理故次之以解解蹇難解也難解則舒緩解者蹇之反五退而居二緩也緩則寛㢮必有所失故次之以損損減也減下而益上有失之象消乆則息損而不巳者必益損益相反也故次之以益益乆則􅄹􅄹則必決堤防是巳故次之以夬夬者陽決隂也決則分分則相遇故次之以姤姤者隂出而與陽相遇也物以􅀋相從遇而後聚非其􅀋雖同居不相遇故次之以萃萃二陽聚也物相崇聚其勢必升積土是已故次之以升升者聚而上之謂也升而不知反則力窮而困故次之以困困乎上者必反乎下山剥是巳故次之以井井在下者也井乆則穢濁不食治井之道革去其害井者而己三代之革其禮相困損益可知也故次之以革鼎之革物以水濟火而熟之革物者莫如鼎故次之以鼎鼎器也主宗廟之器者莫如長子震長子也故次之以震震者陽動於下也物不可以終動動極則止故止之艮者一陽止於上也故次之以艮物不可以終止止極則動故次之以漸漸者進有序也進必有所帰􅄹科之水是也故次之以帰妹帰妹者女之帰也得其所帰者必大海善下是也故次之以豐豐大也前曰與人同者物必帰焉故受之以大有此曰得其帰者必大大有次同人者處大之道也豐次帰妹者致大之道也巳大矣而又窮之必至於无所􅀉託而失其所居之常非特大名大位然也斈亦如是故次之以旅旅者君子之窮也旅卦以柔順謙下爲吉否則无所容矣故次之以巽巽者隂入於陽之下也天地之澤万物禮義之􅀃人心不入則不􅀃故次之以兊兊者􅀃見於外也􅀃之而後散之則􅀃道不勞无所不􅀃矣故次之以渙渙者險難離散也離者必聚散者必合物无終離者也聚者離之莭合者散之節節之則无離散故次之以節天地之節不可以不信不信則无以成萬物而況於人乎飲食起居身之節也不信則致疾尊卑長㓜家之節也不信則召乱故次之以中孚中孚信也行者足相過也小過以隂過陽有行之象有其信者必行中无所疑也故次之以小過物各有量不過則不能相濟所過大則其濟亦大是以智周万物然後道濟天下故次之以旣濟而止復入於未濟物之相生終不可窮故以未濟終篇焉周易序卦傳第十周易雜卦傳第
