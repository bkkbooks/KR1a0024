front:
  text: 則不通不同則不交此再言泰小往大來所以吉亨也以氣言之内陽而外隂則通以德言之内徤而外順則通以天下言之内君子而外小人則通泰者通而治也是故君子内則其道日長小人外則其道日消如是乃能存泰而不入於否矣􅀜子明曰乾來内坤往外則君子闢小人闔故名之曰泰反是名之曰否作易者其闢君子而通小人之闔也故以君子名其卦在卦氣爲正月故太玄凖之以逹交象曰天地交泰后以財成天地之道輔相天地之宜以左右民泰者天地交也財成輔相者以人道交天地也兊刻制坤成物因天地之道而財成之也則物不屈於欲震左兊右輔相也因天地之宜而輔相之則人不失其利左右亦震兊也坤爲民財成輔相以左右民者立人道也財裁古通用初九拔茅茹以其彚征吉象曰拔茅征吉志在外也茅上柔下剛而㓗白君子之象也拔其一則其根牽引連茹而起君子引􅀋之象也茹根也三陽同志外有應􅀄九上應四四來援之成巽初往成震震爲蕃鮮巽爲白茹者初九之剛也初往則二三同􅀋牽連而進伏艮爲手㧞茅連茹以其彚征也征正行也利於正行故吉君子在上必引其􅀋將以合君子之􅀋併天下之力以濟其道於泰不然小人以朋比而強君子以寡助而弱亦何由泰哉九二包荒用馮河不遐遺朋亡得尚于中行象曰包荒得尚于中行以光大也兊爲澤震爲萑陂澤荒穢之象二之五以陽包隂包荒也坎爲大川出乾流坤行於地中河之􅁚也震足蹈川徒渉也徒渉曰馮馮河也勇於蹈難而不顧者也二近五逺不遐遺也陽與陽爲朋二絶其􅀋而去
