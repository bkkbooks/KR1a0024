body:
  text: 朋亡也人忸於泰政緩法弛之時當有包含荒穢之量以安人情用馮河越險之勇以去弊事民隱忽於荒逺人材失於廢滯故戒以不遐遺近已者愛之逺已者惡之大公至正或奪於私昵故戒以朋亡四者具乃得配六五而行中道所以然者光明廣大不狹且陋也六五柔中以下九二二剛中而配五坎離日月充滿六合而无私照其道光大如是則无一物不泰矣易言道大无所不容者曰光大思慮􅄶狹者未光大陋之謂也時已泰矣茍淺中不能容之則輕人才忽逺事植朋黨好惡不中不足以厭服人心天下復入于否六五曰中以行願也九二曰中行中道者所以存泰也横渠曰舜文之治不過是矣九三无平不陂无往不復艱貞无咎勿恤其孚于食有福􅁚曰无往不復天地際也初二上往四五復位坤平衍也化爲山澤平者陂矣􅀂九三不守其位而又往上六坤復泰將成否故戒之觀无平不陂則知无往不復矣九三在天地之際往者當復泰者當否時將大變唯艱難守貞􅃀然不動乃无咎三與上六有孚者也隂陽失位爲憂憂恤也三上相易恤其孚也天地反復之際外之小人必因内之君子有危懼之心乗􅂩而動著信於我君子應之則大事去矣禍至於覆其宗艱貞勿恤其孚不以利害之心移其守以拒險詖之勢以塞反復之路自信而巳于食有福矣兊爲口三陽爲福君子之干禄也修身俟命人之信否无以爲也故能永享安榮與有泰之福或曰時運巳往艱貞其如何曰天人有交勝之理􅀜子明曰象生有定數吉凶有前期變而能通故治亂有可易之理大哉人謨其與天地終始乎六四翩翩不冨以其鄰不戒以孚象曰翩翩不富皆失實也不戒以孚中心願也陽實爲冨隂虚爲貧以用也鄰五與上也陽必求隂隂必求陽隂陽之情也三陽在下上與三隂相應故隂得其主而安於上君子在内小人安於外之􅁚也三陽相率而往三隂失實各復其所故翩翩然下之初六成巽巽爲雞而五與上亦從之而復不冨而用其鄰也不冨者失實也翩翩者囘翔而後下之意譬如葉墜井中翩翩而下以井氣扶之也君子􅀄去位小人猶有顧忌君子盡去然後飛揚矣君子有益於丗也如此可使一日去位乎兊口戒也上下相應孚也君子往則小人來兊􅁚毁不戒以孚也不正之間獨行正者君子之願也衆正之間而行不正者小人之願也願皆出於中心而分君子小人者正不正之間耳是以君子艱貞聖人言此明天地將閉上下各復其所雖有聖智莫能止也易傳曰理當然者天也衆所同者時也泰旣過中則變矣六五帝乙歸妺以祉元吉象曰以祉元吉中以行願也史謂湯爲天乙又有帝祖乙有帝乙陽虎謂帝乙爲微子之父而子夏曰帝乙歸妺湯之歸妺也湯一曰天乙京房載湯嫁妺之辭曰无以天子之尊而乗諸侯无以天子之冨而驕諸侯隂之從陽女之順夫本天地之義也往事爾天必以禮義則帝乙湯也五君位乾九二居之帝也帝天德也女以嫁爲歸震爲長男兊爲少女由長男言之妹也六五降其尊位下交九二帝乙歸妹之象五以柔中下交九二剛明之賢而順從之九二復以剛中上交於五而其道上行五以是成治泰之功則以中道致福而􅀗元吉也故曰以祉元吉祉福也元吉者吉之至善也夫上交於五者豈唯九二之願亦六五之願二五道行君臣並吉非其願乎故曰中以行願也上六城復于隍勿用師自邑告命貞吝象曰城復于隍其命亂也上六治極而亂以一卦言之闕土爲隍積而成城泰兊之象城髙而墜復歸于隍泰反爲否也師衆也坤爲衆城復于隍則天地閉塞君失其民故勿用師邑二也巽爲命泰兊口爲告坤爲亂四之􅀄成巽告命也五之二自邑告命也上之三成坤其命亂也當是時雖九五正其道不行于下貞吝也雖自邑人人而告諭之其命曰亂不可正矣蓋泰之方中君臣同心乃可以治泰過此則變必至於大亂而後巳􅢍坤下乾上否之匪人不利君子貞大往小來􅂏曰否之匪人不利君子貞大往小來則是天地不交而萬物不通也上下不交而天下无􅀖也内隂而外陽内柔而外剛内小人而外君子小人道長君子道消也天地相交是生萬物其卦爲泰人於其中爲天地萬物之主觀之人則天地相交萬物咸備故三偶在上三竒在下鼻口居天地之中交泰也天地當交而否之匪人道也聖人位乎兩間以立人道否之則人道絶㓕矣故曰否之匪人泰􅀄三四上得位二五以正相易正者衆君子多也否初三四上不正二五獨正正者少不正者衆小人多也泰多君子否多小人豈天降之才有殊哉否時君子消小人長自中人以下化之爲不正雖有君子寡徒少偶難乎免於衰丗於是有善人載尸哲人之愚括嚢无咎无譽故曰不利君子貞大者自内而往小者自外而來乾坤不交震反成艮艮者萬物之終也故曰萬物不通也坤在上爲􅀖在下爲邑治天下之道自庶人逹于大夫大夫逹于諸侯諸侯逹于天子上下不交坤反於下則民困而主不恤下怨而上不知俗巳敗而政不修雖有􅀖國内外塞矣故曰天下无􅀖也以氣言之内隂而外陽乾闔而坤也以形言之内柔而外剛氣反而死也一隂自姤長而爲遁爲否小人之道日長君子之道日消其禍至於空國而无君子極坤疑乾君臣相傷故聖人於此終言之象曰天地不交否君子以儉德辟難不可榮以禄天地不交上下否塞也泰坤吝嗇儉也兊澤儉難也震蕃鮮榮也否及泰乃有君子當天地不交之時以儉德避難不食而遯去雖有厚禄不可榮之之象初六抜茅茹以其彚貞吉亨象曰㧞茅貞吉志在君也􅀄六自下引九四以退有艮巽九四應􅀄巽成震艮爲手抜也巽爲白震爲蕃鮮上柔下剛而㓗白者茅也茹九四之剛也三陽同􅀋以其彚也四應初正也能與其􅀋退而守正得處否之吉身雖退伏其道亨矣五爲君四近君志中也屈伸進退相爲用也君子之退以小人得志故安於下以俟其復未甞一日忘君也君子所以屈而能伸退而能進此否所以爲泰之本歟故曰拔茅貞吉志在君也六二包承小人吉大人否亨􅁚曰大人否亨不亂群也五包二二承之包承也順以承上小人之正也六二在否之時得位在内小人也故曰小人吉九五中正在外包小人而容之雖包小人而亦不亂於小人之群坤爲亂三隂小人群也包則和不亂群則不流此大人處否而亨歟不曰君子者處否而亨非大人不能􅀂同流合汙則否而已焉得亨天地相函隂陽相包否六二六三姤九三皆以陽包隂大者冝包小也六三包羞象曰包羞位不當也六三得時進而處上九四辭尊退居於下見六三則包容之而六三始有處不當位之羞何以知其羞乎體巽而自動是以知其羞也管仲謂齊侯㳟而氣下言則徐見臣有慙色是也六二六三小人之致否者也君子與之力爭則否結而不解矣自古君子不忍於小人以及禍害者常多故易爲君子謀必包容之使下者知所承上者知所愧庶幾有泰之漸也三四相易巽成離離爲目羞愧之象與􅁪九五或承之羞同九四有命无咎疇離祉象曰有命无咎志行也九四否道巳革故於此言濟否之道四爲朝廷五爲君巽爲命疇􅀋也祉福也九四剛而履位有濟否之才而近君能下君命於朝廷五錫以六二之祉福則陽德亨矣否可以濟矣人誰咎之哉四應􅀄三應上君子之􅀋附麗其祉以進九四之志行乎下矣五錫二成離離麗也志者中也荀諝謂志行乎群隂也易傳曰君道方否據逼近之地所惡在居功取忌􅀂動必出於君命威福一歸於上則无咎而其志行矣九五休否大人吉其亡其亡繫于苞桑象曰大人之吉位正當也休息也九四否道已革九五息否之時二五相易隂息于五故曰休否言九五之動也大人居尊位正也中正而健德當乎位也位者聖人之大寳雖有其德无其位不可也有其位无其時不可也息天下之否者其唯有其位有其德又有其時乎故曰大人之吉位正當也言九五之不動也然未離乎否也故又戒之九五不動不能與二相易則安其位者也保其存者也有其治者也安其位者必危保其存者必亡有其治者必亂故曰其亡其亡此又因九五不動以明戒也苞桑其葉叢生者也巽爲木上玄下黃三陽積美而根于坤土其根深固苞桑也巽爲繩繫也維也慮其危亡且亂當繫之維之使其根深固以防否之復故曰繫于苞桑如是則大人吉非位正德當能无凶乎易傳曰漢之王允唐之李德􅁉不知此所以致禍敗也上九傾否先否後喜象曰否終則傾何可長也上九否之終天運極矣人情厭矣君子動於上六三應於下否毁兊成如决積水而傾之莫之能禦也始也否塞先否也終也傾否後喜也兊爲􅀃隂陽得位爲喜巽爲長理極必反否終則傾何可長也易傳曰反危爲安易亂爲治必有剛陽之才故否之上九則能傾否屯之上六不能變屯􅩣離下乾上同人于野亨利渉大川利君子貞􅂏曰同人柔得位得中而應乎乾曰同人同人曰同人于野亨利渉大川乾行也文明以健中正而應君子貞也唯君子爲能通天下之志姤隂自初進至二成卦以隂居隂得位也二得中也乾九五位正德當二以柔順應之各得其正而其德同故曰同人人道父子君臣夫婦朋友長㓜其位不同而相與㑹於大同者中也過與不及暌異而不同矣人受天地之中以生未始不同得其所同然則心同心同則德同故曰柔得位得中而應乎乾曰同人此以二五釋同人之義也乾天也曰同人何也三畫以初爲地二爲人三爲天重卦四即初也五即二也上即三也六二應乎九五同人也以其同人故曰同人曰同人上九天際也故曰野野者曠逺无適莫之地常人之情其所同者不過乎暱比之私而同人之道不以繫應逹于曠逺无適无莫其道乃亨有一不同爲未亨也同人至于上九則逺近内外无不同者故曰同人于野亨二自下至上皆成兊澤决爲大川險阻艱危之􅁚乾健也能與天下同之其行徤矣則險阻艱危何往不濟故曰利渉大川乾行也乾行自子至巳坤行自午至亥二柔上進乾爻下行不曰坤行者同人坤變乾􅀄九子上至已聖人因以寓乾坤之行焉坤爲文坤變離爲文明文理也萬物散殊各有其理而理則一聖人視四海之逺百丗之後如跬歩如旦暮者通於理而已惟燭理明則能明乎同人之義然則克己行之以健不蔽於欲者不能盡其道克巳則物與我一矣文明以健然後中正无私靡所不應天下之志通而爲一夫同人之義以四言該之文明也健也中也正也以一言盡之正而巳矣不正則燭理必不明行已必不剛施諸人必无相應之理反求於心不能自得其能通天下之志乎故曰文明以健中正而應君子正也唯君子爲能通天下之志此合二五兩體以言同人之才也易傳曰小人惟同其私意故所惡者雖是而異所比者雖非亦同其所同者則阿黨蓋其心不正也故同人之道利在君子貞以卦氣言之爲七月故太玄凖之以昆象曰天與火同人君子以􅀋族辨物天體在上而火炎上二五相與天與火也同人之道同而无間如天與火然故曰天與火同人離麗也一隂麗於二陽陽本乎天炎上者􅀋也故君子以􅀋族然乾陽物也離隂物也其物各異故君子以辨物􅀋族者合異爲同辨物者散同爲異初九同人于門无咎象曰出門同人又誰咎也初九動艮爲門人道同乎人者也同人於門内不􅀂同人於門外之爲廣也故曰同人于門初九動失正冝有咎四來同之初四各得其正蓋善者人之所同然其誰咎我哉故曰出門同人又誰咎也六二同人于宗吝象曰同人于宗吝道也二往同五復成離五來同二復成乾往來相同乾離各反其本宗同人于宗所同狹矣吝道也易傳曰同人不取君義私比非人君之道九三伏戎于莾升其髙陵三􅀊不興象曰伏戎于莾敵剛也三歳不興安行也離爲甲胄爲戈兵三動有震巽艮之象震巽草木莾也艮爲山在下體之上陵也震爲足巽爲髙升于髙陵也三不動則伏戎于莾言九三剛而不中不能同人與五爭應二者五之所同九三貪其所比據而有之故伏戎于莾將以攻五慮其不勝又升髙陵而望焉然五陽剛居尊位二本同五非三之所當有於義屈矣故望其敵知不可犯也反於中知義不可行也乃退而守下比於二二亦自􅀂然則非道而同乎人者動而爭之不可得也不動而比之不可得也奚益矣終豈能行哉故曰伏戎于莾敵剛也三歳不興安行也乾爲歳三歳三爻也九四乗其墉弗克攻吉象曰乗其墉義弗克也其吉則困而反則也九三動而爭二成坤土在内外之際墉也九四乃欲擣虚自上乗之故曰乗其墉四動入坎險有弓矢相攻之象故曰攻三非犯已二非已應雖乗墉入險豈其宜哉故曰乗其墉義弗克也二動四乗之成坎四動上復乘之成兊兊坎困象也故曰困弗克攻則巳矣何謂吉吉者正也謂其乗墉入險力巳盡而二不應困而知反反而不失其則也是以吉則者理之正天地萬物之所不能違者豈􅀔力所能奪哉古易本云反則得則得則吉也一本云反則得得則吉也定本作其吉則困而反則也九五同人先號咷而後笑大師克相遇象曰同人之先以中直也大師克相遇言相克也三伏戎于莾四乘其墉動而爭二五成巽震坤坤爲䘮巽爲號震爲聲號咷也二非三四之所能有三四不動二自往同於五離目動爲笑理之所同非爭之所能得非不爭之所能亡故曰九五同人先號咷而後笑當三四動時九五􅀂動而爭之非用大師不能克三四之強而與二相遇坤爲衆自上入險而克三三亦自下而克五有師之象言用力如是其難始克相遇遇非㑹之正也故曰用大師克相遇言相克也三五相克而與二遇豈㑹之正哉王弼謂執剛用直不能使物自歸是也然同人之先號咷何耶曰以中直也直者乾之動也理之所在也理直矣三四抑之望人者深故號咷也觀乎所同物情見矣故不得其所同則怨怨而无告則號咷隨之豈惟人哉鳥雀亡其􅀋則啁啾而鳴大獸亡其群則躑躅而悲未有失其所同不如同人之先者也易傳曰九五君位而爻不取人君同人之義者蓋人君當與天下大同而五專以私暱應於二失其中正之德非君道也又先隔則號咷後遇則笑乃私暱之情非大同之體也二之在下尚以同於宗而爲吝况人君乎上九同人于郊无悔象曰同人于郊志未得也上九在外逺於二未得志也動而得正内同九三雖未得二不爲无所同也故動而无悔九三乾天際而在内外之交有郊之象同人於剛徤之爻三伏戎四乗墉五用大師上九逺於二處不爭之地動而无悔九三自至同人之義其在於不與物爭而物情自歸乎􅪻乾下離上大有元亨􅂏曰大有柔得尊位大中而上下應之曰大有其德剛徤而文明應乎天而時行是以元亨小畜柔得位而上下應之六四也六四畜之以巽是以小畜大有柔得尊位則有利􅀔得大中之道則得人心而又執柔履謙有而不恃故上下五陽皆應能有其大六五而言大中五者大中之位柔得之也故曰大有不言有大者大不可有也此以六五一爻言有其大夫天下至大也有其大者未必能元亨致元亨者由乎其才内乾剛徤也外離文明也剛徤則不息文明則能順萬物之理而明有是德矣推而行之不失其時者隨天而行也蓋六五自同人之二固始以正矣以時而行是以元亨此合兩體推原六五言大有之才也才者能爲是德者也同人曰文明以徤大有曰剛徤而文明何也同人九五徤矣不言剛者剛天德不可爲首不言剛抑之也大有六五柔得尊位嫌於剛不足故言剛徤或曰大有師賓之道也曰大有尚賢自六五言上九乃有師賔之象􅂏言尚賢者唯大畜也􅁚曰火在天上大有君子以遏惡揚善順天休命大有自姤一隂四變皆有惡與善之象惡者不正也善者正也乾陽休善也巽命也至于五變成離離爲火在天上明盛大有之時惡者遏絶善者顯揚此豈人力之所能爲哉順天休命而巳故古者進賢退不肖之命謂之休命或謂之明命初九无交害匪咎艱則无咎象曰大有􅀄九无交害也初九守正无交在他卦未有害大有柔得尊位大中上下應之而初九无交則害也正匪可咎艱以守正擇可而後交則无咎交道難不可茍合也四來下初已乃可動此王丹自重之爻乎九二大車以載有攸往无咎象曰大車以載積中不敗也六五不有其大屈體下交九二而􅀝任之猶大車也坤爲輿乾變坤爲大車九二剛中而居柔剛則不勝中則不過居柔則謙順具此三者往之五以任天下之重猶車載也大有物歸者衆冨有之時六五中而未極故有攸往无咎往之得正也盛極則不可往矣陽爲重五中也積重其中而剛不傾撓積中不敗也大車以載者貴夫積中不敗也大有六五而任小才不勝其任矣九三公用亨于天子小人弗克象曰公用亨于天子小人害也三者公之位春秋傳􅀳文公將納王使卜偃筮之遇大有之睽曰吉遇公用亨于天子之卦戰克而王享吉孰大焉杜預曰大有九三爻辭也則卜偃時讀易作公用享于天子杜預亦然京房曰享獻也于寳曰享燕也姚信作享祀義雖小異然讀爲享則同今從舊讀三五相交三乾變離兊乾爲天離爲日兊爲澤卜偃謂天爲澤以當日天子降心以逆公是也夫天子施澤于下降心而􅀃有粲然之文者莫如公之享于天子也天子饗諸侯之禮必於祖廟六五承上九宗廟饗于祖廟之象也上六備九獻之禮乃以圭鬯祼賔客設太牢體薦之爼備金石之樂升歌下管於獻酬之時王以琥璜繡黼束帛送爵坤離爲文明三五相際之象九三剛健而正與五同功故用此爻當天子之饗則无驕亢矣􅀂小人處之柔弗勝其任處之不當必有滿盈之害豈特害于而家哉三五旣交易剛爲柔聖人因柔以著戒焉九四匪其彭无咎象曰匪其彭无咎明辯晢也彭子夏傳讀作旁旁盛滿貌離大腹象也大有至四盛矣昧者處之盈滿而不知變安得无咎九四不安其位震見離毁懼而守正抑損不至於滿匪其彭故无咎所以然者以其明而辯於盈虚之理甚白也離爲明兊口爲辯晳荀氏作晰六五厥孚交如威如吉象曰厥孚交如信以發志也威如之吉易而无備也五執柔守中以誠信交於下而其孚在二孚信之應也二交於五體異志同厥孚交如也二以誠信交五發五之剛志謂之發者五本有剛因二而發之信以發志積誠不巳至於不怒而威則吉威剛嚴也六柔變九而在上威之象也大有之時人心安易􅀂專尚柔順則下无戒備凌慢生矣二乾爲易交五離變乾二復成離離爲戈兵下有戒備之象易傳曰夫以柔孚接下衆志恱從又有威嚴使之有畏善處大有者也上九自天祐之吉无不利象曰大有上吉自天祐也繫辭曰天之所助者順也人之所助者信也履信思乎順又以尚賢也是以自天祐之吉无不利此特曰大有上吉自天祐也上九大有之極盛極則衰凶將至矣而上吉者以自天祐也六五履信思順尚賢而人助之人助之則天助之吉无不利上五相易乾成兊兊爲言而正信也坤順也乾爲天兊爲右右助之也上九動而正正則吉故曰大有上吉􅪺艮下坤上謙亨君子有終􅂏曰謙亨天道下濟而光明地道卑而上行天道􅃜盈而益謙地道變盈而流謙􅀑神害盈而福謙人道惡盈而好謙謙尊而光卑而不可踰君子之終也復三變剥四變皆成謙􅂏辭以剥上九言之者在上而降下者謙也處下而能卑者常也未足以盡謙之義上九降三六三升乎上此謙所以亨也尊卑相去其位不同於是情睽􅀔隔上下不通尊者旣屈卑者獲伸然後上下交而功勲成矣以天地言之天道下濟地道上行萬物化生其道光明而所以光明者陽濟乎隂也非謙亨乎曰濟曰光明坎􅁚也此以剥之上九六三升降言謙亨也天陽地隂􅀑神者天地之大用人也者參天地而行􅀑神者也天地也􅀑神也人也以分言之則殊以理言之則一故觀日月之進退則知天地之􅃜益矣觀山川之髙庳則知地道之變流矣觀人事之得䘮則知􅀑神之禍福矣觀物論之取捨則知人情之好惡矣變禍爲害者言不利也是數者无不以盈爲去以謙爲尚九在上盈也三往損之則爲􅃜盈爲變盈爲禍盈爲惡盈三在下謙也九來益之爲益謙爲流謙爲福謙爲好謙流之者坎也益之福之好之者陽也此再以上九六三論盈虚之理明謙也九三自上位降而言之則尊而光天道下濟是也自九三卑位言之則卑而不可踰山在地中是也謙之爲德其至矣乎所處尊矣道則彌光也所執卑矣而德則彌尊也君子觀諸天地驗諸幽明故處卑而不爭居尊而能降愈乆而不厭乃能有終故曰君子有終此再以九三言君子體謙而終也上者外卦之終三者内卦之終也以卦氣言之小寒也故太􅀇準之以少象曰地中有山謙君子以裒多益寡稱物平施裒鄭荀諸儒讀作捊取也字書作掊山在地中則髙者降而下卑者升而上高卑適平劉表曰謙之爲道降已而升人者也以象考之上三隂多也下二隂寡也艮爲手掊也故君子取有餘益不足以貴下人則貴賤平矣以財分人則貧冨平矣以德分人則賢不肖平矣然物之不齊物之情也所謂平者非漫尊卑上下差等也稱物而施適平而止平者施之則也坎爲水天下之平施者无􅀂水也初六謙謙君子用渉大川吉象曰謙謙君子卑以自牧也初六本復之六三以柔退居謙之下謙之又謙者也謙謙故能得衆用之以犯大難况居平易乎三坎爲大川初動之四成巽股渉大川也自牧者自養也牧畜者擾之得其宜一童子自後鞭之足以制其剛夫然後其剛可用也坤爲牛艮爲少男初處柔在内其動剛卑以自牧也君子卑以自牧則能謙謙則能得衆此爻施之於自牧則可施之於他則卑已甚矣六二鳴謙貞吉􅁚曰鳴謙貞吉中心得也謙自初六卑以自牧積其德至於六二柔順而中正其樂發於聲音而不自知故鳴謙動成兊兊爲口爲􅀃雖鳴也而非求應以正爲吉吉自有也是以求福不囘守正而已非中心自得无待於外者能之乎何以知其自得以鳴謙也九三勞謙君子有終吉象曰勞謙君子萬民服也坎勞卦三與五同功九三勞而有功以陽下隂安於卑下艮見兊㐲勞而不伐有功而不德君子致㳟以存其位之道也内卦以三爲終故曰勞謙君子有終吉夫有血氣者必有爭心故有能而矜之有功而伐之未有不爭爭則危矣九三致恭上下五隂宗之萬民服矣其誰爭之所以能存其位存其位所以有終吉也萬盈數合乾坤隂陽之䇿乃盈是數唯天地之元始生萬物足以當之易言萬國萬民萬夫大之辭也易傳曰古人有當之者周公是也六四无不利撝謙象曰无不利撝謙不違則也六四坤體柔順而正上以􅆢六五之君下以下九三勞謙之臣上下皆得其冝故曰无不利撝謙艮爲手止也震起也手止而復起有揮散之象六四揮散其謙之道布於上下撝謙也所以􅆢上下下无不利者非事是君爲容恱也非持禄養交也不違其則而巳人之大倫天下之正理也理之所至天地萬物之所不能違故謂之則不違其則无往而不得其宜則无不利矣子夏曰撝謙化謙也言上下化其謙也京房曰上下皆通曰揮謙是也謂三撝之四化之誤矣六五不冨以其鄰利用侵伐无不利象曰利用侵伐征不服也陽實冨也隂虚貧也鄰謂四與上也以用也能左右之也冨而能以其鄰者常也不冨而能以其鄰者以六五處尊位而謙虚也能以其鄰則能得衆得衆故利用侵伐无不利五動成離坎上與四變有弓矢甲胄之􅁚以其鄰也動之二入坎險侵伐也征者上伐下以正而行也司馬法曰􅀒固不服則侵之聖人慮後丗觀此爻有干戈妄動不省厥躬者故發之曰征不服也六五謙虚六二恃險不應乃可以侵伐禹征有苗是也􅀂我不謙虚彼不肯服自其冝也上六鳴謙利用行師征邑國象曰鳴謙志未得也可用行師征邑國也六五征不服上六又曰征邑國者征邑國非侵伐也克已之謂也君子自克人欲盡而天理得則誠誠則化物无不應有不應焉誠未至也上六極謙至柔九三當應止於下而不來故鳴隂陽相求天地萬物之情坤爲牛應三震有鳴之象故曰鳴謙鳴而求應志未得也然則如之何反求諸己而巳其在勝已之私乎克己則无我物我一則物亦以誠應之矣坤在侯位爲國在大夫位爲邑上至二體師上以正行之三正也三之上坎險平征邑國也故曰可用行師征邑國也易傳曰邑國己之私有也征邑國謂自治其私也􅮩坤下震上豫利建侯行師􅂏曰豫剛應而志行順以動豫豫順以動故天地如之而况建侯行師乎天地以順動故日月不過而四時不忒聖人以順動則刑罰清而民服豫之時義大矣哉豫謙之反謙九三反而之四四動群隂應之其志上行以順理而動也我動彼應豈不豫乎豫和豫也休逸閑暇之謂也故曰豫剛應而志行順以動豫此以九四合坤震二體而言豫也謙九三在三公之位自二以上有師體反之則三升四四爲諸侯三公出封之象故利建侯師動而往行師之􅁚故利行師二者皆順以動周之大封湯武之征伐无非順民欲也順民欲則民􅀃之􅀃豫也豫順以動雖天地之大猶不能違故天地如其理而動而况建侯行師乎乾坤天地也坎有伏離日月也二至也天之動始於坎歷艮與震而左行地之動始於離歷坤與兊而右行是以日月㑹爲牽萬物成於艮故曰天地以順動故日月不過而四時不忒此以九四互體論坤震之義也坎爲律刑罰也坤爲衆民也艮止也聖人之動必順乎萬物之理法之所取必民之所欲也法之所去必民之所惡也故法律止於上刑罰清􅂤也衆止於下民服從也故曰聖人以順動則刑罰清而民服此以互體之坎變艮推廣坤震以盡豫之義也然意味淵長言之有不能盡故夫子賛之曰豫之時義大矣哉易傳曰豫遯姤言時義坎睽蹇言時用頥大過解萃言時各以其大者也以卦氣言之春分也大􅀇凖之以樂或問互體之變有幾曰體有六變春秋傳畢萬筮仕於晉遇屯之比辛廖占之曰震爲土車從馬足之母覆之衆歸之六體不易廖以震坤合而言六體也且以豫卦九四論之自四以上震也四以下艮也合上下視之坎也震有伏巽艮有伏兊坎有伏離六體也變而化之則無窮矣故曰雜物撰德其微顯闡幽之道乎􅁚曰雷出地􅁬豫先王以作樂崇德殷薦之上帝以配祖考雷之出地􅁬然而作萬物豫之時也九四具天地日月雷霆風雨萬物化生作樂起於冬至黃鍾之象郊野者天際也在内外之際爲郊坤爲牛坎為血陽爲德豫自復三變初九升四作樂崇德也殺牛於郊薦上帝也上帝乾在上之象殷盛也自四至上震變坤坤爲衆故曰殷禮有殷奠殷􅀕言盛也五變比乾爲考六變剥乾爲祖以配祖考者報本反始也初六鳴豫凶象曰初六鳴豫志窮凶也四者豫之主初六不中正而順從逸豫者也初四相易成震震爲聲有相應而鳴之象從逸豫而發於聲音者也故鳴初六豫之始於其始也鳴豫至于末流則志窮而凶中爲志謂四也初復動而之四則上而不行其志窮矣太康后羿之事乎六二介于石不終日貞吉象曰不終日貞吉以中正也四艮爲石初三不正二介于不正之閒上交於三而不謟下交於初而不瀆􅃀然如石不可轉也夫始交者安危之幾不謟不瀆則不過乎中故曰介于石三爲内卦之終二動離爲日不終日也所謂幾者始動之微吉之端可見而未著者也離日爲見見之是以不俟終日而作作則動也豫之時上下逸豫失正諸爻之才多與時合二以中正自守不溺於豫可謂見幾矣備豫之道也不俟終日而作以貞故吉貞者守正之謂也心不動則中正中也故見不中正也故見不正中正故知微知柔不罹于咎故曰介于石焉用終日六三盱豫悔遲有悔象曰盱豫有悔位不當也三四處位不當同而不和者也睢盱上視而不正也向秀曰小人喜恱佞媚之貌四豫之主三以柔順承之動成巽巽爲多白眼睢盱上視佞媚以求豫而四不動則悔悔其不動四故盱豫悔三不能去且靜而待之四又不動故遲有悔悔其不動四艮體止於上三動巽爲進退故動靜皆有悔三猶豫如是无他位不當也小人恱於豫寧悔而終不以所處爲不當而去之柔不正故也九四由豫大有得勿疑朋盍簮􅁚曰由豫大有得志大行也四爲豫之主五隂順從由已以致豫故曰由豫以一陽而得五隂大者有得也故曰大有得然不免於疑者在近君危疑之地无同德之助衆隂不從五而從已也疑謂伏巽巽爲不果坎見巽伏故勿疑盍合也五交四也言積誠不巳下情通於上也坎爲髪爲通四剛在上下衆柔之際交而通之猶簪也髪非簪則散亂不理安有髪之柔順而不從簪乎夫朋歸巳而致疑於五者有二招權也專功也下情通於上上下旣交以誠何疑於招權不有其功歸美于上其中洞然何疑於專功四五相易伏巽象毁則四剛中之志上行率天下而從五何疑於朋之衆乎五不疑四四不疑五君臣上下各守其正爲由豫也大矣先儒以坎爲髪何也曰以巽爲寡髪而知也乾爲首柔其毛也故須象亦然六五貞疾􅁪不死象曰六五貞疾乗剛也􅁪不死中未亡也四以剛動爲豫之主衆之所歸權之所主也五以柔弱沈􅁳於逸豫而乗其上豈能制四哉六五受制於四而不可動亦不復安豫矣故此爻獨不言豫不可動則於正爲有害故曰貞疾􅁪震巽也天地可乆之道也六五動則有震巽􅁪乆之象人君中正然後六二爲之用九四同德也何乗剛之有五不可動以失正也故九四爲腹心之疾然主􅀕祀守位號而猶存者正雖亡而中未亡也中者人心也中盡亡則滅矣故曰貞疾􅁪不死言貞雖有疾其中固在能動以正則可乆矣􅁪未常死也坤爲死震爲反生未亡之象周室東遷齊晉一伯託公義以令諸侯中未亡也失天下者多矣必曰豫者威權之失必自逸豫也䛕臣進女謁行大臣專主威則社稷移矣易傳曰􅀂五不失君道而四主於豫乃任得其人安享其功如太甲成王也上六􅁳豫成有渝无咎象曰􅁳豫在上何可長也上六豫之終沈􅁳於豫成而不變者也坤爲􅁳昧古之逸豫之人固有不恤名聲之醜性命之危而樂之者不知因佚樂之過變前之爲乃善􅀘過也何咎之有故曰成有渝无咎聖人發此義以勉夫困而學者焉上六動之三成巽巽爲長四坎爲可􅁳豫在上而不變未有不反何可言也􅪹震下兊上隨元亨利貞无咎􅂏曰隨剛來而下柔動而􅀃隨大亨貞无咎而天下隨時隨時之義大矣哉隨自否來上九之初剛人之所隨柔隨人者也上九過剛而不反君子小人相絶非道也剛來下於柔柔往而隨之下動而上􅀃動而可􅀃所以隨也自初九言之君子之道爲衆所隨人君屈已以隨善者也自六二上六言之臣下之􅆢命學者之徙義臨事之從長无非隨也故曰隨此以剛柔相易合兩體而言隨也上九之初大者亨也其亨以貞也上九過剛甞有咎矣无咎者善􅀘過也大者亨以貞利於正也又善􅀘過至於无咎天下豈不動而􅀃以隨之乎故曰元亨利貞无咎此以初九一爻言隨之道也易傳曰隨之道利在於正隨得其正然後能大亨而无咎失其正則有咎矣豈能亨乎春秋傳穆姜往東宫筮之遇艮之八史曰是謂艮之隨姜曰是於周易曰隨元亨利貞无咎有四德者隨而无咎蓋穆姜時以元亨利貞爲隨之四德夫子作􅂏辭然後明元亨利貞者大亨正非􅀂乾之四德也夫天下之隨君子者隨其正也君子之動者隨其時也時无常是以正爲是君子得其正天下是之是之斯隨之矣天下之物靜而在下莫如澤也驚蟄旣至雷動於澤中澤氣隨之下者上靜者動誰爲之哉時也故曰大亨貞无咎而天下隨時然隨時之義非逹權知變者不能盡或因或革或損或益人之所􅀃不以強去人所不􅀃不以強留如天地之隨時乃无咎矣故曰隨時之義大矣哉天下隨時王昭素曰舊本多不連時字王弼亦曰得時則天下隨之矣隨之所施唯在於時也胡旦曰王肅本作隨之􅂐字之爲㞢時爲峕轉􅀠者増日爲時胡􅀃爲長在卦氣爲驚蟄二月中故太􅀇凖之以從象曰澤中有雷隨君子以嚮晦入宴息雷降於兊息於坤坤晦也澤中有雷嚮晦也天地之動靜隂陽之明晦自大觀言之晝夜之道也君子隨時之道著而易見者莫􅀂隨晝夜也晝則嚮明而動作夜則嚮晦而宴息自有天地而來未有能違之者知此則知用天地隂陽矣君子日用而知小人日用而不知初九官有渝貞吉出門交有功象曰官有渝從正吉也出門交有功不失也五乾爲君巽爲命四受命於君以帥其屬官之􅁚也初應四動其屬也初隨四四隨事事有變動剛而不知變不足以隨事渝變也故曰官有渝變有正否變而不正惟官是隨非交修不逮也不知大亨正无咎也九四變而正以剛下柔其道足以使人隨之初九隨之者隨其正也不隨其不正也正則吉故曰從正吉也人之情隨同而背異隨親昵而背踈逺故朋友責善或牽於妾婦附耳之語溺於私也初在内安之又比於二二初相易皆失正私昵之爲害也故戒之以出門交有功四艮爲門初捨二出交於四出門也出門交之不失其正何往而无功故曰不失其正也易傳曰隨當而有功六二係小子失丈夫象曰係小子弗兼與也四艮爲少男有乾父坤母小子也初震爲長男有巽婦夫也隨利於正初九正也九四不正也二與四同功以情言之柔必隨剛隂必隨陽初九九四皆陽剛也其能兼與之乎四雖在上不正也初雖在己之下正也六二係情於四比初不專雖與之相比而情不親雖有中正之德而所隨非其人其失在於不能權輕重也故曰係小子失丈夫弗兼與也臨事擇義於六二六三見之六三係丈夫失小子隨有求得利居貞象曰係丈夫志舎下也先儒舊讀舎音捨張弼讀舎與乾九二時舎也之舎同辭曰利居貞象曰志舎下也以舎訓居弼讀爲長三四相比近也四三无應冝相親也以隂承陽以下隨上順也三寧失其親比而順者而係情於初以初正四不正也故曰係丈夫失小子三柔不能自立而隨初是去昏而隨明背非而隨是違不善而從善得隨之冝也初亦以三同體而又下之故三之隨初有求而得艮爲手求也初三相易得正也三茍知隨而已不知自處以正人將拒我其能乆乎蓋隨人冝以柔處己當以正六三之隨利居貞也此三所以係初歟巽爲繩係也九四隨有􅀗貞凶有孚在道以明何咎􅁚曰隨有􅀗其義凶也有孚在道明功也三不隨四四據而有之􅀗也􅀗難辭也二與三當隨五爲四所隔下而從初四在大臣之位處可懼之地與五爭三能无凶乎三四易位正也雖正亦凶義不可有三故曰貞凶象曰其義凶也然四終不可以有三乎曰非不可有也動而有孚于道无意於有三而三自隨之可也初九其行以正所謂道也道之所在故初九爲隨之主四動正與初相應有孚在道也四正而誠孚于道則三亦唯正之隨豈唯有三而二亦隨初是率天下以隨五而成隨之功也三四易位成離離爲明以明則无􅀗三之咎无咎則无凶可知故有孚在道者明之功也易傳曰孚誠積中動必合道故下信而上不疑古人有行之者伊尹周公孔明是也九五孚于嘉吉象曰孚于嘉吉位正中也陽爲美九五位正中美无以加於是矣故曰嘉于嘉吉者誠信孚于二也二正中也五不有其美隨六二之中道則得物之誠二樂告以善故能不過而止于至善觀乎位正中則知孚于二而吉矣道之中天地萬物所不能違有之則生无之則死故謂之至善謂之至美雖子路之勇禹之智大舜之明德不能加毫毛矣易傳曰自人君至于庶人隨道之吉惟在隨善而已下應六二之正中隨善之義也或問午亦有美矣何謂陽爲美曰隂舎陽以爲美者也至兊而隂見陽伏至坤而萬物虚陽美盡則午之美亦盡故嘉之㑹者謂乾亨也坤品物咸亨者含弘光大也坤豈能專之是以坤三含美以從王天保歸美以報上上六拘係之乃從維之王用亨于西山象曰拘係之上窮也上六隨之窮也窮則變變則不隨然而隨者非禮義拘係之又從而維持之不能也三上相應三有艮巽艮手拘之也巽繩係之也上窮反三復成巽乃從而繫維之也拘之使不動係之使相屬繫維之使不得去三坤也坤爲衆衆之恱隨上六固結有如此者昔周之太王用此爻以亨于西山杖䇿而去隨之者如歸市非得民之隨豈能使巳窮而更隨至於不可解乎兊西也艮爲山乾五爲王三上往來不窮亨也先儒以此爲文王之爻誤矣故易傳正之曰周之王業蓋興於此􅫿巽下艮上蠱元亨利渉大川先甲三日後甲三日􅂏曰蠱剛上而柔下巽而止蠱蠱元亨而天下治也利渉大川往有事也先甲三日後甲三日終則有始天行也春秋傳秦醫曰於文皿蟲爲蠱榖之飛亦爲蠱在周易女惑男風落山謂之蠱尚書大傳曰乃命五史以書五帝之蠱事雜卦曰蠱則飭也則蠱非訓事事至蠱壞乃有事也泰初九之剛上而爲艮上六之柔下而爲巽剛上柔下各得其所事巳治矣下巽而已莫予違也上亦因是止而不復有爲則禍亂之萌乃伏於巳治之中遂頽靡而不振亦何異於皿蠱榖飛男惑山落之􅀋哉故曰剛上柔下巽而上蠱此以泰變合二體而言蠱也然治蠱之道不逺在乎上下之志交而元亨則天下復治矣泰初九始也始而動剛柔相易而亨元亨也元亨而天下治始而亨者也兊爲澤决之爲川初九越兊成艮艮爲指利渉大川也初九犯難顧望而不爲蠱不可得而治矣上下志交動以濟大難往事乎蠱也巽爲事故曰元亨利渉大川往有事也此因初上之交言治蠱之道也天道之行終則有始无非事者聖人於蠱巽二卦明之蠱東方卦也巽西方卦也甲者事之始庚者事之終始則有終終則更始往來不窮以日言之春分旦出於甲秋分暮入於庚以月言之三日成震震納庚十五成乾乾納甲三十日成坤滅藏於癸復爲震甲庚者天地之終始也蠱事之壞也巽行事也變更之始當慮其終事乆而蠱當圖其始先甲三日圖其始也蠱一變大畜乾納甲再變賁離爲日乾三爻在先先甲三日也三變頥四變噬嗑離爲日五變无妄乾納甲乾三爻在後後甲三日也先甲者先其事而究其所以然後甲者後其事而慮其將然究其所以然則知救之之道慮其將然則知備之之方一日二日至于三日慮之深推之逺故能革前弊弭後患乆而可行圖始者至矣漢甞削諸侯之地矣唐甞討弑君之賊矣令下而兵起言出而禍隨昧治蠱之道也不曰乾行者周而復始也納甲之􅀃乾納甲子甲寅甲辰而壬在其中納壬午壬申壬戌而甲在其中坤納乙癸亦然易傳曰後之治蠱者不明乎聖人先甲後甲之戒慮淺而事近故勞於救亂而亂不革功未及成而弊巳生矣夫蠱言先甲後甲於􅂏巽言先庚後庚於九五一爻何也曰蠱者巽九五之變也上剛下柔巽而止所以爲蠱也巽則九五位乎中正事有過中而當變更則更之而適於中蠱何由生乎明此九五之功也以卦氣言之三月卦故太􅀇凖以務事象曰山下有風蠱君子以振民育德風木之氣山百物之所阜生木氣動揺於土石之下陽升風鼓草木敷榮飭蠱之象黃帝書曰東方生風風生木傳言景霽山昬蒼埃際合崖谷􅀂一巖岫之風也君子體之於民也振作之使不倦將振作之則自育其德德日進則民德生矣震動在外振民也兊澤在内育德也育德者振民之本史言風落山取女􅀃男蠱之象此言飭蠱之象故取象異初六幹父之蠱有子考无咎厲終吉象曰幹父之蠱意承考也乾爲父泰初九之上父往矣考也坤子來居父之位父往而其事不正咎也有子幹之考可以无咎矣厲危也子居父之位以事之不正爲危厲之道則變而之正於考爲无咎於已爲終吉堪任其事者也故曰有子然變其事而之正无乃改父之道乎曰柔巽者子承考之意也變其事而之正致其考於无咎者子幹父之蠱也巽柔而已䧟父於有咎而不恤焉豈考之意哉故以我之意逆父之意而承之則變其事可也變其事者時有損益不可盡承所以從道也孝子生也諭父母於道及其没也以意承考事死如事生之道也貞事之幹也幹父之蠱則初六變而正矣意者中心之所欲也坤爲中巽柔坤也故曰意九二幹母之蠱不可貞象曰幹母之蠱得中道也坤居尊位母也以隂居陽處之不當事之蠱也九二巽爲子應五而處内幹母之蠱者也坤隂柔爲難輔處之不當則當正然正之則剛或至於傷恩不正之則致母於有咎故不可貞言巽而動優柔不迫得中道則善矣事柔弱之君亦然易傳曰以周公之聖輔成王成王非甚柔弱也然能使之爲成王而已不失其道則可矣固不能使之爲羲黄堯舜之事也九三幹父之蠱小有悔无大咎􅁚曰幹父之蠱終无咎也上九處位不當父之蠱也九三重剛幹父之蠱而剛過中者也剛過動則小有悔然无大咎者雖過而正也三下卦之終故又曰終无咎夫无大咎未免小有咎聖人以謂終无咎以其體巽也易解曰不應上子之能爭而不從其父令者也六四􅁉父之蠱往見吝象曰􅁉父之蠱往未得也六四柔而上不能去上九之蠱寛􅁉自守而巳􅁉父之蠱者諸爻以剛爲幹蠱之道九二九三􅀄六六五之動曰幹六四曰􅁉者不剛也不能動也吝者安其位而不能往動成離離目爲見故往見吝初六應之牽於下亦不得往矣故曰往未得也漢之元帝是巳六五幹父之蠱用譽􅁚曰幹父用譽承以德也六五居尊位尚柔下應九二二與之體兊兊爲口譽之象也二易五柔成剛其德中正上承上九幹父之蠱用譽也以德承父下之服從者衆以是去蠱用力不勞則幹父之譽莫善於用譽矣蠱之患非一丗譬如人􅄝酒色餌金石傳氣於子孫者潰爲癰疽死與不死在治之如何耳秦皇漢武窮兵黷武一也秦亡而漢存者始皇无子而武帝有子以幹之也必曰承以德者譽謂德譽非虚譽也隋煬以儉聞以奢敗虚譽也上九不事王侯髙尚其事象曰不事王侯志可則也蠱之終有不事者上九自巽往於外處蠱之上而不當位巽爲事爲髙尚上也五王四侯三公位上執剛不屈不事王侯髙尚其事夫自臺輿至王公无非事者不事王侯何以貴之謂其志於三三无􅀿則去之不累於物其志爲可則也易傳曰伊尹太公望之始曾子子思之徒是也所謂志可則者進退合道也􅤠兊下坤上臨元亨利貞至于八月有凶􅂏曰臨剛浸而長􅀃而順剛中而應大亨以正天之道也至于八月有凶消不乆也剛自復浸浸以長大而後有臨一氣不頓進兊爲澤三四五進而不巳浸長也臨以大臨小其進非一日而大大則小者自順此臨之時也故曰臨兊􅀃坤順􅀃而順其民也九二剛中六五應乎外則􅀃而順者非茍􅀃之順乎理也臨之道成而大亨矣然其端始於復之初九剛反動於初正也浸長而之九二大者亨以正故亨造端不正其能大亨乎此臨之道也夫天之道剛始於子進而至臨又進而至泰然後萬物通亦以正也故曰元亨利正􅂏曰􅀃而順剛中而􅀿大亨以正天之道也天之道言乾也至于八月有凶戒進之不已也隂陽消長循環无窮自子至未八月而二隂長隂長陽衰其卦爲遯小人道長君子道消不可以乆不直曰凶者有凶之道聖人闔小人闢君子凶未必至范長生以八月爲否誤也周正建子劉牧曰遯之六二消臨之九二卦略曰臨剛長則柔微柔長故剛遯是也臨在復泰之中方長而戒之不俟乎極也故堯舜禹三聖人相戒必於臨民之初過此則无及已在卦氣爲十二月故太􅀇凖之以􅕳象曰澤上有地臨君子以教思无窮容保民无疆水天下之至柔也以土制水冝若易者然迫之以險隘奔潰四出壞之而後已居之以寛大則畜而爲澤矣君子之於民也亦然臨之以􅀔􅀔有盡也親之以教教无窮也是以忘有盡之􅀔思无窮之教教思无窮則待之非一日也故包容之保有之而无疆无疆者坤德也厚之至也三代之民不忘乎先王之澤者教之也三代而下一決則横流而不可復者臨之以􅀔也􅀃卦以坎爲盗兊爲少女大象以澤爲民何也曰善保之則吾民也坎非坤衆能爲盗乎易傳曰无窮至誠无斁也初九咸臨貞吉象曰咸臨貞吉志行正也以大臨小者臨之道以上臨下者臨之位故諸爻位以上爲臨五者臨之尊位也初九六五非應也初處下而􅀃五自應之初兊體之五成艮山澤相感之􅁚咸徧感也无心相感也故曰咸臨初九正正其始也初與四爲正應然之四不正五感之動而上行則正位以臨其民而萬物正矣舜德升聞豈有心乎有心則凶不正亦凶故曰貞吉初九其始正者非一日正也古之人正其心及感之而動舉斯心以加諸彼志行正也九二咸臨吉无不利􅁚曰咸臨吉无不利未順命也二有剛中之德而應五動而正吉无不利无心於臨五自感之二之五成艮澤山􅁚也故亦曰咸臨九居二有不利然處下而􅀃曰吉无不利者以未順命也九二待時者乎二至四有伏巽巽爲命坤順也易傳曰未者非遽然之辭孟子或問勸齊伐燕有諸曰未也亦非遽然之也夫初九有應而不應九二有􅀿而未順君子之樂王天下有不與存焉臨非君子之所樂也六三甘臨无攸利旣憂之无咎􅁚曰甘臨位不當也旣憂之咎不長也六三有臨下之位而无臨人之德柔不當位以口􅀃人甘臨也若當位則不言而信何俟於􅀃人哉子朝之文辭新室之姦言内不足也處則不當之上則不應无攸利也雖甘臨能无咎乎陽浸長自下進冝憂也六三知處不當位能下九二之賢降尊接卑二三相易成坎坎爲加憂隂陽失位旣憂之又加憂則正正則无咎夫咎豈長哉在我而已二至四有伏巽巽爲長二三相易巽變坎故曰旣憂之咎不長也六四至臨无咎􅁚曰至臨无咎位當也臨以大臨小四居下之上爲五所任而比於下得君而近民者也臨道尚近臨之至也以隂處四爲得正體坤爲處順與初相􅀿爲下賢得君近民而又兼此三者所以无咎此无他位正德當也故曰至臨无咎位當也六五知臨大君之冝吉􅁚曰大君之冝行中之謂也兼天下之明而不自用者知也五處尊位虚中而納二九二相易成坎坎爲水内景知也兼九二之明而不自用其明陽爲大此大君用天下之明以臨天下於臨之義爲冝相易而正正則吉故曰知臨大君之冝吉所謂大君之冝者行中之謂也二以剛中上行五以柔中下行上下相交五兼二而用之上下行中道也不交則明何由生義何由明故曰大君之冝行中之謂也王弼曰聦明者竭其視聽智力者盡其謀能上六敦臨吉无咎􅁚曰敦臨之吉志在内也上六臨之極極則窮變而通之其敦臨乎上與二非正應而隂必求陽志在乎内者處臨之極非内有賢人之助不能資其臨下之道尊賢取善以剛益柔厚之至也故曰敦臨坤厚也二之上成艮爲篤實厚而篤實敦之象天正則吉无咎上二相易而曰吉曰无咎者得九二之助然後上安其位臨道不窮安其位所謂吉不窮所謂无咎故曰敦臨之吉志在内也易傳曰臨隂柔在上非能臨者冝有咎以其厚於順剛則无咎􅦉坤下巽上觀盥而不薦有孚顒若􅂏曰大觀在上順而巽中正以觀天下觀盥而不薦有孚顒􅀂下觀而化也觀天之神道而四時不忒聖人以神道設教而天下服矣觀成卦之義在於九五九五剛大履至尊之位四隂觀之大者在上而下爲小者之所觀坤爲衆巽爲多白眼觀上之􅁚故曰大觀在上此以九五釋觀也下順上巽順物之理巽而施之也九五无偏黨反側建極立表天下注目故曰順而巽中正以觀天下此合坤巽言九五大觀在上之道也觀臨之覆臨兊爲澤艮爲手上爲宗廟巽入也入宗廟而澤手盥也與内則沃盥之盥同坤爲牛兊爲刑殺殺於下手薦之於上薦也孚者九五之誠信孚于下也乾爲首兊變之肅然在上莊而不墯有敬順之貌顒􅀂也觀之道至􅂤而不煩其要在誠而巳无待於物也故明之以宗廟之禮焉宗廟之禮所以致誠敬也散齋七日致齋三日􅀕之初迎尸入廟天子涗手而後酌酒涗謂之盥酌酒獻尸尸得之灌地而􅀕謂之祼祼之後三獻而薦腥五獻而薦熟謂之薦故獻之屬莫重於祼而盥者未祼之時精神專一誠意未散不言之信發而爲敬順之貌者顒顒如也故下觀而化金聲而玉色莫不有敬順之心及其薦獻禮文繁縟人之精一不若始盥之時雖强有力者猶有時而倦惰矣以此見下之觀上在誠而不在物其道豈不至簡而不煩乎是以觀盥而不觀薦也巽眼視艮而兊伏觀盥而不觀薦之􅁚也巽巽也坤順也二應於五化爲巽順故曰觀盥而不薦有孚顒􅀂下觀而化也聖人甞觀諸天也四時本於隂陽隂陽合而爲一一則神神者天之道也故隂陽自行四時自運人見其始於艮終於艮无有差忒而巳孰爲此者一也聖人觀天設教亦一而巳矣一則誠誠則明明則變變則化不假強䀨人自服從亦豈知所謂一哉惟天下至誠爲能化故曰觀天之神道而四時不忒聖人以神道設教而天下服此推原觀卦之始要其終而言之以明大觀在上其道止於誠誠則順而巽中正以觀天下矣以卦氣言之八月節也故太􅀇凖之以視象曰風行地上觀先王以省方觀民設教風行地上无所不周觀也先王以廵省四方象風之行觀民設教􅁚風行於地上巽而順萬物也巽爲多白眼觀也坤爲民易傳曰觀民設教如奢者示之以儉儉者示之以禮省方觀民也設教爲民觀也初六童觀小人无咎君子吝􅁚曰初六童觀小人道也初六坤􅁳不正而往觀五小人之觀君子也烏覩所謂正哉不足咎小人不足以知君子猶童稚之觀成人也艮爲少男故曰童觀初九動則正以正而往觀者君子之觀君子也然不動焉吝也故曰小人无咎君子吝六二闚觀利女貞􅁚曰闚觀女貞亦可醜也大觀在上六二不往闔戸而觀之所見狹矣故曰闚觀禮女不踰閾守正不動女之貞也故曰利女貞二離爲女爲目坤爲闔戸女處乎内而闚外之象九五以中正觀天下六二守闚觀而爲女貞亦可醜也隂爲醜此爻女子居之則利君子爲之則醜六三觀我生進退􅁚曰觀我生進退未失道也卦以九五爲主我謂九五也生動也五之三震爲動動謂之生者陽剛反動天地之生五之三三則進而上五不動三則退而止進退動止觀九五而巳巽爲進退三不當位在上下之際故其象如此六三不能自必其進退者在九五不在六三也九五中正其動必正故六三雖不當位未爲失觀之道六四觀國之光利用賔于王象曰觀國之光尚賔也四觀五也四侯位坤爲國五王位六四上賔於五五降而接之成坎離光也故曰觀國之光四爲朝廷艮爲門闕乾五爲玉動之四爲金坤爲布帛乾坤􅀇黃幣帛之文升自門闕陳於庭王降而接賔賔下升於西北賔于王也尚者主人以賔爲上尚之也古者諸侯入見于王王以賔禮之士而未受禄亦賔之九五中正在上六四體巽而正觀國之光知尚賔忘􅀔矣尚賔者國之光也禮主人尊賔故坐賔於西北主人接人以仁厚之氣故坐於東南易言賔位者乾也西北方也主人位者巽也東南也九五觀我生君子无咎象曰觀我生觀民也五自觀也五君也坤爲民五動之二坤變震爲動動謂之生天動則地應觀天道之得失觀諸地可也天爲君地爲民君者民之所觀而時之治亂風俗之美惡繫之觀其民則知君君之自觀其得失者亦觀諸民而巳中庸曰君子之道本諸身徴諸庶民故君道得其民君子也於巳爲无咎君道失其民小人也必有失道之咎有堯舜之君則必有堯舜之民矣五之二陽爲君子故曰君子无咎成湯曰萬方有罪在予一人先主省方命太師陳詩觀民風乃所以自觀也上九觀其生君子无咎􅁚曰觀其生志未平也上觀五也上來之三仰觀九五觀其動之所自出故曰觀其生三動於中志也坎險不平也三觀於五有難焉其志不能平乃往於外三動正也君子也正則无咎上九過剛也過則有咎自古觀其君而去者以未平之志爲忿丗疾邪之事多失之於矯激太過豈能无咎夫聦明深察而近於死者好譏議人也辯􅀶閎逺而危其身者好發人之過者也梁鴻作五噫以顯宗之賢猶不能堪之非失之過乎夫子不合者多矣進退无咎者君子之道也巽究爲躁故以君子戒之易解曰知微知彰知柔知剛然後能觀其生而不失進退之幾焉周易上經泰傳第二大害也故曰頥中有物曰噬嗑噬嗑而亨此合兩體
