body:
  text: 乾坤貴賤兩者聖人觀天地而畫卦剛柔吉㓙變化三者聖人觀萬物而生爻變化者爻有變動也伏羲畫卦乹上坤下立天地之位歸藏先坤後乾首萬物之母連山乾始於子坤始於午至於周易尊乹卑坤其體乃定見於卦則上體乾也下體坤也道雖屡遷上下不易君尊臣卑父尊子卑夫尊婦卑謂之三綱三綱不正天地反覆髙者貴卑者賤則貴賤之位分矣陽爲貴乾也隂爲賤坤也髙者乹之位也卑者坤之位也上旣曰尊矣尊无二上故易尊爲髙又曰卑髙者貴以賤爲本易自下升上元士大夫三公諸侯承之然後君位乎五也動而不屈者剛也静而不變者柔也動静有常則乾剛坤柔其德斷而无疑矣䇿數以七九爲陽六八爲隂陽剛也隂柔也爻位以一三五爲剛二四上爲柔陽先隂後故䇿七者二十八䇿九者三十六爻一陽二隂三陽四隂五陽六隂君不剛則臣強父不剛則子強夫不剛則爲妻所畜尊卑之位貴賤之分也五方之物各以其􅀋聚同氣也五物之􅀋各以其羣分異情也氣同則合情異則離而吉凶生矣爻或得朋或失􅀋或逺而相應或近而不相得或睽而通或異而同隂陽之情也在天成象者隂陽也在地成形者剛柔也天變則地化變者隂陽極而相變也隂陽之氣變於上剛柔之形化於下故䇿二十八者其數七䇿三十二者其數八䇿三十六者其數九䇿二十四者其數六隂陽交錯剛柔互分天地變化之道乾坤之交也乾以剛摩柔坤以柔摩剛剛柔相摩八卦推盪變化彰矣􅀃卦謂之中爻先儒謂之互體鼓之以雷霆者震反艮也潤之以風雨者巽反兊風而曰潤者以雨而風不以隂先陽也日月運行一寒一暑者坎離也六子致用萬物化生然不越乎乾坤也震坎艮之爲三男得乾之道也巽離兊之爲三女得坤之道者也聖人之用天下合乾坤也父子君臣乾坤也夫婦震巽坎離艮兊也長㓜其序也朋同􅀋也友異體也五者乾坤而巳矣始於乾終於坤以乾知太始坤作成物也物生始於子物成始於午乾西北方亥也陽藏於坤有一而未形知太始也坤西南方申也物成於正秋酉也坤終於十月亥也坤作於申成於酉終於戌亥作成萬物也乾知大始坤作成物尊卑貴賤之分也故父作子述君佚臣勞夫唱婦和夫乾􅃀然不易无爲而爲萬物宗以易知也天動地隨坤順乎乾其作成萬物者以簡能也簡曰易從者歸之乾也與髙不言尊風􅀨言潤同義聖人之於尊卑之際君臣之大義嚴矣孟子所謂一本荀卿所謂一隆易則其心一故易知簡則其政不煩故易從易知則天下見其憂樂故有親易從則匹夫匹婦各􅀗自盡故有功有親則不厭故可乆有功則不巳故可大可乆者日新之德可大者冨有之業賢人者賢於人者也聖人賢人之極舜禹之聖亦曰選賢與賢也乾坤之理盡於易簡易簡而天下之理得天下之理得則上下與之同流德業旣成乃位乎兩間與天地爲一聖人設卦觀象繫辭焉而明吉㓙剛柔相推而生變化是故吉㓙者失得之象也悔吝者憂虞之象也變化者進退之象也剛柔者晝夜之象也六爻之動三極之道也是故君子所居而安者易之序也所樂而玩者爻之辭也是故君子居則觀其象而玩其辭動則觀其變而玩其占是以自天祐之吉无不利聖人設卦本以觀象不言而見吉㓙自伏犧至于堯舜文王近者同時逺者萬有千􅀊其道如出乎一人觀象而自得也聖人憂患後丗懼觀之者其智有不足以知此於是繫之卦辭又繫之爻辭以明告之非得巳也爲觀象而未知者設也爻有剛柔剛柔相推而生變化變化微矣非辭何以明之象與辭反復相發也是故辭之有吉㓙者人有得失之象也辭之有悔吝者人有憂虞之象也失得者剛柔相文有當否也失者能憂虞之俄且得矣得者憂虞有不至焉俄且失矣悔其失者或致吉吝其失者或致凶變化也變化之於剛柔猶進退之於晝夜變化者進退之象剛柔者晝夜之象晝推而進則夜退柔者變而剛夜推而進則晝退剛者變而柔晝夜之進退无止剛柔之變化不窮憂虞異情得失殊致故曰吉㓙悔吝生乎動變化者動爻也六爻之動三極之道也一生二二生三三極矣邵雍曰易有真數三是也関子明曰天三數之極也極乎終則反乎始兼兩之義也故極而不變其道乃窮􅀃卦震其究爲健三變而乾也巽其究爲躁卦三變而震也觀此可以例餘卦矣是故君子所居而安者易貴賤之序也所楽而玩者文􅁻凶之辭也居則觀其卦之象而玩其辭動則觀其爻之變而玩其占易以變爲占於占言變則居之所玩末變之辭也居處動作无非道也天人一理也是故自天祐之􅁻无不利􅂏者言乎象者也爻者言乎變者也吉凶者言乎其失得也悔吝者言乎其小疵也无咎者善捕過也是故列貴賤者存乎位齊小大者存乎卦辯吉凶者存乎辭憂悔吝者存乎介震无咎者存乎悔是故卦有小大辭有險易辭也者各指其所之設卦觀象黙而識之不得巳而有􅂏者所以言乎一卦之象也玩其􅂏辭而不得觀其象可也剛柔相推而生變化吉凶有難知者故有爻辭所以言乎一爻之變也玩其爻辭而不得觀其變可也吉凶者言如是而得則吉如是而失則凶悔吝者言乎小疵也惡積罪大則悔无及巳言者言當悔而止護小疵致大害者也无咎者本實有咎善􅀘過而至於无咎易有言又誰咎者言咎實自取自咎可也有言不可咎者義所當爲才不足也君子度德量力折之以中道則无咎矣吉凶悔吝无咎一也其實悔吝无咎所以明吉凶也􅂏不言悔而言无咎无咎則悔可知矣言凶而不言吝吝不足言也卦自下而上列貴賤之位存乎位則剛柔徃來上下内外得位失位或應或否見矣易於小事不忽於大事不懼視履尊位與居家同視征伐天下與折獄同視享上帝養聖賢養萬物與飲食同知此則知顔子與禹稷同曽子與子思同故存乎卦之小大則見事之小大齊矣憂悔吝之將至者當存乎介介者礭然自守不與物交震懼而无咎者當存乎悔悔者追悔前失而不憚改也故悔則无咎介則无悔不近於知幾乎幾者動之微吉之先見也易曰介于石不終日貞吉礭然自守者守正也辭有易者之于吉也所謂能􅀃諸心辭有險者之于凶也所謂能研諸慮有憂慮悔吝非險辭不足以尽之爻辭也各指其所之之險易也所之者動爻也言乎其變也春秋傳觀其動曰之某卦是也從其所之乃能趨時盡利順性命之理則繫辭焉以命之不可巳也易與天地凖故能彌綸天地之道仰以觀於天文俯以察於地理是故知幽明之故原始反終故知死生之􅀃精氣爲物遊魂爲變是故知􅀑坤之情狀與天地相似故不違知周乎萬物而道濟天下故不過旁行而不流楽天知命故不憂安土敦乎仁故能愛範圍天地之化而不過曲成萬物而不遺通乎晝夜之道而知故神无方易无體一隂一陽之謂道繼之者善也成之者性也仁者見之謂之仁知者見之謂之知百姓日用而不知故君子之道鮮矣王昭素離易與天地凖合精氣爲物通爲一章今從昭素聖人觀天地以作易其道甚大與天地均故能用天地之道彌滿无間綸經而不絶天氣也而咸文地形也而有理形散爲氣明而幽也氣聚成形幽而明也仰觀乎天凡地之成形者莫不有是文俯察乎地凡天之成象者莫不具是理故分而爲二揲之以四生二儀四象八卦成三百八十四爻萬有一千五百二十䇿皆源於太極知此則知幽明之故也聚而爲有生之始也散而入无生之終也始終循環死生相續聚散之理也以八卦觀之一變者卦之始也謂之一丗六變者卦之終也謂之游䰟七變而反者卦體復也謂之歸䰟始者生也終者死也反則死而復生故知此則知死生之􅀃也乾兊金也震巽木也坎水離火也坤艮土也乾震坎艮陽也坤巽離兊隂也隂陽之精五行之氣氣聚爲精精聚爲物得乾爲首得坤爲腹得震爲足得巽爲股得坎爲耳得離爲目得艮爲􅈹得兊爲口及其散也五行隂陽各還其本故魂陽反於天魄隂歸於地其生也氣日至而滋息物生旣􅄹氣日反而游散至之謂神以其申也反之謂􅀑以其歸也隂陽轉續觸􅀋成形其游魂爲變乎物其狀也聚散其情也故曰乾陽物也坤隂物也知此則知􅀑神之情狀矣或曰太史公言儒者不言􅀑神而言有物物與􅀑神異乎曰人生始化曰魄旣生陽曰魂至於死也體魄降而魂氣升升則无不之也魄降而氣不化者物也今人行氣中􅀂哭􅀂呼其人忤視俄且化矣謂誠有是而不知氣之不化者也謂􅀑爲物察之有不至也韓愈謂􅀑无聲形是也生􅆱立卦生爻三者凖天地也自此以下言彌綸天地之道易與天地凖天地无一物不體有違於物則與天地不相似與天地相似故不違此言易之時也性者萬物之一源知性則知天知天則知物无非我者故智周乎萬物智周乎萬物而不知以道濟天下則過矣唯知周萬物而道濟乎天下故不過此言易之體也道濟天下酬酢萬變其道旁行散徙流而不反徇物而喪巳亦過矣故道濟天下旁行而不流此言易之用也道之行否有命窮亦樂通亦楽不以天下累其心故不憂此言易之貞也安土者所遇而安也雖所遇而安亦未甞一日志天下篤於仁者也故能愛此言易正而亨也範圍者防範之所圍天子所謂矩莊周所謂大方天地之化者氣也氣之推移一息不留故謂之化善養其氣者大配天地不違也不過也不流也雖憂楽以天下而適乎大中至正之矩故不過不過者不過乎中也橫渠謂非也絶物而獨化是也此言易之中正也不過故能盡巳之性能盡巳之性則能盡物之性曲成者順萬物之理成之者非一方也天之生物也直聖人相天而曲成之不害其爲直此言中正之成物也曲成萬物而不遺乃能无一物不體與天地相似與時偕行矣晝夜者隂陽也推乎晝夜隂陽之道而通之則知幽明知死生知􅀑神非盡巳之性盡物之性者不能也故通乎晝夜之道而知隂陽兩也两者合一而不測者神也不測則无方剛柔雜居而相易者用也相易則无體知易无方則知易无體知易无體則知一隂一陽之道一隂一陽在天日月之行也晝夜之經也寒暑之運也在人屈伸也動靜也語黙也推而行之故以是名之爲道知一隂一陽之道則繼之而不巳者善也君子晝有爲宵有得息有養瞬有存亹亹焉孜孜焉不敢湏􅁷舎也夫性无有不善不善非天地之性剛柔之氣或得之偏乃有不善有不善然後善之名立善不善相形而後命之也善反其􅀄者不善盡去則善名亦亡故舎曰善而成之者性也性自成也豈人爲哉性即天地也所謂誠也仁者見其道濟天下得易之體也故謂之仁智者見其旁行而不流得易之用也故謂之知百姓習焉而不察行之而不著故曰用而不知君子之道仁智合體用一兼體隂陽而无累通乎晝夜之道而知故君子之道鮮矣君子者具仁智之成名得道之大全者也顯諸仁藏諸用鼔萬物而不與聖人同憂盛德大業至矣哉冨有之謂大業日新之謂盛德生生之謂易成象之謂乾效法之謂坤極數知來之謂占通變之謂事隂陽不測之謂神夫易廣矣大矣以言乎逺則不禦以言乎邇則靜而正以言乎天地之間則備矣夫乾其靜也專其動也直是以大生焉夫坤其靜也翕其動也闢是以廣生焉廣大配天地變通配四時隂陽之義配日月易簡之善配至德子曰易其至矣乎夫易聖人所以崇德而廣業也知崇禮卑崇效天卑法地天地設位而易行乎其中矣成性存存道義之門天道之行雷霆風雨日月寒暑剛柔相摩萬物變化顯諸仁也雷霆之所以鼓風雨之所以潤日月寒暑之所以運行莫知其然而然藏諸用也天理自動萬物聽之鼓萬物也此天道无心之妙猶不與聖人同憂者盖聖人有相之道不以其所可憂者而同乎无憂以謂配天地立人道者存乎巳易之道是巳則聖人盛德大業豈不至矣乎横渠曰冨有者大而无外也日新者乆而无窮也陽生隂隂生陽陽復生隂隂復生陽生生不窮如環無端此之謂易太極不動則含两儀動而生陽一太極两儀而成象此天所以三也靜而生隂隂配於陽猶形之有影故两剛柔男女而效之法此地所以两也成象者徤也此之謂乾效法者順也此之謂坤天數二十有五地數三十極天地之數而吉凶之變可以前知此之謂占窮則變變則有術以通之此之謂事隂陽變化不可測度此之謂神是道也在聖人爲德業在天地之用爲易在易爲乾坤爲占爲神以兩言該之曰仁智以一言該之曰道其實一也廣者坤也大者乾也以言乎逺者變動也入於无形莫之能禦也以言乎邇者不變者也靜而守正一天下之動者也以言乎天地之間則乾坤合德剛柔有體變與不變玄相推盪而萬物備矣廣矣大矣備矣所謂冨有也夫乾之靜以一陽藏於二隂之中隂不能橈故專其動也九變爲六依坤而行故直坤之靜也以一隂藏於二陽之中隨陽而入故翕及其動也六變而九從乾而出故闢直則自遂闢則浸昌大生者通乎形外廣生者用止乎形此廣大之辯也天地之大德曰生乾坤不相離也是以能廣大故廣大配天地變通者乾坤之動也故變通配四時乾坤之動者隂陽之變也故隂陽之義配日月日月相推而明生焉故也言乎天地之間者備矣其䆒則乾坤簡易而巳至德者天地之德隱於无形者也故簡易之善配至德夫子於太伯之讓文王之德孝也中庸也皆謂之至德德至於是无以復加矣將以崇德故知崇將以廣業故禮卑崇上逹易自下升也卑无不至易徧體也通乎晝夜之道而知可謂知崇矣知崇則德崇曲成萬物而不遺可謂禮卑矣禮卑則業廣知崇效天禮卑法地德崇業廣則上下與天地同流易者天地之用也尊卑有定天地設位六爻上下升降而易行乎其中矣成性者存其所存則天地位天地位則道義出道義者用也故曰一隂一陽之謂道又曰道有變動又曰精義入神以致用夫萬物皆備於我而存其所存者何也去人欲而天理存也聖人有以見天下之􅄨而擬諸其形容象其物冝是故謂之象聖人有以見天下之動而觀其㑹通以行其典禮繫辭焉以斷其吉凶是故謂之爻言天下之至􅄨而不可惡也言天下之至動而不可亂也擬之而後言議之而後動擬議以成其變化鳴鶴在隂其子和之我有好爵吾與爾靡之子曰君子居其室出其言善則千里之外應之况其邇者乎居其室出其言不善則千里之外違之况其邇者乎言出乎身加乎民行發乎邇見乎逺言行君子之樞機樞機之發榮辱之主也言行君子之所以動天地也可不慎乎同人先號咷而後􅀏子曰君子之道或出或處或黙或語二人同心其利斷金同心之言其臭如蘭􅀄六藉用白茅无咎子曰苟錯諸地而可矣藉之用茅何咎之有慎之至也夫茅之爲物薄而用可重也慎斯術也以徃其无所失矣勞謙君子有終吉子曰勞而不伐有功而不德厚之至也語以其功下人者也德言盛禮言恭謙也者致恭以存其位者也亢龍有悔子曰貴而无位髙而无民賢人在下位而无輔是以動而有悔也不出户庭无咎子曰亂之所生也則言語以爲階君不宻則失臣臣不宻則失身幾事不宻則害成是以君子慎宻而不出也子曰作易者其知盗乎易曰􅀒且乗致冦至􅀒也者小人之事也乗也者君子之器也小人而乗君子之器盗思奪之矣上慢下􅁀盗思伐之矣慢藏誨盜冶容誨􅁋易曰􅀒且乗致冦至盗之招也王昭素合􅀄六藉用白茅通爲一章今從昭素天下之至頥者理也天下之至動者時也畫卦以明理而卦有變生爻以明時而爻有動擬諸其形容者剛柔有體象其物冝者百物不廢是故謂之象㑹通者亨也典禮者大猷也觀時之㑹否者旣通則斟酌大猷損益而行之所以嘉其亨之㑹也又繫辭以斷其吉凶知用各有時時不可失是故謂之爻如顛趾出否豕塗􅀑車言天下之至頥也然象其物之所冝雖至頥而不可惡也如升降上下反復相變言天下之至動也然斷之以吉凶雖至動而不可亂也言者尚其辭故擬之而後言則无妄言動而尚其變故議之而後動則无妄動擬議以成其變化則語黙動静皆中於道易言變化者四曰天地變化者乾坤變化也曰乾道變化者乾之變化也曰剛柔相推而生變化者爻象之變化也曰擬議以成其變化者言行之變化也或語或黙或出或處變化也爻象之變化象天地故曰天地變化聖人傚之言行之變化體易也自此以下舉諸卦以明擬議以明成其變化者如是靡當作縻中孚九二辭也二在内居室也二動五應出其言善千里之外應之也兊口不動則不正巽五不應出其言不善千里之外違之也坤爲衆行出乎身加乎民也内近外逺言發乎邇見乎逺也艮門震動樞機也或應或否榮辱之主也乾坤天地震巽相應動天地也明擬之而後言議之而後動者當如是此動彼應非變化乎同人先號咷而後􅀏同人九五辭也五應二也乾變爲金兊金斷之故曰其利斷金言同心之利動而不括者然也巽爲草爲臭陽爲芬芳二五相易芬芳上逹兊爲口故曰同心之言其臭如蘭言可服也震動或語或出也艮止或處或黙也出處語黙不必同所同者心則其利可斷其言可服變化不同其歸同也明言行不必同也中孚同人二五相易乃成變化故曰一則神兩則化一者合兩而爲一也爻辭曰用大師克相遇五四動而克三乃與二遇繫辭所陳止以二五相易盡同心之義是謂玩辭玩變之道舉上二爻以例爻之變者也藉用白茅无咎大過􅀄六爻辭也􅀄六一柔承四剛執柔處下而不犯雖柔无咎譬之置器苟錯之於平安之地斯可矣又藉之以㓗白之茅慎之至也茅之爲物雖薄而祭祀用之可謂重矣持是以徃何以尚之明言行之當慎也勞謙君子有終吉者謙九三爻辭也坎爲勞九三體謙以陽下隂勞而不自伐有功而不自得厚之至也語以其功下人者也艮成始成終成功之象明言行之當謙也德者言盛者也厚之至是也禮者言恭者也禮自卑而尊人自後而先人故以恭言之君子之於謙也豈唯下人亦所以存其位存其位非固位有終吉也謙恭則其德厚矣亢龍有悔乾上九爻辭也不當尊位无位也乾見坤隱坤爲衆无民也九三不應无輔也上乃剛過亢滿不知謙降之道是以動而有悔違謙故也不出戸庭无咎節􅀄九爻辭也兊爲口動於内爲舌􅀄應四出戸庭也是爲否亂之階􅀄四易則乾君受言坤臣納言離爲明坎爲難明言而有難不宻之害也􅀄四尖位君臣失也􅀄乾爲君四坤爲臣􅀄爲事幾成於四四失而難作害成也不出戸庭坎離象隱是以君子慎宻而不出言此以明不慎不宻之戒易曰􅀒且乗致冦至解九三辭也以小人而乗君子之器則爲盗者不奪不厭故思奪之四坎爲盗三四同象六三據非其位上慢也以柔乗剛下􅁀也上下悪之盗將聲其罪故思伐之離爲戈兵三四易位自上伐下也慢藏者誨人使盗冶容者誨人使􅁋无不自已求之􅀒且乗致冦至盗之招也故子曰作易者其知盗乎言此以明致恭可以存位慢則盗奪之伐之爲不恭之戒舉上五爻以例爻之不變者也夫謙恭慎宻又知夫不宻不恭之戒則於言行也何有善易者也易豈止於文字而巳哉大衍之數五十其用四十有九分而爲二以象兩掛一以象三揲之以四以象四時歸竒於扐以象閏五歳再閏故再扐而後掛天數五地數五五位相得而各有合天數二十有五地數三十凡天地之數五十有五此所以成變化而行􅀑神也乾之䇿二百一十有六坤之䇿百四十有四凡三百有六十當期之日二篇之䇿萬有一千五百二十當萬物之數也是故四營而成易十有八變而成卦八卦而小成引而伸之觸􅀋而長之天下之能事畢矣顯道神德行是故可與酬酢可與祐神矣小衍之五參兩也大衍之五十則小衍在其中矣一者體也太極不動之數四十有九者用也兩儀四象分太極之數揔之則一散之則四十有九非四十有九之外復有一而其一不用也方其一也兩儀四象未始不具及其散也太極未始或亡體用不相離也四十有九者七也是故爻用六􅆱用七卦用八玄用九十即五也十􅄹數不可衍也分之左右而爲二以象兩者分隂陽剛柔也掛一於小指以象三者一太極兩儀也揲之四以象四時者隂陽寒暑即四象也歸竒於扐以象閏者先以其左四揲之歸其所揲之餘而扐之以象閏次以其右四揲之歸其所揲之餘而扐之以象五歳再閏故再扐而後復掛皆參兩也三揲而成一爻閏生於日月合朔周天不盡之氣十九歳七閏凡三歳閏者五二歳閏者二太率五歳再閏所以定四時成歳也韓康伯曰其間五歳再閏者二故舉其凡是以太一筭數􅀜子明卜百年之義皆源於此京房以五十爲十日十二辰二十八􅀫馬融謂北辰日月五行十二月二十四氣誤也或謂毎成一爻而後掛二揲三揲不掛亦誤也一三五七九竒也故天數五二四六八十偶也故地數十九者河圗數也十者洛書數也五位相得者一五爲六故一與六相得二五爲七故二與七相得三五爲八故三與八相得四五爲九故四與九相得五五爲十故五與十相得然各有合故一與二合丁壬也三與五合甲巳也五與六合戊癸也七與四合丙辛也九與八合乙庚也五即十也天地五十有五大槩如此故曰凡天地之數五十有五然五十則在其中故太玄一六爲水二七爲火三八爲木四九爲金五五爲土黄帝書亦曰土生數五成數五是以大􅄛之數五十也大􅄛之數五十而䇿數六七八九何也曰六者一五也七者二五也八者三五也九者四五也舉六七八九則一二三四五具所謂五與十者未始離也五與十中也中不可離也考之於曆四時迭王而土王四季凡七十有五日與金木水火等此河圗十五隱於一九三七二四六八之意劉牧曰天五居中主乎變化三才旣備退藏於宻是也故六七八九而五十之數具五十之數而天地五十有五之數具竒耦相合也故能成變化相合而有升降也故能行􅀑神變化􅀑神者天地也成之行之者人也太玄天之䇿十有八地之䇿十有八虚其三以扐之凖大衍之數其用四十有九也雖虚其三而三畫成首首有三表七八九爲用亦大衍五十而五在其中也凡此言天地之數五十有五而大衍之數其用四十有九者爲是也自此以下再論揲之四以象四時歸竒合耦之數得五與四四則䇿數三十六四九也是爲乾之䇿乾之䇿老陽也得九與八八則䇿數二十四四六也是爲坤之䇿坤之䇿老隂也得五與八八得九與四八䇿數皆二十八四七也是爲震坎艮之䇿少陽也得九與四四得五與四八䇿數皆三十二四八也是爲巽離兊之䇿少隂也三十六合二十四六十也二十八合三十二亦六十也乾之䇿六爻二百一十有六坤之䇿六爻一百四十有四乾坤之䇿凡三百有六十當朞之日具四時也震坎艮之䇿六爻一百六十有八巽離兊之䇿六爻一百九十有二震坎艮巽離兊之䇿凡三百有六十亦當朞之日舉乾坤則六卦舉矣老者變少者不變易以變爲占者也變則化成變化則􅀑神行矣管子曰流行於天地之間謂之􅀑神歸竒合耦之數所以異於䇿數者存其掛一之數也一者太極不動之數故五與四四合爲十三去其一則十二九與八八合爲二十五去其一則二十四五與八八合爲二十一九與四八合亦二十一去其一則皆二十九與四四合爲十七五與四八合亦十七去其一皆十六一體也體隱則用顯所謂顕者亦隱故二十四者老隂之䇿也以二十四合十二則三十六者老陽之䇿也以二十合十二則三十二者少陽之䇿也以十六合十二則二十八者少隂之䇿也二十四合三十六六十也二十八合三十二亦六十也用與不用通而爲一體无非用也劉牧謂經唯舉乾坤老陽老隂三百六十之數當期之日不更別舉他卦之爻而疑六日七分之義此不以三隅反也唐陸希聲謂易以年統月以歳統旬以日統時凡言月者以一䇿當一月一九之䇿三十有六是爲三年故曰皆一九之䇿也又曰以年統月一日十二時七日八十四時一九之䇿三十六二六之䇿四十八凡八十有四是爲七日八十四時故曰七日者一九二六之䇿也又曰以日統時一朔之旬三十日七二十八䇿八三十二䇿凡六十䇿半之爲三十故曰言旬者合七八之䇿而半之以象一朔之旬一閏三十日再閏六十日九三十六䇿六二十四䇿凡六十䇿故曰言歳者全之以象再閏之日月有朔虚故半之歳有中􅄹故全之一月三旬八月二十四旬而老隂之䇿二十有四故曰八月之旬當極隂之䇿二十有四三歳爲一閏一歳三百六十日而二篇之爻三百八十有四除三百六十日餘二十四日故曰閏之日當二篇之爻八十有四乾坤之䇿當朞之日而少六日故曰虚分包焉二篇之爻三百八十四爻多二十四日故曰􅄹分萃焉其􅀃本於繫辭坤乾之䇿當朞之日然時有抵牾且虞翻爲孫權筮關羽遇節五爻變之臨曰不出二日五應二以二爻爲日也尚廣爲孫皓筮并天下遇同人之頥曰庚子歳青蓋入洛庚子震􅀄爻也震少陽數七鳯凰元年至天紀四年春三月呉入􅀳實七年􅀂以一九二六之䇿推之爲八十四時則可以言七日不可言七歳七年矣又臨至于八月有凶者謂自復數至遯一爻爲一月非取二十四極隂之䇿􅀂二爻屬老隂四十八䇿不可言十六月矣不然當言一歳四月乎中條隱者謂易含萬象䇿數乃數之一又有爻數卦數五行十日十二辰五聲十二律納甲之數不可一端而盡二篇之䇿三百八十四爻陽爻一百九十二其䇿六千九百一十二隂爻一百九十二其䇿四千六百八二篇之䇿合之凡萬有一千五百二十當萬物之數此變爻也老陽老隂之䇿也以不變者論之少陽之䇿二十有八凡一百九十二爻爲五千三百七十六䇿少隂之䇿三十有二凡一百九十二爻爲六千一百四十四䇿二篇之䇿合之亦萬有二千五百二十當朞之日變者以不變爲基不變者以變者爲用以爻數言之陽爻一百九十二晝數也其數一千七百二十八隂爻一百九十二夜數也其數一千一百五十二綜而言之二十八百八十凡四求之亦萬有一千五百二十當萬物之數四時行而後萬物生无非四也故曰四營而成易分二掛一歸四揲之餘而併扐之一變也三變而成一爻六爻十有八變而成卦自乾至坤八卦而小成引而伸之爲六十四卦觸􅀋而長之乃有變動或謂三畫之卦爲小成誤也上旣陳十有八變而成卦則八卦者重卦也八卦而六十四卦具故曰小成自歸竒合扐之數觀之三少者乾也三多者坤也一少二多者震坎艮也二少一多者巽離兊也三少者䇿數九三多者䇿數六一少二多者䇿數七一多二少者䇿數八則多少之數八卦已具自三畫觀之八卦爲陽畫者十有二隂畫者二十有四陽七九也隂六八也九六十五也七八亦十五也二十四者坤䇿也揔而爲三十六者乾䇿也則三畫之中五行十日十二辰二十四氣巳具引而伸之觸􅀋而長之不越乎此是故聖人語小天下莫能破語大天下莫能載謂八卦而小成者舉中而言也顯道者危者使平易者使傾懼以終始其要无咎之道也德行者卦之德行神者變而通之酬酢者互爲賔主祐神者先後天也飲酒之禮主人獻賔賔酬主人主人酬賔卦反復相變而乾坤坎離大過頥小過中孚不變此所以能酬酢也子曰知變化之道者其知神之所爲乎易有聖人之道四焉以言者尚其辭以動者尚其變以制器者尚其象以卜筮者尚其占是以君子將有爲也將有行也問焉而以言其受命也如響无有逺近幽深遂知來物非天下之至精其孰能與於此參伍以變錯綜其數通其變遂成天地之文極其數遂定天下之象非天下之至變其孰能與於此易无思也无爲也寂然不動感而遂通天下之故非天下之至神其孰能與於此夫易聖人之所以極深而研幾也唯深也故能通天下之志唯幾也故能成天下之務唯神也故不疾而速不行而至子曰易有聖人之道四焉者此之謂也變化之道盡於叄兩之神知其道則知神之所爲辝也變也象也占也四者易之變化本於叄兩者也叄天两地也錯綜而生變化其妙至於不可知然亦不越乎四者故言者尚其辝則言必不苟以動者尚其變則動必精義以制器者尚其象則器必致用以卜筮者尚其占則占必知來非神之有爲乎有爲造事也有行舉事也有問者焉而以易言之則其辭足以德天下之問有命者焉受而應之如響則其占足以決天下之疑問荅占決皆辝也故通言之无有逺近以内外言也无有幽深以變動言也心者天地之鑑萬物之鏡顯於叄伍之神則逺近幽深畢陳乎前逐知來物我與物一也精之又精謂之至精叄位以變者縱横十五天地五十有五之數也錯之爲六七八九綜之爲三百六十以天地觀之隂陽三五一五以變爲候者七十二二五以變爲旬者三十六三五以變爲氣者二十四三百六十五日周而復始故乾之䇿三十有六者三六而又二也坤之䇿二十有四者二六而又二也三其二十四與二其三十六皆七十二三其七十二爲二百一十六得乾之䇿二其七十二爲百四十四得坤之䇿三畫之卦三變而反六畫之卦五變而復通六七八九之變則剛柔相易遂成天地之文極五十有五之數則剛柔有體遂定天下之象非成文不足以成物非定象不定以制器變之又變謂之至變夫有行始於有爲有爲始於有思有思有爲者人也无思无爲者天也誰能有思有爲而无於人之累乎其唯易而巳易有思也本於无思有爲也本於无爲合五十有五之數歸於太極寂然无聲其一不動萬化􅁳㑹乎其中有物感之散爲六七八九之變而天下之所以然者无乎不通所謂逺近幽深遂知來物乃其一也精者精此者也變者變此者也神之又神謂之至神精故可以窮深變故可以與幾夫易聖人體之以極深研幾者也天下之志藏於无形非推見至隱者其能盡通乎易至精者也天下之務其來无窮非曲得所謂者其能成乎易至變者也疾而速行而至有思有爲者皆然易至神也躰易者至於不疾而速不行而至者極深研幾之效也莫知其然而然也故曰易有聖人之道四焉天一地二天三地四天五地六天七地八天九地十子曰夫易何爲者也夫易開物成務冒天下之道如斯而已者也是故聖人以通天下之志以定天下之業以斷天下之疑是故􅆱之德圎而神卦之德方以知六爻之義易以貢聖人以此洗心退藏於宻吉凶與民同患神以知來知以藏往其孰能與此哉古之聦明叡知神武而不殺者夫是以明於天之道而察於民之故是興神物以前民用聖人以此齋戒以神明其德夫是故闔戸謂之坤闢戸謂之乾一闔一闢謂之變往來不窮謂之通見乃謂之象形乃謂之器制而用之謂之法利用出入民咸用之謂之神是故易有太極是生兩儀兩儀生四象四象生八卦八卦定吉凶吉凶生大業是故法象莫大乎天地變通莫大乎四時縣象著明莫大乎日月崇髙莫大乎冨貴備物致用立成器以爲天下利莫大乎聖人探􅄨索隱鈎深致逺以定天下之吉凶成天下之亹亹者莫大乎􅆱􅀛是故天生神物聖人則之天地變化聖人效之天垂象見吉凶聖人象之河出圗洛出書聖人則之易有四象所以示也繫辤焉所以告也定之以吉凶所以斷也易曰自天祐之吉无不利子曰祐者助也天之所助者順也人之所助者信也履信思乎順又以尚賢也是以自天祐之吉无不利也萬物在天地間不離乎五十有五之數聖人雖不言其能逃乎然則易之爲書何爲者也物有理易則開之事有時易則成之聖人冒天下之道所謂易者如斯而已者也冒天下之道者日月所照霜露所墜舟車所至凡有血氣者必待此道而後覆冒􅀜子明曰象生有定數吉凶有前期變而能通則治亂有可易之理天命人事其同歸乎故聖人以此通天下之志謂其極深也以此定天下之業謂其成務也以此斷天下之疑謂其受命如響也天下之業定則務旣成矣聖人於天地五十有五之數盖有超然獨得而遺乎數者是故􅆱運无窮可以前知其德圎而神也聖人以此洗心酬酢萬變一毫不留於􅇩中卦成不易爻見而䇿藏其德方以知也聖人以此退藏遁於无形深不可測六爻之義唯變是適上下内外相易以告吉凶聖人以此吉凶與民同患夫洗心退藏􅀂絶倫離􅀋則過矣是以吉凶與民同患開物於幾先故曰知來所謂可以前知也明憂患而弭其故故曰藏往所謂爻見而䇿藏也惟吉凶與民同患是以有開物成務冒天下之道此所謂不與聖人同憂者也􅀂捨是道唯數而已則易於天地爲贅矣上言􅆱神卦知爻義而揔之以神知者言卦則爻在其中孰能與於此者哉古者聦明不蔽於耳目叡知不蔽於思慮有武而不殺者夫有武不殺萬物自服故謂之神武物之蒙蔽動違諸理不得已而用刑至於殺之豈得已哉聖人憂之是以明於天之道察於民之故明於天之道而不察於民之故知天而巳非聖人也无非物也天地五十有五之數見於􅆱􅀛故謂之神物是興神物前百姓之日用示之以吉凶之理使知違順取捨其效至於刑措不用兵革不試何殺之有然非聦明叡知豈能明察如此聖人以此齋㓗戒慎恐懼於不聞不覩所謂誠也神明其德者配天地也故其民有肅心而不欺民至於不欺至矣坤自夏至以一隂右行萬物從之而入故曰闔戸謂之坤乾自冬至以一陽左行萬物從之而出故曰闢户謂之乾坤闔則陽變而隂乾闢則隂變而陽故一闔一闢謂之變闔者往也闢者來也一闔一闢往來相感其機有不得息者故往來不窮謂之通氣聚而有見故謂之象象成而有形故謂之器利用此道以動静出入而􅃖􅃖之民咸日用之莫知其然故謂之神七者同出而異名其變化之道神之所爲乎知闔闢變通者明於天之道知利用出入民咸用之者察於民之故乾天坤地而曰明於天之道者乾兼坤也闔闢以一歳言之寒暑也以一日言之晝夜也以一身言之出入之息死生之變也无闔則无闢无静則无動此歸藏所以先坤歟此以不言是興神物極中也太極中之至歟易有太極四十有九合而爲一乎四象八卦具而未動謂之太極在人則喜怒哀樂之未發者也隂陽匹也故謂之儀太極動而生陽極動而生隂隂極復動而生陽始動静者少也極動静者老也故生四象乾老陽也震坎艮少陽也坤老隂也巽離兊少隂也故四象生八卦卦有爻爻有位剛柔相文有當否故八卦定吉凶有吉凶則有利害人謀用矣故生大業八卦定吉凶者開物也吉凶生大業者成務也法象莫大乎天地故定乾坤也變通莫大乎四時故明六爻也縣象著明莫大乎日月故用坎離也積而崇髙者冨貴也冨貴然後可與人共位食禄行道爻之尊位是也故莫大乎冨貴備百物致民用立成器如網罟耒耜之􅀋以爲天下利唯聖人能之象言先王大人君子之所以者是也故莫大乎聖人天地􅀑神之奥幽􅄨隱伏深逺而難窮探取之搜索之鈎出之使自至之以定吉凶之未形以成亹亹之不巳唯􅆱􅀛能之故莫大乎􅆱􅀛聖人觀天地四時日月又考之􅆱􅀛而作易以通神明之德以􅀋萬物之情處崇髙之冨貴備物致用立成器建卜筮然則通天下之志定天下之業斷天下之疑非聖人其孰能之是以成位兩間與天地並立故曰大哉人謨捨此而能覆冒天下者未之見也􅆱一根而百莖􅀛具八卦五行天地之數神物也故聖人則之天地變化四時行焉萬物生焉故聖人效之日月五星天象也天不言示之以象吉凶見矣故聖人象之河圗九宫洛書五行聖人則之效之者效之以六爻之動故曰爻者效天下之動者也象之者象也故曰象也者像也於􅆱􅀛圗書言則之者大衍之數八卦五行作易者則之故乾坤坎離震巽艮兊三畫之卦爻合皆九六七八九數皆十五水六火七木八金九五行之數具焉傳曰聖人以􅆱􅀛而信天地四時日月之象數以河圗洛書而信􅆱􅀛之象數信矣其不疑也於是乎作易易有四象聖人所以示吉凶也繫辤焉而命之所以告吉凶也易於吉凶有以利言者有以情迁者有義命當吉當凶當否當亨者一以貞勝而不頋非聖人不能定也定之者所以斷之易曰自天祐之吉无不利大有上九辤也乾爲天爲人祐助也坤爲順三與二孚信也天之所助者順理也人之所助者信相與也六五履信而思乎順又自下而上賢是以自天祐之吉无不利言此者明獲天人之利然後吉无不利聖人明於天之道察於氏之故合天人者也子曰書不盡言言不盡意然則聖人之意其不可見乎子曰聖人立象以盡意設卦以盡情僞繫辤焉以盡其言變而通之以盡利鼓之舞之以盡神乾坤其易之緼邪乾坤成列而易立乎其中矣乾坤毀則无以見易易不可見則乾坤或幾乎息矣是故形而上者謂之道形而下者謂之器化而裁之謂之變推而行之謂之通舉而錯之天下之民謂之事業是故夫象聖人有以見天下之􅄨而擬諸其形容象其物冝是故謂之象聖人有以見天下之動而觀其㑹通以行其典禮繫辤焉以斷其吉凶是故謂之爻極天下之􅄨者存乎卦鼓天下之動者存乎辤化而裁之存乎變推而行之存乎通神而明之存乎其人黙而成之不言而信存乎德行言之難諭者不能盡形之於書意之難傳者不能盡見之於言然聖人之意終不可見於天下後丗乎夫有意斯有名有名斯有象意至􅄨也聖人於无形之中建立有象因象而得名因名而得意則言之所不能盡見者盡矣君子小人情僞而巳矣情則相應僞則相違聖人陳卦以示之斷之以中正而君子小人見然後著情去僞而其意誠矣繫之卦辤又繫之爻辤以吉凶明告之與卦象相發則書之所不能盡形者盡矣隂極變陽陽極變隂當變而變則通不變則窮窮非道也變而通之則无所不利而道行矣鼓舞者鼓之於此舞之於彼動止應節莫知其然神也横渠曰辤不鼓舞則不足以盡神爻至於變通以盡利辤至於鼓舞以盡神則聖人之意幾无餘藴矣乾坤成列則象爻變動藴於其中乾坤躰也象爻變動用也躰毀則用不可見用不可見則躰因是息矣故曰乾坤其易之藴邪乾坤毀則无以見易易不可見則乾坤幾乎息矣乾健也坤順也健順者意也謂之乾坤者名也乾竒坤偶者象也象成而著者形也形而上者謂之道變通也形而下者謂之器執方也然則變通者易之道執方者易之器是故語道而至於不可象則名言亡矣變通一也離而言之則二今天地之化一息不留聖人指而裁之則謂之變故晝夜六時寒暑六氣剛柔六位因其化而裁之以著其變之微故曰化而裁之謂之變晝夜相推爲一日寒暑相推爲一歳剛柔相推爲一卦推之則通故曰推而行之謂之通又曰剛柔相推變在其中矣知此則知變通一也舉此道而錯之於天下謂之事業又曰通變之謂事知此則知事業通變一也聖人見天下之至􅄨將以示人故擬諸其形容象其物之冝形一定也剛柔以立本也容變動也變通以趨時也是故謂之象立象則卦也變通也在其中矣聖人見大下之至動旣觀其㑹通之時損益典禮以行之矣又繫之辤以斷其疑曰如是而吉如是而凶是故謂之爻繫辤則變通在其中矣然則躰易者欲極天下之至􅄨者存乎卦可也存乎卦則見象矣欲鼓天下之至動者存乎辤可也存乎辤則見變通矣化而裁之其化有漸存乎爻之變可也推而行之其利不窮存乎爻之通可也神而藏用明而顯仁存乎古之人可也革存乎湯武明夷存乎文王箕子復存乎顔氏之子故曰存乎其人黙而成之言不下帶而道存者以心感心也存諸巳也故曰不言而信存乎德行易至於存乎德行則得意志象我與聖人一也上繫終於黙然成之不言而信下繫終於六辭語黙一也周易繫辭上傳第七
