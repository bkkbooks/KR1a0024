body:
  text: 其用刑至於殺之而不怨所以異於刑名家也彼嚴而少恩敢於殺以失人之情豈知徤決有和􅀃之義故曰徤而􅀃決而和此合二體言夬之才也五王位伏艮爲廷王庭者􅀌卿太夫諸侯三公羣士羣吏之位大詢于衆之地五得尊位體兊兊爲口訟言於王庭與衆君子共去之而无忌以上六小人得位一柔乗五剛則其害未易去也故曰􅀭于王庭一柔而乗五剛也此以九五言處夬之道也或曰何以知艮爲庭曰艮行于庭春秋左氏傳周史有以周易見陳侯者陳侯使筮之遇觀之否曰庭實旅百杜氏曰艮爲門庭上六下與九三相應成巽離巽爲號巽風者天之號令故號令也號呼也命也皆取巽象相應孚也􅀭于王庭發大號以信于下使知危者安其位不可易也一柔乗五剛而未去有危之道厲者危也其危猶曰其亡則決小人之道光矣離爲光所謂與衆棄之舜去四凶而天下服是巳􅀂隱其誅如唐去李輔國則不光矣故曰孚號有厲其危乃光也此以上六應九三言處夬之道也夬自姤變一變同人二變履三變小畜四變大有五變夬姤巽爲命同人二坤爲邑履兊爲口告邑也于小畜大有皆有告命之象告自邑者告戒自我私邑言自治也君子將治小人必先自治自治則以我之善去彼不善小人所以服也傳曰无瑕者乃能戮人舜修文德文王無畔援歆羡自治也故曰告自邑戎戈兵也離之象自同人之離五變離成兊兊爲刑殺而近君不利即戎也決小人不能􅀭于王庭孚大號于下藉戎兵以清君側猶鑿木去蠹薫社逐䑕豈夬之尚哉所貴其夬者謂其乗時去害動而不窮也交兵幸一日之勝則窮矣自古用兵去小人如漢唐之季召外兵以去近習其禍至於覆宗聖人之戒不其深乎故曰不利即戎所尚乃窮也此二者推原卦変以言夬之所當戒也君子之道有始必有終夬始於復其剛浸長一柔尚存君子之道有未盡也剛長成乾其道乃終不能終則必有悔彦範之下誅武三思卒爲丗患剛長不終也故曰利有攸性剛長乃終也此復以五剛終言處夬之道也在卦氣爲三月故太玄準之以斷毅象曰澤上於天夬君子以施禄及下居德則忌雨澤上於天其勢不居必決而下流君子體夬之象故施禄澤以及下兊爲口食下應三有施禄及下之象古者上有大澤則民夫人待于下流知惠之必將至也君子之於德也寛以居之然後仁以行之􅀂決而散則不可以畜矣故以此施禄則可以此居德則忌上六居位而安有伏艮居德象也􅀄九壯于前趾徃不勝爲咎象曰不勝而徃咎也大壯震爲足􅀄九在下體之下應足之動趾也夬自大壯積之在大壯時四剛巳壯長而至於五剛則􅀄九壯于前大壯之趾也大壯所以征凶者􅀄九无應不可動而先動也今震足毀折又无應動而徃不正不正不足以勝九四恃其剛壯不計彼之不可勝而徃決之過也不正故有咎不曰凶者隂將盡也易傳曰凡行而有咎者皆決之過九二惕號莫夜有戎勿恤象曰有戎勿恤得中道也二動成離目巽爲多白眼惕懼之象巽風爲號應兊口爲號呼故曰惕號離日在西之下莫也巽爲入日入于地莫夜也離爲戈兵戎也坎爲憂離見坎伏勿恤也一爻又具此三者故曰有戎勿恤九二剛長欲極之時處中體柔不爲過剛中動而正可以決小人矣而猶不忘乎戒懼求應自處之至善者也小人知將亡其徒必乗人之疑以相恐動夫暮至於夜隂氣將盡陽氣􅁒生雖有戎兵窮冦也勿憂可也我得中道行之以正雖千萬人徃矣何恤乎小人况窮冦乎九三壯于頄有凶君子夬夬獨行遇雨􅀂濡有愠无咎象曰君子夬夬終无咎也易傳曰爻辭差錯當云壯于頄有凶獨行遇雨君子夬夬􅀂濡有惕无咎以象考之傳爲是三徤之極與上六小人相應乾爲首兊見於外爲頰九三徃應之頰柔而增剛壯于頄頄頰間骨鄭氏本作頯衆陽決小人而已違衆應之有凶之道不正也四爻不應三獨上行而遇之兊澤下流遇雨也言􅀃小人而與之和也兊和􅀃也君子當此則棄去情累外決小人而絶之内自徤決決之父決以上六兊三動復成兊夬夬也乾爲衣坤爲裳而遇兊澤霑濡也巽多白眼上視而不恱愠也􅀂惡小人之浼巳如遇雨霑濡其衣又疾視之有愠怒則无咎故曰終无咎也或曰君子亦有愠乎曰君子如怒亂庶遄沮當怒而怒也九四臀无膚其行㳄且牽羊悔亡聞言不信象曰其行次且位不當也聞言不信聦不明也一隂在上衆陽爭趨之九四居上卦之後動有伏艮爲臀艮柔爲膚三陽自下侵之不足於柔也故臀无膚无膚則不可以處矣四本大壯震震爲足欲前而九五礙之又柔而少決則却而不前故其行次且次且一本作趑趄次且不可前矣處則乗剛行則不前以九處四也故曰其行次且位不當也然則爲九四者如何避位居􅀄讓三陽使先行斯可无悔矣四動成兊兊爲羊羊性很牽挽則抵觸不行却行而使之先則行張載曰牽羊者讓而先之如是悔亡正故也雖有是言也九四未必聞其言而信之不足於剛決也兊爲口坎耳受之信也九四動乃有坎耳離目聦明之象不動則耳塞目毀聦不明矣兊口雖告莫之聽焉故曰聞言不信聦不明也九五莧陸夬夬中行无咎象曰中行无咎中未光也大壯震爲蕃鮮兊爲澤莧蕢澤草也葉柔根小堅且赤乾爲大赤上六之象陸啇陸亦澤草也葉大而柔根猥大而深有赤白二種五動震爲蕃鮮㐲巽爲白商陸也莧陸小人之近君者莧柔脆根淺易決商陸根大而深爲難決九五得尊位大中爲決之主當五陽並進決小人之時而反比之中道未光也五兊乾徤決也動而徃決上六復成兊故曰夬夬決之又決震巽象毀成離則莧與陸去而中道光矣離爲光動則不正冝􅀂有咎然夬之時剛長乃有終動而徃決而後中道行張載曰陽比於隂不能无累故必正其行然後无咎易傳曰五心有比於中道未得爲光也盖人心有所欲則離道矣此示人之意深矣上六无號終有凶象曰无號之凶終不可長也上六之三成巽巽爲號上六小人知非而去有號呼求免之象陽長隂消之時安其位而不去无自悔之實陽長則隂失位終必有凶巽爲長安位巽毀終不可長也聖人明此開小人自悔之路􅦯巽下乾上姤女壯勿用取女􅂏曰姤遇也柔遇剛也勿用取女不可與長也天地相遇品物咸章也剛遇中正天下大行也姤之時義大矣哉姤遇也柔出而遇剛􅀂邂逅然故曰姤遇也柔遇剛也此以一柔遇五剛言姤之義也女德柔順而剛徤女壯也故曰女壯隂息剥陽以柔變剛女壯男弱不可與乆處故曰勿用取女不可與長也詩以虵虺爲女子之祥熊羆爲男子之祥剛柔反易必有女禍此以􅀄六言姤之戒也陽生於子至巳成乾巳者巽也轉而至午陽極隂生午者離也荀爽曰坤出於離與乾相遇故萬物皆相見相見也咸章也皆謂出於離也萬物別而言之曰品物品物咸章則相見者著矣故曰天地相遇品物咸章此再以􅀄六言姤之時也姤五月卦也太玄凖之以遇易於復言七日來復冬至也於姤言品物咸章夏至也舉二至則律曆見矣九二剛中臣也九五剛中而正君也姤比遯爲有臣比剥爲有君以剛中之臣遇中正之君有其位有其時君臣相遇亦猶天地之相遇故曰剛遇中正姤者夬之反夬一隂自上而下五變成姤乾爲天天下行也君臣相遇道行乎天下故曰剛遇中正天下大行也此以二五兩爻卦之反復言姤之用也天地也君臣也非其時也亦莫之遇莫之遇則天地閉賢人隱萬物幾乎息矣故曰姤之時義大矣哉象曰天下有風姤后以施命誥四方天下有風乃與萬物相遇后以施命誥詔四方君與萬民相遇之道也風者天之號令以時而動明庶東也景風南也閶闔西也廣莫北也周流天下无所不徧故后體之隂陽家有風律之占源於此姤自夬變离离有伏坎變兊有伏震四方也巽爲命自上而下兊爲口施命誥四方之象易傳曰諸象或稱先王或稱后或稱君子大人先王者先王立法制建國作楽省方敕法閉関育物享帝是也后者後王之所爲裁成天地之道施命誥四方是也君子則上下之通稱大人者王公之通稱初六繫于金柅貞吉有攸徃見凶羸豕孚蹢躅象曰繫于金柅柔道牽也姤􅀄六五月離卦之一隂也離巽之柔爲絲乾變爲金堅重也柅絡絲跌也許慎作檷謂九二也􅀄六隂柔不正與九二相遇如絲紛然繫之以堅重之器乃可經理故曰繫于金柅􅀄六變而正則吉人亦何常君子小人在正不正之間耳故􅀄六繫于金柅貞則吉勉􅀄六也􅀄二相易成離目見也隂有攸徃九二降􅀄剥剛而進凶也凶戒九二也言􅀄隂辯之下早必見凶害乾􅀄爻甲子子坎位爲豕􅀄九變六陽變隂羸豕也羸豕牝豕也伏震爲躁巽爲股爲進退􅀄隂應四孚也牝豕感陽志欲徃前爲二所制進退蹢躅而躁動不安其意未始不在於陽九二可不繫于金柅乎繫于金柅則柔道有所牽矣易言牽者皆艮巽之動艮手也巽股也手挽之而股動夫君子小人相爲消長雖􅀄隂其心未甞一日不欲害君子一隂雖弱方來也五陽雖強旣徃也其可忽諸自古禍亂或始於牀第之近給使之賤夷裔荒服之逺易而忽之馴致大亂反求其故必本於剛正不足􅀂柔道有牽君子小人各當其分禍亂何由而作或曰巽離爲絲何也曰巽爲木爲風巽變離木中含火火生風風化蠱􅅙爲龍馬之精龍大火馬火畜􅅙以火出而浴畜馬者禁原􅅙故太玄以火爲絲賈逵以離爲絲郭璞曰巽爲風蠱屬龍馬絲出中九二包有魚无咎不利賔象曰包有魚義不及賔也魚謂􅀄也􅀄六易四成兊爲澤巽干澤下者魚也民之象􅀄者二四之所欲􅀄本應四九二據之宜有咎然隂出遇陽一近而包有之於遇道爲得故无咎􅀂二不能包四又逺民􅀄將散亂而不可制矣賔謂四也四在外動而易􅀄􅀄成乾西北方賔之位二體巽東南方主人位􅀄六之民爲二所有非九四之利而九四所不能包者逺於民也一民不可有二君亦義之所不及也古者有分土无分民得道則歸徃失道則携持而去无逺近内外之間顧遇民之道如何耳此二所以无咎易傳曰遇道當一二則離矣故義不可及賔也九三臀无膚其行次且厲无大咎象曰其行次且行未牽也姤者夬之反姤之九二即夬之九四故二爻同象艮在下體之上爲臀其柔膚也二不動而侵三艮成巽柔不足也故臀无膚臀无膚則不能處矣隂陽之情必求相遇􅀄隂在下亦三隂之所欲遇者也二比於􅀄巳包有之三非義求遇亦何所得哉亦必有咎而遇情未忘故其行次且次且者且進且退不能遽行巽䆒爲躁爲進退故也處則爲二所侵行則有求而不去可謂危厲然九三剛正處巽知義不可而舎之􅀄隂不能牽其後故无大咎牽者手挽股動􅀄爲二所制艮隱巽見故曰柔未牽也不曰凶者􅀄非三之所冝有四失􅀄則凶矣九四包无魚起凶象曰无魚之凶逺民也二有其魚四失所遇失其民也起動也動成離戈兵之象三動􅀄愈不應故起凶无魚之凶以九四不中正自逺其民故九二得以中近之民无常心撫我則后此九四所以凶歟易傳曰遇之道君臣民主夫婦朋友皆在焉四以下睽故主民而言也九五以􅂎包􅀲含章有隕自天象曰九五含章中正也有隕自天志不舎命也二巽木也變乾爲大木此爻自兊變巽兊爲澤澤木而大􅂎也􅂎似樗葉大而䕃張載曰􅂎周於下者也艮在草爲蓏蓏􅀲屬艮爲巽包􅀲也􅀲譬則民􅀲雖可欲而潰必自内始九五當隂長之時含章不耀中正在上遇九二之賢而用之以剛守中道防民之潰故曰以􅂎包􅀲九五動則成離離爲文章不動含章而中正唯含章不耀中正自處是以能用九二以盡其才故辭曰含章象曰九五含章中正也一隂浸長陽爻消剥者天也九五含章用九二以防民之潰者人也盡人謀則有時而勝天然或不勝至於隕越者亦天也九五之志知盡人謀而巳以謂天之所命以祐下民者在我有隕越者自天隕之吾終不舎天之命也故曰有隕自天象曰志不舎命也二陽爲隂剥五自乾而隕有隕自天也五隕於二復成巽巽爲命志不舎命也張載曰以􅂎包􅀲文王事紂之道也厚下以防中潰盡人謀而聽天命者歟上九姤其角吝无咎象曰姤其角上窮吝也上九姤之極有弗遇焉前剛角也姤道上窮不動則不和不和則无所遇動則吝是以窮也易傳曰上九髙亢而剛極人誰與之以此求遇將安歸咎乎􅫹坤下兊上萃亨王假有廟利見大人亨利貞用大牲吉利有攸徃􅂏曰萃聚也順以􅀃剛中而應故聚也王假有廟致孝享也利見大人亨聚以正也用大牲吉利有攸徃順天命也觀其所聚而天地萬物之情可見矣坤順兊􅀃也上順民心以􅀃之民亦順上以􅀃其政令上下皆順以􅀃上以是聚下以是從此合二體而言萃也九五剛得位以剛中爲萃之主下有六二柔中之臣應之君臣聚㑹以聚天下此合二五而言萃也具是四者然後能聚不然民不可得而聚矣故曰萃聚也順以􅀃剛中而應故聚也萃自臨來小過三之五艮爲門闕巽爲髙上爲宗廟四本震爻長子也三自門闕升髙至宗廟有長子奉祀之象民之所聚必建􅀖設都宗廟爲先宫室次之王者萃天下之道至於有廟則萃道至矣假至也謂五也王格祖考則諸侯大夫士各致其孝報本反始敎民不忘其親易傳曰萃合人心揔攝衆志之道非一其至大莫過宗廟故曰王假有廟致孝享也此以九五言萃之道也天下旣聚未見大人其聚未必正凢有血氣必有爭心萃不以正適所以致爭奪安得亨乎九五示之以大人之德六二以正而徃聚之則人倫正民志定物情相交而亨九六聚成離離目爲見故曰利見大人亨利貞聚以正也此以九五六二相易而言萃之道也聖人隨時而巳萃聚之丗物之所聚者大故所用不可不大用大牲則􅀑神福之禮以時爲大坤爲牛兊爲刑殺殺牛以奉宗廟用大牲也物聚則力贍動而有成何徃不利哉謂三之五也舉宗廟之理則百禮无不洽矣所謂隨時者順天理而行天理即天命也巽爲命故曰用大牲吉利有攸徃順天命也此以九三之五言萃之道也天地之氣聚而有物散而无形散者必聚􅀑神耗荒至幽也而各享其􅀋萬物散殊至衆也而各從其􅀋故曰觀其所聚而天地萬物之情可見矣此以小過九三萃於上六五萃於下推廣萃之義也在卦氣爲八月故太玄凖之以聚象曰澤上于地萃君子以除戒器戎不虞萃自小過變澤上於地萬物萃聚之時虞翻謂三四之正小過明夷變也明夷離爲甲胄戈兵坎爲弓變小過巽爲繩爲工艮爲石巽納辛繕甲兵脩弓矢去弊惡而新之象也小過變萃聚所除之器也明夷坎爲冦兊爲口上六旣安之時聚而相告消冦於未形戒不虞也萃則多故君子過爲之防是以萃而无患非用明於至微者不能也故此象以三卦明之原始要終以遏禍亂聖人之憂患後丗深矣乎秦銷鋒鏑唐銷兵率至大亂豈知戒不虞哉􅀄六有孚不終乃亂乃萃􅀂號一握爲笑勿恤徃无咎象曰乃亂乃萃其志亂也􅀄六柔不中正進則疑六三之間巳退不能專一以待志乃亂者退而亂於三隂之中乃萃者欲進而與四相萃也其志惑亂不決是以有孚不終故曰乃亂乃萃象曰其志亂也初應四巽爲進退故也􅀂號謂四也兊爲口巽爲號􅀂四在上號召之三隂不正惡初之徃合於四一握其手笑以喻意微動之也艮爲手三徃易四一握手也兊爲口爲􅀃離喜􅀃動而出聲笑也爲笑者獻笑也巽爲工有造爲之象故曰一握爲笑萃聚之丗上下相求以隂從陽動而得正何恤乎小人之笑而不徃哉徃而相應何咎之有不則與小人爲徒非萃之正也故曰勿恤徃无咎自古不知堅守其節從應以動捨君子之正義畏小人之非笑相率䧟於非義皆不知萃之道六二引吉无咎孚乃利用禴象曰引吉无咎中未變也萃聚之時􅀄三同體之隂皆萃於四巳於其間得位守中不變其志須五牽引之而後應不急於萃者也然隂從陽靜而待唱引而後徃其聚也有吉无咎矣巽爲繩艮手持繩相應引也故曰引吉无咎象曰引吉无咎中未變也不變之中有孚相應孚者萃之本其誠素著不假外飾譬之祭也精意承之雖薄可以薦也禴夏祭以聲爲主祭之薄者上六宗廟六二與五相易離爲夏五本小過震震爲聲爲長子有長子用禴祭之象故曰孚乃利用禴夫君臣以道相感精迎誠致不言而動蛟潜于淵陵夘自化至于旣孚二五相易乃利用禴矣易傳曰萃之時能自守不變逺須正應剛立者能之二隂柔之才以其有中正之德可冀其未至於變耳故象含其意以存戒也六三萃如嗟如无攸利徃无咎小吝象曰徃无咎上巽也六三履非其位欲萃於四四應初欲萃於二二應五莫知所萃故萃如巽爲號兊爲口嗟也故嗟如上下不與雖嗟之无所利故无攸利上六无與據髙慮厄􅀌立求助六三動而徃則正正則无咎然三欲萃於四二之間故小吝隂爲小三徃從上上來應三成巽巽則不亢三冝徃而萃也小吝過矣九四大吉无咎象曰大吉无咎位不當也九四上比於五君臣聚也下據三隂民所聚也然九四處位不當疑於上下之聚理有未正九四動則得正上承於五下納三隂上下皆正是謂大吉大吉則无不當位之咎陽爲大大者吉也易傳曰非理枉道而得君得民者盖亦有焉齊之陳常魯之季氏是也得爲大吉乎得爲无咎乎九五萃有位无咎匪孚元永貞悔亡象曰萃有位志未光也九五得尊位天下皆萃而歸之於是觀其所孚可以知其志而專於六二係應至狹所萃者有定位得近遺逺聚道不全能无悔乎􅂊足以自守免咎而巳於人君恢宏廣􅀶无所不萃之志未爲光大匪所謂孚也故曰萃有位无咎匪孚象曰萃有位志未光也盖初可萃四二可萃五三可萃上獨五不可專萃於二萃則陋矣五萃二有坎離坎離爲光而曰未光者於无所不萃之志未光也九五剛中而正當有君德而永貞元者善之長大人體此以仁覆天下永乆也貞正也體仁在上乆正而不變唯九五不動而應二乃具此三者如是則无偏无黨其悔乃亡􅀂五以萃二爲光失是道矣故曰元永貞悔亡橫渠曰居得盛位不能見大人之德係應於二故曰有位一本作未光大也无志字上六齎咨涕洟无咎象曰齎咨涕洟未安上也上六以柔乗剛處上獨立當萃之極六三柔不正不足以爲援齎持也咨歎息也艮爲手上三相持歎息憂其所冝憂也上之三成巽巽爲多白眼艮爲􅈹兊澤下流在目曰涕在􅈹曰洟出涕洟也然乗剛必危處上獨立則无助萃之極以柔居之則不堪兼是數者其可乆安上位乎亦必至於求萃而之三動而憂則元咎故曰齎咨涕洟未安上也􅯨巽下坤上升元亨用見大人勿恤南征吉􅂏曰柔以時升巽而順剛中而應是以大亨用見大人勿恤有慶也南征吉志行也升者萃之反柔在下者也以時而升乎上上巽乎下者坤可升之時也故曰柔以時升此以坤體在上言升之時也卑巽在下而順乎理剛中自守而應乎上其升以時不爲冨貴利逹動其心則得位而大亨矣故曰巽而順剛中而應是以大亨此合兩體以二五相易明升之才也大人者九二之五也二之五成離離目爲見二升於五剛中正得位以此見大人其升必矣故曰用見大人恤憂也九二失位爲憂之五得位雖有坎險勿恤也所謂恤者二陽欲升隂道凝盛未可遽進以人事言之小人猶在上也然九二六五應也巽下順上升之時也雖坤隂在上何憂乎不遂遂徃而升有慶及物矣陽爲慶也夫日之初升隂固未退及其清風戒旦則群隂解駮盡矣夫何憂哉故曰勿恤有慶也大則虞舜升聞在上小則文子同升諸公與學以聚之自下而上逹而升之道皆趨乎明也離南方也征以正而行正則吉二之五之謂也二動於中以正而行以見大人徃而有慶則其志上行故曰南征吉志行也此復以九二之五勉其升也在卦氣爲小寒故太玄凖之以上干象曰地中生木升君子以順德積小以髙大木根於地中乃升而上者順也君子以順爲德不棄小善積卑成髙積小成大其德日躋亦以根於心者順也否則无本安能積之以成髙大乎楊子雲所謂木漸是也易傳曰萬物長進皆以順道初六􅁢升大吉象曰􅁢升大吉上合志也􅁢施氏易作􅣡進也四坤爲衆爲順二三四兊爲口衆口順之允也初六巽之主以一柔承二剛能巽者也在升時九二九三俱升六四當位合衆之欲志在於初而初未應六四順而正初動則正從九三九三進而升於四與上合志􅁢升也是以大吉荀爽曰一體相從􅁢然俱升九二孚乃利用禴无咎象曰九二之孚有喜也升萃之反也升之九二即萃之九五故升萃二爻反復同象明二五之孚也凡人從上或出於勢位則雖恭巽未免有咎况望行道乎誠不足也二剛上應五柔納之剛柔相與而孚其爲巽也盡誠敬而巳非外飾也是以道行於上澤被於下此九二所以喜歟喜發於中心形於面目者也陽得位爲喜故曰九二之孚有喜也禴夏祭五納二成離離爲夏震爲聲爲長子上爲宗廟艮爲門闕二升五有長子升自門闕奉祭之象禴薄祭以聲爲主用誠敬也二五相孚乃利用誠敬无咎乃難辭九三升虚邑象曰升虚邑无所疑也九三升上六六坤之三坤在下爲邑隂爲虚升虚邑也九三上六相應以正下巽而上順如升无人之邑孰禦哉巽爲不果三升上巽毀无所疑也六四王用亨于􅄮山吉无咎象曰王用亨于􅄮山順亊也六四柔順謙恭而正上順六五柔暗之君下順九三剛正之賢升之於五以事其君亦恭也巳則不出乎諸侯之位者正也三者皆順事也文王可謂至德也巳故能用此以亨于􅄮山三升五乾爲王兊爲西方艮爲山四以諸侯居于西山之下􅄮山也正則吉且无咎坤爲順巽爲事三分天下有其二以服事商順事也毛公言文王率諸侯以朝聘于紂則升九三可知崔憬謂此大王避狄徙􅄮之爻誤矣六五貞吉升階象曰貞吉外階大得志也六五虚中降位而接九二九二階之以升則五正而吉不正則信賢不篤用賢不終其能吉乎五正而吉者以二升階也五正二升君臣道行由是而致治故五大得志也坤土自上際下巽爲髙升階之象上六􅁳升利于不息之貞象曰􅁳升在上消不冨也坤爲􅁳晦隂虚爲不冨上六利巳極矣猶升而不息不知升極當降長極當消消則不冨矣豈復更有増益之理四時之進退萬物之盛衰皆然上六不知􅁳於升也不息之貞者仁義忠信樂善不倦是也唯施於此爲利􅀂施于公卿大夫可巳而不巳不利易傳曰以小人貪求无巳之心移之於進德則何利如之􅮨坎下兊上困亨貞大人吉有言不信􅂏曰困剛揜也險以􅀃困而不失其所亨其唯君子乎貞大人吉以剛中也有言不信尚口乃窮也四五之剛爲三上所揜二剛爲初三所揜又䧟焉䧟亦揜也陽剛君子隂柔小人陽剛爲隂柔揜蔽而不伸君子窮困窒塞之時故曰困剛揜也此以一卦之爻言困也困自否來二之上坎險兊􅀃也上九之二處乎險難之中樂天安義困而自􅀃不失其所亨者心亨也亨通也困而亨則不窮矣古人塵視冨貴夢視生死唯不失其所亨也唯君子能之夫子曰人不知而不愠不亦君子乎故曰險以􅀃困而不失其所亨其唯君子乎此合二體兼九二言處困之才也大人君子通稱對而言之君子通乎大賢小賢而大人德配天地者也在困處之􅁉然不失其正吉且无咎非大人不能以剛中也剛或不足則困以智免而失其正者有之剛而不中則正或致凶於道皆有咎剛中而正文王周公孔子是巳故曰貞大人吉以剛中也此以九五言大人處困之才也剛見揜者天也非人之所能爲无怨尤可也巳困而言人誰信之􅀂崇尚口才以言􅀃處困適所以増窮矣上六窮困兊爲口有言也下无應有言不信也此聖人因上六以戒不善處困者也范諤昌曰􅂏文貞大人吉下脫无咎二字理或然也在卦氣爲霜降故太玄凖之以窮象曰澤无水困君子以致命遂志澤所以􅀃萬物者水也澤无水則澤道困矣然水在澤下未甞不通也君子處困窒之時澤不及物矣推致其所以然者命也巽爲命命者消息􅄹虚之理君子聽命固窮自遂其剛大之志夫居下而无憂者則思不逺處身而常逸者則志不廣君子憤激自厲増益其所不能无􅀂困之爲速也易傳曰雖阨窮而不動其心行吾義而巳所以遂其爲善之志也初六臀困于株木入于幽谷三歳不覿象曰入于幽谷幽不明也四否艮在上體之下爲臀巽木兊金傷之爲株木困寒露節也與大過枯楊同象大過小雪之氣也四陽居隂不安其居臀困于株木者也初六柔而不正困于坎底妄動求濟於四不知四剛不中不安其居臀困于株木豈能濟人之困哉初旣失援迷謬自四反二二又深䧟猶入于幽谷也艮爲山坎爲水水注山谿間爲谷坤爲􅁳晦入于幽谷也入于幽谷窮困益甚无自出之􅀔故三歳不覿於四乾爲歳初覿四歷三爻三歳也私見曰覿見之不正也三離目不正覿也初出不知四之困入不知谷之幽晦而不明乎處困之道也初在坎下不明之象何謂處困之道安靜自守是巳九二困于酒食朱紱方來利用享祀征凶无咎象曰困于酒食中有慶也五動成震爲稼二坎水徃之爲酒兊爲口食也五不動二未可徃困于酒食也酒食者人之所欲以施惠也朱紱亦謂九五也巽爲股膝以上也乾爲大赤坤爲黄赤黄爲朱乾爲衣蔽乎􅂰上朱紱也九二剛中雖困于酒食而无所動其心則九五中正同德之君方來而相求共濟天下之困故曰朱紱方來九五來然後誠意通于上下故利用享祀上六宗廟五動二徃震爲長子艮爲門闕有升自門闕長子奉宗廟之象享獻也祀者祭上下之通稱兼下言也􅀂二動求五雖以正行亦凶凶自取之无所咎也故曰征凶无咎困于酒食者唯无所動其心則中中則進退遲速審而後動徃有慶矣慶者朱紱方來得其所欲之謂也陽爲慶征凶戒之也有慶勉之也易傳曰諸卦二五以隂陽相應而吉惟小畜與困乃厄於隂故同道相求小畜陽爲隂所畜困陽爲隂所揜也隂陽相應者自然相應也如夫婦骨肉分定也五與二皆陽爻以剛中之德同而相應求而後合如君臣朋友義合也六三困于石據于蒺蔾入于其宫不見其妻凶象曰據于蒺蔾乗剛也入于其宫不見其妻不祥也六三險而不正不善處困者也艮坎爲石謂三石之堅不可以處者也巽交坎離爲蒺蔾中堅外銳蒺蔾之象謂乗三也蒺蔾傷人不可以據者也三非其位非所困而困不度德也乗三之剛非所據而據不量力也不度德故名辱不量力故身危名辱身危死期將至故入于其宮不見其妻艮坤爲宫坎爲夫離爲妻爲目爲見三困非其位而乗二剛淩人者也凌人者人亦凌之故二徃乗三兩爻相易三入于其宫坎離象毀不見其妻矣又曰凶者不見其妻乃死亡將至之期所謂亡之兆非吉祥之兆坤爲死故曰不祥也九四來徐徐困于金車吝有終象曰來徐徐志在下也雖不當位有與也九四尚柔九二剛得中柔不足以濟困剛得中乃可濟初六近比九二逺於九四四與初應而九二礙之旣疑其險矣又疑初捨巳而從二故來徐徐徐徐者疑懼之辭巽爲不果故志在下也乾變爲金坤爲輿坎爲輪二剛而能載故曰困于金車四履不當位欲去則志初欲行則懼二處困有應而不能相濟吝道也然以陽居隂能􅀃而巽明於處困不與二争雖不當位終有與之者以困之時上下急於相求故也是以吝而有終九五劓刖困于赤紱乃徐有􅀃利用祭祀象曰劓刖志未得也乃徐有􅀃以中直也利用祭祀受福也九四君側強臣之象二五同德相求而四間之四動艮爲􅈹震爲足四不動兊金刑之劓刖也劓則醜刖則不行五爲四傷亨困之志未得行於二也故曰劓刖志未得也二坎爲赤乾爲衣徃應五巽蔽􅂰之象赤紱諸臣之紱也二躊躇不徃以征爲凶五以无助而困困于赤紱也巽爲不果徐也兊爲􅀃九五剛中而正動以直行中則思慮精審直則其行不撓如是則君臣相􅀃之志乆而必亨九四豈能間之始也不果今則來􅀃故曰乃徐有􅀃以中直也上六宗廟五王假有廟祭祀者人君所以徧及百神自上格下二五相易之象人君得九二之賢利用誠意感格之如祭祀然上下並受其福矣亨困之道莫利於用此尚何困於赤紱哉艮爲手下援九二受福也陽爲福故曰利用祭祀受福也上六困于􅁑藟于臲甈曰動悔有悔征吉象曰困于􅁑藟未當也動悔有悔吉行也上六困極而當動者也巽爲草􅁑藟藤蔓葉艾白子赤六三乾巽之象上六困極求助六三柔而不正以巽乎上爲􅀃不能相濟又纒繞之故困于􅁑藟言求六三爲未當也上六動則安其位不動則困于六三困于􅁑藟又困于臲甈之地也曰發聲兊口象上六自謀曰動則失正失正則悔故安於困然不動乃有悔不知征則吉征以正行也以正而行吉且无悔矣是行而後吉也故曰吉行也范睢困於鄭安平虞卿困于魏齊猶能解相印以全其軀況体易君子乎􅭱巽下坎上井改邑不改井无喪无得徃來井井汔至亦未繘井羸其瓶凶􅂏曰巽乎水而上水井井養而不窮也改邑不改井乃以剛中也汔至亦未繘井未有功也羸其瓶是以凶也此卦􅂏文脫錯當曰巽乎水而上水井改邑不改井乃以剛中也无喪无得徃來井井井養而不窮也汔至亦未繘井未有功也羸其瓶是以凶也巽木也入也木入于水舉水而上之井也故曰巽乎水而上水曰井此合二卦言井也泰之􅀄五成井古者八家爲井四井爲邑邑改而井不改井德之不遷也坤在内爲邑坎爲水水者所以爲井也易其中畫非坎也而坤則可易矣坎之中畫其剛中乎乃難辭也君子窮居不損大行不加窮亦樂通亦樂非剛中不變能之乎故曰改邑不改井乃以剛中也初徃之五汲之象􅀂有喪而實无所喪以其不失位不曰取之而不竭乎五來之初不汲之象􅀂有得而實无所得以其失位不曰存之而不􅄹乎言井之體一也徃者上也來者下也徃亦井來亦井上下无常其用通矣所以爲井者一也體用一也定而應應而常定井之養物所以无窮欤故曰无喪无得徃來井井井養而不窮也此以九五升降言井之德也汔幾也自二至四体兊兊爲澤􅀄本泰震震動也來動于澤之下泉之象荀爽曰隂來在下亦爲井是也巽爲繩在井中繘也繘汲繩也二幾及􅀄反巽而上有垂繘而汲幾及井泉之象焉亦有旣汲而反未能引繘以出乎井之象兩者雖有濟物之用皆未及乎物也何由有功故曰汔至亦未繘井未有功也坤爲腹兊爲口井中之器有腹有口瓶也在井之口水實其中汲水而上之象也自四至􅀄成反兊兊爲口爲毀折巽繩反上而毀折之汲水至于井口羸掛其瓶瓶口在下覆其瓶也井之用喪矣凶言􅀄二不正不正則凶故曰羸其瓶是以凶也汔至亦未繘井者半途而廢也羸其瓶凶不善其終也君子免是二者其唯剛中乎此以玄体言井之戒也在卦爲芒種故太玄凖之以法范諤昌曰巽乎水當作巽乎木一本曰井羸其瓶凶或曰反巽兊也何以猶有繩之象曰象有相因而成者震陽動於下爲大途艮陽止於上爲徑路離外實内虚爲目巽實者反在上爲多白眼相因也故臨之兊爲觀之盥損之兊爲益之􅀃大過巽與兊同爲棟橈巽爲繩反復成巽者或爲維繫紏固之象其在井爲反繘而上之象象之相因其生无窮也象曰木上有水井君子以勞民勸相坎爲水勞卦也水在地中自下而升逹于木上可謂勞矣其於水也有出之道故曰井坤爲民泰震爲左兊爲右相之兊爲口勸之也君子施澤於民旣以言勸其不能又以道相其不足雖勞而不憚不如是井道不足以及民矣雅鴻鴈勞來還定安集之詩其辭曰知我者謂我劬勞又曰雖則劬勞其究安宅勞民勸相者固自勞也􅀄六井泥不食舊井无禽象曰井泥不食下也舊井无禽時舎也井泰􅀄之五􅀄在井下坤土汨之泥也兊口在上不食也言􅀄六之柔自處卑穢无髙人之行故曰井泥不食下也乾之初九徃而爲坎水去泥存舊井也離爲飛鳥四不應初无禽也猶舊井之澤巳盡而禽亦无也无禽則人不食可知行爲人惡四徃而不顧時舎之也九二井谷射鮒甕敝漏象曰井谷射鮒无與也井以不遷爲德非有求於人九五不應无與之者二冝剛中自守養德俟時動而求五失所以爲井矣谷注谿者也二動坎水注于艮山之間谷也鮒蛙也兊巽爲魚初井泥又伏震爲足在下魚􅀋生於井泥而滅跗者鮒也坎弓離矢射也動則谷水注下而射鮒言動則其道愈下入于汙濁矣甕汲瓶也􅀃文作罋兊爲口離爲大腹噐在井中有口有腹且大者甕也二動兊毀口壞見腹坎水下流甕敝漏也言動則不能上行以濟物矣嗚呼无與而動動則終莫之與曷􅀂自守哉九三井渫不食爲我心惻可用汲王明並受其福象曰井渫不食行惻也求王明受福也陽爲清㓗九三以陽居陽清㓗也巽爲股爲入股入坎下而水清㓗治井之象渫也兊口在上不食也九三君子修德㓗巳可用而未用猶井渫不食也我者九三自謂上六正應在髙位爲我道不行憂之其心惻然坎爲加憂爲心病故爲我心惻上六有是心矣可用是心以汲引之坎在井上坎爲輪井車汲引之象上汲引之則三往上來其惻然之心見矣失位爲􅁨故也往來行也故曰井渫不食行惻也乾五爲王離爲明三往應上九五成艮手王受福也三上同象亦受福故並受其福王明五也求王明者三也故求王明受福也司馬迁曰王之不明豈足福哉陽爲福求亦艮也上六有憂惻之心不用之以汲引乃士之尊賢也上六就三三往求五乃能盡上下相與之情故夫子增求一字以發其義六四井甃无咎象曰井甃无咎脩井也坎水坤土合而火之甄也有巽工焉自下壘而上至于井口甃也古者甃井爲瓦裏自下逹上六四正位近五下无應近君而无汲引之用守正自脩免咎而已故曰井甃无咎脩井也易傳曰无咎者僅能免咎而巳􅀂陽剛自不如是如是則可咎矣九五井冽寒泉食象曰寒泉之食中正也九五以陽居陽坎又爲陽清㓗之至故爲冽􅀃文云清冽也乾在坎爲寒九五即泰􅀄九甲子爻子坎位井五月卦隂氣自下而上井寒矣故五坎有寒泉之象兊口承之食也九五中正贍給一力物而不費往者食之无偏係也故曰寒泉之食以中正也易傳曰不吉吉者井以上出爲成功未至於上未及用也故至上而後元吉上六井收勿幕有孚元􅁻象曰元吉在上大成也幕于氏本作勿冂亡狄㘦覆也玉篇曰以巾覆物今爲則今易作幕音莫者傳寫誤也當作在古文當作冂坎爲輪在井之上下應巽繩收也虞翻曰收謂以鹿盧收繘也勿者上六又當守正之象上汲三往艮坎成􅂪蒙有覆之意井道大成􅀂專於應三則不正所養狹矣猶井有收而之有發其而得汲者有欲汲之而不得發其者三發其汲之而又者也故於此戒之勿則上下有孚而得元􅁻元􅁻在上以井道大成故元吉歸於上也􅪸離下兊上革巳日乃孚元亨利貞悔亡􅂏曰革火水相息二女同居其志不相得曰革巳日乃孚革而信之文明以􅀃大亨以正革而當其悔乃亡天地革而四時成湯武革命順乎天而應乎人革之時大矣哉兊澤離火而􅂏曰水火何也曰坎兊一也澤者水所鍾无水則无澤矣坎上爲雲下爲雨上爲雲者澤之氣也下爲雨則澤一力物也故屯需之坎爲雲小畜之兊亦爲雲坎爲川大畜之兊亦爲川坎爲水革兊亦爲水又兊爲金金者水之母此水所以周流而不窮乎坎陽兊隂隂陽二端其理則一知此始可言象矣故曰曲而中水得火而竭火得水而滅水火相止息則變少女志處乎内而在外中女志適乎外而在内二女同居其志不相得則變之所由生不可不革也故曰革水火相息二女同居其志不相得曰革此以兩體言革也革變也非常之事方革之􅀄人豈能遽信哉傳曰非常之元􅀺民懼焉巳日先儒讀作巳事之巳當讀作戊巳之巳十日至庚而更更革也自庚至巳十日浹矣巳日者浹日也革自遯來无妄變也二變家人三變離四變革无妄之震納庚革之離納巳故有此象二應五三應上孚也湯之伐桀猶曰舎我穡事而割正夏故革即日不孚浹日乃孚乃難辭也故曰巳曰乃孚革而信之此以兊離二五三上言革之難也坤離爲文明兊爲􅀃天下之事至於壞而不振者文乱而不理事暗而不察民怨而上不恤也故萬物否隔人道失正所以當革文明則事理􅀃則民心和故曰文明以􅀃此以兩體言革之道也五上相易各當其位相易亨也各當其位正也文明以􅀃然後大亨而大亨之道利在於正正則不正者正矣故曰元亨利正􅂏曰大亨以正此復以五上言革之道也革而當者六五之上也上五革而各得其正者當也文明以􅀃大亨以正革而當三者具其悔乃亡革之非其道或不當革而革或革之而无甚益其於新舊皆有悔是本欲去悔復入於悔矣秦革封建子弟无立錐之地漢革郡縣而七國叛唐革府兵而兵農分不當故耳故曰革而當其悔乃亡此再以上五言革之戒也乾始於坎而終於離坤始於離而終於坎乾終而坤革之地革天也陽極生隂乃爲寒坤終而乾革之天革地也隂極生陽乃爲暑天地相革寒暑相成是亦水火相息也坎冬離夏震春兊秋四時也故曰天地革而四時成兊革離而成乾巽乾爲天坤爲順巽爲命六二順五順乎天也九五應二應乎人也湯武改物創制革天之命亦順天應人而巳猶寒暑之相代天道變於上民物改於下因其可革而革之故曰湯武革命順乎天而應乎人革之時大矣哉此復以五上升降推廣革之道也在卦氣三月故太玄準之以更象曰澤中有火革君子以治曆明時水火相㑹其氣必革澤中有火革之時也其在地則温泉是巳君子觀澤中有火則知日月坎離有交㑹之道日人也月水也冬至日起牽牛一度右行而周十二次盡斗二十六度則復還牽牛之一度而曆更端矣牽牛者星紀也水之位也日月交㑹于此澤中有火之象也曆更端者革也昔者黃帝迎日推䇿始作調曆閱丗十一曆年五千而更七曆至漢造曆歳在甲子乃十一月冬至甲子朔爲入曆之始是時日月如合壁復㑹于牽牛距上元太初十四萬三千一百二十七歳盖日月􅄹縮與天錯行積乆閠差君子必修治其曆以明四時之正所謂四時之正者冬至日月必㑹于牽牛之一度而絃望晦朔分至啓閉皆得其正矣日月不㑹者司曆之過也震甞問曆於郭忠孝曰古曆起於牽牛一度沈括謂今􅀫於斗六度謂之歳差何也曰乆則必差差乆必復於牽牛牽牛一度者乃上元太初起曆之元也初九鞏用黃牛之革象曰鞏用黃牛不可以有爲也初九革之始在下而九四不應離體務上速於革者也鞏固也坤離爲黃牛初動艮爲皮革日熯之不可動鞏固也黃牛者中順也鞏固用黃牛之革堅肕不動以中順守之可也􅀄動艮又爲手爲指莊子曰指窮於爲初不可動不可有爲也易傳曰革事之大也必有其時有其位有其才審慮慎動而後可以无悔六二已日乃革之征􅁻无咎象曰巳日革之行有嘉也六二得位得時上應九五有可革之才然不可遽爲必俟人情旣浹上下旣信之日乃可革之十日之次自庚至巳浹焉離納巳巳日者浹日也故曰巳日乃革之九五中正二應上行而又其難其慎如此革道之羙无以復加乾爲美六上行則二有嘉美故辭曰征􅁻无咎象曰行有嘉也夫變動貴乎適時趍舎存乎機㑹二當可革濡滯而不行於革道安得无咎征吉无咎者以行有嘉也二巽體不果故勉之易傳曰以六居二柔順得中正又文明之主上有剛陽之君同德相應中正則无偏蔽文明則盡事理應上則得權勢體順則无違悖時可矣位得矣才足矣處革之至善者也九三征凶貞厲革言三就有孚象曰革言三就又何之矣九三剛正而明處下之極革之而當不可復動徃而不巳有凶成則必􅃜以正守之猶厲故曰征凶貞厲然守之者其在懼乎初不可有爲也二巳日乃革之三革之而就稽之於衆其言亦曰三就故曰革言三就三極數也月之􅄹􅃜氣候之變皆以三五三則就矣徃而不巳人必有言兊爲口革言也上六應九三孚也革於此信於彼有孚也民情旣孚革道巳就欲徃何之違民妄作則有凶咎九三離體務上革而遇中聖人戒之故辭曰革言三就有孚象曰又何之矣九四悔亡有孚改命吉􅂏曰改命之吉信忘也九居四冝有悔然當水火相革之際有其時矣其才也以柔濟剛其動也革而當是以悔亡革五爻皆正四動􅀄應則上下靡不信不動有悔故曰有孚動而正近與五相得逺與初相應故抗君之命反君之事解國之大難除國之大害无招權檀事之凶巽爲命四動改命也故曰改命之吉信志也易傳曰四非中正而至善何也曰惟其處柔也故剛而不過近而不逼順承中正之君而上下信其志矣九五大人虎變未占有孚象曰大人虎變其文炳也乾爲大人兊爲虎虎生而具天地之文然未著也旣變則其文炳然易見京房謂虎文踈而著是也六二離變兊爲文明虎變也九五剛徤中正而得尊位大人之革也其舉事无悔其應曲當文理彰著天下曉然知之猶虎變也豈俟於旣革而後孚哉盖未革之先在㝔奥之間簟席之上其文章固巳歛然而具矣不假占決質之􅀑神其下旣孚二五未易而應未占有孚也二離爲􅀛兊乾爲決兊乾變離決􅀛也決謂之占非天下之至誠不言而信能如是乎文王之長夏不以革而虞芮質厥成是巳上六君子豹變小人革面征凶居貞吉象曰君子豹變其文蔚也小人革面順以從上也陸績曰兊之陽爻稱虎隂爻稱豹考之天文尾爲虎火也箕爲豹水也而同位於寅虎豹同象而異爻也離二文之中也故二交五其文炳明離三文巳過故三交上其文蔚茂繁縟蔚文之過也三交上成九君子豹變也乾爲首兊爲􅀃乾首而􅀃見於外面也上交三成六小人革面也向也君子韜光逺害小人自徇其面今也君子豹變其文蔚然小人革面内嚮順從其上革面非謂面從也旋其面目也如是則革道大成坤順也兊口順之從也成則不可復動故三征凶上居貞吉下三爻革弊弊去當守以懼上三爻革命命定當復其常故曰征凶上六革道大成柔戒於不守故曰居貞吉上有伏艮居之象也􅮧巽下离上鼎元吉亨􅂏曰鼎象也以木巽火亨飪也聖人亨以享上帝大亨以養聖賢巽而耳目聦明柔進而上行得中而應乎剛是以元亨以全卦言之􅀄六足也二三四腹也腹而中實受物也六五耳也上九鉉也有鼎之象以二體言之虚者在上其足在下而承之亦鼎之象有是象而又以木巽火木入而火出亨飪之象在他卦雖有木火而无鼎象不爲亨飪矣於此言象則他卦以爻畫爲象者可以􅀋推故曰鼎象也以木巽火亨飪也此以六爻兩體言乎鼎也聖人在上尊之則亨以享上帝大之則亨以養聖賢天帝一也以其宰制萬物而爲之主則謂之帝聖人者賢人之極得天之道而能盡天之聦明者也乾爲天在上爲帝指上九也在下爲聖賢指二三四爻也以享上帝之心推之以養聖賢人有不楽尽其心者乎鼎器也極其用則道也故曰聖人亨以享上帝大亨以養聖賢此復以六爻言鼎之用也觀乾之象則知天帝聖賢一也聖賢之任即天帝之任其任豈不重乎鼎自遯三變而成一變訟坎爲耳在下聽卑聦也再變巽離爲目在四三變鼎離目在五其視愈逺明也所以聦明者聖人卑巽下人兼天下之耳以爲聽故其耳聦兼天下之目以爲視故其目明六二之柔進而上行至於五居尊位而得中下應九二之剛柔履尊位則无亢滿之累得中則无過與不及之咎應乎剛則君臣道合萬物皆得其養具此四者是以元亨坤柔之亨始於六二之正元吉亨也故不曰大亨曰巽而耳目聦明柔進而上行得中而應乎剛是以元亨言元亨則吉在其中矣此以卦爻三變言鼎之才也在卦氣爲六月故太玄凖之以竈象曰木上有火鼎君子以正位凝命鄭三月鑄鼎士文伯曰火見鄭其火乎火未出而作火以鑄刑器周三月夏之正月也火以三月昬見於辰上故司爟以季春出火月令季春之月命工師令百工而金䥫在焉則古者鑄鼎以火出而作火矣辰東方木也火在木上其鑄鼎之時乎兊乾爲金而又火在木上亦鑄鼎之象也鼎有趾腹耳鉉其位不可易故正位尊卑上下用之各有數故凝命離南面正位也巽爲命九三獨正凝命也定命之謂凝木火鑄金巽風入之有凝之象正位凝命所以趍鼎之時􅀄六鼎顚趾利出否得妾以其子无咎象曰鼎顚趾未悖也利出否以從貴也􅀄六在下體之下動而應足趾也乾爲首四來下􅀄首在下顚也􅀄往四成震爲足顚趾也否者不善􅀄不正否之象􅀄四得正未悖也古者鼎足空㓗鼎者顚趾出否則能致新雖曰顚倒於鼎之用未爲悖亂也乾爲君兊爲妾震爲子妾不以正合以其有子故无咎无咎者正也妾奔女在女體之不善者穢也利出否者出穢納新以賤從貴而後得子也公羊謂妾以子貴非也嫡妾之分豈可亂哉以君臣言之以貴下人卑有時而踰尊矣得賤臣者苟利於宗廟社稷則或出於屠販奴􅊢夷裔俘虜不問其素可也九二鼎有實我仇有疾不我能即吉象曰鼎有實愼所之也我仇有疾終无􅀹也陽爲實九二剛實得中其可爲鼎用二之五鼎有實也怨耦曰仇子夏曰仇謂四也九二九四匹敵也九二據􅀄九四比五二四失其應故相與爲仇四近君與我爲仇二之五其可不慎所之乎二動成艮艮止也欲動而止慎之象九居四陽失位仇有疾也我仇有疾不能之􅀄則不能即我二之五鼎得實而吉不喪其實終无􅀹也四兊爲口􅀹之者也二往兊毀故終无􅀹也九三鼎耳革其行塞雉膏不食方雨虧悔終吉象曰鼎耳革失其義也三動成離坎坎爲耳鼎耳也三應上九鉉也耳虚受鉉則舉鼎而行九三當剛柔相應之時剛正自守以動爲不正且有悔故上來之三而不受是鼎耳距鉉所以行鼎者塞絶而不亨矣離兊革之象鼎耳革失其爲鼎耳之義也其能成亨飪之功乎離爲雉兊澤爲膏雉膏食之美者兊口在上不食也九三自守雖有美而不食五安知其㫖哉夫君子不爲巳甚與其獨善其身曷􅀂兼善天下然剛正自守人必有知者上感而動坎水上兊澤流方雨而其悔虧矣坎變兊兊爲毀虧悔也始不正而正終吉也九四鼎折足覆公餗其形渥凶象曰覆公餗信如何也四近君九處不當位旣不堪其任矣下信􅀄六之小人又无助德與智力皆不足安能謀大事任重􅀉哉故動則順敗覆其所有矣四動之􅀄成震兊震爲足兊折之鼎折足也餗鼎實也李鼎祚曰雉之屬虞仲翔曰八珍之貝鼎祚指五離言雉雉八珍之一也三公位􅀄之四乾首在下三見離毀覆公餗也其形渥凶鄭康成虞仲翔本作其形剭凶王㳂曰古之大刑有剭誅之法周官掌戮凢爵者殺之于甸師氏子夏傳作握盖傳之乆字誤而音存也王輔嗣作其形渥易傳從輔嗣旣曰其刑剭則凶可知矣如離之九四焚如死如棄如不言凶也離爲目震動也乾首在下俯也目動首俯羞赧之象兊爲澤兊乾爲面巽爲股澤流􅀍面霑濡其體其形渥也如是者必害于家凶于國豈唯戮辱之凶哉四不智信任小人禍至於覆公餗信任如何也如何兊口發聲與大畜何天之衢亨同象六五鼎黃耳金鉉利貞象曰鼎黃耳中以爲實也離坤爲黃黃者坤之中言有中德也伏坎爲耳耳虚而納者也二自遯九五變乾爲金金剛德也二應五舉鼎耳而行爲金鉉故曰鼎黃耳金鉉五之二巽變艮艮手爲也六五有中德虚中而納九二九二剛中而實舉五而行以中爲鼎之實也鼎之行在耳剛中爲耳之實則剛柔得中而鼎道行矣故曰鼎黃耳中以爲實也中以爲實釋金鉉也五雖虚納二應之不以正失耳之實君臣相合不正其可乎故利貞九二之五正也言中以爲實則正在其中矣上九鼎玉鉉大吉无不利象曰玉鉉在上剛柔節也上九遯乾之不變者也故爲玉三動坎爲耳上來應三舉鼎耳而上行玉鉉也盖上九不變則九三之剛正應之其道上行矣故曰鼎玉鉉上九之三坎變成兊水澤節也九居三而正大者吉也言上九爲三而屈則大者吉小者无往不利上下之道行矣故曰大吉无不利鼎道旣成九三復位玉鉉在上而處成功夫上九動而下三知柔也靜而在上知剛也動靜適宜剛柔有節是以動則吉无不利斯所以能保其成功歟􅮦震下震上震亨震來􅊒􅊒笑言啞啞震驚百里不喪匕鬯􅂏曰震亨震來􅊒􅊒恐致福也笑言啞啞後有則也震驚百里驚逺而懼邇也出可以守宗廟社稷以爲祭主也自臨來二之四也震動於積隂之下奮擊而出亨也天威震動畏而恐懼乃所以致亨故曰震亨此以重震言亨也震來者九四來也􅊒許愼曰蠅虎也易傳曰蠅虎謂之􅊒者周旋顧慮不自寜也四動於坎中動而止止而復動離目内顧未甞寜息􅊒之象震動之來恐懼如此􅀄九守正所以致福福者陽之􅀋謂九四來也故曰震來􅊒􅊒恐致福也此以震四之􅀄言震亨也四來之三成離離目動笑也之二成兊兊口動言也自二之三笑且言矣之四聲逹于外啞啞也惟震動恐懼必有笑言啞啞理之所不能違也故曰笑言啞啞後有則也此再以九四往來言震亨也傳曰千里不同風百里不共雷雷震於百里之逺冝􅀂不聞而猶恐懼於邇者驚於逺懼於邇所謂恐懼於其所不聞也自􅀄至四乾坤之䇿百有二十百里舉大數也驚逺四也懼邇􅀄也故曰震驚百里驚逺而懼邇也此以􅀄二三四言震也坤爲肉坎爲􅁄艮爲手以􅁄載肉而升之者匕也坎震爲酒離爲黃酒黃鬱鬯也驚逺懼邇乃能不喪匕鬯則出可以守宗廟社稷以爲祭主故曰不喪匕鬯徐氏謂􅂏文脫不喪匕鬯一句是也六宗廟也艮爲門闕坤土在上爲社震爲榖稷者百榖之長宗廟社稷之象古者諸侯出而朝覲㑹同丗子監國以奉宗廟社稷之粢盛匕牲體酌鬱鬯二者皆親之長子主器也不喪匕鬯則不失職矣四者諸侯位長子居之􅁥國之象艮爲手不喪匕鬯也臨二之四出也橫渠曰此卦純以君出子在爲言則震之體全而用顯故曰出可以守宗廟社稷不雜君父共國時也在卦氣爲春分故太玄準之以釋象曰洊雷震君子以恐懼脩省上下皆震洊雷也震動爲恐懼坎爲加憂亦恐懼也􅀄九正震爲行得一善而行之之象故曰脩九四不正有過而思改之象故曰省􅀄九震來􅊒􅊒笑言啞啞吉象曰震來􅊒􅊒恐致福也笑言啞啞後有則也􅀄九先畫之爻九四後也於爻言後笑言啞啞與卦辭互發之六二震來厲億喪貝躋于九陵勿逐七日得象曰震來厲乗剛也九四震自上來而下乗􅀄九之剛此六二所以危厲不安二動成兊離兊爲口億也億虞氏本作噫於其反虞翻曰惜也兊離爲蠃蠃貝也貝貨貝也古者貨貝而寳􅀛貝者二之所利九四艮山在大塗之下陵也九陽之極數七之變太玄曰九也者禍之窮也二惜其所利避􅀄之五震足升于四之上躋于九陵逐利而往然離毀貝喪復乗四剛其禍愈矣何所避哉震爲作足之馬􅀄之四四亦爲馬逐之象也六二不逐所喪中正自守則所喪不逐而自得矣自二數至上又自􅀄數至二其數七二復成兊離得貝之象離爲日勿逐七日得也易傳曰守其中正而不自失過則復其常矣六三震􅂫􅂫震行无眚象曰震􅂫􅂫位不當也六三在坎䧟中處不當位震懼自失故震􅂫􅂫震爲反生三震之極震極反生􅂫也春秋外傳殺秦諜三日􅂫君太玄謂震于利顚仆死則不復􅂫矣易傳曰􅂫􅂫神氣緩散自失之狀處不當位震懼自失而不知動其禍自取也故曰眚􅀂因震懼而行出險就正何眚之有易傳曰三行至四正也九四震遂泥象曰震遂泥未光也坎水坤土泥也震足䧟於泥中滯泥也陽有可震之剛動則有光而四自二進遂行而不反四失位䧟於泥中處則莫能守動則莫能奮震道未光也知其不可遂反而處三震懼得正俟時而動則光矣坎離正光也二三兩爻相易取義夫􅀄九九四均震也六二喪貝六五无喪當位不當位之異也荀本作隧或云遂隧古通用六五震往來厲億无喪有事象曰震往來厲危行也其事在中大无喪也五往而上則柔不可居動之極來而下則乗剛往來皆危行也億虞氏作噫五動成兊巽兊口噫也惜之辭巽爲事五之所有事在中而巳五剛大乃能无喪有事柔則危剛大守中雖甚危之時可以致亨五无喪有事則二往助之矣易傳曰諸卦雖不當位多以中爲美三四雖當位或以不中爲過盖中則不違於正正不必中也天下之理莫善於中於二五見之矣上六震索索視矍矍征凶震不于其躬于其鄰无咎㛰媾有言象曰震索索中未得也雖凶无咎畏鄰戒也上六過中處震之極窮而氣索將下交於三三亦過中而窮莫助之者是以恐懼失守窮之又窮故曰震索索中未得也使得中自持不至於窮索矣懼而動成離離爲目動而不正則否或動或否目不安定視矍矍也視矍矍者以震索索也恐懼如此當守其正征則凶征者以正行亦動也坤爲身四折之爲躬鄰謂五五有乗剛之危所以无喪者得中也上六未甞乗剛而畏之苟知鄰之无喪者在於得中能自戒懼不動則雖處凶地而无咎矣无咎者得正也五震而動兊爲口戒也上六六五隂也九四陽也六九相配有㛰媾之義上六不得乎三或來交四則五必有言四五相比上安得而配之上旣不可以交三又不可以交四以此見上六終不可動故曰征凶橫渠曰五旣附四已乃與焉則招悔而有言矣能以鄰爲戒則无咎易傳曰聖人於震終示人知懼能政之義爲􅂆深矣􅪍艮下艮上艮其背不獲其身行其庭不見其人无咎􅂏曰艮止也時止則止時行則行動靜不失其時其道光明艮其止止其所也上下敵應不相與也是以不獲其身行其庭不見其人无咎也以三畫卦言之陽止於二隂之上止也以重卦言之上下内外各得其止故曰艮止也止非一定之止也行止相爲用所以明道也猶寒暑之成歳晝夜之成日時焉而巳矣艮者震之反艮止也靜也震動也行也艮直坤之􅀄六可止之時也震直大壯之九四可行之時也不可止而止猶不可行而行其失道一也是以一動一靜震艮相反而不失其時則其道光明矣坎月在東光明之時也夫子可以在則仕可以止則止又曰无可无不可者此也彼入而不出往而不反者豈知道之大全哉故曰時止則止時行則行其道光明此以震艮反復言乎艮也艮之所以能止者止之於其所也背止之象韓愈曰艮爲背夫動生於欲欲生於見背止於其所不見也上下兩體爻不相應譬則兩人震之􅀄九越五而之上一人背而往也九四去四而之三一人背而來也五四中爻體艮中在門闕之中庭也庭交際之地兩人背行於庭雖往來於交際之地然背行則不與物交无所見也且自顧其後不獲其身矣安能見人乎不獲其身忘我也不見其人志物也所以能各止其止也以人倫言之君止於仁臣止於敬父止於慈子止於孝以至萬物庶事各有所止古人繡紱於裳兩巳相背其艮之象乎故曰艮其止止其所也上下敵應不相與也是以不獲其身行其庭不見其人无咎也上下敵應不相與可止之時故无咎􅀂施之於他卦則有咎矣此以震艮相反推明艮其背也在卦氣爲十月故太玄準之以堅象曰兼山艮君子以思不出其位兩山相兼而峙然各止其所焉位者所處之分君子據正循分亦各止其所而巳周公之忠大舜之孝皆分當然也橫渠曰如素夷狄行乎夷狄素患難行乎患難也二四坤爻在中而正思不出位也夫易言思者皆坤也故太玄以五五土爲思或曰心火也脾土也心乃有思以爲土何也曰心火也有所思則係之於土猶悲主胏怒主肝悲怒有不由於心者乎故曰心居中而治五官􅀄六艮其趾无咎利永貞象曰艮其趾未失正也􅀄在下體之下動而應足者趾也四震爲足艮其趾者止其動之􅀄也六居􅀄不正冝有咎事止之於􅀄其止早矣未失正也可動而動則正矣利永貞者非永止也動而正也正則行止一也不能止則亦不能行矣􅀄四相易成巽巽爲長永貞也􅀄六隂柔患不能乆故戒之以利永貞六二艮其腓不拯其隨其心不快象曰不拯其隨未退聽也二動成巽巽爲股二艮之柔膚也膚在下應股腓也腓膊膓也二不能動三剛而失中止之於上不獲往應於五艮其腓也九三止矣六二亦隨而止則所謂其隨者隨九三也三震二動成兊澤雷之象故曰隨拯一作抍音承馬融曰舉也三震起也三􅀂之五成艮爲手有舉之象二未能使三退處於二而聽從於巳不能上行一舉手以濟五之柔不抍其隨也其隨猶言其事當隨也三坎爲耳退處於二退聽也易傳曰退聽下從也故曰未退聽也二又不能自動應五故其心不快二動成兊兊爲決其心快也二不能動坎爲心病不快也六二止於下制於九三之􅆠而拳拳然不忘納忠於君非中正君子孰能如是乎孟子出弔王驩輔行之時乎易傳曰言不聽道不行也故其心不快不得行其志也士之處髙位則有拯无隨在下位則有當拯者有當隨者有拯之不得而後其隨者也九三艮其限列其夤厲薫心象曰艮其限危薫心也薫子夏傳王弼本同孟喜京房馬融王肅作熏馬王曰熏灼其心虞翻本作閽虞曰艮爲閽閽守門人坎盜動門故厲閽心古閽作熏字文曰馬君言熏灼其心未聞易道以坎水熏灼人也荀爽曰以熏爲勲或誤作動盖古本當作動心動心二字傳者誤併作勲字耳再傳者又脫其偏傍作熏而後來者又加草遂成薫字故荀以熏爲勲虞亦曰古閽作熏字今以象考之冝作動心三在上下體之際限也限腰也帶之所限三止之極止而不動艮其限也夤膐也一作䏖馬融曰夾脊肉鄭氏本作􅘡古之人不動其心者善養吾浩然之氣而巳進退綽然有餘􅁉故其心不動九三知止之止而不知无止之止堅強固止與物睽絶无安􅁉之理譬之一身下體欲靜上體動而爭之則上下不相屬列絶其􅘡危厲動其心冝矣坎爲心病故曰厲動心觀此知孟子之不動心非體易者不能也六四艮其身无咎象曰艮其身止諸躬也地爲身三坎折之爲躬四在大臣之位而六五柔中不足於剛徤故不能止天下之當止惟止其身自止於正故无咎􅀂責以天下則安得无咎夫身有大身万物與我同體者是也六四下不能止天下之當止上不能正其君局局然自止其身不亦小哉故天子易身爲躬王弼謂自止其躬不分全體輔嗣其知之歟易傳曰僅能善其身豈足稱大臣之任乎六五艮其輔言有序悔亡象曰艮其輔以中正也三至上體頥五動成巽五應二五成艮二成兊艮在首下動而上止爲輔兊爲口舌言之象五巽而出之與二相應荅艮其輔言有序也六五不正冝有悔施止道於其輔頰言必中正斯可以止天下之動矣是以悔七上九敦艮吉象曰敦艮之吉以厚終也艮爲山篤實也動成坤厚也篤實而厚敦之象上艮之極止極者有不止焉九以剛居上動而必正能厚其終知止於至善之道正故吉非篤實之君子能之乎易傳曰人之止難於乆故節或移於晚守或失於終事變於乆人之所同患也􅫸艮下巽上漸女歸吉利貞􅂏曰漸之進也女歸吉也進得位往有功也進以正可以正􅀖也其位剛得中也止而巽動不窮也漸否一變三之四成卦九四之剛下柔六三之柔上進漸柔之進也故曰漸之進也此以否六三之四言漸也女謂嫁曰歸自内之外也三坤之四成巽女往也四乾之三成艮男下女也艮男下女然後巽女往而進艮陽居三巽隂居四男女各得其正矣大漸之進不一也臣之進於君人之進於事學者之進於道君子之進於德未有犯分躐等而能進者而漸專以女歸爲義者禮義㢘恥之重天下國家之本無􅀂女之歸也故娶妻者非媒則不得非卜筮則不從納采問名納吉納成請期親迎莫不以漸女子之嫁也母醮之房中父命之阼階諸母戒之兩階之閒三月廟見而後成婦亦必以漸如是而歸則正正則吉故曰漸女歸吉利貞􅂏曰女歸吉也言女歸之所以吉者利於貞也此以三四易位各得其正言漸之進也易傳曰在漸體而言中二爻交也橫渠亦曰九三六四易位而居蓋後之傳易者自伊川橫渠二先生漸以卦變言之矣漸之進其德有四進得位往有功也進而正可以正􅀖也其位剛得中也止而巽動不窮也四者隂之位六往居之得位也位者待才用之宅進而不得其位則无所施位過其才則力不勝進而得位往必有功故曰進得位徃有功也四者諸侯之位坤土在上爲􅀖君子之進正己而已己不正未有能正人者其始不正終必不正三以正進四以正交則四爻皆正􅀖國正也猶女得所歸男女旣正家道不期於正而自正故曰進以正可以正􅀖也此兩者以六居四言漸也或曰剛得中謂九五誤也在九五當曰剛中而應如无妄萃是也當曰中正而應如同人是也此謂九三也剛陽德也其位在六爻爲一三五一始進也五進已極三得中也已極則不復進矣太􅀇曰月闕其膞不如開明於西剛得中其進未極漸如是可進矣故曰其位剛得中也此以九三言漸也内艮止也外巽巽也易傳曰人之進也以欲心之動躁而不得其漸則有困窮矣在漸之義内止靜而外巽順其動不窮也故曰止而巽動不窮也動言三四動動而正所以不窮此以兩體二爻言漸也在卦氣爲正月故太􅀇凖之以銳象曰山上有木漸君子以居賢德善俗山上有木止於下漸於上也君子進德以漸善俗亦以漸九五易而可乆賢人之德也居賢德則安之而不動矣居亦止也坤爲民坎險也民險者惡俗之象然二三四正正爲善艮止也君子在上進德以漸安其德而不動則惡俗自善險者漸止矣善俗之道也王肅本作善風俗初六鴻漸于干小子厲有言无咎象曰小子之厲義无咎也初動離爲飛鳥坎爲水之二巽爲進退水鳥而能進退者鴻也二坎水之厓干也三艮爲少男小子也初之二艮變兊兊爲口小子有言也初在下柔而无應自小子見之以爲危厲者也不知在下所以有進之漸君子之柔其動也剛離隱處卑非援乎上也於義无咎夫明夷之初君子于行則主人有言漸之初鴻漸于干則小子厲有言進退之初非深識逺照不能處之而不疑豈常情之能窺測哉故曰君子所爲衆人固不識也六二鴻漸于磐飲食衎衎吉象曰飲食衎衎不素飽也自二至五有巽離坎鴻之象二之五坎變巽爲艮艮坎爲石巽爲髙坤爲平石髙且平磐也磐大石也五之二坎變兊坎爲水飲也兊爲口食也兊爲和􅀃衎衎而樂也二五以中正相應進而安􅁉飲食衎衎而樂詩鹿鳴是也巽爲白離爲大腹二之五巽離毀不素飽也素飽者无功食禄徒飽也君子之進豈飲食而巳哉上則道行于君下則澤加于民不徒飽也九三鴻漸于陸夫征不復婦孕不育凶利禦冦象曰夫征不復離羣醜也婦孕不育失其道也利用禦冦順相保也三至二有坎離巽鴻之象三艮爲山四變三爲坤坤爲平地髙者平矣陸之象鴻離于水漸進于陸三􅀂守正待時而不妄動則得漸之道三四无應隂陽相比而易合守正者戒之橫渠曰漸至九三六四易位而居坎爲夫離爲婦爲大腹征以正行也三不守正而合四夫征不復也夫征不復者以離羣醜也三隂爻爲羣隂爲醜言不正則離乎羣衆而往不能反也四不守正而合三則離毁矣婦孕不育也婦孕不育者不以正合而失其交之道也夫人所以致非道之交者罔不自己求之我无􅂩以乗之彼何自來乎故三不動則四坤不來矣君子自守其正不唯君子无失已之累而小人亦不䧟於非義是以順相保利用禦冦之道坎爲盗離爲戈兵冦也象以三爲君子又以坎爲冦者反以戒三也坤爲順各得其正順相保也六四鴻漸于木或得其桷无咎象曰或得其桷順以巽也六四之柔進而介于二剛之閒猶鴻漸于木也鴻足蹼不能握木漸于木非所安之地四離飛鳥而有坎巽鴻之象巽爲木漸于木也然上承五以巽事之下得三以順接之得所止焉惟順以巽故介于二剛之間得位而无咎猶或得其桷也桷椽之方者巽爲長木艮爲小木離爲麗坤爲方木小而方可麗於長者木之材中乎椽桷者也易傳曰横平之柯也九五鴻漸于陵婦三歳不孕終莫之勝吉象曰終莫之勝吉得所願也二至五有坎離巽鴻之象五巽爲髙二艮爲山二之五自山而進於髙復有山焉陵也大阜曰陵二進于五得尊位也鴻水鳥進至于陵其位髙矣然非所樂君子之樂王天下不與存焉故曰鴻漸于陵巽爲婦離爲大腹乾爲􅀊二五相易三至五歷三爻離毀巽見婦三歳不孕漸之時道未可遽行其功未見於上下之間以三四相比而勝之也二艮爲土三四爲震木勝之五巽爲木三四爲兊金勝之勝之則四比五三比二而君臣離矣然二五相應中正之德同其合乃中心之所願欲豈三四所能閒哉其行有漸功成而復其所則孕矣故終莫之勝吉吉正也上九鴻漸于陸其羽可用爲儀吉象曰其羽可用爲儀吉不可亂也鴻漸于陵巳髙矣又升而至于上窮而不知反則亢是以君子不居焉進九三之賢升之于上已變而退之三艮爲山上動之三成坤艮山變坤爲平地陸也自下進上漸也上反三亦曰漸者進退相爲用无退則无進之漸一進一退其動不窮矣離巽飛􅀋也剛羽翰也柔其毛也九三之上成巽羽剛爻也所貴乎君子者謂其進退不失其時上九進退有序不失其時可用爲儀也三隂爻羣也上九變而正退處而順不亂羣也亦可用爲儀吉􅭰兊下震上歸妹征凶无攸利􅂏曰歸妹天地之大義也天地不交而萬物不興歸妹人之終始也􅀃以動所歸妹也征凶位不當也无攸利柔乗剛也諸卦先釋卦名此􅂏先言天地之大義人之終始者明夫婦之道原於天地聖人倫之本也歸妹自泰來三之四爲震四之三爲兊天地相交而成坎離坎離者天地之用也天地以坎離交隂陽隂陽之義配日月乾天也乾納甲壬坤地也坤納乙癸離日也坎月也故觀月知日觀日月而知天地以一月論之日遲月速東西相望震兊也月至于晦則自東而北乃與日㑹東乙也北癸也消乙入癸㑹于乾壬壬癸北方氣之所歸十有二㑹萬物畢昌而月復見于震兊矣故曰歸妹者天地之大義也天地不交則萬物不興天地交而後有震震者天地之始交萬物興之時也夫坤終乙癸則乾始震庚終者乾終於坤也前者以是終也始者坤終而乾始也後者以是始也夫婦始終之際也父命子而醮之代父之道終之也婿受女於主人人道之始始之也終始相續化生無窮是乃月晦生自震而兊之象故曰夫婦者人之終始也此以三四相易言歸妹之義也九三六四正也三四相易而天地各得其冝義也故曰天地之大義也諸儒以爻位不當謂所歸之妹爲姪娣誤也爻變矣乃有姪娣之象古者男三十而娶女二十而嫁故所歸以妹言之妹少女也男􅀃女以動者以其所歸者妹也􅀃少女者人之情慕少女也乾上交坤坤下交乾震兊相交以􅀃而動與咸同意故曰􅀃以動所歸妹也言歸則兊女在内從震夫之外矣此合兩體而言歸妹之義也婚姻之禮隂陽交際天地之大義也故三四皆不當位退而各復其所乃吉六之四九之三征也征而不已必凶古者昬禮冕而親迎婿御婦車男下女也婿乗其車待於門外女從男也男下女則天地之義明女從男則天地之位定是以位雖不當而无征凶斯道之並行所以不偏廢歟􅀂以􅀃而動所履不正其凶必矣氓是也故曰征凶位不當也六三六五柔也九二九四剛也以柔乗剛則其柔日長剛爲柔所乗則其剛日消夫弱婦強不能正室必至於夫妻反目其道不可以推行矣三不利於内四不利於外故曰无攸利此以中爻言􅀃以動之戒也在卦氣爲霜降故太􅀇凖之以内象曰澤上有雷歸妹君子以永終知敝震雷也爲東方兊澤也爲西方天運八月東方如西方澤上有雷也爲男下女之象二月西方如東方澤中有雷也爲女從男之象始於下女終於從男天地之正未始有敝也故嫁娶者法之然人之於夫婦不能如震兊相從乆而不息者何哉不能正其􅀄也􅀃少而動衰則弃之其能永終乎君子知其然必謹於夫婦之際下之者有義率之者有禮而其初正其初正則其末必正故永終而無弊歸妹初九上六之義也坎離合爲知知敝者其唯九四君子乎初九歸妹以娣跛能履征吉象曰歸妹以娣以􅁪也跛能履吉相承也三兊者震所歸之妹也初在三後无應三以巽下之初九自卑而進􅀃以從之歸妹以娣也三下初成巽初九應震有雷風相與之象􅁪也嫡巽而娣􅀃動故能歸妹以娣如有嫡不以其媵備數豈能以娣哉初九正進之從三又正能􅁪者也故曰歸妹以娣以􅁪也震爲足兊折其左跛也跛者不足以行而從三則有應可行跛能履也跛能履故征吉征以正行也正則吉所以吉者以從三而承四四震夫道也三承四初又從三相與以承内事相承也是以吉九二眇能視利幽人之貞象曰利幽人之貞未變常也九二離爲目兊毀其右眇也眇者不足以明然二有應之五能視也女待男而行六五未下二二以剛中自持處内而不動不足以明也有眇之象初動而二不動在坎中坎爲隱伏二貞於五處内而􅀃爲幽人幽人者女在窈窕幽閑之中五下之則二行復成兊女自􅀂也故利幽人之貞利幽人之貞者五下之而後兊變坤爲常此爻无娣象故以女子守常爲義六三歸妹以須反歸以娣象曰歸妹以須未當也初至五體需需須也須待也初從三得應二與五應三獨无應須也天官書須女四星賤妾之稱織女三星天女也陸震曰天文織女貴須女賤則須爲賤女可知蓋二應五已行矣三往无應而猶須之女之强顔而不見售者也故曰歸妹以須夫女之可貴者爲其正也順也動以理也六三居不當位德不正也柔而上剛行不順也爲􅀃之主以􅀃而歸動非理也上无應无受之者也如是其賤矣故曰未當也易傳曰未當者言其處其德其求歸之理皆未當故无取之反歸以娣何也女謂嫁曰歸自内之外也三本泰之四爻三无所適反歸於四則得正其應在初初正也娣之位也諸娣從婦同行者也故應初乃有以娣之意魯春姜之女三往三逐春姜召其女留之三年乃復嫁之卒知爲人婦之道春姜知反歸以娣之義也六三旣曰所歸之妹又曰須何也自變卦言泰四之三成兊兊者震所歸之妹也自爻位言之二往歸五矣三无所歸須也故曰曲而當九四歸妹愆期遲歸有時象曰愆期之志有待而行也離爲中女九四居上體女貴髙之象九剛明而守柔靜女之賢者也六五歸妹九二徃從之而九四不行成兊兊正秋是以愆期女歸以仲春爲期秋不行愆期也四本泰之九三六四以坎男下之而後三之四成震女以外歸震仲春也遲歸以時也觀九四待坎男下之得仲春而後行則愆期之志有待而行也六五帝乙歸妹其君之􅃑不如其娣之􅃑良月幾望吉象曰帝乙歸妹不如其娣之􅃑良也其位在中以貴行也女以外爲歸五君位九二兊女歸五乾天爲帝兊少女自長男觀之爲妹帝乙歸妹也歸妹自泰變故六五同象子夏曰湯之嫁妹也五坤居君位嫡夫人小君位也􅃑衣裒于飾也所以爲禮容二乾爲衣離爲文章二之五離毀變坎或兊坎爲水兊有㐲艮爲手小君之􅃑无文而加澣濯之象初九娣之位乾兊伏艮爲衣􅃑而初九不動君之􅃑不如其娣之􅃑艮也爲小君如是善矣艮至善也乾美爲艮貴女之歸惟以謙降從禮爲尊髙之德不以容飾爲􅀃故曰帝乙歸妹不如其娣之􅃑艮也九二下也何以爲帝女之象以其所歸之位在五而二以貴行也五位在中二亦中也貴者陽也古者王􅁎嫁於諸侯車服不繫其天下王后一等以貴行也不謙降從禮則亢而失中不稱其位矣譬之天道月幾望矣其可􅄹乎坎月在震東離日在兊西日月相望隂之􅄹也二之五坎離象毀月幾望也月幾望而不􅄹則不亢其夫故吉不然凶之道也夫消長之理陽消則隂生故日下而月西見隂盛則敵陽故旣望則月東出婦道已盛聖人於此深慮之後丗猶有以列侯奉事舅姑通問􅄹滿之禍可勝言哉上六女承筐无實士刲羊无血无攸利象曰上六无實承虚筐也震爲竹上六坤動爲方竹器而方筐也六三兊女之上隂虚无實承虚筐也三兊爲羊四坎爲血上動之三坎毀兊見兊爲刑殺士刲羊无血也祭祀之禮主人割牲而主婦佐之房中牲體在爼乃設兩鉶而芼之女承虚筐者以士刲羊无血无以爲筐之實也故史蘇曰士刲羊亦无􅎺也女承筐亦无貺也无血則无以貺女矣何以􅆢祭祀哉震兊夫婦也而曰士女言夫婦之道不成也女不得其所承矣退而歸三三亦失位无攸利也上六女歸而无終者也故其象如此子夏傳曰血謂四士刲羊三而无血是則自子夏以來傳易者以互體言矣周易下經夬傳第五之也王假之者尚大也四海之廣萬物之衆无一物不得其所无一夫不􅀗自盡非小道之所能至故曰王假之尚大也此以九四言乎豐之才也二四失位爲憂離下有伏坎爲加憂離見坎伏勿憂也然明以動勿憂其至於大也進而至於五則得位矣故曰勿憂此以九二之四言乎豐之才也離日震動日當五爲中曰動於下升于東方明動不巳九四進五何憂乎不至于中而无所不照哉日之大明萬物咸覩冝照天下也乾爲天五離應二照天下也太玄曰日正于天何爲也曰君子乗位爲車爲馬車軨馬􅧊可以周天下故利其爲主也冝日中則正于天利其爲主之謂也故曰勿憂冝日中冝照天下也此以九二進而至五言乎豐之才也五復降四坎離象變離成兊日在西日中則􅉴也坎成兊巽兊爲口月闕於巽辛月􅄹則食也四乾陽長於震二坤隂生於離陽長􅄹也息也隂生則􅄹者虚消者息矣有天地然後有人有􅀑神􅀑神徃來於天地之間者也豐大之時所冝憂者不在乎未中而常在乎日之旣中也何則日中俄且􅉴矣月􅄹俄且食矣􅄹者必虚息者必消天地之所不能違者時也而況天地之間聚而爲人散而爲􅀑神乎明動不巳未有能保其大者也保此道者其唯中乎故曰日中則􅉴月􅄹則食天地􅄹虚與時消息而況於人乎況於􅀑神乎此復以坎離升降明豐之戒也在卦氣爲六月故太玄凖之以大廓象曰雷電皆至豐君子以折獄致刑雷電皆至萬物豐大之時豐則生訟故君子法其威明並用以治刑獄電明照也所以折獄雷威怒也所以致刑折獄者以正折其不正􅀄二三正也而二有伏坎爲獄不明則枉者不伸致刑者刑其不正而巳四五不正也兊爲刑殺不威則小人不懼噬嗑其明在上君子在上之事也故爲明罰飭法豐用明在下君子在下之事也故爲折獄致刑初九遇其配主雖旬无咎徃有尚象曰雖旬无咎過旬災也泰九二之四成豐故九四爲豐之主配者隂陽相匹孟氏鄭氏本作妃嘉耦曰妃妃嫓也亦匹配之意初九九四陽也六五隂也初與四不應六五亦无應四雖不應初可因四爲主而配五隂陽相配故九四爲配主遇者不期而㑹四不應初而初九主之不期於㑹而㑹故曰遇其配主旬均也􅀄九九四均也然明動相􅓵致豐之道非明則動无所之非動則明无所用是以均而无咎无咎者初九以正相資也初九遇四徃而相易以致用則􅀄得尚于五而豐之道上行矣尚亦配也與尚于中行之尚同故曰徃有尚也夫初九遇九四所以得尚于五者以正相資而成豐譬之共難則仇怨恊力􅀔使之然􅀂妄動不正過四而有其位明動不相爲用過旬也過旬則失其配主徃而无所尚與坎險相㑹災至矣豐道亡所以災也故曰過旬災也初動有小過象故曰過旬謂之均者六甲周行乗八節其數四百八十而成鈞鈞勻也初九離納巳九四震納庚自巳至庚凢十日十日周而復始故訓勻六二豐其蔀日中見斗徃得疑疾有孚發􅀂吉象曰有孚發􅀂信以發志也震巽爲草二在草中有周匝掩蔽之意故曰蔀陸震曰歷法凢十九年閠分盡爲一章四章凢七十六年爲一蔀五蔀周六甲凢三百八十年而曆象小成豐蔀之名盖寓此意離目爲見豐爲日中五兊伏艮艮離爲天文賁之象也震少陽其䇿七震爲動有星在上動於中而其數七斗之象也二有至明中正之才以豐時遇闇弱不正之君猶當晝而夜至於見斗其昬甚矣坤爲􅁳晦闇之象五旣不能下賢二自徃見反得疑疾自徃者亦取疑之道巽爲不果六五隂失位疾也然二五相應之地有孚之理二積中正不巳盡其誠信以感發其志則五動而應之乃吉易傳曰苟誠意能動雖昬蒙可開也雖柔弱可輔也雖不正可正也古之人事庸君常主而克行其道者巳之誠上逹而君見信之篤耳九三豐其沛日中見沬折其右肱无咎象曰豐其沛不可大事也折其右肱終不可用也沛古本作斾正弼以爲幡幔震爲玄黃兊金斷之斾也幡幔圍蔽於内故豐其斾沬斗後小星微昧之光子夏傳及字林作昧三之上成艮艮離爲天文星在斗之後隨斗而動者昧也三明極而剛正處豐之昧上六闇極矣猶日中當明而反見斗後之星其闇尤甚巽爲事陽爲大伏坎爲可豐尚大也豐其斾往見則不明故退而守正以不可大事故也兊爲右伏艮爲肱兊折之折右肱也上六闇極不可用之以有爲從之必罹其咎故自折其右肱示終不可用則无咎九四豐其蔀日中見斗遯其夷主吉象曰豐其蔀位不當也日中見斗幽不明也遇其夷主吉行也四動成坎離光明也不動成震巽震巽爲草掩蔽周匝蔀也四在蔀中處不當位自蔽其光明故曰豐其蔀兊有伏艮四應離􅀄艮離爲天文震動也其䇿七有星動於上而其數七之象離目爲見四處不常位又不能變􅀂動而交􅀄則幽者明矣坎爲隱伏故也以此處豐猶日中之時而反見斗處幽暗而巳不明故曰幽不明也九四不正其不明自取之異於二三矣夷主者謂􅀄也九四與􅀄九均爲陽而上下不敵四忘其􅀔下夷於􅀄四者􅀄之所主也故曰夷主􅀄正正則吉􅀄九助四而上行以資其明吉行也易傳曰居大臣之位得在下之賢同德相輔其助豈小也哉六五來章有慶譽吉象曰六五之吉有慶也六五屈體來下於四與之共天位九四之明上行之五相錯成離坤離爲文章者文之成也九四上行則􅀄應四二應五三應上六爻並用成豐大之慶五屈巳下賢四志行乎上人自譽之兊爲口譽之者也五得正吉也上六豐其屋蔀其家闚其戸􅞔其无人三歳不覿凶象曰豐其屋天際翔也闚其戸􅞔其无人自藏也自二至上體大壯棟宇之象上六動隂變陽爲大豐其屋言自處髙大也二爲家震巽爲草豐盛周匝以掩蔽之蔀其家言所居不明也自處髙大所居不明以髙亢自絶於人如飛鳥務上翔於天際豈復能降哉上動成離離爲飛鳥乾爲天在外卦之際天際也豐之時九四忘其敵巳下資􅀄九三與上六正應也其能忘乎故三自下徃庶幾發其昏暗知處豐之道九三離目爲見徃闚之坤戸闔而不應􅞔寂乎其无人聲太玄所謂外大抗中无人也三於是退而自藏於坎中乾爲歳三自四歷三爻三歳不覿也豐其屋蔀其家自絶於人也三歳不覿人絶之也上六動不正凶也不直曰凶者有應焉猶兾乎下交也至于三歳不覿人亦厭之而凶至矣闚小見也覿私見也自上六言之謂之窺隂爲小也自九三之上言之謂之覿私見也私不正也􅭯艮下離上旅小亨旅貞吉􅂏曰旅小亨柔得中乎外而順乎剛止而麗乎明是以小亨旅貞吉也旅之時義大矣哉旅否之變也剛當居上柔當居下六居五失其所居而在外旅也然六居五柔得中矣得中則其柔不過得爲旅之中道易傳曰中非一揆旅有旅之中也柔得中則能順乎上下之剛不爲剛所揜而小者亨順乎剛而柔失中旅道窮矣坤順也君子入國問禁㒷之日從新國之法順乎剛也故曰柔得中而順乎剛此以六五言旅小亨也九居三未爲失其所居也然剛自五而反居於下猶爲旅也居三成艮屈其剛而止於下自謙屈之道也雖止乎下矣然九三正止而不失其正上麗乎離之明君子之居是􅀖也事其大夫之賢者友其士之仁者麗乎明也正然後能麗乎明不正人將拒我矣正則吉故曰止而麗乎明此以九三言旅貞吉也旅難處也旅如六五柔得中乎外而順乎剛在我者不失巳矣乃可以小亨旅如九三止而麗乎明在彼者亦不失人矣乃可以貞吉是以旅一也而再言之易傳曰旅困之時非陽剛中正有助於下則不能致大亨如卦之才則可以小亨得旅貞而吉也四方固男子之事居者必有旅也頋處之如何耳夫子歷國應聘甞去父母之􅀖矣去他國矣欲浮于海居九夷矣盖得旅之時義也旅之時不一而義者時措之冝知其時而不知其冝不可也非大人孰能盡之故曰旅之時義大矣哉在卦氣爲四月故太玄凖之以裝象曰山上有火旅君子以明慎用刑而不留獄山上有火明而止止而不處旅也君子之用刑也雖明而止故明而慎於用刑雖止而不處故亦不留獄明者或不慎慎者或留獄失旅之象也離有伏坎爲獄兊爲刑殺艮止慎也􅀄六旅􅃈􅃈斯其所取災象曰旅􅃈􅃈志窮災也鄭曰􅃈􅃈小也艮爲小動而之四復成艮小之又小􅃈􅃈也􅀄六小人之旅卑柔而不中正恃應而求於四者䙝其細巳甚故曰旅􅃈􅃈四巽極而燥火性炎上不能容􅀄艮止也厭止妄動徃而復止人亦厭之志窮也坎險災也志窮遇險斯其所取災也艮爲手有求取之象楚申侯是巳曰斯曰其者􅀄四上下皆艮手取災之象故指兩爻言之六二旅即次懷其資得童僕貞象曰得童僕貞終无􅀹也艮止也二得位止而得位即次舎也離兊爲蠃貨貝資財之象二巽爲入懷其資也童僕一本作僮僕艮爲少男􅀄卑隂賤二在上畜之童僕也􅀄於二得童僕貞也童僕貞則二親信之而不疑旅在下柔而中正即次所遇而安也懷其資得三四五之助也又得童僕貞貞而下承之旅如是多助矣故動而之外終无􅀹之之者五兊爲口􅀹之者也􅀄六不正而曰貞者貞於二也貞於主人二巽東南主人位也歸妹九二利幽人之貞貞於五也童僕貞然後次舎可止資貨可有夫子曰審其所以從之之謂貞也九三旅焚其次喪其童僕貞厲象曰旅焚其次亦以傷矣矣以旅與下其義䘮也艮止也五得位止而得位次舎也巽木離火焚其次也九三在旅而過剛四五之所不與則失其所止有焚其次之象兊爲毀傷也旅失其所止亦可傷也􅀄艮爲童僕九三旣失其所止以旅之故乃巽而與下失尊卑之冝􅀄三易位􅀄失其正喪其童僕貞也所以喪者爲旅之義剛柔皆失中旅如是寡助危矣六居三不正危之道九四旅于處得其資斧我心不快象曰旅于處未得位也得其資斧心未快也二三止而得位爲次舎四巽爲入而未得位行者處而巳入對出言之爲處九四非安處也故曰旅于處離兊爲蠃具資也離爲兵巽木貫之斧也得其資以爲利得其斧以爲断上得乎五下得乎三之助矣九剛明之才而處四履謙能下善處乎旅故得上下之利有資貨焉有器用焉雖不􅀂六二亦曰得其所矣然未得位也上不足以發五之志下不足以致九二之賢雖得資斧未免爲旅人故我心不快兊爲决中爲心四進而上道行于五而二應則快矣孟子曰乆於齊非我志也六五射雉一矢亡終以譽命象曰終以譽命上逮也五在旅卦不取君象君不可旅也離爲雉雉文明之物文明人文也聖人止亂而不以威武者也離爲兵伏坎爲弓伏艮爲手兵加之弓上矢也矢者射雉之器五動弓矢發離坎毀而雉亡一矢亡之也一矢亡雉者五得中道動而心中乎理之象然六五未當位雖有文明之德未可以動上九屈體逮之則令譽升聞而爵命之矣兊口在下與之譽也巽爲命上卦之終由譽而後命之始也未當位終也譽命故曰終以譽命五進上其在賔師之位乾西北賔之位也上九鳥焚其巢旅人先􅀏後號咷喪牛于易凶象曰以旅在上其義焚也喪牛于易終莫之聞也上九離爲飛鳥九動變六成震巽巽爲木震爲竹葦鳥隱其中巢也上九極剛以髙亢居上非旅人之冝巽木離火鳥焚其巢失其所也離目動震有聲􅀏也楽其未焚之前柔順謙下時也兊澤流於目巽號出於口哀於旣焚之後悔其先之時也上與三相應之地上六變而正成坤坤爲牛九三應而上降三二成坎坎爲耳上九髙亢不變坤象隱喪牛也易輕易也火性剽疾上九極剛輕易也故曰喪牛于易九喪柔順三不徃應坎耳伏矣輕易者自塞其耳而聦不明也陸機覉旅處群士之上而不聞牽秀孟􅅼之毀其以髙亢輕易而致禍乎􅪷巽下巽上巽小亨利有攸徃利見大人􅂏曰重巽以申命剛巽乎中正而志行柔皆順乎剛是以小亨利有攸徃利見大人柔在下而承二剛巽也巽爲風風者天之號令命者天之令也故巽爲命内巽者命之始外巽者巽而逹乎外申前之命也重巽之象唯可施之於申命先儒謂上下皆巽不違其令命乃行也􅀂施之於佗則巽已甚矣故曰重巽以申命此以兩體而言巽也巽自遯來訟之變六三之四上下皆巽九二之剛巽乎中也九五之剛巽乎中正也巽乎中正則其剛不過而所施當乎人心是以志行乎上下故曰剛中正而志行此以三四相易而言九二九五之巽也九二之剛巽乎正則􅀄六之柔順之九五之剛巽乎中正則六四之柔順之上下之柔皆順乎剛則物无違者而也二九五之志行故曰柔皆順乎剛此以初六六四言大者巽則小者无不順也柔皆順乎剛雖无違者然順乎中正乃善不然失所從矣六四離目爲見大人者九五剛而巽乎中正者也剛巽乎中正而柔順之則柔者亦得其正而小者亨矣豈非小者之利乎故曰利見大人此以九五言巽之利也小者亨矣故六四利有攸徃利見大人而其道上行故曰是以小亨利有攸徃利見大人徐氏王昭素考王弼注有命乃行也四字當在重巽以申命之下疑象或脫文理􅀂有之在卦氣爲七月故大玄凖之以翕象曰隨風巽君子以申命行事巽爲風風巽而入者也前後相隨而至則歳事行矣故巽又有事之象傳言八風之至各以四十五日而成一歳是也君子申命諄諄者行事也行事莫如巽巽則易入􅀄六進退科武人之貞象曰進退志疑也利武人之貞志治也巽􅀄行事之始也居卑體柔不能自立過於巽者也退則不安進則无應又二剛據之莫知所從巽爲不果故曰進退志疑也六變九巽成乾應兊乾爲徤兊爲決疑志去矣徤決者武人之貞天道尚右故兊爲武人志疑者不先治其志也君子自治其動以正行之以徤決礭乎不可移雖千萬人必徃孰能奪其志哉故曰利武人之貞志治也巽爲工有治之意易傳曰治謂脩立也九二巽在牀下用史巫紛􅀂吉无咎象曰紛􅀂之吉得中也巽􅀄坤變乾也巽爲木坤西南方乾爲人設木於西南之奥而人即安焉者牀也巽股變艮股見手伏蒲伏于牀下之象九二不正卑巽如此冝有咎然九二剛中其動也正卑巽者非爲利也將以誠意感動九五而巳故用史巫紛􅀂吉吉者正也九二之動上之五成震震爲聲五之二成兊兊爲言上九宗廟兊口出聲祝史道人之意以逹于􅀑神之象六降于二巫以􅀑神之意告于人之象史巫皆尚口而巽故也四巽離爲絲二五升降史巫紛􅀂則卑巽之意逹于上下巽在牀下何咎之有此子㳺重服立諸臣之位以感悟文子之道也二五中也九五未應則巽在牀下用史巫紛􅀂乃爲得中九三頻巽吝象曰頻巽之吝志窮也頻水厓與復九三頻復之頻同兊水澤三水澤之際九三重剛不中在下體之上巽極而決躁不能巽者也將遂其剛亢歟則上臨之以巽四以柔相親九二之剛近而不相得將變而爲柔歟則安其所處憚於改過有吝之意然志已窮不得已而巽猶人行至于水之厓欲前得乎故曰頻巽之吝志窮也易傳曰雖欲不巽得乎哉六四悔亡田􅀗三品象曰田􅀗三品有功也四无應乗承皆剛冝有悔四本遯之六二自二之四一變訟二變巽二田也艮爲手柔
