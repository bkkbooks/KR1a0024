seq: 15
front:
  text: 雜卦傳第十一雜卦專以剛柔升降反復取義又揉雜衆卦以暢无
  hash: sha256:a9e7f8078cbf599f1a0956d7a48a98f9f6900b759c22743b4c20a5a38c5bf9f0
body:
  text: 窮之用而歸藏連山三代之易皆在其中百丗之後有聖人作不外是也康節曰乾坤三變坎離不動故太玄準之以玄衝玄錯乾剛坤柔比樂師􅁨臨觀之義或與或求屯見而不失其居蒙雜而著震起也艮止也損益盛衰之始也大畜時也无妄災也萃聚而升不來也謙輕而豫怠也噬嗑食也賁无色也兊見而巽伏也隨无故也蠱則飭也剥爛也復反也􅀳晝也明夷誅也井通而困相遇也咸速也􅁪乆也渙離也節止也解緩也蹇難也睽外也家人内也否泰反其􅀋也大壯則止遯則退也大有衆也同人親也革去故也鼎取新也小過過也中孚信也豐多故也親寡旅也離上而坎下也小畜寡也履不處也需不進也訟不親也大過顚也遘遇也柔遇剛也漸女帰待男行也頥養正也旣濟定也歸妹女之終也未濟男之窮也夬決也剛決柔也君子道長小人道憂也乾坤易之門凢剛皆乾也凢柔皆坤也剛柔相雜乃成諸卦故曰乾剛坤柔比得位而衆比之故樂師犯難而衆從之故憂憂樂以天下也臨之九二在下四隂與之故能以大臨小觀之九五在上四隂求之故能以上觀下或與或求乃成臨觀之義屯自震變四之五雖見於屯也而不失其所居所以大亨歟蒙自坎變五之上隂陽相雜雖雜也而九自著見隂豈能蒙之所以蒙亨歟陽起於坤而出震則靜者動陽止於艮而入坤則動者靜故起莫如震止莫如艮也損以九三爲上由泰而損始衰者也益以九四益􅀄由否而益始盛者也故損益盛衰之始也大畜以四五之柔而畜三陽時也无妄九五六二中正而三四上爻爲无妄之疾災也関子明曰无妄而災者災也有妄而災者其所冝也非災之者也萃二陽萃於上升二陽升於下升者往也升往則不來矣不來者必聚於上也氣之方升誰能遏之故曰萃聚而升不來也謙自上降三豫自􅀄升四謙故降也輕豫故怠而止故曰謙䡖而豫怠也噬嗑除間者也四爲頥中有物故曰噬嗑食也賁自泰來本无色也剛柔交錯然後有文故曰賁无色也隂隨陽升􅀃而見乎外故曰兊見也陽隨隂降巽而伏乎内故曰巽伏也施􅀃之道小者亦伸處巽之時大者亦屈无非天也隨隨時也以是爲正故曰隨无故也蠱壞也二往之五飭蠱之道故曰蠱則飭也剥爛也五隂潰於内也復反也剥上反於下也晋之明進而至於昼明夷之明降而至於誅夷誅也其明熄矣非誅之象乎泰􅀄之五往來不窮故曰井通否上之二陽遇隂而見揜故曰困相遇也或往而通或來而困唯其時也以剛下柔其感必速故曰咸感也剛上柔下可以持乆故曰􅁪乆也渙三陽渙離故曰渙離也節三陽止而不去故曰節止也陽離則三隂散陽止則三隂來陽者隂之表也蹇二往五渉難也故曰蹇難也解五來二復􅁻也故曰解緩也來者爲緩則往者當夙故曰有攸往夙吉􅀜子明曰明乎外者物自聧故曰聧外也明乎内者家自斉故曰家人内也君子泰則小人否小人泰則君子否故曰否泰反其􅀋也四陽並進六五以和易待之可以止而仕也故曰大壯則止四陽偕往二隂在内而执其柄可以退而去也故曰遯則退也同人六二得中得位而同乎人同乎人則人亦親之故曰同人親也大有六五柔得尊位而有其衆有其衆則衆亦歸之故曰大有衆也水火相革革已廢也故曰革去故也以木巽火火方興也故曰鼎取新也功成者退方來者進一去一取天之道也小過二陽在内動而止小者過也故曰小過過也中孚二隂在内伏而􅀃小者信也故曰中孚信也豐泰二之四進退不得其所多故也多故則難處故曰豐多故也旅否三之五失位无應以其旅於外也旅外者不如在内之爲安故曰親寡旅也豊多故也故四五相錯然後有􅂟親寡旅也故五動二應而後有譽離火炎上也故陽爻多凶坎水􅃐下也故隂爻多凶坎離相済者也小畜五陽而畜一隂所畜者寡故曰小畜寡也履一柔而履二剛不處爲善故曰履不處也需險在前三陽需時而不進關子明曰履而不處者其周公乎需而不進者其仲尼乎險在下而陽上行相過者也故曰訟不親也自大過顛也而下簡􅉺錯亂當曰頤養正也大過顛也遘遇也遘當作姤柔遇剛也夬決也剛決柔也君子道長小人道􅁨也漸女歸待男行也歸妹女之終也旣済定也未済男之窮也頤一陽在上而養四隂正也故其卦以下養上爲顛大過一隂在上四陽无所託顛也故其卦􅀄隂承陽无失位之凶隂冝在下也姤以一柔而遇五剛故曰姤遇也柔遇剛也夬以五剛而決一柔故曰夬決也剛決柔也姤小人道長君子道􅁨也故繫于金柅夬君子道長小人道憂也故无號之凶女以外爲歸乾男下而迎三然後坤女行而歸故曰漸歸待男行也歸妹以三易四男行而女從夫婦之正也上六无應守正而終不改之義也故曰歸妹女之終也旣濟虞翻曰六爻得位定也故曰旣濟定也未濟伊川曰三陽失位故曰未濟男之窮也周易雜卦傳第十一
