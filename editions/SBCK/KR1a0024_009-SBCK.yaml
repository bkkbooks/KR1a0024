seq: 9
front:
  text: 其用起於一及其究也上下與天地同流而无
  hash: sha256:b6bb7500b97b937adf6940f0b0acddbd00d21dca65550e0c4ea7eb042b9eb33a
body:
  text: 迹故曰幽賛太玄曰昆侖天地而産􅆱一者何氣之始也叄天者一太極兩儀也兩地者分隂陽剛柔也叄天兩地五也五小衍也天地五十有五之数具而河圗洛書大衍之数實􅀝其中一與五爲六二與五爲七三與五爲八四與五爲九九與一爲十五十者河圗数也五十五者洛書数也五十有五即五十数五十即大衍四十有九数􅀝言数立其中而未動也馬融曰􅀝立也􅆱四十有九揔而爲一三天也分而爲二兩地也掛一者三天也揲之四者兩地也歸竒於扐者兩地而又三天也四者六七八九七者少陽九者老陽八者少隂六者老隂三変成爻十有八変而卦立三変者三天也五変者叄天而又兩地也変而上者三変而兩変而下者兩変而三九八卦之位六十四卦之名皆以隂陽之変定之而不離乎叄伍之神王洙曰發越揮散也隂陽有変故九六七八以立卦剛柔有體故發越揮散以生爻変剛生柔変柔生剛四象迭相爲用生生而不窮故曰生隂陽氣也剛柔者氣聚而有躰也由推行言之謂之道由得於道言之謂之德性者萬物之一源命者剛柔不齊禀於有氣之􅀄者也理者通乎道徳性命而一之者也義者道徳所施之冝也生􅆱起数立卦生爻凢以爲道徳而已聖人繫之以辭和之使不乖順之使不違通天地人而貫之以一理施之各得其冝焉窮易之理則知萬物一源兼躰而不偏滯及其至也通極乎一氣之外所不可変者唯生死壽夭爾故順受􅁻凶之正不回以求福不幸以免禍此作易之本㫖也昔者聖人之作易也將以順性命之理是以立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義兼三才而兩之故易六畫而成卦分隂分陽迭用柔剛故易六位而成章􅀃位畫有六而後有変動也易有太極太虚也隂陽者太虚聚而有氣也柔剛者氣聚而有體也仁義根於太虚見於氣躰而動於知覺者也自萬物一源􅀚之謂之性自禀賦􅀚之謂之命自通天地人􅀚之謂之理三者一也聖人將以順性命之理故分一而爲三曰隂陽曰柔剛曰仁義以立天地人之道盖互見也易兼三才而兩之六畫而成卦成卦則三才合而爲一知隂陽剛柔仁義同源於太虚則知性知天道曰隂陽地道曰柔剛人道曰仁義則知命知仁義即天之隂陽地之柔剛則知性命之理不順乎性命之理而行之將何所逃於天地之間乎然道有変動故分隂分陽迭用柔剛以位分之一三五陽也二四六隂也以卦分之乾震坎艮陽也坤巽離兊隂也以十曰分之甲丙戌庚壬陽也乙丁已辛癸隂也所謂分隂分陽也八卦相盪五行更王上下无常周流六虚所謂迭用柔剛也分隂陽用柔剛者仁義也以人而用天地也誠知乎此則徳勝於氣性命於徳氣之昏明不足以蔽之至於盡性而配天地矣太玄曰立天之經曰隂與陽形地之緯曰從與横表人之行曰晦與明準卦之三才六畫也天地定位山澤通氣雷風相薄水火不相射八卦相錯数往者順知來者逆是故易逆数也天地定位乾上坤下也山澤通氣艮兊以三相易也雷風相薄震巽以􅀄相易也日月不相射坎離以中相易也虞翻曰射厭也坎離水火不相厭坎戊離巳月三十日一㑹於壬故不相厭也伏羲氏之畫卦也乾坤定上下之位坎離列左右之門震與巽爲偶艮與兊相配震離兊乾天之四象也巽坎艮坤地之四象也八卦相錯乾坤相易生六十四卦乾自震而左行坤自巽而右行数往者以順而数知來者以逆而知邵雍曰数往者順順天而行左旋也皆巳生之卦也知來者逆逆天而行右行也皆未生之卦也夫易之数由逆而成矣逆者猶逆四時之比盖聖人將言易故先􅀃易之本易逆数也故六爻自下而起太玄曰􅀯北定位東西通氣萬物錯乎其中準八卦也雷以動之風以散之雨以潤之日以烜之艮以止之兊以􅀃之乾以君之坤以藏之帝出乎震齊乎巽相見乎离致役乎坤􅀃言乎兊􅀾乎乾勞乎坎成言乎艮萬物出乎震震東方也齊乎巽巽東􅀯也齊也者言萬物之絜齊也離也者明也萬物皆相見􅀯方之卦也聖人􅀯靣而聽天下嚮明而治蓋取諸此也坤也者地也萬物皆致養焉故曰致役乎坤兊正秋也萬物之所􅀃也故曰􅀃言乎兊􅀾乎乾乾西北之卦也言隂陽相薄也坎者水也正北方之卦也勞卦也萬物之所歸也故曰勞乎坎艮東北之卦也萬物之所成終而所成始也故曰成言乎艮神也者妙萬物而爲言者也動萬物者莫疾乎雷橈萬物者莫疾乎風燥萬物者莫熯乎火􅀃萬物者莫􅀃乎澤潤萬物者莫潤乎水終萬物始萬物者莫盛乎艮故水火相逮雷風不相悖山澤通氣然後能変化旣成萬物也陽聚而動動極則散之散則復聚隂積而潤潤極則烜之烜則復潤此雷霆風雨日月寒暑所以屈信相感而成萬物也艮則動者静而止入于坤也兊則止者􅀃而行出乎乾也乾以君之則萬物覩坤以藏之則天地閉前􅀃乾坤而至六子无形者聚而有形也此􅀃六子而歸乾坤有形者散而入於无形也終始循環不見首尾易之道也此以下言文王之八卦連山首艮歸藏首坤艮震巽離坤兊乾坎連山之序也而易兼用之此太玄所以作歟玄謂神􅀾于玄龍出于中雷風炫煥與物時行天根還向成氣收精皆準乾坤震巽也鄭康成曰万物出於震雷發声以生之也齊於巽相見於離風揺長以齊之㓗猶新萬物皆相見日照之使光大萬物皆致養焉地氣含養使有秀實萬物之所􅀃草木皆老猶以澤氣􅀃成之􅀾言隂陽相薄西北隂也而乾以純陽臨之猶君臣對合也坎勞卦也水性勞而不倦萬物之所帰也萬物自春出生於地冬氣閉藏還皆入地萬物之所成終而所成始言萬物隂氣終陽氣始皆艮之用事坤不言方坤之養物不專此時也兊不言方而言正秋者臣曰兊言正秋秋分也於兊言秋分則震爲春分坎爲冬至离爲夏至乾爲立冬艮爲立春巽爲立夏坤爲立秋可知言正秋者正時也离言聖人􅀯靣而聽天下嚮明而治則餘卦亦可以􅀋推矣􅀾乎乾言隂陽相薄而乾勝也上􅀃天地定位六子致用此􅀃六子合而爲乾坤乾坤合而生神妙萬物而爲言者物物自妙也鄭康成曰共成萬物物不可得而分故合謂之神張載曰一則神两則化妙萬物者一則神也且動撓燥􅀃潤終始萬物者孰􅀂六子然不能以獨化故必相逮也不相悖也通氣也然後能変化既成萬物合則化化則神康成之學進於是矣乾健也坤順也震動也巽入也坎䧟也離麗也艮止也兊􅀃也上􅀃坎兊合以致用今復以八卦別而言之動䧟止皆徤之屬也入麗記皆順之屬也不離乎乾坤也乾爲馬坤爲牛震爲龍巽爲雞坎爲豕離爲雉艮爲狗兊爲羊􅀃八卦本象也乾爲馬徤也乾変震爲龍純乾爲馬故馬或龍種而馬八尺以上爲龍九則変也房爲天駟爲蒼龍之次七星爲馬於辰爲午故馬又爲火畜乾爲金午爲火馬生角金勝也故於五行爲兵􅅙馬首龍星之精故馬􅅙同氣屯大畜中孚之震屯賁􅀳明夷睽中孚之坎皆乾也或曰鳥飛龍行不徤於馬乎曰鳥飛極而息龍升降有時徤者唯馬而巳坤順也牡者坤之陽牝者坤之隂老其究也故離爲牝牛而旣濟初九変艮京房以爲􅀶牛坤極生乾故角剛而善觸牽牛在􅐫丑土也土亦坤也離六二己􅐫土也牛有黃者離之六二也離爲飛鳥爲蟹爲鼈爲􅀛􅆑皆有黃震動於重隂之下而善変者龍也震東方卦直春分以後辰亦爲龍蒼龍之次也動極必反故龍以春分升以秋分降升者豫也降者歸妹也盛夏疾雷木抜而龍起震爲木也王充曰龍雷同􅀋其知震之爲乎震位在夘其日甲乙其數三八故玄之中以兊三爲龍占家以甲乙寅卯爲龍或曰龍之􅀋多矣皆震乎曰氣之散也天文角爲蛟亢爲龍翼爲蚓軫爲虵角亢辰也翼軫已也東方朔占守宫蜴蜥以龍虵推之金匱書以飴治蛟龍病出蜴蜥而愈皆龍􅀋也自春分至芒種震治也而辰巳爲巽故曰氣之散也巽入也爲風風主號令故雞號知時先儒以雞爲火之精者巽木含火火生風火炎上故雄雞有冠乃鳴南越志曰雞冠如華其聲清徹巽位在巳金所生也王於酉上直於􅄧故雞又爲金畜洞林曰巽爲大雞酉爲小雞素問以雞爲木畜者巽也離者巽之再変兊者離之變故雞雉皆耿介而雞將號動股擊羽翰而後有聲又曰玉衡星散爲雞者坎至四月成乾其方爲巽玉衡斗也坎之位坎䧟也水畜也美脊剛鬛坎中陽也垂耳俯首而尾不足本末隂也卑而處穢隂也突蕩難制陽也豚者豕之初也故訟初之四爲中孚之豚豶者劇猪也故大畜之三兊金制之爲豶坎再変成艮故豕用􅈹壯豕有牙者乾之剛也象亦豕􅀋故運斗樞曰瑶光散而爲象坎離相納故象齒有文又爲羸豕者隂也豕豭強而牝弱亥爲豕者直室也坎之所自生也傳言斗星散精爲彘斗星坎也又曰瑶光不明彘生鹿張宿爲鹿坎離反也離附麗也羙麗也鶉雉之屬飛必附草附麗也五色成章離日也雉方伏時東西風則復南北風則去而不復坎勝離也坤方之雉嘔文如繡離變而兊乎小寒雉始雊臨之六三離變兊也兊交震故雉不雊則雷不發聲陳倉之聲隱然如雷野雉皆雊星有墜而雉雊者震兊相感也虵化雉者巽成離也竹化虵者震巽易也雉入大水爲蜃而老䳱爲蝙蠣蝠雀􅀋爲蛤離成坎也八卦獨巽離爲飛鳥者何也曰南方七宿朱鳥也午爲鶉火之次未爲鶉首巳爲鶉尾其咮在柳其翼在翼栁午也離也翼巳也巽也卜楚丘論明夷之謙曰當鳥所謂鳥者朱鳥也故曰明夷于飛歸藏初巽曰有鳥將來而垂其翼薛貞曰巽值鶉尾故稱飛鳥離火也巽木風也木中有火風者火氣之動也得乎風者爲飛之􅀋得乎火者得乎風離爲目動爲多白眼觀眼目之變可以知風火矣故驚飈奮發火勢熾然雷行電照草木怒張火木同􅀋乎或曰騰虵无翼而飛何也曰亦巳巽也八荒之外有以首飛者背飛者尾飛者觸象成形豈特騰虵乎或曰海水羣飛無情而飛何也曰坎極成離也火光起於洲潬烈熖生於積油坎極故也或曰飛􅀋決起朝發而暮棲何也曰離在天爲日在地爲火日爲晝火生風故飛者屬乎晝化乎風晝翔而瞑息風騫而木飛艮止也搏噬者前剛也戍爲狗者直婁也火墓於戍生於寅寅爲虎而其子亦曰狗考異郵曰斗運生狗者星艮離也斗止而動亦狗也兊􅀃也羊内很者二陽伏於一隂之下也羝者交乎震震爲反生也兊極成艮故羚羊以角息艮反成兊故墳羊爲土怪夫子曰地反物爲妖或曰史言開皇大曆羝或􅃲於雲中羖或墜於雷震何也曰乾變坤則陽附隂而爲走坤變乾則隂附陽而爲飛其震兊之交乎或曰號物者有萬八物能盡之乎曰其變不可勝言也張載有言曰游氣紛擾合而成筫者生人物之萬殊其隂陽兩端循環不巳者立天地之大義乾爲首坤爲腹震爲足巽爲股坎爲耳離爲目艮爲手兊爲口􅀃八卦合而成體也鄭本此章在乾爲馬之前乾爲天尊而在上爲首在下亦爲首如木根草荄之􅀋乾无往而不爲萬物先也乾首出庶物者震交乾也觀有孚顒􅀂者乾首粛也明夷九三得其大首乾三之上也三本臨乾故曰大首旣濟上六之濡首者上六反三乾也未濟上九之濡首者上九反三乾也乾又爲頂者首之上也大過上六過渉滅頂是也又爲輔者在首而止於上也咸之上六艮之六五是也輔上頷也與頥卦上體同象又爲面者在首而􅀃見於外也革上六是也又爲頰者止於上而有面之象也咸上六是也又爲頄者面之上益之以剛也夬九三之壯上六是也頄面顴也骨剛而肉柔玄九體八爲面九爲顙八九上体也京房以上爻爲頭目亦上体也腹虚而有容也又爲釡者腹器也有水火爻則爲釡故郭璞筮豫之解曰有釡之象瓶罋􅇲皆腹器也太玄土爲腹器又爲尊壷者交乎震坎也坎震爲酒震爲足艮爲􅈹腹器有足有􅈹有酒尊壷也禮少儀曰尊壷者面其􅈹又爲簋者交震艮也有尊壷象而无酒焉者也禮少牢敦皆南首首者敦器之盖飾首有面面有􅈹坤又爲身身亦謂之中又爲躬折其身也震動也一陽動於二隂之下也艮爲止者動極而止也一陽止於二隂之上也人之經脉十有二其六動於足其六動於手動於足者震之陽故自下而生動於上者艮之陽故自上而止震艮相反故行者必止止者必行疾走者掉臂束手者緩行震又爲趾者通乎物言之也足趾下體之下也手上體之下也故太􅀇九體一爲手足言其位也甲剛乾陽也在足者艮交震在手者震交艮震交艮則動者止艮交震則止者動震艮又爲􅡑者足之指也拇手大指也手足所以能動也故動乎下體之下而應乎足者􅡑也指在下而動者亦􅡑也艮又爲肱者自手觀之拇陽也餘指隂也指節三隂中之陽拇節二陽中之隂指動而掌止止者在上動者在下止者運動者止艮也自臂觀之手也臂也肱也三也肱屬乎上而止臂指用乎下而動止者役動動者從之艮也肱臂竒而指數偶亦艮也手之有肱亦猶股之有腓故股在上則二爲腓巽爲股隨足巽也雷風相與也坎爲耳陽䧟乎隂也輪偶者隂也竅竒者坎中之陽也精脫者瞶水竭則槁耳目通竅者水火相逮也離隂麗乎陽也實者陽也陽中有隂故􅁏白虚者隂也隂中有陽故睛黒目白其坎離之交乎精竭者目盲離火无所麗也離爲日寐者神棲於心其日􅉴乎窹者神見於目其日出乎故寐者形閉坤之闔也窹者形開乾之闢也一闔一闢目瞑耳聽坎離相代晝夜之道唯善用者能逹耳目於外唯善養者能反耳目於内太玄以一六爲耳二七爲目一六水也二七火也兊爲口􅀃也鄭康成曰上開似口艮爲􅈹口􅈹通氣山澤通也乾天也故稱乎父坤地也故稱乎母震一索而得男故謂之長男巽一索而得女故謂之長女坎再索而得男故謂之中男離再索而得女故謂之中女艮三索而得男故謂之少男兊三索而得女故謂之少女將􅀃天地生萬物而言人者天地之性人爲貴萬物皆備於人也乾天也爲隂之父坤地也爲陽之母揲􅆱者一爻三揲三爻而八卦具故捜於坤䇿一索而得陽者謂之長男再索而得陽者謂之中男三索而得陽者謂之少男捜於乾䇿一索而得隂者謂之長女再索而得隂者謂之中女三索而得隂者謂之少女萬物分天地也男女分萬物也察乎此則天地與我並生萬物與我同体是故聖人親其親長其長而天下平伐一草木殺一禽獸非其時謂之不孝納甲之􅀃乾納甲壬始於子坤納乙癸始於未震納庚子子代父也坎納戊寅艮納丙辰左行以順父循父道也巽納辛丑離納巳夘兊納丁巳右行以向母從母教也三女配男夫婦之義天地之性人之大倫實告之矣太玄準之以一摹二摹三摹摹亦捜也乾爲天爲圜爲君爲父爲玉爲金爲寒爲冰爲大赤爲良馬爲老馬爲瘠馬爲駮馬爲木果􅀃重卦别象也六爻変化其象豈能盡摹哉此九例也智者觸􅀋而長矣易言天者皆乾也天位者中正也又曰帝位天德者剛也天道者其行以正也天之神者隂陽合一也天則者不可過也天行者終則有始也反復其道也消息􅄹虚也三者一也天文者艮離也天命者乾巽也天衢者艮反震也天寵者君澤加也天險者坎在上也天祐者天助也天下者乾下也或乾爻降於下也曰在曰統曰御曰先後曰奉曰承曰順曰應曰麗各以其卦爻変化言之天或謂之帝言工宰也推而上謂之上帝乾又爲大人聖人賢人君子大人者盡天之体也誠者天之道聖人至誠以盡天誠則化化則莫知其然謂之神故􅀚之九五天之神道聖人以神道設教同象君子通言之也或問天有形乎曰天積陽也氣也易曰日月麗乎天百榖草木麗乎土日月附麗乎天亦􅀂百榖草木之麗乎土天果有質歟日月之行或遲或速奔星上下前後或卑或髙不得自如莊周曰天之蒼蒼其正色耶其視下也亦􅀂是而已列禦㓂曰日月星辰積氣中之有光耀者郄萌曰天了無質鄭康成曰天清明無形或曰星隕石何也曰光耀旣散氣凝爲石如人之精神旣散形亦剛彊矣故曰在天成象在地成形成形者皆地也爲圜者渾淪无端周而復始也曽子曰天道曰圎地道曰方故得乎天者皆圜旣濟之初九未濟之九二坎変乾爲輪是也不特其形也晝夜不窮死生无際非天道之行乎五者君之位得位居中發號令於天下曰大君在家人父母位曰嚴君在歸妹帝女之位曰小君自娣言之則君也乾爲六子父乾爻徃矣爲考考之上爲祖配爲妣異躰別家分而同焉爲宗乾居九五之位則爲君而父也考也祖也宗也通上下言之自天子至于庶人一也太玄孫二曽孫三仍孫四子五已身六父七祖八曽祖父九髙祖父亦以丗數言之乾剛之不変者爲玉変者爲金益之三以上九爲圭鼎之上以九三爲玉言其不変也蒙之金夫臨初之上也亦屯之初也訟之鞶帶上九之三也噬嗑金矢四之五也六五黃金五之上也姤之金柅二之初也鼎之金鉉五之二也言其變也乾艮同􅀋故石攻玉則解乾離同體故金火守則流京房以乾兊配金兊正秋亦九五爻也太玄以二八爲金爲環珮爲重寳爲釦器以一六爲水爲玉者六即乾也玉有水玉水得乾氣乎爲寒者坤交乾也隂至亥成坤戌亥乾位九月寒露十月立冬小寒十一月大寒露坤氣也雲徂雨流而露无所不至坤也黃帝書曰陽不足隂氣上入陽中則洒淅惡寒此寒之驗也邵雍曰月爲寒二隂一陽陽不足也坎爲水爲月故水寒或曰井五月卦九五寒泉洌何也曰井之九五即泰乾初九甲子爻也子坎位也坎交泰坤也陽温隂寒乾陽而寒者隂陽相薄十一月陽氣生於下以其隂不足也故井泉温五月隂氣生於下以其陽不足也故井泉寒又爲冰者坎交乾也乾西北方之卦十月水始冰地始凍水不冰則爲隂􅀒陽勝十月乾陽冝不足也乾剛金也故水凝而堅則隂勝坤初六一隂生至上六十月亥位坎交乾邵雍曰水遇寒則結遇火則竭從所勝也赤陽色也陽始於子坎中之陽故坎爲赤極於巳純乾也故乾爲大赤乾者日在嵎中月在望歳在四月時也困九二坎爲赤二交巽五爲赤紱又爲朱者朱赤黃色詩朱芾斯皇毛公曰黃朱染絳者一入謂之縓再入謂之赬三入謂之纁四入謂之朱纁黃赤也小爾雅曰彤赬韞赤也然則縓纁朱皆赤而朱比赤爲黃比縓纁爲異耳故困九五下交二坎離易巽爲朱紱離坤黄也乾陽得位爲良馬隂消陽爲老馬爲瘠馬鄭康成曰九骨爲陽􅁏爲隂孔頴逹曰骨多也駮馬玄黃也乾変離也駮食虎者兊変乾也郭璞筮遇乾之離曰驊騮緑耳遂玄黄於坎離艮曰其於木者交巽木也於乾曰爲木果者巽艮之陽皆乾也艮爲果者木之陽止於果果成則降降而反生震者艮之反震陽亦乾也秦漢之際易亡􅀃卦孝宣帝時河内女子發老屋得􅀃卦古文老子至後漢荀爽集解又得八卦逸象三十有一按集解坎爲狐子夏傳曰坎稱小狐孟喜曰坎穴也狐穴居王肅曰坎爲水爲險爲隱伏物之在險穴居隱伏往來水間者狐也子夏時坎爲狐孟喜王肅止隨傳解釋不見全書盖秦漢之際亡之矣今考之六十四卦其􅀃􅀂印圈鑰合非後儒所能増也故校證其誤而併釋之以俟後之知者爲龍乾体坤自震息之成乾故乾爲龍坤體乾剥乾成坤隂極生陽爲復震也故坤上六龍戰于野其血玄黄坎爲血震爲玄黃爲直乾其動也直巽爲繩直者亦乾之直也爲衣乾在上爲衣坤在下爲裳太玄曰垂綃爲衣襞幅爲裳垂綃竒也襞幅偶也訟之帶歸妹之袂旣濟之衣袽皆乾也困之紱旣濟之􅃭皆坤也古者衣裳相連乾坤相依君臣上下同體也至秦始取女之衣裳離之爲言者震聲兊口聲出於口也所以能言者出於乾陽也坤爲地爲母爲布爲釡爲吝嗇爲均爲子母牛爲大輿爲文爲衆爲柄其於地也爲黒易凢言地者皆坤也乾坤皆言天地者隂陽相根動靜相資形氣相應有一則有二有乾則有坤邵雍曰天依形地附氣其形有涯其氣无涯張載曰地在氣中黄帝書曰地在太虚之中大氣舉之天地未始相離也明夷日在地中則地在氣中可知或曰師地中有水而渤海之東有歸墟焉其下无厎水豈氣乎曰黄帝書天在地外水在天外表裏皆水兩儀運轉乗氣而浮載水而行考之天西河中九星曰鈎星鈎星伸則地動者以水動也辰星色黃而小則地大動土勝水也鈎鈐者天之筦籥鈎鈐坼則地動者天之筦籥動也以此三者觀之水土動則地動地動則天動地非乗氣載水乎氣无涯水亦无涯水亦氣也坤又爲邑爲􅀖國天子建􅀖諸侯有國大夫受邑分土也邑内也故以下卦言之諸侯四也下兼卿大夫士􅀖對國則􅀖爲王國五王位諸侯承之通言之􅀖國一也坤又爲城爲墉墻謂之墉城墉之大者震足艮手築之巽繩縮之掘地爲澤土自下升者城也積土在内外之際設險可入者墉也又爲泥爲甃坎水坤土汨之爲泥土水合而火之爲甓以甓修井爲甃乾爲父則坤爲母乾爲祖則坤爲妣坤得尊位母也王動成乾爲王母王母尊祖王妣也五尊位在家人乾父居五則坤母居四尊无二上也麻紵葛曰布巽爲草以坤隂不變者爲布巽離爲絲以坤隂變陽者爲帛賁六五束帛戔戔上九變五巽離也坤隂變陽也坤爲帛束帛五兩天九地十之數布帛兩兩相偶五尺謂之量倍量謂之丈倍丈謂之端倍端謂之匹釡有範金者有合土者其象有腹有耳无足皆自坤變坤爲土爲腹家人者遯四之初變艮坤六二有坤腹坎耳坎水離火巽木以釡亨飪之象離爲中女故曰在中饋郭璞筮豫之解六二變坤有坎離曰釡之象遇大有之旅初九九二變乾成艮坤兊爲金爲澤有離火而無耳曰金之祥非釡也或曰鼎何以取於坤曰鼎自遯五之二巽變艮坤器之有腹者也而又有足耳鉉以木巽火坎水亨之故曰鼎象也易言吝者十二卦十三爻陽爻居三咸之九三從上六故往吝􅁪之九三趨上六故可貞而吝姤之上九居隂故吝其餘可往而不往可動而不動可變而不變坤隂也亦有知其不可以往爲吝者屯六三是也然則坤之吝嗇顧用之如何耳故曰憂悔吝者存乎介乾獨陽也坤隂均之寒均暑夜均晝君子而有小人然後上下内外適得其平故小者亨則曰旣濟而小大相過皆謂之過爲子母牛者坤交離也坤爲牛爲腹離爲大腹京房旣濟之初九變曰博牛言以牸牛博犢也洞林明夷之旣濟曰當有牛生一子盖坤變坎坎爲子三至五互有離四者坤之丑爻丑亦牛也離畜牝牛者母也大畜艮坤之初爲童牛者子也太玄以上爲犢地方而載輿也坎内陽外隂陽實而直隂虚而曲内實轂也外虚穿也内直輻也外曲牙也一實一虚周流无窮輪也有輿有輪而乗其上曰車賁初九是也自上視之有輪有輿而居其中亦曰車睽上九視六三困九四視九二是也或曰乗解六三是也有輿无輪止曰輿大畜九二九三是也有輿有輪而爻當輿睽六三是也坤爻變乾陽爲大則曰大輿有輿有輪或爻在輪下或當輪止曰輪旣濟初九未濟九二是也曰輹者坤震也震之陽爻在坤下爲輿下之横木大畜九二是也震之陽爻變坤之中爻爲大輿之輹中者心之位輹在輿下鈎心夾軸四徃之五爲坎變輿成輪大壯九四是也曰茀者有輪輿矣震爲竹葦蔽之笰也一剛一柔相錯成文有天而後有地一不獨立二則爲文天一地二也季春之月夬九三爻也陽氣充塞氣成虹蜺有剛然後文柔之也仲冬之月坤六四爻也雖霽而日虹蜺伏藏陽不足也以此見无一則无二矣離者乾坤以中相易者也離爲日爲火爲雉日五色火煙隨而變雉五色具焉謂之文明者以離言也或曰極南之方冬虹不藏見則怒風發屋雷動則風止何也曰離南方巽之再變也巽動於下離變於上巽極成震是以風止中國陽緩隂散雖有虹蜺而非風候又爲章何也曰文合而成章荀子曰文理成章詩聲變成文積句成章噬嗑初五相易震離合一故曰雷雷合而章坤六三姤九五動則成文不動則含章衆者對寡之名師以一陽主五隂故曰用衆曰畜衆明夷以二陽臨四隂故曰莅衆解以初九之坤四故曰得衆民者有君之名也師曰衆又曰民何也曰復初九之二坤隂自下從之故曰民坤之隂即坎之二隂也坎之二與上坤之三隂合故又爲衆坤又爲醜者陽美隂醜也又爲輿者通於車輿之輿專成於衆工始於輿邵雍曰君子以萬物爲輿馬又曰羣者通隂陽言之乾之九四以三陽爲羣否之六二以三隂爲羣聧之上九以六三坎坤兊三疑爲羣巽爲魚亦曰民者巽之坤也與坎水兊澤之坤爲民同爲柄者巽之坤順其鑿而入焉者也斧柯劔夾殳戈矛之柲耜之來柄也旅九四得斧巽上九喪斧或得其柄或失其柄黒者坤之極也以日言之日在虞淵也以月言之晦也以歳言之十月也故日冬則行黒道月死成魄火之末澤之汚下草木之杇腐人之黧老極也坤極成乾故明生於晦陽兆於北死爲生之故而増肥之澤黒墳之土皆地之美者易言􅁳言晦皆坤也坤爲地又曰其於地也者坤爲黒其於地乃其一也坤變乾爲牝馬離變坤爲牝牛隂陽之中復有隂陽此万物所以无窮也姤􅀄六坤変乾􅀄九甲子坎豕不曰牝豕者􅀄隂未壯也爲迷者坤􅁳晦待陽而後明先陽而動與逺於陽而不復皆迷之道爲方者坤静而徳方方不可易也爲囊者坤虚有容與腹同而囊手可括也爲裳爲黃者黄地之中色得乎陽之美不偏於隂者也爲帛爲漿者帛當在爲布之下坎震爲酒故作酒以麴蘖麥東方榖也而東風至則酒湧漿者酒之􅀄故坤爲漿不足於陽也震爲雷爲龍爲玄黃爲旉爲大塗爲長子爲決躁爲蒼筤竹爲萑葦其於馬也爲善鳴爲􅑓足爲作足爲的顙其於稼也爲反生其究爲健爲蕃鮮張載曰隂氣凝聚陽在内者不得出則奮擊而爲雷霆陽在外者不得入則周旋不舎而爲風其聚有逺近虚實故風雷有小大􅁀緩鄭康成讀龍爲尨取日出時色雜也虞翻曰駹蒼色震東方故爲駹舊作尨上巳爲龍非也臣曰讀當作􅃲字當作􅔀蒼尨尾也囯語曰月㑹于尨􅔀孟春日月㑹于諏訾斗建寅旦見尾中播種之時无妄益乾変震之象乎􅀂蒼色則上巳曰蒼莨竹矣坤於地爲黒又曰天玄而地黃者坤之中爻爲黃黃者地之中色得陽之美者也中爲坤宫太玄以五五爲土其色黄五五中也中首曰陽氣潜萌於黄宫坤上六十月也言龍戰于野坤黒也乾赤也謂之其血玄可也而曰其血玄黃又曰震爲玄黃者何也曰此天地􅀑神之奥聖人之㣲意也坤之上六閉塞成冬隂極疑陽而戰陽於此不爭而自勝於是冬至而坎之初六受之故曰天玄而太玄亦曰夜半近玄極坤生震陽自外來而爲主於内於卦爲復以坎言之則玄也以復震言之則玄黄也然十月未可以言黃故古人謂冬爲女冬震所以爲玄黄者初九春分六二清明六三榖雨九四立夏六五小滿上六芒種初九乾坤之初交以赤交黒所謂玄也六二六五坤之中爻所謂黄也十月又謂之陽月言未甞一日无陽而陽亦未甞一日不勝也故曰神戰于玄邪正兩行龍出于中法度文明龍出于中則震也又曰天炫炫出於无畛熿熿出於无垠出者亦震也隂極陽生亂極徳形君子於是修德以俟時否之九五與二相易巽木玄黃而在田上桑也觀之六四與五相易坎爲玄坤之中爻爲黄而在朝廷幣也豐之九三玄黄在車上而金断之斾也賁之六五三坎爲玄巽乾爲大赤離坤爲黃纁也纁黄之変染者自黄而入赤纁三入之赤也爲旉者隂體凝滯震陽旉之延叔堅曰旉大布也王洙曰字從寸甫聲布也泰􅀄之四否四之􅀄草之旉也大過二変之五木之旉也五変之二旉者歛矣解自升変草木之旉也鄭康成曰國中三道曰塗震上值房心塗而大者取房有三塗焉王洙曰夘爲日門險極成易大川之上必有大路故大途之象必出於坎兊之外或曰道或曰衢履九二動成震動而正故曰道大畜自大壯來上九畜極艮反成震大途而在天上无所不逹天衢也故曰衢賁又爲徒行者􅀄九之四艮應足動足指履乎大途徒行也泰九三爲陂者大途変而爲山澤易極成險故曰无平不陂爲長子師六五動成艮艮少男視二震爲長震視艮爲弟坤母視之爲子故曰長子九二用衆処險持律五任之本復乾也自震坎視之丈也故曰丈人隨􅀄九否乾自坤視之爲夫自艮視之爲丈故曰丈夫小畜九三離婦乗震故曰夫大過乾二変之五巽成震巽爲白自兊妻視之震爲夫夫而白首故曰老夫􅁪六五自二巽視之爲夫自泰乾視之爲子故曰夫子无妄六三即遯之􅀄六遯􅀄上行之三成震故曰行人明夷􅀄之四震成巽巽位東南故曰主人震四諸侯之位臨二之四有不喪匕鬯奉宗廟之象故曰􅀕主震変兊爲決変巽爲躁竹中虚節實重震之象蒼莨青也震之色孔頴逹曰春生之美也竹草􅀋而有木氣草於五行爲木故蒼茛竹乃盡震象他竹震之変也太玄以甲乙爲竹亦震也列禦㓂言乆竹生青寜青寜丗无識者昔人鍾山伐竹竹中得青蝦蟇其青寜乎蝦蟇巽兊之氣震極而変也萑葦震之廢氣也故竹堅而萑葦脆竹乆而萑葦易枯鄭康成曰竹􅀋搜神記言杇葦爲蛬震成巽巽爲風乎夫橘成蛾葦成蛬麥成􅺄陵舄得鬱捿爲烏足葉爲蝴蝶皆震巽也歸妺上六旣濟九二之五爲竹葦旣濟十月卦亦震之廢氣也二卦皆震巽交乾爲馬善鳴者震也易凢有震聲曰鳴謙六二上六是也兊口震聲在人曰言需九二以四爲言訟初六往四爲言明夷初九往四爲言夬九四不動爲聞言不信革九三往上爲言震臨二之四爲言上六交四則五爲言艮五動易二爲言漸初六動而之二爲言皆震兊也在飛鳥曰音中孚上動反三小過初九之四是也或曰音有五善鳴者何獨震乎曰震動也凡聲激而後有雷以陽激隂風以隂激陽水火之聲无非激也不動何由有聲爲􅑓足者伏爻也震爲足於左在下卦爲後震下有伏巽巽爲白此震爻發於下之象乾爲首上發震爻則爲的顙的顙詩所謂白顚傳所謂的顱也爲作足者乾馬変也震下爻動屯初九是也大畜九三乾変震三陽並進故曰良馬逐中孚六四震作足馬四易初成坎坎爲美脊震坎􅀋也四絶􅀋上行坎亡震存故曰馬匹亡其於稼也爲反生宋􅂨曰隂在上陽在下故爲反生謂枲豆之屬戴甲而出鄭康成曰生而反出也反其生者有生有不生夫一陽自下􅂛而息五隂自上降而消其卦爲復􅂏曰剛反動太玄曰反乎始故人與草木反生心膽之陽倒懸豈特枲豆而已哉於稼言反生舉一隅也大過二変之五兊成震爲枯楊生稊反生也五変二往震成兊爲枯楊生華亦反生也屯三震交艮黔喙之屬而角反生鹿也大壯四震交兊羊角反生羝也震三四相易死者反生􅂫也虞翻曰震相薄変而至三則下象䆒與四成乾故其䆒爲律巽䆒爲躁卦雷風无形故卦特変耳爲蕃鮮者泰頥􅁪萃歸妹言萬物解言百果草木甲坼者震也咸四月卦言萬物化生姤五月卦言品物咸章者震変巽也震爲蕃変巽爲鮮故又曰絜齊太玄曰物咸重光保厥昭陽言鮮明也或曰離言百榖草木者何曰離有震巽也解言百果草木者何曰有震巽而又自艮変也睽无震巽曰萬物者何曰睽大壯之震三之上成睽萬物睽也乾曰雲行雨施品物流形者何曰乾自震息也動爻巽也爲王當在乾爲天之下錯文也五爲王之位乾爲君君冝正位宅中故九五爲王比隨觀家人蹇夬萃井渙是也離九四與五相易五曰離王公上九與五相易曰王用出征師二進至五曰王主自三之二曰王三錫命蠱上九自泰初歷四五之上曰不事王侯􅀳二動易五曰受兹介福于王母豐二至四曰王假之坤六三之動訟九三從上九皆曰從王事而巳大象曰先王者比􅀚渙以九三噬嗑復无妄以初九皆以前卦変而言之故曰先王大有九三不言王曰天子者何曰九三交於六五六五下交九三乾変離兊有天子施澤降心于九三之象故曰天子先儒以震爲諸侯是乎曰非也長子王器謂長子爲諸侯也四諸侯位豫九四天子建諸侯也晋九四天子接諸侯也四近君位古者諸侯入爲三公三公出爲諸侯故其位四與三通曰公侯之位鵠古鶴字震離爲鶴中孚九二是也訟初之四坎変巽離変震兊震爲善鳴爲足巽爲白兊爲澤繁露曰鶴水鳥也夜半水感其生氣益喜而鳴京房論中孚曰九二處和體震則震爲鶴房本有之房在孝宣後故也鼔象雷中孚九三或鼓或歌震交巽爲木艮爲手手執桴擊之鼓也又爲鼓缶之鼓離九三変坤震坤爲器震爲鼓巽木艮手鼓缶也巽爲木爲風爲長女爲繩直爲工爲白爲長爲髙爲進退爲不果爲臭其於人也爲寡髮爲廣顙爲多白眼爲近利市三倍其究爲躁卦震巽皆木也􅀃卦巽爲木言蕃鮮之時震之九四爻也乾艮坎離皆有木象何也曰水火土石地兼體之金生於石木備此四者而後有故木果乾也堅多節艮也堅多心坎也科上槁離也其實乾坤而巳或爲苞桑或爲枯楊或爲枯木或爲􅂎何也曰否之九五二爲田木在田上上玄下黄桑也二五相易剛柔相包苞桑也其卦氣則七月桑落之時大過巽木兊澤楊澤木也兊正秋枯楊也其卦氣則十月小雪亦枯楊時也困初六視九四爲臀困于株木巽木而兊金克之枯株也其卦氣則九月霜降亦枯株也垢九三因四動者兊澤巽木變乾爲大澤木之大􅂎也其卦氣則五月夏至􅂎木盛時故能包􅀲或爲牀或爲棟或爲桷或爲木或爲舟楫或爲耒耜何也曰剥􅀄六六二六四巽九二九四皆以坤變乾成巽坤爲西南乾爲人設木於西南之奥而人藉其上牀也大過巽爲木木反在上棟也漸九四乾動成巽坤三變也乾動爲直坤爲衆木而平直者桷也益自否變漸變渙巽木在坎上至益而成故渙曰乗木有功益曰木道行也中孚巽木兊金刳之故曰乗木舟虚渙巽有艮手断木剡木爲楫也益自否變九四之二斵木爲耜也之二則楺木爲耒風者火氣之動隂麗於陽則爲火隂入于陽之下則爲風巽之所入即所麗之隂也火非動不見而動則屬乎風黄帝書曰在天爲風在地爲木舉一隅也西方書曰暖氣歸火轉動歸風風化蟲故郭璞曰風蠱也爲長女者女在下男在上或男未下女或男下女而未歸或女歸而有漸或男行而不動或女與女同居則三女皆謂之女春秋傳曰女者謂其逺於人也古之嫁者三月廟見而後行夫婦之道未廟見而死則歸葬于父母故咸下女漸女歸猶謂之女三女從三男五有乾坤舅姑之象子夏曰婦人學於舅姑者也或曰蒙六五納九二成巽大過九五変而之二成巽􅁪六五從九二成兊謂之婦者從夫也家人九三漸九三曰婦何也曰家人本遯変九四之初則初六從而成離離女從坎男也坎視乾爲子離乾爲舅故曰婦子漸九三本否九四也之三成坎六三從之成離故謂坎曰夫謂離曰婦曰小畜上九巽爲婦何所從乎曰九三動則成震震者巽之夫也不動者爲上九所畜也小畜九三大過九二困六二又曰夫妻何也曰小畜九三離震同象大過九二動之五震兊同象困六三坎離同象故曰妻魯春姜曰婦人事夫有五平旦纚笄而朝有君臣之嚴沃盥饋食有父子之敬報反而行有兄弟之道受期必誠有朋友之信寢席之交而後有夫婦之道謂之妻者寢席之交乎故曰妻齊也女或爲娣何也曰所㱕之妹其爻在上則下爲娣歸妹九二是也爲繩直者巽一柔爲二剛所紏有股而合繩也其剛爻爲直繩所以直者坎剛紏柔剛乾也又爲徽纆者坎上六動坤坎成巽坤坎爲黒巽爲繩徽黒索也巽爲股兩股謂之纆上之三成巽離三股謂之徽又爲繘者井自二反上成巽坎車相應繘也汲綆謂之繘係者或以此係彼或以彼係此引者持繩相應牽者手挽而股動繫者繫動於此无妄之牛自遯初之二四巽繫之故曰或繫之姤初之二二巽繫之乾金在焉故曰繫于金柅維者反復成巽繩反復維之也爲白者坎変巽也坤至北爲黒坎中之畫乾赤也赤黒爲玄坎水一也或爲白露或爲霜雪爲氷者皆寒氣巽入之也春秋傳曰冰以風壯詩曰北風其凉雨雪其雱易曰履霜堅冰至隂始凝也白虎通曰露者霜之始也坎爲月遡日而白離之光巽入也坎爲髮爲血髮者血之華少而美踰壯則黒而不玄過此則乾消坤見坎降離升而黃旣老則坎変巽坤黒盡矣然凢有益於血者皆能黒或曰素履何以言坎曰四変之初巽変坎初之四坎変巽也大過初六白茅何坎也曰遯一変訟二変巽三変鼎四変大過則大過初六自訟坎変巽故爲白而初六九二九五同取此象五色皆本於白草木旣槁則白鬚髮旣老則白豕鬛埋之則白金可変而白丹可錬而白白者隂也陽之基也隂陽相賁而後有文陽尽則隂質見矣物有生而白者氣自芒芴之間固巳変矣巽又爲墨者巽変坎也白復成黒墨者黒與水合太玄飾曰隂白陽黒分行其職天地変化萬物者以巽而莫見其変化之迹故巽爲工訟之鞶帶比坎之缶泰之城隍解之墉同人隨之門節之門户豫之門柝小畜大畜之輿輹大有賁困之車旣濟之輪井之収噬嗑旅解之矢睽之弧矢旅巽之斧賁之帛困之紱旣濟之衣􅃭剥巽之牀渙之机大過之棟宇漸之桷困之宫小畜之室大壯之宫室豐之屋旅之次剥之庐坎之樽簋井之瓶甕鼎之耳鉉中孚之舟楫益之圭歸妹之筐旣濟之茀離之罔罟益之耒耜小過之杵臼大過之棺槨史之書契􅁪之浚井之渫甃皆巽工爲之也或曰大畜九二坎六四􅁪初六歸妹上六節初九九二旣濟六二損二簋豫門柝何取於巽乎曰大畜三有伏巽坎自臨三変而成一變升二変解三変坎自升至坎巽工爲之乃有樽簋缶之象􅁪初六本泰之六四自四之􅀄入于兊澤之下成巽所入深矣故曰浚猶浚井也歸妹漸之反也損益之反也節渙之反也旣濟六二應五困􅀄九應四也豫伏巽也巽東南主人之位内有主故有客巽爲風草木風之􅀋皆長巽離爲絲絲亦長姤􅀄変兊爲履之虎尾亦長施之於事乆長是也易言不長不可長何可長皆巽変也訟􅀄徃訟二四應􅀄巽坎変兊震曰訟不可長也屯上无助妄動之三離見巽変曰泣血漣如何可長也否四應􅀄巽躰猶存五應二巽変矣上應二巽躰尽而成泰故曰否終則傾何可長也姤一隂方長五陽下之巽躰旣盡剥極成坤故曰勿用取女不可長也中孚上九登乆而降巽変成離故曰何可長也小過九四以徃厲爲戒乆則四五相易小不勝大故曰徃厲必戒何可長也臨六三處位不當憂而退避二三相易成坎坎爲加憂二至四有伏巽二三相易巽変坎故曰旣憂之咎不長也或曰豫上六大壯上六何取於巽曰豫上六震動反三成巽大壯上六震者巽之反也爲髙者風髙至者也飛鳥之􅀋有背􅀒蒼天皆風所爲也或曰乾天不爲髙何也曰天運徃而不來升而不降亦不能爲髙來也降也所謂巽也同人九三動與五争應成巽艮故曰髙陵解上六動之三坤躰連巽故曰髙墉蠱上九自巽徃外而處卦上故曰髙尚其事爲進退者坤生震之一陽則退者進乾生巽之一隂則進者退易稱進退者巽也觀九三是巳屯􅀄九曰盤􅁊者進而之四成巽四不能安故盤􅁊萃􅀄六退而乱進而與四相萃故曰乃乱乃萃皆進退也或曰大壯上六何也曰上六震震者巽之反不能退不能遂則進退不可矣巽兊之覆也兊爲決覆之爲不果稱疑者皆不果也乾九四或躍賁六四當位豐六二之徃旣濟六四之戒困九四九五之徐鼎九二未濟大象之慎皆不果也豫九四勿疑兊􅀄九未疑者巽毀也遯上九升九三无所疑者巽或不反或毀也或曰坤上六隂疑於陽睽上九羣疑士損六三三則疑何也曰乾五月一隂生巽隂始疑也至於十月隂疑於陽盖其疑自一隂始生則疑之故君子於姤之􅀄繫之以金柅也睽上九之三成兊震兊巽之覆震巽之反損自泰変九三上行上六下之九六相遇得其友也三陽並進成巽故三則疑也爲臭者張載曰聚而有間則風行風行而声聞臭逹繫辭曰同心之言其臭如蘭先儒謂同人六二也二巽爲草二易五爲芬芳其臭如蘭也坎爲髮髮者血之華坎血耗减頂露於上寡髮也大過九二老夫九五老婦離九三大耋兼取此象乾爲首析而言之􅀄畫爲頥中畫爲面上畫爲顙震得􅀄畫爲頥者動於下也兊得中畫爲面者恱見於外也巽得上畫爲廣顙者上大下小也張載曰躁人之象傳曰上方者觸人亦躁也睽六三其人天且劓馬融曰刻鑿其額易傳曰髠其首是乎曰睽九二即无妄之九五巽変乾爲廣顙兊毀之髠其首也刑鼻曰劓髠曰天互見也爲多白眼者離爲目虚者隂也实者陽也虚者其躰陽实者其躰隂故虚者爲眸子实者爲白肉離変巽則白肉在上眸子在下故爲多白眼見於易者爲􅅥爲反目乾九三危而􅅥也訟九二窒而􅅥也小畜九四畜君乗剛而􅅥也與上合志則有孚􅅥出矣九二受畜於四妻上夫下反目而怒視也虞翻曰巽爲魚何也曰魚多白眼而巽乎澤者也不曰巽乎川者積水成淵而後魚鼈生焉川壅成澤也剥自姤変至遯否􅀚有伏兊巽爲魚五艮持繩貫魚也姤􅀄巽二動成艮有伏兊九二不動包有魚也九四逺􅀄无魚也中孚坎変爲巽乾変坎成兊魚也郭璞得豫之小過曰五月羣魚入寺艮爲門闕六三変九躰有兊巽豫五月卦也或曰魚水蟲也何以言巽曰坎离乾坤之変交而生物离乾卦坎爲水故陸多走􅀋水多飛􅀋魚浮游於水有飛越江湖者巽也故巽在陸爲雞在水爲魚雞瞑而魚不瞑離不足也傳曰魚與鳥同􅀋其知巽之所爲乎嶺南黄魚或化爲鸚鵡巽変離也泡魚而刺者或化爲㺄巽変坎也震巽相易者也故魚或爲龍魚而班者或化爲鹿畜魚以二月上庚亦震也隨陽者震也潜化者巽也孕魚依草子如其實月躰虧於上魚腦减於下月􅄹成乾其虧成巽爲近利三倍者噬嗑六三変也日中爲市巽変兊離爲蠃爲貨市利也巽変離兊三倍也舉此一爻以例諸卦其究爲躁卦者巽三変成震舉震巽二卦以例餘卦天地萬物无有獨立者極則相反終不相離以其不可離也司馬遷律書曰冬至則一隂下藏一陽上舒京房論八卦飛伏虞翻論伏爻郭璞又論伏爻納甲其􅀃皆源於此爲楊者巽爲風風䡖楊中孚九二鳴鶴在隂其子和之上九翰音登于天用此象爲鸛者别於鶴也震爲鶴陽鳥也巽爲鸛隂鳥也鶴感於陽故知夜半鸛感於隂故知風雨丗傳鸛或生鶴巽極成震乎坎爲水爲溝瀆爲隱伏爲矯輮爲弓輪其於人也爲加憂爲心病爲耳痛爲血卦爲赤其於馬也爲美春爲亟心爲下首爲薄蹄爲曵其於輿也爲多眚爲通爲月爲盗其於木也爲堅多心一陽䧟於一隂之中爲坎坎䧟也􅄹天地之間皆水曰水者舉其九也坎之隂爲陽所得上而爲雲故屯曰雲雷需曰雲上於天坎之陽爲隂所得下而爲雨故屯解曰雷雨坎水之通流爲川訟之坎由遯乾三之二漸之坎由否乾四之三渙之坎由否乾四之二益之坎由渙二之􅀄故曰大川或曰小過􅂏夬九三中孚下躰兊也或爲雲爲雨爲大川何也曰坎兊一也革兊上離下􅂏曰水火相息兊亦水也自陽爲隂所䧟言之謂之坎自澤物言之謂之兊澤无水則亦无以澤物矣故澤无水謂之困上浮而爲雲下墜而爲雨非澤氣之升降乎川澤者坎兊之相変也需之川自大壯之兊変而爲坎澤決而爲川也中孚之川自訟之坎変而爲兊川壅而爲澤也澤或決而通川或壅而塞豈有常哉曰渉大川何也曰需之利渉震足蹈川也益之利渉巽股蹈川也訟之渉坎変兊巽股入于下而澤㓕其頂不利渉而入于川也坎或爲淵何也曰乾九四或躍在淵者坎之下復有澤也訟曰入于淵者訟変巽睽大過三坎成兊川壅成澤澤蓄成淵與乾九四一也坎又爲泉何也艮兊変坎山澤通􅂔山下之澤出而流動則爲泉泉有源之水澤其源也蒙自臨来兊変坎艮與井自泰􅀄之五乾変兊坤変坎􅀄自兊下徃而成坎則􅀄爲泉源同象坎又爲膏者亦坎兊也澤之肥者陽之美也爲隱伏者坎為水水善隱伏沇濟沱潜之水潜行千有餘里五緯唯辰星難見而血之流行於肌肉之際者至幽也乾之初九甲子坎之位也九變而六則爲潜爲隱坤之六四言賢人隱以乾之􅀄九爲賢也在履九二歸妹九二因初九之動皆謂之幽隱伏也而謂之幽坎離相形也豐九四處不當位則曰幽不明在訟九二爲逋竄在同人九三爲伏戎在需小過爲穴需上六降三小過六五三取二坎兊交可隱伏者穴也需六四坎交兊三陽自下進故曰出穴在困爲幽谷在井爲井谷谷與穴異者澤決水流注於山間艮山也谷注谿者也輮宋哀王廙作揉今從二家矯者矯曲爲直揉者揉直爲曲噬嗑九四噬五解九二之五旅六五逮四皆巽爲木艮手矯之正曲爲直加以銳金故曰矢曰金矢者乾也曰黃矢者離也否四之初三變成益一變漸巽變乾直者曲也二變渙而曲其柄耒也渙巽變乾曲而有足肱據其上机也皆有坎揉之象古矢幹用蒲栁故曰剡木爲矢小過爲弋者四本明夷之初離巽爲絲以絲繫矢射之弋也爲弓輪者揉直爲曲坎木爲之坎兩端柔其中剛剛柔往来㢮張也輪一虚一實内實外虚睽自无妄來五之二巽木變離爲絲繩變坎則弓有弦旣濟初九之四未濟九二之五巽木艮手揉木曲之其成則圜者輪也乾爲圜矢取巽離弓取巽坎又有工矯揉之豈人爲哉枉矢熒惑之變火也㺄豕激豪短狐射影无非坎離之變其於人也爲心病者虞翻以坤爲心坎二折坤爲心病以􅀋言之心火也坎水也坎心病也以位言之坤土中也中者心之位周景王鑄大鍾聲過其中爲心病先儒以皇極不建爲瞀乱之疾五聲以宫爲君太玄以五五爲心其中不平者心病也明夷六四應初比三四入而初出坎變兊心病去而􅀃􅀗心意也井九三未用上六其心病故惻然傷之艮六三静與動爭夤裂而心病故厲動心艮六二隨三不能動而應五旅九四不能進而上道行于五故其心病皆不快爲加憂者卦以隂陽失位失應爲憂憂之中又見險加憂也在屯上六爲泣血漣如在離六五爲出涕沱􅀂在􅀳六二爲愁如在震九四爲􅊒􅊒或曰屯上六失位乎曰失應也上六動成巽反三成離而巽毀故曰何可長也人所以知疾痛搔痒者由血流行也坎爲血卦爲耳血流行而物傷之爲耳痛舉此則百體之痛一也在噬嗑上六爲何校㓕耳在夬九四爲聞言不信爲血卦者坎爲水爲血赤者坎中之陽靜則陽消故鹽白而大鹵之色正赤穆天子傳有黒羊白血今嶺南産鍾乳之山黒羊食其草則血白鍾乳金石兊隂之氣也故凢血停乆不動亦白隂變陽也黄帝書腎主血心藏血腎坎水也心離火也離中坤隂而藏血坎離交也其實皆乾陽之動屯上六臨乾變坎也歸妹上六渙上九泰乾變坎也爲赤者乾爲大赤坎中之陽乾中畫也其於馬也爲羙脊者乾爲馬上畫爲顙故震交之爲的顙中畫爲脊故坎得之爲羙脊下畫爲足故震得之爲作足良馬者純乾也屯上六以五爲馬賁六四以三爲馬晉以四爲馬暌初九以四爲馬中孚以訟二爲馬皆羙脊之馬也爲下首爲亟心爲薄蹄者屯上六之班如賁六四之翰如暌􅀄九之所喪馬皆以亟心坎在中也乾爲首坎隂在上交之爲下首震爲足坎隂在下交之爲薄蹄中之位爲心坎陽交之偏於陽矣爲亟心乾爲馬三男皆乾索也言震坎而不言艮者顙在上即艮之乾也猶乾爲木果而艮又爲果是巳爲曵者坎離交也坎水欲下離火欲上曵也坎爲豕坎極成離故豕亦俯首薄蹄亟心卑而率有曵之象其於輿也爲多眚者坤爲大輿爲衆多多坎䧟者輿之病行則必敗唯无眚者乃可行災以坎言者險也眚自取不正災天降之雖正猶不免訟九二訟五无妄三四上不正震六三不當位自取也故曰眚需九三剥六四大畜􅀄九正也故曰災或曰復上六正災也而曰眚无妄上九不正眚也而曰災遯􅀄六不正冝眚也亦曰災何也曰復上六迷復用衆以其國君凶自取之也然上六窮矣雖正亦凶災也故曰有災􅌌无妄上九之窮雖行而正亦災也遯􅀄六退藏自晦其正也爲通者坎水決爲江河升爲雨露血之在人者周流无窮也乾曰六爻發揮旁通情者坎離升降徧􅀍諸爻乾之情也坤六五曰黃中通理者五動成坎也節九二知通者動而應五坎也知塞者坤土塞其行也需自大壯四之五成坎乾九四變漸渙之坎而成益通也故曰大川中孚之川由訟坎而訟自遯三變之坎亦通也豫九四曰朋盍簮者上下通也或曰泰言天地交而萬物通否言天地不交而萬物不通何取於坎乎曰坎初六冬至九二小寒六四立春九五雨水上六驚蟄而泰當坎之九五水氣上行自坎爲泰萬物通矣否者泰之反也坎降離升震伏兊見自離成兊而否當離之六五萬物不通矣爲月當在坎爲水之下錯文也坎坤躰也坎中之乾二五也乾陽流於坤隂故月以速爲退月躰不明待日而明明者乾也横渠曰日月之精互藏其宅是也乾言日月合其明者坎離互用也豫言日月不過者坎爲月伏離爲日日月㑹于北方也􅁪言日月得天者乾九四之五變離坎也小畜上九中孚六四歸妹六五月幾望者小畜四有伏坎巽有伏震月在東日在西望也中孚訟坎變震月在東亦望也歸妹六五月在東日在西亦望也然曰幾望者小畜中孚坎在四也歸妺六五爻在五坎在四􅀂五則中矣是故日望月則月食月掩日則日食坎離之交勝也或曰坎水也離火也火麗乎水何也曰離非水則明无自而託坎非離則明无自而生故水聚則精聚精聚則神生今焚薪爲炭枯枿成􅁅杇木夜明濕盡光暗血爲走燐見於暮夜隂雨之時故曰離者麗也坎水盡則離亦无所麗矣水潜行同􅂩而動故爲盗太玄以水爲盗隂陽家以玄武爲盗玄武水也屯六五以五爲宼盗用衆也蒙上九以二爲宼盗用師也需九三以五爲宼賁六四以三爲宼解六三睽上九以四爲宼宼用兵也兵戎也故需曰宼象曰戎夬九二動離有伏坎亦曰戎以有戎兵其實盗也坤衆爲多坎陽卦其剛在中堅心也重坎者堅多心也曰其木也者與木爻交也震巽爲木堅多心松栢之􅀋周官所謂陽木洞林家人之蒙巽震交坎爲長松其在震九四爲􅁄匕在渙九二爲机爲宫者復􅀄九即乾􅀄九甲子爻子者坎之位於律爲黄鍾太玄曰陽氣漸萌於黄宫爲律者法度之始太玄以水爲法爲准水可動而動可止而止故爲可有以位言者有以爻及變言者乾六位三五坎爲可􅀄上四皆曰不可言可者九三也大過九五何可乆也亦可醜也亦三五也坤六三可貞者三動也師可以王二之五也謙上六可用行師者上應三也蠱上九志可則者三動應上九无妄九四可貞者五動也大壯天地之情可見者四之五也解六三可醜者􅀒四也損可貞者九三上行也九四可喜者四􅀄相易也井九三可用汲者上六用九三也震出可以守宗廟社稷者四也小過可以小事者六二也明夷變也不可大事者九三九四也坎變巽也否上九何可長者三爻自上降也謙卑而不可踰者艮髮坎也蠱九二不可貞者不動也剥上九終不可用者坤不復也无妄九五不可試者五不動也大過九三不可輔者三上不易也坎天險不可升者二五不易也離九三何可乆者坎毀成巽也遯九三不可大事者三不動也明夷九三不可疾貞者三之上也豐九三不可大事終不可用者三不往而退也節苦節不可貞者上窮也中孚上九何可長者反三也小過六二不可過者坎變巽也六四終不可長者四之五也旣濟上六何可長者止反三也爲棟者水就濕避燥去髙取卑有揀之象或曰火不避濕而就燥乎曰火豈擇於髙卑哉在屯六三爲君子舎之在訟九二爲不克訟在比九五爲舎逆取順在賁􅀄九爲舎車而徒在離九三爲不鼔􅇲而歌則大耋之嗟凶在節六三爲不節􅀂則嗟􅀂爲叢􅁄者其於木也爲堅多心交離爲􅁄離火銳上而不可觸刺也堅多心之木而有刺􅁄属也坎上五動爲巽曰寘于叢􅁄是也古者獄後種九􅁄周官王之外朝左九􅁄右三槐司宼公卿議獄其下坎言叢􅁄者獄也天文天牢六星在斗魁下貴人之牢也貫索九星在招搖前庶人之牢也占家天獄視斗繫曰本斗北方坎也未濟坎自否巽變爲狐坎隱伏巽不果虞翻以艮爲狐于寳以坎爲狐互發也天文以心爲狐􅀃卦以艮爲黔喙猶天文以辰爲龍􅀃卦以震爲龍聖人觀鳥獸之文又觀地之冝叅考之也巽交坎離爲蒺䔧象與􅁄同巽爲草木剛爻木也柔爻草也爲桎梏者艮手震足交於坎木桎梏也桎足械也梏手械也坎有獄象故以挃梏言之蒙坎自升巽以木爻變也離爲火爲日爲電爲中女爲甲胄爲戈兵其於人也爲大腹爲乾卦爲鼈爲蟹爲蠃爲蚌爲􅀛其於木也爲科上槁一隂麗乎二陽也乾離同體離巽爲風故天與火同風自火岀乾位六爻坎離互用故以水火言之􅀂大有賁革鼎旣濟未濟舉大九也故皆曰火離九四旅九三離火巽木故曰焚或曰何以隂麗陽乎曰束藴而吹煙氣鬰然及其外明煙即是火火動而薪止火㓕而燼留非隂麗陽乎然坎離不相離也坎中有離故有温泉有火井離中有坎故有火䑕有火􅀛離在地爲火在天爲日乾體也其中畫乃坤之二五横渠所謂隂陽之精互藏其宅歟行遲者隂麗乎陽也􅀳曰晝者日出地上進而中也豐曰冝日中者九四之五也離九三豐􅂏曰日􅉴者日中而又西也乾九三旣齊曰終曰者日在下也豫六二曰不終日者二動之五成離日在上也夬九二曰暮夜者動成離日在西方之下日薄于虞淵之時也或曰夕日入爲夕大畜曰日新者大壯一變需坎月離曰合照也再變大畜艮終復始日新也益曰日進者􅀄九自下而進也卜丘楚論十日其􅀃源於易之晝夜又爲大明者懸象著明莫大於日月而月受明於日陽爲太隂爲小故曰大明乾大明終始􅀳進而麗乎大明皆日也又爲明者日月相推而生明屯九五求四四往之五訟􅀄往四皆坎月在東月之明也大有九四離動井九五旅上體日在上日之明也因􅀄六豐九四曰幽不明者日在西而隱伏也大有賁同人明夷曰文明者離居二五也坤爲文又爲光者日月之明无所不及也孟子曰日月有明容光必照管輅曰日中爲光易九言光者皆明之所及也坤之化光者舎坎離也觀之觀光者四五交也頥之光者四施􅀄也夬之光者離自下升也未濟之光者二五易也需光亨者大壯四之五日西月東四五得位也凡言未光者皆未能行也屯九五未之二也噬嗑九四噬六五而後光也􅀳上九反三自治而後光也夬九五中行上決而後光也萃九五之二而後光也凡言光明者兼體用也老子曰用其光復歸于明體用合一光明無盡履剛中正而不􅀝故離目下升光明不疚言无私照也謙以剛濟柔故坎自上降萬物化光言皆相見也艮行止動靜不失其時故坎離下濟其道光明言乆不息也凡言光大者其象與光明同曰大者指陽爻也坤曰光大者初三五也渙六四曰光大者二從四也咸九四可以光大者九也四來􅀄往則離坎成四往初來則離坎毀未光大也益自否之九四三變離坎而成益大者光也言光輝者日月之光揮散也言暉者主離日也管輅曰朝日爲暉或曰星辰何象也曰艮離也邵雍曰離爲星賁艮上離下􅂏曰柔來文剛又曰分剛上而文柔天文也班固曰隂陽之精其本在地張衡曰地有山嶽精鍾爲星盖星辰者地之精氣上發乎天而有光耀者也星日之餘也辰月之餘也月生於日之所照也衆星􅀍耀因水轉光三辰同形隂陽相配其體則艮也河洛篇曰天中極星崑崙之墟天門明堂太山之精中挺三台也五靈諸侯也岍􅄮荆山壷口雷首太嶽砥枉東方之宿也析城王屋太行􅁪山碣石西傾朱圉北方之宿也鳥䑕太華熊耳外方桐柏嶓􅃁陪尾西方之宿也荆山内方大別岷山衡山九江敷淺原南方之宿也九隘之險九河之曲瀁水三危汶江九折上爲列星諸賢之論不詭於經矣故精斁氣歇坎極離見乃有隕星其光燭地者離也隕而成石或爲阜堆塵沙者艮也電陽光雷陽聲陽自子息而至春分四陽成大壯雷乃發聲後五日始電隂自午消而至秋分四隂成觀雷乃収聲電亦不作震動也不動則聲光何由而發笑者目動怒者目光􅌨髮而鳴者有光振衣有聲者有光離震交也噬嗑豐離震合也戞竹鑚木兩石相擊其火必出動極也子雲曰觀雷觀火爲􅄹爲實天収其聲地藏其熱􅄹實者陽息也震與兊交離與坎交故雷電而雨降爲中女爲甲胄者離外實中虚有甲之象在上爲胄在下爲甲先儒謂巽爲繩繕甲也爲戈兵者乾爲金離火煆之火銳上戈兵也兵有五言兵則五兵具矣同人解夬萃曰戎者戈兵戎器也噬嗑旅言矢乾金火煅銳上爲鏃巽木爲幹加於坎弓之上矢也旅巽言斧者兊爲決斷也歸妹言刲者交兊金爲刀兵也小過言戕者外殺也謙旣濟未濟言伐者自上伐下入其險阻也謙又言侵伐者侵削其地而後伐也子曰萃无離也何以除戎器曰原其始也臨變明夷大過萃自小過離變坎兊巽坎爲㨂有簡治弊惡修繕戎兵之象或曰制器者尚象􅃖尤鑄兵亦知取象乎曰􅃖􅀹不能也夫子曰􅃖尤惽慾无厭者也何器之能作蜂蠆挾螫而生見害而校以衛厥身者也人生有喜怒故兵之作與民俱生爲大腹者坤爲腹有容也坤二五易乾成離陽爲大故爲大腹内虚外堅實大腹之象大有九四動非大腹也曰匪其彭明夷九四之三震爲左曰左腹井九二坤腹器有兊口離大腹曰罋漸九三坎夫離婦與四相易坎往離毀曰婦孕不育離燥故爲乾卦於日爲烜於木爲槁漸􅀄六艮動成離之二坎水之傍乾而可止厓也厓謂之干震其究爲乾故曰其䆒爲健巽其究爲震故曰其究爲燥卦卦變也觀此二卦則知乾坤坎離艮兊其究皆變乾健獨不言卦者无非乾也爲鼈爲蟹爲蠃爲蚌爲􅀛五者皆大腹離也爲鼈者離交巽也巽位巳巳爲虵故虵或化鼈虵鳴而鼈應爲黿者交乾也郭璞筮遇需之復曰鼉也爲蟹者巽交離也蟹連兩目重離也託於虵鱓之穴亦巽也鼈蟹其中皆黃坤之二五乎璞筮遇咸之井曰東方當有蟹食稼咸巽井離坎兊變震也爲蠃者兊交離也附蠃生於池澤蝸生於暑雨螺生於月旋震六二旅六二九四巽上九兊九四噬嗑六二變皆兊交離也爲蚌者離交坎也千歳之燕爲蛤雀爲蛤伏翼爲蛤雉爲蜃鵰爲蠣方諸泣月􅑕胎含珠離坎也爲􅀛者坎交離也北方玄枵之次爲􅀛虵故􅀛游山澤出入水火含神􅀒智得坎離之正乎頥損益三卦皆然其於木也爲科上槁康節論木曰枝幹土石也故歳不易葉花水火也故歳易橫渠曰離爲乾卦其於木也爲科上槁附而燥也然則橫渠所謂附而燥即康節所謂葉花也鄭康成曰科上者隂在内爲疾虞翻曰巽蟲食心故上槁宋􅂨孔頴逹以科爲空中然則諸儒又以科上蟲病爲槁矣爲牧牛者坤爲牛艮爲小子艮坤變離牧牛也謙􅀄六變九是巳坤變離柔麗中正畜之以剛正畜牛也離六二六五是巳牧者以柔養剛畜者以剛制柔王洙本作牝牛艮爲山爲徑路爲小石爲門闕爲果蓏爲閽寺爲指爲狗爲䑕爲黔喙之屬其於木也爲堅多節艮積於下止於上二隂含陽土石聚焉蒙賁剥大畜頥艮咸遯蹇漸旅皆曰山以三畫卦言也爲丘爲陵爲陸者以重卦言也髙平曰陸大陸曰阜大阜曰陵而丘有一成再成三成如昆侖亦曰丘故重艮以三爲陸四爲陵五爲丘上爲山太玄九地七爲下山八爲中山九爲上山準易也漸九三艮漸坤髙者平矣髙平曰陸上九動成六六降九升亦髙者平也同人九三動以四爲陵震六二以四爲陵漸五應二而歷四三亦曰陵賁六五頥六二拂五渙四以五皆曰丘隨上六升六四以九三升而之上皆曰山坎五艮言丘陵足矣又曰山川丘陵者坎變則蒙極其險言之五行以艮爲土太玄以山爲金者山土石也石者土之實故爲土石金􅀋也故又爲金震爲大途動而行莫之止也交艮爲徑路止而行行而止也艮者震之反山徑之蹊則行者改歩矣又爲巷者通乎家以逹内外二爲家山土石也水流山則土去而石見故艮坎爲石爲小石豫六二以四爲石是也困六二否艮交坎故困于石漸六二曰磐者二五相易坎變巽艮艮爲石也闢乾爲門闔坤爲戸艮土東北當啓閉之際門闕也艮爲宗廟者六也一六坎也坎者􅀑之所歸太􅀇以一六爲廟故艮爲門闕在宗廟之位爲廟萃震渙損是也爲宫者止於中也太一出陽入隂息于中宫坎艮坤爲宫在旅爲次在野爲廬又爲牗者宫之戸坎其傍以通明也故艮坤坎離爲牗巽爲草木艮陽止也止於上爲果止於下爲蓏蓏􅀲瓠之屬乾爲圜爲閽寺者閽守門者也寺守巷者也郭璞筮遇豫之小過曰當有羣魚入州城寺舎言小過艮也艮爲手又爲指者在上体爲手指止者動也在下体爲足指者動者止也震動艮止相反也曰趾者趾在下体之下鼎足亦謂之趾噬嗑􅀄九賁􅀄九鼎􅀄六艮􅀄六三爻以􅀄應四皆艮止震動而在下体之下故曰趾或曰大壯夬􅀄九何取於艮曰大壯遯之反也遯艮爲指反而成震爲足指夬即大壯積而成剛故曰壯于前趾前趾謂大壯也趾又謂之􅡑者􅡑足大指也拇手大指也陽爲大咸􅀄六感九四解九四應􅀄六皆以隂変陽而解者蹇之反解震即蹇艮也爲狗上言艮爲狗者狗馬之狗也此言爲狗者熊虎子字當作豿爾雅曰熊虎醜其子狗盖虎子未有文猶狗也虞翻馬融郭璞以兊艮爲虎艮者寅位也艮䆒成兊故艮爲虎子又爲黔喙之属成兊則坤交乾而有文矣爲䑕者艮交坎也天文虚爲䑕玉衡之星爲䑕其艮之九三爻乎􅀳九四是也郭璞筮遇咸之井曰東方當有蟹䑕爲災亦艮坎也坎虚在子故子爲䑕晝止者艮也夜動者坎也穴􅁟者艮也隱伏而􅀼者坎也蠏或化䑕焚蠏致䑕坎離交也艮反爲震故有縁木之䑕坎極成離故有飛䑕火䑕豹文之鼠鳥䑕同穴者坎離之合乎鼷䑕食牛者水土相傷乎傳曰曽磎之䑕氷下出焉是亦艮坎而已爲黔喙之属者坎爲玄坎変艮則玄在前故鄭康成曰取其爲山獸寅爲虎貍亦是也寅即艮也屯九三艮震爲鹿角者艮之陽蹄者震之陽躁者震也止而伏者艮也隂生而鹿角解震反巽也陽生而麋角解巽反震也麋鹿􅀋也故麋與鹿游龍震也故鹿與龍游劉牧曰鹿性決躁其角反生震象也頥九四革九五兊艮爲虎上六爲豹解九二未濟艮坎爲狐或曰艮兊一也革上六何以爲豹曰上六隂爻離九三文之過也天文箕爲豹尾爲虎同在艮履何取於艮乎曰伏艮也其於木也爲堅多節者坤爲衆多堅節乹剛也三索故多節否九五堅多節之木在田上上玄下黄桑也郭璞筮遇家人之蒙巽変艮爲髙松松堅多節也爲鼻者傳曰鼻者靣之山兊爲口山澤通氣故鼻口相爲用噬嗑六二動故噬膚㓕鼻睽六三艮成兊形其鼻也故其人天且劓或爲膚爲皮革者皮兼肌言之曰膚肌其隂也肉爲隂充其膚者陽氣也馬融曰柔脆肥美曰膚皮者捨肉而言革則堅矣通鳥獸言之艮之陽也爲虎爲狐兊爲澤爲少女爲巫爲口舌爲毀折爲附決其於地也爲剛鹵爲妾爲羊澤者水之聚二陽沈於下一隂見於上乾陽爲美陽沈於下鍾美矣太玄之沈曰隂懷于陽陽懷于隂在志玄宫然坎兊一也故坎壅成澤澤決成川爲少女爲巫者兊変巽兊爲口尚口而巽進且退者巫也巽九二是也或爲史升而爲史降而爲巫尚口則一也爲口者􅀃見於外也爲舌者動於内也口爲言太玄四八爲金於五事爲言爲辭者言成文也乾三動成兊離是也􅀏者目動而聲岀於口故兊離又爲􅀏爲嘻嘻者􅀏无節也嗟者憂而發於聲也􅀏者得位得應喜而後􅀏也嗟者失位失應憂而後嗟也號者大聲出於口也故兊巽爲號巽爲風風者天之號令風鳴竅穴有號呼之象號咷者號哭之聲號呼而又有哭象也告者決之也或取決於彼戒者告戒也問者有所疑也允者口順從也愬者恐懼而愬也食者口就之也不食者口不應也明夷􅀄六可食而不食者義不食也頥爲求口實者兊変臨也咸九五曰脢者口之下心之上也爲毀折者隂見則陽毀隂升則陽折物極而窮噬嗑六二上九爲减離九四爲棄毀也豐大象九三離上九之五鼎四之􅀄爲折㤗兊変賁之離坎艮爲无敢折獄又爲刑殺者兊正秋也変坎爲刑自決有罪言之坎爲獄自屠畜言之坎爲血故蒙􅀄六曰刑人豐曰致刑歸妺曰刲旣濟曰殺萃獨曰用大牲者有殺牛之象无坎血也爲附者兊反艮也爲決者兊也隂盛陽微則陽附隂陽盛隂微則陽決隂剥一陽五隂故曰山附於地夬一隂五陽故曰剛決柔也或附或決時也其於地也爲剛鹵者水動而徃剛留于澤爲鹵剛而柔爲沙需之九二是也水畜于澤下爲鹹鹹无水亦爲鹵困之大象是也主父偃所謂地固澤鹹鹵不生五榖鹹亦謂之鹵鹹生鹵也鹹澤之下成玄精洞穴中水凝爲鍾乳黃帝書曰溼化生金石虞翻曰乾二陽在下故剛澤水潤下故鹹沙水中之陽陽動而水泉動水動生沙剛其陽也柔者散而未聚也沙聚成石沙石生金兊反爲艮艮兊之陽皆乾醫書寒入水府爲沙石寒亦乾也爲妾者遯九三兊女伏於下與艮同位艮小子坤爲臣臣僕也故以伏兊爲妾六四兊來奔初爲妾自初言之得妾也傳曰聘則爲妻奔則爲妾巽離女也兊獨爲妾者娶論年德而得妾者以其子故常少爲羊鄭康成夲作陽虞翻夲作羔今從鄭鄭曰此陽謂爲養无家女行賃炊爨今時有之賤於妾也按爾雅陽予也郭璞引魯詩曰陽如之何又曰今巴濮之人自呼阿陽璞筮遇咸之漸曰兊爲賤女戯倒隂陽盖咸兊変巽隂陽顚倒遯九三鼎初六之四爻位皆正咸漸之変爻位不正故爲賤妾陽妾之賤者也歸妹六三兊女不正爲須須賤女陽之象平爲常先儒謂西方之神誤也當在坤後簡編錯亂耳易坤爲常以隂從陽常也地從天子從父臣從君婦從夫少從長卑從尊故坤順得常又曰後得主而有常也六二二五相易十年乃字爲反常需初九需于郊不犯難行須六四下交而後行師六四隂從陽當順九二知其不可変而反次皆曰未失常爲輔頰乾艮爲輔乾爲首艮止於上輔也又爲輔頰者連兊也而恱於首頰面頰也周易􅀃卦傳第九周易
