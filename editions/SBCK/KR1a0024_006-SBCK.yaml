front:
  text: 道上行之四得位處二陽之際上巽於五下巽於三三爻皆正而相得故田􅀗三品古之田者上殺中殺下殺爲三品三品則徧及於上下兊有刑殺之意而又伏艮爲黔喙之屬巽爲雞離爲雉爲三品以巽事上臨下上下與之巽而有功雖无應也乗承皆剛也其悔亡矣故曰有功也易傳曰天下之事苟善處則悔可以有功矣九五貞吉悔亡无不利无初有終先庚三日後庚三日吉象曰九五之吉位正中也九五君位而正中巽爲號令有申命之象故舉全卦以盡一爻之義五无應冝有悔正故悔亡動則二應之二五皆正故无不利初二不正始未善也五正善而有終也无初故申命申命則有終初未善也故巽以命之先庚三日變家人變益之時也下三爻震震納庚離爲日先於此庚之使善也後庚三日變噬嗑變震之時也震納庚離爲日後於此庚之慮其未尽
