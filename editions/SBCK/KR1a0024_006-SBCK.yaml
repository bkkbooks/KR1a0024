body:
  text: 善也先庚後庚主於中正也十日之次以戊已爲中過中則變故庚謂之更更而正中正則吉此九五之所以吉歟蠱卦六五柔故爲蠱巽九五剛乃有更變之善更天下之弊其唯剛中乎上九巽在牀下喪其資斧貞凶象曰巽在牀下上窮也喪其資斧正乎凶也上九以巽而居髙位處之不當窮則變而反下三以重剛乗之巽股變艮手有恐懼自失而蒲伏于牀下之象故曰巽在牀下離兊爲蠃具爲資所以利也離爲兵巽爲木貫之爲斧所以斷也上窮反三離兊巽毀故曰喪其資斧喪其所以利則莫或愛之喪其所以斷則莫或畏之正乎凶矣上復位遇坎險正凶也魯自襄公三家分其民其君四丗從之至昭公失國无所竄伏盖處上極巽盡亡其資斧乃正凶也方自失之初告之以凶詎肯信乎􅰓兊下兊上兊亨利貞􅂏曰兊􅀃也剛中而柔外􅀃以利貞是以順乎天而應乎人􅀃以先民民忘其勞􅀃以犯難民忘其死􅀃之大民勸矣哉兊以一隂居二陽之上隂􅀃於陽而見乎外者也兊巽之反初六之上六四之三柔􅀃於外二五不失其中以􅀃行剛而剛柔皆亨故曰兊亨􅂏曰兊􅀃也此合兩體卦變而言兊也剛中則實柔外則接物以和􅀃而正則和而不流卦九五剛中而正九二剛中而又戒之以利貞者二三四不正不正則䧟於邪謟悔吝將至故􅀃道利正非道求􅀃不利也亦何由亨哉故曰剛中而柔外􅀃以利貞此以兩體六爻言兊也乾天也上五天位也坤順也􅀄六之上而􅀃順乎天也三四人位也六四九三相易而􅀃應乎人也天人殊位順乎天者而在於應乎人而巳天之􅀃萬物隂陽相􅀃降而爲澤􅀃之非其時則亦不能􅀃矣湯武之征伐出其民於水火之中而民大􅀃是所以順天也知人則知天知天則知􅀃之道故曰順乎天而應乎人此以上六六三兩爻而言兊也坤爲衆民也坎爲勞兊決坎爲大川險難也坤爲死以内卦言兊先於坤􅀃以先民也坤衆從之兊見坎伏民忘其勞也以外卦言之巽股而渉大川之險坤化爲兊民忘其死也夫就佚辭勞好生惡死民之常情用之以􅀃乃忘四體之勤決一旦之命而不頋非􅀃之以道能如是乎古之人有行之者周公之東征是也故曰􅀃以先民民忘其勞􅀃以犯難民忘其死民和則氣和氣和則天地之和應􅀃之大天地不能違而況於民乎故曰民勸矣哉此再合两體兼伏爻而言兊也在卦氣爲秋分故太玄凖之以沈象曰麗澤兊君子以朋友講習麗連比也澤水所鍾兩澤相麗重􅀃也􅀃之大者也天下之可􅀃而无斁者无􅀂朋友講習之爲大也易傳曰兩澤相麗玄有滋益朋友講習玄相益也兊與兊同􅀋爲朋􅀄上五始終以正相助爲友兊爲口爲講兩兊爲習九五􅀄九之君子以朋友講其所知習其所行相滋相益體麗澤之象􅀄九和兊吉象曰和兊之吉行未疑也􅀄九剛而處􅀃无偏係之私能可否相濟者也故曰和兊九四疾惡六三小人然體巽不果不果疑也􅀄九動而上行以濟其決而巽毀九四相易六亦得位而正正則吉故曰和兊吉􅀄九逺於六三无嫌於􅀃小人九四未疑也是以能濟其決否則四疑矣􅀳訾祐實直而博范宣子朝夕顧之以問國事不正其身未有能決人之疑者故曰和兊之吉行未疑也九二孚兊吉悔亡象曰孚兊之吉信志也六三小人非道來􅀃九二比之以陽􅀃隂冝有悔且凶九二誠實自信於中動則九五應之信孚于人乆矣雖比於小人和而不同矣何疑於相比哉始雖未孚終必相􅀃二動而正正則吉而悔亡故曰孚兊之吉信志也夫石碏石厚父子也叔向叔魚兄弟也子産伯有同族也雖比也豈能􅀃之易傳曰志存誠信豈至􅀃小人而自失乎六三來兊凶象曰來兊之凶位不當也兊巽之反􅀄二三皆自外來柔不當位而乗剛來􅀃於二􅀃之不以道者也故曰來兊三髙位也柔邪而􅀃髙位凶矣故曰來兊凶楚費无忘漢息夫躬唐伾文乎九四啇兊未寜介疾有喜象曰九四之喜有慶也離兊爲羸具貨財也四動離爲震噬嗑爲市之象巽變之其於市也爲利三倍啇賈之象啇賈度利而動故又爲啇度之象動承坎坎勞卦勞未寧也啇兊未寜者擬議所從度利而未定者乎介者陽剛介于三五之間也從五正也從三不正也隂陽失位爲疾九四陽失位六二隂失位九四以君子疾小人六三以小人疾君子九四冝有憂矣而有喜九五陽得位爲喜四疾六三不與之交動而正上從於五則君臣相􅀃而有喜矣夫唐虞文武之際得人爲盛而四族三叔未甞不疾君子然不害爲治者從君子而不從小人可不慎其所從乎易傳曰􅀂剛介守正疾逺邪惡將得君行道福慶及物爲有喜也􅀂四者得失未有定繫所從耳九五孚于剥有厲象曰孚于剥位正當也隂消陽也六三在下進而上則四五消有剥牀之象故六三謂之剥九五正天位有剛徤中正之德當乎位位與德非不足也然孚于六三之小人則九五危矣六三取􅀃而巳无獻可替否之義小人道長則君子之道曰消安得不危易傳曰巧言令色孔壬舜且畏之其可忽諸上六引兊象曰上六引兊未光也上􅀃道之成六正巳輔九五剛徤中正之君冝有膏澤下於民而未光何也以引六三之小人也三巽爲繩離爲光上六之􅀃三相引之如舉繩然爲山一簣之虧也此所以未光歟六三兊之小人也故􅀄九剛正者不疑於三而行也九二剛中不比於三也而悔士九四以三爲疾九五孚于三而厲上六引三而一未光小人以􅀃進而爲害其可不慮乎􅭮坎下巽上渙亨王假有廟利渉大川利貞􅂏曰渙亨剛來而不窮柔得位乎外而上同五假有廟王乃在中也利渉大川乗木有功也渙否九四之變也險難離散否塞解釋剛柔皆亨故曰渙亨此以卦變言乎渙也九二之剛自四而來動於險中二隂不能䧟解難散險又處之以中者也險豈能窮之哉五得中道出乎險外六四之柔自二而徃正位乎外而以巽順上同於五君臣恊比能守其中者也天下之難患處之者不以道及其出險又或不以道守之則亂者不解解者復亂二五之剛四之柔處之守之皆不失中故曰剛來而不窮柔得位乎外而上同此以二四五三爻言渙之才所以致亨也天下離散不安其居者夲於人心失中􅀑神依人而行離散則􅀑神不饗聖人推原其本將以聚之故建國設官以爲民極而宗廟爲先宗廟者収其心之渙散而存之也人孰不有父母知報本則知祭祀出於人心復其本心則離散者可合而天下無事矣治渙之道也假至也謂五也上爲宗廟艮爲門闕五王位中者心之位九五有入于門闕至宗廟得人心而存之之象易傳曰卦之才皆主於中王者極渙之道在得其中而巳故曰王假有廟王乃在中也此再以九五而言渙之才也利貞者五也坎爲大川巽爲木爲股據正體巽四二皆爲我用以之濟難而功歸於五言乗木有功則利貞在其中矣合天下之離散非正其可乎故曰利渉大川利貞􅂏曰乗木有功也此再以九五二四吉渙之才也易言木者三益渙中孚存五行也在卦氣爲六月故太玄準之以文象曰風行水上渙先王以享于帝立廟風行水上渙然離散之象離散之時天下之險難方作先王以是享于上帝以一天下之心使知无二主也立廟以合天下之渙散則人知反本􅀑有所歸享于帝立廟離散者一矣帝乾上九也上又爲宗廟巽股爲立坤爲牛坎爲血享于帝也觀此則知魯用郊􅀳祀夏郊魯有周廟鄭有厲王之廟非先王意也秦位在藩臣臚於郊祀天子不能制反致文武胙卒併天下楊雄曰僣莫僣於祭祭莫重於地地莫重於天雄其知渙之􅀃矣􅀄六用拯馬壯吉象曰􅀄六之吉順也虞翻陸震本作壯吉悔亡拯古本作抍音承舉也六四得位近君正而巽可以濟渙然莫或助之􅀄欲抍四才柔位下而在坎中且四不相應乃捨四用二用二乃所以抍四也二剛中之才坎爲美脊之馬􅀄二相易成震震爲作足馬美脊而作足馬之壯徤者也四艮爲手震爲起起手以承六四抍之象易則足以資六四之剛而載其上矣故曰用拯馬壯吉正則吉而悔亡􅀄六處不當位本有悔也六坤柔順以隂求陽始渙而拯之亦順也故曰􅀄六之吉順也五爻皆言渙􅀄獨不言易傳曰渙離之勢辨之冝早方渙而拯之不至於渙也九二渙奔其机悔亡象曰渙奔其机得願也四巽爲木坎爲揉震爲足艮爲手在上体爲肱揉木令曲而有足肱據其上机也二四合乃有此象二有剛中之才處險而不當位冝有悔二能奮身出險上奔於四四來慿之以安机慿之以安者也是以悔亡震足動奔也故曰奔其机二本否四在二者渙散之時也二之情不忘乎四猶逃空之人不忘故國奔則得中心之所欲二中者心之位也故曰得願也六三渙其躬无悔象曰渙其躬志在外也所以致渙者險在内也四五濟險之位六三處不當位近險冝有悔然不與險爭動而之上自脫於險非拯時之渙以濟人者也其正躬卑巽以逺於悔者乎坤爲身三上相易折坤成巽離目視下鞠躬之象故曰渙其躬无悔象曰志在外也之外則无悔三上合而得正也蘧伯玉聞衛亂而之近􅀜杜􅂥葬叔孫豹而行之時乎六四渙其羣元吉渙有丘匪夷所思象曰渙其羣元吉光大也坤爲衆渙三隂羣也四巽順而正居近君之位上以巽乎五下以巽乎二二剛中有濟渙之才而二隂比之四屈己濟難與衆同患得九二之助隂服矣則散者合異者同共圗天下之渙是以元吉元吉則濟渙之志光且大矣坎爲光陽爲大也渙之時用剛則不足以懷之用柔則不足以制之四二協力剛柔共濟渙而至於羣天下始可以聚矣五艮爲山半山爲丘丘聚也六四得九二以合其羣其心思之所存者在五五得位羣隂之所聚如物之聚於丘五中正善羣然非四合之亦不得而羣矣四視二隂等夷也四正􅀄與三不正坤土思也所思匪若二隂之所思不正故九二爲用二隂服之否則渙散矣其能效美於君有丘之實乎故曰渙有丘匪夷所思宣王承厲王之後天下離散召伯之徒佐王建國親諸侯遣使勞來安集渙其羣也九五渙汗其大號渙王居无咎象曰王居无咎正位也有疾者閉塞不通陽降隂升浹於腠理否者亨矣否乾降二坤隂升四降者成坎坎水浹于上下汗出之象號令如之巽爲號陽爲太九五出號令者也故曰渙汗其大號五至三體升有風行地上省方設教之象能發新命以順民上下交通險難解釋渙汗其大號也渙時民思其主故王居正位乃无咎在他時安居不能順動則有咎矣故禹別九州而終於兾湯勝夏而歸于亳武勝商而至于豐王正位則渙散者知所歸矣乾五爲王艮爲居止也得正則无咎然九五非六四之賢與上同志安能發大號居其所而治哉易傳曰再言渙者上爲渙之時下處渙如此爲无咎上九渙其血去逖出无咎象曰渙其血逺害也先儒讀渙其血作一句去逖出作一句以象考之當從先儒九二坎乾爲血血者相傷之象渙五爻不應上九獨應六三六三近險見傷上九下應之三上相易上復成坎而傷故曰渙其血言上三俱傷也上九能去六三逺出乎險之外自處以巽不䧟於險則是去而逺害於義无咎逖逺也故曰渙其血去逖出无咎一本作去惕出巽爲多白眼有惕懼之象然象曰逺害當從逖矣渙時以合渙爲功上九居不用之地故逺害无咎係於六三而不去其傷自取也若施之用事之地則有咎仲由死於衛季羔避禍而去一也􅬲兊下坎上節亨苦節不可貞􅂏曰節亨剛柔分而剛得中苦節不可貞其道窮也􅀃以行險當位以節中正以通天地節而四時成節以制度不傷財不害民節渙之反㤗之變也㤗分九三之五以節其上之柔分六五之三以節其下之剛剛柔分而有節二五之剛得中上下節之而不過所謂節者剛柔有節而不過乎中不過則亨故曰節亨剛柔分而剛得中不曰柔得中者剛得中則柔不過矣此以卦變二三五爻言節之所以亨也上六乗剛處險守而不變所以不可貞者節之道窮也易窮則變變則通通則乆守而不變苦節也凡物過則苦味之過正形之過勞心之過思皆曰苦苦節則違情性之正物不能堪豈道也哉申屠狄之㓗陳仲子之廉非不正也立節太苦不可貞也夫節者爲其過於中也故節之使不失其中上六正而過矣安能節乎故曰道之不行也我知之矣賢者過之不肖者不及也自不肖觀之過者爲賢自中言之過不及一也謂之正者貴乎中正也正而失中不可正也故曰苦節不可貞其道窮也此以上六无應戒苦節也兊􅀃也坎險也人情易則行險則止凡止而行皆有險之道節止而不行者也泰之九三上行自兊成坎以􅀃行險也以􅀃行險雖止不失其和矣和而不流中立而不􅀝故曰􅀃以行險此以九五言節之亨也九五節之位也中正節之道也當位以中正爲上下之節各適其冝无所不行故曰當位以節中正以通此以九五言節亨者當有位也九三一變歸姝震爲春離爲夏節之以春夏也再變節兊爲秋坎爲冬節之以秋冬也天地有節則隂陽寒暑不過而萬物成於艮故曰天地節而四時成離兊爲貝貝爲財乾爲金玉坤爲民泰甚則人欲縱人欲縱則財用匱乏百姓困窮故量財之所入計民之所用節以制度自下等級而上其費有經其歛有法財旣不傷民亦不害是以天地不節則四時不成王者不節則民財不生无非節亨也故曰節以制度不傷財不害民此又推原卦變玄體以盡節之義也在卦氣爲七月故太玄準之以度象曰澤上有水節君子以制數度議德行澤之容水固有限量虚則納之滿則泄之水以澤爲節也君子於民亦然制其多寡制其隆殺制數度也制數度者坎之象也律度量衡皆始於黃鍾冬至之律於辰爲子於卦爲坎九五以中正爲節也乾爲德震爲行兊口爲議議德行者恐其中而未正也易傳曰議謂商度求中節也􅀄九不出戸庭无咎象曰不出戸庭知通塞也􅀄九六四正應也徃來相易不窮故曰通九二近而不相得窒其所行故曰塞􅀄九兊體剛決動成坎坎水爲知故知通塞五艮爲門闕交兊爲戸四在門闕之中爲庭不出者自守以正而已動有險故不出戸庭乃无咎不出則處也在言語則黙亦是也不出而處不語而黙雖有正應不􅀃也是之謂節兊爲口舌故繫辭專以慎宻不出言之易傳曰通則行塞則止義當出則出矣君子貞而不諒或曰艮爲門闕又曰交兊爲戸何也曰兊爲戸震爲門艮土在啓閉之際故爲門闕乾始於子至􅐫直艮至寅成泰泰者天地交通至夘直震故震交艮爲門震即乾之闢戸也是以雷發聲蟄蟲開戸坤始於午至未直坤至申成否否者天地閉塞至酉直兊故兊交艮爲戸兊即坤之闔戸也是以雷收聲蟄蟲坏戸九二不出門庭凶象曰不出門庭失時極也極至中也二動歷四應五成震震爲門四在門闕之中爲庭二以中應五之中極也當其可之謂時故曰時極時極者時中也九五剛中當位酌民情以爲節九二有剛中之德動而應以趨節之時則中正之節逹于下矣得時極也􅀂􅀃於三隂與五異趨固而不知變門庭可出而不出是得時極而自失之也所以凶者其節不正也故聖人戒之六三不節􅀂則嗟􅀂无咎象曰不節之嗟又誰咎也六三柔不當位􅀃而失中不能節之以剛者也有子曰知和而和不以禮節之亦不可行也三不能節則乗剛失位以􅀃從人而巳不能堪焉故憂發於口咨嗟而巳三變而剛剛不失節而上自應夫何憂哉易傳曰節可以免過而不能自節以致可嗟將誰咎乎此爻與離之九三不鼓缶而歌則大耋之嗟凶象累而意同六四安節亨象曰安節之亨承上道也節止也凡止物有險之道險非人情之所安上三爻皆處險六四當位履正安於處險以順承上而止物焉安於節也六四能安於節者以承上中正之道以此節下下必應之節道行乎上下而亨亨則通矣非中正豈能安其節哉易傳曰節以安爲善強守而不安則不能常豈能亨也九五甘節吉往有尚象曰甘節之吉居位中也節者理之不可得而過者也九五居位以中爲制節之主安行於上而不動甘節也五自泰九三變以􅀃行險有甘之意先王建國宅中均道里制􅀖域之時乎正則吉二􅀃從之往有尚也尚配也往有配乎中也詩曰商邑翼翼四方之極往有尚也故九二不出門庭凶􅂏言當位以節中正以通爻止言居位中何也􅂏言九五一爻此言九五九二相易也易傳曰巳則安行天下則􅀃從節之至善者也上六苦節貞凶悔亡象曰苦節貞凶其道窮也節過乎中居險之極人所不堪下无􅀃而應之者苦節也不可貞貞則凶其道窮也上九固守乎正不知俯而就中則悔亡五中也悔則窮能悔則亡凶矣易傳曰悔亡損過從中之謂也節之悔亡與他卦之悔亡辭同而意異􅫷兊下巽上中孚豚魚吉利渉大川利貞􅂏曰中孚柔在内而剛得中􅀃而巽孚乃化􅀖也豚魚吉信及豚魚也利渉大川乗木舟虚也中孚以利貞乃應乎天也中孚自遯來訟之變也二五不應六三孚于上六四孚于下二爻在中而孚中孚也易傳曰中孚者信之本中實者信之質夫信之未彰无形矣其中巳有信也非中虚乎静而正發而當反諸已而不怍斷然如金石之不可易非中實乎故曰柔在内而剛得中此以三四二五言中孚也上巽施之下􅀃從之巽􅀃相與不期於孚而孚焉猶鳥之孚􅆑也巽伏於上􅀃從於下不動而柔者化剛者應拚然而飛矣化􅀖之道不幾於是乎坤在上爲􅀖國外巽内􅀃感之以誠信乆而自化不爲而成也其象巽離化坤巽離者萬物化成之時故曰􅀃而巽孚乃化􅀖也此揔六爻而言中孚也豚魚六四也中孚六四即訟坎之􅀄坎爲豕其􅀄爲豚三兊爲澤四巽乎澤爲魚六四一爻具豚魚之象而在中孚之中信及豚魚也先王之交萬物无非信也取之必有時用之必有節風有騶虞信及豚也頌有潜信及魚也動物之蕃息者莫如豚魚信及豚魚上下草木鳥獸无所不及而至誠之道可以賛天地之化育如是乃吉六四正也正則吉信至於賞罰而示之者末矣非心服也其終必凶故曰豚魚吉􅂏曰信及豚魚也此以六四言中孚也坎爲險難􅀄越二三渉坎成巽巽爲股渉大川也兊澤而爲大川決而成川也巽爲木兊金刳其中舟虚也舟虚者中虚之象九五體巽其中虚不以好惡之私累其心其下􅀃而不違利以濟難也夫乗木之利乗桴不如乗舟重載而乗險者不如虚舟之爲安仗誠信而蹈大難猶乗木而其中枵然豈復有風波之虞哉古之人虚巳逰丗五兵兕虎不能害用此道也故曰利渉大川乗木舟虚也此以四五言中孚之功也天之道不言而善信四時自成萬物自生正而巳矣正誠也六四之正乃應乎天者以其心正其心正則其意誠乃應於天之道非人爲也故曰中孚以利貞乃應乎天也此以六四􅀄九相應言中孚也􅀄九本九四乾在上爲天之象在卦氣爲冬至故太􅀇凖之以中象曰澤上有風中孚君子以議獄緩死澤上有風澤中應之中孚也中乎信也中孚自訟變坎爲獄九四之􅀄坎成兊兊爲口議獄也議獄者議其獄情之正否也艮六變成中孚艮體盡矣爲㳺魂㳺魂死之象震爲反生緩死也緩死者未必死也君子議獄緩死則好生之德孚于上下矣傳曰冬至四十五日條風至出輕刑解稽留法此象乎􅀄九虞吉有它不燕象曰􅀄九虞吉志未變也中孚之􅀄戒在審慎其所信初九六四正應也初冝信四而初四相易以失位爲憂以其有憂也故虞度之虞乃不失其正應故吉虞度而得其所從冝誠一不貳有它則擇利而動心无所主惑矣燕謂三也雷在澤中有燕息之象三非􅀄之正應􅀄與三同體􅀃乎隂而往應之爲有它􅀄之三歸妹象毀而不燕以其貳也初九所以虞吉者得其所從其志未變於三變於三矣何燕之有九二嗚鶴在隂其子和之我有好爵吾與爾靡之象曰其子和之中心願也訟離爲飛烏變震爲鶴􅀃卦震爲鵠鵠古鶴字也穆天子傳列子皆以鵠爲鶴鶴震聲感兊鳴於正秋九二之象也九二剛實而中中孚之至者九居二鳴鶴在隂也坤爲母巽四爲子四與二同體震而九二陽爲大六四隂爲小故四有子之象二四志同二鳴而四和二中也四亦中虚心之象其應豈強爲哉出干中心願而巳矣荀子所謂同焉者合􅀋焉者應故曰其子和之中心願也巽爲命五出命者也陽爲美好好爵者爵命之美吾四自謂也我四謂五猶曰我君也爾親乎二也二誠于中四自和之􅀂曰我君有好爵吾與爾共靡之非二有求於四也四於五其䟽附之臣乎靡子夏傳陸績作縻巽爲繩縻繫之象當作縻孟子曰我善養吾浩然之氣莊子曰吾无食我无糧古人文章相錯而成此爻所謂我吾亦然易傳曰至誠无逺近幽深之間唯知道者識之六三得敵或鼔或罷或泣或歌象曰或鼔或罷位不當也敵者􅀔均而不相下也艮之􅂏曰上下敵應不相與也言六爻􅀔均當應而否故子夏傳曰三與四爲敵蓋三四同躰而異意近而不相得六三不正小人也六四正君子也三小人不見信於君子而志在得四四終不可得震爲鼔三動鼔而進將以張之也而四不應旣罷而退將以誘之也而四不來三動離爲目兊澤流目或泣以感之而四不憂巽爲長震爲聲兊口爲言長聲以永其言或歌以樂之而四不恱或鼔或罷或泣或歌小人之情狀盡矣四守正終莫得之處位不當无以取信於君子也豈能強得之哉六四月幾望馬匹亡无咎象曰馬匹亡絶􅀋上也四處當位近君其道上行成孚者也訟離爲日坎爲月坎變震月在東也離變兊日在西也月東日西望也五在中四爲幾望隂道之盛盛則敵君禍敗必至不可不戒古者駕車四馬兩服爲匹兩􅆖爲匹不能四馬則駕兩馬曰駢駢亦匹也四震爲作足馬四應􅀄成坎坎爲美脊之馬兩馬匹也震坎陽卦􅀋也四之上絶其􅀋而不應則馬匹亡矣孚道在一四上從五亡其匹則絶係應之私无敵君之禍易傳曰係􅀄則不進其能成孚乎九五有孚攣如无咎象曰有孚攣如位正當也九五在上六四在下君臣之位正也九五剛徤中正六四柔巽正而順君臣之德當乎位也五四君臣相孚上下固結如攣然相易以致用故无咎攣拘攣也五四相易有巽股艮手離目相就拘攣之象夫忠爲令德苟非其人不可君臣之際非位正德當其孚如是豈能无咎乎上九翰音登于天貞凶象曰翰音登于天何可長也巽爲雞剛其翰也柔其毛也翰羽翮也震爲聲上動反三成兊雞振其羽翮而後聲出于口翰音也乾五爲天六三往上隂爲虚翰音登于天也鳥之􅀋聲聞于天者鶴也雞无是實虚聲聞于上雖登于天湏􅁷則反其可長乎巽爲長三之上巽毀何可長也不信之極正乎其凶故曰貞凶張載曰信之无實窮上必凶􅯧艮下震上小過亨利貞可小事不可大事飛鳥遺之音不冝上冝下大吉􅂏曰小過小者過而亨也過以利貞與時行也柔得中是以小事吉也剛失位而不中是以不可大事也有飛鳥之象焉飛鳥遺之音不冝上冝下大吉上逆而下順也小過與中孚相易其卦四隂二陽陽爲大隂爲小小者過也六五過四而亨於外六二過三而亨於内盖事有失之於偏矯其失必待小有所過然後偏者反於中謂之過者比之常理則過也過反於中則其用不窮而亨矣故曰小過亨􅂏曰小者過而亨也此以四隂之中舉六二六五言小過也小過自臨來明夷變也臨九二之三六三之二成明夷二過乎三也明夷􅀄九之四成小過五過乎四也二過乎三正也五過乎四不正也不正者矯其失而過正也正者時所當過過所以就正也所謂時者臨之兊秋也震春也明夷之離夏也坎冬也小過之艮終始也過與時行而六二之正不動於六二不動乃能小過而亨利貞也君子制事以天下之正理所以小過者時而巳譬之寒或過於隂暑或過於陽冬裘夏􅁑无非正也故曰過以利貞與時行也此以六二言小過也二五之柔皆得中也五得中得尊位過而在上者也二得中得正過而在下者也巽爲事正則吉小過之道不以位之上下於小事有過而不失其正則吉柔得中也九四剛失位九三剛而不中震爲作陽爲大作大事非剛得位得中不能濟失位則无所用其剛不中則才過乎剛是以小過之時不可以作大事故曰小事吉不可作大事此以二三四五言小過也明夷離爲鳥􅀄徃之四自下而升有飛鳥之象四易坤成坤震震爲聲聲徃於上而止於下飛鳥遺音之象巽爲風飛鳥遺之音逆而上則難順而下則易上逆也故不冝上下順也故冝下小過之時事有時而當過所以從冝不可過越已甚然亦豈能過哉譬如飛鳥泝風決起而上騰其音安能逺過俄頃而止矣大者如是則吉不然必凶時不可犯也故曰有飛鳥之象焉飛烏遺之音不冝上冝下大吉此復以􅀄九之四言小過也中孚肖乾小過肖坤故二卦爲下篇之正鄭康成曰中孚爲陽貞於十一月子小過爲隂貞於六月未法於乾坤以卦氣言之爲立春故太玄凖之以差象曰山上有雷小過君子以行過乎恭喪過乎哀用過乎儉雷出地上其壯乗乾山上有雷小有所過也君子有時而小有所過者三巽乎上下而過行過乎恭也震巽爲號咷而上六過之喪過乎哀也巽爲髙坤爲吝嗇處髙而吝嗇逼下巳甚矣􅀄六過之用過乎儉也時當小過君子不得不小有所過以矯正一時之過考父之過恭髙柴之過哀晏平仲之過儉非過於理也小過乃所以爲時中也􅀄六飛烏以凶象曰飛烏以凶不可如何也明夷離爲烏􅀄之四飛烏也以如師能左右之曰以四動體而躁􅀄艮體不正柔而止不當過也有應在四爲四所以不當過而過其過至甚如飛烏迅疾雖欲救止不可如何其凶必矣坎爲可四以之坎毀不可也兊口如何也與鼎信如何也同象是謂惡成而不及改者易傳曰小人躁易而上應助過速且逺不容救止也六二過其祖遇其妣不及其君遇其臣无咎象曰不及其君臣不可過也三乾在上爲父四爲祖五坤隂居尊位配乎祖妣也曰祖曰妣旣過之稱六二中正祖尊也妣亦尊也祖不中正於義當過妣中而過之義不可也過則失中矣故遇之遇不期而㑹五不應二以中相㑹故遇之言過而適與中相當也五君之位坤居之坤臣也過而適及於臣之分則可過而及於君過臣之分也於義爲有咎故不可不戒易傳曰遇當也過臣之分其咎可知九三弗過防之從或戕之凶象曰從或戕之凶如何也九三剛正而應上六應則過五五中也中不可過三戒在小不忍用剛以過中故弗過冝正己自守防小人則吉兊澤坤土止之防也三不防乃捨所守從之剛過乎中上或戕害之矣離爲戈兵巳動失正戕之也戕者外傷之如何兊口也與􅀄六如何同象不能守正見戕於外其凶果如何也􅀳陽處父易狐射姑之班伯宗言於朝而諸大夫莫􅀂皆過之而弗防改及於難九四无咎弗過遇之徃厲必戒勿用永貞象曰弗過遇之位不當也徃厲必戒終不可長也四不當位以剛履柔爲得冝矣故无咎四下應􅀄則過二二中也弗可過也知二不可過乃與五遇五亦中也弗過二則與中適相當遇得其道矣􅀂去柔用剛進而之五徃則危厲故必以用剛爲戒徃之五成離戈兵之象不動兊爲口戒也小人過君子之時不戒而用剛鮮不爲禍故丁寜之旣曰必戒又曰勿用永貞當隨時處順不可固守其正是以終无咎也然盛衰相循无小人常過君子之理巽爲長陸震曰小者之過終不可長也戒而慎之以俟其復六五宻雲不雨自我西郊公弋取彼在穴象曰宻雲不雨已上也兊澤之氣上而爲雲兊盛隂也故爲宻雲澤降爲雨小過自明夷變􅀄九徃四成兊澤氣已上而未降雲雖宻而無雨故曰宻雲不雨已上也言隂過陽君子之澤未能下也四在内外之交而見天際郊之象四兊西也五震東也巽風􅀭之雲自西徃東由隂而升隂唱則陽不和不雨之象故曰自我西郊三公位明夷三坎爲弓離爲矢􅀄之四成巽巽離爲絲以絲繫矢弋也弋取之器也坎兊爲穴坎幽隱也艮爲手取也彼謂二六二在穴中有中正之德處於幽隱九三君子俯而取之往助於五然六二六五同爲隂􅀋三雖取之豈能濟大事乎小過之時柔得尊位二陽在下爲隂所過不能成功三下取二用力多矣亦豈能濟哉謂四陽爲我二隂爲彼以陽爲主也􅀂中孚陽謂陽則謂五曰我自謂曰吾謂二曰爾尊卑之義小畜􅂏曰宻雲不雨尚往也自我西郊施未行也其辭與小過六五同盖小畜所畜者小小過則所過者小皆不可以作大事過之則畜之矣二卦雖殊而大者爲小者所畜而不得施則一也故􅀜子明曰小畜一卦之體當小過一爻之義然則畜之一也小大之時異焉上六弗遇過之飛烏離之凶是謂災眚象曰弗遇過之巳亢也上六不與五相當失中也又動而過之則甚矣而况處小過之極於時爲巳亢乎故曰弗遇過之上動成離離爲飛烏爲目巽爲繩以繩爲目罔罟之象其違理過常猶烏飛過甚自離于罔罟故曰飛烏離之凶動則不正故凶離有伏坎災也弗遇過之災乃自取非天也人也而曰災眚者過之極窮之災也於時已亢也人事過越如此使知時而守正未必能免已亢故也􅩠離下坎上旣濟亨小利貞􅀄吉終亂􅂏曰旣濟亨小者亨也利貞剛柔正而位當也􅀄吉柔得中也終止則亂其道窮也旣濟自泰來豐九四變也泰兊爲澤九二之四成豐四已濟險而小者未盡亨九四之五則小者亨矣於濟爲旣其卦三隂得位三陽下之大者旣濟小者亦亨子夏傳曰陽巳下隂萬物旣成不曰小亨而曰亨小者大者之濟爲亨小者而濟非爲巳也禹思天下之溺猶己溺之稷思天下之飢猶巳飢之亨至於小則小大畢亨故曰旣濟亨小􅂏曰旣濟亨小者亨也􅂏文當曰旣濟亨小小者亨也脫一字此以三陽下三隂而言旣濟也以陽下隂非正也亨之也剛君子也柔小人也剛柔不失其正君子小人各當其位无犯分躐等之非守旣濟之道也故曰利貞剛柔正而位當也此以六爻當位而言旣濟也自泰至賁二復三變始於二之四成豐次四之五成旣濟其終五之上而成賁濟天下之難莫􅀂剛過剛亦不可以濟失人心也方濟之􅀄以柔濟剛則其柔得中剛者爲用天下之難有不濟乎此旣濟之􅀄所以吉正則吉也旣濟矣上六變艮成賁艮止也止而不進不復有爲文飾而巳濟終則極衰亂復起終以亂也盖其道巳窮故曰􅀄古終亂􅂏曰􅀄吉柔得中也終止則亂其道窮也終始時也治亂者道之窮通也􅀳隋有天下不旋踵而亂不知終止則亂之戒也易傳曰唯聖人爲能通其變於未窮不使至於極也堯舜是也故有終而无亂此推原卦變以九五一爻言旣濟之終始也在卦氣爲十月故太玄凖之以成象曰水在火上旣濟君子以思患而豫防之水火相逮而後濟天地之道以坎離相濟以日言之曰降則月升以月言之日交則月合以歳言之寒來則暑徃皆旣濟也坎上離下旣濟矣然旣濟之極水火將反其􅀄故旣濟之象未濟藏焉君子不可不思慮以豫防其患坤土爲思坎爲險難患也土防水防也在旣濟之時而防險難豫也思患而豫防之則難伏而不作或曰五動坤變坎成震體豫而未濟之象毀矣􅀄九曵其輪濡其尾无咎象曰曵其輪義无咎也三坎爲輪􅀄卦後爲尾􅀄九剛而離體炎上有應進於上其志必銳時旣濟矣動而進不巳必至於咎故戒之􅀄動之四成艮艮爲手曵也坎輪在水火爻中火欲上水欲下亦曵也曵其輪不輕進尾濡坎水不速濟止之於􅀄持重緩進以全其剛而不至於極則於旣濟之義爲得矣故曰義无咎也六二婦喪其茀勿逐七日得象曰七日得以中道也二坤爲輿三坎爲輪二之五離變震坤離爲文震爲竹竹有文蔽車之前者茀也離爲婦婦人乗車不露見有茀乃可以行五於旣濟之時安其位无動而有爲之意二雖有文明中正之德不得遂其行婦喪其茀也五坎爲美脊之馬二五相易震爲作足之馬逐也五不下二二當以中道自守故戒以勿逐逐則失其素守而不正七日得自二數之至上爲五復自􅀄數之至二凡七日以中道也中道者天地之所不能違故坤極生乾七日必復而況人乎易傳曰自古旣濟用人盖鮮矣以唐太宗之用言猶怠於其終況其下者乎雖不爲上所用而中正之道无終廢之理不得行於今必行於異時九三髙宗伐􅀑方三年克之小人勿用象曰三年克之憊也坤爲􅀑爲方五坎爲險帝繫有􅀑方氏􅀑方盖國名小國於旣濟之時恃險不來九五離體有戈兵用九三往伐之坤爲年自四數之歴三爻三之上成巽巽爲入入其險也上之三成坤順也旣入其險􅀑方來順三年克之也克難辭也九三剛正君子也上六之三柔而不正小人也髙宗中興之賢君伐􅀑方氏之小國歴時之乆至於三年而後克之其力亦憊矣況用小人乎坎爲勞重坎憊也小人非貪慾不爲其禍至於殘民肆慾遂喪其􅀖故戒以小人勿用爻言勿用小人象曰憊者聖人慮後丗勤兵於逺託髙宗乆伐以濟其欲勞民動衆三年克之雖髙宗行之亦憊也六四􅃭有衣袽終日戒象曰終日戒有所疑也四坎水也􅀄之四成巽巽木在水上舟之象四未交􅀄巽毀坎見舟漏也四坤爲裳􅃭裳也􅀄乾爲衣艮爲手袽塞也離日在下終日也兊爲口戒也巽爲不果疑也六四近君而正明於防患資􅀄九之賢彌縫九五之闕終日相戒如奉漏舟不唯自竭而􅀄九助之如有裳及衣袽塞其漏苟可以豫防者无不爲斯能濟乎重險矣制治保􅀖之道患至而後慮之无及己心有所疑知禍亂之源必先事而塞之乃保旣濟之道故曰終日戒有所疑也易傳曰不言吉者方免於患也旣濟之時免患足矣无復有加矣九五東鄰殺牛不如西鄰之禴祭實受其福象曰東鄰殺牛不如西鄰之時也實受其福吉大來也泰震爲東兊爲西三四鄰也兊爲刑殺坤爲牛坎爲血離爲夏震爲聲上爲宗廟九二之五有長子奉祀東鄰殺牛西鄰禴祭之象殺牛盛祭也禴尚聲薄祭也盛不如薄者時也二五均有中正之德然二未濟有進也九自五來二以虚受故曰實受其福正吉陽爲大吉大來也五旣濟无所進也盈則當虚故曰不如西鄰之禴祭也理无極而不反者旣濟極矣時巳往矣五以中正守之能未至於反而巳易傳曰至於極則雖善處无如之何矣上六濡其首厲象曰濡其首厲何可乆也上旣濟之極以剛處之猶恐其反六安其位而不變必有顚隕䧟溺之患上反三乾爲首濡於坎水之中濟而至於水濡其首危極矣濟之窮也其可長乎巽爲長易曰旣濟之終小人處之其敗可立而須也􅬱坎下離上未濟亨小狐汔濟濡其尾无攸利􅂏曰未濟亨柔得中也小狐汔濟未出中也濡其尾无攸利不續終也雖不當位剛柔應也未濟自否來旣濟之反也否塞之時六二之柔得中而上行天地相交否者亨矣柔而不中則介於二剛其能亨乎故曰未濟亨柔得中也此以二五言未濟也艮坎爲狐小狐􅀄爻也艮之􅀄爻爲小狐猶中孚之豚亦􅀄爻也爾雅曰􅠟汔也詩曰汔可小康鄭康成曰汔幾也四爲坎險五爲中出險也􅀄往之四幾濟而未及於五未出中也狐首輕尾重老狐聽水􅀒尾而濟其剛不息是以終濟卦以成卦言之上爲首爲前􅀄爲尾爲後以畫卦言之初爲始爲卒上爲終爲末上九剛也􅀄六柔也小狐不度而進未能審慎其前則剛其後乃柔四坎濡其尾往无攸利以其剛不足不續終也然則濟險者其在於審慎始終如一剛徤不息者乎孟喜曰小狐濟水未濟一歩下其尾故曰小狐汔濟未出中也濡其尾无攸利不續終也此以􅀄六九四相易言􅀄六之柔不足以濟險難也未濟六爻雖不當位而剛柔相應苟量力度時慮善而動上下内外相與未有不濟者也故曰雖不當位剛柔應也此以六爻申未濟有可濟之理也在卦氣爲十一月故太玄準之以將象曰火在水上未濟君子以慎辨物居方未濟自否變否艮止也慎之象離爲明辨也火隂物也居南水陽物也居北二物有相濟之理火上水下各居其所未濟也君子觀此慎辨萬物使各居其所有辨然後有交辨之以正其體交之以致其用不辨則不交有未濟乃有旣濟而未濟舎旣濟之象􅀄六濡其尾吝象曰濡其尾亦不知極也卦後爲尾坎水濡之濡其尾也􅀄處險下而上有應其志欲動在未濟之時剛動則出險於濟爲得其分量矣極分量之極也􅀄柔九二又以剛在前阨之雖有應可動而柔不能動吝也於是而欲濟是亦不知極也猶獸欲濟而力柔水濡其尾則不能舉終亦不出乎險矣坎水爲知九二曵其輪貞吉象曰九二貞吉中以行正也坎爲輪二往五應艮爲手曵其輪也坎輪在水火爻之中水欲下火欲上亦曵也二中也九二之五中以行正也未濟時六五柔處尊位五所頼者九二剛中也剛非臣德之正也剛或好犯恭順之道或有不足故戒以曵其輪則緩進以盡恭順於臣爲中於道爲上行中以行正者正未必中中以行正則盡矣易傳曰唐郭子儀李晟當艱難未濟之時能保其終吉者用此道也六三未濟征凶利渉大川象曰未濟征凶位不當也三處險中唯至剛乃可以出險六柔不當位未濟也以柔而行外援上九則乾首没於坎中淪胥以溺之象雖正亦凶竇武何進是也故曰征凶三四非應當未濟之時三資其助四近而恊力巽股出險利渉大川矣九四貞吉悔亡震用伐􅀑方三年有賞于大國象曰貞吉悔亡志行也九居四有悔動而正正則吉而悔亡四動體震震爲威怒坤爲􅀑方坎爲險四近君剛而明有濟之道􅀄恃險未順四用其威怒以入其阻伐􅀑方也自三至􅀄歷三爻坤爲年三年而後順克之也克難辭艮山坎川坤土田賞之象坤四爲國陽爲大有賞于大國非貞吉悔亡其志於上下乎二卦言伐􅀑方者借此以明必濟之義天下之弊固有盤結而難去者四凶頑民歷丗旣乆乃能去之故曰貞吉悔亡易傳曰古之人用力之甚者伐􅀑方也故以義動而逺伐至於三年然後成功而行大國之賞必如是乃能濟四居柔故戒以此六五貞吉无悔君子之光有孚吉象曰君子之光其暉吉也六五文明之主柔居尊位悔也虚中而下九二二往五正以剛濟柔故貞吉无悔坎爲光君子之光謂九二也五離爲明二與五應光明相燭有孚也暉者光之散管輅曰日中爲光朝日爲輝朝日初出其光輝散也言二五未交其德暉之所及巳孚于上下則吉濟險難者君必剛正臣必有不言之信然後委任篤下无間言功濟天下而无後患不然凶必至矣上九有孚于飲酒无咎濡其首有孚失是象曰飲酒濡首亦不知節也上孚于三三震坎爲酒上反三成兊坎流于兊口有孚于酒也三之上得正无咎也未濟之極无極而自濟之理非剛徤之才得時得位上下孚應終不濟也上九君子有才而不當位與六三相應而无可濟之資以其有孚矣相與飲酒樂天順命以俟可濟之時則於義无咎上反三乾首濡于酒中則從樂眈肆亦不知節矣坎兊節之象也有孚􅀂然失是義矣􅀳魏之交士多逃于麴蘖无濟時之志以故丗復大亂聖人之戒不其深乎易傳曰人之處患知其无可柰何而放意不反者豈安於義命者哉周易下經豐傳第六
