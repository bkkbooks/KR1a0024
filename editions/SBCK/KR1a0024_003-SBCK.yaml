body:
  text: 言噬嗑與亨之義也夫互體之變難知也聖人於噬嗑􅂏明言之其所不言者觀象玩辭可以􅀋推固者爲之彼將曰艮震頥也責離而求艮離豈艮哉故曰知者觀其􅂏辭則思過半矣噬嗑自否來否之時剛柔不分天地閉塞九五之剛分而之初剛下柔也初六之柔分而之五柔上行也剛柔分則上下交矣動而明則否塞通矣以隂陽言之震陽也離隂也雷動電明剛柔相文合一而成章則天地亨矣故曰剛柔分動而明雷電合而章此以初五相易合兩體以言噬嗑之才也噬嗑除間之卦不止於用獄言利用獄者專以六五言噬嗑之用坎爲律爲􅁄獄象也六五之柔得中而上行下據九四之坎用獄也所謂上行者以柔道行之於上也五君位唯剛徤中正足以當之六五柔中不當位也雖不當位而施之於用獄則无􅀂柔中之爲利矣或曰柔中足以用獄乎曰人君者止於仁不以明斷稱也古之用獄者史以獄成告于正而正聽之正以獄成告于大司冦聽之􅁄木之下大司冦以獄之成告于王王命三公叅之三公以獄之成告于王王三宥之然後制刑宥之者柔也三宥之然後制刑者柔中也制刑者有司之事不得已而聽而制刑者人君之德德歸于上有司不失其職於下是以其民畏而愛之愛之斯戴之矣故曰人君之用獄无􅀂柔中之爲利也皐陶之美舜曰與其殺不􅇳寜失不經好生之德洽于民心夫殺不辜則民將以虐我者爲讎好生之德洽于民心則天下樂推而不厭曽子曰上失其道民散乆矣如得其情則哀矜而勿喜士師有司也曽子告之如此況人君乎觀皐陶曽子之言則在於寜失也在於哀矜也不在乎明斷審矣自易失其傳叅之以申韓之學人君用明斷決獄訟躬行有司之事其弊至於刻薄少恩民心日離思與之偕亡讀易不察之過也故不可不與之辯焉卦氣秋分也故太􅀇準之以䦯象曰雷電噬嗑先王以明罰勑法勑當作敕明其罰之輕重使人曉然易避效電之明也正其法令以警懈墯效雷之動也九四坎爲律法也三不正敕法也上三爻不正明罰也先王將明罰必先敕法非謂法其威怒以致刑此卦至爻變始有用刑之象初九屨校㓕趾无咎象曰屨校㓕趾不行也否下體艮爲指在下體之下爲趾巽變震爲足爲草木以草木連足指象没矣屨校㓕趾也荀卿曰菲䋽屨䋽枲也尚書大傳曰唐虞之象刑上刑赭衣中刑雜屨雜屨即傳所謂藨蒯之屨要之中刑之屨或菲或枲或藨或蒯皆草爲之疑古者制爲菲屨赭衣當刑者服之以示愧耻非无肉刑也慎子謂以屨當刖誤矣周官掌囚下罪桎桎足械也械亦曰校大罪者小罪之積否初六不正其行不巳故屨校以没其足使止而不行所懲者小所戒者大乃所以无咎震爲行艮止之不行也无咎正也卦以初上爲受刑二至五爲用刑者用刑貴中也王弼謂􅀄上无位非也六爻非竒則偶豈容无位六二噬膚㓕􅈹无咎象曰噬膚㓕􅈹乗剛也艮隂爲膚柔而近革噬之爲易六三是也何以知艮隂爲膚剥六四曰剥牀以膚坤剥乾成艮也六三不當六二噬之中正而動剛乗剛而徃所刑者當兊爲口故曰噬膚艮爲􅈹二動兊見艮毀㓕鼻也􅈹在面中㓕鼻則當息不息則勢不能乆言三雖不當而二之用刑亦不過中故无咎二動宜有咎也横渠曰六三居有過之地而巳噬之乗剛而動爲力不勞動未過中故无咎六三噬腊􅁏遇毒小吝无咎象曰遇毒位不當也鳥獸全體乾之爲腊噬之最難者也九四不正間於上下之際強梗者也艮爲黔喙之屬離爲雉日熯之腊􅁏之象六三位不當以柔噬剛刑人而不服必反傷之故遇毒毒坎險也何知坎爲毒師曰以此毒天下謂坎也小吝者六三位不當而柔也然无咎者動則正兊見坎毀強梗去矣兊口噬也荀爽曰噬腊謂四也九四噬乾胏得金矢利艱貞吉象曰利艱貞吉未光也附骨之􅁏謂之胏胏古文作横渠謂五也六五柔中有剛在二剛之中日熯之乾胏之象胏比腊爲易比膚爲難九四剛直不撓徃則克之得金矢也乾變爲金巽爲木坎爲矯爲弓離爲兵矯木施金加於弓上矢也金剛矢直噬之則剛直行矣四五易坎毀成頥噬乾胏得金矢也九四不正動而正唯恐其不正不正不足以噬故利艱貞乃吉不然則凶艱貞乃吉者以其道未光道光則安用艱貞哉或曰五君位四噬之可乎曰噬嗑爻辭取上下相噬明用刑難易而巳不以君位言之卦五不以君位言者六卦訟也噬嗑也􅁪也遯也明夷也旅也訟不言君者人君不以聽訟爲主故風美召伯頌言皐陶而巳􅁪不言君者君道不可以柔爲􅁪遯不言君者君不可遯也明夷不言君者失君之則也旅不言君者君不可以旅也春秋天王居于鄭書岀諸侯去國書奔噬􅯳决獄有司之事非人君之職􅀂以五爲君則二大夫三公四侯相噬何哉易不可一端盡也六五噬乾􅁏得黃金貞厲无咎象曰貞厲无咎得當也噬上也上剛而居柔離日熯之乾􅁏之象乾􅁏比膚爲難比胏爲易五與上易成兊口故曰噬乾􅁏黃中色離中之坤也上乾變爲金故曰得黃金言自五噬上噬之亦難噬之而服則於剛爲得中矣九居五貞也故曰貞五未易上有強不能噬於正爲厲於德爲有咎噬上九而當雖厲終无咎也故曰厲无咎得當也得當者於五剛中爲當也或曰用刑言噬何也曰此聖人之深意也夫示之德讓使人安於至足之分則不争不争則无訟今物至於噬而後合德下衰矣噬之當也猶愧乎无訟矧噬之有不當乎末流之禍怨亂並興反覆相噬且萬物同體而使物至於噬自噬之道也故四之剛直上九之剛未免於噬夫子曰必也使无訟乎叔向曰三辟之興皆興於叔丗聖人之意不其深乎上九何校㓕耳凶象曰何校㓕耳聦不明也四坎爲耳上九之三巽爲木巽見坎毀何校㓕耳也上九有耳不明乎善罪大惡積䧟于凶而不知冝曰耳不聦曰聦不明何也坎水離火日月之光火外景也於目爲視水内景也於耳爲聽視聽之用无非明也氣交則通精併則專瞶者專視併耳之用於目也瞽者專聽併目之用於耳也上之三離目毀无見善之明又不能專聽是聦復不明何校滅耳責其有耳之形无耳之用也􅭳離下艮上賁亨小利有攸徃􅂏曰賁亨柔來而文剛故亨分剛上而文柔故小利有攸徃天文也文明以止人文也觀乎天文以察時變觀乎人文以化成天下賁本泰也坤之上六來居於二以一柔而文二剛則柔得中而亨文柔德也故曰賁亨九二分而徃於上以一剛而文二柔剛不得中而柔得中小者之利也然剛不徃則小者无以濟之不能文矣故曰小利有攸徃柔來文剛而得中分剛上而文柔柔者亦得中上下相文而不失乎中則賁也非過飾也故曰賁賁者文飾之道曰徃曰來者徃來相錯因其質而文之易傳曰質必有文自然之理理必有對待生生之本也有上則有下有此則有彼有質則有文一不獨立二則爲文以天文言之无非剛柔交錯隂陽之精在地象物成列光耀離合皆剛柔也日陽也而爲離月隂也而爲坎緯星動者陽也而太白辰星爲隂經星不動者隂也而析木鶉首爲陽北斗振天二極不動故曰天文也以人文言之坤來文乾而成離坤文而離明文明也艮止也父剛子柔君剛臣柔夫剛婦柔朋友者剛柔之合長㓜者剛柔之序五者交錯粲然成文天理也非人爲也上下内外尊卑貴賤其文明而不亂各當其分而止矣文明以止則禍亂不生災害不作故日月軌道五星順序萬物自遂天文人文其理一也故曰文明以止人文也此合乾坤剛柔艮離兩體而言賁也聖人觀乎天文則知剛柔有常矣故南面而立視昬旦之星日月之次以知四時寒暑之變春震秋兊泰之時也夏離冬坎賁之時也泰易爲賁四時互變時變之象也觀乎人文知天下之情必麗乎中正中正者理之所當得者也故彰之車服明之藻色天下自化矣柔麗乎中正者化成天下之道也乾天也二變艮成也二柔麗乎中正也仰觀天文俯觀人文不順乎天則反求乎人文而巳矣此推原卦變以盡賁之道也在卦氣爲八月故太玄準之以飾象曰山下有火賁君子以明庶政无敢折獄山下有火託物以明異乎􅀳之自昭明德也賁飾之象君子體之以明庶政者初二三四正坤爲衆政者正也无敢折獄者折獄之道在於用常人吉士哀矜獄情不恃明察也不尚文飾也或曰噬􅯳亦明也明罰何也曰噬􅯳六三九四六五上九不正不正者罰之賁无敢折獄下四爻正也庶政明而後折獄乃无枉濫初九賁其趾舎車而徒象曰舎車而徒義弗乗也艮爲指初在下體之下動而應足趾也坤爲輿二坎爲輪車也四震爲大途爲足足趾行乎大途者徒行也初九於六二爲近於六四爲逺舎二車弗乘寜徒行而弗辭者六二非正應義弗乗也夫車所以賁其行義弗當乗而乗之辱也非賁也是以寜徒行雖跣足賁也古之人有弗肯乗人之車緩歩以當車者守義故也六二賁其須象曰賁其須與上興也二言賁飾之道毛在頥曰須在口曰髭在頰曰髯三有頥體二柔在頥下須之象二三剛柔相賁賁其須也夫文不虚生譬之須生於頥血盛則繁滋血衰則減耗非增益爲之飾與上興也與相與也二三相賁而成震起也柔道上行有興之象是故冠弁衣裳黼黻文章雕琢刻鏤立黃之飾因其有尊卑貴賤之實而明之實旣不同其文亦異不豐不殺惟其稱也􅁄子成曰質而巳矣何以文爲不知文待質而後興也九三賁如濡如永貞吉􅁚曰永貞之吉終莫之陵也六二以柔賁剛賁如也九三坎體以剛賁柔坎水濡之澤潤而有光耀濡如也剛柔相賁文飾之盛禮之致隆者也然二非正應以近相得故相賁相濡以成文九三守正不動二亦柔麗乎中正故吉三賁將變動而失正則上且自外而陵之禮者法之大分去争奪之道也永正誰能陵之今夫冨商之財足以金玉其車文錯其服而木楗韋藩過于朝而不歉者知禮法之不可以干也苟失其正乗其間者有競心焉安能自免於陵轢乎故終莫之陵者永貞之吉三下卦之終三不動永貞之象六四賁如皤如白馬翰如匪冦婚媾象曰六四當位疑也匪冦婚媾終无􅀹也六四初九以正相賁也六四之柔下賁初九賁如也初九之剛上賁六四成巽六二爲須巽爲白皤如也言初之賁四純白相賁飾也六四當位伏巽爲不果有疑志也四所以疑者初間於三坎爲盜盜據内外之際四有乗剛之險初四未獲賁也雖未獲賁而應之志其疾如白馬翰如飛騰而赴之匪九三之冦則遂㛰媾矣初離爲雉之四巽爲雞翰如也翰剛爻也震爲作足之馬震變巽故曰白馬翰如震長男離中女男女合故曰㛰媾純白无僞誰能聞之始疑而終合故曰終无尤也四之所􅀹者三也三下卦之終六五賁于丘園束帛戔戔吝終吉象曰六五之吉有喜也艮爲山爲果蓏山半爲丘而有果蓏丘園也五尊位柔中外資上九之賢故曰賁于丘園坤爲帛艮手束之束帛五兩坤數也三􅀇二纁天地竒耦之文上五相賁之象戔戔委積貌坤爲衆束帛其上多而委積用之以外聘故曰束帛戔戔夫五得尊位當賁天下六二不應近比上九吝道也然柔中厚禮上九自外賁之始吝而終吉正則吉也隂陽得位曰喜上來賁五陽得位而正喜豈僞爲之哉好賢樂善有得于誠心故曰六五之吉有喜也上九白賁无咎象曰白賁无咎上得志也上九賁之極有不賁者焉聖人因天地自然之文立王制爲天下之大隆是非之封界分職名象之所起也其志在於著誠去僞使人各由其情不失其本眞矣末流之弊尚文勝質而本眞衰焉豈賁飾之􅀄志哉志者動於中之謂也上九變動反三三有伏巽而離體離者乾再索而成巽之變也巽爲白離爲文有色生於无色故曰白賁白質也賁文也五色本於素五味本於淡五聲本於虚質者文之本上九變動而反本則文何由勝咎何由有我志得矣故曰大禮必簡至敬无文然貴本之謂文親用之謂理兩者合而成文以歸太一夫是之謂大隆故酒醴之美􅀇酒明水之尚黼黻文繡之美䟽布之尚莞簟之安而簿越藁鞂之尚丹􅃮雕幾之美而素車之尚荀子曰禮始於脫成於文終於梲夫終則有始質者文之始上九之白賁文在其中矣變而通之三代損益之道是以无咎而得志不然事生送死而无敬文墨子之道烏得爲无咎賁四至上其變皆以巽人文相賁以禮譲爲本􅥄坤下艮上剥不利有攸徃􅂏曰剥剥也柔變剛也不利有攸徃小人長也順而止之觀象也君子尚消息􅄹虚天行也剥本乾隂侵陽進而剥之柔剥乎剛下剥其上回邪剥正道小人剥君子剛爲柔變故曰剥剥也柔變剛也此以五隂剥陽言剥也剥而不巳一陽僅存小人旣長君子道消徃亦无與何所之哉當巽言屈身避害而巳故曰不利有攸徃小人長也此以上九言剥也聖人患君子不徃人道將絶故又發其義曰順而止之坤順艮止也止小人之道當順其理而止之尸可以止盖以象觀之剥極當止之時五變隂陽有可反之理剥反􅀳􅀳反大有而乾體復矣天道之行消於巽息於兊􅄹於乾虚於坤消極則息􅄹乆則虚君子尚之與時偕行能柔能剛任理而巳矣漢唐之季小人道長諸賢不能順而止之悉力以抗小人是以无成功王弼謂強亢激拂觸忤以隕身身旣傾焉功又不就非君子之所尚也故曰順而止之觀象也君子尚消息􅄹虚天行也此以艮坤二體剥復升降明處剥之道也在卦氣爲九月故太􅀇準之以割鄭康成以萬物零落謂之剥者論卦氣也􅂏言象者三剥也鼎也小過也剥小過卦變之象也卦變自辟卦言之坤變復六變而成乾乾變姤六變而成坤自反對言之復姤變十二卦遯否臨泰變四十八卦自下而變也觀剥之象則知之矣自相生言之復姤五變成十卦臨遯五復五變成二十四卦泰否三復三變成十八卦上下相變也觀小過之象則知之矣鼎互體之象也卦以隂陽虚實剛柔竒耦交錯互變於六爻之中而象其物冝觀鼎之象則知之矣觀是三者易之象舉積此矣象曰山附於地剥上以厚下安宅山剥而附於地則其下厚矣爲人上者觀此故􅁉民敦本務厚其下是乃安宅不傾之道書曰民爲􅀖本本固􅀖寜初六剥牀以足蔑貞凶象曰剥牀以足以㓕下也劉牧讀剥牀以足蔑按六四曰剥牀以膚則剥牀以足當爲句絶坤變乾也坤西南方也初動成巽巽爲木設木於西南之奥乾人藉之牀之象也剥以其足寢其上者危矣􅀄有伏震震爲足隂之剥陽必自下始蔑無之也無君子之正則凶矣象曰滅者滅盡也無君子之正者以滅盡之也小人之害正如此六二剥牀以辯蔑貞凶象曰剥牀以辯未有與也鄭康成曰足上稱辯近􅂰之下屈則相近申則相逺故謂之辯辯分也崔璟曰辯當在第足之間牀䏶也巽爲木爲股艮爲指在初爲趾二在股趾之間近􅂰之下股之象䏶即股也隂浸長次及於二猶剥牀至於股也九二无應未有與之者是以小人无所忌憚二當内不失正以自守斯可矣􅀂迫窮禍患蔑所守之正則凶蔑無之也曰蔑貞凶戒六二也剥之方長君子而有與猶可勝也剥而自守其正小人雖勝猶未凶也六三剥之无咎象曰剥之无咎失上下也上九以剛居一卦之外六三在小人中以柔應剛獨有輔上救亂之志易傳謂漢之吕彊是也然上九不當位其􅀔微弱不能相應而有爲失上也衆隂並進三獨爲君子初二旣剥安能免於衆隂之所剥乎失下也上下皆失三雖不免於剥而義則无咎非特立不懼者能如是乎六四剥牀以膚凶象曰剥牀以膚切近災也艮爲膚柔而近革六四之象巽爲牀剥牀及膚切近災也五君位剥陽至四而乾毀其凶可知象言災者隂長剥陽天也剥道至此三不能止君子其如天何六五貫魚以宫人寵无不利象曰以宫人寵終无􅀹也巽爲魚爲繩艮爲手持繩下連衆隂貫魚也艮坤爲宫止於中也乾爲人巽爲進退以宮人寵也宫人嬪婦御女之屬古之進御於君者望前先卑望後先尊尊卑迭爲進退五得尊位其動也正與上同德下制衆隂􅀂貫魚然咸順於上以宫人寵之使尊卑有序厚恩錫予不及以政寵均則勢分不及以政則无權小大相持乃可爲也故无不利六居五宜有􅀹而以正制小人者盡道終无􅀹也五有伏兊爲口􅀹之也不然魚脫於淵其能制乎或曰先儒以巽爲魚何也曰以重卦離知之包犠氏結繩而爲罔罟以佃以漁盖取諸離離中有巽巽復有離巽爲魚以漁也離爲雉以佃也魚龍同氣東方鱗蟲龍爲之長震爲龍木之王氣巽爲魚木之廢氣故太􅀇以三八爲木爲鱗兼震巽言之上九碩果不食君子得輿小人剥廬象曰君子得輿民所載也小人剥廬終不可用也坤隂剥乾四成巽爲木至五成艮爲果陽爲大衆隂不能剥之碩果也兊爲口艮見兊伏不食也君子在外不爲小人剥喪之象碩果不食下而復生剥反爲復必然之理天地間未甞一日无陽亦未甞一日无君子剥終復始間不容髮也坤爲輿爲衆極亂之後五隂奉一陽君子於是得衆而民載之故曰君子得輿民所載也易傳曰詩匪風下泉所以居變風之終也艮爲舎乾爲天天際在外野也舎在野廬之象陽爲君子小人託庇於君子上九剥而爲六小人用事自徹其庇至於无所容其軀而在外之君子亦失其所故曰小人剥廬終不可用也􅤃震下坤上復亨出入无疾朋來无咎反復其道七日來復利有攸徃􅂏曰復亨剛反動而以順行是以出入无疾朋來无咎反復其道七日來復天行也利有攸徃剛長也復其見天地之心乎復本坤而乾交之隂陽之反皆自内出非由外來而出入云者以剥復明消息之理也剥極成坤陽降而入坤極而動陽升而出入其反也出其動也其出其入群隂莫能害之害之之謂疾言剛反動而得位也坤爲順剛反動而得位以順道而上行斯復所以亨歟朋陽之􅀋也一陽來復而得位无咎者以正也剛動則不累於物以順行則不違其時正則和而不同斯朋來所以无咎也夫復所以亨者豈一君子之力哉譬如舟車必相濟逹已先則拔之彼先則推之然後并心恊力其道大行故曰復亨剛反動而以順行是以出入无疾朋來无咎此合坤震兩體初九之動以言復亨也天道之行極則來反徃則必復其復之數自午至子不過於七陽生於子隂生於午剥復七變陽渉六隂極而反初日也月也歳也天地五行之數所不可違而必曰七日者明律曆之元也故日月五星始於牽牛氣始於夜半曆始於冬至律始於黄鍾子雲得之爲八十一首以盡一元六甲三統九㑹二百四十二章之數邵雍得之明日月星辰元㑹運丗以窮天地消長无極之數而雍甞謂子雲作太玄其得天地之心乎故曰反復其道七日來復天行也此推剥復之變言復之數也陽自復而徃爲臨爲泰爲大壯爲夬爲乾孰禦之哉君子之道剛進而長莫或禦之必至於盛夫子曰如有用我者期月而巳三年有成孟子曰以齊王猶反手也荀卿曰三年天下如一諸侯爲臣非虚語也故曰利有攸徃剛長也此自復推之至乾以言復之成也易以天地明聖人之心以爲无乎不可也以爲有乎不可也觀諸天地則見其心矣天地以萬物爲心其消也乃所以爲息其徃也乃所以爲來徃極而來復復則萬物生生者天地之大德也以其所見論其所不見天地之心其可知矣故曰復其見天地之心乎此以􅀄九剛動言復之始也始而亨亨則有成矣王弼謂天地以本爲心寂然至无是其本矣此雷在地中之象也􅂏之取象在於陽剛反動而巳易无非象也􅂏也大象也小象也其象各有所冝不可以一槩論在卦氣爲冬至故太􅀇準之以周象曰雷在地中復先王以至日閉􅀜商旅不行后不省方天下之至動莫如雷雷在地中動復於靜復本之時也復冬至之卦剥艮爲門闕反則閉􅀜閉􅀜以止動者也巽爲近利市三倍風行地上爲觀民設敎復震見巽㐲故商旅不行后不省方不行不省方則動者靜夏小正十一月萬物不通夫子賛易兼用夏小正矣初九不逺復无祗悔元吉象曰不逺之復以脩身也外爲逺内爲近剥初甞失矣變復九自外來内不逺也反動而剛復也失而後有復不失則无復矣初者九之位正其固有也初正者善之端脩身之始未有不正其心而能脩身者以天地言之始於剛反動而正乃能遂萬物而成其德故曰不逺復以脩身也坤爲身易傳曰祗抵也馬融音之是反初動不正不正則抵于悔知不正爲不善之端而復于正則无袛悔俟其悔至而後復之復亦逺矣无袛悔則元吉元吉者吉之至善故曰无祗悔元吉夫幾者動之微吉之先見也顔子不善未甞不知知之未甞復行无祗悔也故夫子賛之曰顔氏之子其殆庶幾乎六二休復吉象曰休復之吉以下仁也休息也􅀄九剛復克巳復禮爲仁者也六二正中在上无應以分其親仁之意近而相得乃下之見􅀄九不逺復其心休焉中者天下之大本人受天地之中以生中則正正則大大者仁之體仁豈外求哉在我而巳矣􅀄九知幾知至至之者也六二不動即至于正中動則失正因是休矣休則吉所謂吉祥止止也故曰休復之吉以下仁也荀卿曰學莫便於近其仁六二之謂乎六三頻復厲无咎象曰頻復之厲義无咎也頻水厓也􅀃文曰人所賔附頻蹙不前而止先儒作嚬蹙訓之其義亦通三者震動之極極則反之正成坎坎在坤際水厓也水厓謂之頻六三厥初妄動自厓而反則頻復也頻者危道故曰頻復厲頻而復雖晩矣不猶愈於迷而不復者乎於義爲得故曰義无咎也六三困而學之者也叔孫病不能相禮退而學禮之爻乎六四中行獨復象曰中行獨復以從道也五隂􅁳行去道日逺適越而北首者也六四行於五隂之中獨反而復下從於初道言初九也震爲大途亦道也鄭康成曰度中而行四獨應初是也不言吉无咎者正則吉可知獨復則无咎頻復之厲猶无咎也四獨復五敦復不言吉者不以利害言也虞翻曰四在外體不在二五何得稱中夫中無一定之中自初至三以二爲中自四至上以五爲中復卦五隂自二至上則四爲中康成謂爻處五隂之中六五敦復无悔象曰敦復无悔中以自考也六五逺於初九中而未正非敦復則有咎五坤體厚也五動而正成艮艮爲篤實厚而篤實敦也成言乎艮故艮又有成之意考成也誠者自成也以體言之謂之中以天道言之謂之誠以受之於天言之謂之性有是性則有是體有是體則有是道萬物皆備於我反身而誠則自成矣其於復也何逺之有厚而篤實用力於仁者也荀卿曰以中自成易傳曰以中道自成上六迷復凶有災眚用行師終有大敗以其國君凶至于十年不克征象曰迷復之㐫反君道也復之終以一卦言之剥之上九反而爲初初九巳復上六迷道而不復故曰迷復凶上窮矣不可動動則降三成坎坎災眚也災自外至眚巳招也有災眚則天禍人患无所不有故曰凶又曰有災眚三動六上行有師體用師也行師之義以正去不正巳迷不復而行師人誰服之終有大敗師六三師或輿尸凶坎爲血大无功也三下之終故曰終有大敗坤四諸侯位國也五君位上反三成震坎以其國君也震動以也坎䧟也用此行師終有大敗妄動之禍至於以其國君䧟之於㐫故曰以其國君凶言迷復動則凶矣自古迷復妄動不勝其欲而用兵雖驟勝終有大敗驟勝者厚其毒而降之罰是以禍至於亡身十者坤之極數不可動則无師象不克征也十年不克征者災也上窮也用行師終有大敗以其國君㐫者眚也二者反君道故也上六反初九初九道也易傳曰居上治衆當從天下之善夫從天下之善則改過不吝舉錯當於人心以此用衆則師克以此用國則民聽天佑人助何凶之有􅫾震下乾上无妄元亨利貞其匪正有眚不利有攸徃􅂏曰无妄剛自外來而爲主於内動而徤剛中而應大亨以正天之命也其匪正有眚不利有攸徃无妄之徃何之矣天命不祐行矣哉无妄天理也有妄人欲也人本无妄因欲有妄去其人欲動靜語黙无非天理動非我也其動也天故曰无妄此合乾震言无妄也无妄大畜之反大畜上九之剛自外來爲主於内主言震也自外來爲主於内如舜禹之有天下天下大物也可妄而有乎无非天也故曰剛自外來而爲主於内此以初九言无妄之主也震動也乾徤也動而震无妄之時其徤不息不有其已體天而已故曰動而徤此再以乾震言无妄也九五剛中在上六二以柔中應之剛柔相與上下不過乎中中則无妄上下循天之理故曰剛中而應此以二五言无妄也初九之尊位大夫得尊位大亨也其端始於初九剛自外來爲主於内而正是以大亨剛中而應動不以正亦何由徤何由應乎故曰大亨以正此以初九九五言无妄也動而徤剛中而應大亨以正者无妄之才也有是才乃可當无妄之時致天下於无妄易言剛中而應者五卦飾也臨也萃也升也无妄也大亨以正者三卦萃也臨也无妄也獨於无妄言天之命者剛自外來而爲主於内也剛自外來可也安能必其爲主於内動而徤可也安能使剛中而必應以正而必至於大亨乎非天命不能也天命即天理也非人爲也乾爲天巽爲命故曰天之命也比以乾巽言无妄也三四上三爻匪正有眚匪正妄行而干天命其眚自取者也无妄之丗九五在上受天所命六二應之三四上匪正而无應欲徃何之三四以五在上不可行上九巳窮三上相易成坎險何所徃哉兊爲右大有六五尚賢上九易五成兊故曰自天祐之无妄大畜三四正位兊體有祐之象大畜反兊爲巽不正之爻不利有攸徃故曰天命不祐行矣哉在卦氣爲寒露故太玄凖之以去象曰天下雷行物與无妄先王以茂對時育萬物天下雷行而物與之者无妄也雷行非時而物不與者妄也虞翻曰震以動之萬物出乎震故震爲萬物始震終艮時也伏兊爲澤育也二應五三應上對也先王以是茂對時而育萬物茂盛也萬物繁興不茂不足以育物不對則妄矣如春母麛母􅆑夏母伐大木之􅀋初九无妄徃吉象曰无妄之徃得志也初九正无妄也九四不正妄也初九以正動上徃九四應之徃而正正則吉其正行乎上志者動於中也易傳曰誠至於物无不動者以之脩身則身正以之治事則事得其理以之臨人則人感而化无所徃而不得志也故吉六二不耕穫不菑畬則利有攸徃象曰不耕穫未冨也二動體而順乎中正无妄者也故極言无妄可徃之理初至五有益體耕也二震爲稼艮爲手二徃之五五來應二兊見震毀艮手兊金銍刈之象穫也二爲田田一歳曰菑三歳曰畬初九震足動田之始菑象也三來之二歷三爻而有穫象畬也乾爲歳故也夫耕者穫之始畬者菑之成耕必有穫菑必有畬事理之同然非私意所造君子隨時而巳无妄也譬如農夫有當首事而耕者有當終事而穫者其於田亦然有當首事而菑者有當終事而畬者當其時之可耕可菑則􅘥荼蓼闢荒穢不爲不足當其時之可穫可畬則有倉􅅒多田稼不爲有餘初耕者也二當不耕而穫耕則妄矣初菑者也二當不菑而畬菑則妄矣吾无決擇順乎中正可動而動无所容心也如是則利有攸徃有攸徃者二徃五則穫畬有成矣昔伏羲創法以利天下神農氏黃帝氏相繼而出至堯舜氏而法成􅀂夏商周之損益皆因其禮无妄作也其視前人創法猶巳爲之是故前聖後聖􅀂出一人彼時此時同爲一事不然不待時而爲則雖􅄃天下之美猶爲妄也曰未冨者􅄹虚之理􅄹則虧之虚則實之二隂虚而未􅄹故不耕而穫􅀂巳􅄹則亦不穫矣莊子所謂天下旣巳治矣是也六三无妄之災或繫之牛行人之得邑人之災象曰行人得牛邑人災也六二中正无妄也三四不正有妄也故以兩爻明六二无妄之災坤爲牛四巽繩艮手或繫之牛或疑辭四見疑以不正故疑之三震爲大途爲足行人也四不繫之牛人以其不正或疑之妄也三不正而躁亦妄也徃乗四妄而又妄不得位行人得牛牛非行人之所當得妄動而干之非順乎理者也四來乗三二在險中三自取之有妄而災則其冝也非災之者也坤土在下爲邑邑人謂六二六二中正順理靜而不徃无妄何災矣然三動則二亦近於險非自取也莊周謂魯酒薄而邯鄲圍者乎􅀜子明曰无妄而災者災也君子於无妄之災如之何夭壽不貳脩身以俟之所以立命也故三四復位六二卒與五應九四可貞无咎象曰可貞无咎固有之也明人情終不妄也九四剛而不正剛則私慾不行私慾不行則至於无妄无妄則无咎然且有咎者不正也正者四之所固有也操存舎云非外鑠也九旣剛矣動則正正則无妄故曰可貞无妄固有之也致无妄者必自剛夫妄始於慾慾之爲害自一芥取諸人充之至於爲盗舜與跖之分其初甚微也剛者能絶之不以小害爲无傷而不去故此爻在妄爲剛者聖人與之可正也正則剛在其中上九亦剛不曰可貞者妄之極也九五无妄之疾勿藥有喜象曰无妄之藥不可試也九五六二无妄相與而九四以妄間之九五之疾也疾者隂陽失位之象五動四成坎坎爲毒藥之象醫師聚毒攻邪濟人於險者也易傳曰治之而不治率之而不從化之而不革􅀂舜之有苗周公之管蔡孔子之叔孫武叔然而无妄之疾非妄所致勿藥可也盖九五至正戒之在動動而求所以攻之則不正復入於妄以妄治妄其疾愈深待之以正則邪妄自復故曰不可試也試猶甞試言不可妄動少有所試二不能徃五得位而二應勿藥有喜也不正則二不應其能喜乎喜陽得位之象上九无妄行有眚无攸利象曰无妄之行窮之災也无妄之時妄者三爻六三九四上九是也九四可貞六三下體之極上九上體之極上九妄之􅀹極者也上行之三成離離有伏坎坎爲眚三行之上成兊兊爲毀折行有眚也上九六三之妄行即得正然且有眚者妄極而窮窮之災雖行其能免乎爻言眚象言災處妄之極不有人禍必有天殃故夫子極天人以告之􅯪乾下艮上大畜利貞不家食吉利渉大川􅂏曰大畜剛徤篤實輝光日新其德剛上而尚賢能止徤大正也不家食吉養賢也利渉大川􅀿乎天也剛徤乾也篤實艮也大畜者大壯九四變也一變爲需再變爲大畜需有坎離相合發爲輝光進而上行成艮􅀇有兊震兊西震東日所出入日新其德也剛徤則不息篤實則悠乆兩者合一畜而爲德動而有光其光揮散又日新无窮進而不巳自畜其德者也故曰剛徤篤實輝光日新其德此合乾艮兩體而又推大壯之變以言大畜也剛賢者也大壯再變九四之剛進居君位之上賢者置之上位六五以柔下之尚賢也三陽自内而徃難畜者也剛徤篤實輝光日新其德自畜其德矣又尊賢忘􅀔剛上而尚賢具此五者然後能止畜其徤大正也大正乃爲天下國家之利君子當在上小人當在下正也初九九三當位二五相易而正大者正也所以大畜者以其利於大者正故曰剛上而尚賢能止徤大正也此以上九在上六五九二相易以言大畜之利正也剛上而尚賢尊之也尊之而不與之共天位治天職食天禄賢者不可得而畜也三至上體頥養賢也二在内爲家兊口爲食六五尊德樂道下交九二九二受畜而徃應之不家食也王公之尊賢而又養之賢者如是而食則吉正也非獨一身之吉天下之吉不然分國與之視猶輜銖也故曰不家食吉養賢也此以二三四五言大畜賢者止而受養也上能止徤賢者止而食乃能得盡其心與之犯難而不辭兊爲澤決之爲大川震變兊成坎艮震足艮指而越坎渉大川也乾爲天五天位巽爲命天命有德者爲萬民也六五下應乾九二之五大畜止徤賢者不家食應乎天而行何險難之不濟哉故曰利渉大川應乎天也此再以二五言大畜養賢之功在卦氣爲白露故太玄凖之以積象曰天在山中大畜君子以多識前言徃行以畜其德天在山中以人所見爲象猶言水中觀天也聖人論天地日月皆以人所見言之天大無外而在山中其所畜大矣内卦兊口前言也外卦震爲行徃行也二隂四陽陽爲多大畜自大壯來一變需離爲目識前言也再變大畜識徃行也德者剛徤多識前言徃行故能考迹以觀其用察言以求其心而畜其德矣夫以方寸之地觀萬丗之變塗之人而上配堯禹非多識之其能畜乎初九有厲利巳象曰有厲利巳不犯災也巳先儒讀作巳矣之巳王弼讀作巳今從先讀三陽務進初九剛徤之始六四柔得位當止畜之地不度而進處位不當危厲之道也不如巳而受畜則利夫不受畜而徃危實自取不曰眚而曰災者初九正也大畜之時冝止而徃雖正亦厲故曰災子夏傳曰居而待命則利徃而違上則厲初徃四成離離有伏坎故曰犯災不直曰災也九二輿􅀃輻象曰輿􅀃輻中无尤也輻當作輹王弼注作輹坤爲輿自三以上爲震震爲木輿下横木輹也二不動兊毀折之輿􅀃輹也不動未正冝有尤兊爲口尤之者也然遇畜而止􅀃輹不進知以不動爲中是以无尤故曰中无尤也初剛正也二剛中也四五柔也柔能畜剛剛知其不可犯而安之時也夫氣雄九軍者或屈於賔賛之儀才盖一丗者或聽於委裘之命故曰大畜時也九三良馬逐利艱貞曰閑輿衛利有攸往象曰利有攸往上合志也乾爲馬九三得位爲良馬震爲作足三陽並進良馬逐也九三剛徤當位得時上九畜極變而應之利以馳逐然馳逐不巳必自奔蹶之患不可恃應而不備故戒之以利艱貞九三正也動則失正艱難守正則利曰閑輿衛可也古文作粤粤于也發語之辭兊口象艮止也坤爲輿四正閑輿也三乾爲人震爲足爲大途人傍輿而行閑輿而衛之象閑輿衛以其利艱貞也九三如此猶謹㘅䇿清道路節良馬之歩而徐驅焉其進利矣故利有攸往上九陽也變而應三三以剛往與上合志志動於中者也茂陵中書武功爵十三級曰閑輿衛有取於此乎夫恃應而不知備銳進而不知戒鮮不及矣六四童牛之牿元吉象曰六四元吉有喜也坤爲牛坤初爲童牛童牛始角時也六四坤體四之初爲童牛初剛往四角觸之象四不來初屈而不動童牛牿之也牿撗角之木周官謂之楅初之四則二成巽木初復位則剛伏于木下牿牛之象六四當位止剛不以威武爲之以漸優而柔之使无犯上之心剛柔各得其正故元吉元吉者自其始吉吉之至善也喜者陽得位初九不動而應巳剛者反爲柔用六四所以有喜也六五豶豕之牙吉象曰六五之吉有慶也九二犯五則三成坎坎爲豕五成巽巽爲白自三至上體頥豕頥中有剛且白者豕之牙也六五得尊位柔中二退而受畜三坎毀兊金刻制其下而剛伏豶豕之牙也牡豕曰豭攻其特而去之曰豶豶豕則馴擾剛躁自止牙不能害物矣慶者三陽受畜而爲用隂以陽爲慶六五之吉有慶也二應五得正故吉古之善畜天下者知有血氣皆有爭心難以力制務絶其不善之本而巳猶去豕牙之害而豶之也順民之欲因民之利成民之才率之以柔中其效至於垂衣拱手而天下服易傳曰民有欲心見利則動苟不知敎雖刑殺日施其能勝億兆欲利之心乎上九何天之衢亨象曰何天之衢道大行也畜極則通止極則動震爲大塗兊爲口上乾爲天天衢也何大其聲也上動亨也言何其天衢之亨如是乎正者道也大塗亦道也三陽上進道大行也􅩢震下艮上頥貞吉觀頥自求口實􅂏曰頥貞吉養正則吉也觀頥觀其所養也自求口實觀其自養也天地養萬物聖人養賢以及萬民頥之時大矣哉鄭康成曰頥者口車之名震動於下艮止於上口車動而止因輔嚼物以養人故曰頥此合震艮兩體而成頥也頥者養也養之以正則吉養不以正則㐫故曰頥貞吉此以初九之正言頥養之道也頥自臨九二變之一變明夷離爲目觀也自内觀外觀其人之所養也所養正歟君子也所養不正歟小人也觀其所養是非美惡无所逃矣故曰觀頥此以臨二初變明在人者養之之道當正也四變頥自離變艮艮爲手求也自外觀内反觀巳之自養以考正與不正口實者頥中之物也四爻皆隂隂爲虚虚則无物故自求口實无物而求正與不正未定也二四正三五上不正自養者正歟君子之道也雖貧賤不去也自養者不正歟小人之道也雖冨貴不處也故曰自求口實觀其自養也此以上九及頥中四爻明在巳者養之之道當正也觀人之所養然後觀吾之自養則所養正矣養之道甚大天地之養萬物聖人養賢以及萬民亦不過震動艮止也乾天也坤地也震東方萬物發生天地之養萬物也上九尚賢在五位之上坤衆爲民聖人養賢以及萬民也天地之生其動以正陽降隂升萬物自遂其盛至於盈乎天地之間各極其分而後止天地不勞也動以正而已養萬民者本於養賢賢者在上萬民自遂其生聖人不勞也止於養賢而已故震動艮止之象自巳之養推之至於人之養自人之養推之至於天地聖人然養之道不過乎此頥之時豈不大乎故曰天地養萬物聖人養賢以及萬民頥之時大矣哉此以頥之成卦終言頥之道也易傳曰或云用或云義或云時以其大者也萬物之生養以時爲大故云時以卦氣言之十一月卦故太玄準之以養或曰初變明夷則有離四變成頥非離也何以有觀之象曰此可以意㑹難以言傳明夷之離爲小過之飛鳥訟之坎爲中孚之豚小過中孚豈有離坎論其所生也變卦之法一卦七變八卦爲六十四四五六之變无復本體矣而五行盛衰皆以本卦言之何哉故曰察性知命原始見終象曰山下有雷頥君子以愼言語節飲食山下有雷以養萬物而動亦不可過也震爲決躁艮止之慎言語也噬嗑有飲食之象頥中无物節飲食也言語不慎則招禍飲食不節則生疾皆非養之道易傳曰慎言語以養德節飲食以養體事之至近而所係至大者莫過於言語飲食在身爲言語於天下則命令政敎出於身者皆是慎之則无失在身爲飲食於天下則貨財資用養於人者皆是節之則无傷初九舎爾靈􅀛觀我朶頥凶象曰觀我朶頥亦不足貴也頥自明夷之離四變而成頥故頥初九有􅀛之象伏于坤土之下􅀛蟄時也􅀛所以靈者蟄則咽息不動无求於外故能神明而壽君子在下自養以正靈􅀛之􅀋也六四安位无下賢之意初不待求徃之四成離離爲目觀我也初震動體下頥而動口雖徒嚼志巳先動是舎爾所以爲靈􅀛者觀我而朶其頥也爾言初九我言六四舎爾觀我志巳從欲動而不正凶之道也夫貴乎陽者爲其特立不屈於欲故能无禄而冨无爵而貴守道脩德淡然无營今躁妄以求无恥自辱亦不足貴也六二顚頥拂經于丘頥征凶象曰六二征凶行失􅀋也二比於初不能養其下而反資初九之賢以自養乾爲首在下顚頥也六二經也顚頥則拂違其經矣養之經陽養隂上養下陽當在上養之隂當在下而受養故天子養天下諸侯養一國士庶人各以其職受養五處君位二當受養干五六五養道不足然二亦不可越五而上征丘者上九應二之象也艮爲山山半爲丘王肅曰丘小山也物之所聚以養人者也盖二近於初而相得資之以養雖曰顚頥未爲无所養􅀂近捨初九逺資上九正行亦凶何哉五雖養道不足以隂陽言之巳􅀋又在相應之地上九應二則失其􅀋矣六三拂頥貞凶十年勿用无攸利象曰十年勿用道大悖也六三當受養於上九而六三不正動而正則上九不來不動以待初九則初九不應旣不受之於上又无以資之於下拂頥也故貞凶十坤數之極坤爲年十年勿用言十年不可動上下无所利養道大悖也六四顚頥吉虎視眈眈其欲逐逐无咎象曰顚頥之吉上施光也頥以上養下六四當位下交初九乾首在下顚也求賢自助於剛柔爲正正則吉故曰顚頥吉虎視謂四交初也初徃成艮離艮有伏兊爲虎離爲目虎視也易通卦驗小寒虎始交際垂其首垂其首者下視也艮坤互有坎重厚而深沉眈眈也虎首下視眈眈然下交不瀆矣六四其欲在於初九不瀆則初九逐逐而徃震爲作足逐也古文作跾初徃之四不正冝有咎然无咎者以不瀆故无咎虎視眈眈其欲逐逐无咎六四在上施之下者光也光坎離下照之象或曰虞仲翔曰坤爲虎又曰艮爲虎馬融曰兊爲虎郭璞以兊艮爲虎三者孰是曰三者異位而同象坤爲虎者坤交乾也其文玄黃天地之文艮爲虎者寅位也泰卦乾坤交也在天文尾爲虎艮也大雪十一月節後五日復卦六二爻虎始交兊爲虎者參伐之次占家以庚辛爲虎者兊也龍德所衝爲虎亦兊也兊下伏艮具此三者之象故先儒並傳之舉兊則三象具矣六五拂經居貞吉不可渉大川象曰居貞之吉順以從上也正者養之經上養下陽養隂正也六五柔得尊位養道不足資上九之賢以爲養拂經也上九助五之養有正之道五寛以居之順從於上則得正而吉艮止也有居之象故曰居貞之吉順以從上也人君養天下以正得衆以用其徤乃可渉難六五拂經其才不足故不可渉難上五相易成坎无震足巽股之象不可渉也易傳曰艱難之際非剛明之主不可恃不得已而濟險難者有之矣其可常乎上九由頥厲吉利渉大川象曰由頥厲吉大有慶也一陽處上下有四隂六五體柔无應才不足以養天下而天下由之以養者也故曰由頥然非養道之正也權重位髙衆忌之則必危人臣當此任可不兢畏而懷危懼乎故厲以剛居柔位厲也厲則不敢安其位下從王事无成有終上下並受其福故大有慶鄭康成曰君以得人爲慶虞仲翔曰陽得位故大有慶上之三成坎有震足象利渉大川也上九佐五以養道養天下而得民利於渉難也象不言者大有慶則渉難在其中上艮體頥以靜止爲善故三爻皆吉􅪑巽下兊上大過棟橈利有攸徃亨􅂏曰大過大者過也棟橈本末弱也剛過而中巽而􅀃行利有攸徃乃亨大過之時大矣哉大過陽過隂大者過越也鄭康成曰陽爻過也卦四陽二隂陽居用事之地故曰大過大者過也此以六爻言大過也巽爲木爲長上兊者巽之反長木反在上爲棟巽風橈萬物者也而體弱陽爲重四陽在中任重也長木在上而任重本末皆弱棟撓也天地之理剛柔不可以相无剛以柔爲用柔以剛爲體柔旣不足剛亦无自而託譬之棟也中雖剛強而端柔弱棟豈能勝其任哉故曰棟橈本末弱也此以巽兊兩體言大過之時也大過自遯六二變剛過者九二九四中者九二九五興衰救弊補其偏而不起之處非剛過不可也中則无剛過之患剛過而中所謂時中也過非過於理也以過爲中也猶之治疾疾勢沉痼必攻之以瞑眩之藥自其治微疾之道觀之則謂之過自藥病相對言之則謂之中巽在内者巽乎内也兊在外者􅀃乎外也内巽外􅀃而志行抑剛之有餘以濟柔之不足則剛來柔往隂得位不窮大者不過乃亨乃者難辭也君子強小人弱六二不往以濟之亦何由亨夫剛過而不反不肖之心應之未有不爲君子害者也東漢之季清議大勝君子小人至不相容大過巳極而不知反是以不亨故曰剛過而中巽而􅀃行乃亨此以卦變合二體而言濟大過之道也大過之時君子過越常分以濟弱能逹乎時中矣又巽而􅀃行以是而徃利於有爲建大功立大事非大過人者不能趨此時故曰大過之時大矣哉在卦氣爲小雪故太玄準之以失劇象曰澤滅木大過君子以獨立不懼遯丗无悶澤養木者也過而滅没其木大過也初六以一柔巽於四剛之下而不變巽爲股立也巽見震伏震爲恐懼獨立而不懼也所謂以天下非之而不頋者乎上六處一卦之外遯也兊爲􅀃无悶也遯丗无悶所謂舉丗不知而不悔者乎二者非大過人不能也王輔嗣曰非凡所及也初六藉用白茅无咎象曰藉用白茅柔在下也巽爲白爲草交乎乾剛草白而剛白茅也先儒謂秋茅也以柔藉剛藉也大過爻畫有足有腹有耳器之象坤爲地置器者苟措諸地可也而藉用潔白之茅茅之爲物薄而用重過慎也過慎者慎之至也大過君子將有事焉以任至大之事過而无咎者其唯過於慎乎過非正也􅀄六執柔處下不犯乎剛於此而過其誰咎之雖不當位无咎也故曰慎斯術以往其无所失矣九二枯楊生稊老夫得其女妻无不利象曰老夫女妻過以相與也兊爲澤巽爲木澤木楊也兊正秋枯楊也言陽已過也二變而與初二成艮巽木在土下根也枯楊有根則其穉秀出稊穉也楊之秀也伏震之象故曰枯楊生稊鄭氏易作荑艮爲夫陽過老夫也巽爲艮妻初隂女妻也老夫得女妻過而相與猶足成生育之功无不利也盖九二剛中用柔以濟之則无過極之失矣九三棟橈凶象曰棟橈之凶不可以有輔也九三巽爲長木居中任重棟也大過陽過隂弱爻以陽濟隂爲濟過之道九三有上六正應當相濟六濟九則陽不過隂不窮矣則上六者九三之輔助也九三以大過之陽復以剛自居而不中過乎剛者也以過甚之剛動又不正不正則上六不應人所不與安能當大過之任如是有摧折敗橈而巳凶之道也所以致凶者以不可以有其輔也易傳曰三居過而用剛巽旣終而且變豈復有用柔之義應者謂志相從也三方過剛上能係其志乎九四棟隆吉有它吝象曰棟隆之吉不橈乎下也九四反巽在上巽爲長木棟之象陽處隂而不過能用柔以相濟者也動而正正則不橈乎在下之柔故曰棟隆之吉不橈乎下也易傳曰隆謂不係於初不曲以從下也大過之時以剛濟柔爲得冝剛柔得冝而志復應初有佗也初六九四非正應故以初六爲它九四近君當大過之任不能絶去偏係不足以任九五之重吝道也易傳曰二比初則无不利四應初則爲吝何也曰二得中而比於初以柔相濟之義也四與初志相係者也剛柔得冝而係於隂則害剛矣故可吝也九五枯楊生華老婦得其士夫无咎无譽象曰枯楊生華何可乆也老婦士夫亦可醜也兊爲澤巽爲木澤木楊也五兊變而與上兊成震兊􅀃也震爲旉爲蕃鮮其旉蕃鮮可􅀃生華也巽爲長而伏何可乆也巽爲婦上六隂巳窮老婦也震爲長男得士夫也九變六隂居陽冝有咎以陽濟隂故无咎兊爲口震成兊毀故无譽雖曰无咎无譽然以陽而配窮隂又不能濟得無醜乎盖上六過極之隂雖五當位剛中濟之以柔不能成功也以陽濟隂其在於未極之時乎上六過渉滅頂凶无咎象曰過渉之凶不可咎也乾爲首上六在首之上頂也上六本遯之六二自二進而上行渉四爻至上成兊兊澤滅没其頂渉難之過也九二九四剛陽過越以濟難乃克有濟上六柔而處大過之極不量其力至於滅頂然上六正也志在拯溺不可咎也過渉之凶所謂以貞勝也象有言不可咎者義不可咎也有言又誰咎者自取禍也􅪐坎下坎上習坎有孚維心亨行有尚􅂏曰習坎重險也水流而不􅄹行險而不失其信維心亨乃以剛中也行有尚往有功也天險不可升也地險山川丘陵也王公設險以守其國險之時用大矣哉坎一陽二隂在地爲水水之流動陽也其靜隂也流動乎隂中者陽䧟乎隂也䧟爲險難八卦皆一字重坎加習然後盡險之象故曰習坎此以兩坎言坎也坎自臨變初九之五坎爲水九二兊澤決而流流而不岀乎中不􅄹也凢水之流有物阻之然後􅄹流而就下則不􅄹不􅄹者中也初之五復爲坎行險也行險而不出乎中五必應二不失其信也水必就下流濕萬折而必東有諸巳之謂乎必曰習坎者唯習坎乃見其然君子動而不過臨難而不苟似之故辭曰有孚􅂏曰水流而不􅄹行險而不失其信此以卦變言坎之德也心者中也二五也亨者自初之五陽得位而亨水之流行雖處至險无所不通者亨也乃以剛中而不變也君子之在險亦然身雖蹈難其心則亨亦以剛中也初之五者往也剛得中而亨者徃有功也坎之道有尚乎此君子濟難岀險亦豈離乎剛中哉剛中者誠實也誠實則金石可貫水火可蹈天地可動故曰維心亨乃以剛中也行有尚往有功也此以卦變明處險之道也險者坎之用也能用乎險則无惡乎險矣天地之大不可以去險况王公乎坎在上天險也天之所以險者震足止於下不可升也坎在下地險也地之所以險者艮爲山坎爲川半山爲丘陵也坤在上國也五乾爲王三爲三公四爲諸侯坤國而坎據之王公設險以守其國也設險不唯城郭溝池兵甲之利綱紀法度人所不能踰者皆是所以法天地也故曰天險不可升也地險山川丘陵也王公設險以守其國此推明二五反復以盡習坎之義也難生者險之時也用之以道濟天下之難者險之用也不知其時不得其用行之不以中反䧟乎險中小則亡身大則亡國故夫子嘆曰險之時用大矣哉在卦氣爲大雪故太玄準之以勤象曰水洊至習坎君子以常德行習教事卦言坎者水也大象言坎者水流之坎窞也水流行不止至于坎矣復至于坎其行洊至有常習之象常德行習敎事非一日之積如水洊至也二五正中德也震爲行坤順也爲民敎順民者也常德行可以渉險習敎事可以夷險初六習坎入于坎窞凶象曰習坎入坎失道凶也初六本臨之六五自外入于初歷兩坎習重也故曰習坎窞坎底也道由正而行也君子處險當以正道乃可岀險初六不正不能岀險反入于重坎之底失道而凶也此何異學泅者不知與汨俱岀而溺死者乎九二坎有險求小得象曰求小得未岀中也二剛中而䧟於二隂上有坎險居坎而又有險者也動而有求五必應之五艮爲手求之象隂爲小故小有得然未岀乎險中其剛􅂊足以自濟易傳曰君子處艱難而能自保者惟剛中而巳六三來之坎坎險且枕入于坎窞勿用象曰來之坎坎終无功也六三柔而不中履非其位不善處險者也往之於上則坎險之極五有艮木枝􅀝而礙之險且枕也陸希聲曰枕閡礙險害之貌來而處三則在上坎之厎入于坎窞也來坎也往亦坎也終无濟險之功故終勿用三下之終也六四樽酒簋貳用缶納約自牗終无咎象曰樽酒簋貳剛柔際也四自初至五有震坎艮坤坎震酒也艮􅈹震足坤腹樽簋之形皆有首􅈹腹足而樽異者有酒也有樽酒象而簋象亦具焉簋貳也貳副之也樽酒而簋副之燕饗之禮君臣上下剛柔相際之時也三四坤爲土爲腹土器有腹缶也缶樸素之物質之象坤爲闔户坎艮爲穴穴其戸傍通日月之光牗也明之象約者交相信四五相易而後四應初五應二納約也約誠信固結之象六四柔而正九五剛中而正四五无應四非五莫之比五非四亦莫之承上下恊力可以濟險故四當剛柔相際也用質以交於上因五之所明以納其誠信則言辭易入險難易濟終无咎也四五相易冝有咎而易則五出險矣故終无咎終謂上六不動也易傳曰自古能諌其君者未有不因其所明者也故訐直強勁者率多所忤而温厚明辯者其􅀃易行古人有行之者左師觸龍之於趙張子房之於漢是也非惟告其君如此敎人亦然孟子所謂成德逹才是也九五坎不􅄹祇旣平无咎象曰坎不􅄹中未大也九五本臨􅀄九往之五坎中而不􅄹雖不􅄹也有出險之理然九五下比六四所係者狹四五相易中存而大毀是水不􅄹坎適至於平而止也出險之道在剛中正剛正則大中而未大幾可以岀險故聖人惜之曰祗旣平无咎而巳祇適足之辭横渠曰不能勉成其功光大其志此所以爲可惜歟上六係用徽纆寘于叢􅁄三歳不得凶象曰上六失道凶三歳也上動成巽巽爲繩坤坎爲黒變巽徽纆也巽木交坎爲叢􅁄上六柔无出險之才處險極之時守正可也不當動而動則愈䧟矣譬如有人䧟於狴犴之中坐而省過雖上罪也不過三歳得出矣妄動求出則舉乎掛徽纆投足蹈叢􅁄䧟之愈深雖三歳豈得出哉係之寘之不得出也然險極必平巽木數三乾爲歳凶三歳也􅀄六可動而不能上六不可動而妄動皆失道也􅬴離下離上離利貞亨畜牝牛吉􅂏曰離麗也日月麗乎天百榖草木麗乎土重明以麗乎正乃化成天下柔麗乎中正故亨是以畜牝牛吉也離自遯􅀄六三變而成二五皆一隂而麗二陽物之情未有不相附麗者也柔必麗乎剛弱必麗乎強小必麗乎大晦必麗乎明故曰離麗遯一變六之三成无妄再變六之四成家人三變六之五成離自六之四言之離有坎日降而月升也自六之五言之坎復成離月降而日升也乾爲天故曰日月麗乎天自六之三言之有震巽震爲百榖巽爲草木乾䇿三十六坤䇿二十四震三爻凢八十有四百榖舉成數也坤爲土故曰百榖草木麗乎土觀天地日月百榖草木附麗如此則萬物之情有不相附麗者乎此推原卦變以明離爲麗之義也兩離重明也君臣上下皆有明德之象重明而不麗乎正則以察爲明重明而麗乎正以之化天下成文明之俗矣􅀄二三正麗乎正也三爻在乾天之下有巽順服從之象化成也故辭曰利貞􅂏曰重明以麗乎正乃化成天下此舉成卦言離明之所麗也柔之爲道不利逺者不麗乎中正則邪佞之道其能亨乎六居五柔麗乎中而亨也六居二柔麗乎中正而亨也言柔麗乎中正則二五舉矣中正者人之本心也天下之心必麗乎中正則重明而麗乎正化成天下也必矣故辭曰亨􅂏曰柔麗乎中正故亨此以二五言離柔之所麗也兩者離之才也坤爲牛順也六二以隂居隂爲牝牛至順也畜養也以剛正畜養之成其至順而麗於中正則吉是亦柔之利也故辭曰畜牝牛吉􅂏曰柔麗乎中正故亨是以畜牝牛吉也此以内卦終言柔之所麗也在卦氣爲四月故太玄準之以應象曰明兩作離大人以繼明照于四方明兩作者麗乎明也鄭康成曰作起也明明相繼而起大人重光之象堯舜禹文武之盛也兊有伏震離有伏坎震東兊西坎離南北照四方也􅀄九履錯然敬之无咎象曰履錯之敬以辟咎也遯艮爲指指在下體之下爲趾五來踐初履也初欲麗四交巽巽爲進退故其履錯然進退動則失正失正則有咎故敬之不敢動以辟有咎榮辱安危繫於所麗君子處離之始安其分義守正而巳故无所麗是以无咎管寜逡廵於萬乗之招王丹偃蹇於三公之貴以辟咎乎六二黃離元吉象曰黃離元吉得中道也黃者地之中萬物必有所麗六二坤柔在下麗乎中而與五合一得中道也夫中者天地萬物之所共由天地之長乆日月維斗之不息聖人之道亘古今而无弊者也六二得之故能守正而不遷乗剛而不懼抱明德而獨照是以元吉九三日􅉴之離不鼔缶而歌則大耋之嗟凶象曰日􅉴之離何可乆也離爲日在下􅉴也九三明盡當繼之際故曰日􅉴之離盛必有衰始必有終生必有死晝夜寒暑之變逹人觀此知窮必有變乃理之常孰知生之可羡死之可惡吉凶泯矣故鼓缶而歌缶者常用之器歌之者樂其得常也九三離腹變坤爲缶艮手擊之鼔缶也兊變震而體離口舌動有聲成文歌也昧者不知變不鼓缶而歌則大耋近死戚嗟憂之不安於死則凶矣九三不變乾首巽白處明盡當繼之際大耋也八十曰耄九十曰耋離三爻乾坤之䇿九十有六故曰耋陽爲大大耋也大耋猶言大老三失應而憂嗟也夫日􅉴之光斯須入于地雖欲附麗何可乆也是故君子頽然委順不以死生累其心巽爲長巽變何可乆也九四突如其來如焚如死如棄如象曰突如其來如无所容也九四重剛而不中正又處不當位不善乎繼而求繼者也四之五成乾巽乾爲父巽爲子子凌父突也突字古文作倒子不順之子也凌突而往其能來乎言逆德也巽木得火焚如也火王木死死如也退復三兊毀之其下反目而視棄如也言不容於内外者如此故曰突如其來如无所容也先儒謂古有焚刑刑人之喪不居兆域不序昭穆焚而棄之易傳曰禍極矣凶不足言也六五出涕沱􅀂戚嗟􅀂吉象曰六五之吉離王公也離目兊澤出涕也鄭康成曰自目岀曰涕巽爲長沱􅀂也五失位爲憂戚也兊口嗟􅀂也六五柔居尊位九四凌突故岀涕戚嗟然有吉之道九四突五離王公則吉四五相易上麗王位正也下麗三公用利也據正而用利以順討逆何憂乎九四哉上九王用出征有嘉折首獲匪其醜象曰王用出征以正􅀖也上九麗極有不麗者焉上五相易六以正行王用之以出征也上有剛德而明故王用之兊毀折乾爲首陽爲美九五美之至嘉也言用之有功王嘉其折首書曰殱厥渠魁脅從罔治折首者殱渠魁也醜􅀋也隂又爲醜上六下應九三陽也陽非隂之􅀋獲匪其醜也醜脅從者乎王用出征非樂殺人也正其不附者所以正􅀖也離上三爻不正上五相易而正獨九四不正四諸侯位四正成坤土則􅀖正矣王肅易本曰獲匪其醜大有功也疑今本脫之周易上經噬嗑傳第三也􅀜
