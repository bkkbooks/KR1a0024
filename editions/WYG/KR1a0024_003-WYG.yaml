body:
  text: 漢上易傳卷三宋朱震撰上經震下離上噬嗑亨利用獄彖曰頤中有物曰噬嗑噬嗑而亨剛柔分動而明雷電合而章柔得中而上行雖不當位利用獄也離震合而成體爲頤中有物之象九四之剛頤中之物嗑合也噬而合之剛決而上下亨矣推之人事上下之際有間之者彊梗讒邪姦宄弗率噬而合合而亨易𫝊曰君臣父子親戚朋友之間有離貳怨隙者蓋讒邪間於其間也除去之則合矣間隔者天下之大害也故曰頤中有物曰噬嗑噬嗑而亨此合兩體言噬嗑與亨之義也夫互體之變難知也聖人於噬嗑彖明言之其所不言者觀象玩辭可以類推固者爲之彼將曰艮震頤也責離而求艮離豈艮哉故曰知者觀其彖辭則思過半矣噬嗑自否来否之時剛柔不分天地閉塞九五之剛分而之初剛下柔也初六之柔分而之五柔上行也剛柔分則上下交矣動而明則否塞通矣以隂陽言之震陽也離隂也雷動電明剛柔相交合一而成章則天地亨矣故曰剛柔分動而明雷電合而章此以初五相易合兩體以言噬嗑之才也噬嗑除間之卦不止於用獄言利用獄者専以六五言噬嗑之用坎為律為棘獄象也六五之柔得中而上行下據九四之坎用獄也所謂上行者以柔道行之於上也五君位唯剛健中正足以當之六五柔中不當位也雖不當位而施之於用獄則无若柔中之為利矣或曰柔中足以用獄乎曰人君者止於仁不以明斷稱也古之用獄者史以獄成告于正正聽之正以獄成告于大司宼大司寇聽之棘木之下大司寇以獄之成告于王王命三公參聽之三公以獄之成告于王王三宥然後制刑宥之者柔也三宥之然後制刑者柔中也制刑者有司之事不得已聽而制刑者人君之徳徳歸于上有司不失其職於下是以其民畏而愛之愛之斯戴之矣故曰人君之用獄无若柔中之為利也臯陶之美舜曰與其殺不辜寧失不經好生之徳洽於民心夫殺不辜則民將以虐我者為讎好生之徳洽於民心則天下樂推而不厭曾子曰上失其道民㪚乆矣如得其情則哀矜而勿喜士師有司也曾子告之如此况人君乎觀臯陶曾子之言則在於寧失也在於哀矜也不在乎明斷審矣自易失其𫝊參之以申韓之學人君用明斷决獄訟躬行有司之事其弊至於刻薄少恩民心日離思與之偕亡讀易不察之過也故不可不與之辯焉卦氣秋分也故太𤣥準之以䦯象曰雷電噬嗑先王以明罰勑法勑當作敕明其罰之輕重使人曉然易避效電之明也正其法令以警懈惰效雷之動也九四坎為律法也三不正敕法也上三爻不正明罰也先王將明罰必先敕法非謂法其威怒以致刑此卦至爻變始有用刑之象初九履校滅趾无咎象曰履校滅趾不行也否下體艮為指在下體之下為趾巽變震為足為草木以草木連足指象沒矣屨校滅趾也荀卿曰菲䋽屨䋽枲也尚書大傳曰唐虞之象刑上刑赭衣中刑雜屨雜屨即傳所謂藨蒯之屨要之中刑之屨或菲或枲或藨或蒯皆草為之疑古者制為菲屨赭衣當刑者服之以示愧恥非无肉刑也愼子謂以履當刖誤矣周官掌囚下罪桎桎足械也械亦曰校大罪者小罪之積否初九不正其行不已故屨校以沒其足使止而不行所懲者小所戒者大乃所以无咎震為行艮止之不行也无咎正也卦以初上為受刑二至五為用刑者用刑貴中也王弼謂初上无位非也六爻非竒則偶豈容无位六二噬膚滅鼻无咎象曰噬膚滅鼻乗剛也艮隂為膚柔而近革噬之為易六三是也何以知艮隂為膚剥六四曰剥牀以膚坤剥乾成艮也六三不當六二噬之中正而動剛乗剛而往所刑者當兊為口故曰噬膚艮為鼻二動兊見艮毁滅鼻也鼻在面中滅鼻則當息不息則勢不能乆言三雖不當而二之用刑亦不過中故无咎二動宜有咎也橫渠曰六三居有過之地而已噬之乗剛而動為力不勞動未過中故无咎六三噬腊肉遇毒小吝无咎象曰遇毒位不當也鳥獸全體乾之為腊噬之最難者也九四不正間於上下之際強梗者也艮為黔喙之屬離為雉日熯之腊肉之象六三位不當以柔噬剛刑人而不服必反傷之故遇毒毒坎險也何知坎為毒師曰以此毒天下謂坎也小吝者六三位不當而柔也然无咎者動則正兊見坎毁強梗去矣兊口噬也荀爽曰噬腊謂四也九四噬乾胏得金矢利艱貞吉象曰利艱貞吉未光也附骨之肉謂之胏胏古文作􅳨橫渠謂五也六五柔中有剛在二剛之中日熯之乾胏之象胏比腊為易比膚為難九四剛直不撓往則克之得金矢也乾變為金巽為木坎為矯為弓離為兵矯木施金加於弓上矢也金剛矢直噬之則剛直行矣四五易坎毁成頤噬乾胏得金矢也九四不正動而正唯恐其不正不正不足以噬故利艱貞乃吉不然則凶艱貞乃吉者以其道未光道光則安用艱貞哉或曰五君位四噬之可乎曰噬嗑爻辭取上下相噬明用刑難易而已不以君位言之卦五不以君位言者六卦訟也噬嗑也恒也遯也明夷也旅也訟不言君者人君不以聽訟為主故風美召伯頌言臯陶而已恒不言君者君道不可以柔為恒遯不言君者君不可遯也明夷不言君者失君之則也旅不言君者君不可以旅也春秋天王居于鄭書出諸侯去國書奔噬嗑决獄有司之事非人君之職若以五為君則二大夫三公四侯相噬何哉易不可一端盡也六五噬乾肉得黃金貞厲无咎象曰貞厲无咎得當也噬上也上剛而居柔離日熯之乾肉之象乾肉比膚為難比胏為易五與上易成兊口故曰噬乾肉黃中色離中之坤也上乾變為金故曰得黃金言自五噬上噬之亦難噬之而服則於剛為得中矣九居五貞也故曰貞五未易上有強不能噬於正為厲於徳為有咎噬上九而當雖厲終无咎也故曰厲无咎得當也得當者於五剛中為當也或曰用刑言噬何也曰此聖人之深意也夫示之徳譲使人安於至足之分則不爭不爭則无訟今物至於噬而後合徳下衰矣噬之當也猶愧乎无訟矧噬之有不當乎末流之禍怨亂並興反覆相噬且萬物同體而使物至於噬自噬之道也故四之剛直上九之剛未免於噬夫子曰必也使無訟乎叔向曰三辟之興皆興於叔世聖人之意不其深乎上九何校滅耳凶象曰何校滅耳聦不明也四坎為耳上九之三巽為木巽見坎毁何校滅耳也上九有耳不明乎善罪大惡積陷于凶而不知宜曰耳不聦曰聦不明何也坎水離火日月之光火外景也於目為視水内景也於耳為聽視聽之用无非明也氣交則通精併則專瞶者專視併耳之用於目也瞽者專聽併目之用於耳也上之三離目毁无見善之明又不能專聽是聰復不明何校滅耳責其有耳之形无耳之用也離下艮上賁亨小利有攸往彖曰賁亨柔來而文剛故亨分剛上而文柔故小利有攸往天文也文明以止人文也觀乎天文以察時變觀乎人文以化成天下賁本泰也坤之上六來居於二以一柔而文二剛則柔得中而亨文柔徳也故曰賁亨九二分而往於上以一剛而文二柔剛不得中而柔得中小者之利也然剛不往則小者无以濟之不能文矣故曰小利有攸往柔來文剛而得中分剛上而文柔柔者亦得中上下相文而不失乎中則賁也非過飾也故曰賁賁者文飾之道曰往曰來者往來相錯因其質而文之易傳曰質必有文自然之理理必有對待生生之本也有上則有下有此則有彼有質則有文一不獨立二則為文以天文言之无非剛柔交錯隂陽之精在地象物成列光耀離合皆剛柔也日陽也而為離月隂也而為坎緯星動者陽也而太白辰星為隂經星不動者隂也而析木鶉首為陽北斗振天二極不動故曰天文也以人文言之坤來文乾而成離坤文而離明文明也艮止也父剛子柔君剛臣柔夫剛婦柔朋友者剛柔之合長幼者剛柔之序五者交錯粲然成文天理也非人為也上下内外尊卑貴賤其文明而不亂各當其分而止矣文明以止則禍亂不生災害不作故日月軌道五星順序萬物自遂天文人文其理一也故曰文明以止人文也此合乾坤剛柔艮離兩體而言賁也聖人觀乎天文則知剛柔有常矣故南面而立視昬旦之星日月之次以知四時寒暑之變春震秋兊泰之時也夏離冬坎賁之時也泰易為賁四時互變時變之象也觀乎人文知天下之情必麗乎中正中正者理之所當得者也故彰之車服明之藻色天下自化矣柔麗乎中正者化成天下之道也乾天也二變艮成也二柔麗乎中正也仰觀天文俯觀人文不順乎天則反求乎人文而已矣此推原卦變以盡賁之道也在卦氣為八月故太𤣥準之以飾象曰山下有火賁君子以明庶政无敢折獄山下有火託物以明異乎晉之自昭明徳也賁飾之象君子體之以明庶政者初二三四正坤為衆政者正也无敢折獄者折獄之道在於用常人吉士哀矜獄情不恃明察也不尚文飾也或曰噬嗑亦明也明罰何也曰噬嗑六三九四六五上九不正不正者罰之賁无敢折獄下四爻正也庶政明而後折獄乃无枉濫初九賁其趾舎車而徒象曰舎車而徒義弗乗也艮為指初在下體之下動而應足趾也坤為輿二坎為輪車也四震為大途為足足趾行乎大途者徒行也初九於六二為近於六四為逺舎二車弗乗寧徒行而弗辭者六二非正應義弗乗也夫車所以賁其行義弗當乗而乗之辱也非賁也是以寧徒行雖跣足賁也古之人有弗肯乗人之車緩歩以當車者守義故也六二賁其須象曰賁其須與上興也二言賁飾之道毛在頤曰須在口曰髭在頰曰髯三有頤體二柔在頤下須之象二三剛柔相賁賁其須也夫文不虚生譬之須生於頤血盛則繁滋血衰則減耗非增益為之飾與上興也與相與也二三相賁而成震起也柔道上行有興之象是故冠弁衣裳黼黻文章雕琢刻鏤𤣥黃之飾因其有尊卑貴賤之實而明之實既不同其文亦異不豐不殺惟其稱也棘子成曰質而已矣何以文為不知文待質而後興也九三賁如濡如永貞吉象曰永貞之吉終莫之陵也六二以柔賁剛賁如也九三坎體以剛賁柔坎水濡之澤潤而有光耀濡如也剛柔相賁文飾之盛禮之致隆者也然二非正應以近相得故相賁相濡以成文九三守正不動二亦柔麗乎中正故吉三賁將變動而失正則上且自外而陵之禮者法之大分去爭奪之道也永正誰能陵之今夫富商之財足以金玉其車文錯其服而木楗韋藩過於朝而不歉者知禮法之不可以干也苟失其正乗其間者有競心焉安能自免於陵轢乎故終莫之陵者永貞之吉三下卦之終三不動永貞之象六四賁如皤如白馬翰如匪寇㛰媾象曰六四當位疑也匪寇㛰媾終无尤也六四初九以正相賁也六四之柔下賁初九賁如也初九之剛上賁六四成巽六二為須巽為白皤如也言初之賁四純白相賁飾也六四當位伏巽為不果有疑志也四所以疑者初間於三坎為盜盜據内外之際四有乗剛之險初四未獲賁也雖未獲賁而應之志其疾如白馬翰如飛騰而赴之匪九三之寇則遂㛰媾矣初離為雉之四巽為雞翰如也翰剛爻也震為作足之馬震變巽故曰白馬翰如震長男離中女男女合故曰㛰媾純白无偽誰能間之始疑而終合故曰終无尤也四之所尤者三也三下卦之終六五賁于丘園束帛戔戔吝終吉象曰六五之吉有喜也艮為山為果蓏山半為丘而有果蓏丘園也五尊位柔中外資上九之賢故曰賁于丘園坤為帛艮手束之束帛五兩坤數也三𤣥二纁天地竒耦之文上五相賁之象戔戔委積貌坤為衆束帛其上多而委積用之以外聘故曰束帛戔戔夫五得尊位當賁天下六二不應近比上九吝道也然柔中厚禮上九自外賁之始吝而終吉正則吉也隂陽得位曰喜上來賁五陽得位而正喜豈偽為之哉好賢樂善有得於誠心故曰六五之吉有喜也上九白賁无咎象曰白賁无咎上得志也上九賁之極有不賁者焉聖人因天地自然之文立王制為天下之大隆是非之封界分職名象之所起也其志在於著誠去偽使人各由其情不失其本真矣末流之弊尚文勝質而本眞衰焉豈賁飾之初志哉志者動於中之謂也上九變動反三三有伏巽而離體離者乾再索而成巽之變也巽為白離為文有色生於无色故曰白賁白質也賁文也五色本於素五味本於淡五聲本於虚質者文之本上九變動而反本則文何由勝咎何由有我志得矣故曰大禮必簡至敬无文然貴本之謂文親用之謂理兩者合而成文以歸太一夫是之謂大隆故酒醴之美𤣥酒明水之尚黼黻文繡之美䟽布之尚莞簟之安而蒲越稾鞂之尚丹漆雕幾之美而素車之尚荀子曰禮始於脫成於文終於梲夫終則有始質者文之始上九之白賁文在其中矣變而通之三代損益之道是以无咎而得志不然事生送死而无敬文墨子之道烏得為无咎賁四至上其變皆以巽人文相賁以禮讓為本坤下艮上剥不利有攸往彖曰剥剥也柔變剛也不利有攸往小人長也順而止之觀象也君子尚消息盈虚天行也剥本乾隂侵陽進而剥之柔剥乎剛下剥其上回邪剥正道小人剥君子剛為柔變故曰剥剥也柔變剛也此以五隂剥陽言剥也剥而不已一陽僅存小人旣長君子道消往亦无與何所之哉當巽言屈身避害而已故曰不利有攸往小人長也此以上九言剥也聖人患君子不往人道將絶故又𤼵其義曰順而止之坤順艮止也止小人之道當順其理而止之乃可以止蓋以象觀之剥極當止之時五變隂陽有可反之理剥反晉晉反大有而乾體復矣天道之行消於巽息於兊盈於乾虚於坤消極則息盈乆則虚君子尚之與時偕行能柔能剛任理而已矣漢唐之季小人道長諸賢不能順而止之悉力以抗小人是以无成功王弼謂强亢激拂觸忤以隕身身旣傾焉功又不就非君子之所尚也故曰順而止之觀象也君子尚消息盈虚天行也此以艮坤二體剥復升降明處剥之道也在卦氣為九月故太𤣥準之以割鄭康成以萬物零落謂之剥者論卦氣也彖言象者三剥也鼎也小過也剥小過卦變之象也卦變自辟卦言之坤變復六變而成乾乾變姤六變而成坤自反對言之復姤變十二卦遯否臨泰變四十八卦自下而變也觀剥之象則知之矣自相生言之復姤五變成十卦臨遯五復五變成二十四卦泰否三復三變成十八卦上下相變也觀小過之象則知之矣鼎互體之象也卦以隂陽虚實剛柔竒耦交錯互變於六爻之中而象其物宜觀鼎之象則知之矣觀是三者易之象舉積此矣象曰山附於地剥上以厚下安宅山剥而附於地則其下厚矣為人上者觀此故裕民敦本務厚其下是乃安宅不傾之道書曰民維邦本本固邦寧初六剥牀以足蔑貞凶象曰剥牀以足以滅下也劉牧讀剥牀以足蔑案六四曰剥牀以膚則剥牀以足當為句絶坤變乾也坤西南方也初動成巽巽為木設木於西南之奥乾人藉之牀之象也剥以其足寢其上者危矣初有伏震震為足隂之剥陽必自下始蔑无之也无君子之正則凶矣象曰滅者滅盡也无君子之正者以滅盡之也小人之害正如此六二剥牀以辨蔑貞凶象曰剥牀以辨未有與也鄭康成曰足上稱辨近䣛之下屈則相近申則相逺故謂之辨辨分也崔璟曰辨當在第足之間牀䏶也巽為木為股艮為指在初為趾二在股趾之間近厀之下股之象䏶即股也隂浸長次及於二猶剥牀至於股也九二无應未有與之者是以小人无所忌憚二當内不失正以自守斯可矣若廹窮禍患蔑所守之正則凶蔑无之也曰蔑貞凶戒六二也剥之方長君子而有與猶可勝也剥而自守其正小人雖勝猶未凶也六三剥之无咎象曰剥之无咎失上下也上九以剛居一卦之外六三在小人中以柔應剛獨有輔上救亂之志易傳謂漢之吕彊是也然上九不當位其勢微弱不能相應而有為失上也衆隂並進三獨為君子初二旣剥安能免於衆隂之所剥乎失下也上下皆失三雖不免於剥而義則无咎非特立不懼者能如是乎六四剥牀以膚凶象曰剥􅇃以膚切近災也艮為膚柔而近革六四之象巽為牀剥牀及膚切近災也五君位剥陽至四而乾毁其凶可知象言災者隂長剥陽天也剥道至此三不能止君子其如天何六五貫魚以宫人寵无不利象曰以宫人寵終无尤也巽為魚為繩艮為手持繩下連衆隂貫魚也艮坤為宫止於中也乾為人巽為進退以宫人寵也宫人嬪婦御女之屬古之進御於君者望前先卑望後先尊尊卑迭為進退五得尊位其動也正與上同徳下制衆隂若貫魚然咸順於上以宫人寵之使尊卑有序厚恩錫予不及以政寵均則勢分不及以政則无權小大相持乃可為也故无不利六五居宜有尤而以正制小人者盡道終无尤也五有伏兊為口尤之也不然魚脫於淵其能制乎或曰先儒以巽為魚何也曰以重卦離知之包犧氏結繩而為罔罟以佃以漁蓋取諸離離中有巽巽復有離巽為魚以漁也離為雉以佃也魚龍同氣東方鱗蟲龍為之長震為龍木之王氣巽為魚木之廢氣故太𤣥以三八為木為鱗兼震巽言之上九碩果不食君子得輿小人剥廬象曰君子得輿民所載也小人剥廬終不可用也坤隂剥乾四成巽為木至五成艮為果陽為大衆隂不能剥之碩果也兊為口艮見兊伏不食也君子在外不為小人剥喪之象碩果不食下而復生剥反為復必然之理天地間未甞一日无陽亦未甞一日无君子剥終復始間不容髪也坤為輿為衆極亂之後五隂奉一陽君子於是得衆而民載之故曰君子得輿民所載也易傳曰詩匪風下泉所以居變風之終也艮為舎乾為天天際在外野也舎在野廬之象陽為君子小人託庇於君子上九剥而為六小人用事自徹其庇至於无所容其軀而在外之君子亦失其所故曰小人剥廬終不可用也震下坤上復亨出入无疾朋來无咎反復其道七日來復利有攸往彖曰復亨剛反動而以順行是以出入无疾朋來无咎反復其道七日來復天行也利有攸往剛長也復其見天地之心乎復本坤而乾交之隂陽之反皆自内出非由外來而出入云者以剥復明消息之理也剥極成坤陽降而入坤極而動陽升而出入其反也出其動也其出其入羣隂莫能害之害之之謂疾言剛反動而得位也坤為順剛反動而得位以順道而上行斯復所以亨歟朋陽之類也一陽來復而得位无咎者以正也剛動則不累於物以順行則不違其時正則和而不同斯朋來所以无咎也夫復所以亨者豈一君子之力哉譬如舟車必相濟達已先則拔之彼先則推之然後并心協力其道大行故曰復亨剛反動而以順行是以出入无疾朋來无咎此合坤震兩體初九之動以言復亨也天道之行極則來反往則必復其復之數自午至子不過於七陽生於子隂生於午剥復七變陽渉六隂極而反初日也月也嵗也天地五行之數所不可違而必曰七日者明律厯之元也故日月五星始於牽牛氣始於夜半厯始於冬至律始於黃鍾子雲得之為八十一首以盡一元六甲三統九會二百四十二章之數邵雍得之明日月星辰元會運世以窮天地消長无極之數而雍甞謂子雲作太𤣥其得天地之心乎故曰反復其道七日來復天行也此推剥復之變言復之數也陽自復而往為臨為泰為大壯為夬為乾孰禦之哉君子之道剛進而長莫或禦之必至於盛夫子曰如有用我者期月而已可也三年有成孟子曰以齊王猶反手也荀卿曰三年天下如一諸侯為臣非虚語也故曰利有攸往剛長也此自復推之至乾以言復之成也易以天地明聖人之心以為无乎不可也以為有乎不可也觀諸天地則見其心矣天地以萬物為心其消也乃所以為息其往也乃所以為來往極而來復復則萬物生生者天地之大徳也以其所見論其所不見天地之心其可知矣故曰復其見天地之心乎此以初九剛動言復之始也始而亨亨則有成矣王弼謂天地以本為心寂然至无是其本矣此雷在地中之象也彖之取象在於陽剛反動而已易无非象也彖也大象也小象也其象各有所宜不可以一槩論在卦氣為冬至故太𤣥準之以周象曰雷在地中復先王以至日閉關商旅不行后不省方天下之至動莫如雷雷在地中動復於靜復本之時也復冬至之卦剥艮為門闕反則閉闗閉闗以止動者也巽為近利市三倍風行地上為觀民設教復震見巽伏故商旅不行后不省方不行不省方則動者靜夏小正十一月萬物不通夫子賛易兼用夏小正矣初九不逺復无祗悔元吉象曰不逺之復以修身也外為逺内為近剥初甞失矣變復九自外來内不逺也反動而剛復也失而後有復不失則无復矣初者九之位正其固有也初正者善之端修身之始未有不正其心而能修身者以天地言之始於剛反動而正乃能遂萬物而成其徳故曰不逺復以修身也坤為身易傳曰祗抵也馬融音之是反初動不正不正則抵於悔知不正為不善之端而復於正則无祗悔俟其悔至而後復之復亦逺矣无祗悔則元吉元吉者吉之至善故曰无祗悔元吉夫幾者動之微吉之先見也顔子不善未甞不知知之未甞復行无祗悔也故夫子贊之曰顔氏之子其殆庶㡬乎六二休復吉象曰休復之吉以下仁也休息也初九剛復克己復禮為仁者也六二正中在上无應以分其親仁之意近而相得乃下之見初九不逺復其心休焉中者天下之大本人受天地之中以生中則正正則大大者仁之體仁豈外求哉在我而已矣初九知幾知至至之者也六二不動即至於正中動則失正因是休矣休則吉所謂吉祥止止也故曰休復之吉以下仁也荀卿曰學莫便於近其人六二之謂乎六三頻復厲无咎象曰頻復之厲義无咎也頻水厓也說文曰人所賔附頻蹙不前而止先儒作嚬蹙訓之其義亦通三者震動之極極則反之正成坎坎在坤際水厓也水厓謂之頻六三厥初妄動自厓而反則頻復也頻者危道故曰頻復厲頻而復雖晚矣不猶愈於迷而不復者乎於義為得故曰義无咎也六三困而學之者也叔孫病不能相禮退而學禮之爻乎六四中行獨復象曰中行獨復以從道也五隂冥行去道日逺適越而北首者也六四行於五隂之中獨反而復下從於初道言初九也震為大途亦道也鄭康成曰度中而行四獨應初是也不言吉无咎者正則吉可知獨復則无咎頻復之厲猶无咎也四獨復五敦復不言吉者不以利害言也虞翻曰四在外體不在二五何得稱中夫中无一定之中自初至三以二為中自四至上以五為中復卦五隂自二至上則四為中康成謂爻處五隂之中六五敦復无悔象曰敦復无悔中以自考也六五逺於初九中而未正非敦復則有咎五坤體厚也五動而正成艮艮為篤實厚而篤實敦也成言乎艮故艮又有成之意考成也誠者自成也以體言之謂之中以天道言之謂之誠以受之於天言之謂之性有是性則有是體有是體則有是道萬物皆備於我反身而誠則自成矣其於復也何逺之有厚而篤實用力於仁者也荀卿曰以中自成易傳曰以中道自成上六迷復凶有災眚用行師終有大敗以其國君凶至于十年不克征象曰迷復之凶反君道也復之終以一卦言之剥之上九反而為初初九已復上六迷道而不復故曰迷復凶上窮矣不可動動則降三成坎坎災眚也災自外至眚已招也有災眚則天禍人患无所不有故曰凶又曰有災眚三動六上行有師體用師也行師之義以正去不正己迷不復而行師人誰服之終有大敗師六三師或輿尸凶坎為血大无功也三下之終故曰終有大敗坤四諸侯位國也五君位上反三成震坎以其國君也震動以也坎陷也用此行師終有大敗妄動之禍至於以其國君陷之於凶故曰以其國君凶言迷復動則凶矣自古迷復妄動不勝其欲而用兵雖驟勝終有大敗驟勝者厚其毒而降之罰是以禍至於亡身十者坤之極數不可動則无師象不克征也十年不克征者災也上窮也用行師終有大敗以其國君凶者眚也二者反君道故也上六反初九初九道也易傳曰居上治衆當從天下之善夫從天下之善則改過不吝舉錯當於人心以此用衆則師克以此用國則民聽天佑人助何凶之有震下乾上无妄元亨利貞其匪正有眚不利有攸往彖曰无妄剛自外來而為主於内動而健剛中而應大亨以正天之命也其匪正有眚不利有攸往无妄之往何之矣天命不祐行矣哉无妄天理也有妄人欲也人本无妄因欲有妄去其人欲動靜語黙无非天理動非我也其動也天故曰无妄此合乾震言无妄也无妄大畜之反大畜上九之剛自外來為主於内主言震也自外來為主於内如舜禹之有天下天下大物也可妄而有乎无非天也故曰剛自外來而為主於内此以初九言无妄之主也震動也乾健也動而震无妄之時其健不息不有其已體天而已故曰動而健此再以乾震言无妄也九五剛中在上六二以柔中應之剛柔相與上下不過乎中中則无妄上下循天之理故曰剛中而應此以二五言无妄也初九之尊位大夫得尊位大亨也其端始於初九剛自外來為主於内而正是以大亨剛中而應動不以正亦何由健何由應乎故曰大亨以正此以初九九五言无妄也動而健剛中而應大亨以正者无妄之才也有是才乃可當无妄之時致天下於无妄易言剛中而應者五卦師也臨也萃也升也无妄也大亨以正者三卦萃也臨也无妄也獨於无妄言天之命者剛自外來而為主於内也剛自外來可也安能必其為主於内動而健可也安能使剛中而必應以正而必至於大亨乎非天命不能也天命即天理也非人為也乾為天巽為命故曰天之命也此以乾巽言无妄也三四上三爻匪正有眚匪正妄行而干天命其眚自取者也无妄之世九五在上受天所命六二應之三四上匪正而无應欲往何之三四以五在上不可行上九已窮三上相易成坎險何所往哉兊為右大有六五尚賢上九易五成兊故曰自天祐之无妄大畜三四正位兊體有祐之象大畜反兊為巽不正之爻不利有攸往故曰天命不祐行矣哉在卦氣為寒露故象曰天下雷行物與无妄先王以茂對時育萬物天下雷行而物與之者无妄也雷行非時而物不與者妄也虞翻曰震以動之萬物出乎震故震為萬物始始震終艮時也伏兊為澤育也二應五三應上對也先王以是茂對時而育萬物茂盛也萬物繁興不茂不足以育物不對則妄矣如春毋麛毋卵夏毋伐大木之類初九无妄往吉象曰无妄之往得志也初九正无妄也九四不正妄也初九以正動上往九四應之往而正正則吉其正行乎上志者動於中也易傳曰誠至於物无不動者以之修身則身正以之治事則事得其理以之臨人則人感而化无所往而不得志也故吉六二不耕穫不菑畬則利有攸往象曰不耕穫未富也二動體而順乎中正无妄者也故極言无妄可往之理初至五有益體耕也二震為稼艮為手二往之五五來應二兊見震毁艮手兊金銍刈之象穫也二為田田一嵗曰菑三嵗曰畬初九震足動田之始菑象也五來之二歴三爻而有穫象畬也乾為嵗故也夫耕者穫之始畬者菑之成耕必有穫菑必有畬事理之固然非私意所造君子隨時而已无妄也譬如農夫有當首事而耕者有當終事而穫者其於田亦然有當首事而菑者有當終事而畬者當其時之可耕可菑則薅荼蓼闢荒穢不為不足當其時之可穫可畬則有倉廩多田稼不為有餘初耕者也二當不耕而穫耕則妄矣初菑者也二當不菑而畬菑則妄矣吾无決擇順乎中正可動而動无所容心也如是則利有攸往有攸往者二往五則穫畬有成矣昔伏羲創法以利天下神農氏黃帝氏相繼而出至堯舜氏而法成若夏商周之損益皆因其禮无妄作也其視前人創法猶已為之是故前聖後聖若出一人彼時此時同為一事不然不待時而為則雖攬天下之美猶為妄也曰未富者盈虚之理盈則虧之虚則實之二隂虚而未盈故不耕而穫若已盈則亦不穫矣莊子所謂天下旣已治矣是也六三无妄之災或繫之牛行人之得邑人之災象曰行人得牛邑人災也六二中正无妄也三四不正有妄也故以兩爻明六二无妄之災坤為牛四巽繩艮手或繫之牛或疑辭四見疑以不正故疑之三震為大途為足行人也四不繫之牛人以其不正或疑之妄也三不正而躁亦妄也往乗四妄而又妄不得位行人得牛牛非行人之所當得妄動而干之非順乎理者也四來乗三三在險中三自取之有妄而災則其宜也非災之者也坤土在下為邑邑人謂六二六二中正順理靜而不往无妄何災矣然三動則二亦近於險非自取也莊周謂魯酒薄而邯鄲圍者乎關子明曰无妄而災者災也君子於无妄之災如之何夭壽不貳修身以俟之所以立命也故三四復位六二卒與五應九四可貞无咎象曰可貞无咎固有之也明人情終不妄也九四剛而不正剛則私慾不行私慾不行則至於无妄无妄則无咎然且有咎者不正也正者四之所固有也操存舍亡非外鑠也九旣剛矣動則正正則无妄故曰可貞无咎固有之也致无妄者必自剛夫妄始於慾慾之為害自一介取諸人充之至於為盜舜與跖之分其初甚微也剛者能絶之不以小害為无傷而不去故此爻在妄為剛者聖人與之可正也正則剛在其中上九亦剛不曰可貞者妄之極也九五无妄之疾勿藥有喜象曰无妄之藥不可試也九五六二无妄相與而九四以妄間之九五之疾也疾者隂陽失位之象五動四成坎坎為毒藥之象醫師聚毒攻邪濟人於險者也易傳曰治之而不治率之而不從化之而不革若舜之有苖周公之管蔡孔子之叔孫武叔然而无妄之疾非妄所致勿藥可也蓋九五至正戒之在動動而求所以攻之則不正復入於妄以妄治妄其疾愈深待之以正則邪妄自復故曰不可試也試猶甞試言不可妄動少有所試二不能往五得位而二應勿藥有喜也不正則二不應其能喜乎喜陽得位之象上九无妄行有眚无攸利象曰无妄之行窮之災也无妄之時妄者三爻六三九四上九是也九四可貞六三下體之極上九上體之極上九妄之尤極者也上行之三成離離有伏坎坎為眚三行之上成兊兊為毁折行有眚也上九六三之妄行即得正然且有眚者妄極而窮窮之災雖行其能免乎爻言眚象言災處妄之極不有人禍必有天殃故夫子極天人以告之乾下艮上大畜利貞不家食吉利渉大川彖曰大畜剛健篤實輝光日新其徳剛上而尚賢能止健大正也不家食吉養賢也利渉大川應乎天也剛健乾也篤實艮也大畜者大壯九四變也一變為需再變為大畜需有坎離相合𤼵為輝光進而上行成艮互有兊震兊西震東日所出入日新其徳也剛健則不息篤實則悠乆兩者合一畜而為徳動而有光其光輝㪚又日新无窮進而不已自畜其徳者也故曰剛健篤實輝光日新其徳此合乾艮兩體而又推大壯之變以言大畜也剛賢者也大壯再變九四之剛進居君位之上賢者置之上位六五以柔下之尚賢也三陽自内而往難畜者也剛健篤實輝光日新其徳自畜其徳矣又尊賢忘勢剛上而尚賢具此五者然後能止畜其健大正也大正乃為天下國家之利君子當在上小人當在下正也初九九三當位二五相易而正大者正也所以大畜者以其利於大者正故曰剛上而尚賢能止健大正也此以上九在上六五九二相易以言大畜之利正也剛上而尚賢尊之也尊之而不與之共天位治天職食天禄賢者不可得而畜也三至上體順養賢也二在内為家兊口為食六五尊徳樂道下交九二九二受畜而往應之不家食也王公之尊賢而又養之賢者如是而食則吉正也非獨一身之吉天下之吉不然分國與之視猶錙銖也故曰不家食吉養賢也此以二三四五言大畜賢者止而受養也上能止健賢者止而食乃能得盡其心與之犯難而不辭兊為澤決之為大川震變兊成坎艮震足艮指而越坎渉大川也乾為天五天位巽為命天命有徳者為萬民也六五下應乾九二之五大畜止健賢者不家食應乎天而行何險難之不濟哉故曰利渉大川應乎天也此再以二五言大畜養賢之功在卦氣為白露故太𤣥準之以積象曰天在山中大畜君子以多識前言往行以畜其徳天在山中以人所見為象猶言水中觀天也聖人論天地日月皆以人所見言之天大無外而在山中其所畜大矣内卦兊口前言也外卦震為行往行也二隂四陽陽為多大畜自大壯來一變需離為目識前言也再變大畜識往行也徳者剛健多識前言往行故能考迹以觀其用察言以求其心而畜其徳矣夫以方寸之地觀萬世之變塗之人而上配堯禹非多識之其能畜乎初九有厲利已象曰有厲利已不犯災也已先儒讀作已矣之已王弼讀作已今從先讀三陽務進初九剛健之始六四柔得位當止畜之地不度而進處位不當危厲之道也不如已而受畜則利夫不受畜而往危實自取不曰眚而曰災者初九正也大畜之時宜止而往雖正亦厲故曰災子夏傳曰居而待命則利往而違上則厲初往四成離離有伏坎故曰犯災不直曰災也九二輿說輻象曰輿說輻中无尤也輻當作輹王弼注作輹坤為輿自三以上為震震為木輿下横木輹也二不動兊毁折之輿說輹也不動未正宜有尤兊為口尤之者也然遇畜而止說輹不進知以不動為中是以无尤故曰中无尤也初剛正也二剛中也四五柔也柔能畜剛剛知其不可犯而安之時也夫氣雄九軍者或屈於賔賛之儀才蓋一世者或聽於委裘之命故曰大畜時也九三良馬逐利艱貞曰閑輿衛利有攸往象曰利有攸往上合志也乾為馬九三得位為良馬震為作足三陽並進良馬逐也九三剛健當位得時上九畜極變而應之利以馳逐然馳逐不已必有奔蹶之患不可恃應而不備故戒之以利艱貞九三正也動則失正艱難守正則利曰閑輿衛可也古文作粤粤于也𤼵語之辭兊口象艮止也坤為輿四正閑輿也三乾為人震為足為大途人傍輿而行閑輿而衛之象閑輿衛以其利艱貞也九三如此猶謹銜策清道路節良馬之歩而徐驅焉其進利矣故利有攸往上九陽也變而應三三以剛往與上合志志動於中者也茂陵中書武功爵十三級曰閑輿衛有取於此乎夫恃應而不知備銳進而不知戒鮮不及矣六四童牛之牿元吉象曰六四元吉有喜也坤為牛坤初為童牛童牛始角時也六四坤體四之初為童牛初剛往四角觸之象四不來初屈而不動童牛牿之也牿橫角之木周官謂之楅初之四則二成巽木初復位則剛伏於木下牿牛之象六四當位止剛不以威武為之以漸優而柔之使无犯上之心剛柔各得其正故元吉元吉者自其始吉吉之至善也喜者陽得位初九不動而應己剛者反為柔用六四所以有喜也六五豶豕之牙吉象曰六五之吉有慶也九二犯五則三成坎坎為豕五成巽巽為白自三至上體頤豕頤中有剛且白者豕之牙也六五得尊位柔中二退而受畜三坎毁兊金刻制其下而剛伏豶豕之牙也牡豕曰豭攻其特而去之曰豶豶豕則馴擾剛躁自止牙不能害物矣慶者三陽受畜而為用隂以陽為慶六五之吉有慶也二應五得正故吉古之善畜天下者知有血氣皆有爭心難以力制務絶其不善之本而已猶去豕牙之害而豶之也順民之欲因民之利成民之才率之以柔中其效至於垂衣拱手而天下服易傳曰民有欲心見利則動苟不知教雖刑殺日施其能勝億兆欲利之心乎上九何天之衢亨象曰何天之衢道大行也畜極則通止極則動震為大塗兊為口上乾為天天衢也何大其聲也上動亨也言何其天衢之亨如是乎正者道也大塗亦道也三陽上進道大行也震下艮上頤貞吉觀頤自求口實彖曰頤貞吉養正則吉也觀頤觀其所養也自求口實觀其自養也天地養萬物聖人養賢以及萬民頤之時大矣哉鄭康成曰頤者口車之名震動於下艮止於上口車動而止因輔嚼物以養人故曰頤此合震艮兩體而成頤也頤者養也養之以正則吉養不以正則凶故曰頤貞吉此以初九之正言頤養之道也頤自臨九二變之一變明夷離為目觀也自内觀外觀其人之所養也所養正歟君子也所養不正歟小人也觀其所養是非美惡无所逃矣故曰觀頤此以臨二初變明在人者養之之道當正也四變頤自離變艮艮為手求也自外觀内反觀已之自養以考正與不正口實者頤中之物也四爻皆隂隂為虚虚則无物故自求口實无物而求正與不正未定也二四正三五上不正自養者正歟君子之道也雖貧賤不去也自養者不正歟小人之道也雖富貴不處也故曰自求口實觀其自養也此以上九及頤中四爻明在已者養之之道當正也觀人之所養然後觀吾之自養則所養正矣養之道甚大天地之養萬物聖人養賢以及萬民亦不過震動艮止也乾天也坤地也震東方萬物發生天地之養萬物也上九尚賢在五位之上坤衆為民聖人養賢以及萬民也天地之生其動以正陽降隂升萬物自遂其盛至於盈乎天地之間各極其分而後止天地不勞也動以正而已養萬民者本於養賢賢者在上萬民自遂其生聖人不勞也止於養賢而已故震動艮止之象自已之養推之至於人之養自人之養推之至於天地聖人然養之道不過乎此頤之時豈不大乎故曰天地養萬物聖人養賢以及萬民頤之時大矣哉此以頤之成卦終言頤之道也易傳曰或云用或云義或云時以其大者也萬物之生養以時為大故云時以卦氣言之十一月卦故太𤣥準之以養或曰初變明夷則有離四變成頤非離也何以有觀之象曰此可以意會難以言傳明夷之離為小過之飛鳥訟之坎為中孚之豚小過中孚豈有離坎論其所生也變卦之法一卦七變八卦六十四四五六之變无復本體矣而五行盛衰皆以本卦言之何哉故曰察性知命原始見終象曰山下有雷頤君子以慎言語節飲食山下有雷以養萬物而動亦不可過也震為決躁艮止之慎言語也噬嗑有飲食之象頤中无物節飲食也言語不慎則招禍飲食不節則生疾皆非養之道易傳曰慎言語以養徳節飲食以養體事之至近而所係至大者莫過於言語飲食在身為言語於天下則命令政教出於身者皆是慎之則无失在身為飲食於天下則貨財資用養於人者皆是節之則无傷初九舎爾靈龜觀我朶頤凶象曰觀我朶頤亦不足貴也頤自明夷之離四變而成頤故頤初九有龜之象伏於坤圡之下龜蟄時也龜所以靈者蟄則咽息不動无求於外故能神明而壽君子在下自養以正靈龜之類也六四安位无下賢之意初不待求徃之四成離離為目觀我也初震動體下頤而動口雖徒嚼志已先動是舎爾所以為靈龜者觀我而朶其頤也爾言初九我言六四舎爾觀我忘已從欲動而不正凶之道也夫貴乎陽者為其特立不屈於欲故能无禄而富无爵而貴守道修徳淡然无營今躁妄以求无恥自辱亦不足貴也六二顚頤拂經于丘頤征凶象曰六二征凶行失類也二比於初不能養其下而反資初九之賢以自養乾為首在下顚頤也六二經也顚頤則拂違其經矣養之經陽養隂上養下陽當在上養之隂當在下而受養故天子養天下諸侯養一國士庶人各以其職受養五處君位二當受養於五六五養道不足然二亦不可越五而上征丘者上九應二之象也艮為山山半為丘王肅曰丘小山也物之所聚以養人者也盖二近於初而相得資之以養雖曰顚頤未為无所養若近捨初九逺資上九正行亦凶何哉五雖養道不足以隂陽言之已類又在相應之地上九應二則失其類矣六三拂頤貞凶十年勿用无攸利象曰十年勿用道大悖也六三當受養於上九而六三不正動而正則上九不來不動以待初九則初九不應既不受之於上又无以資之於下拂頤也故貞凶十坤數之極坤為年十年勿用言十年不可動上下无所利養道大悖也六四顚頤吉虎視眈眈其欲逐逐无咎象曰顚頤之吉上施光也頤以上養下六四當位下交初九乾首在下顚也求賢自助於剛柔為正正則吉故曰顚頤吉虎視謂四交初也初徃成艮離艮有伏兊為虎離為目虎視也易通卦驗小寒虎始交際垂其首垂其首者下視也艮坤互有坎重厚而深沉眈眈也虎首下視眈眈然下交不瀆矣六四其欲在於初九不瀆則初九逐逐而徃震為作足逐也古文作跾初徃之四不正宜有咎然无咎者以不瀆故无咎虎視眈眈其欲逐逐无咎六四在上施之下者光也光坎離下照之象或曰虞仲翔曰坤為虎又曰艮為虎馬融曰兊為虎郭璞以兊艮為虎三者孰是曰三者異位而同象坤為虎者坤交乾也其文𤣥黄天地之文艮為虎者寅位也泰卦乾坤交也在天文尾為虎艮也大雪十一月節後五日復卦六二爻虎始交兊為虎者參伐之次占家以庚辛為虎者兊也龍徳所衝為虎亦兊也兊下伏艮具此三者之象故先儒並傳之舉兊則三象具矣六五拂經居貞吉不可渉大川象曰居貞之吉順以從上也正者養之經上養下陽養隂正也六五柔得尊位養道不足資上九之賢以為養拂經也上九助五之養有正之道五寛以居之順從於上則得正而吉艮止也有居之象故曰居貞之吉順以從上也人君養天下以正得衆以用其健乃可渉難六五拂經其才不足故不可渉難上五相易成坎无震足巽股之象不可渉也易傳曰艱難之際非剛明之主不可恃不得已而濟險難者有之矣其可常乎上九由頤厲吉利渉大川象曰由頤厲吉大有慶也一陽處上下有四隂六五體柔无應才不足以養天下而天下由之以養者也故曰由頤然非養道之正也權重位髙衆忌之則必危人臣當此任可不兢畏而懷危懼乎故厲以剛居柔位厲也厲則不敢安其位下從王事无成有終上下並受其福故大有慶鄭康成曰君以得人為慶虞仲翔曰陽得位故大有慶上之三成坎有震足象利渉大川也上九佐五以養道養天下而得民利於渉難也象不言者大有慶則渉難在其中上艮體頤以静止為善故三爻皆吉巽下兊上大過棟撓利有攸徃亨彖曰大過大者過也棟撓本末弱也剛過而中巽而説行利有攸徃乃亨大過之時大矣哉大過陽過隂大者過越也鄭康成曰陽爻過也卦四陽二隂陽居用事之地故曰大過大者過也此以六爻言大過也巽為木為長上兊者巽之反長木反在上為棟巽風撓萬物者也而體弱陽為重四陽在中任重也長木在上而任重本末皆弱棟撓也天地之理剛柔不可以相无剛以柔為用柔以剛為體柔既不足剛亦无自而託譬之棟也中雖剛強而端柔弱棟豈能勝其任乎故曰棟撓本末弱也此以巽兊兩體言大過之時也大過自遯六二變剛過者九三九四中者九二九五興衰救弊補其偏而不起之處非剛過不可也中則無剛過之患剛過而中所謂時中也過非過於理也以過於中也猶之治疾疾勢沉痼必攻之以瞑眩之藥自其治微疾之道觀之則謂之過自藥病相對言之則謂之中巽在内者巽乎内也兊在外者説乎外也内巽外説而志行抑剛之有餘以濟柔之不足則剛來柔徃隂得位不窮大者不過乃亨乃者難辭也君子強小人弱六二不徃以濟之亦何由亨夫過剛而不反不肖之心應之未有不為君子害者也東漢之季清議大勝君子小人至不相容大過已極而不知反是以不亨故曰剛過而中巽而説行乃亨此以卦變合二體而言濟大過之道也大過之時君子過越常分以濟弱能逹乎時中矣又巽而説行以是而徃利於有為建大功立大事非大過人者不能趨此時故曰大過之時大矣哉在卦氣為小雪故太𤣥準之以失劇象曰澤滅木大過君子以獨立不懼遯世无悶澤飬木者也過而滅沒其木大過也初六以一柔巽於四剛之下而不變巽為股立也巽見震伏震為恐懼獨立而不懼也所謂以天下非之而不顧者乎上六處一卦之外遯也兊為說无悶也遯世无悶所謂舉世不知而不悔者乎二者非大人不能也王輔嗣曰非凡所及也初六藉用白茅无咎象曰藉用白茅柔在下也巽為白為草交乎乾剛草白而剛白茅也先儒謂秋茅也以柔藉剛藉也大過爻畫有足有腹有耳器之象坤為地置器者苟措諸地可也而藉用潔白之茅茅之為物薄而用重過愼也過愼者愼之至也大過君子將有事焉以任至大之事過而无咎者其唯過於愼乎過非正也初六執柔處下不犯乎剛於此而過其誰咎之雖不當位无咎也故曰愼斯術以往其无所失矣九二枯楊生梯老夫得其女妻无不利象曰老夫女妻過以相與也兊為澤巽為木澤木楊也兊正秋枯楊也言陽已過也二變而與初二成艮巽木在土下根也枯楊有根則其穉秀出稊穉出楊之秀也伏震之象故曰枯楊生稊鄭氏易作荑艮為夫陽過老夫也巽為艮妻初隂女妻也老夫得女妻過而相與猶足成生育之功无不利也盖九二剛中用茅以濟之則无過極之失矣九三棟撓凶象曰棟撓之凶不可以有輔也九三巽為長木居中任重棟也大過陽過隂弱爻以陽濟隂為濟過之道九三有上六正應當相濟六濟九則陽不過隂不窮矣則上六者九三之輔助也九三以大過之陽復以剛自居而不中過乎剛者也以過甚之剛動又不正不正則上六不應人所不與安能當大過之任如是有摧折敗撓而已凶之道也所以致凶者以不可以有其輔也易傳曰三居過而用剛巽既終而且變豈復用柔之義應者謂志相從也三方過剛上能係其志乎九四棟隆吉有它吝象曰棟隆之吉不撓乎下也九四反巽在上巽為長木棟之象陽處隂而不過能用柔以相濟者也動而正正則不撓乎在下之柔故曰棟隆之吉不撓乎下也易傳曰隆謂不係於初不曲以從下也大過之時以剛濟柔為得宜剛柔得宜而志復應初有它也初六九四非正應故以初六為它九四近君當大過之任不能絶去偏係不足以任九五之重吝道也易傳曰二比初則无不利四應初則為吝何也曰二得中而比於初以柔相濟之義也四與初志相係者也剛柔得宜而係於隂則害剛矣故可吝也九五枯楊生華老婦得其士夫无咎无譽象曰枯楊生華何可久也老婦士夫亦可醜也兊為澤巽為木澤木楊也五兊變而與上兊成震兊說也震為旉為蕃鮮其旉蕃鮮可說生華也巽為長而伏何可久也巽為婦上六隂已窮老婦也震為長男得士夫也九變六隂居陽宜有咎以陽濟隂故无咎兊為口震成兊毁故无譽雖曰无咎无譽然以陽而配窮隂又不能濟得无醜乎盖上六過極之隂雖五當位剛中濟之以柔不能成功也以陽濟隂其在於未極之時乎上六過渉滅頂凶无咎象曰過渉之凶不可咎也乾為首上六在首之上頂也上六本遯之六二自二進而上行渉四爻至上成兊兊澤滅沒其頂渉難之過也九二九四剛陽過越以濟難乃克有濟上六柔而處大過之極不量其力至於滅頂然上六正也志在拯溺不可咎也過渉之凶所謂以貞勝也象有言不可咎者義不可咎也有言又誰咎者自取禍也坎下坎上習坎有孚維心亨行有尚彖曰習坎重險也水流而不盈行險而不失其信維心亨乃以剛中也行有尚往有功也天險不可升也地險山川丘陵也王公設險以守其國險之時用大矣哉坎一陽二隂在地為水水之流動陽也其靜隂也流動乎隂中者陽陷乎隂也陷為險難八卦皆一字重坎加習然後盡險之象故曰習坎此以兩坎言坎也坎自臨變初九之五坎為水九二兊澤決而流流而不出乎中不盈也凡水之流有物阻之然後盈流而就下則不盈不盈者中也初之五復為坎行險也行險而不出乎中五必應二不失其信也水必就下流濕萬折而必東有諸已之謂乎必曰習坎者唯習坎乃見其然君子動而不過臨難而不苟似之故辭曰有孚彖曰水流而不盈行險而不失其信此以卦變言坎之徳也心者中也二五也亨者自初之五陽得位而亨水之流行雖處至險无所不通者亨也乃以剛中而不變也君子之在險亦然身雖險難其心則亨亦以剛中也初之五者往也剛得中而亨者往有功也坎之道有尚乎此君子濟難出險亦豈離乎剛中哉剛中者誠實也誠實則金石可貫水火可蹈天地可動故曰維心亨乃以剛中也行有尚往有功也此以卦變明處險之道也險者坎之用也能用乎險則无惡乎險矣天地之大不可以去險况王公乎坎在上天險也天之所以險者震足止於下不可升也坎在下地險也地之所以險者艮為山坎為川半山為丘陵也坤在上國也五乾為王三為三公四為諸侯坤國而坎據之王公設險以守其國也設險不唯城郭溝池兵甲之利紀綱法度人所不能踰者皆是所以法天地也故曰天險不可升也地險山川丘陵也王公設險以守其國此推明二五反復以盡習坎之義也難生者險之時也用之以道濟天下之難者險之用也不知其時不得其用行之不以中反陷乎險中小則亡身大則亡國故夫子嘆曰險之時用大矣哉在卦氣為大雪故太𤣥準之以勤象曰水洊至習坎君子以常徳行習教事卦言坎者水也大象言坎者水流之坎窞也水流行不止至于坎矣復至於坎其行洊至有常習之象常徳行習教事非一日之積如水洊至也二五正中徳也震為行坤順也為民教順民者也常徳行可以渉險習教事可以夷險初六習坎入于坎窞凶象曰習坎入坎失道凶也初六本臨之六五自外入于初厯兩坎習重也故曰習坎窞坎底也道由正而行也君子處險當以正道乃可出險初六不正不能出險反入于重坎之底失道而凶也異學泅者不知與汩俱出而溺死者乎九二坎有險求小得象曰求小得未出中也二剛中而陷於二隂上有坎險居坎而又有險者也動而有求五必應之五艮為手求之象隂為小故小有得然未出乎險中其剛纔足以自濟易傳曰君子處艱難而能自保者惟剛中而已六三來之坎坎險且枕入于坎窞勿用象曰來之坎坎終无功也六三柔而不中履非其位不善處險者也往之於上則坎險之極五有艮木枝倚而礙之險且枕也陸希聲曰枕閡礙險害之貌來而處三則在上坎之底入于坎窞也來坎也往亦坎也終无濟險之功故終勿用三下之終也六四樽酒簋貳用缶納約自牖終无咎象曰樽酒簋貳剛柔際也四自初至五有震坎艮坤坎震酒也艮鼻震足坤腹樽簋之形皆有首鼻腹足而樽異者有酒也有樽酒象而簋象亦具焉簋貳也貳副之也樽酒而簋副之燕饗之禮君臣上下剛柔相際之時也三四坤為土為腹土器有腹缶也缶樸素之物質之象坤為闔戶坎艮為穴穴其户傍通日月之光牖也明之象約者交相信四五相易而後四應初五應二納約也約誠信固結之象六四柔而正九五剛中而正四五无應四非五莫之比五非四亦莫之承上下恊力可以濟險故四當剛柔相際也用質以交於上因五之所明以納其誠信則言辭易入險難易濟終无咎也四五相易宜有咎而易則五出險矣故終无咎終謂上六不動也易傳曰自古能諫其君者未有不因其所明者也故訐直强勁者率多所忤而温厚明辯者其說易行古人有行之者左師觸龍之於趙張子房之於漢是也非惟告其君如此敎人亦然孟子所謂成徳達材是也九五坎不盈祗既平无咎象曰坎不盈中未大也九五本臨初九往之五坎中而不盈雖不盈也有出險之理然九五下比六四所係者狹四五相易中存而大毁是水不盈坎適至於平而止也出險之道在剛中正剛正則大中而未大㡬可以出險故聖人惜之曰祗既平无咎而已祗適足之辭橫渠曰不能勉成其功光大其志此所以為可惜歟上六係用徽纆寘于叢棘三嵗不得凶象曰上六失道凶三嵗也上動成巽巽為繩坤坎為黒變巽徽纆也巽木交坎為叢棘上六柔无出險之才處險極之時守正可也不當動而動則愈陷矣譬如有人陷于狴犴之中坐而省過雖上罪也不過三嵗得出矣妄動求出則舉手掛徽纆投足蹈叢棘陷之愈深雖三嵗豈得出哉係之寘之不得出也然險極必平巽木數三乾為嵗凶三嵗也初六可動而不能上六不可動而妄動皆失道也離下離上離利貞亨畜牝牛吉彖曰離麗也日月麗乎天百榖草木麗乎土重明以麗乎正乃化成天下柔麗乎中正故亨是以畜牝牛吉也離自遯初六三變而成二五皆一隂而麗二陽物之情未有不相附麗者也柔必麗乎剛弱必麗乎強小必麗乎大晦必麗乎明故曰離麗遯一變六之三成无妄再變六之四成家人三變六之五成離自六之四言之離有坎日降而月升也自六之五言之坎復成離月降而日升也乾為天故曰日月麗乎天自六之三言之有震巽震為百榖巽為草木乾䇿三十六坤䇿二十四震三爻凡八十有四百榖舉成數也坤為土故曰百榖草木麗乎土觀天地日月百榖草木附麗如此則萬物之情有不相附麗者乎此推原卦變以明離為麗之義也兩離重明也君臣上下皆有明徳之象重明而不麗乎正則以察為明重明而麗乎正以之化天下成文明之俗矣初二三正麗乎正也三爻在乾天之下有巽順服從之象化成也故辭曰利貞彖曰重明以離乎正乃化成天下此舉成卦言離明之所麗也柔之為道不利逺者不麗乎中正則邪佞之道其能亨乎六居五柔麗乎中而亨也六居二柔麗乎中正而亨也言柔麗乎中正則二五舉矣中正者人之本心也天下之心必麗乎中正則重明而麗乎正化成天下也必矣故辭曰亨彖曰柔麗乎中正故亨此以二五言離柔之所麗也兩者離之才也坤為牛順也六二以隂居隂為牝牛至順也畜養也以剛正畜養之成其至順而麗乎中正則吉是亦柔之利也故辭曰畜牝牛吉彖曰柔麗乎中正故亨是以畜牝牛吉也此以内卦終言柔之所麗也在卦氣為四月故太𤣥準之以應象曰明兩作離大人以繼明照于四方明兩作者麗乎明也鄭康成曰作起也明明相繼而起大人重光之象堯舜禹文武之盛也兊有伏震離有伏坎震東兊西坎離南北照四方也初九履錯然敬之无咎象曰履錯之敬以辟咎也遯艮為指指在下體之下為趾五來踐初履也初欲麗四交巽巽為進退故其履錯然進退動則失正失正則有咎故敬之不敢動以辟有咎榮辱安危繫於所麗君子處離之始安其分義守正而已故无所麗是以无咎管寧逡巡於萬乘之招王丹偃蹇於三公之貴以辟咎乎六二黄離元吉象曰黄離元吉得中道也黄者地之中萬物必有所麗六二坤柔在下麗乎中而與五合一得中道也夫中者天地萬物之所共由天地之長久日月維斗之不息聖人之道亘古今而无弊者也六二得之故能守正而不遷乘剛而不懼抱明徳而獨照是以元吉九三日昃之離不鼓缶而歌則大耋之嗟凶象曰日昃之離何可久也離為日在下昃也九三明盡當繼之際故曰日昃之離盛必有衰始必有終生必有死晝夜寒暑之變逹人觀此知窮必有變乃理之常孰知生之可羨死之可惡吉凶泯矣故鼓缶而歌缶者常用之器歌之者樂其得常也九三離腹變坤為缶艮手擊之鼓缶也兊變震而體離口舌動有聲成文歌也昧者不知變不鼓缶而歌則大耋近死戚嗟憂之不安於死則凶矣九三不變乾首巽白處明盡當繼之際大耋也八十曰耄九十曰耋離三爻乾坤之䇿九十有六故曰耋陽為大大耋也大耋猶言大老三失應而憂嗟也夫日昃之光斯須入於地雖欲附麗何可久也是故君子頽然委順不以死生累其心巽為長巽變何可久也九四突如其來如焚如死如弃如象曰突如其來如无所容也九四重剛而不中正又處不當位不善乎繼而求繼者也四之五成乾巽乾為父巽為子子凌父突也突字古文作倒子不順之子也凌突而徃其能來乎言逆徳也巽木得火焚如也火王木死死如也退復三兊毁之其下反目而視弃如也言不容於内外者如此故曰突如其來如无所容也先儒謂古有焚刑刑人之喪不居兆域不序昭穆焚而弃之易傳曰禍極矣凶不足言也六五出涕沱若戚嗟若吉象曰六五之吉離王公也離目兊澤出涕也鄭康成曰自目出曰涕巽為長沱若也五失位為憂戚也兊口嗟若也六五柔居尊位九四凌突故出涕戚嗟然有吉之道九四突五離王公則吉四五相易上麗王位正也下麗三公用利也據正而用利以順討逆何憂乎九四哉上九王用出征有嘉折首獲匪其醜无咎象曰王用出征以正邦也上九麗極有不麗者焉上五相易六以正行王用之以出征也上有剛徳而明故王用之兊毁折乾為首陽為美九五美之至嘉也言用之有功王嘉其折首書曰殱厥渠魁脅從罔治折首者殱渠魁也醜類也隂又為醜上六下應九三陽也陽非隂之類𫉬匪其醜也醜脅從者乎王用出征非樂殺人也正其不附者以正邦也離上三爻不正上五相易而正獨九四不正四諸侯位四正成坤土則邦正矣王肅易本曰獲匪其醜大有功也疑今本脱之漢上易傳卷三
