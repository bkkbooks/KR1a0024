  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1a0024_WYG_011-1a, image: WYG0011/WYG0011-0304c.png}
body:
  text: 漢上易傳卷十一宋朱震撰雜卦𫝊雜卦𫝊以剛柔升降反復取義又揉雜衆卦以暢无窮之用而歸藏連山三代之易皆在其中百世之後有聖人作不外是也康節曰乾坤三變坎離不動故太𤣥準之以𤣥衝𤣥錯乾剛坤柔比樂師憂臨觀之義或與或求屯見而不失其居蒙雜而著震起也艮止也損益盛衰之始也大畜時也无妄災也萃聚而升不來也謙輕而豫怠也噬嗑食也賁无色也兊見而巽伏也隨无故也蠱則飭也剝爛也復反也晉晝也明夷誅也井通而困相遇也咸速也恒久也渙離也節止也解緩也蹇難也睽外也家人内也否泰反其類也大壯則止遯則退也大有衆也同人親也革去故也鼎取新也小過過也中孚信也豐多故也親寡旅也離上而坎下也小畜寡也履不處也需不進也訟不親也大過顛也姤遇也柔遇剛也漸女歸待男行也頤養正也既濟定也歸妺女之終也未濟男之窮也夬決也剛決柔也君子道長小人道憂也乾坤易之門凡剛皆乾也凡柔皆坤也剛柔相雜乃成諸卦故曰乾剛坤柔比得位而衆比之故樂師犯難而衆從之故憂憂樂以天下也臨之九二在下四陰與之故能以大臨小觀之九五在上四陰求之故能以上觀下或與或求乃成臨觀之義屯自震變四之五雖見於屯也而不失其所居所以大亨歟蒙自坎變五之上陰陽相雜雖雜也而九自著見陰豈能蒙之所以蒙亨歟陽起於坤而出震則靜者動陽止於艮而入坤則動者靜故起莫如震止莫如艮也損以九三為上由泰而損始衰者也益以九四益初由否而益始盛者也故損益盛衰之始也大畜以四五之柔而畜三陽時也无妄九五六二中正而三四上爻為无妄之疾災也關子明曰无妄而災者災也有妄而災者其所宜也非災之者也萃二陽萃於上升二陽升於下升者往也升往則不來矣不來者必聚於上也氣之方升誰能遏之故曰萃聚而升不來也謙自上降三豫自初升四謙故降也輕豫故怠而止故曰謙輕而豫怠也噬嗑除間者也四為頤中有物故曰噬嗑食也賁自泰來本无色也剛柔交錯然後有文故曰賁无色也陰隨陽升說而見乎外故曰兊見也陽隨陰降巽而伏乎内故曰巽伏也施說之道小者亦伸處巽之時大者亦屈无非天也隨隨時也以是為正故曰隨无故也蠱壞也二往之五飭蠱之道故曰蠱則飭也剝爛也五陰潰於内也復反也剝上反於下也晉之明進而至於晝明夷之明降而至於誅夷誅也其明熄矣非誅之象乎泰初之五往來不窮故曰井通否上之二陽遇陰而見揜故曰困相遇也或往而通或來而困唯其時也以剛下柔其感必速故曰咸感也剛上柔下可以持乆故曰恒乆也渙三陽渙離故曰渙離也節三陽止而不去故曰節止也陽離則三陰散陽止則三陰來陽者陰之表也蹇二往五涉難也故曰蹇難也解五來二復吉也故曰解緩也來者為緩則往者當夙故曰有攸往夙吉關子明曰明乎外者物自睽故曰睽外也明乎内者家自齊故曰家人内也君子泰則小人否小人泰則君子否故曰否泰反其類也四陽並進六五以和易待之可以止而仕也故曰大壯則止四陽偕往二陰在内而執其柄可以退而去也故曰遯則退也同人六二得中得位而同乎人同乎人則人亦親之故曰同人親也大有六五柔得尊位而有其衆有其衆則衆亦歸之故曰大有衆也水火相革革已廢也故曰革去故也以木巽火火方興也故曰鼎取新也功成者退方來者進一去一取天之道也小過二陽在内動而止小者過也故曰小過過也中孚二陰在内伏而說小者信也故曰中孚信也豐泰二之四進退不得其所多故也多故則難處故曰豐多故也旅否三之五失位无應以其旅於外也旅外者不如在内之為安故曰親寡旅也豐多故也故四五相錯然後有慶親寡旅也故五動二應而後有譽離火炎上也故陽爻多凶坎水趣下也故陰爻多凶坎離相濟者也小畜五陽而畜一陰所畜者寡故曰小畜寡也履一柔而履二剛不處為善故曰履不處也需險在前三陽需時而不進關子明曰履而不處者其周公乎需而不進者其仲尼乎險在下而陽上行相過者也故曰訟不親也自大過顛也而下簡冊錯亂當曰頤養正也大過顛也遘遇也遘當作姤柔遇剛也夬決也剛決柔也君子道長小人道憂也漸女歸待男行也歸妹女之終也既濟定也未濟男之窮也頤一陽在上而養四陰正也故其卦以下養上為顛大過一陰在上四陽无所託顛也故其卦初陰承陽无失位之凶陰宜在下也姤以一柔而遇五剛故曰姤遇也柔遇剛也夬以五剛而決一柔故曰決夬也剛決柔也姤小人道長君子道憂也故繫於金柅夬君子道長小人道憂也故无號之凶女以外為歸乾男下而迎三然後坤女行而歸故曰漸女歸待男行也歸妹以三易四男行而女從夫婦之正也上六无應守正而終不改之義也故曰歸妹女之終也既濟虞翻曰六爻得位定也故曰既濟定也未濟伊川曰三陽失位故曰未濟男之窮也漢上易傳卷十一
