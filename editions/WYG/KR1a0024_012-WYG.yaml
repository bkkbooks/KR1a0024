body:
  text: 漢上易傳卦圖宋朱震撰卦圖所以解剝彖象推廣説卦斷古今之疑發不盡之意彌縫易傳之闕者也右河圖劉牧傳於范諤昌諤昌傳於許堅堅傳於李漑漑傳於种放放傳於希夷陳摶其圖戴九履一左三右七二四為肩六八為足縱横十有五總四十有五列禦宼曰易者一也一變而為七七變而為九九復變而為一李泰伯曰伏羲觀河圖而畫卦禦宼所謂變者論此圖也一者太極不動之數七者大衍數九者𤣥數也泰伯謂畫卦亦未盡其實大衍五十之數寓於四十五之中黄帝書土生數五成數五太𤣥以五五為土五即十也其在周官天府凡國之玉鎮大寶器藏焉大寶器書所謂天球河圖在東序是也其在易則見於繫辭王洙曰山海經云伏羲氏得河圖夏后因之曰連山黄帝氏得河圖商人因之曰歸藏列山氏得河圖周人因之曰周易斯乃杜子春之所憑抑知姚信之言非口自出但所從傳者異耳梁武攻之涉于率肆易曰河出圖洛出書聖人則之仲尼曰鳳鳥不至河不出圖吾已矣夫蓋聖人受命必有符瑞若圖出不再無勞歎傒謂河伯不智尤為妄矣右洛書劉牧傳之一與五合而為六二與五合而為七三與五合而為八四與五合而為九五與五合而為十一六為水二七為火三八為木四九為金五十為土十即五五也洪範曰一五行太𤣥曰一與六共宗二與七共朋三與八成友四與九同道五與五相守范望曰重言五者十可知也一三五七九竒數二十有五所謂天數二四六八十偶數所謂地數故曰天地之數五十有五數五即十也故河圖之數四十有五而五十之數具洛書之數五十有五而五十之數在焉惟十即五也故甲已九乙庚八丙辛七丁壬六戊癸五而不數十十盈數也右伏羲八卦圖王豫傳於邵康節而鄭史得之歸藏初經者伏羲初畫八卦因而重之者也其經初乾初奭坤初艮初兌初犖坎初離初釐震初巽卦皆六畫即此八卦也八卦既重爻在其中薛氏曰昔神農氏既重為六十四卦而初經更本包犧八卦成列而六十四具焉神農氏因之也繫辭曰神農氏作斵木為耜揉木為耒耒耨之利以教天下蓋取諸益王輔嗣以為伏羲重卦鄭康成以為神農重卦其說源於此子曰天地定位山澤通氣雷風相薄水火不相射天地定位即乾與坤對山澤通氣則艮與兌對風雷相薄則震與巽對水火不相射則離與兌對而說卦健順動入陷麗止說馬牛龍雞豕雉狗羊首腹足股耳目手口與夫别象次序皆初卦也夬曰乾之初交於坤之初得震故為長男坤之初交於乾之初得巽故為長女乾之二交於坤之二得坎故為中男坤之二交於乾之二得離故為中女乾之上交於坤之上得艮故為少男坤之上交於乾之上得兌故為少女乾坤大父母也故能生八卦復姤小父母也故能生六十四卦復之初九交於姤之初六得一陽姤之初六交於復之初九得一陰復之二交於姤之二得二陽姤之二交於復之二得二陰復之三交於姤之三得四陽姤之三交於復之三得四陰復之四交於姤之四得八陽姤之四交於復之四得八陰復之五交於姤之五得十六陽姤之五交於復之五得十六陰復之上交於姤之上得三十二陽姤之上交於復之上得三十二隂隂陽男女皆順行所以生六十四卦也右文王八卦說卦帝出乎震齊乎巽相見乎離致役乎坤說言乎兌戰乎乾勞乎坎成言乎艮又曰震東方也巽東南也離也者明也萬物皆相見南方之卦也坤也者地也兌正秋也乾西北之卦也坎者水也正北方之卦也艮東北之卦也又曰動萬物者莫疾乎雷撓萬物者莫疾乎風燥萬物者莫熯乎火說萬物者莫說乎澤潤萬物者莫潤乎水終萬物始萬物者莫盛乎艮此說周易也故管輅曰聖人何以處乾位於西北坤位於西南邵康節曰置乾於西北退坤於西南乾統三男而長子用事坤統三女而長女代母坎離得位而兌震為耦以應地之方也王者之法盡於是矣右太極圖周敦實茂叔傳二程先生茂叔曰無極而太極太極動而生陽動極而靜靜極而生陰靜極復動一動一靜互為其根分陰分陽兩儀立焉陽變陰合而生水火木金土五氣順布四時行焉五行一陰陽也陰陽一太極也太極本無極也五行之生也各一其性無極之真二五之精妙合而凝乾道成男坤道成女二氣交感化生萬物萬物生生而變化無窮焉唯人也得其秀而最靈形既生矣神𤼵知矣五性感動而善惡分萬事出矣聖人定之以中正仁義聖人之道仁義中正而已矣而主靜無欲則静立人極焉故聖人與天地合其德日月合其明四時合其序鬼神合其吉凶君子修之吉小人悖之凶故曰立天之道曰陰與陽立地之道曰柔與剛立人之道曰仁與義又曰原始反終故知死生之說大哉易也斯其至矣變卦反對圖六十四卦剛柔相易周流而變易於序卦於雜卦盡之乾坤二卦為易之門萬物之祖圖第一舊本曰功成無為圖天行健乾元亨利貞地勢坤坤元亨利牝馬之貞乾坤相索三交變六卦不反對圖第二舊本圖下有義字康節曰乾坤之名位不可易也坎離名可易而位不可易也震巽位可易而名不可易也兌艮名與位皆不可易也離肖乾坎肖坤中孚肖乾小過肖坤頤肖離坤大過肖坎是以乾坤離坎中孚頤大過小過皆不可易者也乾卦一陰下生反對變六卦圖第三陸希聲曰頤大過與諸卦不同大過從頤來六爻皆相變故卦有反合爻有升降所以明天人之際見盛衰之理焉故徵象㑹意必本於此陸所謂反合升降即此圖也坤卦一陽下生反對變六卦圖第四乾卦下生二陰各六變反對變十二卦圖第五坤卦下生二陽各六變反對變十二卦圖第六乾卦三陰各六變反對變十二卦圖第七坤卦下生三陽各六變反對變十二卦圖第八右李挺之變卦反對圖八篇康節曰卦之反對皆六陽六陰也在易則六陽六陰者十有二對也去四正者八陽四陰八陰四陽者各六對也十陽二陰十陰二陽者各三對康節所謂六陽六陰者否變泰恒咸豐旅歸妹漸節渙既濟未濟十二卦泰變否損益賁噬嗑蠱隨井困既濟未濟十二卦四正頤大過中孚小過也所謂八陽四陰八陰四陽者遯變大壯訟需旡妄大畜睽家人兌巽革鼎十二卦臨變觀明夷晉升萃蹇解艮震蒙屯十二卦十陽二陰十陰二陽者姤變夬同人大有履小畜六卦復變剝師比謙豫六卦乾坤天地之本坎離天地之用乾坤交而為泰坎離交而為既濟乾生於子坤生於午坎終於寅離終於申連山也以應天時也置乾於西北伏羲初經乾上坤下故曰天尊地卑乾坤定矣退坤於西南歸藏以坤先乾乾統三男而長子用事坤統三女而長女代母坎離得位而兌艮為耦復歸於伏羲之初經以應地之方也王者之法盡於是矣故易始於乾坤終於坎離既濟未濟而泰否為上經之中咸恒為下經之首乾坤本也坎離用也乾坤坎離上篇之用也咸兌艮也恒震巽也兌艮震巽下篇之用也頤大過小過中孚二篇之正也故曰至哉文王之作易也其得天地之用乎六十四卦相生圖虞仲翔於小過曰當從四陰二陽臨觀之例於豐曰當從三陰三陽泰之例於旡妄曰此所謂四陽二陰非大壯則遯來又問剝之變於彭城蔡景君大過或變於五之初或以謂三之五睽或變於大壯上之三或以謂旡妄二之五蓋是時其圖未見故難於折衷亦莫得其綱要諸儒各伸臆說至於紛然而仲翔則知有此圖也姤乾一交而為姤乾坤者諸卦之祖復坤一交而為復復剛反動而以順行凡卦五陰一陽者皆自復卦而來復一爻五變而成五卦師剛中而應謙君子有終吉豫剛應而志行比以剛中也剝柔變剛也姤柔遇剛也凡卦五陽一陰者皆自姤卦而來姤一爻五變而成五卦同人柔得位得中而應乎乾履柔履剛也小畜柔得位而上下應之大有柔得尊位而上下應之夬柔乘五剛也遯乾再交而為遯臨坤再交而為臨臨剛浸而長剛中而應凡卦四陰二陽者皆自臨卦而來臨五復五變而成十四卦第一四變明夷震屯剛柔始交而難生頤第二復四變升解坎乃以剛中也蒙第三復三變小過柔得中剛失位而不中萃剛中而應故聚也觀大觀在上中正以觀天下第四復二變蹇蹇利西南往得中也不利東北其道窮也晉柔進而上行第五復一變艮上下敝應遯小利貞浸而長也凡卦四陽二陰者皆自遯卦而來遯五復五變而成十四卦第一四變訟訟有孚窒惕中吉剛來而得中也剛巽乎中正而志行柔皆順乎剛初在下二居四鼎柔進而上行得中而應乎剛大過剛過而中本未弱也第二復四變旡妄剛自外來而為主於内家人離柔麗乎中正革水火相息第三復三變中孚柔在内而剛得中大畜大壯第四復二變睽柔進而上行得中而應乎剛需第五復一變兌剛中而柔外否乾三交而為否泰坤三交而為泰泰小往大來凡卦三陰三陽者皆自泰卦而來泰三復三變而成九卦第一三變歸妹歸妹天地之大義也天地不始也交而萬物不與歸妹人之終節剛柔分而剛得中損損下益上其道上行第二復三變豐既濟剛柔正而位當也賁柔來而文剛分剛上而文柔第三復三變恒剛上而柔下井巽乎水而上水井乃以剛中也蠱剛上而柔下否大往小來凡卦三陽三陰者皆自否卦而來否三復三變而成九卦第一三變漸女歸吉進得位往有功也旅柔得中乎外而順乎剛咸柔上而剛下第二復三變渙剛來而不窮柔得位而上同未濟困剛揜也以剛中也第三復三變益損上益下民說無疆噬嗑柔得中而上行雖不當位利用獄也隨剛來而下柔右李挺之六十四卦相生圖一篇通變卦反對圖為九篇康節之子伯温傳之於河陽陳四文忘其名陳傳之於挺之始虞氏卦變乾坤生坎離乾息而生復臨泰大壯夬坤消而生姤遯否觀剝自復來者一卦豫自臨來者四卦明夷解升震自泰來者九卦蠱賁恒損升歸妹豐節既濟自大壯來者六卦需大畜大過睽鼎兌自夬來者一卦同人自遯來者五卦訟旡妄家人革巽自否來者八卦隨噬嗑咸益困漸渙未濟自觀來者五卦晉蹇頤萃艮自剝來者一卦謙而屯生於坎蒙生於艮比生於師頤小過生於晉睽生於大壯咸生於无妄旅生於賁咸生於噬嗑中孚生於訟小畜變需上履變訟初姤無生卦師同人大有兌四卦闕李鼎祚取蜀才盧氏之書補其三卦大有闕而頤卦虞以為生於晉侯果以為生於觀今以此圖考之其合於圖者三十有六卦又時有所疑不合者二十有八卦夫自下而上謂之升自上而下謂之降升者上也息也降者消也陰生陽陽生陰陰復生陽陽復生陰升降消息循環無窮然不離於乾坤一生二二生三至於三極矣故凡卦五陰一陽者皆自復來復一爻五變而成五卦師謙豫比剝凡卦五陽一陰者皆自姤來姤一爻五變而成五卦同人履小畜大有夬凡卦四陰二陽者皆自臨來臨五復五變而成十四卦明夷震屯頤升解坎蒙小過革觀蹇晉艮凡卦四陽二陰者皆自遯來遯五復五變而成十四卦訟巽鼎大過旡妄家人離革中孚大畜大壯睽需兌凡卦三隂三陽者皆自泰來泰三復三變而成九卦歸妹節損豐既濟賁恒井蠱凡卦三陽三陰者皆自否來否三復三變而成九卦漸旅咸渙未濟困益噬嗑乾坤大父母也復姤小父母也坎離得乾坤之用者也頤大過小過中孚得坎離者也故六卦不反對而臨生坎遯生離臨生頤小過遯生大過中孚或曰先儒謂賁本泰卦豈乾坤重而為泰又由泰而變乎曰此論之卦也所謂之卦者皆變而之他卦也周易以變為占七卦變而為六十三卦六十四卦變而為四千九十六卦而卜筮者尚之此焦廷壽之易林所以興也聖人因其剛柔相變繫之以辭焉以明往來屈信利害吉凶之無常也故君子居則觀其象而玩其辭動則觀其變而玩其占占與辭一也故乾坤重而為泰者八卦變而為六十四卦也由泰而為賁者一卦變而為六十三卦也或曰剛柔相易皆本諸乾坤也凡三子之卦言剛來者明此本坤也而乾來化之凡三女之卦言柔來者明此本乾也而坤來化之故凡言是者皆三子三女相值之卦也非是卦則無是言也謂泰變為賁此大惑也曰不然也往來者以内外言也以消息言也自内而之外謂之往自外而之内謂之來請復借賁卦言之柔來而文剛者坤之柔自外卦下而來文乎乾之剛也分剛上而文柔者乾之剛自内卦上而往文乎坤之柔也於柔言來則知分剛上而文柔者往也於剛言上則知柔來而文剛者下也上者出也下者入也此所謂其出入以度内外此所謂上下無常也若言柔來者明此本乾也則不當言分剛上而文柔當曰剛來而文柔矣无妄之彖曰剛自外來而為主於内外卦乾已三畫矣謂之自外來則當自卦外來乎故乾施一陽於坤以化其一陰而生三子坤施一陰於乾以化其一陽而生三女者乾坤相易以生六子成八卦也上下往來周流無窮者剛柔相易以盡其爻之變也爻之言往來言上下内外者豈唯三子三女相値之卦而已哉故曰剛柔相推變在其中矣又曰往來不窮謂之通又曰變動不居周流六虚謂之周流六虚則其往其來非謂三畫之卦也近世楊傑鮑極論卦變之義楊曰泰者通而治者也故聖人變於節賁損蠱恒歸妹大畜之彖以為御治之術焉否者閉而亂者也故聖人變於咸益隨渙噬嗑无妄訟之彖以為救亂之術焉鮑曰遯陰長之卦邪道並興聖人易一爻而成无妄欲以正道止其邪也楊謂否變无妄訟亦誤矣然觸𩔖而長六十四卦之相變其義可推矣漢上易傳卦圖卷上
