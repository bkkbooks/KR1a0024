body:
  text: 漢上易傳卷四宋朱震撰下經艮下兊上咸亨利貞取女吉彖曰咸感也柔上而剛下二氣感應以相與止而說男下女是以亨利貞取女吉也天地感而萬物化生聖人感人心而天下和平觀其所感而天地萬物之情可見矣咸感也不曰感者交相感也咸自否變乾天也坤地也六三之柔上上九之剛下天地之氣感應而上下相與則亨矣故辭曰咸亨彖曰咸感也柔上而剛下感應以相與此以三上交感六爻相應言咸所以亨也闗子明謂咸者天地之交是也剛下柔而為艮之九三正也柔上剛而為兊之上六亦正也艮止也兊說也上下相感以正則止而說矣相感之道利於正不正則淪胥以敗男女相說朋友非義君臣不以道合非正而說也故辭曰利正彖曰止而說此以上六九三合艮兊二體言感之道當以正也艮少男感而來兊少女應而往匪媒不得待禮而行其感以正止而說者也取女如是君子之道造端於夫婦矣吉孰大焉故辭曰取女吉彖曰男下女此以二體申言感之道也夫二氣相感人道相說不過於正而巳故總言曰是以亨利貞取女吉也男下女者相感之一也无所不感者其唯天地乎二氣交感雨澤時行動者植者自化自生兊為澤巽者萬物潔齊之時有化生之象聖人感人心而天下和平者无所不感亦若天地也否上九聖人也六三中位人心也上九之三聖人下感乎人心也三之上人心感乎聖人也乾變兊則剛者說天為澤則髙者平不曰以心感人者感人以无心也張載曰有意於中滯於方隅而隘其无心之謂乎且天地至大感則相與萬物至衆感則化生天地一氣萬物同體未有感而不動者也故曰觀其所感而天地萬物之情可見矣此以上三兩爻合互體推之以盡咸感之道也在卦氣為四月太𤣥準之以迎象曰山上有澤咸君子以虚受人澤在下而達之山上以興雲雨利萬物者山體内虚澤氣上通交感也君子以是屈已虚其中以受人之益故能受盡言能用大才能任大事初六咸其拇象曰咸其拇志在外也艮為指在下體之下而動為拇拇足大指也初感而動不能自止觀其拇之動則知志在外矣虞翻曰志在外謂四也咸之初所感未深而志已先動動則四不應易傳曰感有淺深輕重之異識其時勢則所處不失其宜矣六二咸其腓凶居吉象曰雖凶居吉順不害也腓􅈩腸也巽為股二在下體之中腓也腓行則先動躁之象二感五不能守道自止動而遽趨之躁動凶之道也若居位不動順理以待上之求不害也二動失位為疾有害之意坤順也易傳曰質柔上應故戒以先動求君則凶居貞自守則吉九三咸其股執其隨往吝象曰咸其股亦不處也志在隨人所執下也巽為股股䏶也感上而動三陽才剛為内卦之主當位宜處說於上六而動亦若二隂爻然故曰咸其股亦不處也下比於二二腓也股動則腓動三在上反隨二不能自止所執在下執其隨者也非為上之道艮為手有執意隨人謂二也虞翻謂志在二是巳故曰志在隨人所執下也隨二則感上而往亦吝雖不處也豈能往哉是以進退皆失其宜九四貞吉悔亡憧憧往來朋從爾思象曰貞吉悔亡未感害也憧憧往來未光大也九四感不以正則不誠不誠則害於感有悔也動則貞而吉其悔亡雖勉而至未為感害也何以知勉動而貞也故曰貞吉悔亡未感害也四兊感於初方來而說初艮從於四欲往而止是以九四憧憧勞思慮於往來之際而不能定也四隂初六亦隂故曰朋四居中在三之上心思之所在夫思之所至則從思之所不至則不從朋從爾思所感亦狹矣能无悔乎四動而正初九不應去其偏係之私心則誠誠則虚而无所不感動成坎離光大之象故曰憧憧往來未光大也易傳曰聖人感天下之心如寒暑雨𤾉然无不通无不應者亦貞而已貞者虚中无我之謂也九五咸其脢无悔象曰咸其脢志末也九五有伏艮下感六二良為背脢鄭康成曰背脊肉也虞翻陸震劉牧同易傳曰與心相背而不見者也故曰咸其脢九五得尊位背其私心以中正相感感非其所見而說者則得人君感天下之正而无悔故曰咸其脢无悔然於感之義猶有未盡者九五比於上六也卦以初為本上為末有所志則私矣雖志於末未為无所係也盡感之義者其唯去其所志虚中无我萬物自歸乎故聖人立象盡意又繫之辭以明之也張載曰六爻皆以有應不盡卦義上六咸其輔頰舌象曰咸其輔頰舌滕口説也乾為首兊外為口内為舌艮止也兊說也上六兊感艮口動而上止者輔也輔上頷也九三乾艮感兊在首而悦見於外面頰也兊口動而内見者舌也上三相感不離於輔頰舌三者而巳不能以至誠感物徒發見於言語之間至於舌弊而不已者也滕王昭素作騰騰傳也上三相應騰口之象兊為説故曰滕口說也巽下震上恒亨无咎利貞利有攸往彖曰恒久也剛上而柔下雷風相與巽而動剛柔皆應恒恒亨无咎利貞久於其道也天地之道恒久而不已也利有攸往終則有始也日月得天而能久照四時變化而能久成聖人久於其道而天下化成觀其所恒而天地萬物之情可見矣咸以男下女男女交感之情也恒男上女下夫婦居室之道也交感之情少則情深居室之道長則分嚴故取象如此恒常久也卦自泰變初九之剛上居四六四之柔下居初剛上而柔下上下尊卑各得其序常久之道也故曰剛上而柔下此以初六九四言恒也震為雷巽為風雷動風行兩者相與於无形而交相益者也常久之道闕一則息矣故曰雷風相與此以震巽兩體相應而言恒也巽巽也震動也飄風驟雨天地為之不能以長久而況於人乎長久之道非巽而動不可也故曰巽而動此再以震巽言恒也夫剛上柔下而不能相與不可也相與矣不能巽而動不可也三者之才具則上下皆應斯足以盡恒之道故又曰剛柔皆應此再以六爻相應言恒也且以夫婦之道觀之尊者上卑者下分嚴矣不能相與則情何由通能相與矣剛或犯義柔不得禮亦豈能久巽而動上下内外應而家道成推之以治國治天下一道也故曰恒初九之四六四之初宜有咎亨則无咎亨者剛柔相與巽而動其動不窮也貞者泰初九也初九以正巽而動是以亨乾天坤地天地之道常久而不已者正而已矣故曰恒亨利貞久於其道也天地之道恒久而不已也此再以初變四言恒之才也易窮則變變則通通則久恒非一定而不變也隨時變易其恒不動故曰利有攸往恒一變井再變蠱復歸於恒三卦有震兊巽坎離艮之象天地之道始於震終於艮既終則復始於震而恒體不變所以能循環不息終始不窮亘古今而常久也故曰利有攸往終則有始也何以知天地之道能久哉觀諸日月之行四時之運則知之離為日坎為月坎離相易互藏其宅剛柔相與不失其正冬行北夏行南朝出於震夕入於兊得天之道終則有始也故能久照春震秋兊夏離冬坎隂生於姤陽生於復剛柔正也始於立春終於大寒終則有始也故變化而能久成聖人以恒致亨始之以貞如日月之明四時之有經故天地相說而巽其化乃成天地非恒不成觀諸天地則萬物之情可見矣此以九四一爻極其卦之變以推廣常久之道也在卦氣為七月故太𤣥準之以常永象曰雷風恒君子以立不易方雷風相薄極天下之動也而其正不動恒也恒自震三變九三立而不易君子以是處天下之至動而立不易方方者理之所不可易者也巽股為立坤為方動而不易其方其不動者乎初六浚恒貞凶无攸利象曰浚恒之凶始求深也初本泰之六四成巽九出六入有隂陽相求之象初入卦底在兊澤之下巽為股股入于澤下入之深者也浚之象故曰浚恒四震體躁動九陽剛處非其位不能下初不正不量而入始與四交求之太深非可久之道故凶夫人道交際貴乎知時而適淺深之宜故孟子三見齊王而不言或曰初六不正是以求之不可深曰動而正四亦不應雖正亦凶況不正乎浚恒之凶在始求太深人未必應情已不堪无所往而可也故曰貞凶无攸利九二悔亡象曰九二悔亡能久中也動而无悔久處而不厭者其惟中乎恒久之道也九二動而正其悔亡以正守中能久中也能久中則能恒九三不恒其徳或承之羞貞吝象曰不恒其徳无所容也九三得其所處宜堅正守恒而巽究為躁動而不正可處而不處失恒也故曰不恒其徳將進而犯上則上為正將退而乗二則二得中雖躁動矣進退何所容乎不得巳而復豈真能恒哉故曰无所容也三動成離為目三復成巽兊為口目動言巽羞之象三動而復二在下承之未嘗動也三於是始有羞矣故曰或承之羞或疑辭亦巽也九三可貞而吝是以及此夫子曰人而無恒不可以作巫醫况九三之處高位乎九四田无禽象曰久非其位安得禽也九四本泰之初九初往之四二成巽巽為雞二在地上田也二應五則巽禽為五有矣九四處非其位待之於上則初不至與初相易則巽伏而不見四安得禽哉久處非其位自无得禽之理此不知義之所當得而失其所欲者也冒榮招辱貪得致亡曷若守恒之無患學者亦然學無常位亦何所託業哉六五恒其徳貞婦人吉夫子凶象曰婦人貞吉從一而終也夫子制義從婦凶也坤順也六五順九二之剛坤徳之常也恒其德則正以順為正者婦人之德坤於乾為婦恒其徳貞在婦人則吉正故吉也陽竒一也隂耦二也陽始之隂終之六五從九二終吉孰甚焉從一而終也故曰婦无再嫁之文六五一爻於巽為夫於乾為子又有兊金刻制之象去其不正而從正制義者也婦人嫁則從夫夫死從子適宜而已父令君命有所不從從婦則凶之道故曰從婦凶也易傳曰五君位也而不以君言者盖如五之義在夫子猶凶況人君乎君道尤不可以柔順為恒故也他卦六居君位而應剛則未為失矣上六振恒凶象曰振恒在上大无功也上六處震動之極以動為恒不能久其徳故振奮妄動如風振林木不安乎上而求有功上六九三正應也妄動則下不應誰與之成功上三相易兊為毁折大无功也大无功則凶成得臣諸葛恪是已艮下乾上遯亨小利貞彖曰遯亨遯而亨也剛當位而應與時行也小利貞浸而長也遯之時義大矣哉遯坤再交乾也陽長則隂消柔壯則剛遯晝夜寒暑之道也二隂浸長得位於内君子之道漸消是以四陽遯去自内而之外故曰遯遯以全其剛小人不能害其身退而其道伸矣故曰遯亨遯而亨也或曰三隂進而至否五隂極而至剝君子猶居其間二隂方長君子何為遯哉曰否隂已盛剝隂將窮故否之九四九五上九剝之上九君子居之遯隂方長進而用事可不遯乎然君子之遯未嘗一日忘天下隂浸長而未盛五剛當位應二則與之應而不辭矣與時偕行豈必於遯哉孔子所以遲遲去魯孟子所以三宿而後出晝鄭康成曰正道見聘始任他國亦遯而後亨也故曰剛當位而應與時行也此再以二五相應伸遯亨之義也二隂浸長方之於否不利君子貞固有間矣然不可大貞利小貞而已隂為小剛當位而應六二得乎中正也先儒謂居小官幹小事其患未害我志猶行易傳曰聖賢之於天下雖道之廢豈忍坐視而不救哉苟可致力焉孔孟之所屑為也盖遯非疾世避俗長往而不反之謂也去留遲速唯時而已非不忘乎君不離乎羣消息盈虚循天而行者豈能盡遯之時義哉故曰遯之時義大矣哉在卦氣為六月也故太𤣥準之以逃唐象曰天下有山遯君子以逺小人不惡而嚴山以下陵上天遯而去之不可干也三四五上君子初二小人小人内君子外逺小人也小人逺之則怨怨則所以害君子者无所不至初四二五相應不惡也四陽以剛嚴在上臨之不惡而嚴也不惡故不可得而疎嚴故不可得而親是以莫之怨亦莫敢侮而君子小人各得其所矣初六遯尾厲勿用有攸往象曰遯尾之厲不往何災也卦體以前為首後為尾四陽避患患未至而先遯初六止而在後所處不正危道也故曰遯尾厲往之四雖正成離坎自明其節而遇險災也不若退藏於下自晦其明不往則何災之有初六處下非當位者所處微矣是故不去猶可以免患易傳曰古人處微下隠亂世而不去者多矣六二執之用黄牛之革莫之勝説象曰執用黄牛固志也艮手執也坤為牛坤中為黄艮為革執之用黄牛之革也二近初六而應五處于内近小人往從五則所執説矣二從五成離兌離火勝兊金兊為毁折有勝説之意六二知其不可以處而比初又不可往而従五乃堅固以執其志如執用黄牛之革則初莫之止五莫之勝確乎不可㧞孰能奪其所守哉故曰固志也六二柔中故執志如此乃能遯九三係遯有疾厲畜臣妾吉象曰係遯之厲有疾憊也畜臣妾吉不可大事也九三得位係於二隂而不能遯巽繩係也故曰係遯九三遯則陽失位以動為疾故安其位而不動故曰有疾隂方剝陽已私係之未失位也而曰厲以動為疾久則極憊困篤不可救已晋張華是已三極也有憊之意故曰係遯之厲有疾憊也九三為内之主二隂自下承之坤為臣伏兊為妾以此畜臣妾則吉正也若係志於鄙賤之人其可大事乎陽為大巽為事三動巽毁不可大事也故曰畜臣妾吉不可大事也九四好遯君子吉小人否象曰君子好遯小人否也好者情欲之所好也九四係於初六不正之隂而相應情好也君子剛決以義斷之當可遯之時舍所好動而去與應絶矣動則正正故吉蕭望之不顧王生之寵是也故曰君子吉曰小人否者九動成六六安於四又有小人不能去之象否者不能然也此爻與初六相應處隂而有所係故極陳小人之戒以佐君子之決易傳曰所謂克已復禮以道制欲者也是以吉小人則義不勝欲牽於私好相與陷於困辱危殆之途猶不知也九五嘉遯貞吉象曰嘉遯貞吉以正志也陽為美九五中正无以加焉美之至也剛中處外可行則行也當位而應可止則止也不後而往不柔而應不安於疾憊不係於情好遯之至美故曰嘉遯貞吉者以自正其志而安也正志者行止无累於物也此夫子所以疾固歟易傳曰在彖則槩言遯時故云與時行小利貞有濟遯之意也於爻至於五則遯將極矣故唯以中正處遯言之上九肥遯无不利象曰肥遯无不利无所疑也上九盈矣動成兊說見於外肥也上九處卦外内无應動則正无往不利其於遯也有餘矣故曰肥遯所以无不利者剛決不係於四无疑情也巽為不果疑也乾下震上大壯利貞彖曰大壯大者壯也剛以動故壯大壯利貞大者正也正大而天地之情可見矣隂陽迭壯者也以三畫卦言之初為少二為壯三為究以重卦言之初二為少三四為壯陽動於復長於臨交於泰至四爻而後壯泰不曰壯者隂陽敵也過於隂則陽壯矣猶人血氣方剛故曰大壯大者壯也陽之初其動甚微動而不已物莫能禦君子之道義其大至於塞乎天地之間者以剛動也故曰剛以動故壯此合震乾二體而言壯之時也初九大者正也大者正乃能動而不屈壯而不以正則失之暴不能久也飄風暴雨江河之大皆不能久故曰利貞大者正也此以初九言壯之道也曾子曰自反而縮雖千萬人吾往矣正故也正故能大天地之動也乾始於子坤始於午震卯而兊酉正也故四時行萬物生其大无外以正而大也易傳曰天地之道常久而不已者亦至大至正而已故正大而天地之情可見矣以卦氣言之二月也故太𤣥準之以格夷象曰雷在天上大壯君子以非禮弗履雷出地者也而在天上大壯也雷在天上非所履而履故史墨謂雷乗乾為臣强之象然俄且降矣君子以是動必以正非禮弗履非禮弗履所以全其壯也横渠曰克已復禮壯莫甚焉初九壯于趾征凶有孚象曰壯于趾其孚窮也初在下體之下應震足而動趾也孚四也初九剛在下用壯不中當守正不動以全其壯可也征凶者以正行亦凶言不可行行則兩剛相敵而四不應壯豈得用哉故壯于趾者以其孚窮也易傳曰用壯而不得中雖以剛居上猶不可行況在下乎九二貞吉象曰九二貞吉以中也九二剛中壯而處中其動也正正則吉正吉者以中也盖剛正而不中者有矣中庸曰中立而不倚强哉矯其九二乎易傳曰居柔處中不過乎剛者也九三小人用壯君子用罔貞厲羝羊觸藩羸其角象曰小人用壯君子罔也九三不動陽為君子九動變六隂為小人小人處極剛而有應必用其壯故曰小人用壯君子處此自守其正有剛而不用太𤣥曰罔者有之舍罔非无也有在其中矣故曰君子用罔然剛極矣處兩剛之間雖正亦厲正而濟之以和說可也故曰貞厲此君子所以用罔歟震為萑葦為竹木在外為藩兊為羊前剛為角震為反生羊角反生為羝羊羝羊􅗑也三往觸上剛絓於藩六來乗之兊毁羊喪其很此小人用壯之禍可不戒乎京房曰壯不可極極則敗物不可極極則反故曰羝羊觸藩羸其角壯一也小人用之君子有而不用故曰小人用壯君子罔也九四貞吉悔亡藩決不羸壯于大輿之輹象曰藩決不羸尚往也四陽長過中壯之甚也而不正君子道長之時四以不正在上宜有悔故戒以貞貞則類進之吉无用壯之悔故貞吉悔亡震在内外之際為藩四動往之五藩決剛得中羣陽自下進而不括故曰藩決不羸尚往也曰不羸者因九三為象也坤為輿震木在輿下為輹車之毁折常在於輹九四陽壯壯于大輿之輹則何惡於壯乎大輿而輹壯其往利矣壯以任重道行於上之象也貞吉悔亡故藩決不羸往而之五藩决不羸以壯於大輿之輹利往也故象辭如此六五喪羊于易无悔象曰喪羊于易位不當也兊為羊羊羣行善觸諸陽並進之象六五柔不當位陽剛方長宜有悔然持以和易則諸陽无所用其壯而剛彊暴戾之氣屈矣此所以无悔歟四五相易兊毁喪羊于易和易亦兊也盖位尊則能制下徳中則和而不流以此用和其誰不服光武曰吾治天下亦柔道六五之謂乎易傳曰治壯不可以剛人君之勢不足而後有治剛之道上六羝羊觸藩不能退不能遂无攸利艱則吉象曰不能退不能遂不詳也艱則吉咎不長也上六動成九前剛也前剛角之象兊為羊震為反生羊角反生羝羊也震為萑葦竹木在外為藩上動觸藩羸絓其角不能遂也退則三不應不能退也決事者當於其始詳慮之可則進否則退上六妄動不能退不能遂自處之不詳審也何往而利哉然壯終則變能艱難守正自處以柔則吉妄動之咎不長也在我而已巽為長震者巽之反故曰不長坤下離上晉康侯用錫馬蕃庶晝日三接彖曰晉進也明出地上順而麗乎大明柔進而上行是以康侯用錫馬蕃庶晝日三接也明出地上進而不已至於盛明故曰晉進也明出地上此合離坤兩體言晉也晉自臨來蹇之變也離者坤易乾也離為明自六五言之為大明乾陽為大也人君有明徳居尊位照天下之象坤順離麗也人臣之道主於順而不知其所麗則其道不能以上行順而麗乎大明然後蹇六三之柔進而與君同德故曰順而麗乎大明柔進而上行此以六五一爻言晉也五為天子四為諸侯康襃大之與禮記康周公之康同六四進而之五以諸侯近天子之光王明而受福九五用是降心以襃大之錫馬蕃庶也乾變坎為美脊之馬坤變乾為牝馬坤為衆蕃息庶多言不一種也周官校人天子十有二閑馬六種邦國六閑馬四種凡朝覲會同毛馬而頒之錫馬蕃庶亦進之意也日在中天為晝艮為手坤三爻三接三極數也不唯錫予又親禮之大行人之職諸公三饗三問三勞晝日訪問之時三接極盛之禮所以康諸侯者至矣非順而麗乎大明柔進而上行何由至是哉故曰是以康侯用錫馬蕃庶晝日三接也此以六五兼兩體而言處晉之道或曰午為馬火畜也故古者差馬以午出入馬以日中而説卦以乾坎震為馬何也曰乾離同位日與天同體金與火相守則流以五行言之火為馬以八卦言之乾為馬觀諸天文七星為馬離也離者午之位漢中之四星曰天駟東壁之北四星曰天廏建星六星曰天馬乾坎也房為天駟東一星為天馬震也故馬以三卦言之昔者國有戎事各服其産而冀比之馬獨為良馬者乾也震為龍其究為健健乾也辰為角亢與房及尾共為蒼龍之次故馬八尺以上曰龍世傳大宛余吾之馬出於龍種龍飛天者離也馬行地者乾也而馬政禁原􅁞􅁞以火出而浴龍星之精與馬同氣察乎此則知乾離同位矣在卦氣為二月故太𤣥準之以進象曰明出地上晉君子以自昭明徳乾曰自强晉曰自昭二者自已為之人力无所施天行日進誰使之哉明徳者已之所自有也進而不已其徳自昭如日有光出則被乎萬物非有心於昭昭也易傳曰去蔽致知昭明徳於已也明明德於天下昭明徳於外也初六晉如摧如貞吉罔孚裕无咎象曰晉如摧如獨行正也裕无咎未受命也晉之始見有應則動而進故晉如動而九四不應知其不可進則自抑而退故摧如摧者抑其動也始進未孚戒在不正以求四之知唯獨行正道乃𫉬貞吉積誠不已未有不孚者故曰貞吉罔孚初坤體順其進也不汲汲以失守其退也不悻悻以傷義綽然有餘裕卒歸於无咎故曰裕无咎然裕无咎者以進之始未受命也若巳仕而有官守上不見信不得其職致為臣而去可也裕安得无咎四艮為手受也巽為命初動震見巽伏未受命易傳曰若夫有官守而不孚于上廢職失守以為裕則一日不可居矣六二晋如愁如貞吉受兹介福于其王母象曰受兹介福以中正也六二得位居晉之時而五不應故晉如愁如二至五有離目艮鼻坎加憂嚬蹙之象故愁如言進之難知道未行為天下憂之然守貞則吉王母六五動也柔得尊位五動成乾乾為王坤為母王母也數親自二為上二為已三為考四為祖五坤祖之配也故祖母謂之王母二雖難進无援於上然柔順中正履貞不囬久而必孚況同徳乎未有五不動而應之者故受兹介福于其王母五動陽為福為大介大也二中正五動亦中正是以二受五之福故曰以中正也六三衆允悔亡象曰衆允之志上行也坤為衆三不當位衆所未允宜有悔晉之時三隂在下同順乎上三順之極而有應三志上行則二隂因之得麗乎大明上九應之成兊兊為口三得正衆允之也衆允則悔亡此大臣因衆之願而效之上者也以此居位雖柔必强何憂乎不勝其任哉九四晉如鼫鼠貞厲象曰鼫鼠貞厲位不當也鼫鼠子夏傳作碩鼠碩大也艮坎為鼠陽為大鼠晝伏夜動者也坎為加憂九四剛而不正處晉明之時竊據上位憂畏而不安碩鼠也大明在上三隂進而麗乎明四處位不當而不知退於正為厲知非而去未失為虞丘子也六五悔亡失得勿恤往吉无不利象曰失得勿恤往有慶也六五柔不當位有悔者於進徳為失不剛故也坎為加憂恤也五能舍已往而從上九上正其君於道柔者剛矣則悔亡失者得而坎毁故曰悔亡失得勿恤五明之主患在於矜智遂非以失為恥故戒以失得勿恤不憚從人不留情於既失則往正而吉无所不利邦國之慶也悔者亡失者得憂者喜慶之謂也陽為慶故辭曰往吉无不利象曰往有慶也易傳曰不患不能明患其用明之過故戒以失得勿恤上九晉其角維用伐邑厲吉无咎貞吝象曰維用伐邑道未光也上九前剛角象也上晉之極至於角窮矣猶進而不止危厲之道維用於伐邑則可雖危厲而吉伐邑者自治也若施之征伐則凶有咎窮兵故也上窮反三入于坎險坤在内為邑邑已之自有故此伐邑有自治之意伐邑則九得正厲者吉吉則於自治為无咎亦猶冥升利于不息之貞所以自治者於進道有未光也上反三坎離毁未光之象易傳曰人之自治剛極則守道固進極則遷善速六三之行六五之往皆不曰晉者三行則上反三五往則上反五反非進也故二爻不言晉離下坤上明夷利艱貞彖曰明入地中明夷内文明而外柔順以蒙大難文王以之利艱貞晦其明也内難而能正其志箕子以之離為日為明坤為地為晦坤上離下明入地中夷傷也晉日在上旦晝也明夷明入地中暮夜也鄭康成曰日在地上其明乃光至其入也明乃傷矣晉者明君在上羣賢並進麗于大明之時明夷者闇君在上明者在下見傷之時故曰明夷此以坤離兩體言明夷也明夷晉之反離為文明坤為柔順坎為險難陽為大文王當紂之時内含文明外體柔順蒙大難而免於難故曰内文明而外柔順以蒙大難文王以之言文王用明夷之一卦也初九六二九三正也明夷之時不晦其明則有禍失其正則其明熄滅處之者利在於艱貞而已艱貞者有其明而晦之也如日在地中其明可晦正不可動故曰利艱貞晦其明也坎險在内内難也箕子紂同姓近則身在商邑之中難在内者也佯狂被髪自守其志囚奴而不變其於正也難矣故曰内難而能正其志箕子以之言箕子用明夷利艱貞之三爻也文王箕子雖若不同其用明夷之道則一也在卦氣為九月故太𤣥準之以晦象曰明入地中明夷君子以莅衆用晦而明明夷者晉之反坤為衆為晦離為明初九九三入而治之莅衆也天下至衆以明莅之則知有時而困人情不安用晦而明則親疎小大無所不容衆為我用此垂旒黈纊而明目達聰之道也初九明夷于飛垂其翼君子于行三日不食有攸往主人有言象曰君子于行義不食也晉上九反而為明夷之初九離為鳥自上下下于飛也見傷而垂其翼者也柔為毛剛其翼也小人之害君子必害其所以行使不得進君子明足以見微故去位而行離為日之四厯三爻兊口在上三日不食也斷之以義雖困窮飢餓而不悔故曰君子于行義不食也之四有攸往也巽東南方主人位兊口為有言君子所為衆人固不識也方初九以正見傷於明夷之始其事隠而難見微而未著自常情觀之豈不離世異俗乎此所以主人有言然君子不恤也義之當然納履而行何往而不貧賤哉易傳曰待其已顯則无及矣此薛方所以為明而揚雄所以不𫉬去也穆生之去楚二儒且非之況世俗之人乎故袁閎之於東漢亦以為狂也所往而人有言何足怪哉六二明夷夷于左股用拯馬壯吉象曰六二之吉順以則也此爻因初九之往以取象初往二成巽震為左巽股也二為小人所傷不可動以應五明夷夷于左股小人之傷君子天也君子无如之何亦順之而已六二在位不可以苟去用九三拯之可也拯子夏傳説文字林作抍音升一音承上舉也三震起也九三之五成艮手有起手上舉之象夷于左股既不可動用之上舉其手以濟六五之柔者當資九三之力九三坎馬震為作足坎震得位馬之壯健者也馬壯乃可載上而行以濟弱六二不動亦保其吉雖傷左股猶無傷也此六二順以致吉不失其事君之則也則者理之所不能違也故曰六二之吉順以則也夫雷風相益水火相用見於萬物異體而同功者多矣況二三同體乎然非中正明徳君子其能如是書曰告予顛隮若之何其六二之謂歟鄭本作明夷睇于左股睇傾視也離目變巽左股見傷故睇之或當從鄭或曰卦爻有因前爻何也曰亦彰往察來之一端也前爻既往後爻方來來往相為用故有因爻成象者如同人九四因九三九五因九三九四明夷六二因初九也有因前卦為象者如明夷之上六因晉夬之初九因大壯玩其辭則可知故曰斷辭則備矣太𤣥亦然一首不盡其義乃以二首明之九三明夷于南狩得其大首不可疾貞象曰南狩之志乃大得也三公之位上六明夷之主九三極明至剛得位而應不得已而動以克極闇之主湯武之事也自二至上體師坎為中冬狩之時離為南三動之上南狩也故曰明夷于南狩狩者為民去害離之三陽乾也乾為首陽為大南狩克之得其大首大首元惡也得者易辭故曰得其大首離為鳥飛而上逆不可疾也九居上未正也民迷久矣遽正則駭懼不安當以疾貞為戒故曰不可疾貞動於中志也京房曰動乃見志故曰南狩之志乃大得也易傳曰以下之明除上之暗其志在於去害而巳商周之湯武豈有意於利天下乎志苟不然乃悖亂之事也六四入于左腹𫉬明夷之心于出門庭象曰入于左腹𫉬心意也上六極闇九三極明四逺上近三應初震為左離為大腹四自震應初入離入於左腹也坎為心坤中為意初六之四離變艮為門四為夜𫉬明夷之心于出門庭也初之四則坎坤變兊為說獲心意之象故又曰𫉬心意也其微子去商之事乎上六極闇將亡其意豈願亡哉去闇就明亡者復存則獲明夷之心意矣震為反生故也六四柔順而正與上六同體比於三而逺於上六以譬則微子之類也腹之為物能容者也自外而之内自上而之下九三所受也六五箕子之明夷利貞象曰箕子之貞明不可息也六五動則正正成離離明也不動成坤坤為晦自晦其明也五上同體迫於昏亂而不可去是以自晦其明以免禍箕子之明夷也自晦者不動而已未嘗失正也明在其中失正則其明遂亡故佯狂者自晦也不受封去之朝鮮者正也聖人慮後世讀易者以自晦即守正而蒙垢愛生失其所守故曰箕子之貞明不可息也上六不明晦初登于天後入于地象曰初登于天照四國也後入于地失則也晉明出地上反為明夷則明入地中不明而晦上六極坤坤為晦故曰不明晦晉時離出坤登于乾五下照坤六四坤在上為國故曰初登于天照四國也晉反則離入于坤後入于地也五者君之位以明徳居尊位者人君之則後入于地則失位失位者以不明晦而失為君之則也人君近君子逺小人兢兢焉唯懼不明乎善者所以守其則也得失无不自已為之者得之明失之晦晝夜之象故聖人舉晉明夷二卦反復以釋爻義原初懲後為人君萬世之戒雜卦曰明夷誅也為明夷之主而不誅者鮮矣離下巽上家人利女貞彖曰家人女正位乎内男正位乎外男女正天地之大義也家人有嚴君焉父母之謂也父父子子兄兄弟弟夫夫婦婦而家道正正家而天下定矣外巽内離離明也易傳曰外巽内明處家之道然卦以長女中女為象者女以男為家家人以女為奥主故曰家人此合兩體言家人也家人自遯來无妄變也互巽變離六二正離為女女正位乎内也震變互坎六四正坎為男男正位乎外也女正位乎内然後男正位乎外女不正而能正其外者无有也天地坎正位乎北離正位乎南南北定位東西通氣而天地化生萬物故曰女正位乎内男正位乎外男女正天地之大義也此以六四而下言家人利女貞也五君之位也乾九五者父也乾為剛嚴无妄坤居四上配乾五為母以坤變乾為離歸尊於父父母之於家人其嚴有君道家人猶臣妾也子之事父母婦之事舅姑雞鳴而朝非君道乎易傳曰无尊嚴則孝敬衰无君長則法度廢故曰家有嚴君父母之謂也此以九五而下言家人正家之道也乾為父坎為子父上子下父子正也巽為長女離為中女孟上仲下兄弟正也坎為夫離為婦夫上婦下夫婦正也乾為天五爻各得其位天下定也故曰父父子子兄兄弟弟夫夫婦婦而家道正正家而天下定矣此以上九而下推廣正家之道也夫正家之道始於女正女正而後男女正男女正而後父母嚴父母嚴而後家道正家正而後天下定家者天下之則也孟子曰天下之本在國國之本在家家之本在身故彖辭如此在卦氣為五月故太𤣥準之以居象曰風自火出家人君子以言有物而行有恒巽風離火風自火出也說卦巽為木為風黄帝書曰東方生風風生木又曰火疾生風盖風火同生於木風自火出由内及外家人之象夫風緣火火緣木未始相離君子體之故言有事實行有常度自初至五體噬嗑頤中有物言有物也无妄震為行六四行不失正行有常也言行有法則家人化之初九閑有家悔亡象曰閑有家志未變也家道正則治不正則亂初九明於家道正以閑其初能有家者也初九動而與四相易則内外不正禮外内不共井不共湢浴不通寢席不通乞假男女不通衣裳内言不出外言不入防瀆亂也初者家人之志未變之時於是閑之以法度内外各守其正何悔之有志動不正流宕无别然後閑之則悔矣失防患未然之道六二无攸遂在中饋貞吉象曰六二之吉順以巽也二主婦之位坤得位上從乾五乾夫道也地通无成婦人從夫无所遂事者順也故曰无攸遂坎水離火而應巽木女在中當位亨飪而主饋事順也故曰在中饋順以巽者婦人之正也正則吉故曰貞吉六二不動而吉者以此故曰六二之吉順以巽也詩曰無非無儀維酒食是議孟子之母曰婦人之禮精五飯羃酒漿養舅姑縫衣裳而已矣故有閨門之修而无境外之志九三家人嗃嗃悔厲吉婦子嘻嘻終吝象曰家人嗃嗃未失也婦子喜嘻失家節也三内之主也嗃嗃陸法言曰嚴厲貌易傳曰有急速之意陽居三剛正過中巽為風為號離火炎上聲大且急嚴厲之象骨肉之情望我以恩而治家太嚴傷恩矣能无悔乎拂其情矣能无厲乎然法度立倫理正小大祗畏以正得吉未為大失也故辭曰家人嗃嗃悔厲吉象曰未失也坎子離婦三動不正與二相易離成震兊離目也震動也兊說也坎兊為節坎動兊見失節也目動聲出而說嘻嘻也喜樂无節其終必至於亂倫瀆理蕩而不反雖欲節之有不得而節者吝也故辭曰婦子嘻嘻終吝象曰失家節也二者治亂之别京房曰治家之道於此分矣六四富家大吉象曰富家大吉順在位也六四本无妄之三進而在位巽體而順三陽為實積其上富家也上有承下有應巽以事上則親順以接下則從夫奢則不遜而富者怨之府六四如此故能安處其位有家之實陽為大正則吉富家大吉也治家之道以剛正威嚴為善戒在於柔順故家人初三五皆吉上九威如終吉二與四柔也於治家无取故二以柔順卑巽者婦人之正也非男子所宜也四巽體而順在位者滿而不盈保其家者也非治家也九五王假有家勿恤吉象曰王假有家交相愛也五乾為王假至也王極乎有家之道正家以定天下則至矣故曰王假有家五剛而巽乎外二柔而順乎内中正相應心化誠合則上下内外互相親睦故曰交相愛也交相愛者相與于中之象也王假有家達之天下至於交相愛則天下不勞而治矣勿恤乎吉可也五動成離有伏坎坎為憂恤不動坎伏正則吉三代之王正心誠意修乎閨門之内不下席而天下治何所憂哉故辭曰勿恤吉象曰交相愛也上九有孚威如終吉象曰威如之吉反身之謂也上三有孚之道以下未孚也故威如威如者九在上剛嚴之象上九動而正家人見信九三孚也始也威如終則正而見信威如終吉也上九卦之終坤為身九動反正反身之謂也威非外求反求諸身而巳反身則正正則誠誠則不怒而威夫誠所以動天地者也况家人乎聖人以治家之道莫尚於威嚴慮後世不知所謂威嚴者正其身也或不正而尚威怒則父子相夷愈不服矣安得吉故於上九𤼵之孟子曰身不行道不行於妻子石慶家人有過輒不食家人謝過而後復是亦反身也易傳曰慈過則失嚴恩勝則掩義長失尊嚴少忘恭順而家不亂者未之有也兊下離上睽小事吉彖曰睽火動而上澤動而下二女同居其志不同行説而麗乎明柔進而上行得中而應乎剛是以小事吉天地睽而其事同也男女睽而其志通也萬物睽而其事類也睽之時用大矣哉離火動而上兑澤動而下火澤之睽也中少二女同居於家而所歸之志各異二女之睽也故曰睽此以兩體言睽也睽本同也離兑同為女而至於睽者時也故睽自家人反明本同也本不同則无睽惟本同故有合睽之道自離兑言之說而麗乎明自家人六二之五言之柔進而上行得中而應乎剛説則順民麗乎明則擇善柔得中則柔而不過應乎剛則取剛以濟柔是以小事吉夫說而麗明柔得中而應剛不可以作大事何也以柔進上行而得尊位也睽之時人情乖隔相與者未固非剛健中正不能合天下之睽如睽之柔其才纔足以小事吉也故曰説而麗乎明柔進而上行得中而應乎剛是以小事吉此合兩體卦變而言處睽之道也天地男女萬物一氣也得其所同則睽者合矣剛上柔下天地睽也天降地升生育萬物其事同也坎外離内男女睽也男上女下乃有室家其志通也坎見震毁萬物睽也陽生隂成物无二理其事類也非本同也其能合乎大人以是能用天地能用男女能用萬物乖者復合混而為一以至天下為一家中國為一人故曰天地睽而其事同也男女睽而其志通也萬物睽而其事類也睽之時用大矣哉此推原一卦以論合睽之道也在卦氣為十一月故太𤣥準之以戾象曰上火下澤睽君子以同而異離兊同為隂卦而未始不異君子之所同者人之大倫也然各盡其道亦不苟同以徇衆人見其為異矣不知異所以為同中庸曰和而不流晏平仲曰同之不可也如是彖言異而同大象言同而異初九悔亡喪馬勿逐自復見惡人无咎象曰見惡人以辟咎也睽之始剛而无應動則不正故有悔四坎馬也四不與初以剛自守喪馬不逐也睽諸爻皆有應四獨無與安得不動而求初乎四動之初初往復成坎馬勿逐自復也故悔亡四不正而險惡人也離目為見初往之四有離見惡人也之四雖不正以辟咎故无咎天下惡人衆多疾之已甚人人與君子為敵是睽者既合而復睽斯亦君子之咎也然初守正四動而後初見之夫子見陽貨陽貨先也故不得不見若屈已而先見之睽非不合矣見之可也從之不可也易傳曰古之聖人所以能化姦凶為善良綏仇敵為臣民由弗絶也九二遇主于巷无咎象曰遇主于巷未失道也九二以剛中之徳遇六五濟睽之主人情睽離之時二五皆非正應五來求二兊變震艮睽者家人之反艮為門為徑家門之有徑者巷也二往應之離變巽巽東南主人位也五來求二二適往應是以相遇故曰遇主于巷遇者不期而會巷委蛇曲折而後達睽而欲合故如是之難然二五得中震為大途合睽者如是乃為得中未失道也易傳曰巷者委曲之途也非邪僻由徑也遇者逢會之謂非枉道詭遇也至誠以感動之盡力以扶持之明義理以致其知杜蔽惑以誠其意如是而已故云未失道也六三見輿曳其牛掣其人天且劓无初有終象曰見輿曳位不當也无初有終遇剛也六三於睽時處不當位介於二剛之間其柔不能自進上九之剛雖非正應欲往而遇焉二剛侵凌莫之與也三坤為輿為牛離目為見四前剛為角離火欲上坎水欲下見輿曳也離上角仰也坎下角俯也一仰一俯牛頓掣也鄭康成作觢觢牛角踴也踴起而復下亦頓掣也見輿曵而不行其牛俯仰而頓掣言四扼於前者如此也二乾為天三坎之柔為髪而兊毁之髠其首也馬融曰刻鑿其額曰天易傳曰髠其首為天以象考之易傳為是伏艮為鼻兑金制之刑其鼻也其人天且劓者言其人既為四扼於前猶力進而犯之又為二制於後出處不當位故人情上下惡之然動得其正睽極則通初雖艱厄終必遇之三遇上剛二四象毁坤輿進而上行矣故曰无初有終遇剛也曰遇者不期而會謂其非正應也君子於此不尤乎見惡者反身以正而已正則應應則惡我者説睽我者合易傳曰不正而合未有久而不離者也合以正道則无終睽之理故賢者順理而安行智者知幾而固守九四睽孤遇元夫交孚厲无咎象曰交孚无咎志行也九四睽時處不當位介二隂之間五應二三應上四獨无應在睽而又孤故曰睽孤孤則危厲有乖離之咎初守正不援乎上處睽之善者也四變交初兊變坎四離為婦初坎為夫元始也善之長也故曰遇元夫四動正正則誠矣彼我皆誠有不約而自信者故曰交孚交孚則雖厲而无咎交則初四未正曰无咎者初志上行睽者通也易傳曰卦辭言无咎夫子又從而明之云志行也盖君子以剛陽之才至誠相輔何所不濟也唯有君則能行其志爾六五悔亡厥宗噬膚往何咎象曰厥宗噬膚往有慶也六五柔得尊位宜有悔也能致九二在下之賢以剛輔柔故悔亡五離也二兊有離體同宗而為六五所宗噬膚者囓柔也五來下二兊變成艮艮為膚兊口囓柔噬膚也自二至上體噬嗑故曰厥宗噬膚二噬五柔而深之剛柔相入之意睽離之時非五下二三不可往非深入之則其久必離九二剛中不苟往者也五既下之往亦何咎往則有濟睽之功成邦家之慶陽為慶謂五柔成剛也易傳曰爻辭但言厥宗噬膚則可往而无咎象推明其義言人君雖已才不足若能任賢輔使以其道深入於已則可以有為往而有福慶也上九睽孤見豕負塗載鬼一車先張之弧後說之弧匪宼㛰媾往遇雨則吉象曰遇雨之吉羣疑亡也上與三應亦曰睽孤者睽離之時三未從上有四間焉而上疑之則人情不合而孤猶之人也疇類異處適有人參處乎兩者之間則疑矣上九處極睽難合之地過剛而暴極明而察故疑於四者无所不至離目為見坎為豕兊為澤坤土坎水陷于兊澤豕在澤中汨之以泥塗見豕負塗也言惡其穢之甚也坤為鬼坎為輪坤在坎中載鬼一車也言以无為有妄之極也離矢坎弓先張之弧疑四為寇而見攻也三所以未應豈四之罪哉人情有未通爾睽極則通異極則同隂陽剛柔无獨立之理六隂柔也九陽剛也剛來柔往則疑情渙然釋矣故後説之弧知四匪宼也九剛六柔自㛰媾也故曰匪宼㛰媾此匪宼㛰媾與他卦言同而象異坎在下為雨上來之三三往遇之上三正則吉吉則向來羣疑亡本无是也故曰遇雨則吉羣疑亡也辭枝如此者疑辭也艮下坎上蹇利西南不利東北利見大人貞吉彖曰蹇難也險在前也見險而能止知矣哉蹇利西南往得中也不利東北其道窮也利見大人往有功也當位貞吉以正邦也蹇之時用大矣哉蹇坎險難也艮止也坎在上險難在前止而不進故曰蹇難也險在前也此合兩體言蹇也離目為見見險者明也知其不可進則止而不犯者行其所知也知者精神之㑹水火之合坎離之象故曰見險而能止知矣哉此兼互體以卦才言處蹇之道也蹇自臨來小過變也九四往之五小過之五即臨之坤也坤西南體順而易坤衆也五中蹇難不解天下思治九四能順乎衆而往上居於五處順易以濟險難以順民心乃得中道所謂時中蹇之利也故曰蹇利西南往得中也艮止也東北方也見險而止非遂止不往也順時而處以有待也若遂止於險則過矣過則道不行天下益蹇非中道乃蹇之所不利故曰不利東北其道窮也此以卦變四五相易言濟蹇之道也大人九五也剛中而正量險而行其才足以濟難利見大人者六二也非剛健中正在上則六二柔中未有功也故曰利見大人往有功也此以二五言濟蹇也坤在四為邦國四諸侯位也故建侯康侯正邦无邦皆取此象蹇五爻皆正而初不正初不正者蹇之所由生也九五當位而正以正六四而邦國正邦國正則天下正而蹇難解矣正而吉也故曰當位貞吉以正邦也此再以九五六四言濟蹇也蹇之時或可止或可往往而有功非大人不能盡其用故曰蹇之時用大矣哉在卦氣為十一月故太𤣥準之以難象曰山上有水蹇君子以反身修徳山上復有險行者蹇也六五反四而正反身修徳之象易傳曰君子之遇蹇難必自省於身有失而致之乎有所未善則改之无慊於心則加勉初六往蹇來譽象曰往蹇來譽宜待也蹇之初有險在前往則遇蹇知不可往來而止安時處順待可動而動則有見幾知時之譽初動而往離坎變兊兊口譽之往則蹇來則譽宜待也天下之險未有久結而不解者故伯夷太公居海濵以俟若先時而起則愈蹇矣鄭氏本作宜待時也六二王臣蹇蹇匪躬之故象曰王臣蹇蹇終无尤也五乾王也二坤臣也二應五王臣也五在險中蹇也六二犯難濟五之險蹇之又蹇故曰王臣蹇蹇坤為身三折之目視下為躬二履當其位而艮體有保其躬之意二往濟五身任安危五坎變坤匪躬之故也蹇時非有才而剛上輔其君不能濟難二柔濟五才不足疑若有尤然志靖王室忘身以衛其上雖蹇之又蹇終无尤也易傳曰聖人取其志義謂其无尤所以勸忠藎也九三往蹇來反象曰往蹇來反内喜之也往則犯難反則得位九三重剛為下卦之主初二柔爻恃之以拒外險故往蹇來反以内喜之而反也陽得位故喜易傳曰反猶春秋之言歸也六四往蹇來連象曰往蹇來連當位實也六柔无應往則犯難故往蹇來則當位承五下連九三故來連連牽連也九三剛實四牽連之共濟五難當位而又得濟之實也處蹇難不以剛實濟之柔者安能獨濟乎陽為實九五大蹇朋來象曰大蹇朋來以中節也險者人情之所不敢犯也五在險中獨安其險剛正足以任天下之難而不辭大者得位當蹇之時如是乃為得中陽與陽為朋朋謂九三也五下應二三來比之朋來也五為坎三來成兊水澤節之象節者處蹇之節也九五在險得中道應六二者有節則九三之剛不約而自來九三外應上六内為六二初六之所喜而又六四牽連而進同心協力斯可以濟天下之難故曰大蹇朋來以中節也若九五前郤應於下者失剛柔緩急之節則九三招之不來矣仲虺賛湯曰天錫王勇智武王曰今朕必往濟蹇大難者其要在於九五乎上六往蹇來碩吉利見大人象曰往蹇來碩志在内也利見大人以從貴也上六志在紓難然柔也才不足以柔犯難故往蹇柔自外來求助於九三三以剛濟柔則難紓志乃大得故曰往蹇來碩志在内也陽為大艮為石碩剛大也離目為見大人九五也故曰利見大人九五貴而有位足以行其道九三其徳剛大佐五以濟天下之難上六志在内因九三利見九五斯可以出難故曰以從貴也陽為貴蹇難未解人不知所從上六因九三以從九五之貴則君臣之分定矣坎下震上解利西南无所往其來復吉有攸往夙吉彖曰解險以動動而免乎險解解利西南往得衆也其來復吉乃得中也有攸往夙吉往有功也天地解而雷雨作雷雨作而百果草木皆甲坼解之時大矣哉坎險也震動也他卦名不再釋解言解乎險難以是動動而出乎險之外則險難解矣故曰解險以動動而免乎險解此合二體言解也解者蹇之反解之九二乃蹇之九五也九四乃蹇之九三也坤為西南其體順自艮反有平易之意坤又為衆當蹇難之後人皆厭亂四以平易之道往順乎衆而衆與之是以得衆湯代虐以寛武王乃反商政是也故曰解利西南往得衆也此以九三言處解之道也其者指二也難方在外二往濟難則處乎險中以身任之而不辭當是時以往為中大難既解无所事於往也則五來復二乃為得中得中者合宜之謂也得中則吉易傳曰天下國家必綱紀法度廢亂而後禍亂生聖人解其難而安平無事矣則无所往也當正紀綱明法度反正理追復先王之治所謂來復也此天下之吉也自漢而下亂既除則不為可久可繼之治不復有為姑隨時維持而已故不能成善治盖不知來復之義也故曰无所往復吉彖曰其來復吉乃得中也此以九二言處解之道也大難雖解其間有未盡而當有為者不可不往有所往不可不早圖之緩則難深而不可解荀爽曰據五濟難是也解反為蹇則二先往夙也離為日震東方日出乎東夙之象也二之五正而吉解緩也宜以夙為戒故曰有所往夙吉此復以九二言終則有始之道也不有蹇則无解故反復爻義以明之震者天地之始交也天地始交物生之難雷動雨流天地難解則百果草木一瞬息間其甲皆坼无不解者所以如此其速者不失時也艮在木為果在草為蓏陽止也艮反為震陽動於草荄木根之時離為甲解者坼也故有百果草木甲坼之象以卦氣言之解為春分雷始發聲故太𤣥準之以釋盖聖人因論天地始解之義而卦氣在其中矣解之時大矣哉不言義者无所疑也不言用者其用見於蹇之時也象曰雷雨作解君子以赦過宥罪雷雨作天地之難解萬物維新之時也内外有坎坎為獄九二九四皆不正九二未失中而陷之過也九四不中正罪也君子於是時過誤者赦而不問有罪者宥而從輕與民更始則難解矣後世多赦輕重悉原刑罰不得其平失是義也初六无咎象曰剛柔之際義无咎也屯剛柔始交而難生故六二乗剛雖正而難解蹇難既解剛柔分矣初六剛柔之際以柔自處而下剛剛而能柔者也雖未正而无咎得其宜也得宜之謂義辭寡如此者吉辭也九二田獲三狐得黄矢貞吉象曰九二貞吉得中道也二為田自三至上有師象四艮坎為狐狐善疑惑春秋傳卜徒父謂狐為蠱蠱亦惑也自二至四三爻不正皆具坎艮而近五小人惑其上者也二坎為弓三離為矢三動以正弓動矢發二剛上行歴三爻而坎毁田獲三狐也二動離為坤黄地道之美坤之中色得黄矢也正則吉故曰九二貞吉九二剛中為五所任六五柔得尊位於剛斷及明有不足難解之時小人乗之而惑其君則難復結矣小人不可不去也小人去則直道行而得中矣易傳曰羣邪不去君心一入則中直之道无由行矣桓敬之不去武三思是也六三負且乗致宼至貞吝象曰負且乗亦可醜也自我致戎又誰咎也六三上負四下乗二坎為輪六為小人故曰負也者小人之事九為君子故曰乗也者君子之器四坎為盜故曰小人而乗君子之器盜斯奪之矣三正則乗象毁不正則盜斯奪之故貞吝車服所以昭庸宜負而反乗亦可醜也隂為醜辭曰盗象曰戎盜用衆戎也致戎者以不正自我致戎又誰咎哉難解之時小人竊位則宼至矣六三一爻當内卦之上三公之位小人而在高位自二言之與四五為狐自三言之為負乗自上六言之為隼九四解而拇朋至斯孚象曰解而拇未當位也四震為足初在下體之下動而應足拇之象九四陽也陽與陽為朋劉牧曰朋謂二四當大臣之位下與初六小人相應則九二君子與我朋類者不信而去盖觀近臣以其所主也故解其拇則九二自至為孚於五矣四陽處隂於正疑不足復比小人則與君子之誠有不至也其能為五得君子乎故拇不解則小人進小人進則君子去而難作六五君子維有解吉有孚于小人象曰君子有解小人退也難生之初剛柔交錯小人道勝君子合内外之力以濟其難非以勝小人也如理亂繩維有解其結而已九自二之五成巽巽為繩故曰君子維有解吉正故吉也解之者使剛者在上柔者在下不唯君子安之以信于小人小人退而不疑是以險去難解物莫之傷六五之吉孰大于是六下之二與九相應者孚也二之下小人退也故辭曰有孚于小人象曰小人退也譬之有疾本於隂陽揉錯善醫者導之各復其所釋然解矣不善治者又從而紛亂之解天下之大難者亦然陽為君子隂為小人故二以物言之為狐以陽言之為君子五君位也以隂言之又為小人之在上者唯其時物也上六公用射隼于高墉之上獲之无不利象曰公用射隼以解悖也三公位坤土坎險積土當内外之際墉也坎為弓離為矢上動之三弓動矢發巽為高離兊為隼六三之上公用射隼于高墉之上獲之也六三小人之鷙害者當解之終離乎内而未去解道已成悖而未去其害堅强矣上六在上動不失時以解悖亂六三變則悖解悖解則天下之難解无不利者動而括也兊下艮上損有孚元吉无咎可貞利有攸往曷之用二簋可用享彖曰損損下益上其道上行損而有孚元吉无咎可貞利有攸往曷之用二簋可用享二簋應有時損剛益柔有時損益盈虚與時偕行泰變也損九三以益上六也益上矣而謂之損上以下為基譬之築墉損其基以增上之高則危矣非益也故曰損損下益上者以其下事上之道行乎上也故曰損下益上其道上行此以三上二爻言損也損六爻皆應有孚也凡損之道損抑其過以就理義則誠也誠則上下内外无不信乃可損以人情莫不欲損也泰九三正也其始損之以天下之正理非私心有所好惡而損之也故元吉元吉則於理義為无咎始出於正也上九宜有咎然而无咎者損之以正是以无咎自古有損之太過而人情不安或損之不及不足以為損暫行復止人不與之其始不正其終安得无咎故曰元吉无咎損之本出於正雖抑損其過而正理不動則可堅守其正勿失之矣上九不正動則正正則何所往而不利故曰可貞利有攸往此再以泰九三往上言處損之道也損之為用不可常也往而不已將何之乎之往也故曰曷之用此因上九之往以設問也兊為口有問之意損益相為用也損益二卦皆有簋象坤為腹為方震為足艮為鼻震巽為木木為方器有腹有足有鼻簋也以損益二簋論之四時之享春祠夏禴品物少時也其簋不可不損秋嘗冬烝品物多時也其簋不可不益或損之或益之所應之時有不同可用之以享鬼神則一也上為宗廟艮為門闕為手震為長子升自門闕而薦之享也然則二簋可用享者特未定也時焉而已矣則損焉可往而不反哉故曰損剛益柔有時泰者陽息而盈否者隂消而虚盈則損之虚則益之一損一益循環無窮則二簋可用享豈不信乎三代之王所損益可知矣可損而損不為不足可益而益不為有餘因時而行當理而止故曰消息盈虚與時偕行此反復二卦以明損益之用也在卦氣為處暑故太𤣥準之以減象曰山下有澤損君子以懲忿窒慾山下有澤則山日以削澤日以壅有抑損之意君子觀山之削也則懲忿觀澤之壅也則窒慾艮止也震雷怒也懲忿也兊說也坤為土震為足土窒塞之窒慾也忿不懲則凌物慾不窒則溺人懲之然後平窒之然後清君子之所可損唯此二者初九已事遄往无咎酌損之象曰巳事遄往尚合志也四體艮止也巳事者止其事也初九兊決往四成離飛鳥決起之象遄疾之意九居四宜有咎已事遄往故无咎四坎水艮手酌損之也志者動於中也事有當損於其初以剛正決斷止之遄往乃无咎如救焚拯溺可也躊躇不往則事巳成而不可損於損為有咎損宜斟酌可損損之過則非四所堪不及則損之无益尚合乎六四之志而已盖事有當損彼或不損而至於敗敗豈其志哉已事遄往如魯人欲以璠璵葬夫子厯階而止之是已九二利貞征凶弗損益之象曰九二利貞中以為志也九二剛中而説動則損剛為柔六五柔也二動以柔說應之枉道干時徒自失已不能益也无益則容悦致凶曰征凶者動而上行以柔為正也若五來下二二往應之弗損已之剛而五自益矣能益其上故曰弗損益之然則九二利貞者非謂動而以柔為正也以中為志守之用剛待上之求者也故曰中以為志也易傳曰失其剛正而用柔說適足損之矣世之人愚者雖無邪心唯知竭力順上為忠不知弗損益之之義也六三三人行則損一人一人行則得其友象曰一人行三則疑也損自泰變三陽並進三人行也九三一爻損而之上三人行則損一人也九二上行則上六下居三剛柔偶合一人行則得其友也三爻即上爻也故謂之友太𤣥曰二與七共朋三與八成友二七均火也三八均水也猶三即上也萬物之理无有獨立而無友者有一則有兩得配也有兩則有一致一也有兩者益也有一者損也兩則變一則化是謂天地生生之本非致一其能生乎三陽三進成巽巽為不果疑也故曰一人行三則疑也六四損其疾使遄有喜无咎象曰損其疾亦可喜也六四下從初九初九以剛益柔九六離位而六四之疾見矣及其既益各復其所在六四為損其疾在初九為遄有喜遄者離為飛鳥疾之象也盖君子見人之不善者若在已也初九以剛益柔六四亟損其柔以受初之益初九豈不遄有喜乎使初九遄有喜者六四也然六四亟損其不善過咎未深而害巳去亦安得不自喜乎子路聞過則喜是也或曰九二損剛故戒以征凶初九益四非損剛乎曰六四下初九初九往益以剛非損初九之剛也益人而不失已故不戒也六五或益之十朋之龜弗克違元吉象曰六五元吉自上祐也六五得尊位而虛中上九以剛自上益五五忘其尊虚中而納之受益者也五受益則天下之善皆願益之或益之言益之者不一也天地鬼神人道以謙為貴五受益自天祐之獲元吉復何疑哉上九益五正也故吉元吉者吉之至善始終吉也上九自泰九三變始吉也上九變五終吉也故曰元吉五有伏兊兊為右自上祐也泰一變歸妹二變節皆有坎離龜象三變損坤數十四隂為朋十朋也崔憬曰元龜直二十大貝雙貝為朋盖古者三人占則從二人之言未有用龜至於十朋者崔說是也三應上四應初五應二十朋之龜弗克違也上九弗損益之无咎貞吉利有攸往得臣无家象曰弗損益之大得志也上九損之極乃有弗損弗損於下反以益三故曰弗損益之上九如此何咎於損故无咎九在上宜有咎也夫益下必以正理正理者天理也益之以天理則取之愈有用之不竭人各自得於分量之内故正吉利有攸往者六三往也坤為臣二大夫位為家上九反三則六不比于二故得臣无家其益豈有窮哉又易外以内為家四以初五以二上以三外本於内也故虞仲翔解鼎九二曰二據四家言四以初為家也言上九益下則得人心之服從者无有逺近内外之限非適一家以六三之上則内外皆應五之所得不止於二也弗損益之其效至於得臣无家則上九之志大有得也无求於人益我也而人自益之上九益人之志豈不大有得乎震下巽上益利有攸往利涉大川彖曰益損上益下民說无疆自上下下其道大光利有攸往中正有慶利涉大川木道乃行益動而巽日進无疆天施地生其益无方凡益之道與時偕行益否之變損之反也損上之九四益下之初六損上益下也益之巽乃損之兊坤為衆民也損上益下得民之心是以民說无疆者乾上九益坤初也天无疆地與天合徳乃无疆无疆則民說无彼此之限故曰損上益下民說无疆此以初九言益之道也否自上而下一變漸二變渙三變益漸渙皆有坎離日月象以上之貴能下其下則益道光明文武之下下是也夫損者將以為益也損下益上其道上行至於自上下下其道乃大光明矣故曰自上下下其道大光此再以初九推原其變而言益也九五本損之九二反而上往得尊位以中正觀天下六二復以中正應之君臣上下以中正益天下天下受其益是為九五一人之慶則益之道何往而不利哉故曰利有攸往中正有慶此以損之九二往五而言益也益道之行自上下下為漸為渙皆有涉坎之象巽為木坎為大川木在坎上乗舟之象上益其下百姓親附樂為之用入可以守出可以戰如子弟之衛父兄孰不致其死力以犯大難哉故曰利涉大川木道乃行此復以初九之變兼上五二爻言益也凡利涉大川言木者三益也渙也中孚也皆巽坎也渙曰乗木有功中孚曰乗木舟虚動者震也巽者巽也无疆者乾合坤也否變漸有離日變渙變益日進而上行益動而巽於理則日進而无疆如寒暑之不停晝夜之有經日益一日莫之能禦以動而巽也故曰益動而巽其益无疆此合震巽二體兼初九之變而言益也天地之益物者以動而巽也天施一陽於地地得之以生萬物自坎至艮自艮至震其益至盈乎天地之間豈有方所分量哉益人者動而巽於理亦然輔其自然各足其分无方也坤為方乾變之為无方繫辭曰益長裕而不設是也故曰天施地生其益无方此因乾降坤升以言益也天地之大損益有時益極則損損極則益其道與天地並是以能无疆故曰凡益之道與時偕行此再以損益二卦終言乎益之時也在卦氣為立春故太𤣥準之以增象曰風雷益君子以見善則遷有過則改風行雷動相薄有聲不知風之為雷歟雷之為風歟風雷相益也君子見人之善則遷之已有過則改之忘乎已與人也相益而已益自否來九四不正之初而正一變成離離為目見善則遷也初六不正過也初往之四得正有過則改也不遷善則无改過遷善者以改過為益初九利用為大作元吉无咎象曰元吉无咎下不厚事也陽為大震為作益之初利用有為而大作大作者作大事以益天下也事大且善𫉬元吉則動而无咎初九正得乾之始元吉也坤厚也巽為事震有伏巽動則坤見震巽毁下不可厚事也先王用民之力歲不過三日唯田與追胥竭作其不可厚事如此為大作也非元吉則安得无咎六二或益之十朋之龜弗克違永貞吉王用享于帝吉象曰或益之自外來也益損之反益之六二即損之六五故其象同夫子曰辭也者各指其所之然異於損者六二受益者也虚中退託又順其鞠矣五自外來而益之或益之者益之者不一天下之善皆歸之也天地鬼神人道貴謙得人如此故十朋之龜弗克違受益者當守而不變愈久而不厭則來益者无窮矣故永貞吉言六二之虚中不可動也乾五為王乾五兼上九為巽巽為工帝者天之工宰故又為上帝象五自外來益二成兊有殺牛于宫象及復於五有外自門闕享于帝之象六二受益不已𫉬天人之助王者用此爻以享于上帝吉也况六二乎六三益之用凶事无咎有孚中行告公用圭象曰益用凶事固有之也易以正為吉不正為凶六居三不正上巽來益三巽為事益之用凶事也三震動之極為決躁巽其究為躁果於益民者也用之於凶事乃无咎以為不當故也凶事者患難囏阨非常之事唯此乃當奮身不顧如救焚拯溺果於益可也然非有誠心愛民見信於上中道而行亦不可三公位上乾不變為玉震東方之卦交乾為圭圭象春生者也三公以中道上行見孚于上故聘之用圭以達其誠及其既孚上九反三復以誠信與之用圭之禮卒事則反之告者上告下也伏兊為口告公用圭也夫益用凶事唯有孚中行上三交孚至於告公用圭乃能固有其孚不然公雖人臣之尊位也為善專輒有拊傴其民之嫌雖益猶有咎季路為蒲宰修溝洫不白於君以簞食壺漿與民而夫子止之者亦此類也易傳曰禮大夫執圭而使所以申信也凡祭祀朝聘皆以達誠而已六四中行告公從利用為依遷國象曰告公從以益志也三四中位六四當位以益下四之初其中下行故曰中行益人者以中道行也三公位初九應四有伏兊兊口告公也兊口坤順允從之象故曰告公雖益人以中道告公而不從亦不可行四諸侯位坤為國四之初遷國也依六三公位而後遷故曰依遷國苟利於吾力不足則依之以遷國可也衞文公依齊桓公而遷楚丘是也六四告公而從能遷其國者以益民為志公信之也志動於中也遷大事也𫝊曰吾不能定遷事有當遷而益者以遷為中不可憚也然非以益民為志雖有强國亦不可依之以遷遷則不利許子是也易傳曰自古國邑民不安其居則遷遷國者順下而動也九五有孚惠心勿問元吉有孚惠我徳象曰有孚惠心勿問之矣惠我徳大得志也六二應九五有孚也中者心之象惠者順人心而益之五有惠心二信之益人以誠也五之二成兊兊口問也問而後惠惠亦狹矣勿問則吉之至善故勿問元吉不失其始之吉也五不之二而守中正兊象隠勿問之吉也故曰有孚惠心勿問之矣六二中正孚于五者惠我中正之德也九五勿問六二自順我徳而中正之徳自益以誠不費之惠也是以九五不動而大得志易傳曰人君至誠於益天下則天下孰不以誠懐吾徳而為惠哉上九莫益之或擊之立心勿恒凶象曰莫益之偏辭也或擊之自外來也上九益之極有不益者矣上當益三而莫益之上三相益有雷風相與之象恒也巽股立也三中為心上九莫益之持其心不以相益為恒如是則凶矣人道彼我相益而後安莫益之有我而已一偏之辭不知道之大全也三往乗之艮手上擊九損於下雖欲益之晚矣何以知或擊之九自外來也傷於外者必反于内人之情也上九安能有我而忘彼哉漢上易傳卷四
