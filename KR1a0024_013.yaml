body:
  text: 漢上易傳卦圖宋朱震撰右李溉卦氣圖其説源於易緯在類是謀曰冬至日在坎春分日在震夏至日在離秋分日在兌四正之卦卦有六爻爻主一氣餘六十卦卦主六日七分八十分日之七歲十二月三百六十五日四分日之一六十而一周孔穎達易疏解七日來復云易稽覽圖卦氣起中孚故離坎震兌各主一方其餘六十卦卦有六爻别主一日凡主三百六十日餘有五日四分日之一每日分為八十分五日分為四百分日之一又分為二十分是四百二十分六十卦分之六七四十二卦别各得七分每卦得六日七分也司馬溫公曰冬至卦氣起於中孚次復次屯次謙次睽凡一卦御六日二百四十分日之二十一五卦合三十日二百四十分日之二百五北冬至距大寒之數也故入冬至凡涉七日而復之氣應也在易通卦驗曰冬至四十五日以次周天三百六十五日復當故卦乾西北也主立冬坎北方也主冬至艮東北也主立春震東方也主春分巽東南也主立夏離南方也主夏至坤西南也主立秋兌西方也主秋分鄭康成曰春三月候卦氣者泰也大壯也夬也皆九三上六坎九五上六泰震𥘉九六二大壯震六三夬夏三月候卦氣者乾也姤也遁也皆九三上六震九四九五乾震上六離初九姤離六三九三遁秋三月候卦氣者否也觀也剝也皆六三上九離九四六五否離上九兌初九觀兌九二六三剝冬三月候卦氣者坤也復也臨也皆六三上六兌九四九五坤兌上六坎初六復坎九二六三臨又曰冬至坎始用事而主六氣初六爻也小寒於坎直九二大寒於坎直六三立春於坎直六四雨水於坎直九五驚蟄於坎直上六春分於震直初九清明於震直六二榖雨於震直六三立夏於震直九四小滿於震直六五芒種於震直上六夏至於離直初九小暑於離直六二大暑於離直九三立秋於離直九四處暑於離直六五白露於離直上九秋分於兌直初九寒露於兌直九二霜降於兌直六三立冬於兌直九四小雪於兌直九五大雪於兌直上六先儒舊有此圖故康成論乾坤屯蒙否泰六卦之貞曰餘不見為圖者備列之所謂備列之者謂此備列四正六十卦也李鼎祚論剝畫隔坤復來成震七日來復之義曰先儒已論雖各指於日月先儒禇氏莊氏云五月一陰生至十一月一陽生凡七月而云七日不云月者欲見陽長須速故變月言日後學尋討猶未測其端倪略陳梗槩以俟來哲王昭素難孔穎達六日七分謂坤卦之盡復卦陽來則十月節終一陽便來不得冬至之日據其節終尚去冬至一十五日二家之學蓋未見此圖是以其論紛然鼎祚闕疑請俟來哲昭素已臆斷之矣鼎祚於此其優乎乾鑿度曰厯以三百六十五日四分日之一為一歲易三百六十祈當期之日此律厯數也五歲再閏故扐而後卦以應律厯之數鄭康成曰厯以記時律以候氣氣章六十日一轉與厯相應則三百六十日粗為終也厯之數有餘者四分之一差不齊故閏定四時成歲令相應也蘇洵曰震離坎兌各守其方而六十卦之分散於三百六十日聖人不以五日四分之一者害其為易而以七分者加焉此非有所法乎日月星辰之度天地五行之數也以為上之不可以八下之不可以六故以七分者加之使文易者亦不為元用於厯而已矣百皇甫謐曰天地之數三百有六十所以當期凡歲三五十有四日不充爻者餘則歸閏爻以存虛虛所以待甲癸之變甲癸者舉十日之終始也胡旦亦曰卦之爻則實數也歲之日則虛數也歲月不盡之日則加算焉六日七分實數也三百六十五日有餘焉故算而為閏二十四氣七十二候見於周公之時訓呂不韋取以為月令焉其上則見於夏小正夏小正者夏后氏之書孔孔子得之於杞者也夏建寅故其書始於正月周建子而授民時巡狩承享皆用夏正故其書始於立春夏小正具十二月而無中氣有候應而無日數至於時訓乃五日為候三候為氣六十日為節二書詳略雖異其大要則同豈時訓因小正而加詳歟左氏傳曰先王之正時也履端於始舉正於中歸餘於終中謂中氣也漢詔曰昔者黃帝合而不死名察庶驗定清濁起五部建氣物分數氣謂二十四氣也則中氣其來尚矣仲尼贊易時已有時訓觀七月一篇則有取於時訓可知易通卦驗易家傳先師之言所記氣候比之時訓晚者二十有四早者三當以時訓為定故子雲大玄二十四氣關子明論七十二候皆以時訓右律厯之元始於冬至卦氣起於中孚其書本於夏后氏之連山而連山則首艮所以首艮者八風始於不周實居西北之方七宿之次是為東壁營室東壁者辟生氣而東之營室者營陽氣而産之於辰為亥於律為應鍾於時為立冬此顓頊之厯所以首十月也漢巴郡落下閎運算轉厯推步晷刻以太初元年十一月甲子夜半朔冬至而名節會察寒暑定清濁起五部違氣初分數然後陰陽離合之道行焉然落下閎能知厯法而止揚子雲通敏睿達極陰陽之數不唯知其法而又知其意故太玄之作與太初相應而兼該乎顓頊之厯發明連山之旨以準周易為八十一卦凡九分共二卦一五隔一四細分之則四分半當一日準六十卦一日卦六日七分也中中孚也周復也礥間屯也少謙也戾睽也上于升也􅕳羡臨也此冬至以至大寒之氣也差小過也童蒙也增益也鋭漸也達交泰也耎傒需也從進隨也釋解也格夷大壯也樂豫也爭訟也務事蠱也更革也斷毅夬也此立春以至穀雨之氣也裝旅也衆師也密親比也斂小畜也強睟乾也盛大有也居家人也法井也應離也迎咸也遇姤也竈鼎也大廓豐也文渙也禮履也逃唐遁也常恆也此立夏以至大暑之氣也永恆也度節也昆同人也減損也吟守否也翕巽也聚萃也積大畜也飾賁也疑震也視觀也沈兌也內歸妹也去旡妄也晦瞢明夷也窮困也割剝也此立秋以至霜降之氣也止堅艮也成既濟也闕噬嗑也失劇大過也馴坤也將未濟也難蹇也勤養坎也此立冬以至大雪之氣也日月之行有離合陰陽之數有盈虛踦盈二贊有其辭而無其卦而附之於養者以閏為虛也踦火也日也嬴水也月也日月起於天元之初歸其餘也蓋定四時成歲者以其閏月再扐而後卦者由於歸竒六日七分必加算焉以三百六十五日四分之不齊也坎離震兌四正之卦也二十四爻周流四時玄則準之日右斗左秉巡六甲東西南北經緯交錯以成八十一首也一月五卦也侯也大夫也卿也公也辟也辟居於五謂之君卦四者雜卦也玄則準之故一玄象辟三方象三公九州象九卿二十七部象大夫八十一首象元士其大要則厯數也律在其中也體有所循而文不虛生也陸績謂自甲子至甲辰自甲辰至甲申自甲申至甲子凡四千六百一十七歲為一元元有三統統有三會會有二十七章九會二百四十三章皆無餘分其鉤深致逺與神合符有如此也善乎邵康節之言曰太玄其見天地之心乎天地之心者坤極生乾始於冬至之時也此之謂律厯之元論太玄當附於太玄八十一首準易圖後或曰太初之厯不作子雲無以草玄乎曰不然逸周書曰維十有一月既南至昏昴畢日短極其踐長微陽動于黃泉降慘于萬物是月斗柄建子始昏北指陽氣虧草木萌動日月俱起于牽牛之初右迥回而行月周天起一次而與日合宿日行月一次而周天厯會于十有二辰終則復始是謂日月權輿又曰天地之正四時之極不易之道夏數得天百王所同書所謂日月俱起于牽牛之初即太初厯十一月朔旦冬至日月如合璧五星如連珠也昔劉向藏三代之書其子歆有所不知以問子雲子雲之於律厯之元固已博極羣書而知之矣是以落下閎得其厯之法而子雲獨得其意云右圖乾陽也坤陰也並如而交錯行乾貞於十一月子左行陽時六貞正也𥘉爻以此為正次爻左右者各從次數之珅貞於六月未乾坤陰陽之主也陰退一辰故貞於夬右行陰時六以順成其歲歲終次從於屯蒙歲終則從其次屯蒙需訟也屯為陽貞十二月丑其爻左行以間時而治六辰蒙為陰貞正月寅其爻右行亦間時而治六辰歲終則從其次卦陽卦以次其辰以丑為貞左行間辰而治六辰陰卦與陽卦其位同謂與日若在衡也陰則退一辰謂左右交錯相避否泰之卦獨各貞其辰言不用卦次泰當貞於戌否當貞於亥戌乾體所在亥又乾消息之月泰否乾坤體氣相亂故避而各貞其辰謂泰貞正月否貞七月六爻者泰得否之乾否得泰之坤否貞申右行則三陰在西三陽在北泰貞寅左行則三陽在東三陰在南是則陰陽相比共復乾坤之體也其共北辰左行相隨也北辰左行謂泰從正月至六月此月陽爻否從七月至十二月此月陰爻否泰各自相隨中孚為陽貞於十一月子小過為陰貞於六月未法於乾坤中孚於十一月子小過正月之卦也宜貞於寅二月卯而貞於六月非其次故言象法乾坤其餘卦則各貞於其辰同位乃相避三十二歲期而周六十四卦三百八十四爻一千五百二十復貞此乾坤交錯成六十四卦陳純臣所謂六十四卦推蕩訣是也其説見於乾鑿度而鄭康成及先儒發明之京房論推蕩曰以陰蕩陽以陽蕩陰陰陽二氣蕩而成象又曰蕩陰入陽蕩陽入陰陽交互內外適變八卦回巡至極則反此正解繫辭八卦相蕩之義如六十卦圖本於乾坤並如陰陽交錯而行故傳圖者亦謂之推蕩易天下之至變者也六位遞遷四時運動五行相推不可執一者也右圖鄭康成注周禮太師云黃鍾初九也下生林鍾之初六林鍾又上生太簇之九二太簇又下生南呂之六二南呂又上生姑洗之九三姑洗又下生夾鍾之六三夾鍾又上生蕤賔之九四蕤賔又下生大呂之六四大呂又上生夷則之九五夷則又下生應鍾之六五應鍾上生無射之上九無射下生仲呂之上六臣謂不取諸卦而取乾坤者萬物之父母右圖周官大師掌六律六同以合陰陽之聲鄭康成曰聲陰陽各有合黃鍾子之氣也十一月建焉而辰在星紀丑也大呂丑之氣也十二月建焉而辰在玄枵子也太簇寅之氣也正月建焉而辰在娵訾亥也應鍾亥之氣也十月建焉而辰在析木寅也姑洗辰之氣也三月建焉而辰在大梁酉也南呂酉之氣也八月建焉而辰在壽星卯也蕤賔午之氣也五月建焉而辰在鶉首未也林鍾未之氣也六月建焉而辰在鶉火午也夷則申之氣也七月建焉而辰在鶉尾已也仲呂已之氣也四月建焉而辰在實沈申也無射戌之氣也九月建焉而辰在大火卯也夾鍾卯之氣也二月建焉而辰在降婁與建交錯貿處如表裏然是其合也右圖太玄曰黃鍾生林鍾林鍾生太簇太簇生南呂南呂生姑洗姑洗生應鍾應鍾生蕤賔蕤賔生大呂大呂生夷則夷則生夾鍾夾鍾生無射無射生仲呂説者謂陽下生陰陰上生陽獨陸績注太玄云黃鍾下生林鍾林鍾上生太簇太簇下生南呂南呂上生姑洗姑洗下生應鍾應鍾上生蕤賔蕤賔又上生大呂大呂下生夷則夷則上生夾鍾夾鍾下生無射無射上生仲呂其説謂陽生於子陰生於午從子至已陽生陰退故律生呂言下生呂生律言上生從午至亥陰升陽退故律生呂言上生呂生律言下生至午而變故蕤賔重上生而績論律呂分寸與司馬遷律書特異然黃鍾至蕤賔律生呂者自左而右呂生律者自右而左蕤賔至仲呂律生呂者自右而左呂生律者自左而右云夫六十卦乾貞於子而左行坤貞於未而右行屯貞於丑間時而左行蒙貞於寅間時而右行泰貞於寅而左行否貞於申而右行小過貞於未而右行七卦錯行律實效之黃鍾乾初九也大呂坤六四也太簇乾九二也應鍾坤六五也無射乾上九也夾鍾坤六三也夷則乾九五也仲呂坤六二也蕤賔乾九四也林鍾坤初六也初應四二應五三應上故子丑寅亥卯戌辰酉已申午未謂之合聲司馬遷曰氣始於冬至周而復生此所謂律數右圖太玄曰聲生日律生辰乾鑿度曰日十者五音也辰十二者六律也星二十八者七宿也凡五十所以閡物而出之者鄭康成曰甲乙角也丙丁徵也戊已宮也庚辛商也壬癸羽也六律益六呂十二辰四七二十八而周天觀康成所論五音本於日十二律生於辰其學源於太玄而子雲則觀大衍之數五十而知之夫卦有十二消息升降於前後五日而成六十卦律有十一一律舍五聲五聲之變成六十律冬至之卦復也其實起於中孚七日而後復應冬至之律黃鍾也其實生於執始而執始乃在冬至之前此律厯之元也唯子雲知之今北辰不動紐為天樞而不動之處其實在紐星之末一度有餘非善觀天者孰能知之哉右圖司馬遷律書論律厯天所以通五行八正之氣其略曰不周風居西北東壁居不周風東至於營室至於危十月也律中應鍾其於十二子為亥廣莫風居北方東至於虛東至於須女十一月也律中黃鍾其於十二子為子其於十母為壬癸十日為母則十二辰為子十日為幹則十二辰為夫東至牽牛東至於建星建星六星在南斗北十二月也律中大呂條風居東北南至於箕正月也律中太簇其於十二子為寅南至於尾南至於心南至於房明庶風居東方二月也律呂夾鍾其於十二子為卯其於十母為甲乙南至於氐南至於亢南至於角三月也律中姑洗其於十二子為辰清明風居東南維西之軫西至於翼四月也律中仲呂其於十二子為已西至於七星西至於張西至于注栁八星一曰天相一曰天庫一曰注五月也律中蕤賓景風居南方其於十二子為午其於十母為丙丁西至於弧參罰東有大星曰狼下有四星曰弧涼風居西南維六月也律中林鍾其於十二子為未北至于罰參為白虎三星貞是也為衡石下有三星兌曰罰北至于參七月也律中夷則其於十二子為申北至于濁北至于留律呂南呂其於十二子為酉閶闔風居西方其於十母為庚辛北至於胃北至於婁北至於奎徐廣曰一作圭九月也律中無射其於十二子為戌太史公所論即乾鑿度所謂五音六律七變由此而作故大衍之數五十七變言七宿四七二十八而周天甲乙丙丁庚辛壬癸四方而戊已當軒轅之宮京房論大衍五十謂十日十二辰二十八宿為五十其一不用者天之生氣鄭康成謂天地之數五十冇五以五行氣通凡五行減五大衍又減一其説皆本於此右圖徐氏云天文也上脫剛柔交錯四字故彖總而釋之剛柔交錯天文也文明以止人文也王昭素胡安定皆用此義石徂徠不然之曰彖解亨小利有攸往中間更無異文即言天文者言剛柔也者天之文也天之文即剛柔二義也二氣交錯成天之文柔來文剛分剛上而文柔者天文也臣曰日為陽月為陰歲熒惑鎮為陽太白辰為陰斗魁為陽尾為陰天南為陽北為陰東為陽西為陰日月東行天西轉日自牽牛至東井分剛上而文柔也月自角至壁柔來而文剛也五星東行有遲有速北斗西行昏明迭建二十八宿分配五行各有陰陽四時隱見至於中外之宮無名之星河漢之精皆發乎陰陽者也則二氣交錯成天之文信矣右圖孔穎達曰四月純陽用事陰在其中故靡草死十月純陰用事陽在其中故薺菜生以此為剛柔交錯四時之變石徂徠謂政道失於下陰陽之氣差忒於上則天文乖錯臣曰二者皆是也故採虞陸二家之學以兼明之斗建乾坤終始圖大玄日斗之南也左行而右旋右圖楚丘曰明夷日也日之數十故有十時亦當十位自王已下其二為公其三為卿日上其中食日為二旦日為三杜預曰日中當王食時當公平旦為卿雞鳴為士夜半為皂人定為輿黃昏為隸日入為僚晡時為僕日昳為臺隅中日出闕不在第尊王公也夫日右行經天成十二位子者乾之始也而終於已午者坤之始也而終於亥故曰大明終始六位時成卜楚丘所推十日蓋如一月五卦辟卦當五以初為諸侯二為大夫三為卿四為公也又卦有六位一元士二大夫三諸侯四卿五天子六宗廟易之用於卜筮其術多矣右圖斗左行建十二次日右行周二十八舍則乾坤終而復始子寅辰午申戌陽也乾之六位未已卯丑亥酉陰也坤之六位位之升降不違其時故曰大明終始六位時成太玄之序曰盛哉日乎炳明離章五色淳光夜則測陰晝則測陽晝夜之測或否或臧陽推五福以類升陰幽六極以類降升降相關大貞乃通經則有南有北緯則有西有東巡承六甲與斗相逢厯以記歲而百穀時雍所謂晝夜升降經緯六甲則大明終始六位時成也甲子甲寅甲辰甲午甲申甲戌謂之六甲大貞乃通者亨也太玄明厯故舉六甲右九宮數者乾鑿度曰太一取其數從行九宮四正四維皆於十五鄭康成曰太一北辰之神也居其所曰太常行於八卦日辰之間曰太一或曰太一出入所由息紫宮之外其星因以為名太一下行九宮猶天子巡狩省方之事每四乃還於中央中央者天地之所太一以陽出以陰入陽起於子陰起於午是以太一下行九宮從坎始坎中男也自此而從於坤宮坤母也又自此而從於震宮震長男也又自此而從於巽宮巽長女也所行半矣還自息於中央既又自此而從乾宮乾父也自此而從兌宮兌少女也又自此而從於艮宮艮少男也又自此而從於離宮離中女也行則周於上下所由息於太一天一之星而紫宮始於坎終於離且出從中男入從中女亦因陰陽男女之偶為終始云臣曰所謂太一取其數從行九宮者七九六八之數也一與八為九一與六為七三與四為七七與二為九陽變七為九陰變八之六七與八為十五九與六為十五故曰四正四維皆於十五乾坤六位圖右圖京氏曰降五行頒六位陸績曰十二辰分六位升降以時消息吉凶又曰天六地六氣六象六天乾交坤而生震坎艮故自子順行震自子至戌六位長子代父也坎自寅至子六位中男也艮自辰至寅六位少男也坤交乾而生巽離兌故自丑逆行巽自丑至卯六位配長男也離自卯至已六位配中男也兌自己至未六位配少男也女從人者也故其位不起於未易於乾卦言大明終始六位時成則七卦可以類推右圖剝之象曰柔變剛也純乾之卦而柔變之一變為姤二變為遁三變為否四變為觀五變為剝此變卦見於易者也陰陽升降變而為六十四漢上易傳卦圖卷中
